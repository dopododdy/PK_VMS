<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <title>ตั้งค่าเครื่องพิมพ์และกระดาษ | PK-VMS Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=Prompt:wght@300;400;600&family=Sarabun:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>

    <style>
        :root {
            --navy: #020617; --navy-light: #0f172a; --teal: #14b811; --border: rgba(255,255,255,0.1);
            --text: #e2e8f0; --text-dim: #94a3b8;
        }
        body { font-family: "Sarabun", sans-serif; background: var(--navy); color: var(--text); min-height: 100vh; font-size: 1rem; }
        
        .input-control { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 10px; outline: none; transition: 0.2s; font-size: 1rem; }
        .input-control:focus { border-color: var(--teal); background: rgba(0,0,0,0.6); }
        
        .label-title { color: var(--teal); font-weight: 800; font-size: 0.9rem; margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: 0.05em; }
        .section-card { background: rgba(30, 41, 59, 0.4); border-radius: 24px; border: 1px solid var(--border); }

        /* แก้ไข Preview Area ให้ Scroll ได้เมื่อ Zoom */
        .preview-area { 
            background: #050b14; 
            border-radius: 20px; 
            border: 2px dashed rgba(255,255,255,0.1); 
            overflow: auto; /* เปิด scroll */
            display: flex; 
            align-items: flex-start; /* เริ่มจากบนเพื่อให้เลื่อนลงได้ */
            justify-content: center; 
            position: relative;
            padding: 100px; /* เพิ่มพื้นที่หายใจรอบๆ เวลาซูม */
        }
        .canvas-wrapper { 
            background: #ffffff; 
            position: relative; 
            transform-origin: top center; /* เปลี่ยนเป็น top center เพื่อให้เวลาซูมแล้วไม่ลอยหายไปข้างบน */
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.7); 
            overflow: hidden;
            flex-shrink: 0;
        }
        
        .canvas-element { position: absolute; cursor: pointer; user-select: none; color: #000; line-height: 1.4; box-sizing: border-box; white-space: pre-wrap; transition: outline 0.1s; }
        .canvas-element:hover { outline: 1px dashed var(--teal); }
        .canvas-element.active { outline: 2px solid var(--teal) !important; background: rgba(20, 184, 17, 0.08); z-index: 100; }
        
        /* Drag & Drop Visual */
        .dragging { opacity: 0.4; border: 2px dashed var(--teal) !important; }

        .var-badge { background: rgba(20, 184, 17, 0.08); border: 1px solid rgba(20, 184, 17, 0.15); color: #4ade80; padding: 5px 12px; border-radius: 10px; font-size: 0.8rem; cursor: pointer; display: inline-block; margin: 4px; transition: 0.2s; font-family: monospace; }
        .var-badge:hover { background: var(--teal); color: white; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(20, 184, 17, 0.3); }

        .btn-tool { background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 10px 18px; border-radius: 12px; font-size: 0.9rem; font-weight: 800; transition: 0.2s; }
        .btn-tool:hover { background: rgba(255,255,255,0.1); color: var(--teal); border-color: var(--teal); }

        .btn-align { width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 10px; cursor: pointer; transition: 0.2s; color: #94a3b8; }
        .btn-align:hover { background: rgba(255,255,255,0.08); color: white; }
        .btn-align.active { background: var(--teal); color: white; border-color: var(--teal); box-shadow: 0 0 15px rgba(20, 184, 17, 0.4); }

        .editor-group { background: rgba(0,0,0,0.2); border-radius: 15px; padding: 12px; border: 1px solid rgba(255,255,255,0.03); }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="overflow-hidden">
    <div class="flex flex-col h-screen">
        <header class="p-5 border-b border-white/5 bg-navy-light flex items-center justify-between shadow-2xl z-30">
            <div class="flex items-center gap-6">
                <a href="master_data.html" class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center hover:bg-white/10 text-xl transition">⬅️</a>
                <div>
                    <h1 class="text-2xl font-black text-white tracking-tight">🖨️ PK-VMS Template Designer</h1>
                    <p class="text-gray-500 text-xs uppercase font-bold tracking-widest">ออกแบบสติ๊กเกอร์และใบเสร็จ (ระบบ Dynamic Push)</p>
                </div>
            </div>
            <div class="flex gap-4">
                <button class="bg-slate-700 hover:bg-slate-600 text-white px-8 py-3 rounded-xl font-bold transition flex items-center gap-2" onclick="printTest()">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                    ทดสอบพิมพ์
                </button>
                <button class="bg-teal-600 hover:bg-teal-500 text-white px-8 py-3 rounded-xl font-bold transition shadow-lg shadow-teal-500/30" onclick="saveTemplate()">💾 บันทึกรูปแบบ</button>
            </div>
        </header>

        <div class="flex flex-1 overflow-hidden">
            <div class="w-7/12 flex flex-col border-r border-white/10 bg-[#020617] overflow-y-auto p-6" id="left-scroll-container">
                <div class="section-card p-6 mb-8 bg-slate-900/60 backdrop-blur-sm">
                    <div class="grid grid-cols-12 gap-5 items-end">
                        <div class="col-span-6">
                            <label class="label-title">เลือก Template</label>
                            <select id="template_type" class="input-control font-black text-teal-400" onchange="loadTemplate()">
                                <option value="">🔄 กำลังโหลดรายการ...</option>
                            </select>
                        </div>
                        <div class="col-span-3">
                            <label class="label-title">กว้าง (มม.)</label>
                            <input type="number" id="paper_w" class="input-control text-center font-bold" value="80" onchange="renderCanvas()">
                        </div>
                        <div class="col-span-3">
                            <label class="label-title">สูง (มม.)</label>
                            <input type="number" id="paper_h" class="input-control text-center font-bold" value="50" onchange="renderCanvas()">
                        </div>
                    </div>
                </div>

                <div class="flex justify-between items-center mb-6 px-2">
                    <h2 class="text-xl font-black text-white flex items-center gap-3">
                        <span class="w-2 h-8 bg-teal-500 rounded-full"></span>
                        รายการองค์ประกอบ
                    </h2>
                    <div class="flex gap-2">
                        <button onclick="addLine('text')" class="btn-tool bg-white/5 hover:bg-teal-500/10 border-white/5 text-white">+ ข้อความ</button>
                        <button onclick="addLine('rect')" class="btn-tool bg-white/5 hover:bg-orange-500/10 border-white/5 text-orange-400">+ สี่เหลี่ยม</button>
                        <button onclick="addLine('image')" class="btn-tool bg-white/5 hover:bg-blue-500/10 border-white/5 text-blue-400">+ รูปภาพ</button>
                    </div>
                </div>

                <div id="lines_container" class="space-y-5 pb-24"></div>
            </div>

            <div class="w-5/12 flex flex-col bg-[#050b14]">
                <div class="flex-1 p-6 flex flex-col overflow-hidden">
                    <div class="flex justify-between items-center mb-4 px-2">
                        <span class="text-xs font-black text-gray-500 uppercase tracking-widest">Live Preview (Select & Arrows to Move)</span>
                        <div class="flex items-center gap-3">
                            <span class="text-[10px] text-gray-500 font-bold">ZOOM</span>
                            <input type="range" id="zoom_level" min="30" max="300" value="100" class="accent-teal-500 w-32" oninput="applyZoom()">
                        </div>
                    </div>
                    <div class="preview-area flex-1">
                        <div id="canvas_wrapper" class="canvas-wrapper"></div>
                    </div>
                </div>

                <div class="h-80 border-t border-white/10 bg-navy-light p-6 overflow-y-auto">
                    <div class="flex items-center gap-2 mb-4">
                        <div class="w-8 h-8 rounded-lg bg-teal-500/20 flex items-center justify-center text-teal-400 font-bold">?</div>
                        <h3 class="text-lg font-black text-teal-400">ตัวแปรที่รองรับ (คลิกเพื่อ Copy)</h3>
                    </div>
                    <div id="var_sidebar_container" class="space-y-4"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentConfig = { width: 80, height: 50, lines: [] };
        let activeLineIndex = -1;
        let draggedIndex = null;

        const mockItems = Array(1).fill({ name: "รายการสินค้า/บริการจำลอง", price: 150.00 });

        const mockData = {
            clinic_name: "PK-VMS Animal Clinic",
            clinic_address: "123 ถ.นเรศวร ต.ในเมือง อ.เมือง จ.พิษณุโลก 65000",
            phone: "081-999-8888",
            tax_id: "0123456789012",
            owner_name: "คุณสมชาย ใจดี",
            pet_name: "โคล่า",
            species: "สุนัข",
            sex: "ผู้ตอน",
            hn: "690001",
            weight: "12.5",
            breed: "ชิวาวา",
            owner_address: "456 ถ.มิตรภาพ จ.ขอนแก่น",
            drug_name: "Amoxicillin 500mg",
            drug_name_th: "ยาฆ่าเชื้อ (อะม็อกซี่)",
            dose_per_time: "1",
            unit: "เม็ด",
            frequency: "วันละ 2 ครั้ง",
            meal_timing: "หลังอาหาร",
            day_timing: "เช้า - เย็น",
            duration_days: "7",
            total_qty: "14 เม็ด",
            warning: "กินติดต่อกันจนหมดตามสัตวแพทย์สั่ง",
            receipt_no: "2569030769000101",
            items_list: `
                <table style="width: 100%; border-collapse:collapse; font-family:'Sarabun'; font-size: 11px; color:black;">
                    ${mockItems.map(item => `<tr><td>${item.name}</td><td style="text-align:right;">${item.price.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td></tr>`).join('')}
                </table>`, 
            total_price: "960.00",
            discount_val: "60.00",
            net_total: "900.00",
            received_amount: "1,000.00",
            change_amount: "100.00",
            date: "07/03/2569",
            time: "10:30"
        };

        const varGroups = {
            "🏥 คลินิก": ["clinic_name", "clinic_address", "phone", "tax_id"],
            "🐾 สัตว์/เจ้าของ": ["owner_name", "pet_name", "species", "sex", "hn", "weight", "breed", "owner_address"],
            "💊 ข้อมูลยา": ["drug_name", "drug_name_th", "dose_per_time", "unit", "frequency", "meal_timing", "day_timing", "duration_days", "total_qty", "warning"],
            "💰 การเงิน": ["receipt_no", "items_list", "total_price", "discount_val", "net_total", "received_amount", "change_amount", "date", "time"]
        };

        const icons = {
            L: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h10M4 18h16"></path></svg>`,
            C: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M7 12h10M4 18h16"></path></svg>`,
            R: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M10 12h10M4 18h16"></path></svg>`,
            B: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 4h8a4 4 0 014 4 4 4 0 01-4 4H6z M6 12h9a4 4 0 014 4 4 4 0 01-4 4H6z"></path></svg>`,
            I: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m-4 0h8M6 20h8"></path></svg>`
        };

        function replaceVars(text, fontSize) {
            if (text.includes("{{items_list}}")) {
                return `
                <table style="width: 100%; border-collapse:collapse; font-family:'Sarabun'; font-size: ${fontSize * 0.9}pt; color:black;">
                    ${mockItems.map(item => `<tr><td>${item.name}</td><td style="text-align:right;">${item.price.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td></tr>`).join('')}
                </table>`;
            }
            return text.replace(/\{\{(.*?)\}\}/g, (match, key) => mockData[key.trim()] || match);
        }

        async function fetchAvailableTemplates() {
            const { data } = await db.from('print_templates').select('template_type').order('template_type');
            const select = document.getElementById('template_type');
            if (data && data.length > 0) {
                select.innerHTML = data.map(t => `<option value="${t.template_type}">${t.template_type}</option>`).join('');
                loadTemplate();
            }
        }

        async function loadTemplate() {
            const type = document.getElementById('template_type').value;
            if (!type) return;
            const { data } = await db.from('print_templates').select('config').eq('template_type', type).single();
            if (data) {
                currentConfig = data.config;
                document.getElementById('paper_w').value = currentConfig.width || 80;
                document.getElementById('paper_h').value = currentConfig.height || 50;
                activeLineIndex = -1;
                renderLinesList(); renderCanvas(); applyZoom();
            }
        }

        async function saveTemplate() {
            const type = document.getElementById('template_type').value;
            if (!type) return;
            currentConfig.width = parseFloat(document.getElementById('paper_w').value);
            currentConfig.height = parseFloat(document.getElementById('paper_h').value);
            const { error } = await db.from('print_templates').update({ config: currentConfig }).eq('template_type', type);
            if (error) alert('Error: ' + error.message);
            else alert('✅ บันทึกรูปแบบเรียบร้อยแล้ว');
        }

        function addLine(type) {
            let newLine = { type, x: 5, y: 5 };
            if (type === 'text') newLine = { ...newLine, text: "ข้อความตัวอย่าง", font: "Sarabun", size: 12, bold: false, italic: false, align: "left" };
            else if (type === 'rect') newLine = { ...newLine, w: 70, h: 5, radius: 0, align: 'left' };
            else if (type === 'image') newLine = { ...newLine, w: 20, h: 20, url: '', align: 'left' };
            currentConfig.lines.push(newLine);
            activeLineIndex = currentConfig.lines.length - 1;
            renderLinesList(); renderCanvas();
            scrollToActive();
        }

        // --- ระบบ Drag and Drop สลับตำแหน่ง ---
        function renderLinesList() {
            const container = document.getElementById('lines_container');
            container.innerHTML = currentConfig.lines.map((l, i) => `
                <div id="line-item-${i}" 
                     class="p-5 rounded-3xl border ${i === activeLineIndex ? 'bg-slate-800 border-teal-500 shadow-2xl' : 'bg-white/5 border-white/5'} transition-all cursor-move"
                     draggable="true"
                     ondragstart="handleDragStart(${i})"
                     ondragover="handleDragOver(event, ${i})"
                     ondragend="handleDragEnd()"
                     ondrop="handleDrop(${i})">
                    <div class="flex justify-between items-center mb-2" onclick="selectLine(${i})">
                        <span class="font-black text-sm uppercase tracking-widest ${i === activeLineIndex ? 'text-teal-400' : 'text-gray-500'} flex items-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8h16M4 16h16"></path></svg>
                            ${l.type === 'rect' ? '🟧 Rectangle' : (l.type === 'image' ? '🖼️ Image' : '📝 Text')}
                        </span>
                        <div class="flex gap-2">
                             <button class="bg-red-500/10 hover:bg-red-500 text-red-500 hover:text-white w-8 h-8 rounded-full text-xs transition flex items-center justify-center" onclick="event.stopPropagation(); currentConfig.lines.splice(${i},1); activeLineIndex=-1; renderLinesList(); renderCanvas();">✕</button>
                        </div>
                    </div>
                    ${i === activeLineIndex ? renderEditor(l, i) : `<div class="text-white font-bold opacity-60 truncate" onclick="selectLine(${i})">${l.type==='image' ? 'Image Component' : (l.type==='rect' ? 'สี่เหลี่ยมโค้งมน' : l.text)}</div>`}
                </div>
            `).join('');
        }

        function handleDragStart(index) {
            draggedIndex = index;
            document.getElementById(`line-item-${index}`).classList.add('dragging');
        }

        function handleDragOver(e, index) {
            e.preventDefault();
        }

        function handleDragEnd() {
            draggedIndex = null;
            renderLinesList();
        }

        function handleDrop(index) {
            if (draggedIndex === null || draggedIndex === index) return;
            const lines = currentConfig.lines;
            const draggedLine = lines[draggedIndex];
            lines.splice(draggedIndex, 1);
            lines.splice(index, 0, draggedLine);
            activeLineIndex = index; // ให้ตัวที่ย้ายยังถูกเลือกอยู่
            renderLinesList();
            renderCanvas();
        }

        function selectLine(index) {
            activeLineIndex = index;
            renderLinesList();
            renderCanvas();
            scrollToActive();
        }

        function scrollToActive() {
            const activeElem = document.getElementById(`line-item-${activeLineIndex}`);
            if (activeElem) activeElem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function handleImageUpload(event, index) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) { updateLine(index, 'url', e.target.result); renderLinesList(); };
            reader.readAsDataURL(file);
        }

        function renderEditor(l, i) {
            const alignControl = `
                <div class="editor-group space-y-2">
                    <label class="label-title">การจัดแนว</label>
                    <div class="flex gap-2">
                        <button class="btn-align ${l.align==='left'?'active':''}" onclick="updateLine(${i},'align','left'); renderLinesList();">${icons.L}</button>
                        <button class="btn-align ${l.align==='center'?'active':''}" onclick="updateLine(${i},'align','center'); renderLinesList();">${icons.C}</button>
                        <button class="btn-align ${l.align==='right'?'active':''}" onclick="updateLine(${i},'align','right'); renderLinesList();">${icons.R}</button>
                    </div>
                </div>
            `;

            if (l.type === 'text') {
                return `
                    <div class="space-y-4 mt-4">
                        <div class="editor-group"><label class="label-title">เนื้อหาข้อความ</label><input type="text" class="input-control" value="${l.text}" oninput="updateLine(${i},'text',this.value)"></div>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="editor-group"><label class="label-title">ชนิดฟอนต์</label><select class="input-control text-sm" onchange="updateLine(${i},'font',this.value)"><option value="Sarabun" ${l.font==='Sarabun'?'selected':''}>Sarabun</option><option value="Kanit" ${l.font==='Kanit'?'selected':''}>Kanit</option><option value="Prompt" ${l.font==='Prompt'?'selected':''}>Prompt</option><option value="Courier New" ${l.font==='Courier New'?'selected':''}>Mono</option></select></div>
                            <div class="editor-group"><label class="label-title">ขนาด (pt)</label><input type="number" class="input-control font-bold" value="${l.size}" oninput="updateLine(${i},'size',this.value)"></div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            ${alignControl}
                            <div class="editor-group space-y-2"><label class="label-title">สไตล์</label><div class="flex gap-2"><button class="btn-align ${l.bold?'active':''}" onclick="updateLine(${i},'bold',${!l.bold}); renderLinesList();">${icons.B}</button><button class="btn-align ${l.italic?'active':''}" onclick="updateLine(${i},'italic',${!l.italic}); renderLinesList();">${icons.I}</button></div></div>
                        </div>
                        <div class="grid grid-cols-2 gap-4 border-t border-white/10 pt-4">
                            <div class="editor-group"><label class="label-title">พิกัด X (mm)</label><input type="number" class="input-control" value="${l.x}" oninput="updateLine(${i},'x',this.value)"></div>
                            <div class="editor-group"><label class="label-title">พิกัด Y (mm)</label><input type="number" class="input-control" value="${l.y}" oninput="updateLine(${i},'y',this.value)"></div>
                        </div>
                    </div>
                `;
            } else if (l.type === 'rect') {
                return `
                    <div class="space-y-4 mt-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div class="editor-group"><label class="label-title">ความกว้าง (mm)</label><input type="number" class="input-control" value="${l.w}" oninput="updateLine(${i},'w',this.value)"></div>
                            <div class="editor-group"><label class="label-title">ความสูง (mm)</label><input type="number" class="input-control" value="${l.h}" step="0.1" oninput="updateLine(${i},'h',this.value)"></div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            ${alignControl}
                            <div class="editor-group"><label class="label-title">มุมโค้ง (mm)</label><input type="number" class="input-control" value="${l.radius || 0}" oninput="updateLine(${i},'radius',this.value)"></div>
                        </div>
                        <div class="grid grid-cols-2 gap-4 border-t border-white/10 pt-4">
                            <div class="editor-group"><label class="label-title">พิกัด X (mm)</label><input type="number" class="input-control" value="${l.x}" oninput="updateLine(${i},'x',this.value)"></div>
                            <div class="editor-group"><label class="label-title">พิกัด Y (mm)</label><input type="number" class="input-control" value="${l.y}" oninput="updateLine(${i},'y',this.value)"></div>
                        </div>
                    </div>
                `;
            } else if (l.type === 'image') {
                return `
                    <div class="space-y-4 mt-4">
                        <div class="editor-group">
                            <label class="label-title">อัปโหลดรูปภาพ</label>
                            <input type="file" class="input-control text-xs" accept="image/*" onchange="handleImageUpload(event, ${i})">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="editor-group"><label class="label-title">กว้าง (mm)</label><input type="number" class="input-control" value="${l.w}" oninput="updateLine(${i},'w',this.value)"></div>
                            <div class="editor-group"><label class="label-title">สูง (mm)</label><input type="number" class="input-control" value="${l.h}" oninput="updateLine(${i},'h',this.value)"></div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            ${alignControl}
                            <div class="editor-group"></div>
                        </div>
                        <div class="grid grid-cols-2 gap-4 border-t border-white/10 pt-4">
                            <div class="editor-group"><label class="label-title">พิกัด X (mm)</label><input type="number" class="input-control" value="${l.x}" oninput="updateLine(${i},'x',this.value)"></div>
                            <div class="editor-group"><label class="label-title">พิกัด Y (mm)</label><input type="number" class="input-control" value="${l.y}" oninput="updateLine(${i},'y',this.value)"></div>
                        </div>
                    </div>
                `;
            }
        }

        function updateLine(i, k, v) { currentConfig.lines[i][k] = v; renderCanvas(); }

        function renderCanvas() {
            const wrapper = document.getElementById('canvas_wrapper');
            const px = 3.78; 
            const pw = document.getElementById('paper_w').value;
            const ph = document.getElementById('paper_h').value;
            wrapper.style.width = (pw * px) + 'px';
            wrapper.style.height = (ph * px) + 'px';

            const canvasLines = currentConfig.lines.map((l, originalIndex) => ({...l, originalIndex}));
            // จัดเรียงตาม Y สำหรับ Dynamic Push เท่านั้น
            const sortedLines = [...canvasLines].sort((a,b) => parseFloat(a.y) - parseFloat(b.y));
            
            let pushOffset = 0;

            wrapper.innerHTML = sortedLines.map((l) => {
                const currentY = parseFloat(l.y) + pushOffset;
                const isActive = l.originalIndex === activeLineIndex;
                
                let style = `top:${currentY * px}px; font-family:${l.font || 'Sarabun'}; font-size:${l.size * 1.33}px; font-weight:${l.bold ? 'bold' : 'normal'}; font-style:${l.italic ? 'italic' : 'normal'};`;
                
                const availableWidthMm = pw - parseFloat(l.x) - 5; 
                const boxWidthPx = (l.w ? l.w : availableWidthMm) * px;
                style += `width:${boxWidthPx}px;`;

                if (l.text && l.text.includes("{{items_list}}")) {
                    pushOffset += (mockItems.length - 1) * 6;
                }

                const commonAttr = `class="canvas-element ${isActive ? 'active' : ''}" onclick="event.stopPropagation(); selectLine(${l.originalIndex})"`;

                if (l.type === 'text') {
                    let tStyle = style;
                    if (l.align === 'center') tStyle += `left:0; width:100%; text-align:center;`;
                    else if (l.align === 'right') tStyle += `left:0; width:100%; text-align:right; padding-right:${l.x*px}px;`;
                    else tStyle += `left:${l.x*px}px; text-align:left;`;
                    return `<div ${commonAttr} style="${tStyle}">${replaceVars(l.text, l.size)}</div>`;
                } else if (l.type === 'rect') {
                    let rStyle = `top:${currentY * px}px; left:${l.x * px}px; width:${l.w * px}px; height:${l.h * px}px; border:1px solid #000; background:transparent; border-radius:${(l.radius || 0) * px}px;`;
                    return `<div ${commonAttr} style="${rStyle}"></div>`;
                } else if (l.type === 'image') {
                    let iStyle = `top:${currentY * px}px; left:${l.x * px}px; width:${l.w * px}px; height:${l.h * px}px; object-fit:contain;`;
                    if (l.align === 'center') iStyle = `top:${currentY * px}px; left:50%; transform:translateX(-50%); width:${l.w * px}px; height:${l.h * px}px; object-fit:contain;`;
                    return `<img src="${l.url}" ${commonAttr} style="${iStyle}">`;
                }
            }).join('');
        }

        window.addEventListener('keydown', function(e) {
            if (activeLineIndex === -1) return;
            if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'SELECT') return;

            const step = e.shiftKey ? 5 : 1; 
            let moved = false;
            const line = currentConfig.lines[activeLineIndex];

            if (e.key === 'ArrowUp') { line.y = parseFloat(line.y) - step; moved = true; }
            else if (e.key === 'ArrowDown') { line.y = parseFloat(line.y) + step; moved = true; }
            else if (e.key === 'ArrowLeft') { line.x = parseFloat(line.x) - step; moved = true; }
            else if (e.key === 'ArrowRight') { line.x = parseFloat(line.x) + step; moved = true; }

            if (moved) {
                e.preventDefault();
                renderCanvas();
                renderLinesList();
            }
        });

        function applyZoom() { 
            const zoom = document.getElementById('zoom_level').value / 100;
            // ใช้ scale บน wrapper
            document.getElementById('canvas_wrapper').style.transform = `scale(${zoom})`; 
        }
        
        function printTest() {
            const sortedLines = [...currentConfig.lines].sort((a,b) => parseFloat(a.y) - parseFloat(b.y));
            const pw_val = document.getElementById('paper_w').value;
            const ph_val = document.getElementById('paper_h').value;
            const win = window.open('', '_blank', 'width=800,height=600');
            
            let pushOffset = 0;
            const printContent = sortedLines.map(l => {
                const currentY = parseFloat(l.y) + pushOffset;
                let style = `top:${currentY}mm; font-family:${l.font || 'Sarabun'}; font-size:${l.size}pt; font-weight:${l.bold ? 'bold' : 'normal'}; font-style:${l.italic ? 'italic' : 'normal'};`;
                
                const availableWidthMm = pw_val - parseFloat(l.x) - 5;
                const boxWidthMm = (l.w ? l.w : availableWidthMm);
                style += `width:${boxWidthMm}mm;`;

                if (l.text && l.text.includes("{{items_list}}")) pushOffset += (mockItems.length - 1) * 6;

                if (l.type === 'text') {
                    if (l.align === 'center') style += `left:0; width:100%; text-align:center;`;
                    else if (l.align === 'right') style += `left:0; width:100%; text-align:right; padding-right:${l.x}mm;`;
                    else style += `left:${l.x}mm;`;
                    return `<div class="elem" style="${style}">${replaceVars(l.text, l.size)}</div>`;
                } else if (l.type === 'rect') {
                    return `<div class="elem" style="top:${currentY}mm; left:${l.x}mm; width:${l.w}mm; height:${l.h}mm; border:1px solid black; border-radius:${l.radius || 0}mm;"></div>`;
                } else if (l.type === 'image') {
                    let iStyle = `top:${currentY}mm; left:${l.x}mm; width:${l.w}mm; height:${l.h}mm; object-fit:contain;`;
                    if (l.align === 'center') iStyle = `top:${currentY}mm; left:50%; transform:translateX(-50%); width:${l.w}mm; height:${l.h}mm; object-fit:contain;`;
                    return `<img src="${l.url}" class="elem" style="${iStyle}">`;
                }
            }).join('');

            win.document.write(`<html><head><style>@import url('https://fonts.googleapis.com/css2?family=Sarabun&display=swap'); body { margin: 0; padding: 0; background: white; font-family: 'Sarabun'; } .page { position: relative; width: ${pw_val}mm; height: auto; min-height: ${ph_val}mm; overflow: hidden; } .elem { position: absolute; color: black; line-height: 1.4; white-space: pre-wrap; } @media print { @page { size: ${pw_val}mm auto; margin: 0; } }</style></head><body><div class="page">${printContent}</div><script>window.onload=function(){ setTimeout(()=> {window.print(); window.close();}, 500); };<\/script></body></html>`);
            win.document.close();
        }

        window.onload = async () => {
            await fetchAvailableTemplates();
            const sideContainer = document.getElementById('var_sidebar_container');
            sideContainer.innerHTML = Object.entries(varGroups).map(([group, vars]) => `<div><div class="var-category-title" style="color:var(--teal); font-weight:800; font-size:0.8rem; margin-bottom:5px; margin-top:10px;">${group}</div><div class="flex flex-wrap">${vars.map(v => `<span class="var-badge" onclick="navigator.clipboard.writeText('{{${v}}}'); alert('Copy: {{${v}}}')">{{${v}}}</span>`).join('')}</div></div>`).join('');
        };
    </script>
</body>
</html>
