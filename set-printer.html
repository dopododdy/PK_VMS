<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <title>ตั้งค่าเครื่องพิมพ์และกระดาษ | PK-VMS Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=Prompt:wght@300;400;600&family=Sarabun:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>

    <style>
        :root {
            --navy: #020617; --navy-light: #0f172a; --teal: #14b811; --border: rgba(255,255,255,0.1);
            --text: #e2e8f0; --text-dim: #94a3b8;
        }
        body { font-family: "Sarabun", sans-serif; background: var(--navy); color: var(--text); min-height: 100vh; font-size: 1rem; }
        
        .input-control { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 12px; outline: none; transition: 0.2s; font-size: 1.1rem; }
        .input-control:focus { border-color: var(--teal); background: rgba(0,0,0,0.6); }
        
        .label-title { color: var(--teal); font-weight: 800; font-size: 1rem; margin-bottom: 6px; display: block; text-transform: uppercase; }
        .section-card { background: rgba(30, 41, 59, 0.4); border-radius: 20px; border: 1px solid var(--border); }

        /* Canvas Preview */
        .canvas-wrapper { background: #ffffff; position: relative; transform-origin: center top; transition: transform 0.2s; overflow: hidden; margin: 0 auto; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .canvas-element { position: absolute; cursor: pointer; user-select: none; color: #000; line-height: 1.4; box-sizing: border-box; white-space: pre-wrap; word-break: break-all; }
        .canvas-element.active { outline: 2px solid var(--teal); background: rgba(20, 184, 17, 0.1); z-index: 50; }
        
        .var-badge { background: rgba(20, 184, 17, 0.1); border: 1px solid rgba(20, 184, 17, 0.2); color: #4ade80; padding: 4px 10px; border-radius: 8px; font-size: 0.85rem; cursor: pointer; display: inline-block; margin: 3px; transition: 0.2s; font-family: monospace; }
        .var-badge:hover { background: var(--teal); color: white; transform: translateY(-1px); }

        .btn-tool { background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 8px 15px; border-radius: 10px; font-size: 0.95rem; font-weight: 600; transition: 0.2s; }
        .btn-tool:hover { background: rgba(255,255,255,0.1); color: var(--teal); }

        .btn-align { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .btn-align.active { background: var(--teal); color: white; border-color: var(--teal); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="overflow-hidden">
    <div class="flex flex-col h-screen">
        <header class="p-6 border-b border-white/5 bg-navy-light flex items-center justify-between shadow-xl z-20">
            <div class="flex items-center gap-6">
                <a href="settings.html" class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center hover:bg-white/10 text-xl transition">⬅️</a>
                <div>
                    <h1 class="text-2xl font-black text-white">🖨️ ออกแบบฟอร์มการพิมพ์</h1>
                    <p class="text-gray-400 text-sm">ออกแบบระบบ "ดันข้อความอัตโนมัติ" สำหรับรายการสินค้า</p>
                </div>
            </div>
            <div class="flex gap-4">
                <button class="bg-slate-700 hover:bg-slate-600 text-white px-8 py-3 rounded-xl font-bold transition flex items-center gap-2" onclick="printTest()"><span>🖨️</span> ทดสอบพิมพ์</button>
                <button class="bg-teal-600 hover:bg-teal-500 text-white px-8 py-3 rounded-xl font-bold transition shadow-lg shadow-teal-500/20" onclick="saveTemplate()">💾 บันทึกรูปแบบ</button>
            </div>
        </header>

        <div class="flex flex-1 overflow-hidden">
            <div class="w-7/12 flex flex-col border-r border-white/10 bg-[#020617] overflow-y-auto p-8">
                <div class="section-card p-6 mb-8">
                    <div class="grid grid-cols-12 gap-6 items-end">
                        <div class="col-span-6">
                            <label class="label-title">ประเภทเอกสาร</label>
                            <select id="template_type" class="input-control font-bold text-teal-400" onchange="loadTemplate()">
                                <option value="DrugSticker">💊 สติ๊กเกอร์ยา</option>
                                <option value="Receipt80mm">📄 ใบเสร็จรับเงิน (80mm)</option>
                            </select>
                        </div>
                        <div class="col-span-3">
                            <label class="label-title text-gray-400 text-xs">กว้าง (มม.)</label>
                            <input type="number" id="paper_w" class="input-control text-center font-bold" value="80" onchange="renderCanvas()">
                        </div>
                        <div class="col-span-3">
                            <label class="label-title text-gray-400 text-xs">สูง (มม.)</label>
                            <input type="number" id="paper_h" class="input-control text-center font-bold" value="50" onchange="renderCanvas()">
                        </div>
                    </div>
                </div>

                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-black text-white">📝 องค์ประกอบ</h2>
                    <div class="flex gap-2">
                        <button onclick="addLine('text')" class="btn-tool text-white">+ ข้อความ</button>
                        <button onclick="addLine('rect')" class="btn-tool text-orange-400 border-orange-400/30">+ เส้นคั่น</button>
                    </div>
                </div>

                <div id="lines_container" class="space-y-4 pb-20"></div>
            </div>

            <div class="w-5/12 flex flex-col bg-[#050b14] border-l border-white/5">
                <div class="flex-1 overflow-auto p-10 flex flex-col items-center justify-start bg-black/40">
                    <div class="flex justify-between w-full max-w-md mb-4 items-center">
                        <span class="text-xs font-bold text-gray-500 uppercase tracking-widest">Live Preview (พิกัดจริง)</span>
                        <input type="range" id="zoom_level" min="30" max="200" value="100" class="accent-teal-500 w-32" oninput="applyZoom()">
                    </div>
                    <div id="canvas_wrapper" class="canvas-wrapper"></div>
                </div>

                <div class="h-80 border-t border-white/10 bg-navy-light p-6 overflow-y-auto shadow-2xl">
                    <div class="flex items-center gap-2 mb-4">
                        <span class="text-xl">💡</span>
                        <h3 class="text-lg font-black text-teal-400">ตัวแปร (คลิกเพื่อ Copy)</h3>
                    </div>
                    <div id="var_sidebar_container"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentConfig = { width: 80, height: 150, lines: [] };
        let activeLineIndex = -1;

        const mockData = {
            clinic_name: "PK-VMS Animal Clinic",
            clinic_address: "123 ถ.นเรศวร ต.ในเมือง อ.เมือง จ.พิษณุโลก 65000",
            phone: "081-999-8888",
            tax_id: "0123456789012",
            owner_name: "คุณสมชาย ใจดี",
            pet_name: "โคล่า",
            hn: "HN-26-001",
            receipt_no: "REC260306-01",
            date: "06/03/2026",
            time: "18:45",
            items_list: "1. ตรวจรักษาทั่วไป..............300.00\n2. ยาฆ่าเชื้อ Amoxy..............500.00\n3. อาหารเม็ด Royal Canin.........450.00\n4. แชมพูแก้แพ้..................200.00",
            total_price: "1,450.00",
            discount_val: "50.00",
            net_total: "1,400.00",
            pay_method: "เงินโอน (K-Bank)"
        };

        const varGroups = {
            "🏠 คลินิก": ["clinic_name", "clinic_address", "phone"],
            "🐾 ลูกค้า": ["owner_name", "pet_name", "hn"],
            "💰 การเงิน": ["receipt_no", "items_list", "total_price", "discount_val", "net_total", "pay_method"]
        };

        function replaceVars(text) {
            if (!text) return "";
            return text.replace(/\{\{(.*?)\}\}/g, (match, key) => mockData[key.trim()] || match);
        }

        async function loadTemplate() {
            const type = document.getElementById('template_type').value;
            const { data } = await db.from('print_templates').select('config').eq('template_type', type).single();
            if (data) {
                currentConfig = data.config;
                document.getElementById('paper_w').value = currentConfig.width || 80;
                document.getElementById('paper_h').value = currentConfig.height || 150;
            } else {
                currentConfig = { width: 80, height: (type.includes('Receipt') ? 150 : 50), lines: [] };
            }
            renderLinesList(); renderCanvas();
        }

        async function saveTemplate() {
            const type = document.getElementById('template_type').value;
            currentConfig.width = parseFloat(document.getElementById('paper_w').value);
            currentConfig.height = parseFloat(document.getElementById('paper_h').value);
            await db.from('print_templates').upsert({ template_type: type, config: currentConfig });
            alert('✅ บันทึกแล้ว');
        }

        function addLine(type) {
            let newLine = { type, x: 5, y: 10 };
            if (type === 'text') newLine = { ...newLine, text: "ข้อความ", size: 12, bold: false, align: "left" };
            else newLine = { ...newLine, w: 70, h: 0.5, fill: true, align: 'center' };
            currentConfig.lines.push(newLine);
            activeLineIndex = currentConfig.lines.length - 1;
            renderLinesList(); renderCanvas();
        }

        function renderLinesList() {
            const container = document.getElementById('lines_container');
            container.innerHTML = currentConfig.lines.map((l, i) => `
                <div class="p-4 rounded-xl border ${i === activeLineIndex ? 'bg-navy-light border-teal-500' : 'bg-white/5 border-white/5'}">
                    <div class="flex justify-between items-center cursor-pointer" onclick="activeLineIndex=${i}; renderLinesList();">
                        <span class="font-bold text-sm">${l.type === 'rect' ? '--- เส้นคั่น ---' : (l.text.substring(0,25)+'...')}</span>
                        <button class="text-red-400 text-xs" onclick="currentConfig.lines.splice(${i},1); renderLinesList(); renderCanvas();">ลบ</button>
                    </div>
                    ${i === activeLineIndex ? renderEditor(l, i) : ''}
                </div>
            `).join('');
        }

        function renderEditor(l, i) {
            return `
                <div class="grid grid-cols-4 gap-3 mt-4 pt-4 border-t border-white/5">
                    <div class="col-span-4">
                        <input type="text" class="input-control text-sm" value="${l.text || ''}" oninput="updateLine(${i},'text',this.value)" placeholder="ใส่ข้อความ หรือ {{ตัวแปร}}">
                    </div>
                    <div class="col-span-2">
                        <label class="text-[10px] text-gray-500 block">ตำแหน่ง Y (มม.)</label>
                        <input type="number" class="input-control" value="${l.y}" oninput="updateLine(${i},'y',this.value)">
                    </div>
                    <div>
                        <label class="text-[10px] text-gray-500 block">ขนาด</label>
                        <input type="number" class="input-control" value="${l.size || 12}" oninput="updateLine(${i},'size',this.value)">
                    </div>
                    <div class="flex items-end">
                        <button class="w-full h-11 rounded-lg border border-white/10 ${l.bold?'bg-teal-600':''}" onclick="updateLine(${i},'bold',${!l.bold}); renderLinesList();">B</button>
                    </div>
                </div>
            `;
        }

        function updateLine(i, k, v) { currentConfig.lines[i][k] = v; renderCanvas(); }

        // --- หัวใจหลัก: ฟังก์ชันคำนวณตำแหน่ง Y แบบ Dynamic ---
        function calculateDynamicElements() {
            const px = 3.78;
            const sortedLines = [...currentConfig.lines].sort((a, b) => a.y - b.y);
            let pushOffset = 0;
            const lineHeightMm = 5.2; // ความสูงเฉลี่ยต่อบรรทัด (มม.)

            return sortedLines.map(l => {
                const currentY = parseFloat(l.y) + pushOffset;
                const replacedText = replaceVars(l.text);
                
                // ถ้าเจอ items_list ให้คำนวณว่ามีกี่บรรทัด และเพิ่ม Offset สำหรับตัวถัดไป
                if (l.text && l.text.includes('{{items_list}}')) {
                    const lineCount = replacedText.split('\n').length;
                    if (lineCount > 1) {
                        pushOffset += (lineCount - 1) * lineHeightMm;
                    }
                }

                return { ...l, renderedY: currentY, renderedText: replacedText };
            });
        }

        function renderCanvas() {
            const wrapper = document.getElementById('canvas_wrapper');
            const px = 3.78;
            wrapper.style.width = (document.getElementById('paper_w').value * px) + 'px';
            wrapper.style.height = (document.getElementById('paper_h').value * px) + 'px';

            const dynamicLines = calculateDynamicElements();
            
            wrapper.innerHTML = dynamicLines.map(l => {
                let style = `top:${l.renderedY * px}px; font-size:${(l.size || 12) * 1.33}px; font-weight:${l.bold?'bold':'normal'};`;
                
                if (l.type === 'text') {
                    style += `left:${l.x || 5 * px}px; width:calc(100% - 10px);`;
                    if (l.align === 'center') style += `text-align:center; left:0;`;
                    return `<div class="canvas-element" style="${style}">${l.renderedText}</div>`;
                } else {
                    let rStyle = `top:${l.renderedY * px}px; width:${l.w * px}px; height:${l.h * px}px; background:#000; left:50%; transform:translateX(-50%);`;
                    return `<div class="canvas-element" style="${rStyle}"></div>`;
                }
            }).join('');
        }

        function applyZoom() {
            document.getElementById('canvas_wrapper').style.transform = `scale(${document.getElementById('zoom_level').value/100})`;
        }

        function printTest() {
            const dynamicLines = calculateDynamicElements();
            const pw_val = document.getElementById('paper_w').value;
            const ph_val = document.getElementById('paper_h').value;
            
            const win = window.open('', '_blank');
            win.document.write(`
                <html><head><style>
                    @import url('https://fonts.googleapis.com/css2?family=Sarabun&display=swap');
                    body { margin: 0; padding: 0; font-family: 'Sarabun'; }
                    .page { position: relative; width: ${pw_val}mm; min-height: ${ph_val}mm; }
                    .el { position: absolute; white-space: pre-wrap; color: black; line-height: 1.4; word-break: break-all; }
                    @media print { @page { size: ${pw_val}mm auto; margin: 0; } }
                </style></head><body><div class="page">
                    ${dynamicLines.map(l => {
                        if(l.type === 'text') return `<div class="el" style="top:${l.renderedY}mm; left:5mm; width:${pw_val-10}mm; font-size:${l.size}pt; font-weight:${l.bold?'bold':'normal'};">${l.renderedText}</div>`;
                        else return `<div class="el" style="top:${l.renderedY}mm; left:50%; transform:translateX(-50%); width:${l.w}mm; height:${l.h}mm; background:black;"></div>`;
                    }).join('')}
                </div><script>setTimeout(() => { window.print(); window.close(); }, 500);<\/script></body></html>
            `);
            win.document.close();
        }

        window.onload = () => {
            loadTemplate();
            const sideContainer = document.getElementById('var_sidebar_container');
            sideContainer.innerHTML = Object.entries(varGroups).map(([group, vars]) => `
                <div class="text-[10px] font-bold text-gray-500 mt-3 mb-1 uppercase">${group}</div>
                <div class="flex flex-wrap">${vars.map(v => `<span class="var-badge" onclick="navigator.clipboard.writeText('{{${v}}}'); alert('Copy {{${v}}}')">{{${v}}}</span>`).join('')}</div>
            `).join('');
        };
    </script>
</body>
</html>
