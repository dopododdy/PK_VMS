<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <title>ตั้งค่าเครื่องพิมพ์และกระดาษ | PK-VMS Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=Prompt:wght@300;400;600&family=Sarabun:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>

    <style>
        :root {
            --navy: #020617; --navy-light: #0f172a; --teal: #14b811; --border: rgba(255,255,255,0.1);
            --text: #e2e8f0; --text-dim: #94a3b8;
        }
        body { font-family: "Sarabun", sans-serif; background: var(--navy); color: var(--text); min-height: 100vh; font-size: 1rem; }
        
        /* UI Scaling */
        .input-control { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 12px; outline: none; transition: 0.2s; font-size: 1.1rem; }
        .input-control:focus { border-color: var(--teal); background: rgba(0,0,0,0.6); }
        
        .label-title { color: var(--teal); font-weight: 800; font-size: 1rem; margin-bottom: 6px; display: block; text-transform: uppercase; }
        .section-card { background: rgba(30, 41, 59, 0.4); border-radius: 20px; border: 1px solid var(--border); }

        /* Canvas Preview */
        .canvas-wrapper { background: #ffffff; position: relative; transform-origin: center top; transition: transform 0.2s; overflow: hidden; margin: 0 auto; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .canvas-element { position: absolute; cursor: pointer; user-select: none; color: #000; line-height: 1.2; box-sizing: border-box; }
        .canvas-element.active { outline: 2px solid var(--teal); background: rgba(20, 184, 17, 0.1); z-index: 50; }
        
        /* Variables Category */
        .var-category-title { font-size: 0.9rem; font-weight: 800; color: #64748b; margin-top: 15px; margin-bottom: 5px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 2px; }
        .var-badge { background: rgba(20, 184, 17, 0.1); border: 1px solid rgba(20, 184, 17, 0.2); color: #4ade80; padding: 4px 10px; border-radius: 8px; font-size: 0.85rem; cursor: pointer; display: inline-block; margin: 3px; transition: 0.2s; font-family: monospace; }
        .var-badge:hover { background: var(--teal); color: white; transform: translateY(-1px); }

        .btn-tool { background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 8px 15px; border-radius: 10px; font-size: 0.95rem; font-weight: 600; transition: 0.2s; }
        .btn-tool:hover { background: rgba(255,255,255,0.1); color: var(--teal); }

        .btn-align { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .btn-align.active { background: var(--teal); color: white; border-color: var(--teal); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="overflow-hidden">
    <div class="flex flex-col h-screen">
        <header class="p-6 border-b border-white/5 bg-navy-light flex items-center justify-between shadow-xl z-20">
            <div class="flex items-center gap-6">
                <a href="settings.html" class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center hover:bg-white/10 text-xl transition">⬅️</a>
                <div>
                    <h1 class="text-2xl font-black text-white">🖨️ ออกแบบฟอร์มสติ๊กเกอร์</h1>
                    <p class="text-gray-400 text-sm">กำหนดขนาดกระดาษและตำแหน่งตัวแปรสำหรับการพิมพ์</p>
                </div>
            </div>
            <div class="flex gap-4">
                <button class="bg-slate-700 hover:bg-slate-600 text-white px-8 py-3 rounded-xl font-bold transition flex items-center gap-2" onclick="printTest()"><span>🖨️</span> ทดสอบพิมพ์</button>
                <button class="bg-teal-600 hover:bg-teal-500 text-white px-8 py-3 rounded-xl font-bold transition shadow-lg shadow-teal-500/20" onclick="saveTemplate()">💾 บันทึกรูปแบบ</button>
            </div>
        </header>

        <div class="flex flex-1 overflow-hidden">
            <div class="w-7/12 flex flex-col border-r border-white/10 bg-[#020617] overflow-y-auto p-8">
                <div class="section-card p-6 mb-8">
                    <div class="grid grid-cols-12 gap-6 items-end">
                        <div class="col-span-6">
                            <label class="label-title">Template เอกสาร</label>
                            <select id="template_type" class="input-control font-bold text-teal-400" onchange="loadTemplate()"></select>
                        </div>
                        <div class="col-span-3">
                            <label class="label-title text-gray-400 text-xs">กว้าง (มม.)</label>
                            <input type="number" id="paper_w" class="input-control text-center font-bold" value="80" onchange="renderCanvas()">
                        </div>
                        <div class="col-span-3">
                            <label class="label-title text-gray-400 text-xs">สูง (มม.)</label>
                            <input type="number" id="paper_h" class="input-control text-center font-bold" value="50" onchange="renderCanvas()">
                        </div>
                    </div>
                </div>

                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-black text-white">📝 รายการองค์ประกอบ</h2>
                    <div class="flex gap-2">
                        <button onclick="addLine('text')" class="btn-tool text-white">+ ข้อความ</button>
                        <button onclick="addLine('rect')" class="btn-tool text-orange-400 border-orange-400/30">+ สี่เหลี่ยม</button>
                        <button onclick="addLine('image')" class="btn-tool text-teal-400 border-teal-400/30">+ รูปภาพ</button>
                    </div>
                </div>

                <div id="lines_container" class="space-y-4 pb-20"></div>
            </div>

            <div class="w-5/12 flex flex-col bg-[#050b14] border-l border-white/5">
                <div class="flex-1 overflow-auto p-10 flex flex-col items-center justify-start bg-black/40">
                    <div class="flex justify-between w-full max-w-md mb-4 items-center">
                        <span class="text-xs font-bold text-gray-500 uppercase tracking-widest">Live Preview</span>
                        <div class="flex items-center gap-3">
                            <input type="range" id="zoom_level" min="50" max="250" value="130" class="accent-teal-500 w-32" oninput="applyZoom()">
                        </div>
                    </div>
                    <div id="canvas_wrapper" class="canvas-wrapper"></div>
                </div>

                <div class="h-96 border-t border-white/10 bg-navy-light p-6 overflow-y-auto shadow-2xl">
                    <div class="flex items-center gap-2 mb-4">
                        <span class="text-xl">💡</span>
                        <h3 class="text-lg font-black text-teal-400">ตัวแปรที่รองรับ</h3>
                    </div>
                    <div id="var_sidebar_container"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentConfig = { width: 80, height: 50, lines: [] };
        let activeLineIndex = -1;

        const mockData = {
            clinic_name: "PK-VMS Animal Hospital", phone: "081-999-8888",
            pet_name: "โคล่า", species: "สุนัข", sex: "ผู้ตอน", hn: "HN-2026-001", weight: "12.5", breed: "Golden Retriever",
            drug_name: "Amoxicillin 500", drug_name_th: "อะม็อกซี่ (ฆ่าเชื้อ)", 
            dose_per_time: "1", unit: "เม็ด", frequency: "วันละ 2 ครั้ง",
            meal_timing: "หลังอาหารทันที", day_timing: "เช้า-เย็น", duration_days: "7",
            total_qty: "14", warning: "ระวังอาการแพ้ยา และกินติดต่อกันจนหมด",
            date: "06 มี.ค. 26", time: "14:30 น.", queue: "คิวที่ 08"
        };

        const varGroups = {
            "🏥 คลินิก": ["clinic_name", "phone"],
            "🐾 สัตว์และเจ้าของ": ["pet_name", "species", "sex", "hn", "weight", "breed"],
            "💊 ข้อมูลยา (ละเอียด)": ["drug_name", "drug_name_th", "dose_per_time", "unit", "frequency", "meal_timing", "day_timing", "duration_days", "total_qty", "warning"],
            "🕰️ เวลาและคิว": ["date", "time", "queue"]
        };

        function replaceVars(text) {
            return text.replace(/\{\{(.*?)\}\}/g, (match, key) => mockData[key.trim()] || match);
        }

        async function loadTemplateDropdown() {
            const { data } = await db.from('print_templates').select('template_type').order('template_type');
            const selectEl = document.getElementById('template_type');
            selectEl.innerHTML = data.map(t => `<option value="${t.template_type}">${t.template_type}</option>`).join('');
            loadTemplate();
        }

        async function loadTemplate() {
            const type = document.getElementById('template_type').value;
            const { data } = await db.from('print_templates').select('config').eq('template_type', type).single();
            if (data) {
                currentConfig = data.config;
                document.getElementById('paper_w').value = currentConfig.width || 80;
                document.getElementById('paper_h').value = currentConfig.height || 50;
                renderLinesList(); renderCanvas(); applyZoom();
            }
        }

        async function saveTemplate() {
            const type = document.getElementById('template_type').value;
            currentConfig.width = parseFloat(document.getElementById('paper_w').value);
            currentConfig.height = parseFloat(document.getElementById('paper_h').value);
            await db.from('print_templates').update({ config: currentConfig }).eq('template_type', type);
            alert('✅ บันทึกรูปแบบเรียบร้อยแล้ว');
        }

        function addLine(type) {
            let newLine = { type, x: 5, y: 5 };
            if (type === 'text') {
                newLine = { ...newLine, text: "ข้อความใหม่", font: "Sarabun", size: 14, bold: false, italic: false, align: "left" };
            } else if (type === 'rect') {
                // อัปเดตคุณสมบัติพื้นฐานของสี่เหลี่ยม: เพิ่ม borderStyle, borderWidth, fill
                newLine = { ...newLine, w: 70, h: 8, radius: 4, borderWidth: 1, borderStyle: 'solid', fill: true };
            } else {
                newLine = { ...newLine, w: 15, h: 15, url: "" };
            }
            currentConfig.lines.push(newLine);
            activeLineIndex = currentConfig.lines.length - 1;
            renderLinesList(); renderCanvas();
        }

        function renderLinesList() {
            const container = document.getElementById('lines_container');
            container.innerHTML = currentConfig.lines.map((l, i) => {
                const active = i === activeLineIndex;
                return `
                    <div class="p-5 rounded-2xl border transition-all ${active ? 'bg-navy-light border-teal-500 shadow-lg' : 'bg-white/5 border-white/5'}">
                        <div class="flex justify-between items-center cursor-pointer" onclick="activeLineIndex=${i}; renderLinesList();">
                            <div class="flex items-center gap-3">
                                <span class="w-8 h-8 rounded-full bg-black/40 flex items-center justify-center text-xs text-gray-400 font-bold">${i+1}</span>
                                <span class="font-bold text-lg">${l.type === 'rect' ? '🟧 สี่เหลี่ยม' : l.type === 'image' ? '🖼️ รูปภาพ' : l.text}</span>
                            </div>
                            <button class="text-red-400 font-bold hover:bg-red-400/10 px-3 py-1 rounded-lg transition" onclick="currentConfig.lines.splice(${i},1); renderLinesList(); renderCanvas();">ลบออก</button>
                        </div>
                        ${active ? renderEditor(l, i) : ''}
                    </div>
                `;
            }).join('');
        }

        function renderEditor(l, i) {
            if (l.type === 'text') {
                return `
                    <div class="grid grid-cols-4 gap-4 mt-5 pt-5 border-t border-white/5">
                        <div class="col-span-4"><label class="text-xs text-gray-500 mb-1 block">ข้อความ</label>
                            <input type="text" class="input-control" value="${l.text}" oninput="updateLine(${i},'text',this.value)">
                        </div>
                        <div class="col-span-2">
                            <label class="text-xs text-gray-500 mb-1 block">การจัดวาง</label>
                            <div class="flex gap-2">
                                <button class="btn-align ${l.align==='left'?'active':''}" onclick="updateLine(${i},'align','left'); renderLinesList();">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h10M4 18h16"></path></svg>
                                </button>
                                <button class="btn-align ${l.align==='center'?'active':''}" onclick="updateLine(${i},'align','center'); renderLinesList();">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M7 12h10M4 18h16"></path></svg>
                                </button>
                                <button class="btn-align ${l.align==='right'?'active':''}" onclick="updateLine(${i},'align','right'); renderLinesList();">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M10 12h10M4 18h16"></path></svg>
                                </button>
                            </div>
                        </div>
                        <div><label class="text-xs text-gray-500 mb-1 block">ขนาด</label><input type="number" class="input-control" value="${l.size}" oninput="updateLine(${i},'size',this.value)"></div>
                        <div class="flex items-end gap-1">
                            <button class="w-12 h-12 rounded-xl border border-white/10 ${l.bold?'bg-teal-600 text-white':'bg-white/5'}" onclick="updateLine(${i},'bold',${!l.bold}); renderLinesList();"><b>B</b></button>
                            <button class="w-12 h-12 rounded-xl border border-white/10 ${l.italic?'bg-teal-600 text-white':'bg-white/5'}" onclick="updateLine(${i},'italic',${!l.italic}); renderLinesList();"><i>I</i></button>
                        </div>
                        <div class="col-span-2"><label class="text-xs text-gray-500 mb-1 block">ตำแหน่ง X (มม.)</label><input type="number" class="input-control" value="${l.x}" oninput="updateLine(${i},'x',this.value)"></div>
                        <div class="col-span-2"><label class="text-xs text-gray-500 mb-1 block">ตำแหน่ง Y (มม.)</label><input type="number" class="input-control" value="${l.y}" oninput="updateLine(${i},'y',this.value)"></div>
                    </div>
                `;
            } else if (l.type === 'rect') {
                return `
                    <div class="grid grid-cols-4 gap-4 mt-5 pt-5 border-t border-white/5">
                        <div><label class="text-xs text-gray-500 mb-1 block">กว้าง (มม.)</label><input type="number" class="input-control" value="${l.w}" oninput="updateLine(${i},'w',this.value)"></div>
                        <div><label class="text-xs text-gray-500 mb-1 block">สูง (มม.)</label><input type="number" class="input-control" value="${l.h}" oninput="updateLine(${i},'h',this.value)"></div>
                        <div><label class="text-xs text-gray-500 mb-1 block">หนาเส้นขอบ</label><input type="number" class="input-control" value="${l.borderWidth || 1}" step="0.1" oninput="updateLine(${i},'borderWidth',this.value)"></div>
                        <div><label class="text-xs text-gray-500 mb-1 block">ชนิดเส้น</label>
                            <select class="input-control" onchange="updateLine(${i},'borderStyle',this.value)">
                                <option value="solid" ${l.borderStyle==='solid'?'selected':''}>เส้นทึบ</option>
                                <option value="dashed" ${l.borderStyle==='dashed'?'selected':''}>เส้นประ</option>
                                <option value="dotted" ${l.borderStyle==='dotted'?'selected':''}>ไข่ปลา</option>
                            </select>
                        </div>
                        <div><label class="text-xs text-gray-500 mb-1 block">โค้ง (Radius)</label><input type="number" class="input-control" value="${l.radius}" oninput="updateLine(${i},'radius',this.value)"></div>
                        <div class="flex items-end pb-2">
                             <label class="flex items-center gap-2 cursor-pointer bg-white/5 p-3 rounded-xl border border-white/10 w-full justify-center">
                                <input type="checkbox" ${l.fill ? 'checked' : ''} onchange="updateLine(${i},'fill',this.checked)" class="w-5 h-5 accent-teal-500">
                                <span class="text-xs font-bold">เติมสีพื้น (ดำ)</span>
                             </label>
                        </div>
                        <div><label class="text-xs text-gray-500 mb-1 block">ตำแหน่ง X</label><input type="number" class="input-control" value="${l.x}" oninput="updateLine(${i},'x',this.value)"></div>
                        <div><label class="text-xs text-gray-500 mb-1 block">ตำแหน่ง Y</label><input type="number" class="input-control" value="${l.y}" oninput="updateLine(${i},'y',this.value)"></div>
                    </div>
                `;
            }
            return '';
        }

        function updateLine(index, key, value) {
            currentConfig.lines[index][key] = value;
            renderCanvas();
        }

        function renderCanvas() {
            const wrapper = document.getElementById('canvas_wrapper');
            const px = 3.78;
            wrapper.style.width = (document.getElementById('paper_w').value * px) + 'px';
            wrapper.style.height = (document.getElementById('paper_h').value * px) + 'px';
            wrapper.innerHTML = currentConfig.lines.map((l, i) => {
                let style = `top:${l.y*px}px; font-family:${l.font}; font-size:${l.size*1.33}px; font-weight:${l.bold?'bold':'normal'}; font-style:${l.italic?'italic':'normal'};`;
                
                if (l.type === 'text') {
                    if (l.align === 'center') {
                        style += `left:0; width:100%; text-align:center;`;
                    } else if (l.align === 'right') {
                        style += `left:0; width:100%; text-align:right; padding-right:${l.x*px}px;`;
                    } else {
                        style += `left:${l.x*px}px; text-align:left;`;
                    }
                    return `<div class="canvas-element ${i===activeLineIndex?'active':''}" style="${style}" onclick="activeLineIndex=${i}; renderLinesList();">${replaceVars(l.text)}</div>`;
                } else if (l.type === 'rect') {
                    // ปรับสไตล์สี่เหลี่ยมให้รองรับ Border Width, Style และ Fill
                    const bw = (l.borderWidth || 1) * (px/2); // ปรับสเกลเส้นขอบให้ดูสมจริง
                    const bStyle = l.borderStyle || 'solid';
                    const bgColor = l.fill ? '#000' : 'transparent';
                    return `<div class="canvas-element ${i===activeLineIndex?'active':''}" style="left:${l.x*px}px; top:${l.y*px}px; width:${l.w*px}px; height:${l.h*px}px; border-radius:${l.radius}px; border:${bw}px ${bStyle} #000; background:${bgColor};" onclick="activeLineIndex=${i}; renderLinesList();"></div>`;
                } else if (l.type === 'image') {
                    return `<div class="canvas-element ${i===activeLineIndex?'active':''}" style="left:${l.x*px}px; top:${l.y*px}px; width:${l.w*px}px; height:${l.h*px}px; border:1px dashed #ccc; display:flex; align-items:center; justify-content:center; font-size:10px; color:#999;" onclick="activeLineIndex=${i}; renderLinesList();">IMAGE</div>`;
                }
            }).join('');
        }

        function applyZoom() {
            const z = document.getElementById('zoom_level').value;
            document.getElementById('canvas_wrapper').style.transform = `scale(${z/100})`;
        }

        function printTest() {
            const contents = document.getElementById('canvas_wrapper').innerHTML;
            const pw = window.open('', '_blank', 'width=800,height=600');
            pw.document.write(`
                <html>
                <head>
                    <title>Print Preview</title>
                    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600&family=Prompt:wght@400;600&family=Sarabun:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
                    <style>
                        body { margin: 0; padding: 0; background: white; -webkit-print-color-adjust: exact; }
                        .sticker { position: relative; width: ${document.getElementById('paper_w').value}mm; height: ${document.getElementById('paper_h').value}mm; overflow: hidden; }
                        .canvas-element { position: absolute; white-space: pre-wrap; word-break: break-word; line-height: 1.2; color: #000; outline:none !important; box-sizing: border-box; }
                        @page { size: ${document.getElementById('paper_w').value}mm ${document.getElementById('paper_h').value}mm; margin: 0; }
                    </style>
                </head>
                <body>
                    <div class="sticker">${contents}</div>
                    <script>
                        window.onload = function() {
                            setTimeout(function() { window.print(); window.close(); }, 500);
                        };
                    <\/script>
                </body>
                </html>
            `);
            pw.document.close();
        }

        window.onload = () => {
            loadTemplateDropdown();
            const sideContainer = document.getElementById('var_sidebar_container');
            sideContainer.innerHTML = Object.entries(varGroups).map(([group, vars]) => `
                <div class="var-category-title">${group}</div>
                <div class="flex flex-wrap">${vars.map(v => `<span class="var-badge" onclick="navigator.clipboard.writeText('{{${v}}}'); alert('คัดลอก {{${v}}} แล้ว')">{{${v}}}</span>`).join('')}</div>
            `).join('');
        };
    </script>
</body>
</html>
