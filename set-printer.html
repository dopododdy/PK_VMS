<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <title>ตั้งค่าเครื่องพิมพ์และกระดาษ | PK-VMS Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=Prompt:wght@300;400;600&family=Sarabun:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>

    <style>
        :root {
            --navy: #020617; --navy-light: #0f172a; --teal: #14b811; --border: rgba(255,255,255,0.1);
            --text: #e2e8f0; --text-dim: #94a3b8;
        }
        body { font-family: "Sarabun", sans-serif; background: var(--navy); color: var(--text); min-height: 100vh; font-size: 1rem; }
        
        .input-control { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 12px; outline: none; transition: 0.2s; font-size: 1.1rem; }
        .input-control:focus { border-color: var(--teal); background: rgba(0,0,0,0.6); }
        
        .label-title { color: var(--teal); font-weight: 800; font-size: 1rem; margin-bottom: 6px; display: block; text-transform: uppercase; }
        .section-card { background: rgba(30, 41, 59, 0.4); border-radius: 20px; border: 1px solid var(--border); }

        .canvas-wrapper { background: #ffffff; position: relative; transform-origin: center top; transition: transform 0.2s; overflow: hidden; margin: 0 auto; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .canvas-element { position: absolute; cursor: pointer; user-select: none; color: #000; line-height: 1.4; box-sizing: border-box; white-space: pre-wrap; }
        .canvas-element.active { outline: 2px solid var(--teal); background: rgba(20, 184, 17, 0.1); z-index: 50; }
        
        .var-badge { background: rgba(20, 184, 17, 0.1); border: 1px solid rgba(20, 184, 17, 0.2); color: #4ade80; padding: 4px 10px; border-radius: 8px; font-size: 0.85rem; cursor: pointer; display: inline-block; margin: 3px; transition: 0.2s; font-family: monospace; }
        .var-badge:hover { background: var(--teal); color: white; transform: translateY(-1px); }

        .btn-tool { background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 8px 15px; border-radius: 10px; font-size: 0.95rem; font-weight: 600; transition: 0.2s; }
        .btn-tool:hover { background: rgba(255,255,255,0.1); color: var(--teal); }

        .btn-align { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .btn-align.active { background: var(--teal); color: white; border-color: var(--teal); }
        .var-category-title { font-weight: bold; color: #64748b; font-size: 0.8rem; margin-top: 15px; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.05em; }
    </style>
</head>
<body class="overflow-hidden">
    <div class="flex flex-col h-screen">
        <header class="p-6 border-b border-white/5 bg-navy-light flex items-center justify-between shadow-xl z-20">
            <div class="flex items-center gap-6">
                <a href="master_data.html" class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center hover:bg-white/10 text-xl transition">⬅️</a>
                <div>
                    <h1 class="text-2xl font-black text-white">🖨️ ออกแบบฟอร์มการพิมพ์</h1>
                    <p class="text-gray-400 text-sm">จัดการรูปแบบสติ๊กเกอร์และใบเสร็จรับเงิน</p>
                </div>
            </div>
            <div class="flex gap-4">
                <button class="bg-slate-700 hover:bg-slate-600 text-white px-8 py-3 rounded-xl font-bold transition flex items-center gap-2" onclick="printTest()"><span>🖨️</span> ทดสอบพิมพ์</button>
                <button class="bg-teal-600 hover:bg-teal-500 text-white px-8 py-3 rounded-xl font-bold transition shadow-lg shadow-teal-500/20" onclick="saveTemplate()">💾 บันทึกรูปแบบ</button>
            </div>
        </header>

        <div class="flex flex-1 overflow-hidden">
            <div class="w-7/12 flex flex-col border-r border-white/10 bg-[#020617] overflow-y-auto p-8">
                <div class="section-card p-6 mb-8">
                    <div class="grid grid-cols-12 gap-6 items-end">
                        <div class="col-span-6">
                            <label class="label-title">Template เอกสาร</label>
                            <select id="template_type" class="input-control font-bold text-teal-400" onchange="loadTemplate()">
                                <option value="">กำลังโหลดรายการ...</option>
                            </select>
                        </div>
                        <div class="col-span-3">
                            <label class="label-title text-gray-400 text-xs">กว้าง (มม.)</label>
                            <input type="number" id="paper_w" class="input-control text-center font-bold" value="80" onchange="renderCanvas()">
                        </div>
                        <div class="col-span-3">
                            <label class="label-title text-gray-400 text-xs">สูง (มม.)</label>
                            <input type="number" id="paper_h" class="input-control text-center font-bold" value="50" onchange="renderCanvas()">
                        </div>
                    </div>
                </div>

                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-black text-white">📝 รายการองค์ประกอบ</h2>
                    <div class="flex gap-2">
                        <button onclick="addLine('text')" class="btn-tool text-white">+ ข้อความ</button>
                        <button onclick="addLine('rect')" class="btn-tool text-orange-400 border-orange-400/30">+ สี่เหลี่ยม/เส้น</button>
                        <button onclick="addLine('image')" class="btn-tool text-blue-400 border-blue-400/30">+ รูปภาพ</button>
                    </div>
                </div>

                <div id="lines_container" class="space-y-4 pb-20"></div>
            </div>

            <div class="w-5/12 flex flex-col bg-[#050b14] border-l border-white/5">
                <div class="flex-1 overflow-auto p-10 flex flex-col items-center justify-start bg-black/40">
                    <div class="flex justify-between w-full max-w-md mb-4 items-center">
                        <span class="text-xs font-bold text-gray-500 uppercase tracking-widest">Live Preview</span>
                        <input type="range" id="zoom_level" min="50" max="250" value="130" class="accent-teal-500 w-32" oninput="applyZoom()">
                    </div>
                    <div id="canvas_wrapper" class="canvas-wrapper"></div>
                </div>

                <div class="h-96 border-t border-white/10 bg-navy-light p-6 overflow-y-auto shadow-2xl">
                    <div class="flex items-center gap-2 mb-4">
                        <span class="text-xl">💡</span>
                        <h3 class="text-lg font-black text-teal-400">ตัวแปรที่รองรับ (คลิกเพื่อ Copy)</h3>
                    </div>
                    <div id="var_sidebar_container"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentConfig = { width: 80, height: 50, lines: [] };
        let activeLineIndex = -1;

        const mockData = {
            clinic_name: "PK-VMS Animal Clinic", clinic_address: "123 ถ.นเรศวร จ.พิษณุโลก", phone: "081-999-8888", tax_id: "0123456789012",
            owner_name: "คุณสมชาย ใจดี", pet_name: "โคล่า", species: "สุนัข", sex: "ผู้ตอน", hn: "HN-26-001", weight: "12.5", breed: "Golden Retriever",
            drug_name: "Amoxicillin 500", drug_name_th: "ยาฆ่าเชื้อ", dose_per_time: "1", unit: "เม็ด", frequency: "วันละ 2 ครั้ง", meal_timing: "หลังอาหาร", total_qty: "14", warning: "กินติดต่อกันจนหมด",
            items_list: "1. ตรวจรักษาทั่วไป.........300.00\n2. ยาฆ่าเชื้อ Amoxy.........500.00\n3. รายการพิเศษ............200.50", 
            total_price: "1,000.50", discount_val: "0.00", net_total: "1,000.50", date: "06/03/26", time: "19:00",
            receipt_no: "2569030669000101", received_amount: "1,100.00", change_amount: "99.50"
        };

        const varGroups = {
            "🏥 คลินิก": ["clinic_name", "clinic_address", "phone", "tax_id"],
            "🐾 สัตว์/เจ้าของ": ["owner_name", "pet_name", "species", "sex", "hn", "weight", "breed"],
            "💊 ข้อมูลยา": ["drug_name", "drug_name_th", "dose_per_time", "unit", "frequency", "meal_timing", "total_qty", "warning"],
            "💰 การเงิน": ["receipt_no", "items_list", "total_price", "discount_val", "net_total", "received_amount", "change_amount", "date", "time"]
        };

        function replaceVars(text) {
            return text.replace(/\{\{(.*?)\}\}/g, (match, key) => mockData[key.trim()] || match);
        }

        async function fetchAvailableTemplates() {
            const { data } = await db.from('print_templates').select('template_type').order('template_type');
            const select = document.getElementById('template_type');
            if (data && data.length > 0) {
                select.innerHTML = data.map(t => `<option value="${t.template_type}">${t.template_type}</option>`).join('');
                loadTemplate();
            } else {
                select.innerHTML = '<option value="">ไม่พบรายการ Template</option>';
            }
        }

        async function loadTemplate() {
            const type = document.getElementById('template_type').value;
            if (!type) return;
            const { data } = await db.from('print_templates').select('config').eq('template_type', type).single();
            if (data) {
                currentConfig = data.config;
                document.getElementById('paper_w').value = currentConfig.width || 80;
                document.getElementById('paper_h').value = currentConfig.height || 50;
                renderLinesList(); renderCanvas(); applyZoom();
            }
        }

        async function saveTemplate() {
            const type = document.getElementById('template_type').value;
            if (!type) return alert('กรุณาเลือก Template');
            currentConfig.width = parseFloat(document.getElementById('paper_w').value);
            currentConfig.height = parseFloat(document.getElementById('paper_h').value);
            const { error } = await db.from('print_templates').update({ config: currentConfig }).eq('template_type', type);
            if (error) alert('Error: ' + error.message);
            else alert('✅ บันทึกรูปแบบเรียบร้อยแล้ว');
        }

        function addLine(type) {
            let newLine = { type, x: 5, y: 5 };
            if (type === 'text') {
                newLine = { ...newLine, text: "ข้อความ", font: "Sarabun", size: 14, bold: false, italic: false, align: "left" };
            } else if (type === 'rect') {
                newLine = { ...newLine, w: 70, h: 1, radius: 0, borderWidth: 1, borderStyle: 'solid', fill: false, align: 'left' };
            } else if (type === 'image') {
                newLine = { ...newLine, w: 20, h: 20, url: 'https://via.placeholder.com/150', align: 'left' };
            }
            currentConfig.lines.push(newLine);
            activeLineIndex = currentConfig.lines.length - 1;
            renderLinesList(); renderCanvas();
        }

        function renderLinesList() {
            const container = document.getElementById('lines_container');
            container.innerHTML = currentConfig.lines.map((l, i) => `
                <div class="p-5 rounded-2xl border ${i === activeLineIndex ? 'bg-navy-light border-teal-500 shadow-lg' : 'bg-white/5 border-white/5'}">
                    <div class="flex justify-between items-center cursor-pointer" onclick="activeLineIndex=${i}; renderLinesList();">
                        <span class="font-bold text-lg">
                            ${l.type === 'rect' ? '🟧 สี่เหลี่ยม/เส้น' : (l.type === 'image' ? '🖼️ รูปภาพ' : l.text.substring(0, 30))}
                        </span>
                        <button class="text-red-400 font-bold px-3 py-1" onclick="currentConfig.lines.splice(${i},1); activeLineIndex=-1; renderLinesList(); renderCanvas();">ลบ</button>
                    </div>
                    ${i === activeLineIndex ? renderEditor(l, i) : ''}
                </div>
            `).join('');
        }

        function renderEditor(l, i) {
            // Alignment Icons SVG
            const iconL = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h10M4 18h16"></path></svg>`;
            const iconC = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M7 12h10M4 18h16"></path></svg>`;
            const iconR = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M10 12h10M4 18h16"></path></svg>`;
            
            // Bold/Italic Icons SVG
            const iconB = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 4h8a4 4 0 014 4 4 4 0 01-4 4H6z M6 12h9a4 4 0 014 4 4 4 0 01-4 4H6z"></path></svg>`;
            const iconI = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m-4 0h8M6 20h8"></path></svg>`;

            const alignControl = `
                <div class="col-span-2">
                    <label class="text-xs text-gray-400 mb-1 block">การจัดวาง</label>
                    <div class="flex gap-2">
                        <button class="btn-align ${l.align==='left'?'active':''}" onclick="updateLine(${i},'align','left'); renderLinesList();">${iconL}</button>
                        <button class="btn-align ${l.align==='center'?'active':''}" onclick="updateLine(${i},'align','center'); renderLinesList();">${iconC}</button>
                        <button class="btn-align ${l.align==='right'?'active':''}" onclick="updateLine(${i},'align','right'); renderLinesList();">${iconR}</button>
                    </div>
                </div>
            `;

            const fontControl = `
                <div class="col-span-2">
                    <label class="text-xs text-gray-400 mb-1 block">ชนิด Font</label>
                    <select class="input-control text-sm" onchange="updateLine(${i},'font',this.value)">
                        <option value="Sarabun" ${l.font==='Sarabun'?'selected':''}>Sarabun</option>
                        <option value="Kanit" ${l.font==='Kanit'?'selected':''}>Kanit</option>
                        <option value="Prompt" ${l.font==='Prompt'?'selected':''}>Prompt</option>
                        <option value="Courier New" ${l.font==='Courier New'?'selected':''}>Courier New</option>
                    </select>
                </div>
            `;

            if (l.type === 'text') {
                return `
                    <div class="grid grid-cols-4 gap-4 mt-5 pt-5 border-t border-white/5">
                        <div class="col-span-4"><input type="text" class="input-control" value="${l.text}" oninput="updateLine(${i},'text',this.value)"></div>
                        ${fontControl}
                        ${alignControl}
                        <div><label class="text-xs text-gray-400 mb-1 block">ขนาด</label><input type="number" class="input-control" value="${l.size}" oninput="updateLine(${i},'size',this.value)"></div>
                        <div class="flex gap-2 items-end">
                            <button class="btn-align ${l.bold?'active':''}" onclick="updateLine(${i},'bold',${!l.bold}); renderLinesList();">${iconB}</button>
                            <button class="btn-align ${l.italic?'active':''}" onclick="updateLine(${i},'italic',${!l.italic}); renderLinesList();">${iconI}</button>
                        </div>
                        <div class="col-span-2"><label class="text-xs text-gray-400">X (มม.)</label><input type="number" class="input-control" value="${l.x}" oninput="updateLine(${i},'x',this.value)"></div>
                        <div class="col-span-2"><label class="text-xs text-gray-400">Y (มม.)</label><input type="number" class="input-control" value="${l.y}" oninput="updateLine(${i},'y',this.value)"></div>
                    </div>
                `;
            } else if (l.type === 'rect') {
                return `
                    <div class="grid grid-cols-4 gap-4 mt-5 pt-5 border-t border-white/5">
                        <div class="col-span-2"><label class="text-xs text-gray-400 block">กว้าง (มม.)</label><input type="number" class="input-control" value="${l.w}" oninput="updateLine(${i},'w',this.value)"></div>
                        <div class="col-span-2"><label class="text-xs text-gray-400 block">สูง (มม.)</label><input type="number" class="input-control" value="${l.h}" step="0.1" oninput="updateLine(${i},'h',this.value)"></div>
                        ${alignControl}
                        <div class="col-span-2"><label class="text-xs text-gray-400 block">ความโค้งมน (มม.)</label><input type="number" class="input-control" value="${l.radius || 0}" oninput="updateLine(${i},'radius',this.value)"></div>
                        <div class="col-span-2"><label class="text-xs text-gray-400">X</label><input type="number" class="input-control" value="${l.x}" oninput="updateLine(${i},'x',this.value)"></div>
                        <div class="col-span-2"><label class="text-xs text-gray-400">Y</label><input type="number" class="input-control" value="${l.y}" oninput="updateLine(${i},'y',this.value)"></div>
                    </div>
                `;
            } else if (l.type === 'image') {
                return `
                    <div class="grid grid-cols-4 gap-4 mt-5 pt-5 border-t border-white/5">
                        <div class="col-span-4"><label class="text-xs text-gray-400 block">URL รูปภาพ</label><input type="text" class="input-control text-xs" value="${l.url}" oninput="updateLine(${i},'url',this.value)"></div>
                        <div class="col-span-2"><label class="text-xs text-gray-400 block">กว้าง (มม.)</label><input type="number" class="input-control" value="${l.w}" oninput="updateLine(${i},'w',this.value)"></div>
                        <div class="col-span-2"><label class="text-xs text-gray-400 block">สูง (มม.)</label><input type="number" class="input-control" value="${l.h}" oninput="updateLine(${i},'h',this.value)"></div>
                        ${alignControl}
                        <div class="col-span-2"></div>
                        <div class="col-span-2"><label class="text-xs text-gray-400">X</label><input type="number" class="input-control" value="${l.x}" oninput="updateLine(${i},'x',this.value)"></div>
                        <div class="col-span-2"><label class="text-xs text-gray-400">Y</label><input type="number" class="input-control" value="${l.y}" oninput="updateLine(${i},'y',this.value)"></div>
                    </div>
                `;
            }
        }

        function updateLine(i, k, v) { currentConfig.lines[i][k] = v; renderCanvas(); }

        function renderCanvas() {
            const wrapper = document.getElementById('canvas_wrapper');
            const px = 3.78; 
            const pw = document.getElementById('paper_w').value;
            const ph = document.getElementById('paper_h').value;
            wrapper.style.width = (pw * px) + 'px';
            wrapper.style.height = (ph * px) + 'px';

            wrapper.innerHTML = currentConfig.lines.map((l) => {
                let style = `top:${l.y * px}px; font-family:${l.font || 'Sarabun'}; font-size:${l.size * 1.33}px; font-weight:${l.bold ? 'bold' : 'normal'}; font-style:${l.italic ? 'italic' : 'normal'};`;
                
                if (l.type === 'text') {
                    if (l.align === 'center') style += `left:0; width:100%; text-align:center;`;
                    else if (l.align === 'right') style += `left:0; width:100%; text-align:right; padding-right:${l.x*px}px;`;
                    else style += `left:${l.x*px}px; text-align:left;`;
                    return `<div class="canvas-element" style="${style}">${replaceVars(l.text)}</div>`;
                } else if (l.type === 'rect') {
                    let rStyle = `top:${l.y * px}px; width:${l.w * px}px; height:${l.h * px}px; border:1px solid #000; background:transparent; border-radius:${(l.radius || 0) * px}px;`;
                    if (l.align === 'center') rStyle += `left:50%; transform:translateX(-50%);`;
                    else if (l.align === 'right') rStyle += `right:${l.x*px}px;`;
                    else rStyle += `left:${l.x*px}px;`;
                    return `<div class="canvas-element" style="${rStyle}"></div>`;
                } else if (l.type === 'image') {
                    let iStyle = `top:${l.y * px}px; width:${l.w * px}px; height:${l.h * px}px; object-fit:contain;`;
                    if (l.align === 'center') iStyle += `left:50%; transform:translateX(-50%);`;
                    else if (l.align === 'right') iStyle += `right:${l.x*px}px;`;
                    else iStyle += `left:${l.x*px}px;`;
                    return `<img src="${l.url}" class="canvas-element" style="${iStyle}">`;
                }
            }).join('');
        }

        function applyZoom() { document.getElementById('canvas_wrapper').style.transform = `scale(${document.getElementById('zoom_level').value/100})`; }
        
        function printTest() {
            const dynamicLines = currentConfig.lines;
            const pw_val = document.getElementById('paper_w').value;
            const ph_val = document.getElementById('paper_h').value;
            const win = window.open('', '_blank', 'width=800,height=600');
            
            win.document.write(`
                <html><head><style>
                    @import url('https://fonts.googleapis.com/css2?family=Kanit&family=Prompt&family=Sarabun&display=swap');
                    body { margin: 0; padding: 0; background: white; }
                    .page { position: relative; width: ${pw_val}mm; min-height: ${ph_val}mm; }
                    .elem { position: absolute; color: black; line-height: 1.4; white-space: pre-wrap; }
                    @media print { @page { size: ${pw_val}mm auto; margin: 0; } }
                </style></head>
                <body><div class="page">
                    ${dynamicLines.map(l => {
                        let style = `top:${l.y}mm; font-family:${l.font || 'Sarabun'}; font-size:${l.size}pt; font-weight:${l.bold ? 'bold' : 'normal'};`;
                        
                        if (l.type === 'text') {
                            if (l.align === 'center') style += `left:0; width:100%; text-align:center;`;
                            else if (l.align === 'right') style += `left:0; width:100%; text-align:right; padding-right:${l.x}mm;`;
                            else style += `left:${l.x}mm;`;
                            return `<div class="elem" style="${style}">${replaceVars(l.text)}</div>`;
                        } else if (l.type === 'rect') {
                            let rStyle = `top:${l.y}mm; width:${l.w}mm; height:${l.h}mm; border:1px solid black; background:transparent; border-radius:${l.radius || 0}mm;`;
                            if (l.align === 'center') rStyle += `left:50%; transform:translateX(-50%);`;
                            else if (l.align === 'right') rStyle += `right:${l.x}mm;`;
                            else rStyle += `left:${l.x}mm;`;
                            return `<div class="elem" style="${rStyle}"></div>`;
                        } else if (l.type === 'image') {
                            let iStyle = `top:${l.y}mm; width:${l.w}mm; height:${l.h}mm;`;
                            if (l.align === 'center') iStyle += `left:50%; transform:translateX(-50%);`;
                            else if (l.align === 'right') iStyle += `right:${l.x}mm;`;
                            else iStyle += `left:${l.x}mm;`;
                            return `<img src="${l.url}" class="elem" style="${iStyle}">`;
                        }
                    }).join('')}
                </div>
                <script>window.onload=function(){ setTimeout(()=> {window.print(); window.close();}, 500); };<\/script>
                </body></html>
            `);
            win.document.close();
        }

        window.onload = async () => {
            await fetchAvailableTemplates();
            const sideContainer = document.getElementById('var_sidebar_container');
            sideContainer.innerHTML = Object.entries(varGroups).map(([group, vars]) => `
                <div class="var-category-title">${group}</div>
                <div class="flex flex-wrap">${vars.map(v => `<span class="var-badge" onclick="navigator.clipboard.writeText('{{${v}}}'); alert('Copy {{${v}}}')">{{${v}}}</span>`).join('')}</div>
            `).join('');
        };
    </script>
</body>
</html>
