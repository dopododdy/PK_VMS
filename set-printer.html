<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <title>ตั้งค่าเครื่องพิมพ์และกระดาษ | PK-VMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Sarabun:wght@300;400;500;600;700&family=Prompt:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>

    <style>
        :root {
            --navy: #0b1929; --navy-mid: #112240; --teal: #0ea5a0; --teal-light: #14c4bc;
            --surface: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.1);
            --text: #e2e8f0; --text-dim: #94a3b8;
        }
        body { font-family: "Sarabun", sans-serif; background: var(--navy); color: var(--text); min-height: 100vh; overflow-x: hidden; }
        
        /* Layout Structure */
        .app-container { display: flex; flex-direction: column; height: 100vh; }
        .editor-workspace { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 380px; background: var(--navy-mid); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
        .preview-area { flex: 1; background: #07101a; position: relative; display: flex; justify-content: center; align-items: center; overflow: auto; padding: 2rem; }
        
        /* Custom Inputs */
        .input-group { margin-bottom: 1rem; }
        .input-group label { display: block; font-size: 0.85rem; color: var(--text-dim); margin-bottom: 0.4rem; font-weight: 600; }
        .input-control { width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: #fff; padding: 0.6rem 0.8rem; border-radius: 8px; outline: none; transition: border-color 0.2s; font-family: inherit; font-size: 0.9rem; }
        .input-control:focus { border-color: var(--teal); }
        select.input-control option { background: var(--navy-mid); }

        /* Canvas (Sticker) Preview */
        .canvas-wrapper {
            background: #ffffff;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.1);
            position: relative;
            transform-origin: center center;
            transition: transform 0.2s ease;
            overflow: hidden;
        }
        .canvas-line {
            position: absolute;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.2;
            color: #000;
            cursor: pointer;
            user-select: none;
            border: 1px dashed transparent;
        }
        .canvas-line:hover { border-color: rgba(14, 165, 160, 0.5); background: rgba(14, 165, 160, 0.05); }
        .canvas-line.active { border-color: var(--teal); background: rgba(14, 165, 160, 0.1); z-index: 10; }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>
    <script>
        if (sessionStorage.getItem("isLoggedIn") !== "true") {
            window.location.href = "index.html";
        }
    </script>

    <div class="app-container">
        <header class="p-5 border-b border-white/5 bg-navy/80 backdrop-blur-md shrink-0 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="settings.html" class="text-gray-400 hover:text-white transition text-sm">← กลับหน้าตั้งค่า</a>
                <h1 class="text-xl font-bold border-l pl-4 border-white/20">🖨️ ตั้งค่าเครื่องพิมพ์และกระดาษ</h1>
            </div>
            <div class="flex gap-3">
                <button class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-xl text-sm transition font-bold" onclick="printTest()">🖨️ ทดสอบพิมพ์</button>
                <button class="bg-teal-600 hover:bg-teal-500 text-white px-4 py-2 rounded-xl text-sm transition font-bold shadow-lg shadow-teal-500/20" onclick="saveTemplate()">💾 บันทึกรูปแบบ</button>
            </div>
        </header>

        <div class="editor-workspace">
            <div class="sidebar">
                <div class="p-5 border-b border-white/10 bg-black/20">
                    <div class="input-group mb-0">
                        <label>รูปแบบเอกสาร (TEMPLATE) <span class="text-xs text-teal-400 ml-2 font-normal">ดึงจาก Master Data</span></label>
                        <select id="template_type" class="input-control font-bold text-teal-400" onchange="loadTemplate()">
                            <option value="" disabled selected>กำลังโหลดข้อมูล...</option>
                        </select>
                    </div>
                </div>

                <div class="p-5 overflow-y-auto flex-1">
                    <h3 class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-4">การตั้งค่าหน้ากระดาษ (มม.)</h3>
                    <div class="grid grid-cols-2 gap-3 mb-6">
                        <div class="input-group mb-0">
                            <label>ความกว้าง (Width)</label>
                            <input type="number" id="paper_w" class="input-control" value="80" onchange="updatePaperSize()">
                        </div>
                        <div class="input-group mb-0">
                            <label>ความสูง (Height)</label>
                            <input type="number" id="paper_h" class="input-control" value="50" onchange="updatePaperSize()">
                        </div>
                    </div>

                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-xs font-bold text-gray-500 uppercase tracking-wider">ส่วนประกอบข้อความ (Lines)</h3>
                        <span class="text-xs text-teal-400 cursor-pointer hover:underline" onclick="addLine()">+ เพิ่มบรรทัด</span>
                    </div>
                    
                    <div id="lines_container" class="space-y-3">
                        </div>
                </div>
            </div>

            <div class="preview-area">
                <div class="absolute top-4 right-4 bg-navy-mid border border-white/10 p-2 rounded-lg flex items-center gap-2 shadow-2xl z-20">
                    <span class="text-xs text-gray-400 font-bold px-2">ZOOM</span>
                    <input type="range" id="zoom_level" min="50" max="250" value="100" class="w-32 accent-teal-500" oninput="applyZoom()">
                    <span id="zoom_val" class="text-xs font-mono text-teal-400 w-8 text-right">100%</span>
                </div>

                <div id="canvas_wrapper" class="canvas-wrapper">
                    </div>
            </div>
        </div>
    </div>

    <script>
        let currentConfig = { width: 80, height: 50, lines: [] };
        let activeLineIndex = -1;

        // 1. โหลดรายชื่อ Template จากตาราง print_templates
        async function loadTemplateDropdown() {
            try {
                const { data: templates, error } = await db.from('print_templates').select('template_type').order('template_type');
                if (error) throw error;

                const selectEl = document.getElementById('template_type');
                if (templates && templates.length > 0) {
                    selectEl.innerHTML = '<option value="" disabled>-- เลือกรูปแบบเอกสาร --</option>' + 
                        templates.map(t => `<option value="${t.template_type}">${t.template_type}</option>`).join('');
                    
                    // เลือกตัวแรกเป็นค่าเริ่มต้น
                    selectEl.value = templates[0].template_type;
                    await loadTemplate();
                } else {
                    selectEl.innerHTML = '<option value="" disabled>ไม่พบข้อมูลใน Master Data</option>';
                }
            } catch (err) {
                console.error("Error loading templates:", err);
            }
        }

        // 2. โหลด Config ของ Template ที่เลือก
        async function loadTemplate() {
            const type = document.getElementById('template_type').value;
            if (!type) return;

            try {
                const { data, error } = await db.from('print_templates').select('config').eq('template_type', type).single();
                if (error) throw error;
                
                if (data && data.config) {
                    currentConfig = typeof data.config === 'string' ? JSON.parse(data.config) : data.config;
                    document.getElementById('paper_w').value = currentConfig.width || 80;
                    document.getElementById('paper_h').value = currentConfig.height || 50;
                    
                    // แปลง format เก่าให้รองรับ align หากไม่มี
                    currentConfig.lines = (currentConfig.lines || []).map(line => ({
                        ...line,
                        align: line.align || 'left'
                    }));

                    activeLineIndex = -1;
                    renderLinesList();
                    renderCanvas();
                    applyZoom();
                }
            } catch (err) {
                console.error("Error loading config:", err);
            }
        }

        // 3. บันทึกกลับลงฐานข้อมูล
        async function saveTemplate() {
            const type = document.getElementById('template_type').value;
            if (!type) return alert('กรุณาเลือกรูปแบบเอกสารก่อนบันทึก');

            try {
                // อัปเดตข้อมูลขนาดกระดาษล่าสุดก่อนเซฟ
                currentConfig.width = parseFloat(document.getElementById('paper_w').value);
                currentConfig.height = parseFloat(document.getElementById('paper_h').value);

                const { error } = await db.from('print_templates').update({ config: currentConfig }).eq('template_type', type);
                if (error) throw error;
                alert('✅ บันทึกรูปแบบเอกสารเรียบร้อยแล้ว');
            } catch (err) {
                alert('❌ Error: ' + err.message);
            }
        }

        // --- ระบบ Editor พื้นฐาน ---
        function updatePaperSize() {
            currentConfig.width = parseFloat(document.getElementById('paper_w').value) || 80;
            currentConfig.height = parseFloat(document.getElementById('paper_h').value) || 50;
            renderCanvas();
        }

        function applyZoom() {
            const zoom = document.getElementById('zoom_level').value;
            document.getElementById('zoom_val').innerText = zoom + '%';
            document.getElementById('canvas_wrapper').style.transform = `scale(${zoom / 100})`;
        }

        function renderLinesList() {
            const container = document.getElementById('lines_container');
            container.innerHTML = '';
            
            currentConfig.lines.forEach((line, i) => {
                const isActive = (i === activeLineIndex);
                const el = document.createElement('div');
                el.className = `p-3 rounded-lg border transition-all ${isActive ? 'bg-teal-900/20 border-teal-500' : 'bg-black/20 border-white/10'}`;
                
                el.innerHTML = `
                    <div class="flex justify-between items-center mb-2 cursor-pointer" onclick="setActiveLine(${i})">
                        <span class="font-bold text-sm ${isActive ? 'text-teal-400' : 'text-gray-300'} text-truncate" style="max-width:200px; white-space:nowrap; overflow:hidden;">
                            ${i+1}. ${line.text || '(ว่าง)'}
                        </span>
                        <button class="text-red-400 hover:text-red-300 text-xs px-2" onclick="event.stopPropagation(); removeLine(${i})">ลบ</button>
                    </div>
                    ${isActive ? `
                        <div class="grid grid-cols-2 gap-2 mt-3">
                            <div><label class="text-[10px] text-gray-400">แกน X (มม.)</label><input type="number" class="input-control text-sm py-1" value="${line.x}" onchange="updateLine(${i}, 'x', this.value)"></div>
                            <div><label class="text-[10px] text-gray-400">แกน Y (มม.)</label><input type="number" class="input-control text-sm py-1" value="${line.y}" onchange="updateLine(${i}, 'y', this.value)"></div>
                            <div class="col-span-2"><label class="text-[10px] text-gray-400">ข้อความ / ตัวแปร {{var}}</label><input type="text" class="input-control text-sm py-1 font-mono" value="${line.text.replace(/"/g, '&quot;')}" oninput="updateLine(${i}, 'text', this.value)"></div>
                            <div><label class="text-[10px] text-gray-400">ขนาด Font (pt)</label><input type="number" class="input-control text-sm py-1" value="${line.size}" onchange="updateLine(${i}, 'size', this.value)"></div>
                            <div><label class="text-[10px] text-gray-400">ฟอนต์</label>
                                <select class="input-control text-sm py-1" onchange="updateLine(${i}, 'font', this.value)">
                                    <option value="Sarabun" ${line.font==='Sarabun'?'selected':''}>Sarabun</option>
                                    <option value="Prompt" ${line.font==='Prompt'?'selected':''}>Prompt</option>
                                </select>
                            </div>
                            <div><label class="text-[10px] text-gray-400">จัดแนว</label>
                                <select class="input-control text-sm py-1" onchange="updateLine(${i}, 'align', this.value)">
                                    <option value="left" ${line.align==='left'?'selected':''}>ซ้าย (Left)</option>
                                    <option value="center" ${line.align==='center'?'selected':''}>กลาง (Center)</option>
                                    <option value="right" ${line.align==='right'?'selected':''}>ขวา (Right)</option>
                                </select>
                            </div>
                            <div class="flex items-end pb-1">
                                <label class="flex items-center gap-2 cursor-pointer text-sm">
                                    <input type="checkbox" ${line.bold ? 'checked' : ''} onchange="updateLine(${i}, 'bold', this.checked)" class="accent-teal-500">
                                    ตัวหนา (Bold)
                                </label>
                            </div>
                        </div>
                    ` : ''}
                `;
                container.appendChild(el);
            });
        }

        function setActiveLine(index) {
            activeLineIndex = index;
            renderLinesList();
            renderCanvas();
        }

        function addLine() {
            currentConfig.lines.push({
                x: 10, y: 10, font: "Sarabun", size: 14, text: "ข้อความใหม่", align: "left", bold: false
            });
            activeLineIndex = currentConfig.lines.length - 1;
            renderLinesList();
            renderCanvas();
        }

        function removeLine(index) {
            currentConfig.lines.splice(index, 1);
            activeLineIndex = -1;
            renderLinesList();
            renderCanvas();
        }

        function updateLine(index, key, value) {
            if (key === 'x' || key === 'y' || key === 'size') value = parseFloat(value) || 0;
            currentConfig.lines[index][key] = value;
            if(key === 'text') {
                // อัปเดตเฉพาะ Canvas ทันทีเมื่อพิมพ์ข้อความ เพื่อไม่ให้ input เสียโฟกัส
                renderCanvas();
            } else {
                renderLinesList();
                renderCanvas();
            }
        }

        function renderCanvas() {
            const wrapper = document.getElementById('canvas_wrapper');
            // แปลงมิลลิเมตร (mm) เป็นพิกเซลหน้าจอ (ใช้ประมาณ 1mm = 3.78px เพื่อการแสดงผล)
            const mmToPx = 3.78; 
            wrapper.style.width = (currentConfig.width * mmToPx) + 'px';
            wrapper.style.height = (currentConfig.height * mmToPx) + 'px';
            wrapper.innerHTML = '';

            currentConfig.lines.forEach((line, i) => {
                const el = document.createElement('div');
                el.className = `canvas-line ${i === activeLineIndex ? 'active' : ''}`;
                el.innerText = line.text;
                
                // แปลงหน่วย x, y เป็นเปอร์เซ็นต์ หรือจุดตายตัว (ในตัวอย่างใช้การคำนวณ mm -> px)
                if (line.align === 'center') {
                    el.style.left = '50%';
                    el.style.transform = 'translateX(-50%)';
                    el.style.textAlign = 'center';
                    el.style.width = '100%';
                } else if (line.align === 'right') {
                    el.style.right = (line.x * mmToPx) + 'px';
                    el.style.textAlign = 'right';
                } else {
                    el.style.left = (line.x * mmToPx) + 'px';
                    el.style.textAlign = 'left';
                }
                
                el.style.top = (line.y * mmToPx) + 'px';
                el.style.fontFamily = `'${line.font}', sans-serif`;
                // แปลง pt เป็น px (1pt = 1.33px)
                el.style.fontSize = (line.size * 1.33) + 'px';
                el.style.fontWeight = line.bold ? '700' : '400';
                
                el.onclick = () => setActiveLine(i);
                wrapper.appendChild(el);
            });
        }

        // 4. ฟังก์ชันทดสอบพิมพ์ (Print Test)
        function printTest() {
            const contents = document.getElementById('canvas_wrapper').innerHTML;
            const pw = window.open('', '_blank', 'width=800,height=600');
            pw.document.write(`
                <html>
                <head>
                    <title>Print Test</title>
                    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700&family=Sarabun:wght@400;600;700&family=Prompt:wght@400;600&display=swap" rel="stylesheet">
                    <style>
                        body { margin: 0; padding: 0; font-family: 'Sarabun', sans-serif; }
                        /* ให้ขนาดตรงตามมิลลิเมตรที่ระบุไว้เวลาสั่งปริ้นจริง */
                        .sticker { position: relative; width: ${currentConfig.width}mm; height: ${currentConfig.height}mm; background: #fff; overflow: hidden; margin: 0; }
                        .canvas-line { position: absolute; white-space: pre-wrap; word-break: break-word; line-height: 1.2; color: #000; }
                        @page { size: ${currentConfig.width}mm ${currentConfig.height}mm; margin: 0; }
                        .active { border: none !important; background: transparent !important; }
                    </style>
                </head>
                <body>
                    <div class="sticker">${contents}</div>
                    <script>
                        window.onload = function() {
                            setTimeout(function() { window.print(); window.close(); }, 500);
                        };
                    <\/script>
                </body>
                </html>
            `);
            pw.document.close();
        }

        // Initialize On Load
        window.onload = async () => {
            // ปรับ Zoom ตามหน้าจอ
            if (window.innerWidth < 1024) document.getElementById('zoom_level').value = 80;
            else if (window.innerWidth >= 1600) document.getElementById('zoom_level').value = 150;
            
            // โหลด Dropdown
            await loadTemplateDropdown();
        };
    </script>
</body>
</html>
