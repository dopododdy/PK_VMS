<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <title>เวชระเบียนสัตว์ป่วย | PK-VMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>

    <style>
        :root { --navy: #0b1929; --navy-mid: #112240; --teal: #14b8b1; --white-bright: #ffffff; --text-gray: #cbd5e1; }
        body { font-family: "Sarabun", sans-serif; background: var(--navy); color: var(--white-bright); font-size: 18px; }
        
        /* แก้ไข Input และ Select ให้เห็นตัวหนังสือชัดเจน */
        .form-input { 
            background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2); 
            border-radius: 12px; padding: 10px 15px; width: 100%; color: white; outline: none; 
            font-size: 1rem; transition: all 0.3s ease;
        }
        .form-input:focus { border-color: var(--teal); background: rgba(255,255,255,0.15); }
        
        /* แก้ปัญหาสีตัวหนังสือใน Select dropdown */
        select.form-input { color: white; cursor: pointer; }
        select.form-input option { background: #112240; color: white; padding: 10px; }

        .form-label { display: block; font-weight: 700; color: var(--text-gray); margin-bottom: 6px; font-size: 0.9rem; }
        .glass-table { background: rgba(255,255,255,0.03); border-radius: 24px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        
        /* สไตล์ช่องเบอร์โทรศัพท์ (เน้นให้อ่านง่าย) */
        .phone-entry { background: rgba(255,255,255,0.05); border: 1px dashed rgba(20, 184, 177, 0.4); padding: 8px; }
        
        .pet-entry { background: rgba(255,255,255,0.03); border: 2px solid rgba(20, 184, 177, 0.3); }
        .highlight-found { border-color: var(--teal) !important; background: rgba(20, 184, 177, 0.15) !important; }
        tr.selectable { cursor: pointer; transition: all 0.2s; }
        tr.selectable:hover { background: rgba(20, 184, 177, 0.1) !important; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl md:text-4xl font-bold text-white flex items-center gap-3">
                    <span class="text-teal-400">🐾</span> เวชระเบียนสัตว์ป่วย
                </h1>
                <p class="text-teal-500 font-bold text-base mt-1">PK-VMS : จัดการประวัติและข้อมูลเจ้าของ</p>
            </div>
            <div class="flex items-center gap-3 w-full md:w-auto">
                <a href="index.html" class="flex-1 md:flex-none text-center bg-slate-700 hover:bg-slate-600 text-white px-6 py-3 rounded-xl transition font-bold border border-white/10">🏠 หน้าหลัก</a>
                <button onclick="clearFormAndToggle()" class="flex-1 md:flex-none bg-teal-600 hover:bg-teal-500 text-white px-6 py-3 rounded-xl transition font-black shadow-lg">+ เพิ่มเคสใหม่</button>
            </div>
        </header>

        <section id="record-form" class="hidden mb-10 bg-navy-mid p-6 md:p-8 rounded-[24px] border-2 border-teal-500/40 shadow-2xl">
            <form id="main-form" onsubmit="saveData(event)">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 bg-white/5 p-6 rounded-2xl border border-white/10 mb-6">
                    <div class="md:col-span-4 flex justify-between items-center border-b border-white/10 pb-3 mb-2">
                        <h3 class="text-lg font-bold text-teal-400">👤 ข้อมูลเจ้าของ <span id="mode-text" class="text-xs font-normal text-gray-400 ml-2"></span></h3>
                        <div class="flex items-center gap-2">
                            <span class="text-gray-400 text-sm">HN:</span>
                            <input type="text" id="hn" class="bg-transparent text-xl font-black text-teal-400 outline-none w-24 text-right" readonly placeholder="AUTO">
                        </div>
                    </div>
                    
                    <div class="md:col-span-1">
                        <label class="form-label">ชื่อเจ้าของ</label>
                        <input type="text" id="owner_name" class="form-input" placeholder="ระบุชื่อ-นามสกุล" required>
                    </div>
                    <div class="md:col-span-3">
                        <label class="form-label">ที่อยู่ / บ้านเลขที่</label>
                        <input type="text" id="address" class="form-input" placeholder="เลขที่บ้าน, ถนน, จังหวัด">
                    </div>
                    
                    <div class="md:col-span-4">
                        <label class="form-label mb-2 text-teal-300">เบอร์โทรศัพท์ (ใส่เบอร์เพื่อเช็คประวัติ)</label>
                        <div id="phone-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                            </div>
                        <button type="button" onclick="addPhoneField()" class="mt-3 text-teal-400 text-sm font-bold hover:text-teal-200 transition">+ เพิ่มเบอร์โทรเพิ่ม</button>
                    </div>
                </div>

                <div id="pet-container" class="space-y-4">
                    <h3 class="text-lg font-bold text-white mb-2 flex items-center gap-2">
                        <span class="bg-teal-500 w-2 h-6 rounded-full"></span> ข้อมูลสัตว์เลี้ยง
                    </h3>
                </div>

                <button type="button" onclick="addPetField()" class="mt-4 w-full py-4 border-2 border-dashed border-teal-500/30 rounded-xl text-teal-400 font-bold hover:bg-teal-500/10 transition">
                    + เพิ่มสัตว์เลี้ยงตัวใหม่
                </button>

                <div class="flex justify-end gap-4 mt-8 pt-6 border-t border-white/10">
                    <button type="button" onclick="toggleForm()" class="px-6 py-2 text-gray-400 hover:text-white font-bold">ยกเลิก</button>
                    <button type="submit" class="bg-teal-600 hover:bg-teal-500 text-white px-10 py-3 rounded-xl font-black text-lg shadow-lg">💾 บันทึกข้อมูล</button>
                </div>
            </form>
        </section>

        <div class="mb-6 relative max-w-xl">
            <input type="text" id="search" oninput="fetchRecords()" class="form-input pl-12 py-4 text-lg shadow-xl" placeholder="ค้นชื่อสัตว์, เจ้าของ, เบอร์โทร...">
            <span class="absolute left-4 top-4 text-xl opacity-50">🔍</span>
        </div>

        <div class="glass-table overflow-x-auto shadow-xl">
            <table class="w-full text-left">
                <thead class="bg-white/10 text-white">
                    <tr>
                        <th class="p-4 text-sm font-bold">HN</th>
                        <th class="p-4 text-sm font-bold">สัตว์เลี้ยง</th>
                        <th class="p-4 text-sm font-bold">เจ้าของ / เบอร์โทร</th>
                        <th class="p-4 text-center text-sm font-bold">จัดการ</th>
                    </tr>
                </thead>
                <tbody id="animal-list" class="divide-y divide-white/5"></tbody>
            </table>
        </div>
    </div>

    <script>
        let petCount = 0;
        let phoneCount = 0;
        const breedData = {
            "สุนัข": ["ไทย", "โกลเด้น รีทรีฟเวอร์", "ไซบีเรียน ฮัสกี้", "ปอมเมอเรเนียน", "พุดเดิ้ล", "ชิสุ", "บีเกิล", "อื่นๆ"],
            "แมว": ["ไทย", "เปอร์เซีย", "สก็อตติช โฟลด์", "บริติช ชอร์ตแฮร์", "วิเชียรมาศ", "เบงกอล", "อเมริกัน ชอร์ตแฮร์", "เมนคูน", "อื่นๆ"]
        };

        // --- แก้ไขจุดแสดงเบอร์โทรให้เห็นครบ ---
        function addPhoneField(value = '', label = 'เบอร์หลัก') {
            phoneCount++;
            const html = `
                <div class="phone-entry flex items-center gap-2 rounded-xl" id="phone-row-${phoneCount}">
                    <input type="text" name="owner_phone" value="${value}" class="form-input text-base flex-[3]" placeholder="08xxxxxxxx" required>
                    <input type="text" name="phone_label" value="${label}" class="form-input text-base flex-[2]" placeholder="ระบุเจ้าของเบอร์">
                    ${phoneCount > 1 ? `<button type="button" onclick="this.parentElement.remove()" class="text-red-400 px-2 font-bold">✕</button>` : ''}
                </div>`;
            document.getElementById('phone-container').insertAdjacentHTML('beforeend', html);
        }

        // --- เพิ่มข้อมูลสัตว์เลี้ยง (แก้ปัญหาสีตัวหนังสือใน Select) ---
        function addPetField() {
            petCount++;
            const petHtml = `
                <div id="pet-row-${petCount}" class="pet-entry p-5 rounded-xl grid grid-cols-1 md:grid-cols-4 gap-3 relative mb-3">
                    <button type="button" onclick="this.parentElement.remove()" class="absolute top-2 right-4 text-red-400 text-xs hover:underline">ลบรายการ</button>
                    <div><label class="form-label">ชื่อสัตว์</label><input type="text" name="pet_name" class="form-input" required></div>
                    <div><label class="form-label">ชนิด</label>
                        <select name="pet_type" class="form-input" onchange="updateBreed(this)">
                            <option value="แมว">🐱 แมว</option>
                            <option value="สุนัข">🐶 สุนัข</option>
                            <option value="อื่นๆ">อื่นๆ</option>
                        </select>
                    </div>
                    <div><label class="form-label">เพศ</label>
                        <select name="gender" class="form-input">
                            <option value="ผู้">♂️ ผู้</option><option value="เมีย">♀️ เมีย</option>
                            <option value="ผู้ตอน">♂️ ผู้ตอน</option><option value="เมียหมัน">♀️ เมียหมัน</option>
                        </select>
                    </div>
                    <div><label class="form-label">พันธุ์</label><select name="breed" class="form-input"></select></div>
                </div>`;
            document.getElementById('pet-container').insertAdjacentHTML('beforeend', petHtml);
            updateBreed(document.querySelector(`#pet-row-${petCount} select[name="pet_type"]`));
        }

        function updateBreed(selectEl) {
            const type = selectEl.value.includes('แมว') ? 'แมว' : selectEl.value.includes('สุนัข') ? 'สุนัข' : 'อื่นๆ';
            const breedSelect = selectEl.parentElement.parentElement.querySelector('select[name="breed"]');
            breedSelect.innerHTML = (breedData[type] || ["อื่นๆ"]).map(b => `<option value="${b}">${b}</option>`).join('');
        }

        // --- Logic ฟังก์ชันอื่นๆ ---
        async function selectOwner(hn, name, address, phonesJson) {
            const phones = JSON.parse(decodeURIComponent(phonesJson));
            document.getElementById('hn').value = hn;
            document.getElementById('owner_name').value = name;
            document.getElementById('address').value = address;
            document.getElementById('owner_name').classList.add('highlight-found');
            document.getElementById('mode-text').innerText = "(เลือกข้อมูลเจ้าของเดิม)";

            document.getElementById('phone-container').innerHTML = '';
            phoneCount = 0;
            if (phones.length > 0) phones.forEach(p => addPhoneField(p.phone_number, p.label));
            else addPhoneField();

            document.getElementById('pet-container').innerHTML = '<h3 class="text-lg font-bold text-teal-400 mb-3 italic">📝 เพิ่มข้อมูลสัตว์ตัวใหม่:</h3>';
            petCount = 0;
            addPetField();

            document.getElementById('record-form').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function saveData(e) {
            e.preventDefault();
            const hn = document.getElementById('hn').value;
            await db.from('owners').upsert({ hn: hn, owner_name: document.getElementById('owner_name').value, address: document.getElementById('address').value });
            await db.from('owner_phones').delete().eq('owner_hn', hn);
            const phones = Array.from(document.querySelectorAll('.phone-entry')).map(row => ({
                owner_hn: hn, phone_number: row.querySelector('[name="owner_phone"]').value.trim(), label: row.querySelector('[name="phone_label"]').value
            }));
            await db.from('owner_phones').insert(phones);

            const pets = Array.from(document.querySelectorAll('.pet-entry')).map(row => ({
                owner_hn: hn, pet_name: row.querySelector('[name="pet_name"]').value,
                pet_type: row.querySelector('[name="pet_type"]').value.includes('แมว') ? 'แมว' : 'สุนัข',
                gender: row.querySelector('[name="gender"]').value.replace(/[^ก-ฮ]/g, ''), breed: row.querySelector('[name="breed"]').value
            }));
            
            if(pets.length > 0) {
                const { error } = await db.from('animals').insert(pets);
                if (error) alert(error.message);
                else { alert('บันทึกสำเร็จ!'); location.reload(); }
            }
        }

        async function fetchRecords() {
            const search = document.getElementById('search').value.trim();
            let query = db.from('animals').select('*, owners(*, owner_phones(*))');
            if (search) query = query.or(`pet_name.ilike.%${search}%,owner_hn.ilike.%${search}%,owners.owner_name.ilike.%${search}%`);
            const { data } = await query.order('created_at', { ascending: false }).limit(20);
            
            document.getElementById('animal-list').innerHTML = (data || []).map(item => {
                const phones = item.owners?.owner_phones || [];
                const phonesJson = encodeURIComponent(JSON.stringify(phones));
                return `
                <tr class="selectable hover:bg-white/5 transition" onclick="selectOwner('${item.owner_hn}', '${item.owners?.owner_name}', '${item.owners?.address || ''}', '${phonesJson}')">
                    <td class="p-4 font-mono text-teal-400 font-bold">${item.owner_hn}</td>
                    <td class="p-4">
                        <div class="font-bold text-white">${item.pet_name}</div>
                        <div class="text-xs text-gray-400">${item.breed}</div>
                    </td>
                    <td class="p-4">
                        <div class="text-sm font-bold text-white">${item.owners?.owner_name || '-'}</div>
                        <div class="text-xs text-teal-500">${phones.map(p => p.phone_number).join(', ')}</div>
                    </td>
                    <td class="p-4 text-center">
                        <span class="text-xs text-teal-400 border border-teal-400/30 px-2 py-1 rounded-lg">เลือก</span>
                    </td>
                </tr>`;
            }).join('');
        }

        function clearFormAndToggle() {
            document.getElementById('main-form').reset();
            document.getElementById('hn').value = '';
            document.getElementById('phone-container').innerHTML = '';
            document.getElementById('pet-container').innerHTML = '<h3 class="text-lg font-bold text-white mb-2">🐾 รายละเอียดสัตว์</h3>';
            phoneCount = 0; petCount = 0;
            toggleForm();
            checkHN();
        }

        async function checkHN() {
            if(!document.getElementById('hn').value) {
                const { data } = await db.from('owners').select('hn').order('hn', { ascending: false }).limit(1).maybeSingle();
                document.getElementById('hn').value = data ? parseInt(data.hn) + 1 : 690001;
            }
        }

        function toggleForm() { document.getElementById('record-form').classList.toggle('hidden'); if(phoneCount === 0) addPhoneField(); if(petCount === 0) addPetField(); }
        window.onload = fetchRecords;
    </script>
</body>
</html>
