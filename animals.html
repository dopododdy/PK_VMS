<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <title>เวชระเบียนสัตว์ | PK-VMS (PC Edition)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>

    <style>
        :root {
            --navy-dark: #050c14; --navy-item: #16243a; --teal: #14b8b1;
            --white: #ffffff; --text-gray: #cbd5e1;
        }
        body { font-family: "Sarabun", sans-serif; background: var(--navy-dark); color: var(--white); margin: 0; overflow: hidden; }
        
        /* สัญลักษณ์ Icon ขนาดใหญ่พิเศษ */
        .huge-icon { font-size: 5rem; line-height: 1; filter: drop-shadow(0 0 10px rgba(20, 184, 177, 0.3)); }
        .list-icon { font-size: 3.5rem; }

        /* การ์ดรายการด้านซ้าย (ปรับให้เน้น Contrast) */
        .animal-item {
            background: var(--navy-item); border: 3px solid rgba(255,255,255,0.1);
            border-radius: 30px; padding: 1.5rem; cursor: pointer;
            transition: all 0.2s ease; margin-bottom: 1.25rem;
            display: flex; align-items: center; gap: 1.5rem;
        }
        .animal-item:hover { border-color: var(--teal); background: #1e2f4d; transform: scale(1.02); }
        .animal-item.active { border-color: var(--teal); background: #1e2f4d; box-shadow: 0 0 30px rgba(20, 184, 177, 0.4); }

        /* ปรับขนาดตัวอักษรให้ใหญ่ขึ้นมาก */
        .text-hn { font-size: 1.25rem; background: var(--teal); color: var(--navy-dark); font-weight: 900; padding: 4px 12px; border-radius: 10px; }
        .text-owner { font-size: 1.5rem; font-weight: 700; color: var(--white); }
        .text-pet-name { font-size: 2.25rem; font-weight: 800; color: var(--white); line-height: 1.2; }
        .text-phone { font-size: 1.4rem; color: var(--teal); font-weight: 700; }

        .search-large {
            font-size: 1.75rem; padding: 1.5rem; border-radius: 25px;
            background: #000; border: 3px solid var(--teal); color: white; width: 100%; outline: none;
        }

        /* Scrollbar ขนาดใหญ่เพื่อให้เลื่อนง่าย */
        ::-webkit-scrollbar { width: 12px; }
        ::-webkit-scrollbar-thumb { background: var(--teal); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="flex h-screen">
        <aside class="w-[500px] border-r-4 border-white/10 flex flex-col bg-black/40">
            <div class="p-8 border-b-4 border-white/5">
                <div class="flex justify-between items-center mb-6">
                    <h1 class="text-4xl font-black text-white">เวชระเบียน</h1>
                    <a href="index.html" class="text-5xl">🏠</a>
                </div>
                <input type="text" id="search-box" class="search-large" placeholder="🔍 ค้นหาที่นี่..." oninput="filterAnimals()">
            </div>

            <div id="animal-list" class="flex-1 overflow-y-auto p-6">
                <div class="text-center py-20 text-3xl font-bold opacity-50">กำลังโหลด...</div>
            </div>

            <div class="p-6 bg-teal-900/20">
                <button onclick="alert('กำลังพัฒนาระบบลงทะเบียน')" class="w-full bg-teal-600 hover:bg-teal-500 text-white font-black py-6 rounded-3xl text-3xl shadow-2xl">
                    + เพิ่มสัตว์ใหม่
                </button>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-12 bg-gradient-to-br from-gray-900 to-black" id="detail-view">
            <div class="h-full flex items-center justify-center">
                <div class="text-center opacity-30">
                    <div class="text-[15rem]">🐾</div>
                    <p class="text-5xl font-black">เลือกรายชื่อสัตว์</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        let allAnimals = [];
        let allOwners = [];
        let allPhones = [];

        window.onload = async () => {
            if (sessionStorage.getItem("isLoggedIn") !== "true") {
                window.location.href = "index.html"; return;
            }
            await loadData();
        };

        async function loadData() {
            try {
                const [resA, resO, resP] = await Promise.all([
                    db.from('animals').select('*').order('created_at', { ascending: false }),
                    db.from('owners').select('*'),
                    db.from('owner_phones').select('*')
                ]);
                allAnimals = resA.data; allOwners = resO.data; allPhones = resP.data;
                renderList(allAnimals);
            } catch (e) { console.error(e); }
        }

        function renderList(list) {
            const container = document.getElementById('animal-list');
            container.innerHTML = list.map(pet => {
                const owner = allOwners.find(o => o.hn === pet.owner_hn) || { owner_name: '-' };
                const phone = allPhones.find(p => p.owner_hn === pet.owner_hn)?.phone_number || '-';
                const typeIcon = (pet.pet_type === 'แมว') ? '🐱' : (pet.pet_type === 'สุนัข' ? '🐶' : '🐾');
                const genderIcon = pet.gender?.includes('ผู้') ? '♂️' : '♀️';
                const genderColor = pet.gender?.includes('ผู้') ? 'text-blue-400' : 'text-pink-400';

                return `
                    <div class="animal-item" onclick="viewDetail('${pet.id}')" id="pet-${pet.id}">
                        <div class="list-icon">${typeIcon}</div>
                        <div class="flex-1">
                            <div class="flex justify-between items-start mb-2">
                                <span class="text-hn">HN: ${pet.owner_hn}</span>
                                <span class="${genderColor} text-4xl font-black">${genderIcon}</span>
                            </div>
                            <div class="text-pet-name">${pet.pet_name}</div>
                            <div class="text-owner">👤 ${owner.owner_name}</div>
                            <div class="text-phone">📞 ${phone}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function viewDetail(id) {
            document.querySelectorAll('.animal-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`pet-${id}`).classList.add('active');

            const pet = allAnimals.find(p => p.id === id);
            const owner = allOwners.find(o => o.hn === pet.owner_hn) || {};
            const phones = allPhones.filter(p => p.owner_hn === pet.owner_hn).map(p => p.phone_number).join(' , ');

            document.getElementById('detail-view').innerHTML = `
                <div class="max-w-6xl mx-auto">
                    <div class="flex items-center gap-12 mb-12 bg-white/5 p-12 rounded-[50px] border-4 border-teal-500/30">
                        <div class="text-[10rem] leading-none">${(pet.pet_type === 'แมว') ? '🐱' : '🐶'}</div>
                        <div class="flex-1">
                            <div class="flex items-center gap-6 mb-4">
                                <h2 class="text-9xl font-black text-white">${pet.pet_name}</h2>
                                <span class="text-7xl">${pet.gender?.includes('ผู้') ? '♂️' : '♀️'}</span>
                            </div>
                            <div class="inline-block bg-teal-500 text-black text-4xl font-black px-10 py-3 rounded-2xl">
                                HN: ${pet.owner_hn}
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-10">
                        <div class="bg-gray-800 p-10 rounded-[40px] border-4 border-white/10">
                            <h3 class="text-4xl font-black text-teal-400 mb-8 underline">ข้อมูลสัตว์</h3>
                            <div class="space-y-6 text-4xl font-bold">
                                <p><span class="opacity-50 text-2xl block">พันธุ์:</span> ${pet.breed || '-'}</p>
                                <p><span class="opacity-50 text-2xl block">เพศ:</span> ${pet.gender || '-'}</p>
                                <p><span class="opacity-50 text-2xl block">น้ำหนัก:</span> <span class="text-yellow-400">${pet.weight || '0'} กก.</span></p>
                                <p><span class="opacity-50 text-2xl block">วันเกิด:</span> ${pet.birth_date || '-'}</p>
                            </div>
                        </div>

                        <div class="bg-gray-800 p-10 rounded-[40px] border-4 border-white/10">
                            <h3 class="text-4xl font-black text-teal-400 mb-8 underline">ข้อมูลเจ้าของ</h3>
                            <div class="space-y-10 text-4xl font-bold">
                                <div>
                                    <span class="opacity-50 text-2xl block">ชื่อเจ้าของ:</span>
                                    <p class="text-5xl text-white">${owner.owner_name}</p>
                                </div>
                                <div>
                                    <span class="opacity-50 text-2xl block">เบอร์โทรศัพท์:</span>
                                    <p class="text-5xl text-teal-400">${phones}</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="mt-10 bg-yellow-900/40 p-10 rounded-[40px] border-4 border-yellow-500/50">
                        <h3 class="text-3xl font-black text-yellow-500 mb-4 uppercase">หมายเหตุทางการแพทย์</h3>
                        <p class="text-4xl font-bold text-white leading-relaxed">${owner.note || 'ไม่มีข้อมูลบันทึก'}</p>
                    </div>
                </div>
            `;
        }

        function filterAnimals() {
            const term = document.getElementById('search-box').value.toLowerCase();
            const filtered = allAnimals.filter(pet => {
                const owner = allOwners.find(o => o.hn === pet.owner_hn) || {};
                const phones = allPhones.filter(p => p.owner_hn === pet.owner_hn).map(p => p.phone_number).join(' ');
                return pet.pet_name.toLowerCase().includes(term) || pet.owner_hn.toLowerCase().includes(term) || (owner.owner_name && owner.owner_name.toLowerCase().includes(term)) || phones.includes(term);
            });
            renderList(filtered);
        }
    </script>
</body>
</html>
