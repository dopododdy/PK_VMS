<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <title>เวชระเบียนสัตว์ | PK-VMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>

    <style>
        :root {
            --navy: #0b1929; --navy-mid: #112240; --teal: #14b8b1;
            --surface: rgba(255,255,255,0.08); --border: rgba(255,255,255,0.15);
        }
        body { font-family: "Sarabun", sans-serif; background: var(--navy); color: #e2e8f0; margin: 0; overflow: hidden; }
        .mesh-bg { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% -20%, rgba(20, 184, 177, 0.18), transparent 75%); }
        
        /* SIDEBAR */
        .sidebar-container { background: rgba(17, 34, 64, 0.6); backdrop-filter: blur(25px); border-right: 2px solid var(--border); width: 750px; }
        
        .animal-item {
            background: var(--surface); border: 2px solid transparent;
            border-radius: 16px; padding: 0.8rem 1.2rem; cursor: pointer;
            transition: all 0.2s ease; margin-bottom: 0.6rem;
            display: flex; align-items: center; gap: 1rem;
        }
        .animal-item:hover { background: rgba(20, 184, 177, 0.15); border-color: var(--teal); }
        .animal-item.active { border-color: var(--teal); background: rgba(20, 184, 177, 0.25); }

        .list-icon { font-size: 2.8rem; min-width: 50px; text-align: center; }
        .list-hn { background: var(--teal); color: var(--navy); font-weight: 900; padding: 2px 10px; border-radius: 8px; font-size: 1rem; min-width: 85px; text-align: center; }
        .list-name { font-size: 1.5rem; font-weight: 800; color: white; width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .list-owner { font-size: 1.2rem; font-weight: 600; color: #cbd5e1; width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .list-tel { font-size: 1.2rem; font-weight: 800; color: #14b8b1; width: 130px; }
        .list-address { font-size: 1rem; font-weight: 400; color: #94a3b8; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* MODAL STYLE */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; z-index: 100; padding: 20px; }
        .modal-content { background: var(--navy-mid); border: 2px solid var(--teal); border-radius: 40px; width: 100%; max-width: 800px; padding: 40px; max-height: 90vh; overflow-y: auto; }
        .input-field { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; padding: 12px; color: white; width: 100%; font-size: 1.2rem; outline: none; }
        .input-field:focus { border-color: var(--teal); }
    </style>
</head>
<body>
    <div class="mesh-bg"></div>

    <div class="flex h-screen overflow-hidden">
        <aside class="sidebar-container flex flex-col">
            <div class="p-6 pb-4">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-3xl font-black text-white">เวชระเบียนสัตว์</h2>
                    <div class="flex gap-4">
                        <button onclick="loadData()" class="text-2xl hover:rotate-180 transition-all duration-500">🔄</button>
                        <a href="index.html" class="text-3xl">🏠</a>
                    </div>
                </div>
                <input type="text" id="search-box" class="w-full bg-black/40 border-2 border-teal-500/50 rounded-xl p-4 text-xl text-white outline-none" 
                    placeholder="🔍 ค้นหา: ชื่อสัตว์, เจ้าของ, เบอร์โทร, ที่อยู่..." oninput="filterAnimals()">
            </div>

            <div id="animal-list" class="flex-1 overflow-y-auto px-4 py-2">
                <div class="text-center py-20 text-xl font-bold opacity-40">กำลังโหลด...</div>
            </div>

            <div class="p-4 bg-navy/40 border-t border-white/10">
                <button onclick="openModal()" class="w-full bg-teal-600 hover:bg-teal-500 text-white font-black py-4 rounded-xl text-2xl shadow-lg transition-all">
                    + ลงทะเบียนสัตว์ใหม่
                </button>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-10" id="detail-view">
            <div class="h-full flex flex-col items-center justify-center opacity-30 text-center">
                <div class="text-[10rem] mb-4">🐾</div>
                <h3 class="text-3xl font-black">เลืออกรายชื่อเพื่อดูข้อมูล</h3>
            </div>
        </main>
    </div>

    <div id="regModal" class="modal">
        <div class="modal-content animate-in fade-in zoom-in duration-300">
            <div class="flex justify-between items-center mb-8 border-b border-white/10 pb-4">
                <h2 class="text-4xl font-black text-teal-400">📝 ลงทะเบียนใหม่</h2>
                <button onclick="closeModal()" class="text-3xl text-gray-500 hover:text-white">✕</button>
            </div>

            <form id="regForm" class="space-y-6">
                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block text-gray-400 text-lg mb-2">ชื่อเจ้าของ *</label>
                        <input type="text" id="m_owner_name" class="input-field" required>
                    </div>
                    <div>
                        <label class="block text-gray-400 text-lg mb-2">HN (รหัสเจ้าของ) *</label>
                        <input type="text" id="m_hn" class="input-field" placeholder="เช่น 67001" required>
                    </div>
                    <div>
                        <label class="block text-gray-400 text-lg mb-2">เบอร์โทรศัพท์ *</label>
                        <input type="tel" id="m_phone" class="input-field" required>
                    </div>
                    <div>
                        <label class="block text-gray-400 text-lg mb-2">ที่อยู่</label>
                        <input type="text" id="m_address" class="input-field">
                    </div>
                </div>

                <hr class="border-white/5">

                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block text-gray-400 text-lg mb-2">ชื่อสัตว์ *</label>
                        <input type="text" id="m_pet_name" class="input-field" required>
                    </div>
                    <div>
                        <label class="block text-gray-400 text-lg mb-2">ชนิดสัตว์</label>
                        <select id="m_pet_type" class="input-field">
                            <option value="สุนัข">สุนัข</option>
                            <option value="แมว">แมว</option>
                            <option value="อื่นๆ">อื่นๆ</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-gray-400 text-lg mb-2">สายพันธุ์</label>
                        <input type="text" id="m_breed" class="input-field">
                    </div>
                    <div>
                        <label class="block text-gray-400 text-lg mb-2">เพศ</label>
                        <select id="m_gender" class="input-field">
                            <option value="ตัวผู้">ตัวผู้</option>
                            <option value="ตัวเมีย">ตัวเมีย</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-gray-400 text-lg mb-2">น้ำหนัก (กก.)</label>
                        <input type="number" step="0.1" id="m_weight" class="input-field">
                    </div>
                    <div>
                        <label class="block text-gray-400 text-lg mb-2">หมายเหตุ</label>
                        <input type="text" id="m_note" class="input-field">
                    </div>
                </div>

                <div class="pt-6">
                    <button type="submit" class="w-full bg-teal-500 hover:bg-teal-400 text-navy font-black py-5 rounded-2xl text-2xl shadow-2xl transition-all">
                        💾 บันทึกข้อมูลทั้งหมด
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let allAnimals = []; let allOwners = []; let allPhones = [];

        window.onload = async () => {
            if (sessionStorage.getItem("isLoggedIn") !== "true") {
                window.location.href = "index.html"; return;
            }
            await loadData();
        };

        async function loadData() {
            const [resA, resO, resP] = await Promise.all([
                db.from('animals').select('*').order('created_at', { ascending: false }),
                db.from('owners').select('*'),
                db.from('owner_phones').select('*')
            ]);
            allAnimals = resA.data || []; allOwners = resO.data || []; allPhones = resP.data || [];
            renderList(allAnimals);
        }

        function renderList(list) {
            const container = document.getElementById('animal-list');
            container.innerHTML = list.map(pet => {
                const owner = allOwners.find(o => o.hn === pet.owner_hn) || { owner_name: '-', address: '-' };
                const phone = allPhones.find(p => p.owner_hn === pet.owner_hn)?.phone_number || '-';
                const typeIcon = (pet.pet_type === 'แมว') ? '🐱' : (pet.pet_type === 'สุนัข' ? '🐶' : '🐾');
                return `
                    <div class="animal-item" onclick="viewDetail('${pet.id}')" id="pet-${pet.id}">
                        <div class="list-icon">${typeIcon}</div>
                        <span class="list-hn">HN ${pet.owner_hn}</span>
                        <div class="list-name">${pet.pet_name}</div>
                        <div class="list-owner">👤 ${owner.owner_name}</div>
                        <div class="list-tel">📞 ${phone}</div>
                        <div class="list-address italic">📍 ${owner.address || '-'}</div>
                    </div>`;
            }).join('');
        }

        // --- เพิ่มข้อมูลใหม่ ---
        function openModal() { document.getElementById('regModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('regModal').style.display = 'none'; }

        document.getElementById('regForm').onsubmit = async (e) => {
            e.preventDefault();
            const hn = document.getElementById('m_hn').value;
            
            try {
                // 1. บันทึกเจ้าของ
                await db.from('owners').insert([{
                    hn: hn, 
                    owner_name: document.getElementById('m_owner_name').value,
                    address: document.getElementById('m_address').value,
                    note: document.getElementById('m_note').value
                }]);

                // 2. บันทึกเบอร์โทร
                await db.from('owner_phones').insert([{
                    owner_hn: hn,
                    phone_number: document.getElementById('m_phone').value
                }]);

                // 3. บันทึกสัตว์
                await db.from('animals').insert([{
                    pet_name: document.getElementById('m_pet_name').value,
                    owner_hn: hn,
                    pet_type: document.getElementById('m_pet_type').value,
                    breed: document.getElementById('m_breed').value,
                    gender: document.getElementById('m_gender').value,
                    weight: document.getElementById('m_weight').value || 0
                }]);

                alert("ลงทะเบียนสำเร็จ!");
                closeModal();
                loadData(); // รีโหลดข้อมูลใหม่
            } catch (err) {
                alert("เกิดข้อผิดพลาด: " + err.message);
            }
        };

        // ฟังก์ชันลบและดูรายละเอียด (คงเดิมจากเวอร์ชันก่อน)
        function viewDetail(id) {
            document.querySelectorAll('.animal-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`pet-${id}`).classList.add('active');
            const pet = allAnimals.find(p => p.id === id);
            const owner = allOwners.find(o => o.hn === pet.owner_hn) || {};
            const phones = allPhones.filter(p => p.owner_hn === pet.owner_hn).map(p => p.phone_number).join(' , ');

            document.getElementById('detail-view').innerHTML = `
                <div class="max-w-6xl mx-auto animate-in fade-in slide-in-from-bottom-4 duration-500">
                    <div class="bg-navy-mid/70 p-8 rounded-[40px] border border-white/10 flex items-center justify-between mb-8 shadow-2xl">
                        <div class="flex items-center gap-8">
                            <div class="text-7xl bg-white/5 p-6 rounded-[30px] border border-white/10">${(pet.pet_type === 'แมว') ? '🐱' : '🐶'}</div>
                            <div>
                                <h2 class="text-6xl font-black text-white mb-2">${pet.pet_name}</h2>
                                <span class="bg-teal-500 text-navy font-black px-6 py-2 rounded-xl text-xl uppercase">HN: ${pet.owner_hn}</span>
                            </div>
                        </div>
                        <button onclick="deletePet('${pet.id}')" class="bg-red-500/20 text-red-500 px-8 py-3 rounded-xl font-black text-xl border border-red-500/30 hover:bg-red-500 hover:text-white transition-all">🗑️ ลบข้อมูล</button>
                    </div>
                    <div class="grid grid-cols-2 gap-8">
                        <div class="bg-white/5 p-10 rounded-[40px] border border-white/5">
                            <h3 class="text-teal-400 font-black text-2xl uppercase mb-6">🐾 ข้อมูลสัตว์</h3>
                            <div class="space-y-4 text-2xl font-bold">
                                <p class="flex justify-between text-gray-500">ชนิด: <span class="text-white">${pet.pet_type}</span></p>
                                <p class="flex justify-between text-gray-500">น้ำหนัก: <span class="text-teal-400">${pet.weight} กก.</span></p>
                            </div>
                        </div>
                        <div class="bg-white/5 p-10 rounded-[40px] border border-white/5">
                            <h3 class="text-teal-400 font-black text-2xl uppercase mb-6">👤 ข้อมูลเจ้าของ</h3>
                            <div class="space-y-6 text-3xl font-black text-white">
                                <p>${owner.owner_name}</p>
                                <p class="text-teal-400">📞 ${phones}</p>
                            </div>
                        </div>
                    </div>
                </div>`;
        }

        async function deletePet(id) {
            if (confirm("ลบประวัตินี้?")) {
                await db.from('animals').delete().eq('id', id);
                loadData();
                document.getElementById('detail-view').innerHTML = '<div class="text-center opacity-30 text-3xl">ลบสำเร็จ</div>';
            }
        }

        function filterAnimals() {
            const term = document.getElementById('search-box').value.toLowerCase();
            const filtered = allAnimals.filter(pet => {
                const owner = allOwners.find(o => o.hn === pet.owner_hn) || {};
                const phones = allPhones.filter(p => p.owner_hn === pet.owner_hn).map(p => p.phone_number).join(' ');
                const address = (owner.address || '').toLowerCase();
                return pet.pet_name.toLowerCase().includes(term) || pet.owner_hn.toLowerCase().includes(term) || (owner.owner_name && owner.owner_name.toLowerCase().includes(term)) || phones.includes(term) || address.includes(term);
            });
            renderList(filtered);
        }
    </script>
</body>
</html>
