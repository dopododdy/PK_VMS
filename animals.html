<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <title>เวชระเบียนสัตว์ | PK-VMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>

    <style>
        :root {
            --navy: #0b1929; --navy-mid: #112240; --teal: #14b8b1;
            --surface: rgba(255,255,255,0.06); --border: rgba(255,255,255,0.12);
        }
        body { font-family: "Sarabun", sans-serif; background: var(--navy); color: #e2e8f0; margin: 0; overflow: hidden; }
        .mesh-bg { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% -20%, rgba(20, 184, 177, 0.18), transparent 75%); }
        
        /* Sidebar Style เหมือนหน้า Index */
        .sidebar-container { background: rgba(17, 34, 64, 0.4); backdrop-filter: blur(20px); border-right: 1px solid var(--border); }
        
        /* Card รายการสัตว์ */
        .animal-item {
            background: var(--surface); border: 2px solid transparent;
            border-radius: 24px; padding: 1.25rem; cursor: pointer;
            transition: all 0.3s ease; margin-bottom: 1rem;
        }
        .animal-item:hover { transform: translateX(8px); background: rgba(20, 184, 177, 0.1); border-color: rgba(20, 184, 177, 0.3); }
        .animal-item.active { border-color: var(--teal); background: rgba(20, 184, 177, 0.15); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }

        /* การปรับแต่ง Text & Icon */
        .hn-badge { background: var(--teal); color: white; padding: 4px 12px; border-radius: 12px; font-weight: 800; font-size: 0.9rem; }
        .text-pet-name { font-size: 1.8rem; font-weight: 800; color: white; }
        .text-owner-name { font-size: 1.2rem; font-weight: 600; color: #cbd5e1; }
        .icon-huge { font-size: 4rem; }
        .icon-list { font-size: 2.5rem; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--teal); }
    </style>
</head>
<body>
    <div class="mesh-bg"></div>

    <div class="flex h-screen overflow-hidden">
        <aside class="w-[420px] sidebar-container flex flex-col">
            <div class="p-8 pb-4">
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <h2 class="text-3xl font-black text-white">เวชระเบียน</h2>
                        <p class="text-teal-400 text-sm font-bold tracking-widest uppercase">PK-VMS Dashboard</p>
                    </div>
                    <a href="index.html" class="text-3xl hover:scale-110 transition">🏠</a>
                </div>
                <input type="text" id="search-box" 
                    class="w-full bg-black/30 border-2 border-white/10 rounded-2xl p-4 text-xl text-white outline-none focus:border-teal-500 transition" 
                    placeholder="🔍 ค้นหาชื่อสัตว์ หรือ HN..." oninput="filterAnimals()">
            </div>

            <div id="animal-list" class="flex-1 overflow-y-auto px-6 py-4">
                <div class="text-center py-10 text-gray-500 font-bold">กำลังโหลดข้อมูลสัตว์...</div>
            </div>

            <div class="p-6 bg-navy/20 border-t border-white/5">
                <button class="w-full bg-teal-600 hover:bg-teal-500 text-white font-black py-4 rounded-2xl text-xl shadow-lg transition-all active:scale-95">
                    + ลงทะเบียนสัตว์ใหม่
                </button>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-12" id="detail-view">
            <div class="h-full flex flex-col items-center justify-center text-gray-500 text-center">
                <div class="bg-white/5 p-16 rounded-[50px] border border-white/5 backdrop-blur-sm">
                    <div class="text-9xl mb-6 opacity-20">🐾</div>
                    <h3 class="text-2xl font-black text-white/40 mb-2 uppercase">คลินิกรักษาสัตว์หมอปิติพัฒน์</h3>
                    <p class="text-lg">เลือกรายชื่อสัตว์ทางด้านซ้ายเพื่อดูรายละเอียด</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        let allAnimals = [];
        let allOwners = [];
        let allPhones = [];

        window.onload = async () => {
            if (sessionStorage.getItem("isLoggedIn") !== "true") {
                window.location.href = "index.html"; return;
            }
            await loadData();
        };

        async function loadData() {
            try {
                const [resA, resO, resP] = await Promise.all([
                    db.from('animals').select('*').order('created_at', { ascending: false }),
                    db.from('owners').select('*'),
                    db.from('owner_phones').select('*')
                ]);
                allAnimals = resA.data || [];
                allOwners = resO.data || [];
                allPhones = resP.data || [];
                renderList(allAnimals);
            } catch (e) { console.error(e); }
        }

        function renderList(list) {
            const container = document.getElementById('animal-list');
            if (list.length === 0) {
                container.innerHTML = `<div class="text-center py-10 text-gray-500">ไม่พบข้อมูล</div>`;
                return;
            }

            container.innerHTML = list.map(pet => {
                const owner = allOwners.find(o => o.hn === pet.owner_hn) || { owner_name: 'ไม่ระบุเจ้าของ' };
                const phone = allPhones.find(p => p.owner_hn === pet.owner_hn)?.phone_number || '-';
                const typeIcon = (pet.pet_type === 'แมว') ? '🐱' : (pet.pet_type === 'สุนัข' ? '🐶' : '🐾');
                const genderIcon = pet.gender?.includes('ผู้') ? '♂️' : '♀️';
                const genderColor = pet.gender?.includes('ผู้') ? 'text-blue-400' : 'text-pink-400';

                return `
                    <div class="animal-item" onclick="viewDetail('${pet.id}')" id="pet-${pet.id}">
                        <div class="icon-list">${typeIcon}</div>
                        <div class="flex-1 ml-4">
                            <div class="flex justify-between items-center mb-1">
                                <span class="hn-badge">HN: ${pet.owner_hn}</span>
                                <span class="${genderColor} text-2xl font-black">${genderIcon}</span>
                            </div>
                            <div class="text-pet-name leading-tight">${pet.pet_name}</div>
                            <div class="text-owner-name mt-1">👤 ${owner.owner_name}</div>
                            <div class="text-teal-400 font-bold text-sm">📞 ${phone}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function viewDetail(id) {
            document.querySelectorAll('.animal-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`pet-${id}`).classList.add('active');

            const pet = allAnimals.find(p => p.id === id);
            const owner = allOwners.find(o => o.hn === pet.owner_hn) || {};
            const phones = allPhones.filter(p => p.owner_hn === pet.owner_hn).map(p => p.phone_number).join(', ');

            document.getElementById('detail-view').innerHTML = `
                <div class="max-w-5xl mx-auto animate-in fade-in slide-in-from-bottom-4 duration-500">
                    <div class="bg-navy-mid/60 backdrop-blur-3xl p-10 rounded-[40px] border border-white/10 shadow-2xl flex items-center gap-10 mb-8">
                        <div class="icon-huge bg-white/5 p-8 rounded-[30px] border border-white/5 shadow-inner">
                            ${(pet.pet_type === 'แมว') ? '🐱' : (pet.pet_type === 'สุนัข' ? '🐶' : '🐾')}
                        </div>
                        <div class="flex-1">
                            <div class="flex items-center gap-4 mb-2">
                                <h2 class="text-6xl font-black text-white">${pet.pet_name}</h2>
                                <span class="text-4xl">${pet.gender?.includes('ผู้') ? '♂️' : '♀️'}</span>
                            </div>
                            <span class="bg-teal-500 text-navy font-black px-6 py-2 rounded-2xl text-xl uppercase tracking-widest">
                                HN: ${pet.owner_hn}
                            </span>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="bg-white/5 p-8 rounded-[35px] border border-white/5">
                            <h3 class="text-teal-400 font-bold text-sm uppercase tracking-widest mb-6 flex items-center gap-2">
                                <span class="w-2 h-2 bg-teal-400 rounded-full"></span> ข้อมูลสัตว์เลี้ยง
                            </h3>
                            <div class="space-y-4 text-xl">
                                <p class="flex justify-between"><span class="text-gray-500">ชนิด:</span> <span class="font-bold">${pet.pet_type}</span></p>
                                <p class="flex justify-between"><span class="text-gray-500">สายพันธุ์:</span> <span class="font-bold">${pet.breed || '-'}</span></p>
                                <p class="flex justify-between"><span class="text-gray-500">เพศ:</span> <span class="font-bold">${pet.gender || '-'}</span></p>
                                <p class="flex justify-between"><span class="text-gray-500">น้ำหนัก:</span> <span class="font-bold text-teal-400">${pet.weight || '0'} กก.</span></p>
                                <p class="flex justify-between"><span class="text-gray-400 text-base italic">วันเกิด: ${pet.birth_date || '-'}</span></p>
                            </div>
                        </div>

                        <div class="bg-white/5 p-8 rounded-[35px] border border-white/5">
                            <h3 class="text-teal-400 font-bold text-sm uppercase tracking-widest mb-6 flex items-center gap-2">
                                <span class="w-2 h-2 bg-teal-400 rounded-full"></span> ข้อมูลเจ้าของ
                            </h3>
                            <div class="space-y-6">
                                <div>
                                    <label class="text-gray-500 text-sm block">ชื่อ-นามสกุล</label>
                                    <p class="text-3xl font-black text-white">${owner.owner_name}</p>
                                </div>
                                <div>
                                    <label class="text-gray-500 text-sm block">เบอร์โทรศัพท์</label>
                                    <p class="text-3xl font-black text-teal-400">${phones}</p>
                                </div>
                                <div>
                                    <label class="text-gray-500 text-sm block">ที่อยู่</label>
                                    <p class="text-lg font-bold text-gray-300 leading-relaxed">${owner.address || '-'}</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="mt-8 p-8 bg-amber-500/5 border border-amber-500/10 rounded-[30px]">
                         <p class="text-amber-500 font-bold text-sm uppercase tracking-widest mb-2">หมายเหตุ / Note</p>
                         <p class="text-2xl text-gray-300 font-medium">${owner.note || 'ไม่มีบันทึกเพิ่มเติม'}</p>
                    </div>
                </div>
            `;
        }

        function filterAnimals() {
            const term = document.getElementById('search-box').value.toLowerCase();
            const filtered = allAnimals.filter(pet => {
                const owner = allOwners.find(o => o.hn === pet.owner_hn) || {};
                const phones = allPhones.filter(p => p.owner_hn === pet.owner_hn).map(p => p.phone_number).join(' ');
                return pet.pet_name.toLowerCase().includes(term) || pet.owner_hn.toLowerCase().includes(term) || (owner.owner_name && owner.owner_name.toLowerCase().includes(term)) || phones.includes(term);
            });
            renderList(filtered);
        }
    </script>
</body>
</html>
