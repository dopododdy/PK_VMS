<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <title>เวชระเบียนสัตว์ | PK-VMS Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <style>
        :root { 
            --navy: #0b1929; --navy-mid: #112240; --teal: #14b8b1; 
            --hn-bg: #3b82f6; --owner-zone: rgba(30, 41, 59, 0.6);
            --pet-zone: rgba(49, 46, 129, 0.4);
        }
        body { font-family: "Sarabun", sans-serif; background: var(--navy); color: #e2e8f0; margin: 0; overflow: hidden; }
        
        .sidebar-container { 
            position: relative; min-width: 450px; max-width: 900px; width: 700px;
            background: rgba(17, 34, 64, 0.85); backdrop-filter: blur(25px); 
            border-right: 2px solid rgba(255,255,255,0.1); display: flex; flex-direction: column;
        }
        .resizer { width: 10px; cursor: col-resize; position: absolute; right: 0; top: 0; bottom: 0; z-index: 50; }
        .resizer:hover { background: var(--teal); opacity: 0.5; }

        .animal-item { 
            background: rgba(255,255,255,0.03); border: 2px solid transparent; 
            border-radius: 12px; padding: 1rem; cursor: pointer; 
            margin-bottom: 0.6rem; display: flex; align-items: center; gap: 1rem;
            transition: all 0.2s;
        }
        .animal-item:hover { background: rgba(20, 184, 177, 0.1); }
        .animal-item.active { border-color: var(--teal); background: rgba(20, 184, 177, 0.15); }
        .hn-badge { background: var(--hn-bg); color: white; font-weight: 800; padding: 2px 10px; border-radius: 8px; font-size: 0.9rem; }

        .zone-owner { background: var(--owner-zone); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 30px; margin-bottom: 20px; }
        .zone-pet { background: var(--pet-zone); border: 1px solid rgba(99, 102, 241, 0.2); border-radius: 24px; padding: 30px; margin-bottom: 20px; position: relative; }
        
        .label-text { color: #94a3b8; font-size: 1rem; font-weight: 600; margin-bottom: 6px; display: block; }
        .input-box { 
            background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); 
            border-radius: 12px; padding: 12px 16px; color: white; width: 100%; 
            font-size: 1.2rem; outline: none; transition: 0.2s;
        }
        .input-box:focus { border-color: var(--teal); background: rgba(0,0,0,0.5); }
        .input-box[readonly] { background: rgba(255,255,255,0.05); color: #3b82f6; font-weight: 800; cursor: not-allowed; }
        
        .btn-medical {
            background: rgba(20, 184, 177, 0.1);
            border: 1px solid var(--teal);
            color: var(--teal);
            padding: 8px 16px;
            border-radius: 12px;
            font-weight: 800;
            transition: all 0.2s;
        }
        .btn-medical:hover {
            background: var(--teal);
            color: white;
            box-shadow: 0 0 15px rgba(20, 184, 177, 0.4);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="flex h-screen overflow-hidden">
        
        <aside class="sidebar-container" id="sidebar">
            <div class="resizer" id="resizer"></div>
            <div class="p-6 flex-shrink-0">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-3xl font-black text-white tracking-tighter">เวชระเบียนสัตว์</h2>
                    <div class="flex gap-4">
                        <button onclick="loadData()" class="text-2xl hover:rotate-180 transition-all">🔄</button>
                        <a href="index.html" class="text-3xl">🏠</a>
                    </div>
                </div>
                <input type="text" id="search-box" class="w-full bg-black/40 border-2 border-white/10 rounded-xl p-4 text-xl text-white outline-none focus:border-teal-500" placeholder="🔍 ค้นหา: ชื่อสัตว์, HN, เบอร์โทร..." oninput="filterAnimals()">
            </div>
            <div id="animal-list" class="flex-1 overflow-y-auto px-4 pb-4"></div>
            <div class="p-4 bg-black/20 border-t border-white/5">
                <button onclick="createNewForm()" class="w-full bg-teal-600 hover:bg-teal-500 text-white font-black py-5 rounded-xl text-2xl shadow-lg active:scale-95 transition-all">
                    + ลงทะเบียนรายใหม่ (Auto HN)
                </button>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-12 bg-gradient-to-br from-navy to-black" id="form-view">
            <div class="h-full flex flex-col items-center justify-center opacity-20 text-center">
                <div class="text-[12rem]">📋</div>
                <h3 class="text-4xl font-black">PK-VMS Dashboard</h3>
                <p class="text-xl">เลือกรายชื่อสัตว์ป่วยเพื่อเริ่มต้นจัดการข้อมูล</p>
            </div>
        </main>
    </div>

    <script>
        let allAnimals = []; let allOwners = []; let allPhones = [];
        const MONTHS_TH = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];

        const sidebar = document.getElementById("sidebar");
        const resizer = document.getElementById("resizer");
        resizer.addEventListener("mousedown", () => {
            document.addEventListener("mousemove", resize);
            document.addEventListener("mouseup", () => document.removeEventListener("mousemove", resize));
        });
        function resize(e) { sidebar.style.width = e.pageX + "px"; }

        window.onload = async () => {
            if (sessionStorage.getItem("isLoggedIn") !== "true") { window.location.href = "index.html"; return; }
            await loadData();
        };

        async function loadData() {
            try {
                const [resA, resO, resP] = await Promise.all([
                    db.from('animals').select('*').order('created_at', { ascending: false }),
                    db.from('owners').select('*'),
                    db.from('owner_phones').select('*')
                ]);
                allAnimals = resA.data || []; allOwners = resO.data || []; allPhones = resP.data || [];
                renderList(allAnimals);
            } catch (e) { console.error(e); }
        }

        function renderList(list) {
            const container = document.getElementById('animal-list');
            container.innerHTML = list.map(pet => {
                const owner = allOwners.find(o => o.hn === pet.owner_hn) || { owner_name: '-' };
                const phones = allPhones.filter(p => p.owner_hn === pet.owner_hn).map(p => p.phone_number).join(', ');
                const icon = pet.pet_type === 'สุนัข' ? '🐶' : (pet.pet_type === 'แมว' ? '🐱' : '🐾');
                return `
                    <div class="animal-item" onclick="editOwner('${pet.owner_hn}')" id="hn-${pet.owner_hn}">
                        <div class="text-4xl">${icon}</div>
                        <div class="flex-1">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="hn-badge">HN ${pet.owner_hn}</span>
                                <span class="text-2xl font-black text-white">${pet.pet_name}</span>
                            </div>
                            <div class="flex gap-4 text-lg">
                                <span class="text-gray-400">👤 ${owner.owner_name}</span>
                                <span class="text-teal-400 font-bold">📞 ${phones}</span>
                            </div>
                        </div>
                    </div>`;
            }).join('');
        }

        async function createNewForm() {
            let nextHN = "690001";
            if (allOwners.length > 0) {
                const maxHN = Math.max(...allOwners.map(o => parseInt(o.hn)).filter(n => !isNaN(n)));
                if (maxHN !== -Infinity) nextHN = (maxHN + 1).toString();
            }
            renderForm({ hn: nextHN, owner_name: '', address: '' }, [], [], true); 
        }

        function editOwner(hn) {
            document.querySelectorAll('.animal-item').forEach(el => el.classList.remove('active'));
            const item = document.getElementById(`hn-${hn}`);
            if(item) item.classList.add('active');
            const owner = allOwners.find(o => o.hn === hn);
            const pets = allAnimals.filter(a => a.owner_hn === hn);
            const phones = allPhones.filter(p => p.owner_hn === hn);
            renderForm(owner, pets, phones, false);
        }

        function renderForm(owner, pets, phones = [], isNew = false) {
            const formView = document.getElementById('form-view');
            const p1 = phones[0]?.phone_number || '';
            const p2 = phones[1]?.phone_number || '';

            formView.innerHTML = `
                <div class="max-w-7xl mx-auto animate-in fade-in slide-in-from-bottom-4 duration-500 pb-20">
                    <div class="flex justify-between items-center mb-10">
                        <h2 class="text-5xl font-black text-white">📂 ${isNew ? 'ลงทะเบียนใหม่' : 'แก้ไขเวชระเบียน'} HN: ${owner.hn}</h2>
                    </div>
                    
                    <div class="zone-owner">
                        <h3 class="text-2xl font-bold text-blue-400 mb-6 flex items-center gap-2">👤 ข้อมูลเจ้าของ</h3>
                        <div class="grid grid-cols-12 gap-6">
                            <div class="col-span-3"><label class="label-text">เลข HN (รันอัตโนมัติ)</label>
                                <input type="text" id="f_hn" class="input-box" value="${owner.hn}" readonly></div>
                            <div class="col-span-5"><label class="label-text">ชื่อเจ้าของ</label>
                                <input type="text" id="f_owner_name" class="input-box" value="${owner.owner_name || ''}" placeholder="ระบุชื่อ-นามสกุล"></div>
                            <div class="col-span-2"><label class="label-text">เบอร์โทร 1</label>
                                <input type="tel" id="f_phone1" class="input-box" value="${p1}" placeholder="08xxxxxxxx"></div>
                            <div class="col-span-2"><label class="label-text">เบอร์โทร 2</label>
                                <input type="tel" id="f_phone2" class="input-box" value="${p2}"></div>
                            <div class="col-span-12"><label class="label-text">ที่อยู่</label>
                                <input type="text" id="f_address" class="input-box" value="${owner.address || ''}"></div>
                        </div>
                    </div>

                    <div class="flex justify-between items-end mt-12 mb-6">
                        <h3 class="text-3xl font-black text-indigo-400">🐾 รายการสัตว์เลี้ยง</h3>
                        <button onclick="addPetRow()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-8 py-3 rounded-2xl font-black shadow-lg active:scale-95 transition-all">+ เพิ่มสัตว์เลี้ยง</button>
                    </div>

                    <div id="pets-container" class="space-y-6">
                        ${pets.length ? pets.map(p => petRowHtml(p)).join('') : petRowHtml({})}
                    </div>

                    <button onclick="saveAllData()" class="w-full bg-teal-600 hover:bg-teal-500 text-white font-black py-8 rounded-[30px] text-4xl shadow-2xl mt-12 active:scale-95 transition-all">
                        💾 บันทึกข้อมูลทั้งหมด
                    </button>
                </div>`;
        }

        function petRowHtml(pet) {
            let thaiDate = "ยังไม่ได้ระบุ";
            let ageY = ""; let ageM = "";
            if(pet.birth_date) {
                const d = new Date(pet.birth_date);
                thaiDate = `${d.getDate()} ${MONTHS_TH[d.getMonth()]} ${d.getFullYear()+543}`;
                const now = new Date();
                ageY = now.getFullYear() - d.getFullYear();
                ageM = now.getMonth() - d.getMonth();
                if(ageM < 0) { ageY--; ageM += 12; }
            }

            return `
                <div class="zone-pet group relative">
                    <div class="flex justify-between items-center mb-6">
                        <div class="flex items-center gap-4">
                             <div class="text-4xl">${pet.pet_type === 'สุนัข' ? '🐶' : (pet.pet_type === 'แมว' ? '🐱' : '🐾')}</div>
                             <h4 class="text-2xl font-black text-white">${pet.pet_name || 'ข้อมูลใหม่'}</h4>
                        </div>
                        
                        ${pet.id ? `
                        <button onclick="gotoMedicalRecord('${pet.id}', '${pet.pet_name}', '${pet.owner_hn}')" class="btn-medical flex items-center gap-2">
                            🏥 ประวัติการรักษา (Medical Record)
                        </button>` : ''}
                    </div>

                    <div class="grid grid-cols-12 gap-6">
                        <div class="col-span-3">
                            <label class="label-text">ชื่อสัตว์ / ชนิด / เพศ</label>
                            <input type="text" class="p_name input-box mb-3 font-bold" value="${pet.pet_name || ''}" placeholder="ชื่อสัตว์">
                            <div class="grid grid-cols-2 gap-2">
                                <select class="p_type input-box !text-lg !py-2"><option value="แมว" ${pet.pet_type==='แมว'?'selected':''}>🐱 แมว</option><option value="สุนัข" ${pet.pet_type==='สุนัข'?'selected':''}>🐶 สุนัข</option><option value="อื่นๆ" ${pet.pet_type==='อื่นๆ'?'selected':''}>🐾 อื่นๆ</option></select>
                                <select class="p_gender input-box !text-lg !py-2"><option value="เมีย" ${(!pet.gender||pet.gender==='เมีย')?'selected':''}>♀️ เมีย</option><option value="ผู้" ${pet.gender==='ผู้'?'selected':''}>♂️ ผู้</option><option value="ผู้ตอน" ${pet.gender==='ผู้ตอน'?'selected':''}>♂️ ผู้ตอน</option><option value="เมียหมัน" ${pet.gender==='เมียหมัน'?'selected':''}>♀️ เมียหมัน</option></select>
                            </div>
                        </div>
                        <div class="col-span-3">
                            <label class="label-text">สายพันธุ์ / ไมโครชิพ</label>
                            <input type="text" class="p_breed input-box mb-3" value="${pet.breed || ''}" placeholder="สายพันธุ์">
                            <input type="text" class="p_microchip input-box" value="${pet.microchip_number || ''}" placeholder="เลขไมโครชิพ">
                        </div>
                        <div class="col-span-4">
                            <label class="label-text">วันเกิด: <span class="text-teal-400 p_dob_display font-bold">${thaiDate}</span></label>
                            <input type="date" class="p_dob input-box mb-3" value="${pet.birth_date || ''}" onchange="calcAge(this)">
                            <div class="flex gap-4">
                                <div class="flex-1"><label class="text-xs text-indigo-300 font-bold">ปี</label>
                                    <input type="number" class="p_age_y input-box !py-2 font-bold text-teal-400" value="${ageY}" placeholder="0" oninput="calcDOB(this)"></div>
                                <div class="flex-1"><label class="text-xs text-indigo-300 font-bold">เดือน</label>
                                    <input type="number" class="p_age_m input-box !py-2 font-bold text-teal-400" value="${ageM}" placeholder="0" oninput="calcDOB(this)"></div>
                            </div>
                        </div>
                        <div class="col-span-2">
                            <label class="label-text">น้ำหนัก (กก.)</label>
                            <input type="number" step="0.1" class="p_weight input-box font-bold text-yellow-400" value="${pet.weight || ''}" placeholder="0.0">
                        </div>
                        <div class="col-span-12">
                            <label class="label-text">โรคประจำตัว / แพ้ยา</label>
                            <textarea class="p_congenital input-box h-[80px]" placeholder="ระบุสิ่งที่ต้องระวัง...">${pet.congenital_disease || ''}</textarea>
                        </div>
                    </div>
                    <button onclick="this.parentElement.remove()" class="absolute -right-4 -top-4 bg-red-500 hover:bg-red-600 text-white w-10 h-10 rounded-full font-bold opacity-0 group-hover:opacity-100 transition-all shadow-lg">✕</button>
                </div>`;
        }

        // --- ฟังชั่นการทำงานใหม่ ---
        function gotoMedicalRecord(petId, petName, hn) {
            // ย้ายไปหน้าประวัติการรักษา พร้อมส่ง ID ไปด้วย
            window.location.href = `medical_records.html?id=${petId}&name=${encodeURIComponent(petName)}&hn=${hn}`;
        }

        function addPetRow() {
            const container = document.getElementById('pets-container');
            const div = document.createElement('div');
            div.innerHTML = petRowHtml({});
            container.appendChild(div.firstElementChild);
        }

        function calcAge(el) {
            const row = el.closest('.zone-pet');
            if(!el.value) return;
            const d = new Date(el.value);
            row.querySelector('.p_dob_display').innerText = `${d.getDate()} ${MONTHS_TH[d.getMonth()]} ${d.getFullYear()+543}`;
            const now = new Date();
            let y = now.getFullYear() - d.getFullYear();
            let m = now.getMonth() - d.getMonth();
            if(m < 0) { y--; m += 12; }
            row.querySelector('.p_age_y').value = y;
            row.querySelector('.p_age_m').value = m;
        }

        function calcDOB(el) {
            const row = el.closest('.zone-pet');
            const y = parseInt(row.querySelector('.p_age_y').value) || 0;
            const m = parseInt(row.querySelector('.p_age_m').value) || 0;
            const d = new Date();
            d.setFullYear(d.getFullYear() - y);
            d.setMonth(d.getMonth() - m);
            const dateStr = d.toISOString().split('T')[0];
            row.querySelector('.p_dob').value = dateStr;
            row.querySelector('.p_dob_display').innerText = `${d.getDate()} ${MONTHS_TH[d.getMonth()]} ${d.getFullYear()+543}`;
        }

        async function saveAllData() {
            const hn = document.getElementById('f_hn').value;
            const owner_name = document.getElementById('f_owner_name').value;
            const p1 = document.getElementById('f_phone1').value;
            if (!hn || !owner_name || !p1) return alert("❌ กรุณาระบุชื่อเจ้าของ และเบอร์โทร");

            try {
                await db.from('owners').upsert({ 
                    hn, owner_name, address: document.getElementById('f_address').value,
                    updated_at: new Date()
                });
                await db.from('owner_phones').delete().eq('owner_hn', hn);
                const phones = [{ owner_hn: hn, phone_number: p1, label: 'เบอร์หลัก' }];
                const p2 = document.getElementById('f_phone2').value;
                if(p2) phones.push({ owner_hn: hn, phone_number: p2, label: 'เบอร์รอง' });
                await db.from('owner_phones').insert(phones);
                
                // สำหรับ Animals เราจะรักษา ID เดิมไว้ถ้ามี (เพื่อไม่ให้ประวัติรักษาหลุด)
                const petNodes = document.querySelectorAll('.zone-pet');
                for (const node of petNodes) {
                    const petName = node.querySelector('.p_name').value;
                    if (!petName) continue;

                    // ค้นหา ID เดิม (ถ้ามี) จากข้อมูลที่โหลดมาครั้งแรก
                    const existingPet = allAnimals.find(a => a.owner_hn === hn && a.pet_name === petName);

                    const petData = {
                        owner_hn: hn,
                        pet_name: petName,
                        pet_type: node.querySelector('.p_type').value,
                        gender: node.querySelector('.p_gender').value,
                        breed: node.querySelector('.p_breed').value,
                        microchip_number: node.querySelector('.p_microchip').value,
                        congenital_disease: node.querySelector('.p_congenital').value,
                        birth_date: node.querySelector('.p_dob').value || null,
                        weight: parseFloat(node.querySelector('.p_weight').value) || 0,
                        updated_at: new Date()
                    };

                    if (existingPet) {
                        await db.from('animals').update(petData).eq('id', existingPet.id);
                    } else {
                        await db.from('animals').insert(petData);
                    }
                }

                alert("✅ บันทึกสำเร็จ!");
                await loadData();
                editOwner(hn);
            } catch (err) { alert("❌ Error: " + err.message); }
        }

        function filterAnimals() {
            const term = document.getElementById('search-box').value.toLowerCase();
            const filtered = allAnimals.filter(pet => {
                const owner = allOwners.find(o => o.hn === pet.owner_hn) || {};
                const phones = allPhones.filter(p => p.owner_hn === pet.owner_hn).map(p => p.phone_number).join(' ');
                return pet.pet_name.toLowerCase().includes(term) || pet.owner_hn.toLowerCase().includes(term) || (owner.owner_name && owner.owner_name.toLowerCase().includes(term)) || phones.includes(term);
            });
            renderList(filtered);
        }
    </script>
</body>
</html>
