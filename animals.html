<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <title>เวชระเบียนสัตว์ป่วย | PK-VMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>

    <style>
        :root { 
            --navy: #0b1929; 
            --navy-mid: #112240; 
            --teal: #14b8b1; 
            --white-bright: #ffffff;
            --text-gray: #cbd5e1;
        }
        body { 
            font-family: "Sarabun", sans-serif; 
            background: var(--navy); 
            color: var(--white-bright); 
            font-size: 18px;
        }
        .form-input { 
            background: rgba(255,255,255,0.07); 
            border: 2px solid rgba(255,255,255,0.2); 
            border-radius: 14px; 
            padding: 14px 20px; 
            width: 100%; 
            color: white; 
            outline: none; 
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }
        .form-input:focus { 
            border-color: var(--teal); 
            background: rgba(255,255,255,0.12);
            box-shadow: 0 0 15px rgba(20, 184, 177, 0.2);
        }
        .form-label {
            display: block;
            font-weight: 700;
            color: var(--text-gray);
            margin-bottom: 8px;
            font-size: 1rem;
        }
        .glass-table { 
            background: rgba(255,255,255,0.03); 
            border-radius: 24px; 
            overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.1); 
        }
        select option { background: var(--navy-mid); color: white; }
        .highlight-found { 
            border-color: var(--teal) !important; 
            background: rgba(20, 184, 177, 0.1) !important;
        }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-6">
            <div>
                <h1 class="text-4xl font-bold text-white flex items-center gap-4">
                    <span class="text-teal-400 text-5xl">🐾</span> เวชระเบียนสัตว์ป่วย
                </h1>
                <p class="text-teal-500 font-bold text-lg mt-2">จัดการข้อมูลสัตว์เลี้ยงและเจ้าของ (Animals & Owners)</p>
            </div>
            <div class="flex items-center gap-4 w-full md:w-auto">
                <a href="index.html" class="flex-1 md:flex-none text-center bg-slate-700 hover:bg-slate-600 text-white px-8 py-4 rounded-2xl transition font-bold text-lg border border-white/10">🏠 หน้าหลัก</a>
                <button onclick="toggleForm()" class="flex-1 md:flex-none bg-teal-600 hover:bg-teal-500 text-white px-8 py-4 rounded-2xl transition font-black text-lg shadow-xl">+ เพิ่มเคสใหม่</button>
            </div>
        </header>

        <section id="record-form" class="hidden mb-12 bg-navy-mid p-10 rounded-[32px] border-2 border-teal-500/40 shadow-2xl">
            <h2 class="text-2xl font-bold mb-8 text-teal-400 border-b-2 border-teal-500/20 pb-4">📋 ลงทะเบียนสัตว์ป่วยใหม่</h2>
            <form id="pet-form" onsubmit="saveData(event)" class="grid grid-cols-1 md:grid-cols-3 gap-8">
                
                <div class="md:col-span-3 grid grid-cols-1 md:grid-cols-3 gap-6 bg-white/5 p-8 rounded-3xl border border-white/10">
                    <div class="md:col-span-3 flex items-center gap-3 mb-2">
                        <span class="text-2xl">👤</span>
                        <h3 class="text-xl font-bold text-white">ข้อมูลเจ้าของ (ระบุเบอร์โทรเพื่อตรวจสอบประวัติ)</h3>
                    </div>
                    <div>
                        <label class="form-label">เบอร์โทรศัพท์</label>
                        <input type="text" id="phone" oninput="checkOwner()" class="form-input font-bold text-teal-400" placeholder="ระบุเบอร์โทรศัพท์" required>
                    </div>
                    <div>
                        <label class="form-label">ชื่อเจ้าของ</label>
                        <input type="text" id="owner_name" class="form-input" placeholder="ชื่อ-นามสกุลเจ้าของ" required>
                    </div>
                    <div>
                        <label class="form-label">ที่อยู่</label>
                        <input type="text" id="address" class="form-input" placeholder="บ้านเลขที่/จังหวัด">
                    </div>
                </div>

                <div class="md:col-span-3 flex items-center gap-3 mt-4 mb-2">
                    <span class="text-2xl">🐶</span>
                    <h3 class="text-xl font-bold text-white">รายละเอียดสัตว์ป่วย</h3>
                </div>
                <div>
                    <label class="form-label">หมายเลขเวชระเบียน (HN)</label>
                    <input type="text" id="hn" class="form-input font-mono text-teal-400 font-bold" placeholder="เช่น 690001" required>
                </div>
                <div>
                    <label class="form-label">ชื่อสัตว์</label>
                    <input type="text" id="pet_name" class="form-input" placeholder="กรอกชื่อสัตว์เลี้ยง" required>
                </div>
                <div>
                    <label class="form-label">ชนิดสัตว์</label>
                    <select id="pet_type" class="form-input font-bold" onchange="updateBreedOptions()" required>
                        <option value="แมว" selected>แมว</option>
                        <option value="สุนัข">สุนัข</option>
                        <option value="อื่นๆ">อื่นๆ</option>
                    </select>
                </div>
                <div>
                    <label class="form-label">เพศ</label>
                    <select id="gender" class="form-input">
                        <option value="ผู้">ผู้</option>
                        <option value="ผู้ตอน">ผู้ตอน</option>
                        <option value="เมีย">เมีย</option>
                        <option value="เมียหมัน">เมียหมัน</option>
                    </select>
                </div>
                <div>
                    <label class="form-label">พันธุ์</label>
                    <select id="breed_select" class="form-input font-bold"></select>
                    <input type="text" id="breed_custom" class="form-input mt-3 hidden" placeholder="ระบุพันธุ์เอง">
                </div>

                <div class="md:col-span-3 flex justify-end gap-6 mt-6 pt-6 border-t border-white/10">
                    <button type="button" onclick="toggleForm()" class="px-8 py-3 text-gray-400 hover:text-white font-bold text-lg">ยกเลิก</button>
                    <button type="submit" class="bg-teal-600 hover:bg-teal-500 text-white px-14 py-4 rounded-2xl font-black text-xl shadow-lg">บันทึกข้อมูล</button>
                </div>
            </form>
        </section>

        <div class="mb-8 relative max-w-xl">
            <input type="text" id="search" oninput="fetchRecords()" class="form-input pl-14 py-5 text-xl" placeholder="ค้นหา HN, ชื่อสัตว์, หรือเบอร์โทร...">
            <span class="absolute left-5 top-5 text-2xl opacity-50">🔍</span>
        </div>

        <div class="glass-table overflow-x-auto">
            <table class="w-full text-left">
                <thead class="bg-white/10 text-white text-base uppercase font-black">
                    <tr>
                        <th class="p-6">HN</th>
                        <th class="p-6">สัตว์เลี้ยง / พันธุ์</th>
                        <th class="p-6">เจ้าของ / เบอร์โทร</th>
                        <th class="p-6 text-center">จัดการ</th>
                    </tr>
                </thead>
                <tbody id="animal-list" class="divide-y divide-white/10"></tbody>
            </table>
        </div>
    </div>

    <script>
        const breedData = {
            "สุนัข": ["ไทย", "โกลเด้น รีทรีฟเวอร์", "ไซบีเรียน ฮัสกี้", "ปอมเมอเรเนียน", "พุดเดิ้ล", "ชิสุ", "บีเกิล", "อื่นๆ"],
            "แมว": ["ไทย", "เปอร์เซีย", "สก็อตติช โฟลด์", "บริติช ชอร์ตแฮร์", "วิเชียรมาศ", "เบงกอล", "อเมริกัน ชอร์ตแฮร์", "เมนคูน", "อื่นๆ"]
        };

        // ฟังก์ชันตรวจสอบเจ้าของเดิมจากเบอร์โทร
        async function checkOwner() {
            const phone = document.getElementById('phone').value;
            const nameField = document.getElementById('owner_name');
            const addrField = document.getElementById('address');

            if (phone.length >= 9) {
                const { data, error } = await db.from('owners').select('*').eq('phone', phone).single();
                if (data) {
                    nameField.value = data.owner_name;
                    addrField.value = data.address;
                    nameField.classList.add('highlight-found');
                    addrField.classList.add('highlight-found');
                }
            } else {
                nameField.classList.remove('highlight-found');
                addrField.classList.remove('highlight-found');
            }
        }

        function updateBreedOptions() {
            const type = document.getElementById('pet_type').value;
            const breedSelect = document.getElementById('breed_select');
            const breedCustom = document.getElementById('breed_custom');
            breedSelect.innerHTML = ''; breedCustom.classList.add('hidden');

            if (type === "อื่นๆ") {
                const opt = document.createElement('option'); opt.value = "อื่นๆ"; opt.textContent = "ระบุเอง";
                breedSelect.appendChild(opt); breedCustom.classList.remove('hidden');
            } else {
                breedData[type].forEach(breed => {
                    const opt = document.createElement('option'); opt.value = breed; opt.textContent = breed;
                    if (breed === "ไทย") opt.selected = true;
                    breedSelect.appendChild(opt);
                });
            }
        }

        async function fetchRecords() {
            const search = document.getElementById('search').value;
            // ดึงข้อมูลสัตว์ (animals) พร้อมดึงข้อมูลเจ้าของ (owners) ผ่าน FK
            let query = db.from('animals').select('*, owners(*)').order('created_at', { ascending: false });
            
            if (search) query = query.or(`hn.ilike.%${search}%,pet_name.ilike.%${search}%,owner_phone.ilike.%${search}%`);

            const { data, error } = await query;
            if (error) return console.error(error);

            document.getElementById('animal-list').innerHTML = data.map(item => `
                <tr class="hover:bg-white/5 transition">
                    <td class="p-6 font-mono text-teal-400 font-black text-2xl">${item.hn}</td>
                    <td class="p-6">
                        <div class="font-bold text-white text-xl">${item.pet_name} (${item.gender})</div>
                        <div class="text-sm text-gray-400 font-bold">${item.pet_type} | ${item.breed}</div>
                    </td>
                    <td class="p-6">
                        <div class="text-lg font-bold text-white">${item.owners?.owner_name || 'ไม่พบชื่อ'}</div>
                        <div class="text-base text-teal-500 font-black tracking-widest">${item.owner_phone}</div>
                    </td>
                    <td class="p-6 text-center">
                        <button class="bg-white/10 hover:bg-teal-500 text-white px-6 py-2 rounded-xl border border-white/20 font-bold transition">ดูประวัติ</button>
                    </td>
                </tr>
            `).join('');
        }

        async function saveData(e) {
            e.preventDefault();
            const phone = document.getElementById('phone').value;
            
            // 1. จัดการข้อมูลเจ้าของ (Upsert: ถ้ามีเบอร์นี้แล้วจะอัปเดต ถ้าไม่มีจะเพิ่มใหม่)
            const { error: ownerError } = await db.from('owners').upsert({
                owner_name: document.getElementById('owner_name').value,
                phone: phone,
                address: document.getElementById('address').value
            }, { onConflict: 'phone' });

            if (ownerError) return alert('ข้อผิดพลาดเจ้าของ: ' + ownerError.message);

            // 2. บันทึกข้อมูลสัตว์
            const { error: animalError } = await db.from('animals').insert({
                hn: document.getElementById('hn').value,
                pet_name: document.getElementById('pet_name').value,
                pet_type: document.getElementById('pet_type').value,
                gender: document.getElementById('gender').value,
                breed: (document.getElementById('breed_select').value === "อื่นๆ") ? document.getElementById('breed_custom').value : document.getElementById('breed_select').value,
                owner_phone: phone
            });

            if (animalError) {
                alert('ข้อผิดพลาดสัตว์: ' + animalError.message);
            } else {
                alert('บันทึกสำเร็จ!');
                location.reload();
            }
        }

        function toggleForm() {
            const form = document.getElementById('record-form');
            form.classList.toggle('hidden');
            if(!form.classList.contains('hidden')) window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.onload = function() { 
            fetchRecords(); 
            updateBreedOptions(); 
        };
    </script>
</body>
</html>
