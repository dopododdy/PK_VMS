<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <title>เวชระเบียนสัตว์ | PK-VMS Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>

    <style>
        :root { --navy: #0b1929; --navy-light: #112240; --teal: #14b8b1; --border: rgba(255, 255, 255, 0.1); }
        * { font-family: "Sarabun", sans-serif !important; }
        body { background: var(--navy); color: #e2e8f0; margin: 0; overflow: hidden; }
        .sidebar-container { position: relative; width: 420px; background: #0f172a; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .pet-card { padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer;
            display: grid; grid-template-columns: 85px 35px 1fr 110px; gap: 12px; align-items: center; font-size: 15px; }
        .pet-card:hover { background: rgba(255,255,255,0.07); }
        .pet-card.active { background: rgba(20, 184, 177, 0.18); border-left: 5px solid var(--teal); }
        .info-group { display: flex; flex-direction: column; min-width: 0; }
        .owner-subtext { color: #94a3b8; font-size: 13px; font-weight: 400; }
        .phone-text { color: var(--teal); font-weight: 800; text-align: right; font-size: 13px; letter-spacing: 0.5px; }
        .input-box { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 8px; padding: 10px; color: white; width: 100%; outline: none; font-size: 16px; transition: 0.2s; }
        .input-box:focus { border-color: var(--teal); background: rgba(0,0,0,0.5); }
        .zone-pet { background: rgba(30, 41, 59, 0.4); border-radius: 20px; padding: 22px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .label-text { color: #94a3b8; font-size: 0.9rem; margin-bottom: 4px; display: block; font-weight: 600; }
        .btn-medical-record { background: rgba(20, 184, 177, 0.1); color: var(--teal); border: 1.5px solid var(--teal); padding: 6px 14px; border-radius: 10px; font-weight: 800; font-size: 0.85rem; transition: 0.2s; }
        .btn-medical-record:hover { background: var(--teal); color: var(--navy); }
        .btn-delete-pet { background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1.5px solid rgba(239, 68, 68, 0.3); padding: 6px 14px; border-radius: 10px; font-weight: 800; font-size: 0.85rem; transition: 0.2s; }
        .btn-delete-pet:hover { background: #ef4444; color: white; }
        .critical-box { background: #7f1d1d !important; color: #ffffff !important; font-weight: 800; font-size: 1.25rem !important; border: 2px solid #ef4444 !important; }
        .merge-item { background: rgba(255,255,255,0.03); border-radius: 12px; padding: 15px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 10px; }
    </style>
</head>

<body>
<div class="flex h-screen overflow-hidden">

<aside class="sidebar-container">
    <div class="p-5 flex-shrink-0 border-b border-white/5">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-2xl font-black text-white">เวชระเบียน</h2>
            <div class="flex gap-3 items-center">
                <button onclick="showMergeTool()" class="text-2xl opacity-70 hover:opacity-100 hover:scale-110 transition-all">🔄</button>
                <a href="index.html" class="text-3xl opacity-70 hover:opacity-100 hover:scale-110 transition-all">🏠</a>
            </div>
        </div>
        <input type="text" id="search-box" class="input-box" placeholder="ค้นหา..." oninput="filterData()">
    </div>
    <div id="owner-list" class="flex-1 overflow-y-auto px-1"></div>
    <div class="p-4 bg-black/20">
        <button onclick="createNewForm()" class="w-full bg-teal-600 hover:bg-teal-500 text-white font-black py-4 rounded-xl text-lg shadow-lg transition-all">
            + ลงทะเบียนใหม่
        </button>
    </div>
</aside>

<main class="flex-1 overflow-y-auto p-10 bg-[#020617]" id="form-view">
    <div class="h-full flex flex-col items-center justify-center opacity-10">
        <div class="text-9xl mb-4">📋</div>
        <h3 class="text-3xl font-bold">เลือกรายชื่อจากด้านซ้ายเพื่อแก้ไข</h3>
    </div>
</main>

</div>

<script>
let allAnimals=[],allOwners=[],allPhones=[];

function removePrefix(name){return name?name.replace(/^(นาย|นางสาว|นาง|เด็กชาย|เด็กหญิง|คุณ|ด\.ช\.|ด\.ญ\.)/g,"").trim():"-";}

async function loadData(){
const [o,a,p]=await Promise.all([
db.from('owners').select('*').order('hn',{ascending:false}),
db.from('animals').select('*'),
db.from('owner_phones').select('*')
]);
allOwners=o.data||[];
allAnimals=a.data||[];
allPhones=p.data||[];
renderSidebar(allOwners);
}

function renderSidebar(list){
document.getElementById("owner-list").innerHTML=list.map(o=>{
const phone=allPhones.find(p=>p.owner_hn===o.hn&&p.label==='เบอร์หลัก')?.phone_number||'-';
return `<div class="pet-card" onclick="editOwner('${o.hn}')" id="hn-${o.hn}">
<div class="font-bold text-blue-400">#${o.hn}</div>
<div>👤</div>
<div class="info-group">
<span class="font-bold">${removePrefix(o.owner_name)}</span>
</div>
<div class="phone-text">${phone}</div>
</div>`;
}).join("");
}

//////////////////////////////////////////////////
// MERGE SAFE VERSION
//////////////////////////////////////////////////

function showMergeTool(){

let duplicates=[];
let used=new Set();

allOwners.forEach(o1=>{
if(used.has(o1.hn))return;

const clean1=removePrefix(o1.owner_name).replace(/\s+/g,'');
const phones1=allPhones.filter(p=>p.owner_hn===o1.hn).map(p=>p.phone_number);

const match=allOwners.filter(o2=>{
if(o1.hn===o2.hn)return false;
const clean2=removePrefix(o2.owner_name).replace(/\s+/g,'');
const phones2=allPhones.filter(p=>p.owner_hn===o2.hn).map(p=>p.phone_number);
return (clean1&&clean1===clean2)||(phones1.some(ph=>phones2.includes(ph)));
});

if(match.length){
duplicates.push([o1,...match]);
[o1,...match].forEach(x=>used.add(x.hn));
}
});

const view=document.getElementById("form-view");

if(!duplicates.length){
view.innerHTML="<h2 class='text-2xl text-center mt-20'>✅ ไม่พบข้อมูลซ้ำ</h2>";
return;
}

view.innerHTML=`
<div class="max-w-4xl mx-auto space-y-6">
<h2 class="text-3xl font-black text-teal-400">รวมข้อมูลซ้ำ</h2>
${duplicates.map((group,i)=>{
const sorted=[...group].sort((a,b)=>parseInt(a.hn)-parseInt(b.hn));
const target=sorted[0].hn;
const sources=sorted.slice(1).map(o=>o.hn).join(",");
return `
<div class="merge-item">
<div class="flex justify-between mb-3">
<div>กลุ่ม ${i+1} | HN หลัก ${target}</div>
<button onclick="executeMerge('${target}','${sources}')" class="bg-orange-600 px-4 py-2 rounded-lg font-bold">
🚀 ยุบรวมข้อมูล
</button>
</div>
${sorted.map(o=>`<div>HN ${o.hn} - ${o.owner_name}</div>`).join("")}
</div>`;
}).join("")}
</div>`;
}

async function executeMerge(targetHN,sourceString){

if(!sourceString)return alert("ไม่มี HN ที่ต้องรวม");

const sourceHNs=sourceString.split(",");

if(!confirm("ยืนยันการรวมข้อมูล?"))return;

try{
for(const sHN of sourceHNs){

await db.from('animals').update({owner_hn:targetHN}).eq('owner_hn',sHN);
await db.from('owner_phones').update({owner_hn:targetHN}).eq('owner_hn',sHN);
await db.from('owners').delete().eq('hn',sHN);

}

alert("✅ รวมข้อมูลสำเร็จ");
await loadData();
editOwner(targetHN);

}catch(err){
alert("เกิดข้อผิดพลาด: "+err.message);
}
}

//////////////////////////////////////////////////

function filterData(){
const t=document.getElementById("search-box").value.toLowerCase();
renderSidebar(allOwners.filter(o=>o.owner_name.toLowerCase().includes(t)||o.hn.includes(t)));
}

function createNewForm(){}
function editOwner(hn){}

window.onload=async()=>{
if(sessionStorage.getItem("isLoggedIn")!=="true"){window.location.href="index.html";return;}
await loadData();
};
</script>

</body>
</html>
