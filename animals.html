<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ประวัติการรักษา | PK-VMS Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>

    <style>
        :root {
            --navy: #0b1929;
            --navy-light: #112240;
            --teal: #14b8b1;
            --border: rgba(255, 255, 255, 0.1);
        }
        * { font-family: "Sarabun", sans-serif !important; }
        body { background: var(--navy); color: #e2e8f0; min-height: 100vh; }
        .input-box { 
            background: rgba(0,0,0,0.3); border: 1px solid var(--border); 
            border-radius: 10px; padding: 10px 15px; color: white; width: 100%; outline: none;
        }
        .input-box:focus { border-color: var(--teal); }
        .glass-card {
            background: rgba(17, 34, 64, 0.6); backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 24px;
        }
        .btn-action {
            transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px;
            padding: 8px 16px; border-radius: 12px; font-weight: 600;
        }
        .btn-action:active { transform: scale(0.95); }
    </style>
</head>
<body class="p-6 md:p-10">

    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <div>
                <button onclick="history.back()" class="text-teal-400 hover:text-white mb-2 flex items-center gap-2">
                    ⬅️ ย้อนกลับ
                </button>
                <h1 class="text-3xl font-black text-white">🏥 ประวัติการรักษาและข้อมูลเวชระเบียน</h1>
            </div>
            <div class="flex gap-3">
                <button onclick="readSmartCardRecord()" id="btn-read-card" class="btn-action bg-blue-600/20 text-blue-400 border border-blue-500/50 hover:bg-blue-600 hover:text-white">
                    🪪 อ่านบัตรประชาชน
                </button>
                <button onclick="location.reload()" class="btn-action bg-white/5 text-white hover:bg-white/10">
                    🔄 รีเฟรช
                </button>
            </div>
        </div>

        <div class="grid grid-cols-12 gap-8">
            <div class="col-span-12 lg:col-span-4 space-y-6">
                <div class="glass-card p-6">
                    <h3 class="text-lg font-bold text-teal-400 mb-6 flex items-center gap-2">👤 ข้อมูลเจ้าของ</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="text-xs text-slate-500 uppercase font-bold">HN</label>
                            <input type="text" id="f_hn" class="input-box text-teal-400 font-black" readonly>
                        </div>
                        <div>
                            <label class="text-xs text-slate-500 uppercase font-bold">ชื่อเจ้าของ</label>
                            <input type="text" id="f_owner_name" class="input-box">
                        </div>
                        <div>
                            <label class="text-xs text-slate-500 uppercase font-bold">ที่อยู่จากบัตร</label>
                            <textarea id="f_address" class="input-box h-24 text-sm"></textarea>
                        </div>
                        <button onclick="updateOwnerInfo()" class="w-full bg-teal-600 py-3 rounded-xl font-bold text-navy hover:bg-teal-400 transition-all">
                            💾 อัปเดตข้อมูลเจ้าของ
                        </button>
                    </div>
                </div>

                <div id="pet-info-card" class="glass-card p-6 border-l-4 border-l-yellow-500">
                    </div>
            </div>

            <div class="col-span-12 lg:col-span-8">
                <div class="glass-card p-8 min-h-[600px]">
                    <div class="flex justify-between items-center mb-8">
                        <h3 class="text-xl font-bold text-white">📅 บันทึกการตรวจรักษา</h3>
                        <button onclick="openVisitModal()" class="btn-action bg-teal-500 text-navy font-black">
                            ➕ เพิ่มบันทึกใหม่
                        </button>
                    </div>

                    <div id="visit-history" class="space-y-6">
                        <div class="text-center py-20 opacity-20">
                            <span class="text-6xl">📁</span>
                            <p class="mt-4">ยังไม่มีประวัติการรักษา</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const petId = urlParams.get('id');
        const ownerHn = urlParams.get('hn');

        window.onload = async () => {
            if (!petId || !ownerHn) return alert("ไม่พบข้อมูลสัตว์");
            await loadMedicalData();
        };

        async function loadMedicalData() {
            try {
                // 1. ดึงข้อมูลเจ้าของ
                const { data: owner } = await db.from('owners').select('*').eq('hn', ownerHn).single();
                if (owner) {
                    document.getElementById('f_hn').value = owner.hn;
                    document.getElementById('f_owner_name').value = owner.owner_name;
                    document.getElementById('f_address').value = owner.address || '';
                }

                // 2. ดึงข้อมูลสัตว์
                const { data: pet } = await db.from('animals').select('*').eq('id', petId).single();
                if (pet) {
                    const icon = pet.pet_type === 'สุนัข' ? '🐶' : '🐱';
                    document.getElementById('pet-info-card').innerHTML = `
                        <div class="flex items-center gap-4 mb-4">
                            <div class="text-4xl">${icon}</div>
                            <div>
                                <h4 class="text-2xl font-black text-white">${pet.pet_name}</h4>
                                <p class="text-slate-400 text-sm">${pet.breed || 'ไม่ระบุสายพันธุ์'}</p>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4 text-sm">
                            <div class="bg-black/20 p-2 rounded">
                                <span class="block text-slate-500 text-[10px]">เพศ</span>
                                <span class="font-bold">${pet.gender}</span>
                            </div>
                            <div class="bg-black/20 p-2 rounded">
                                <span class="block text-slate-500 text-[10px]">น้ำหนักล่าสุด</span>
                                <span class="font-bold text-yellow-400">${pet.weight} กก.</span>
                            </div>
                        </div>
                    `;
                }

                // 3. ดึงประวัติ Visit (สมมติว่ามี Table ชื่อ medical_visits)
                const { data: visits } = await db.from('medical_visits')
                    .select('*')
                    .eq('pet_id', petId)
                    .order('visit_date', { ascending: false });
                
                if(visits && visits.length > 0) renderVisits(visits);

            } catch (e) { console.error(e); }
        }

        /* ── ฟังก์ชันอ่านบัตรประชาชน ── */
        async function readSmartCardRecord() {
            const btn = document.getElementById('btn-read-card');
            const originalText = btn.innerHTML;
            try {
                btn.disabled = true;
                btn.innerHTML = "⏳ กำลังอ่าน...";

                const res = await fetch('http://127.0.0.1:8080/read');
                const result = await res.json();

                if (result.status === "success") {
                    const p = result.data;
                    const fullName = `${p.prefix}${p.firstname} ${p.lastname}`.replace(/\s+/g, ' ').trim();
                    const cleanAddress = p.address.replace(/\s+/g, ' ').trim();

                    document.getElementById('f_owner_name').value = fullName;
                    document.getElementById('f_address').value = cleanAddress;
                    
                    // แจ้งเตือนสถานะแบบ Soft
                    btn.classList.replace('bg-blue-600/20', 'bg-teal-600/20');
                    btn.innerHTML = "✅ อ่านสำเร็จ";
                    setTimeout(() => {
                        btn.innerHTML = originalText;
                        btn.classList.replace('bg-teal-600/20', 'bg-blue-600/20');
                    }, 2000);
                } else {
                    alert("❌ " + result.message);
                }
            } catch (e) {
                alert("❌ โปรดเปิดโปรแกรม Python Agent ก่อนใช้งาน");
            } finally {
                btn.disabled = false;
            }
        }

        async function updateOwnerInfo() {
            const name = document.getElementById('f_owner_name').value;
            const addr = document.getElementById('f_address').value;
            
            const { error } = await db.from('owners').update({ 
                owner_name: name, 
                address: addr,
                updated_at: new Date()
            }).eq('hn', ownerHn);

            if (error) alert("เกิดข้อผิดพลาด: " + error.message);
            else alert("✅ อัปเดตข้อมูลสำเร็จ");
        }

        function renderVisits(visits) {
            const container = document.getElementById('visit-history');
            container.innerHTML = visits.map(v => `
                <div class="border-l-2 border-teal-500 pl-6 pb-6 relative">
                    <div class="absolute w-3 h-3 bg-teal-500 rounded-full -left-[7px] top-1 shadow-[0_0_10px_#14b8b1]"></div>
                    <div class="text-xs text-slate-500 font-bold mb-1">${new Date(v.visit_date).toLocaleDateString('th-TH')}</div>
                    <div class="bg-white/5 p-4 rounded-xl border border-white/5">
                        <h5 class="font-bold text-teal-400 mb-2">${v.diagnosis || 'ไม่ระบุอาการ'}</h5>
                        <p class="text-sm text-slate-300 leading-relaxed">${v.treatment || '-'}</p>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
