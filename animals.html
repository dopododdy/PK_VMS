<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <title>จัดการเวชระเบียน | PK-VMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <style>
        :root { 
            --navy: #0b1929; --navy-mid: #112240; --teal: #14b8b1; 
            --hn-bg: #3b82f6; /* สีน้ำเงินสว่างสำหรับ HN */
            --border: rgba(255,255,255,0.1);
        }
        body { font-family: "Sarabun", sans-serif; background: var(--navy); color: #e2e8f0; margin: 0; overflow: hidden; }
        
        .sidebar-container { background: rgba(17, 34, 64, 0.6); backdrop-filter: blur(25px); border-right: 2px solid var(--border); width: 780px; }
        
        .animal-item { background: rgba(255,255,255,0.05); border: 2px solid transparent; border-radius: 12px; padding: 0.8rem 1.2rem; cursor: pointer; margin-bottom: 0.6rem; display: flex; align-items: center; gap: 1.25rem; }
        .animal-item:hover { background: rgba(20, 184, 177, 0.1); border-color: var(--teal); }
        .animal-item.active { border-color: var(--teal); background: rgba(20, 184, 177, 0.2); }

        /* ปรับสี HN ใหม่ */
        .hn-badge { background: var(--hn-bg); color: white; font-weight: 800; padding: 2px 10px; border-radius: 8px; font-size: 0.9rem; min-width: 80px; text-align: center; }

        .input-box { background: rgba(0,0,0,0.3); border: 2px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 10px 15px; color: white; width: 100%; font-size: 1.2rem; outline: none; }
        .input-box:focus { border-color: var(--teal); }
        
        .pet-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 25px; border-radius: 20px; margin-bottom: 15px; position: relative; }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: var(--teal); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="flex h-screen overflow-hidden">
        
        <aside class="sidebar-container flex flex-col shadow-2xl">
            <div class="p-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-3xl font-black text-white">เวชระเบียนสัตว์</h2>
                    <div class="flex gap-4">
                        <button onclick="loadData()" class="text-2xl hover:rotate-180 transition-all duration-500">🔄</button>
                        <a href="index.html" class="text-3xl">🏠</a>
                    </div>
                </div>
                <input type="text" id="search-box" class="w-full bg-black/40 border-2 border-teal-500/50 rounded-xl p-4 text-xl text-white outline-none" placeholder="🔍 ค้นหา: ชื่อสัตว์, เจ้าของ, เบอร์โทร..." oninput="filterAnimals()">
            </div>

            <div id="animal-list" class="flex-1 overflow-y-auto px-4 pb-4"></div>

            <div class="p-4 bg-navy/40 border-t border-white/10">
                <button onclick="createNewForm()" class="w-full bg-teal-600 hover:bg-teal-500 text-white font-black py-5 rounded-xl text-2xl shadow-lg transition-all active:scale-95">
                    + ลงทะเบียนรายใหม่
                </button>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-12 bg-black/10" id="form-view">
            <div class="h-full flex flex-col items-center justify-center opacity-20 text-center">
                <div class="text-[12rem] mb-4">📋</div>
                <h3 class="text-4xl font-black">เลือกเจ้าของเพื่อจัดการข้อมูล</h3>
            </div>
        </main>
    </div>

    <script>
        let allAnimals = []; let allOwners = []; let allPhones = [];

        window.onload = async () => {
            if (sessionStorage.getItem("isLoggedIn") !== "true") { window.location.href = "index.html"; return; }
            await loadData();
        };

        async function loadData() {
            const [resA, resO, resP] = await Promise.all([
                db.from('animals').select('*').order('created_at', { ascending: false }),
                db.from('owners').select('*'),
                db.from('owner_phones').select('*')
            ]);
            allAnimals = resA.data || []; allOwners = resO.data || []; allPhones = resP.data || [];
            renderList(allAnimals);
        }

        function renderList(list) {
            const container = document.getElementById('animal-list');
            container.innerHTML = list.map(pet => {
                const owner = allOwners.find(o => o.hn === pet.owner_hn) || { owner_name: '-' };
                const phones = allPhones.filter(p => p.owner_hn === pet.owner_hn).map(p => p.phone_number).join(', ');
                const typeIcon = (pet.pet_type === 'แมว') ? '🐱' : (pet.pet_type === 'สุนัข' ? '🐶' : '🐾');
                return `
                    <div class="animal-item" onclick="editOwner('${pet.owner_hn}')" id="hn-${pet.owner_hn}">
                        <div class="text-4xl">${typeIcon}</div>
                        <span class="hn-badge">HN ${pet.owner_hn}</span>
                        <div class="text-2xl font-black text-white w-40 truncate">${pet.pet_name}</div>
                        <div class="text-xl text-gray-300 w-40 truncate">👤 ${owner.owner_name}</div>
                        <div class="text-teal-400 font-bold flex-1 truncate text-lg">📞 ${phones}</div>
                    </div>`;
            }).join('');
        }

        function createNewForm() { renderForm({ hn: '', owner_name: '', address: '' }, []); }

        function editOwner(hn) {
            document.querySelectorAll('.animal-item').forEach(el => el.classList.remove('active'));
            if(document.getElementById(`hn-${hn}`)) document.getElementById(`hn-${hn}`).classList.add('active');
            const owner = allOwners.find(o => o.hn === hn);
            const pets = allAnimals.filter(a => a.owner_hn === hn);
            const phones = allPhones.filter(p => p.owner_hn === hn);
            renderForm(owner, pets, phones);
        }

        function renderForm(owner, pets, phones = []) {
            const formView = document.getElementById('form-view');
            const p1 = phones[0]?.phone_number || '';
            const p2 = phones[1]?.phone_number || '';

            formView.innerHTML = `
                <div class="max-w-6xl mx-auto bg-navy-mid/80 p-10 rounded-[40px] border border-white/10 shadow-2xl animate-in fade-in duration-500">
                    <h2 class="text-4xl font-black text-white mb-8 flex items-center gap-4">📂 ข้อมูลเจ้าของ & สัตว์เลี้ยง</h2>
                    
                    <div class="grid grid-cols-2 gap-6 mb-10">
                        <div><label class="text-gray-400 font-bold mb-2 block">HN *</label>
                            <input type="text" id="f_hn" class="input-box" value="${owner.hn}" ${owner.hn ? 'readonly disabled' : ''}></div>
                        <div><label class="text-gray-400 font-bold mb-2 block">ชื่อเจ้าของ *</label>
                            <input type="text" id="f_owner_name" class="input-box" value="${owner.owner_name}"></div>
                        <div><label class="text-gray-400 font-bold mb-2 block">เบอร์โทร 1 *</label>
                            <input type="tel" id="f_phone1" class="input-box" value="${p1}"></div>
                        <div><label class="text-gray-400 font-bold mb-2 block">เบอร์โทร 2</label>
                            <input type="tel" id="f_phone2" class="input-box" value="${p2}"></div>
                        <div class="col-span-2"><label class="text-gray-400 font-bold mb-2 block">ที่อยู่</label>
                            <input type="text" id="f_address" class="input-box" value="${owner.address || ''}"></div>
                    </div>

                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-3xl font-black text-teal-400">🐾 สัตว์เลี้ยงใน HN นี้</h3>
                        <button onclick="addPetRow()" class="bg-teal-500 text-navy px-6 py-2 rounded-xl font-bold">+ เพิ่มสัตว์</button>
                    </div>

                    <div id="pets-container" class="space-y-4">
                        ${pets.length ? pets.map((p, i) => petRowHtml(p, i)).join('') : petRowHtml({}, 0)}
                    </div>

                    <button onclick="saveAllData()" class="w-full bg-teal-600 hover:bg-teal-500 text-white font-black py-6 rounded-3xl text-3xl mt-10 shadow-2xl transition-all">
                        💾 บันทึกข้อมูลทั้งหมด
                    </button>
                </div>`;
        }

        function petRowHtml(pet, index) {
            return `
                <div class="pet-card group animate-in slide-in-from-right duration-300">
                    <div class="grid grid-cols-12 gap-4">
                        <div class="col-span-3">
                            <label class="text-xs text-gray-500">ชื่อสัตว์ / ชนิด / เพศ</label>
                            <input type="text" class="input-box p_name mb-2" value="${pet.pet_name || ''}" placeholder="ชื่อสัตว์">
                            <div class="flex gap-2">
                                <select class="input-box p_type text-sm p-1"><option value="สุนัข" ${pet.pet_type==='สุนัข'?'selected':''}>สุนัข</option><option value="แมว" ${pet.pet_type==='แมว'?'selected':''}>แมว</option></select>
                                <select class="input-box p_gender text-sm p-1"><option value="ตัวผู้" ${pet.gender==='ตัวผู้'?'selected':''}>♂️ ผู้</option><option value="ตัวเมีย" ${pet.gender==='ตัวเมีย'?'selected':''}>♀️ เมีย</option></select>
                            </div>
                        </div>
                        <div class="col-span-3">
                            <label class="text-xs text-gray-500">วันเกิด / อายุ (ระบบจะคำนวณให้)</label>
                            <input type="date" class="input-box p_dob mb-2" value="${pet.birth_date || ''}" onchange="calcAge(this)">
                            <div class="flex gap-1 items-center">
                                <input type="number" class="input-box p_age_y text-sm w-1/2" placeholder="ปี" oninput="calcDOB(this)">
                                <input type="number" class="input-box p_age_m text-sm w-1/2" placeholder="เดือน" oninput="calcDOB(this)">
                            </div>
                        </div>
                        <div class="col-span-3">
                            <label class="text-xs text-gray-500">โรคประจำตัว / แพ้ยา</label>
                            <textarea class="input-box p_congenital h-20 text-sm" placeholder="เช่น โรคหัวใจ, แพ้ Penicillin">${pet.congenital_disease || ''}</textarea>
                        </div>
                        <div class="col-span-2">
                            <label class="text-xs text-gray-500">น้ำหนักล่าสุด (กก.)</label>
                            <input type="number" step="0.1" class="input-box p_weight" value="${pet.weight || ''}">
                        </div>
                    </div>
                    <button onclick="this.parentElement.remove()" class="absolute -right-3 -top-3 bg-red-500 text-white w-8 h-8 rounded-full font-bold opacity-0 group-hover:opacity-100 transition-opacity">✕</button>
                </div>`;
        }

        // --- Logic คำนวณอายุ ---
        function calcAge(el) {
            const row = el.closest('.pet-card');
            if(!el.value) return;
            const birth = new Date(el.value);
            const now = new Date();
            let years = now.getFullYear() - birth.getFullYear();
            let months = now.getMonth() - birth.getMonth();
            if (months < 0) { years--; months += 12; }
            row.querySelector('.p_age_y').value = years;
            row.querySelector('.p_age_m').value = months;
        }

        function calcDOB(el) {
            const row = el.closest('.pet-card');
            const y = parseInt(row.querySelector('.p_age_y').value) || 0;
            const m = parseInt(row.querySelector('.p_age_m').value) || 0;
            if (y === 0 && m === 0) return;
            const d = new Date();
            d.setFullYear(d.getFullYear() - y);
            d.setMonth(d.getMonth() - m);
            row.querySelector('.p_dob').value = d.toISOString().split('T')[0];
        }

        async function saveAllData() {
            const hn = document.getElementById('f_hn').value;
            const owner_name = document.getElementById('f_owner_name').value;
            if (!hn || !owner_name) return alert("กรุณาระบุ HN และชื่อเจ้าของ");

            try {
                await db.from('owners').upsert({ hn, owner_name, address: document.getElementById('f_address').value });
                await db.from('owner_phones').delete().eq('owner_hn', hn);
                const phones = [];
                if (document.getElementById('f_phone1').value) phones.push({ owner_hn: hn, phone_number: document.getElementById('f_phone1').value });
                if (document.getElementById('f_phone2').value) phones.push({ owner_hn: hn, phone_number: document.getElementById('f_phone2').value });
                if (phones.length) await db.from('owner_phones').insert(phones);

                await db.from('animals').delete().eq('owner_hn', hn);
                const petEntries = Array.from(document.querySelectorAll('.pet-card')).map(card => ({
                    owner_hn: hn,
                    pet_name: card.querySelector('.p_name').value,
                    pet_type: card.querySelector('.p_type').value,
                    gender: card.querySelector('.p_gender').value,
                    birth_date: card.querySelector('.p_dob').value,
                    congenital_disease: card.querySelector('.p_congenital').value,
                    weight: parseFloat(card.querySelector('.p_weight').value) || 0
                })).filter(p => p.pet_name);

                if (petEntries.length) await db.from('animals').insert(petEntries);
                alert("บันทึกสำเร็จ!"); loadData();
            } catch (err) { alert(err.message); }
        }

        function filterAnimals() {
            const term = document.getElementById('search-box').value.toLowerCase();
            const filtered = allAnimals.filter(pet => {
                const owner = allOwners.find(o => o.hn === pet.owner_hn) || {};
                const phones = allPhones.filter(p => p.owner_hn === pet.owner_hn).map(p => p.phone_number).join(' ');
                return pet.pet_name.toLowerCase().includes(term) || pet.owner_hn.toLowerCase().includes(term) || (owner.owner_name && owner.owner_name.toLowerCase().includes(term)) || phones.includes(term);
            });
            renderList(filtered);
        }
    </script>
</body>
</html>
