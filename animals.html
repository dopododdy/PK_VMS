<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <title>เวชระเบียนสัตว์ป่วย | PK-VMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>

    <style>
        :root { --navy: #0b1929; --navy-mid: #112240; --teal: #14b8b1; --white-bright: #ffffff; }
        body { font-family: "Sarabun", sans-serif; background: var(--navy); color: var(--white-bright); height: 100vh; overflow: hidden; }
        
        /* สไตล์ Input & Select */
        .form-input { 
            background: rgba(255,255,255,0.08); border: 1.5px solid rgba(255,255,255,0.2); 
            border-radius: 10px; padding: 8px 12px; width: 100%; color: white; outline: none; font-size: 0.95rem;
        }
        .form-input:focus { border-color: var(--teal); background: rgba(255,255,255,0.12); }
        select.form-input option { background: #112240; color: white; }

        .form-label { display: block; font-weight: 600; color: #94a3b8; margin-bottom: 4px; font-size: 0.85rem; }
        
        /* Layout Customization */
        .scroll-container { scrollbar-width: thin; scrollbar-color: rgba(20, 184, 177, 0.3) transparent; }
        .scroll-container::-webkit-scrollbar { width: 6px; }
        .scroll-container::-webkit-scrollbar-thumb { background: rgba(20, 184, 177, 0.3); border-radius: 10px; }

        .pet-entry { background: rgba(20, 184, 177, 0.05); border: 1px solid rgba(20, 184, 177, 0.2); padding: 15px; border-radius: 12px; position: relative; }
        tr.selectable { cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }
        tr.selectable:hover { background: rgba(20, 184, 177, 0.1); }
        .active-row { background: rgba(20, 184, 177, 0.2) !important; border-left: 4px solid var(--teal); }
    </style>
</head>
<body class="flex flex-col">

    <header class="h-16 flex items-center justify-between px-6 bg-navy-mid border-b border-white/10 shrink-0">
        <div class="flex items-center gap-3">
            <span class="text-2xl">🐾</span>
            <h1 class="text-xl font-bold tracking-tight">เวชระเบียนสัตว์ป่วย <span class="text-teal-500 text-sm ml-2 font-normal">PK-VMS</span></h1>
        </div>
        <div class="flex items-center gap-3">
            <a href="index.html" class="text-sm bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-lg transition">🏠 หน้าหลัก</a>
            <button id="btn-add-new" onclick="clearFormAndOpen()" class="bg-teal-600 hover:bg-teal-500 px-5 py-2 rounded-lg font-bold text-sm shadow-lg transition">+ เพิ่มเคสใหม่</button>
        </div>
    </header>

    <main class="flex flex-1 overflow-hidden">
        
        <section class="w-full md:w-[40%] flex flex-col border-r border-white/10 bg-navy/50">
            <div class="p-4 bg-navy-mid/30">
                <div class="relative">
                    <input type="text" id="search" oninput="fetchRecords()" class="form-input pl-10 py-3" placeholder="ค้นหา HN, ชื่อสัตว์, ชื่อเจ้าของ...">
                    <span class="absolute left-3 top-3 opacity-40">🔍</span>
                </div>
            </div>
            
            <div class="flex-1 overflow-y-auto scroll-container">
                <table class="w-full text-left border-collapse">
                    <thead class="sticky top-0 bg-navy-mid text-xs uppercase text-gray-400">
                        <tr>
                            <th class="p-3">HN / สัตว์เลี้ยง</th>
                            <th class="p-3">เจ้าของ / เบอร์โทร</th>
                        </tr>
                    </thead>
                    <tbody id="animal-list" class="text-sm">
                        </tbody>
                </table>
            </div>
        </section>

        <section id="form-container" class="hidden w-full md:w-[60%] flex flex-col bg-navy-mid/20">
            <div class="p-6 overflow-y-auto flex-1 scroll-container">
                <form id="main-form" onsubmit="saveData(event)">
                    
                    <div class="mb-8">
                        <div class="flex justify-between items-end mb-4 border-b border-teal-500/30 pb-2">
                            <h2 class="text-xl font-bold text-teal-400 flex items-center gap-2">
                                👤 ข้อมูลเจ้าของ <span id="mode-text" class="text-xs font-normal text-gray-500"></span>
                            </h2>
                            <div class="text-right">
                                <span class="form-label !mb-0 text-[10px]">HN (เวชระเบียน)</span>
                                <input type="text" id="hn" class="bg-transparent text-2xl font-black text-teal-400 outline-none text-right w-32" readonly placeholder="AUTO">
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                            <div>
                                <label class="form-label">ชื่อเจ้าของ</label>
                                <input type="text" id="owner_name" class="form-input" required placeholder="ชื่อ-นามสกุล">
                            </div>
                            <div>
                                <label class="form-label">ที่อยู่</label>
                                <input type="text" id="address" class="form-input" placeholder="บ้านเลขที่, ตำบล, อำเภอ">
                            </div>
                        </div>

                        <label class="form-label">เบอร์โทรศัพท์ติดต่อ</label>
                        <div id="phone-container" class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-2">
                            </div>
                        <button type="button" onclick="addPhoneField()" class="text-teal-500 text-xs font-bold hover:underline">+ เพิ่มเบอร์สำรอง</button>
                    </div>

                    <div class="mb-6">
                        <h2 class="text-xl font-bold text-white mb-4 flex items-center gap-2">
                            <span class="w-1.5 h-5 bg-teal-500 rounded-full"></span> 
                            ข้อมูลสัตว์เลี้ยง <span class="text-xs font-normal text-gray-500">(เพิ่มได้หลายตัวพร้อมกัน)</span>
                        </h2>
                        <div id="pet-container" class="space-y-4">
                            </div>
                        <button type="button" onclick="addPetField()" class="mt-4 w-full py-3 border-2 border-dashed border-white/10 rounded-xl text-gray-400 font-bold hover:border-teal-500/50 hover:text-teal-400 transition">
                            + เพิ่มช่องกรอกสัตว์เลี้ยงตัวใหม่
                        </button>
                    </div>

                    <div class="flex justify-end gap-4 mt-10 pt-6 border-t border-white/10">
                        <button type="button" onclick="closeForm()" class="px-6 py-2 text-gray-400 hover:text-white font-bold">ยกเลิก</button>
                        <button type="submit" class="bg-teal-600 hover:bg-teal-500 text-white px-12 py-3 rounded-xl font-black text-lg shadow-xl shadow-teal-900/20">💾 บันทึกข้อมูลทั้งหมด</button>
                    </div>
                </form>
            </div>
        </section>

        <section id="empty-state" class="w-full md:w-[60%] flex flex-col items-center justify-center text-gray-500 bg-navy-mid/10">
            <div class="text-6xl mb-4 opacity-20">🏥</div>
            <p class="text-lg">กรุณาค้นหาและเลือกเจ้าของจากด้านซ้าย</p>
            <p class="text-sm">หรือกดปุ่มด้านบนเพื่อ "เพิ่มเคสใหม่"</p>
        </section>

    </main>

    <script>
        let petCount = 0;
        let phoneCount = 0;
        const breedData = {
            "สุนัข": ["ไทย", "โกลเด้น รีทรีฟเวอร์", "ไซบีเรียน ฮัสกี้", "ปอมเมอเรเนียน", "พุดเดิ้ล", "ชิสุ", "บีเกิล", "อื่นๆ"],
            "แมว": ["ไทย", "เปอร์เซีย", "สก็อตติช โฟลด์", "บริติช ชอร์ตแฮร์", "วิเชียรมาศ", "เบงกอล", "อเมริกัน ชอร์ตแฮร์", "เมนคูน", "อื่นๆ"]
        };

        // --- ระบบ Layout & UI Control ---
        function clearFormAndOpen() {
            document.getElementById('main-form').reset();
            document.getElementById('hn').value = '';
            document.getElementById('phone-container').innerHTML = '';
            document.getElementById('pet-container').innerHTML = '';
            document.getElementById('mode-text').innerText = "(สร้าง HN ใหม่)";
            phoneCount = 0; petCount = 0;
            
            openForm();
            genNewHN();
            addPhoneField();
            addPetField();
        }

        function openForm() {
            document.getElementById('form-container').classList.remove('hidden');
            document.getElementById('empty-state').classList.add('hidden');
            document.getElementById('btn-add-new').classList.add('hidden'); // ซ่อนปุ่มเมื่อเปิดฟอร์ม
        }

        function closeForm() {
            document.getElementById('form-container').classList.add('hidden');
            document.getElementById('empty-state').classList.remove('hidden');
            document.getElementById('btn-add-new').classList.remove('hidden'); // แสดงปุ่มเมื่อปิดฟอร์ม
            document.querySelectorAll('.selectable').forEach(el => el.classList.remove('active-row'));
        }

        // --- ระบบเลือกเจ้าของ ---
        function selectOwner(hn, name, address, phonesJson, event) {
            // ไฮไลท์แถวที่เลือก
            document.querySelectorAll('.selectable').forEach(el => el.classList.remove('active-row'));
            event.currentTarget.classList.add('active-row');

            const phones = JSON.parse(decodeURIComponent(phonesJson));
            document.getElementById('hn').value = hn;
            document.getElementById('owner_name').value = name;
            document.getElementById('address').value = address;
            document.getElementById('mode-text').innerText = "(เลือกจากฐานข้อมูล)";

            document.getElementById('phone-container').innerHTML = '';
            phoneCount = 0;
            if (phones.length > 0) phones.forEach(p => addPhoneField(p.phone_number, p.label));
            else addPhoneField();

            // เตรียมเพิ่มสัตว์ตัวใหม่ (ล้างฟิลด์สัตว์ตัวเก่า)
            document.getElementById('pet-container').innerHTML = '';
            petCount = 0;
            addPetField();

            openForm();
        }

        // --- ฟังก์ชันเสริม (Input Fields) ---
        function addPhoneField(value = '', label = 'เบอร์หลัก') {
            phoneCount++;
            const html = `
                <div class="flex gap-2" id="phone-row-${phoneCount}">
                    <input type="text" name="owner_phone" value="${value}" class="form-input flex-[3]" placeholder="08xxxxxxxx" required>
                    <input type="text" name="phone_label" value="${label}" class="form-input flex-[2]" placeholder="เจ้าของเบอร์">
                    ${phoneCount > 1 ? `<button type="button" onclick="this.parentElement.remove()" class="text-red-400 px-1">✕</button>` : ''}
                </div>`;
            document.getElementById('phone-container').insertAdjacentHTML('beforeend', html);
        }

        function addPetField() {
            petCount++;
            const petHtml = `
                <div id="pet-row-${petCount}" class="pet-entry">
                    <button type="button" onclick="this.parentElement.remove()" class="absolute top-2 right-3 text-red-400 text-xs hover:underline">ลบออก</button>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="col-span-2 md:col-span-1">
                            <label class="form-label">ชื่อสัตว์</label>
                            <input type="text" name="pet_name" class="form-input" required>
                        </div>
                        <div class="col-span-1 md:col-span-1">
                            <label class="form-label">ชนิด</label>
                            <select name="pet_type" class="form-input" onchange="updateBreed(this)">
                                <option value="แมว">🐱 แมว</option><option value="สุนัข">🐶 สุนัข</option><option value="อื่นๆ">อื่นๆ</option>
                            </select>
                        </div>
                        <div class="col-span-1">
                            <label class="form-label">เพศ</label>
                            <select name="gender" class="form-input">
                                <option value="ผู้">♂️ ผู้</option><option value="เมีย">♀️ เมีย</option>
                                <option value="ผู้ตอน">♂️ ผู้ตอน</option><option value="เมียหมัน">♀️ เมียหมัน</option>
                            </select>
                        </div>
                        <div class="col-span-1">
                            <label class="form-label">พันธุ์</label>
                            <select name="breed" class="form-input"></select>
                        </div>
                    </div>
                </div>`;
            document.getElementById('pet-container').insertAdjacentHTML('beforeend', petHtml);
            updateBreed(document.querySelector(`#pet-row-${petCount} select[name="pet_type"]`));
        }

        function updateBreed(selectEl) {
            const type = selectEl.value.includes('แมว') ? 'แมว' : selectEl.value.includes('สุนัข') ? 'สุนัข' : 'อื่นๆ';
            const breedSelect = selectEl.parentElement.parentElement.querySelector('select[name="breed"]');
            breedSelect.innerHTML = (breedData[type] || ["อื่นๆ"]).map(b => `<option value="${b}">${b}</option>`).join('');
        }

        // --- Data Logic (Fetch & Save) ---
        async function fetchRecords() {
            const search = document.getElementById('search').value.trim();
            let query = db.from('animals').select('*, owners(*, owner_phones(*))');
            if (search) query = query.or(`pet_name.ilike.%${search}%,owner_hn.ilike.%${search}%,owners.owner_name.ilike.%${search}%`);
            const { data } = await query.order('created_at', { ascending: false }).limit(30);
            
            document.getElementById('animal-list').innerHTML = (data || []).map(item => {
                const phones = item.owners?.owner_phones || [];
                const phonesJson = encodeURIComponent(JSON.stringify(phones));
                return `
                <tr class="selectable" onclick="selectOwner('${item.owner_hn}', '${item.owners?.owner_name}', '${item.owners?.address || ''}', '${phonesJson}', event)">
                    <td class="p-3">
                        <div class="font-bold text-teal-400">${item.owner_hn}</div>
                        <div class="text-white">${item.pet_name}</div>
                    </td>
                    <td class="p-3">
                        <div class="font-bold">${item.owners?.owner_name || '-'}</div>
                        <div class="text-xs text-gray-400">${phones[0]?.phone_number || '-'}</div>
                    </td>
                </tr>`;
            }).join('');
        }

        async function genNewHN() {
            const { data } = await db.from('owners').select('hn').order('hn', { ascending: false }).limit(1).maybeSingle();
            document.getElementById('hn').value = data ? parseInt(data.hn) + 1 : 690001;
        }

        async function saveData(e) {
            e.preventDefault();
            const hn = document.getElementById('hn').value;
            // 1. Update Owner
            await db.from('owners').upsert({ hn: hn, owner_name: document.getElementById('owner_name').value, address: document.getElementById('address').value });
            // 2. Update Phones
            await db.from('owner_phones').delete().eq('owner_hn', hn);
            const phones = Array.from(document.querySelectorAll('#phone-container > div')).map(row => ({
                owner_hn: hn, phone_number: row.querySelector('[name="owner_phone"]').value.trim(), label: row.querySelector('[name="phone_label"]').value
            }));
            await db.from('owner_phones').insert(phones);
            // 3. Add Pets
            const pets = Array.from(document.querySelectorAll('.pet-entry')).map(row => ({
                owner_hn: hn, pet_name: row.querySelector('[name="pet_name"]').value,
                pet_type: row.querySelector('[name="pet_type"]').value.includes('แมว') ? 'แมว' : 'สุนัข',
                gender: row.querySelector('[name="gender"]').value.replace(/[^ก-ฮ]/g, ''), breed: row.querySelector('[name="breed"]').value
            }));
            
            if(pets.length > 0) {
                const { error } = await db.from('animals').insert(pets);
                if (error) alert(error.message);
                else { alert('บันทึกข้อมูลเรียบร้อย!'); location.reload(); }
            }
        }

        window.onload = fetchRecords;
    </script>
</body>
</html>
