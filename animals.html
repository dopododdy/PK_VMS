<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <title>เวชระเบียนสัตว์ | PK-VMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>

    <style>
        :root {
            --navy: #0b1929; --navy-mid: #112240; --teal: #14b8b1;
            --surface: rgba(255,255,255,0.06); --border: rgba(255,255,255,0.12);
        }
        body { font-family: "Sarabun", sans-serif; background: var(--navy); color: #e2e8f0; margin: 0; overflow: hidden; }
        .mesh-bg { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% -20%, rgba(20, 184, 177, 0.18), transparent 75%); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--teal); }

        .sidebar-container { background: rgba(17, 34, 64, 0.4); backdrop-filter: blur(20px); border-right: 1px solid var(--border); }
        .search-input { background: rgba(0,0,0,0.3); border: 2px solid var(--border); color: white; padding: 1rem 1.25rem; border-radius: 20px; width: 100%; outline: none; transition: 0.3s; font-size: 1.1rem; }
        .search-input:focus { border-color: var(--teal); background: rgba(0,0,0,0.5); }

        .animal-item { background: var(--surface); border: 2px solid transparent; border-radius: 24px; padding: 1.25rem; cursor: pointer; transition: all 0.3s ease; margin-bottom: 1rem; }
        .animal-item:hover { transform: translateX(8px); background: rgba(20, 184, 177, 0.08); border-color: rgba(20, 184, 177, 0.3); }
        .animal-item.active { border-color: var(--teal); background: rgba(20, 184, 177, 0.15); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }

        .gender-male { color: #60a5fa; }
        .gender-female { color: #f472b6; }
        .hn-badge { background: var(--teal); color: white; padding: 2px 10px; border-radius: 10px; font-size: 0.75rem; font-weight: 800; }
    </style>
</head>
<body>
    <div class="mesh-bg"></div>

    <div class="flex h-screen overflow-hidden">
        <aside class="w-full md:w-[400px] sidebar-container flex flex-col">
            <div class="p-8 pb-6">
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <h2 class="text-3xl font-black text-white">เวชระเบียน</h2>
                        <p class="text-teal-400 text-sm font-bold mt-1 uppercase tracking-widest">Animal Records</p>
                    </div>
                    <a href="index.html" class="bg-white/5 hover:bg-white/10 p-3 rounded-2xl transition">🏠</a>
                </div>
                <input type="text" id="search-box" class="search-input" placeholder="ค้นหาชื่อสัตว์, HN, เบอร์โทร..." oninput="filterAnimals()">
            </div>

            <div id="animal-list" class="flex-1 overflow-y-auto px-6 pb-6">
                <div class="text-center py-10 text-gray-500 font-bold">กำลังโหลดข้อมูล...</div>
            </div>

            <div class="p-6 border-t border-white/5 bg-navy/20">
                <button onclick="alert('กำลังพัฒนาฟังก์ชันเพิ่มสัตว์ใหม่')" class="w-full bg-teal-600 hover:bg-teal-500 text-white font-black py-4 rounded-2xl transition-all text-lg shadow-lg">
                    + ลงทะเบียนสัตว์ใหม่
                </button>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-12" id="detail-view">
            <div class="h-full flex flex-col items-center justify-center text-gray-500 text-center">
                <div class="bg-white/5 p-16 rounded-[50px] border border-white/5 backdrop-blur-sm">
                    <div class="text-8xl mb-8 opacity-20">🐾</div>
                    <h3 class="text-2xl font-black text-white/50 mb-2">ค้นหาหรือเลือกรายชื่อสัตว์</h3>
                    <p class="text-lg">เลือกรายชื่อทางด้านซ้ายเพื่อดูประวัติและรายละเอียด</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        let allAnimals = [];

        window.onload = async () => {
            if (sessionStorage.getItem("isLoggedIn") !== "true") {
                window.location.href = "index.html";
                return;
            }
            await fetchAnimals();
        };

        async function fetchAnimals() {
            try {
                // ดึงข้อมูลสัตว์ พร้อมข้อมูลเจ้าของ (Join Owners) และเบอร์โทร (Join Owner Phones)
                const { data, error } = await db
                    .from('animals')
                    .select(`
                        *,
                        owners ( hn, owner_name, address, note ),
                        owner_phones:owner_hn ( phone_number )
                    `)
                    .order('created_at', { ascending: false });

                if (error) throw error;
                allAnimals = data;
                renderAnimalList(allAnimals);
            } catch (err) {
                console.error("Fetch Error:", err);
                document.getElementById('animal-list').innerHTML = `<div class="text-red-400 text-center font-bold">Error: ไม่สามารถดึงข้อมูลได้</div>`;
            }
        }

        function renderAnimalList(list) {
            const container = document.getElementById('animal-list');
            if (list.length === 0) {
                container.innerHTML = `<div class="text-center py-10 text-gray-500 font-bold">ไม่พบข้อมูล</div>`;
                return;
            }

            container.innerHTML = list.map(pet => {
                const ownerName = pet.owners ? pet.owners.owner_name : 'ไม่ทราบชื่อ';
                // ดึงเบอร์โทรแรกที่เจอ (ถ้ามี)
                const phone = (pet.owner_phones && pet.owner_phones.length > 0) ? pet.owner_phones[0].phone_number : 'ไม่มีเบอร์โทร';
                
                // เช็คประเภทสัตว์
                const typeIcon = (pet.pet_type === 'แมว') ? '🐱' : (pet.pet_type === 'สุนัข' ? '🐶' : '🐾');
                
                // เช็คเพศ (รองรับ เมียหมัน / ผู้ตอน)
                const isFemale = pet.gender && pet.gender.includes('เมีย');
                const isMale = pet.gender && pet.gender.includes('ผู้');
                const genderIcon = isMale ? '♂️' : (isFemale ? '♀️' : '❓');
                const genderClass = isMale ? 'gender-male' : (isFemale ? 'gender-female' : 'text-gray-500');

                return `
                    <div class="animal-item" onclick="viewDetail('${pet.id}')" id="pet-${pet.id}">
                        <div class="flex justify-between items-start mb-3">
                            <span class="hn-badge">HN: ${pet.owner_hn}</span>
                            <span class="text-2xl">${typeIcon}</span>
                        </div>
                        
                        <div class="flex items-center gap-2 mb-3">
                            <h4 class="font-black text-white text-xl tracking-wide">${pet.pet_name}</h4>
                            <span class="${genderClass} font-black text-lg">${genderIcon}</span>
                        </div>

                        <div class="space-y-2 border-t border-white/5 pt-3">
                            <div class="flex items-center gap-3 text-gray-300">
                                <span class="bg-white/10 p-1.5 rounded-lg text-xs">👤</span>
                                <span class="font-bold text-sm">เจ้าของ: ${ownerName}</span>
                            </div>
                            <div class="flex items-center gap-3">
                                <span class="bg-teal-500/10 p-1.5 rounded-lg text-xs">📞</span>
                                <span class="text-teal-400 font-black text-sm">${phone}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterAnimals() {
            const term = document.getElementById('search-box').value.toLowerCase();
            const filtered = allAnimals.filter(pet => {
                const ownerName = pet.owners ? pet.owners.owner_name.toLowerCase() : '';
                const phones = pet.owner_phones ? pet.owner_phones.map(p => p.phone_number).join(' ') : '';
                
                return pet.pet_name.toLowerCase().includes(term) ||
                       pet.owner_hn.toLowerCase().includes(term) ||
                       ownerName.includes(term) ||
                       phones.includes(term);
            });
            renderAnimalList(filtered);
        }

        function viewDetail(id) {
            document.querySelectorAll('.animal-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`pet-${id}`).classList.add('active');
            
            const pet = allAnimals.find(p => p.id == id);
            const owner = pet.owners || {};
            const phones = pet.owner_phones ? pet.owner_phones.map(p => p.phone_number).join(', ') : 'ไม่มีข้อมูลเบอร์โทร';

            document.getElementById('detail-view').innerHTML = `
                <div class="max-w-5xl mx-auto">
                    <div class="bg-navy-mid/50 backdrop-blur-xl p-10 rounded-[40px] border border-white/10 shadow-2xl">
                        <div class="flex justify-between items-center mb-10">
                            <div class="flex items-center gap-6">
                                <div class="text-7xl bg-white/5 p-6 rounded-[30px] border border-white/5">
                                    ${(pet.pet_type === 'แมว') ? '🐱' : (pet.pet_type === 'สุนัข' ? '🐶' : '🐾')}
                                </div>
                                <div>
                                    <div class="flex items-center gap-3 mb-2">
                                        <h2 class="text-5xl font-black text-white">${pet.pet_name}</h2>
                                        <span class="text-3xl">${pet.gender && pet.gender.includes('ผู้') ? '♂️' : '♀️'}</span>
                                    </div>
                                    <span class="bg-teal-500 text-navy font-black px-4 py-1 rounded-full text-sm uppercase tracking-widest">
                                        HN: ${pet.owner_hn}
                                    </span>
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div class="bg-white/5 p-8 rounded-3xl border border-white/5">
                                <p class="text-teal-400 font-bold text-sm uppercase mb-6 tracking-widest">ข้อมูลสัตว์เลี้ยง</p>
                                <div class="space-y-4 text-xl">
                                    <p><span class="text-gray-500">ชนิด:</span> <span class="font-bold text-white">${pet.pet_type}</span></p>
                                    <p><span class="text-gray-500">สายพันธุ์:</span> <span class="font-bold text-white">${pet.breed || '-'}</span></p>
                                    <p><span class="text-gray-500">เพศ:</span> <span class="font-bold text-white">${pet.gender || '-'}</span></p>
                                    <p><span class="text-gray-500">น้ำหนัก:</span> <span class="font-bold text-teal-400">${pet.weight || '0'} กก.</span></p>
                                    <p><span class="text-gray-500">วันเกิด:</span> <span class="font-bold text-white">${pet.birth_date || 'ไม่ระบุ'}</span></p>
                                </div>
                            </div>
                            <div class="bg-white/5 p-8 rounded-3xl border border-white/5">
                                <p class="text-teal-400 font-bold text-sm uppercase mb-6 tracking-widest">ข้อมูลเจ้าของ</p>
                                <div class="space-y-4 text-xl">
                                    <p><span class="text-gray-500 text-base">ชื่อ:</span> <br><span class="font-bold text-white">${owner.owner_name}</span></p>
                                    <p><span class="text-gray-500 text-base">เบอร์โทร:</span> <br><span class="font-bold text-teal-400">${phones}</span></p>
                                    <p><span class="text-gray-500 text-base">ที่อยู่:</span> <br><span class="text-sm font-bold text-gray-300 leading-relaxed">${owner.address || '-'}</span></p>
                                </div>
                            </div>
                        </div>
                        
                        <div class="mt-8 p-6 bg-amber-500/10 border border-amber-500/20 rounded-2xl">
                             <p class="text-amber-500 font-bold text-sm uppercase mb-2">Note / หมายเหตุ</p>
                             <p class="text-gray-300">${owner.note || 'ไม่มีหมายเหตุ'}</p>
                        </div>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
