<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <title>เวชระเบียนสัตว์ป่วย | PK-VMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>

    <style>
        :root { --navy: #0b1929; --navy-mid: #112240; --teal: #14b8b1; --white-bright: #ffffff; --text-gray: #cbd5e1; }
        body { font-family: "Sarabun", sans-serif; background: var(--navy); color: var(--white-bright); font-size: 18px; }
        .form-input { 
            background: rgba(255,255,255,0.07); border: 2px solid rgba(255,255,255,0.2); 
            border-radius: 14px; padding: 12px 18px; width: 100%; color: white; outline: none; 
            font-size: 1.1rem; transition: all 0.3s ease;
        }
        .form-input:focus { border-color: var(--teal); background: rgba(255,255,255,0.12); }
        .form-label { display: block; font-weight: 700; color: var(--text-gray); margin-bottom: 6px; font-size: 0.95rem; }
        .glass-table { background: rgba(255,255,255,0.03); border-radius: 24px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        .pet-entry, .phone-entry { background: rgba(255,255,255,0.03); border: 1px dashed rgba(20, 184, 177, 0.4); }
        .highlight-found { border-color: var(--teal) !important; background: rgba(20, 184, 177, 0.2) !important; }
        .search-container:focus-within { transform: translateY(-2px); transition: all 0.3s ease; }
        tr.selectable { cursor: pointer; transition: all 0.2s; }
        tr.selectable:hover { background: rgba(20, 184, 177, 0.15) !important; }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-6">
            <div>
                <h1 class="text-4xl font-bold text-white flex items-center gap-4">
                    <span class="text-teal-400 text-5xl">🐾</span> เวชระเบียนสัตว์ป่วย
                </h1>
                <p class="text-teal-500 font-bold text-lg mt-2">คลิกที่แถวเพื่อดึงข้อมูลเจ้าของเดิมมาเพิ่มสัตว์เลี้ยงใหม่</p>
            </div>
            <div class="flex items-center gap-4 w-full md:w-auto">
                <a href="index.html" class="flex-1 md:flex-none text-center bg-slate-700 hover:bg-slate-600 text-white px-8 py-4 rounded-2xl transition font-bold text-lg border border-white/10">🏠 หน้าหลัก</a>
                <button onclick="clearFormAndToggle()" class="flex-1 md:flex-none bg-teal-600 hover:bg-teal-500 text-white px-8 py-4 rounded-2xl transition font-black text-lg shadow-xl">+ เพิ่มเคสใหม่ (HN ใหม่)</button>
            </div>
        </header>

        <section id="record-form" class="hidden mb-12 bg-navy-mid p-8 rounded-[32px] border-2 border-teal-500/40 shadow-2xl">
            <form id="main-form" onsubmit="saveData(event)">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6 bg-white/5 p-8 rounded-3xl border border-white/10 mb-8" id="owner-section">
                    <div class="md:col-span-4 flex justify-between items-center border-b border-white/10 pb-4 mb-2">
                        <h3 class="text-xl font-bold text-teal-400">👤 ข้อมูลเจ้าของ <span id="mode-text" class="text-sm font-normal text-gray-400 ml-4"></span></h3>
                        <div class="text-right">
                            <span class="text-gray-400 text-sm block">HN</span>
                            <input type="text" id="hn" class="bg-transparent text-2xl font-black text-teal-400 outline-none text-right w-32" readonly placeholder="AUTO">
                        </div>
                    </div>
                    
                    <div class="md:col-span-1">
                        <label class="form-label">ชื่อเจ้าของ</label>
                        <input type="text" id="owner_name" class="form-input" required>
                    </div>
                    <div class="md:col-span-3">
                        <label class="form-label">ที่อยู่ / บ้านเลขที่</label>
                        <input type="text" id="address" class="form-input">
                    </div>
                    <div class="md:col-span-4">
                        <label class="form-label mb-3 text-teal-300">เบอร์โทรศัพท์</label>
                        <div id="phone-container" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
                        <button type="button" onclick="addPhoneField()" class="mt-3 text-teal-400 text-sm font-bold hover:underline">+ เพิ่มเบอร์โทรศัพท์</button>
                    </div>
                </div>

                <div id="pet-container" class="space-y-4">
                    <h3 class="text-xl font-bold text-white mb-4 italic text-teal-400 underline">📝 เพิ่มสัตว์เลี้ยงตัวใหม่</h3>
                    </div>

                <button type="button" onclick="addPetField()" class="mt-4 w-full py-4 border-2 border-dashed border-teal-500/50 rounded-2xl text-teal-400 font-bold hover:bg-teal-500/10 transition">
                    + เพิ่มข้อมูลสัตว์เลี้ยง
                </button>

                <div class="flex justify-end gap-6 mt-10 pt-6 border-t border-white/10">
                    <button type="button" onclick="toggleForm()" class="px-8 py-3 text-gray-400 hover:text-white font-bold text-lg">ปิดฟอร์ม</button>
                    <button type="submit" class="bg-teal-600 hover:bg-teal-500 text-white px-14 py-4 rounded-2xl font-black text-xl shadow-lg">บันทึกข้อมูล</button>
                </div>
            </form>
        </section>

        <div class="mb-8 relative max-w-2xl search-container">
            <input type="text" id="search" oninput="fetchRecords()" class="form-input pl-14 py-5 text-xl shadow-2xl" placeholder="ค้นหา HN, ชื่อสัตว์, เจ้าของ, เบอร์โทร, ที่อยู่...">
            <span class="absolute left-5 top-5 text-2xl opacity-50">🔍</span>
        </div>

        <div class="glass-table overflow-x-auto shadow-2xl">
            <table class="w-full text-left">
                <thead class="bg-white/10 text-white text-base">
                    <tr>
                        <th class="p-6">HN</th>
                        <th class="p-6">สัตว์เลี้ยง</th>
                        <th class="p-6">เจ้าของ / เบอร์โทร / ที่อยู่</th>
                        <th class="p-6 text-center">จัดการ</th>
                    </tr>
                </thead>
                <tbody id="animal-list" class="divide-y divide-white/10"></tbody>
            </table>
        </div>
    </div>

    <script>
        let petCount = 0;
        let phoneCount = 0;
        const breedData = {
            "สุนัข": ["ไทย", "โกลเด้น รีทรีฟเวอร์", "ไซบีเรียน ฮัสกี้", "ปอมเมอเรเนียน", "พุดเดิ้ล", "ชิสุ", "บีเกิล", "อื่นๆ"],
            "แมว": ["ไทย", "เปอร์เซีย", "สก็อตติช โฟลด์", "บริติช ชอร์ตแฮร์", "วิเชียรมาศ", "เบงกอล", "อเมริกัน ชอร์ตแฮร์", "เมนคูน", "อื่นๆ"]
        };

        // --- ระบบดึงข้อมูลเจ้าของมาใช้ใหม่ (Your Proposed Workflow) ---
        function selectOwner(hn, name, address, phonesJson) {
            const phones = JSON.parse(decodeURIComponent(phonesJson));
            
            // 1. ตั้งค่าฟิลด์เจ้าของ
            document.getElementById('hn').value = hn;
            document.getElementById('owner_name').value = name;
            document.getElementById('address').value = address;
            document.getElementById('owner_name').classList.add('highlight-found');
            document.getElementById('mode-text').innerText = "(ใช้ข้อมูลเจ้าของเดิม)";

            // 2. ล้างและใส่เบอร์โทรเดิม
            document.getElementById('phone-container').innerHTML = '';
            phoneCount = 0;
            if (phones.length > 0) {
                phones.forEach(p => addPhoneField(p.phone_number, p.label));
            } else {
                addPhoneField();
            }

            // 3. เตรียมส่วนเพิ่มสัตว์เลี้ยง (ล้างของเก่าออก)
            document.getElementById('pet-container').innerHTML = '<h3 class="text-xl font-bold text-white mb-4 italic text-teal-400 underline">📝 เพิ่มสัตว์เลี้ยงตัวใหม่</h3>';
            petCount = 0;
            addPetField(); // เพิ่มช่องสัตว์เลี้ยงให้ 1 ช่องทันที

            // 4. แสดงฟอร์มและ Scroll ไปด้านบน
            const form = document.getElementById('record-form');
            form.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // --- ระบบฟอร์ม ---
        function addPhoneField(value = '', label = 'เบอร์หลัก') {
            phoneCount++;
            const html = `
                <div class="phone-entry flex gap-2 p-2 rounded-xl" id="phone-row-${phoneCount}">
                    <input type="text" name="owner_phone" value="${value}" class="form-input text-base" placeholder="08xxxxxxxx" required>
                    <input type="text" name="phone_label" value="${label}" class="form-input text-base w-32" placeholder="เช่น แม่">
                    ${phoneCount > 1 ? `<button type="button" onclick="this.parentElement.remove()" class="text-red-400 px-2">✕</button>` : ''}
                </div>`;
            document.getElementById('phone-container').insertAdjacentHTML('beforeend', html);
        }

        function addPetField() {
            petCount++;
            const petHtml = `
                <div id="pet-row-${petCount}" class="pet-entry p-6 rounded-2xl grid grid-cols-1 md:grid-cols-4 gap-4 relative mb-4 border-teal-500/50 border-2">
                    <button type="button" onclick="this.parentElement.remove()" class="absolute top-2 right-4 text-red-400 text-sm">✕ ลบ</button>
                    <div><label class="form-label">ชื่อสัตว์</label><input type="text" name="pet_name" class="form-input" required></div>
                    <div><label class="form-label">ชนิด</label>
                        <select name="pet_type" class="form-input" onchange="updateBreed(this)">
                            <option value="แมว">🐱 แมว</option><option value="สุนัข">🐶 สุนัข</option><option value="อื่นๆ">อื่นๆ</option>
                        </select>
                    </div>
                    <div><label class="form-label">เพศ</label>
                        <select name="gender" class="form-input">
                            <option value="ผู้">♂️ ผู้</option><option value="เมีย">♀️ เมีย</option>
                            <option value="ผู้ตอน">♂️ ผู้ตอน</option><option value="เมียหมัน">♀️ เมียหมัน</option>
                        </select>
                    </div>
                    <div><label class="form-label">พันธุ์</label><select name="breed" class="form-input"></select></div>
                </div>`;
            document.getElementById('pet-container').insertAdjacentHTML('beforeend', petHtml);
            updateBreed(document.querySelector(`#pet-row-${petCount} select[name="pet_type"]`));
        }

        function updateBreed(selectEl) {
            const type = selectEl.value.includes('แมว') ? 'แมว' : selectEl.value.includes('สุนัข') ? 'สุนัข' : 'อื่นๆ';
            const breedSelect = selectEl.parentElement.parentElement.querySelector('select[name="breed"]');
            breedSelect.innerHTML = (breedData[type] || ["อื่นๆ"]).map(b => `<option value="${b}">${b}</option>`).join('');
        }

        async function saveData(e) {
            e.preventDefault();
            const hn = document.getElementById('hn').value;

            // 1. Update Owner
            await db.from('owners').upsert({
                hn: hn,
                owner_name: document.getElementById('owner_name').value,
                address: document.getElementById('address').value
            });

            // 2. Update Phones
            await db.from('owner_phones').delete().eq('owner_hn', hn);
            const phones = Array.from(document.querySelectorAll('.phone-entry')).map(row => ({
                owner_hn: hn,
                phone_number: row.querySelector('[name="owner_phone"]').value.trim(),
                label: row.querySelector('[name="phone_label"]').value
            }));
            await db.from('owner_phones').insert(phones);

            // 3. Add Pets
            const pets = Array.from(document.querySelectorAll('.pet-entry')).map(row => ({
                owner_hn: hn,
                pet_name: row.querySelector('[name="pet_name"]').value,
                pet_type: row.querySelector('[name="pet_type"]').value.includes('แมว') ? 'แมว' : 'สุนัข',
                gender: row.querySelector('[name="gender"]').value.replace(/[^ก-ฮ]/g, ''),
                breed: row.querySelector('[name="breed"]').value
            }));
            
            if(pets.length > 0) {
                const { error } = await db.from('animals').insert(pets);
                if (error) alert(error.message);
                else { alert('บันทึกข้อมูลสำเร็จ!'); location.reload(); }
            } else {
                alert('กรุณาเพิ่มข้อมูลสัตว์เลี้ยงอย่างน้อย 1 ตัว');
            }
        }

        async function fetchRecords() {
            const search = document.getElementById('search').value.trim();
            let query = db.from('animals').select('*, owners(*, owner_phones(*))');

            if (search) {
                query = query.or(`pet_name.ilike.%${search}%,owner_hn.ilike.%${search}%,owners.owner_name.ilike.%${search}%,owners.address.ilike.%${search}%`);
            }

            const { data } = await query.order('created_at', { ascending: false }).limit(20);
            
            let filtered = data || [];
            if (search && !isNaN(search.replace(/-/g, ''))) {
                filtered = (data || []).filter(item => 
                    item.owners?.owner_phones?.some(p => p.phone_number.includes(search)) || item.owner_hn.includes(search)
                );
            }

            document.getElementById('animal-list').innerHTML = filtered.map(item => {
                const typeIcon = item.pet_type === 'สุนัข' ? '🐶' : '🐱';
                const phones = item.owners?.owner_phones || [];
                const phoneStr = phones.map(p => p.phone_number).join(' | ');
                const phonesJson = encodeURIComponent(JSON.stringify(phones));
                
                return `
                <tr class="selectable border-b border-white/5" onclick="selectOwner('${item.owner_hn}', '${item.owners?.owner_name}', '${item.owners?.address || ''}', '${phonesJson}')">
                    <td class="p-6 font-mono text-teal-400 font-bold text-2xl">${item.owner_hn}</td>
                    <td class="p-6">
                        <div class="font-bold text-white text-xl">${typeIcon} ${item.pet_name}</div>
                        <div class="text-sm text-gray-400">${item.breed}</div>
                    </td>
                    <td class="p-6">
                        <div class="text-lg font-bold text-white">${item.owners?.owner_name || '-'}</div>
                        <div class="text-teal-500 font-bold">${phoneStr || 'ไม่มีเบอร์'}</div>
                        <div class="text-xs text-gray-500 italic">${item.owners?.address || ''}</div>
                    </td>
                    <td class="p-6 text-center">
                        <span class="text-teal-400 text-sm border border-teal-500/30 px-3 py-1 rounded-full bg-teal-500/10">เลือกเจ้าของนี้</span>
                    </td>
                </tr>`;
            }).join('');
        }

        function clearFormAndToggle() {
            document.getElementById('main-form').reset();
            document.getElementById('hn').value = '';
            document.getElementById('mode-text').innerText = "(เคสใหม่)";
            document.getElementById('owner_name').classList.remove('highlight-found');
            document.getElementById('phone-container').innerHTML = '';
            document.getElementById('pet-container').innerHTML = '<h3 class="text-xl font-bold text-white mb-4">🐶 รายละเอียดสัตว์เลี้ยง</h3>';
            phoneCount = 0; petCount = 0;
            toggleForm();
            // Gen New HN
            checkOwnerLookup({value: ''});
        }

        async function checkOwnerLookup(input) {
            if(!document.getElementById('hn').value) {
                const { data } = await db.from('owners').select('hn').order('hn', { ascending: false }).limit(1).maybeSingle();
                document.getElementById('hn').value = data ? parseInt(data.hn) + 1 : 690001;
            }
        }

        function toggleForm() {
            document.getElementById('record-form').classList.toggle('hidden');
            if (phoneCount === 0) addPhoneField();
            if (petCount === 0) addPetField();
        }

        window.onload = () => { fetchRecords(); };
    </script>
</body>
</html>
