<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เวชระเบียนสัตว์ | PK-VMS Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Kanit:wght@300;400;500;600;700&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="ui-settings.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/th.js"></script>

    <style>
        :root { --navy: #020617; --navy-light: #0f172a; --teal: #14b8b1; --border: rgba(255, 255, 255, 0.1); }
        * { font-family: "Sarabun", sans-serif !important; }
        body { background: var(--navy); color: #e2e8f0; margin: 0; overflow: hidden; }

        .sidebar-container { position: relative; width: 480px; background: #0f172a; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .pet-card { 
            padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer;
            display: grid; grid-template-columns: 85px 1fr 100px; gap: 12px; align-items: stretch; transition: 0.2s;
        }
        .pet-card:hover { background: rgba(255,255,255,0.07); }
        .pet-card.active { background: rgba(20, 184, 177, 0.12); border-left: 4px solid var(--teal); }
        
        .pet-main-name { color: #fff; font-weight: 800; font-size: 1.1rem; line-height: 1.2; }
        .hn-col { background: rgba(30, 41, 59, 1); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 900; color: #60a5fa; font-size: 1.1rem; border: 1px solid rgba(255,255,255,0.1); }
        .owner-subtext { color: #94a3b8; font-size: 0.85rem; }
        .phone-badge { color: var(--teal); font-weight: 700; font-size: 0.85rem; }

        .btn-base {
            padding: 10px 20px; border-radius: 12px; font-weight: 800;
            display: inline-flex; align-items: center; justify-content: center;
            gap: 8px; transition: all 0.2s; border: none; cursor: pointer; color: white !important;
        }
        .btn-base:active { transform: scale(0.95); }
        .btn-teal { background-color: #0d9488 !important; } 
        .btn-teal:hover { background-color: #0f766e !important; }
        .btn-blue { background-color: #2563eb !important; } 
        .btn-blue:hover { background-color: #1d4ed8 !important; }
        .btn-red { background-color: #dc2626 !important; } 
        .btn-red:hover { background-color: #b91c1c !important; }
        .btn-gray { background-color: #475569 !important; } 
        .btn-gray:hover { background-color: #334155 !important; }
        .btn-orange { background-color: #ea580c !important; }
        .btn-orange:hover { background-color: #c2410c !important; }

        .input-box { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; padding: 12px; color: white; width: 100%; outline: none; transition: 0.2s; }
        .input-box:focus { border-color: var(--teal); background: rgba(0,0,0,0.5); }
        .zone-pet { background: rgba(30, 41, 59, 0.4); border-radius: 25px; padding: 25px; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.05); }
        .label-text { color: #94a3b8; font-size: 0.85rem; margin-bottom: 6px; display: block; font-weight: 700; }
        .critical-box { background: #7f1d1d !important; color: #ffffff !important; font-weight: 800; border: 2px solid #ef4444 !important; }
        
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="flex h-screen overflow-hidden">
        <aside class="sidebar-container">
            <div class="p-6 flex-shrink-0 border-b border-white/5">
                <div class="flex justify-between items-center mb-5">
                    <div class="flex items-center gap-3">
                        <span class="text-4xl">🐾</span>
                        <h2 class="text-2xl font-black text-white">เวชระเบียน</h2>
                    </div>
                    <a href="index.html" class="flex items-center gap-2 px-3 py-2 rounded-xl bg-white/5 hover:bg-teal-500/20 hover:text-teal-400 transition-all text-gray-300 font-bold text-sm">
                        <span class="text-xl">🏠</span><span>หน้าหลัก</span>
                    </a>
                </div>
                <input type="text" id="search-box" class="input-box" placeholder="ค้นหา HN, ชื่อ, เบอร์โทร, ที่อยู่, บันทึกการรักษา..." oninput="renderSidebar()">
            </div>
            <div id="owner-list" class="flex-1 overflow-y-auto px-2 pb-10 custom-scroll"></div>
            <div class="p-5">
                <button onclick="createNewForm()" class="w-full btn-base btn-teal py-4 text-xl shadow-lg">
                    + ลงทะเบียนเจ้าของใหม่
                </button>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-12 bg-[#020617] custom-scroll" id="form-view">
            <div class="h-full flex flex-col items-center justify-center opacity-10">
                <div class="text-9xl mb-4">📋</div>
                <h3 class="text-3xl font-bold">เลือกรายการเจ้าของเพื่อดูข้อมูลหรือเพิ่มสัตว์ใหม่</h3>
            </div>
        </main>
    </div>

    <script>
        let allAnimals = []; 
        let allOwners = []; 
        let allPhones = [];
        let masterSpecies = [];
        let masterBreeds = [];
        let allMedRecs = [];
        let allMedItems = [];
        // Precomputed lookup maps – rebuilt whenever data is refreshed
        let _primaryPhoneMap = new Map();
        let _allPhonesMap = new Map();
        let _medTextByAnimalId = new Map();
        let petCollapseCount = 0;

        function formatThaiDate(dateString, format = 'long') {
            if (!dateString) return "-";
            const date = new Date(dateString);
            const monthsShort = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];
            const monthsLong = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
            const d = date.getDate();
            const m = format === 'short' ? monthsShort[date.getMonth()] : monthsLong[date.getMonth()];
            const y = date.getFullYear() + 543;
            return `${d} ${m} ${y}`;
        }

        async function loadData() {
            const [resO, resA, resP, resSpecies, resBreeds, resMedRecs, resMedItems] = await Promise.all([
                db.from('owners').select('*'),
                db.from('animals').select('*'),
                db.from('owner_phones').select('*'),
                db.from('mas_species').select('*').order('name'),
                db.from('mas_breeds').select('*').order('name'),
                db.from('medical_records').select('id, animal_id, owner_hn, created_at, cc, hx, pe, dx'),
                db.from('medical_record_items').select('record_id, item_name')
            ]);
            allOwners = resO.data || [];
            allAnimals = resA.data || [];
            allPhones = resP.data || [];
            masterSpecies = resSpecies.data || [];
            masterBreeds = resBreeds.data || [];
            allMedRecs = resMedRecs.data || [];
            allMedItems = resMedItems.data || [];
            buildLookupMaps();
            renderSidebar();
        }

        function buildLookupMaps() {
            _primaryPhoneMap = new Map();
            _allPhonesMap = new Map();
            allPhones.forEach(p => {
                if (p.label === 'เบอร์หลัก' && !_primaryPhoneMap.has(p.owner_hn)) {
                    _primaryPhoneMap.set(p.owner_hn, p.phone_number);
                }
                if (!_allPhonesMap.has(p.owner_hn)) _allPhonesMap.set(p.owner_hn, []);
                _allPhonesMap.get(p.owner_hn).push(p.phone_number);
            });

            const medItemMap = new Map();
            allMedItems.forEach(mi => {
                if (!medItemMap.has(mi.record_id)) medItemMap.set(mi.record_id, []);
                medItemMap.get(mi.record_id).push((mi.item_name || '').toLowerCase());
            });

            _medTextByAnimalId = new Map();
            allMedRecs.forEach(rec => {
                const dateStr = (rec.created_at || '').slice(0, 10);
                const items = medItemMap.get(rec.id) || [];
                const text = [dateStr, rec.cc, rec.hx, rec.pe, rec.dx, ...items]
                    .filter(Boolean).join(' ').toLowerCase();
                const prev = _medTextByAnimalId.get(rec.animal_id) || '';
                _medTextByAnimalId.set(rec.animal_id, prev + ' ' + text);
            });
        }

        function renderSidebar() {
            const term = document.getElementById('search-box').value.toLowerCase();
            const container = document.getElementById('owner-list');
            const ownerMap = new Map(allOwners.map(o => [o.hn, o]));

            // Owners who have no pets yet
            const ownersWithPets = new Set(allAnimals.map(a => a.owner_hn));
            const ownerOnlyEntries = allOwners
                .filter(o => !ownersWithPets.has(o.hn))
                .map(o => ({ _ownerOnly: true, owner_hn: o.hn }));

            // Merge pets and owner-only entries, sorted by owner_hn descending
            const allItems = [...allAnimals, ...ownerOnlyEntries]
                .sort((a, b) => parseInt(b.owner_hn) - parseInt(a.owner_hn));

            const filtered = !term ? allItems : allItems.filter(item => {
                const owner = ownerMap.get(item.owner_hn);
                const phones = _allPhonesMap.get(item.owner_hn) || [];
                const address = (owner?.address || '').toLowerCase();
                const ownerName = (owner?.owner_name || '').toLowerCase();
                const basicMatch = item.owner_hn.includes(term) || ownerName.includes(term) ||
                    phones.some(p => p.includes(term)) || address.includes(term);
                if (item._ownerOnly) {
                    return basicMatch;
                }
                const medText = _medTextByAnimalId.get(item.id) || '';
                return basicMatch || item.pet_name.toLowerCase().includes(term) || medText.includes(term);
            });

            container.innerHTML = filtered.map(item => {
                const owner = ownerMap.get(item.owner_hn);
                const p1 = _primaryPhoneMap.get(item.owner_hn) || '-';
                if (item._ownerOnly) {
                    return `
                        <div class="pet-card" onclick="editOwner('${item.owner_hn}')" ondblclick="document.getElementById('search-box').value='${item.owner_hn}'; renderSidebar()" id="owner-${item.owner_hn}">
                            <div class="hn-col">#${item.owner_hn}</div>
                            <div class="flex flex-col justify-center min-w-0 px-2">
                                <span class="pet-main-name truncate text-slate-400">ยังไม่มีสัตว์เลี้ยง</span>
                                <span class="owner-subtext truncate">👤 ${owner?.owner_name || '-'}</span>
                                <span class="phone-badge">📞 ${p1}</span>
                            </div>
                            <div class="flex items-center justify-end gap-1 text-2xl pr-2">
                                <span>👤</span>
                            </div>
                        </div>`;
                }
                const typeIcon = item.pet_type === 'สุนัข' ? '🐶' : (item.pet_type === 'แมว' ? '🐱' : '🐾');
                return `
                    <div class="pet-card" onclick="editOwner('${item.owner_hn}')" ondblclick="document.getElementById('search-box').value='${item.owner_hn}'; renderSidebar()" id="pet-${item.id}">
                        <div class="hn-col">#${item.owner_hn}</div>
                        <div class="flex flex-col justify-center min-w-0 px-2">
                            <span class="pet-main-name truncate">${item.pet_name}</span>
                            <span class="owner-subtext truncate">👤 ${owner?.owner_name || '-'}</span>
                            <span class="phone-badge">📞 ${p1}</span>
                        </div>
                        <div class="flex items-center justify-end gap-1 text-2xl pr-2">
                            <span>${typeIcon}</span>
                        </div>
                    </div>`;
            }).join('');
        }

        async function editOwner(hn) {
            document.querySelectorAll('.pet-card').forEach(el => el.classList.remove('active'));
            const owner = allOwners.find(o => o.hn === hn);
            if (!owner) return createNewForm();
            const pets = allAnimals.filter(a => a.owner_hn === hn);
            const phones = allPhones.filter(p => p.owner_hn === hn);
            renderForm(owner, pets, phones);
        }

        function createNewForm() { renderForm({ hn: '', owner_name: '', address: '' }, [], []); }

        function renderForm(owner, pets, phones = []) {
            const formView = document.getElementById('form-view');
            const isNew = owner.hn === '';
            const sortedPets = [...pets].sort((a, b) => (a.pet_name || '').localeCompare(b.pet_name || '', 'th'));
            formView.innerHTML = `
                <div class="max-w-5xl mx-auto pb-32">
                    <div class="bg-slate-800/40 p-10 rounded-[40px] border border-white/5 mb-8 shadow-2xl">
                        <div class="flex justify-between items-center mb-8">
                            <h3 class="text-3xl font-black text-blue-400 flex items-center gap-3">👤 ข้อมูลเจ้าของสัตว์</h3>
                            <div class="flex gap-3">
                                <button onclick="readSmartCard()" class="btn-base btn-blue">
                                    <i data-lucide="id-card" class="w-5 h-5"></i> อ่านบัตรประชาชน
                                </button>
                                ${!isNew ? `
                                    <button onclick="goToConsent('${owner.hn}')" class="btn-base btn-orange shadow-lg">📋 ใบยินยอมรวม</button>
                                    <button onclick="deleteOwner('${owner.hn}', '${owner.owner_name}')" class="btn-base btn-red">🗑️ ลบเจ้าของ</button>
                                ` : ''}
                            </div>
                        </div>
                        <div class="grid grid-cols-12 gap-6">
                            <div class="col-span-3">
                                <label class="label-text">HN <span class="text-[10px] text-gray-500">(เว้นว่างเพื่อ Auto)</span></label>
                                <input type="text" id="f_hn" class="input-box font-black text-blue-400 text-xl" 
                                       value="${owner.hn}" 
                                       placeholder="สร้างให้อัตโนมัติ" 
                                       ${!isNew ? 'readonly' : ''}> </div>
                            <div class="col-span-5"><label class="label-text">ชื่อ-นามสกุล เจ้าของ</label><input type="text" id="f_owner_name" class="input-box" value="${owner.owner_name || ''}"></div>
                            <div class="col-span-2"><label class="label-text">เบอร์โทรศัพท์หลัก</label><input type="tel" id="f_phone1" class="input-box text-teal-400 font-bold" value="${phones.find(p=>p.label==='เบอร์หลัก')?.phone_number || ''}"></div>
                            <div class="col-span-2"><label class="label-text">เบอร์โทรศัพท์สำรอง</label><input type="tel" id="f_phone2" class="input-box" value="${phones.find(p=>p.label==='เบอร์สำรอง')?.phone_number || ''}"></div>
                            <div class="col-span-12"><label class="label-text">ที่อยู่ปัจจุบัน</label><input type="text" id="f_address" class="input-box" value="${owner.address || ''}"></div>
                        </div>
                    </div>

                    <div id="pets-container" class="space-y-8">
                        ${sortedPets.map(p => petRowHtml(p)).join('')}
                        <button onclick="addNewPetRow()" class="w-full border-4 border-dashed border-white/5 py-6 rounded-3xl text-slate-500 hover:text-teal-400 transition-all font-black text-xl">+ เพิ่มสัตว์เลี้ยงรายการใหม่ให้เจ้าของนี้</button>
                    </div>

                    <button onclick="saveAllData()" class="w-full btn-base btn-teal py-6 text-3xl mt-10 shadow-2xl">💾 บันทึกข้อมูลทั้งหมด</button>
                </div>`;
            
            lucide.createIcons(); // วาด Icon ใหม่
            initAllPickers();
            document.querySelectorAll('.zone-pet').forEach(el => updateBreedOptions(el.querySelector('.p_type')));
        }

        function petRowHtml(pet, startExpanded = false) {
            petCollapseCount++;
            const collapseId = 'pet-body-' + petCollapseCount;
            const ageInfo = getAgeDetail(pet.birth_date);
            const effectiveType = pet.pet_type || 'แมว';
            const headIcon = effectiveType === 'สุนัข' ? '🐶' : (effectiveType === 'แมว' ? '🐱' : '🐾');
            const speciesOptions = masterSpecies.map(s => `<option value="${s.name}" data-id="${s.id}" ${effectiveType === s.name ? 'selected' : ''}>${s.name}</option>`).join('');
            const effectiveGender = pet.gender || 'ไม่ระบุเพศ';
            const bodyDisplay = startExpanded ? '' : 'style="display:none"';
            const chevronStyle = startExpanded ? 'style="transform:rotate(180deg)"' : '';
            return `
                <div class="zone-pet border-l-[12px] border-teal-500 shadow-2xl" data-pet-id="${pet.id || ''}">
                    <div class="flex justify-between items-center cursor-pointer select-none" tabindex="0" onclick="togglePetCollapse(this)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();togglePetCollapse(this);}"  role="button" aria-expanded="${startExpanded}">
                        <h4 class="text-3xl font-black text-white">${headIcon} ${pet.pet_name || 'ข้อมูลสัตว์ใหม่'}</h4>
                        <div class="flex gap-3 items-center">
                            <div class="flex gap-3" onclick="event.stopPropagation()">
                                ${pet.id ? `
                                    <button onclick="printPetLabel('${pet.id}')" class="btn-base btn-gray">🖨️ Label</button>
                                    <button onclick="goToConsent('${pet.owner_hn}', '${pet.id}')" class="btn-base btn-orange">📋 ใบยินยอม</button>
                                    <button onclick="gotoMedicalRecord('${pet.id}', '${pet.pet_name}', '${pet.owner_hn}')" class="btn-base btn-teal">🏥 ประวัติ</button>
                                ` : ''}
                                <button onclick="${pet.id ? `deletePetRecord('${pet.id}', '${pet.pet_name}')` : `this.closest('.zone-pet').remove()`}" class="btn-base btn-red">🗑️ ลบ</button>
                            </div>
                            <span class="chevron-icon text-teal-400 text-xl transition-all duration-200" ${chevronStyle}>▼</span>
                        </div>
                    </div>
                    <div class="pet-collapse-body mt-8" id="${collapseId}" ${bodyDisplay}>
                        <div class="grid grid-cols-12 gap-5">
                            <div class="col-span-3"><label class="label-text">ชื่อสัตว์</label><input type="text" class="p_name input-box font-black text-xl" value="${pet.pet_name || ''}"></div>
                            <div class="col-span-2"><label class="label-text">ชนิด</label>
                                <select class="p_type input-box" onchange="updateBreedOptions(this)">
                                    <option value="">-- เลือกชนิด --</option>${speciesOptions}
                                </select>
                            </div>
                            <div class="col-span-3"><label class="label-text">สายพันธุ์</label><select class="p_breed input-box" data-val="${pet.breed || ''}"></select></div>
                            <div class="col-span-2"><label class="label-text">เพศ</label>
                                <select class="p_gender input-box">
                                    <option value="เมีย" ${effectiveGender==='เมีย'?'selected':''}>♀️ เมีย</option>
                                    <option value="ผู้" ${effectiveGender==='ผู้'?'selected':''}>♂️ ผู้</option>
                                    <option value="ผู้ตอน" ${effectiveGender==='ผู้ตอน'?'selected':''}>✂️♂️ ผู้ตอน</option>
                                    <option value="เมียหมัน" ${effectiveGender==='เมียหมัน'?'selected':''}>✂️♀️ เมียหมัน</option>
                                    <option value="ไม่ระบุเพศ" ${effectiveGender==='ไม่ระบุเพศ'?'selected':''}>❓ ไม่ระบุเพศ</option>
                                </select>
                            </div>
                            <div class="col-span-2"><label class="label-text">น้ำหนัก (กก.)</label><input type="number" step="0.1" class="p_weight input-box text-center text-yellow-400 font-black text-xl" value="${pet.weight || ''}"></div>
                            <div class="col-span-4"><label class="label-text">วดป. เกิด</label><input type="text" class="p_dob input-box datepicker-thai" value="${pet.birth_date || ''}" placeholder="เลือกวันที่..."></div>
                            <div class="col-span-2"><label class="label-text">อายุ (ปี)</label><input type="number" class="p_age_years input-box text-center font-bold" value="${ageInfo.y}" oninput="syncFromAge(this)"></div>
                            <div class="col-span-2"><label class="label-text">อายุ (เดือน)</label><input type="number" class="p_age_months input-box text-center font-bold" value="${ageInfo.m}" oninput="syncFromAge(this)"></div>
                            <div class="col-span-4"><label class="label-text">เลขไมโครชิพ</label><input type="text" class="p_microchip input-box" value="${pet.microchip_number || ''}"></div>
                            <div class="col-span-12"><label class="label-text text-red-400 font-bold">🚨 ข้อควรระวัง / ประวัติแพ้ยา</label><textarea class="p_congenital input-box critical-box h-[80px]">${pet.congenital_disease || ''}</textarea></div>
                        </div>
                    </div>
                </div>`;
        }

        function togglePetCollapse(headerEl) {
            const body = headerEl.nextElementSibling;
            const chevron = headerEl.querySelector('.chevron-icon');
            const isHidden = body.style.display === 'none';
            body.style.display = isHidden ? '' : 'none';
            headerEl.setAttribute('aria-expanded', isHidden ? 'true' : 'false');
            if (chevron) chevron.style.transform = isHidden ? 'rotate(180deg)' : '';
        }

        function updateCalendarYearToBE(instance) {
            if (!instance.calendarContainer) return;
            const yearInput = instance.calendarContainer.querySelector('.cur-year');
            if (yearInput) yearInput.value = instance.currentYear + 543;
        }

        function initAllPickers() {
            flatpickr(".datepicker-thai", {
                locale: "th", dateFormat: "Y-m-d", altInput: true, altFormat: "j F Y",
                onReady: (selectedDates, dateStr, instance) => {
                    const altInp = instance.altInput;
                    if (dateStr) {
                        const yearBE = new Date(dateStr).getFullYear() + 543;
                        altInp.value = altInp.value.replace(new Date(dateStr).getFullYear(), yearBE);
                    }
                    updateCalendarYearToBE(instance);
                },
                onOpen: (selectedDates, dateStr, instance) => {
                    updateCalendarYearToBE(instance);
                },
                onMonthChange: (selectedDates, dateStr, instance) => {
                    updateCalendarYearToBE(instance);
                },
                onYearChange: (selectedDates, dateStr, instance) => {
                    updateCalendarYearToBE(instance);
                },
                onChange: (selectedDates, dateStr, instance) => {
                    const row = instance.element.closest('.zone-pet');
                    const age = getAgeDetail(dateStr);
                    row.querySelector('.p_age_years').value = age.y;
                    row.querySelector('.p_age_months').value = age.m;
                    const yearBE = new Date(dateStr).getFullYear() + 543;
                    instance.altInput.value = instance.altInput.value.replace(new Date(dateStr).getFullYear(), yearBE);
                }
            });
        }

        function syncFromAge(el) {
            const row = el.closest('.zone-pet');
            const years = parseInt(row.querySelector('.p_age_years').value) || 0;
            const months = parseInt(row.querySelector('.p_age_months').value) || 0;
            const d = new Date(); d.setFullYear(d.getFullYear() - years); d.setMonth(d.getMonth() - months);
            const dateStr = d.toISOString().split('T')[0];
            const picker = row.querySelector('.datepicker-thai')._flatpickr;
            picker.setDate(dateStr, true);
        }

        function getAgeDetail(dob) {
            if (!dob) return { y: 0, m: 0 };
            const birth = new Date(dob); const now = new Date();
            let years = now.getFullYear() - birth.getFullYear();
            let months = now.getMonth() - birth.getMonth();
            if (months < 0) { years--; months += 12; }
            return { y: years, m: months };
        }

        function updateBreedOptions(typeSelectEl) {
            if (!typeSelectEl) return;
            const row = typeSelectEl.closest('.zone-pet');
            const breedSelect = row.querySelector('.p_breed');
            const savedVal = breedSelect.getAttribute('data-val');
            const selectedOption = typeSelectEl.options[typeSelectEl.selectedIndex];
            const speciesId = selectedOption ? selectedOption.getAttribute('data-id') : null;
            let filteredBreeds = speciesId ? masterBreeds.filter(b => b.species_id === speciesId) : [];
            breedSelect.innerHTML = '<option value="">-- เลือกสายพันธุ์ --</option>' + filteredBreeds.map(b => `<option value="${b.name}" ${b.name === savedVal ? 'selected' : ''}>${b.name}</option>`).join('');
            if (!breedSelect.value && filteredBreeds.some(b => b.name === 'ไทย')) breedSelect.value = 'ไทย';
        }

        function addNewPetRow() {
            const div = document.createElement('div');
            div.innerHTML = petRowHtml({}, true);
            const newPetEl = div.firstElementChild;
            document.getElementById('pets-container').insertBefore(newPetEl, document.querySelector('button[onclick="addNewPetRow()"]'));
            initAllPickers();
            updateBreedOptions(newPetEl.querySelector('.p_type'));
        }

        async function readSmartCard() {
            try {
                const res = await fetch('http://127.0.0.1:8080/read');
                const result = await res.json();
                if (result.status === "success") {
                    const p = result.data;
                    document.getElementById("f_owner_name").value = p.prefix + p.firstname + " " + p.lastname;
                    document.getElementById("f_address").value = p.address;
                }
            } catch (e) { alert("❌ โปรดเปิดโปรแกรม Agent บัตรประชาชน"); }
        }

        async function saveAllData() {
            const name = document.getElementById('f_owner_name').value.trim();
            const p1 = document.getElementById('f_phone1').value.trim();
            if (!name || !p1) return alert("❌ กรุณากรอกชื่อและเบอร์โทรหลัก");
            
            let hn = document.getElementById('f_hn').value.trim();
            
            // กรณีสร้างใหม่และไม่ได้กรอก HN ให้รัน Auto
            if (!hn) {
                const hns = allOwners.map(o => parseInt(o.hn)).filter(n => !isNaN(n));
                hn = (Math.max(...hns, 690000) + 1).toString().padStart(6, '0');
            }

            try {
                const { error: ownerErr } = await db.from('owners').upsert({ hn, owner_name: name, address: document.getElementById('f_address').value }, { onConflict: 'hn' });
                if (ownerErr) throw ownerErr;

                const { error: delErr } = await db.from('owner_phones').delete().eq('owner_hn', hn);
                if (delErr) throw delErr;

                const pList = [{ owner_hn: hn, phone_number: p1, label: 'เบอร์หลัก' }];
                const p2 = document.getElementById('f_phone2').value.trim();
                if(p2) pList.push({ owner_hn: hn, phone_number: p2, label: 'เบอร์สำรอง' });
                const { error: phoneErr } = await db.from('owner_phones').insert(pList);
                if (phoneErr) throw phoneErr;
                
                const petNodes = document.querySelectorAll('.zone-pet');
                for (const node of petNodes) {
                    const petName = node.querySelector('.p_name').value;
                    if (!petName) continue;
                    const { error: petErr } = await db.from('animals').upsert({
                        id: node.getAttribute('data-pet-id') || undefined,
                        owner_hn: hn, pet_name: petName, pet_type: node.querySelector('.p_type').value || 'อื่นๆ',
                        breed: node.querySelector('.p_breed').value, gender: node.querySelector('.p_gender').value,
                        weight: parseFloat(node.querySelector('.p_weight').value) || 0, birth_date: node.querySelector('.datepicker-thai').value || null,
                        microchip_number: node.querySelector('.p_microchip').value, congenital_disease: node.querySelector('.p_congenital').value, updated_at: new Date()
                    });
                    if (petErr) throw petErr;
                }
                alert("✅ บันทึกสำเร็จ"); await loadData(); editOwner(hn);
            } catch (err) { alert(err.message); }
        }

        async function deleteOwner(hn, name) {
            if (!confirm(`⚠️ ยืนยันการลบเจ้าของ: ${name}?\nข้อมูลสัตว์ทั้งหมดจะหายไป`)) return;
            await Promise.all([
                db.from('owner_phones').delete().eq('owner_hn', hn),
                db.from('animals').delete().eq('owner_hn', hn)
            ]);
            await db.from('owners').delete().eq('hn', hn); await loadData();
            document.getElementById('form-view').innerHTML = `<div class="h-full flex flex-col items-center justify-center opacity-10"><h3>เลือกรายการเจ้าของ</h3></div>`;
        }

        async function deletePetRecord(petId, petName) {
            if (!confirm(`ลบสัตว์ "${petName}"?`)) return;
            await db.from('animals').delete().eq('id', petId); await loadData();
            editOwner(document.getElementById('f_hn').value);
        }

        function goToConsent(hn, petId = '') { 
            window.location.href = `documents.html?hn=${hn}&type=doc_consent&id=${petId}`; 
        }

        function gotoMedicalRecord(id, name, hn) { window.location.href = `medrec.html?id=${id}&name=${encodeURIComponent(name)}&hn=${hn}`; }

        async function printPetLabel(petId) {
            const pet = allAnimals.find(a => String(a.id) === String(petId));
            const owner = allOwners.find(o => o.hn === pet.owner_hn);
            if (!pet) return alert("ไม่พบข้อมูลสัตว์");

            try {
                const { data: dbTemplate } = await db.from('print_templates')
                    .select('config').eq('template_type', 'sticker_pet_id').single();

                if (!dbTemplate) return alert("❌ ไม่พบ Template 'sticker_pet_id'");

                const config = dbTemplate.config;
                const pw = config.width || 80;
                const ph = config.height || 45;

                const ownerPhone = (allPhones.find(p => p.owner_hn === pet.owner_hn && p.label === 'เบอร์หลัก') || allPhones.find(p => p.owner_hn === pet.owner_hn))?.phone_number || '-';

                const printData = {
                    clinic_name: "PK-VMS Animal Clinic",
                    pet_name: pet.pet_name,
                    hn: pet.owner_hn,
                    owner_name: owner?.owner_name || '-',
                    owner_phone: ownerPhone,
                    owner_address: owner?.address || '-',
                    species: pet.pet_type,
                    sex: pet.gender,
                    weight: pet.weight,
                    breed: pet.breed,
                    date: new Date().toLocaleDateString('th-TH'),
                    time: new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' })
                };

                const printContent = config.lines.map(l => {
                    const val = (l.text || "").replace(/\{\{(.*?)\}\}/g, (match, key) => printData[key.trim()] || match);
                    const fontSizePt = l.size || 12;
                    const textColor = l.color || '#000000';
                    let style = `position:absolute; top:${l.y}mm; font-family:${l.font || 'Sarabun'}; font-size:${fontSizePt}pt; font-weight:${l.bold ? 'bold' : 'normal'}; color:${textColor}; line-height:1.1; white-space:pre-wrap;`;

                    if (l.align === 'center') style += `left:0; width:${pw}mm; text-align:center;`;
                    else if (l.align === 'right') style += `left:0; width:${pw}mm; text-align:right; padding-right:${l.x}mm;`;
                    else style += `left:${l.x}mm; width:${l.w ? l.w + 'mm' : 'auto'}; text-align:left;`;

                    if (l.type === 'text') return `<div style="${style}">${val}</div>`;
                    if (l.type === 'rect') return `<div style="position:absolute; top:${l.y}mm; left:${l.x}mm; width:${l.w}mm; height:${l.h}mm; border:1px solid ${textColor}; border-radius:${l.radius || 0}mm;"></div>`;
                    if (l.type === 'image') return `<img src="${l.url}" style="position:absolute; top:${l.y}mm; left:${l.x}mm; width:${l.w}mm; height:${l.h}mm; object-fit:contain;">`;
                    return '';
                }).join('');

                const iframe = document.createElement('iframe');
                iframe.style.display = 'none';
                document.body.appendChild(iframe);
                const pri = iframe.contentWindow;
                pri.document.open();
               pri.document.write(`
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            font-family: 'Sarabun', sans-serif; /* บังคับใช้ฟอนต์ Sarabun */
        } 
        .page { 
            position: relative; 
            width: ${pw}mm; 
            height: ${ph}mm; 
            overflow: hidden; 
        }
    </style>
</head>
<body>
    <div class="page">${printContent}</div>
</body>
</html>
`);
                pri.document.close();
                setTimeout(() => { pri.focus(); pri.print(); document.body.removeChild(iframe); }, 700);

            } catch (err) { alert("Error: " + err.message); }
        }

        window.onload = async () => {
            lucide.createIcons();
            if (sessionStorage.getItem("isLoggedIn") !== "true") { window.location.href = "index.html"; return; }
            await loadData();
        };
    </script>
