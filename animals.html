<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <title>เวชระเบียนสัตว์ป่วย | PK-VMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>

    <style>
        :root { --navy: #0b1929; --navy-mid: #112240; --teal: #14b8b1; --white-bright: #ffffff; }
        body { font-family: "Sarabun", sans-serif; background: var(--navy); color: var(--white-bright); height: 100vh; overflow: hidden; }
        
        .form-input { 
            background: rgba(255,255,255,0.08); border: 1.5px solid rgba(255,255,255,0.2); 
            border-radius: 10px; padding: 8px 12px; width: 100%; color: white; outline: none; font-size: 0.95rem;
        }
        .form-input:focus { border-color: var(--teal); background: rgba(255,255,255,0.12); }
        select.form-input option { background: #112240; color: white; }
        .form-label { display: block; font-weight: 600; color: #94a3b8; margin-bottom: 4px; font-size: 0.85rem; }
        
        .scroll-container { scrollbar-width: thin; scrollbar-color: rgba(20, 184, 177, 0.3) transparent; overflow-y: auto; }
        .pet-entry { background: rgba(20, 184, 177, 0.05); border: 1px solid rgba(20, 184, 177, 0.2); padding: 15px; border-radius: 12px; position: relative; }
        
        tr.selectable { cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); transition: 0.2s; }
        tr.selectable:hover { background: rgba(20, 184, 177, 0.1); }
        .active-row { background: rgba(20, 184, 177, 0.2) !important; border-left: 4px solid var(--teal); }

        /* Icon Badge Styles */
        .type-badge { font-size: 1.2rem; min-width: 24px; display: inline-block; text-align: center; }
        .gender-male { color: #60a5fa; font-weight: bold; }
        .gender-female { color: #f472b6; font-weight: bold; }
    </style>
</head>
<body class="flex flex-col">

    <header class="h-16 flex items-center justify-between px-6 bg-navy-mid border-b border-white/10 shrink-0">
        <div class="flex items-center gap-3">
            <span class="text-2xl">🐾</span>
            <h1 class="text-xl font-bold tracking-tight">เวชระเบียนสัตว์ป่วย <span class="text-teal-500 text-sm ml-2 font-normal underline">PK-VMS Control</span></h1>
        </div>
        <div class="flex items-center gap-3">
            <a href="index.html" class="text-sm bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-lg transition border border-white/5">🏠 หน้าหลัก</a>
            <button id="btn-add-new" onclick="clearFormAndOpen()" class="bg-teal-600 hover:bg-teal-500 px-5 py-2 rounded-lg font-bold text-sm shadow-lg transition">+ เพิ่มเคสใหม่</button>
        </div>
    </header>

    <main class="flex flex-1 overflow-hidden">
        
        <section class="w-full md:w-[35%] flex flex-col border-r border-white/10 bg-navy/50">
            <div class="p-4 bg-navy-mid/30">
                <div class="relative">
                    <input type="text" id="search" oninput="fetchRecords()" class="form-input pl-10 py-3" placeholder="HN, ชื่อสัตว์, ชื่อเจ้าของ...">
                    <span class="absolute left-3 top-3 opacity-40">🔍</span>
                </div>
            </div>
            
            <div class="flex-1 scroll-container">
                <table class="w-full text-left border-collapse">
                    <thead class="sticky top-0 bg-navy-mid text-[10px] uppercase text-gray-500 z-10">
                        <tr>
                            <th class="p-3">สัตว์ / HN</th>
                            <th class="p-3">เจ้าของ / เบอร์โทร</th>
                        </tr>
                    </thead>
                    <tbody id="animal-list" class="text-sm">
                        </tbody>
                </table>
            </div>
        </section>

        <section id="form-container" class="hidden w-full md:w-[65%] flex flex-col bg-navy-mid/20">
            <div class="p-6 scroll-container flex-1">
                <form id="main-form" onsubmit="saveData(event)">
                    
                    <div class="mb-8">
                        <div class="flex justify-between items-end mb-4 border-b border-teal-500/30 pb-2">
                            <h2 class="text-xl font-bold text-teal-400 flex items-center gap-2">
                                👤 ข้อมูลเจ้าของ <span id="mode-text" class="text-xs font-normal text-gray-500 italic"></span>
                            </h2>
                            <div class="text-right">
                                <span class="form-label !mb-0 text-[10px]">HN เลขเวชระเบียน</span>
                                <input type="text" id="hn" class="bg-transparent text-2xl font-black text-teal-400 outline-none text-right w-32" readonly placeholder="690000">
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                            <div>
                                <label class="form-label">ชื่อเจ้าของ</label>
                                <input type="text" id="owner_name" class="form-input" required placeholder="ชื่อ-นามสกุล">
                            </div>
                            <div>
                                <label class="form-label">ที่อยู่ปัจจุบัน</label>
                                <input type="text" id="address" class="form-input" placeholder="บ้านเลขที่, ถนน, ตำบล/อำเภอ">
                            </div>
                        </div>

                        <label class="form-label">เบอร์โทรศัพท์ติดต่อ</label>
                        <div id="phone-container" class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-2"></div>
                        <button type="button" onclick="addPhoneField()" class="text-teal-500 text-xs font-bold hover:text-teal-300 transition">+ เพิ่มเบอร์โทรเพิ่ม</button>
                    </div>

                    <div class="mb-6">
                        <h2 class="text-xl font-bold text-white mb-4 flex items-center gap-2">
                            <span class="w-1.5 h-5 bg-teal-500 rounded-full"></span> ข้อมูลสัตว์เลี้ยง
                        </h2>
                        <div id="pet-container" class="space-y-4"></div>
                        <button type="button" onclick="addPetField()" class="mt-4 w-full py-3 border-2 border-dashed border-white/10 rounded-xl text-gray-400 font-bold hover:border-teal-500/50 hover:text-teal-400 transition">
                            + เพิ่มสัตว์เลี้ยงอีกตัวสำหรับเจ้าของคนนี้
                        </button>
                    </div>

                    <div class="flex justify-end gap-4 mt-10 pt-6 border-t border-white/10">
                        <button type="button" onclick="closeForm()" class="px-6 py-2 text-gray-400 hover:text-white font-bold transition">ยกเลิก/ปิด</button>
                        <button type="submit" class="bg-teal-600 hover:bg-teal-500 text-white px-12 py-3 rounded-xl font-black text-lg shadow-xl">💾 บันทึกข้อมูลทั้งหมด</button>
                    </div>
                </form>
            </div>
        </section>

        <section id="empty-state" class="w-full md:w-[65%] flex flex-col items-center justify-center text-gray-500 bg-navy-mid/10">
            <div class="text-6xl mb-4 opacity-10">🏥</div>
            <p class="text-lg">เลือกรายชื่อจากด้านซ้ายเพื่อดูประวัติหรือเพิ่มสัตว์เลี้ยง</p>
            <p class="text-sm">หรือกด "เพิ่มเคสใหม่" เพื่อลงทะเบียนเจ้าของรายใหม่</p>
        </section>

    </main>

    <script>
        let petCount = 0, phoneCount = 0;
        const breedData = {
            "สุนัข": ["ไทย", "โกลเด้น รีทรีฟเวอร์", "ไซบีเรียน ฮัสกี้", "ปอมเมอเรเนียน", "พุดเดิ้ล", "ชิสุ", "บีเกิล", "ไซบีเรียน", "อื่นๆ"],
            "แมว": ["ไทย", "เปอร์เซีย", "สก็อตติช โฟลด์", "บริติช ชอร์ตแฮร์", "วิเชียรมาศ", "เบงกอล", "อเมริกัน ชอร์ตแฮร์", "เมนคูน", "อื่นๆ"]
        };

        // --- Logic ค้นหาที่แม่นยำขึ้น ---
        async function fetchRecords() {
            const searchStr = document.getElementById('search').value.trim();
            // ค้นหาข้ามตารางผ่าน relationships
            let query = db.from('animals').select('*, owners(*, owner_phones(*))');

            if (searchStr) {
                // Logic: ค้นหา HN, ชื่อสัตว์, หรือชื่อเจ้าของ โดยใช้ ilike (case-insensitive)
                query = query.or(`pet_name.ilike.%${searchStr}%,owner_hn.ilike.%${searchStr}%,owners.owner_name.ilike.%${searchStr}%`);
            }

            const { data, error } = await query.order('created_at', { ascending: false }).limit(40);
            if (error) return console.error("Search Error:", error);
            
            const listEl = document.getElementById('animal-list');
            listEl.innerHTML = (data || []).map(item => {
                const phones = item.owners?.owner_phones || [];
                const phonesJson = encodeURIComponent(JSON.stringify(phones));
                
                // คัดเลือก Icon ตามชนิดและเพศ
                const typeIcon = item.pet_type === 'สุนัข' ? '🐶' : (item.pet_type === 'แมว' ? '🐱' : '🐾');
                const genderIcon = item.gender.includes('ผู้') ? '<span class="gender-male">♂</span>' : '<span class="gender-female">♀</span>';
                
                return `
                <tr class="selectable" onclick="selectOwner('${item.owner_hn}', '${item.owners?.owner_name}', '${item.owners?.address || ''}', '${phonesJson}', event)">
                    <td class="p-3 flex items-start gap-2">
                        <span class="type-badge">${typeIcon}</span>
                        <div>
                            <div class="text-white font-bold flex items-center gap-1">${genderIcon} ${item.pet_name}</div>
                            <div class="text-[11px] text-teal-400 font-mono">HN: ${item.owner_hn}</div>
                        </div>
                    </td>
                    <td class="p-3">
                        <div class="font-bold text-gray-200 text-xs">${item.owners?.owner_name || 'ไม่ระบุชื่อ'}</div>
                        <div class="text-[10px] text-gray-500">${phones[0]?.phone_number || '-'}</div>
                    </td>
                </tr>`;
            }).join('');
        }

        // --- ระบบจัดการฟอร์ม ---
        function selectOwner(hn, name, address, phonesJson, event) {
            document.querySelectorAll('.selectable').forEach(el => el.classList.remove('active-row'));
            event.currentTarget.classList.add('active-row');

            const phones = JSON.parse(decodeURIComponent(phonesJson));
            document.getElementById('hn').value = hn;
            document.getElementById('owner_name').value = name;
            document.getElementById('address').value = address;
            document.getElementById('mode-text').innerText = "(แก้ไข/เพิ่มข้อมูลเดิม)";

            document.getElementById('phone-container').innerHTML = '';
            phoneCount = 0;
            if (phones.length > 0) phones.forEach(p => addPhoneField(p.phone_number, p.label));
            else addPhoneField();

            document.getElementById('pet-container').innerHTML = '';
            petCount = 0;
            addPetField(); 
            openForm();
        }

        function clearFormAndOpen() {
            document.getElementById('main-form').reset();
            document.getElementById('phone-container').innerHTML = '';
            document.getElementById('pet-container').innerHTML = '';
            document.getElementById('mode-text').innerText = "(ลงทะเบียนเคสใหม่)";
            phoneCount = 0; petCount = 0;
            openForm();
            genNewHN();
            addPhoneField();
            addPetField();
        }

        function openForm() {
            document.getElementById('form-container').classList.remove('hidden');
            document.getElementById('empty-state').classList.add('hidden');
            document.getElementById('btn-add-new').classList.add('hidden');
        }

        function closeForm() {
            document.getElementById('form-container').classList.add('hidden');
            document.getElementById('empty-state').classList.remove('hidden');
            document.getElementById('btn-add-new').classList.remove('hidden');
            document.querySelectorAll('.selectable').forEach(el => el.classList.remove('active-row'));
        }

        function addPhoneField(value = '', label = 'หลัก') {
            phoneCount++;
            const html = `
                <div class="flex gap-2" id="phone-row-${phoneCount}">
                    <input type="text" name="owner_phone" value="${value}" class="form-input flex-[3]" placeholder="08xxxxxxxx" required>
                    <input type="text" name="phone_label" value="${label}" class="form-input flex-[1.5]" placeholder="ชื่อผู้โทร">
                    ${phoneCount > 1 ? `<button type="button" onclick="this.parentElement.remove()" class="text-red-400 px-1 hover:text-red-200">✕</button>` : ''}
                </div>`;
            document.getElementById('phone-container').insertAdjacentHTML('beforeend', html);
        }

        function addPetField() {
            petCount++;
            const petHtml = `
                <div id="pet-row-${petCount}" class="pet-entry">
                    <button type="button" onclick="this.parentElement.remove()" class="absolute top-2 right-3 text-red-400 text-[10px] hover:underline">ลบออก</button>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                        <div class="col-span-2 md:col-span-1">
                            <label class="form-label">ชื่อสัตว์</label>
                            <input type="text" name="pet_name" class="form-input" required>
                        </div>
                        <div>
                            <label class="form-label">ชนิด</label>
                            <select name="pet_type" class="form-input" onchange="updateBreed(this)">
                                <option value="แมว">🐱 แมว</option><option value="สุนัข">🐶 สุนัข</option><option value="อื่นๆ">อื่นๆ</option>
                            </select>
                        </div>
                        <div>
                            <label class="form-label">เพศ</label>
                            <select name="gender" class="form-input">
                                <option value="ผู้">♂ ผู้</option><option value="เมีย">♀ เมีย</option>
                                <option value="ผู้ตอน">♂ ผู้ตอน</option><option value="เมียหมัน">♀ เมียหมัน</option>
                            </select>
                        </div>
                        <div>
                            <label class="form-label">พันธุ์</label>
                            <select name="breed" class="form-input"></select>
                        </div>
                    </div>
                </div>`;
            document.getElementById('pet-container').insertAdjacentHTML('beforeend', petHtml);
            updateBreed(document.querySelector(`#pet-row-${petCount} select[name="pet_type"]`));
        }

        function updateBreed(selectEl) {
            const type = selectEl.value.includes('แมว') ? 'แมว' : (selectEl.value.includes('สุนัข') ? 'สุนัข' : 'อื่นๆ');
            const breedSelect = selectEl.parentElement.parentElement.querySelector('select[name="breed"]');
            breedSelect.innerHTML = (breedData[type] || ["อื่นๆ"]).map(b => `<option value="${b}">${b}</option>`).join('');
        }

        async function genNewHN() {
            const { data } = await db.from('owners').select('hn').order('hn', { ascending: false }).limit(1).maybeSingle();
            document.getElementById('hn').value = data ? parseInt(data.hn) + 1 : 690001;
        }

        async function saveData(e) {
            e.preventDefault();
            const hn = document.getElementById('hn').value;
            try {
                // 1. Upsert Owner
                await db.from('owners').upsert({ hn, owner_name: document.getElementById('owner_name').value, address: document.getElementById('address').value });
                // 2. Update Phones
                await db.from('owner_phones').delete().eq('owner_hn', hn);
                const phones = Array.from(document.querySelectorAll('#phone-container > div')).map(row => ({
                    owner_hn: hn, phone_number: row.querySelector('[name="owner_phone"]').value.trim(), label: row.querySelector('[name="phone_label"]').value
                }));
                if(phones.length) await db.from('owner_phones').insert(phones);
                // 3. Insert New Pets
                const pets = Array.from(document.querySelectorAll('.pet-entry')).map(row => ({
                    owner_hn: hn, 
                    pet_name: row.querySelector('[name="pet_name"]').value,
                    pet_type: row.querySelector('[name="pet_type"]').value.includes('แมว') ? 'แมว' : 'สุนัข',
                    gender: row.querySelector('[name="gender"]').value.replace(/[^ก-ฮ]/g, ''), 
                    breed: row.querySelector('[name="breed"]').value
                }));
                if(pets.length) await db.from('animals').insert(pets);
                
                alert('🎉 บันทึกข้อมูลสำเร็จ!');
                location.reload();
            } catch (err) { alert("เกิดข้อผิดพลาด: " + err.message); }
        }

        window.onload = fetchRecords;
    </script>
</body>
</html>
