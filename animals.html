<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <title>เวชระเบียนสัตว์ | PK-VMS Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>

    <style>
        :root { --navy: #0b1929; --navy-light: #112240; --teal: #14b8b1; --border: rgba(255, 255, 255, 0.1); }
        * { font-family: "Sarabun", sans-serif !important; }
        body { background: var(--navy); color: #e2e8f0; margin: 0; overflow: hidden; }

        /* SIDEBAR STYLE - CLEAN & FLAT (As Requested) */
        .sidebar-container { position: relative; width: 420px; background: #0f172a; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .pet-card { 
            padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer;
            display: grid; grid-template-columns: 70px 30px 1fr 1fr 100px; gap: 8px; align-items: center; font-size: 14px;
        }
        .pet-card:hover { background: rgba(255,255,255,0.05); }
        .pet-card.active { background: rgba(20, 184, 177, 0.15); border-left: 4px solid var(--teal); }
        .text-sidebar { color: #cbd5e1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* FORM STYLE */
        .input-box { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; color: white; width: 100%; outline: none; }
        .input-box:focus { border-color: var(--teal); }
        .zone-pet { background: rgba(30, 41, 59, 0.5); border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .label-text { color: #94a3b8; font-size: 0.85rem; margin-bottom: 4px; display: block; font-weight: 600; }
        
        /* CRITICAL UI FOR CONGENITAL */
        .critical-box { 
            background: #7f1d1d !important; color: #ffffff !important; 
            font-weight: 800; font-size: 1.15rem !important; 
            border: 2px solid #ef4444 !important; line-height: 1.4;
        }

        .btn-save-main {
            display: block; width: 100%; max-width: 400px; margin: 2rem auto;
            background: var(--teal); color: var(--navy); font-weight: 900;
            padding: 1rem; border-radius: 15px; font-size: 1.3rem; transition: 0.3s;
        }
        .btn-save-main:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(20, 184, 177, 0.3); }
    </style>
</head>
<body>
    <div class="flex h-screen overflow-hidden">
        <aside class="sidebar-container" id="sidebar">
            <div class="p-5 flex-shrink-0">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-black text-white">เวชระเบียน</h2>
                    <a href="index.html" class="text-xl opacity-70 hover:opacity-100">🏠</a>
                </div>
                <input type="text" id="search-box" class="input-box" placeholder="ค้นหาชื่อ, OPD, เบอร์โทร..." oninput="filterAnimals()">
            </div>

            <div id="animal-list" class="flex-1 overflow-y-auto px-2 pb-4"></div>

            <div class="p-4 bg-black/20 border-t border-white/5">
                <button onclick="createNewForm()" class="w-full bg-teal-600 hover:bg-teal-500 text-white font-bold py-3 rounded-xl transition-all">
                    + ลงทะเบียนใหม่
                </button>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-10 bg-[#020617]" id="form-view">
            <div class="h-full flex flex-col items-center justify-center opacity-20">
                <div class="text-[8rem] mb-4">📋</div>
                <h3 class="text-2xl font-bold">PK-VMS Record Management</h3>
                <p>เลือกข้อมูลทางซ้ายมือเพื่อแก้ไขหรือลงทะเบียน</p>
            </div>
        </main>
    </div>

    <script>
        let allAnimals = []; let allOwners = []; let allPhones = [];
        const BREEDS = {
            "สุนัข": ["ไทยหลังอาน", "บางแก้ว", "โกลเด้น รีทรีฟเวอร์", "ชิสุ", "พุดเดิ้ล", "ปอมเมอเรเนียน", "ไซบีเรียน ฮัสกี้", "เฟรนช์ บูลด็อก", "บีเกิ้ล", "ชิวาวา", "ร็อตไวเลอร์", "ดัชชุน", "ลาบราดอร์", "พิทบูล", "แจ็ค รัสเซล", "คอร์กี้", "ปั๊ก", "มอลทีส", "ยอร์คเชียร์", "ผสม"],
            "แมว": ["ไทย (วิเชียรมาศ)", "ไทย (สีสวาด)", "ไทย (ขาวมณี)", "เปอร์เซีย", "บริติช ชอร์ตแฮร์", "สก๊อตติช โฟลด์", "เบงกอล", "เมนคูน", "สฟิงซ์", "อเมริกัน ชอร์ตแฮร์", "รัสเซียน บลู", "แร็กดอลล์", "เอ็กโซติก", "มันช์กิ้น", "แมวบ้าน (Short Hair)", "สก็อตติช สเตรท", "ผสม", "แมวสามสี", "แมวส้ม", "แมวขาวดำ"],
            "อื่นๆ": ["นก", "กระต่าย", "หนูแฮมสเตอร์", "เต่า", "กิ้งก่า", "ชูการ์ไกลเดอร์", "อื่น ๆ / ผสม"]
        };

        window.onload = async () => {
            if (sessionStorage.getItem("isLoggedIn") !== "true") { window.location.href = "index.html"; return; }
            await loadData();
        };

        async function loadData() {
            const [resA, resO, resP] = await Promise.all([
                db.from('animals').select('*').order('created_at', { ascending: false }),
                db.from('owners').select('*'),
                db.from('owner_phones').select('*')
            ]);
            allAnimals = resA.data || []; allOwners = resO.data || []; allPhones = resP.data || [];
            renderList(allAnimals);
        }

        function formatThaiDate(dateStr) {
            if (!dateStr) return "-";
            const d = new Date(dateStr);
            return d.toLocaleDateString('th-TH', { day: 'numeric', month: 'long', year: 'numeric' });
        }

        function renderList(list) {
            const container = document.getElementById('animal-list');
            container.innerHTML = list.map(pet => {
                const owner = allOwners.find(o => o.hn === pet.owner_hn) || { owner_name: '-' };
                const p1 = allPhones.find(p => p.owner_hn === pet.owner_hn)?.phone_number || '-';
                const ownerFirstName = owner.owner_name.split(' ')[0]; // ตัดนามสกุลออก
                const icon = pet.pet_type === 'สุนัข' ? '🐶' : (pet.pet_type === 'แมว' ? '🐱' : '🐾');
                return `
                    <div class="pet-card" onclick="editOwner('${pet.owner_hn}')" id="hn-${pet.owner_hn}">
                        <div class="font-bold text-blue-400">#${pet.owner_hn}</div>
                        <div>${icon}</div>
                        <div class="font-bold text-white truncate">${pet.pet_name}</div>
                        <div class="text-sidebar">${ownerFirstName}</div>
                        <div class="text-sidebar text-right text-teal-400 font-medium">${p1}</div>
                    </div>`;
            }).join('');
        }

        function renderForm(owner, pets, phones = []) {
            const formView = document.getElementById('form-view');
            const p1 = phones.find(p => p.label === 'เบอร์หลัก')?.phone_number || '';
            const p2 = phones.find(p => p.label === 'เบอร์สำรอง')?.phone_number || '';
            
            formView.innerHTML = `
                <div class="max-w-4xl mx-auto animate-in fade-in duration-300">
                    <div class="bg-slate-800/40 p-8 rounded-[30px] border border-white/5 shadow-2xl mb-6 relative">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="text-xl font-bold text-blue-400 flex items-center gap-2">👤 ข้อมูลเจ้าของสัตว์</h3>
                            <button onclick="readSmartCardRecord()" id="btn-read-card" class="bg-blue-600/20 text-blue-400 border border-blue-500/40 px-4 py-1.5 rounded-xl text-sm font-bold hover:bg-blue-600 hover:text-white transition-all">
                                🪪 อ่านบัตรประชาชน
                            </button>
                        </div>
                        <div class="grid grid-cols-12 gap-5">
                            <div class="col-span-2"><label class="label-text">OPD No.</label><input type="text" id="f_hn" class="input-box bg-slate-900" value="${owner.hn}" readonly></div>
                            <div class="col-span-6"><label class="label-text">ชื่อ-นามสกุล เจ้าของ</label><input type="text" id="f_owner_name" class="input-box font-bold" value="${owner.owner_name || ''}"></div>
                            <div class="col-span-2"><label class="label-text">เบอร์หลัก</label><input type="tel" id="f_phone1" class="input-box" value="${p1}"></div>
                            <div class="col-span-2"><label class="label-text">เบอร์สำรอง</label><input type="tel" id="f_phone2" class="input-box" value="${p2}"></div>
                            <div class="col-span-12"><label class="label-text">ที่อยู่ปัจจุบัน</label><input type="text" id="f_address" class="input-box" value="${owner.address || ''}"></div>
                        </div>
                    </div>

                    <div id="pets-container" class="space-y-6">
                        ${pets.length ? pets.map(p => petRowHtml(p)).join('') : petRowHtml({})}
                    </div>

                    <button onclick="saveAllData()" class="btn-save-main active:scale-95">💾 บันทึกและตรวจสอบข้อมูล</button>
                </div>`;
            updateBreedOptions();
        }

        function petRowHtml(pet) {
            return `
                <div class="zone-pet group">
                    <div class="flex justify-between items-center mb-5">
                        <h4 class="text-lg font-bold text-white flex items-center gap-2">
                            <span>${pet.pet_name ? '🐾 ' + pet.pet_name : '✨ ลงทะเบียนสัตว์ใหม่'}</span>
                        </h4>
                        ${pet.id ? `<button onclick="gotoMedicalRecord('${pet.id}', '${pet.pet_name}', '${pet.owner_hn}')" class="text-teal-400 font-bold underline hover:text-teal-300">🏥 ประวัติการรักษา (${formatThaiDate(pet.created_at)})</button>` : ''}
                    </div>

                    <div class="grid grid-cols-12 gap-4">
                        <div class="col-span-3"><label class="label-text">ชื่อสัตว์</label><input type="text" class="p_name input-box font-bold" value="${pet.pet_name || ''}"></div>
                        <div class="col-span-2">
                            <label class="label-text">ชนิด</label>
                            <select class="p_type input-box" onchange="updateBreedOptions()">
                                <option value="สุนัข" ${pet.pet_type==='สุนัข'?'selected':''}>สุนัข</option>
                                <option value="แมว" ${pet.pet_type==='แมว'?'selected':''}>แมว</option>
                                <option value="อื่นๆ" ${pet.pet_type==='อื่นๆ'?'selected':''}>อื่นๆ</option>
                            </select>
                        </div>
                        <div class="col-span-3"><label class="label-text">สายพันธุ์</label><select class="p_breed input-box" data-val="${pet.breed || ''}"></select></div>
                        <div class="col-span-2"><label class="label-text">เพศ</label>
                            <select class="p_gender input-box"><option value="เมีย" ${pet.gender==='เมีย'?'selected':''}>เมีย</option><option value="ผู้" ${pet.gender==='ผู้'?'selected':''}>ผู้</option><option value="ผู้ตอน" ${pet.gender==='ผู้ตอน'?'selected':''}>ผู้ตอน</option><option value="เมียหมัน" ${pet.gender==='เมียหมัน'?'selected':''}>เมียหมัน</option></select>
                        </div>
                        <div class="col-span-2"><label class="label-text">น้ำหนัก (กก.)</label><input type="number" step="0.1" class="p_weight input-box text-center text-yellow-400 font-bold" value="${pet.weight || ''}"></div>
                        
                        <div class="col-span-4"><label class="label-text">วดป. เกิด</label><input type="date" class="p_dob input-box" value="${pet.birth_date || ''}"></div>
                        <div class="col-span-8"><label class="label-text">เลขไมโครชิพ</label><input type="text" class="p_microchip input-box" value="${pet.microchip_number || ''}"></div>

                        <div class="col-span-12">
                            <label class="label-text text-red-400">🚨 โรคประจำตัว / แพ้ยา / ข้อควรระวัง (ตัวอักษรใหญ่)</label>
                            <textarea class="p_congenital input-box critical-box h-[80px]">${pet.congenital_disease || ''}</textarea>
                        </div>
                    </div>
                </div>`;
        }

        function updateBreedOptions() {
            document.querySelectorAll('.zone-pet').forEach(row => {
                const type = row.querySelector('.p_type').value;
                const breedSelect = row.querySelector('.p_breed');
                const currentVal = breedSelect.getAttribute('data-val');
                const list = BREEDS[type] || BREEDS["อื่นๆ"];
                breedSelect.innerHTML = list.map(b => `<option value="${b}" ${b===currentVal?'selected':''}>${b}</option>`).join('');
            });
        }

        async function saveAllData() {
            const owner_name = document.getElementById('f_owner_name').value.trim();
            const p1 = document.getElementById('f_phone1').value.trim();
            const p2 = document.getElementById('f_phone2').value.trim();
            const addr = document.getElementById('f_address').value;
            
            if (!owner_name || !p1) return alert("❌ กรุณากรอกชื่อเจ้าของและเบอร์โทรหลัก");

            let hn = document.getElementById('f_hn').value;

            // --- SMART DUPLICATE CHECK ---
            if (hn === "AUTO" || !allOwners.find(o => o.hn === hn)) {
                const existing = allOwners.find(o => o.owner_name === owner_name);
                const phoneMatch = allPhones.find(p => p.phone_number === p1);
                
                if (existing && phoneMatch) {
                    if (confirm(`พบข้อมูลคุณ ${owner_name} ในระบบแล้ว (OPD: ${existing.hn})\nต้องการใช้ข้อมูลเดิมเพื่อป้องกันข้อมูลซ้ำซ้อนหรือไม่?`)) {
                        hn = existing.hn;
                    }
                }
            }

            // Generate New HN if still AUTO
            if (hn === "AUTO") {
                const hns = allOwners.map(o => parseInt(o.hn)).filter(n => !isNaN(n));
                hn = (hns.length > 0 ? Math.max(...hns) + 1 : 690001).toString();
            }

            try {
                // Save Owner
                await db.from('owners').upsert({ hn, owner_name, address: addr, updated_at: new Date() });
                // Save Phones
                await db.from('owner_phones').delete().eq('owner_hn', hn);
                const pList = [{ owner_hn: hn, phone_number: p1, label: 'เบอร์หลัก' }];
                if(p2) pList.push({ owner_hn: hn, phone_number: p2, label: 'เบอร์สำรอง' });
                await db.from('owner_phones').insert(pList);

                // Save Pets
                const petNodes = document.querySelectorAll('.zone-pet');
                for (const node of petNodes) {
                    const petName = node.querySelector('.p_name').value;
                    if (!petName) continue;
                    await db.from('animals').upsert({
                        owner_hn: hn, pet_name: petName, 
                        pet_type: node.querySelector('.p_type').value,
                        breed: node.querySelector('.p_breed').value,
                        gender: node.querySelector('.p_gender').value,
                        weight: parseFloat(node.querySelector('.p_weight').value) || 0,
                        birth_date: node.querySelector('.p_dob').value || null,
                        microchip_number: node.querySelector('.p_microchip').value,
                        congenital_disease: node.querySelector('.p_congenital').value,
                        updated_at: new Date()
                    }, { onConflict: 'owner_hn, pet_name' });
                }
                alert("✅ บันทึกข้อมูลเรียบร้อย (ระบบตรวจสอบข้อมูลซ้ำแล้ว)");
                await loadData();
                editOwner(hn);
            } catch (err) { alert(err.message); }
        }

        async function readSmartCardRecord() {
            const btn = document.getElementById('btn-read-card');
            try {
                btn.innerHTML = "⏳ อ่าน...";
                const res = await fetch('http://127.0.0.1:8080/read');
                const result = await res.json();
                if (result.status === "success") {
                    document.getElementById('f_owner_name').value = `${result.data.prefix}${result.data.firstname} ${result.data.lastname}`;
                    document.getElementById('f_address').value = result.data.address;
                    btn.innerHTML = "✅ สำเร็จ";
                } else { alert(result.message); }
            } catch (e) { alert("โปรดเปิดโปรแกรม Python Agent"); }
            setTimeout(() => { btn.innerHTML = "🪪 อ่านบัตรประชาชน"; }, 2000);
        }

        function createNewForm() {
            renderForm({ hn: 'AUTO', owner_name: '', address: '' }, [], []);
        }

        function editOwner(hn) {
            document.querySelectorAll('.pet-card').forEach(el => el.classList.remove('active'));
            document.getElementById(`hn-${hn}`)?.classList.add('active');
            const owner = allOwners.find(o => o.hn === hn);
            renderForm(owner, allAnimals.filter(a => a.owner_hn === hn), allPhones.filter(p => p.owner_hn === hn));
        }

        function filterAnimals() {
            const term = document.getElementById('search-box').value.toLowerCase();
            const filtered = allAnimals.filter(pet => {
                const owner = allOwners.find(o => o.hn === pet.owner_hn) || {};
                const phones = allPhones.filter(p => p.owner_hn === pet.owner_hn).map(p => p.phone_number).join(' ');
                return pet.pet_name.toLowerCase().includes(term) || pet.owner_hn.includes(term) || owner.owner_name?.toLowerCase().includes(term) || phones.includes(term);
            });
            renderList(filtered);
        }

        function gotoMedicalRecord(petId, petName, hn) {
            window.location.href = `medical_records.html?id=${petId}&name=${encodeURIComponent(petName)}&hn=${hn}`;
        }
    </script>
</body>
</html>
