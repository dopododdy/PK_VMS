<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <title>เวชระเบียนสัตว์ | PK-VMS Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>

    <style>
        /* ═══════════════════════════════════════════
           DESIGN TOKENS & TYPOGRAPHY
        ═══════════════════════════════════════════ */
        :root {
            --base-font-size: 14px; /* Default A เล็ก */
            --navy: #0b1929; 
            --navy-mid: #112240; 
            --teal: #14b8b1; 
            --hn-bg: #3b82f6; 
            --owner-zone: rgba(30, 41, 59, 0.6);
            --pet-zone: rgba(49, 46, 129, 0.4);
            --surface: rgba(255, 255, 255, 0.05); 
            --border: rgba(255, 255, 255, 0.1);
        }

        /* บังคับใช้ Sarabun ทุกส่วน */
        * { font-family: "Sarabun", sans-serif !important; }
        html { font-size: var(--base-font-size); }
        body { background: var(--navy); color: #e2e8f0; margin: 0; overflow: hidden; font-size: 1rem; }

        /* Sidebar & Layout */
        .sidebar-container { 
            position: relative; min-width: 400px; max-width: 900px; width: 500px;
            background: rgba(17, 34, 64, 0.9); backdrop-filter: blur(25px); 
            border-right: 1px solid var(--border); display: flex; flex-direction: column;
        }
        .resizer { width: 6px; cursor: col-resize; position: absolute; right: 0; top: 0; bottom: 0; z-index: 50; transition: 0.2s; }
        .resizer:hover { background: var(--teal); opacity: 0.5; }

        /* Font Control UI (เหมือนหน้า Index) */
        .font-control {
            display: flex; align-items: center; gap: 4px;
            background: var(--surface); border: 1px solid var(--border);
            padding: 4px; border-radius: 12px;
        }
        .btn-size {
            width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
            border-radius: 8px; transition: 0.2s; color: white; font-weight: bold; cursor: pointer; user-select: none;
        }
        .btn-size:hover { background: var(--border); }
        .btn-size.active { background: var(--teal); color: var(--navy); }

        /* List Items */
        .animal-item { 
            background: rgba(255,255,255,0.02); border: 1px solid transparent; 
            border-radius: 16px; padding: 1.2rem; cursor: pointer; 
            margin-bottom: 0.8rem; display: flex; align-items: center; gap: 1rem;
            transition: all 0.3s ease;
        }
        .animal-item:hover { background: rgba(20, 184, 177, 0.08); border-color: rgba(20, 184, 177, 0.3); }
        .animal-item.active { border-color: var(--teal); background: rgba(20, 184, 177, 0.12); box-shadow: 0 0 20px rgba(20, 184, 177, 0.1); }
        .hn-badge { background: var(--hn-bg); color: white; font-weight: 800; padding: 2px 8px; border-radius: 6px; font-size: 0.85rem; }

        /* Form Zones */
        .zone-owner { background: var(--owner-zone); border: 1px solid var(--border); border-radius: 24px; padding: 2rem; margin-bottom: 1.5rem; }
        .zone-pet { background: var(--pet-zone); border: 1px solid rgba(99, 102, 241, 0.2); border-radius: 24px; padding: 2rem; margin-bottom: 1.5rem; position: relative; }
        
        .label-text { color: #94a3b8; font-size: 0.95rem; font-weight: 600; margin-bottom: 4px; display: block; }
        .input-box { 
            background: rgba(0,0,0,0.3); border: 1px solid var(--border); 
            border-radius: 12px; padding: 10px 14px; color: white; width: 100%; 
            font-size: 1.1rem; outline: none; transition: 0.2s;
        }
        .input-box:focus { border-color: var(--teal); background: rgba(0,0,0,0.5); box-shadow: 0 0 0 3px rgba(20, 184, 177, 0.2); }
        .input-box[readonly] { background: rgba(255,255,255,0.05); color: #60a5fa; font-weight: 800; cursor: not-allowed; }
        
        .btn-medical {
            background: rgba(20, 184, 177, 0.1); border: 1px solid var(--teal); color: var(--teal);
            padding: 8px 16px; border-radius: 12px; font-weight: 700; transition: all 0.2s;
        }
        .btn-medical:hover { background: var(--teal); color: white; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="flex h-screen overflow-hidden">
        
        <aside class="sidebar-container" id="sidebar">
            <div class="resizer" id="resizer"></div>
            
            <div class="p-6 flex-shrink-0">
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <h2 class="text-2xl font-black text-white tracking-tight">เวชระเบียนสัตว์</h2>
                        <p class="text-xs text-teal-500 font-bold uppercase tracking-widest mt-1">Medical Records</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <div class="font-control mr-2">
                            <div id="size-14" class="btn-size text-xs" onclick="changeFontSize(14)">A</div>
                            <div id="size-16" class="btn-size text-sm" onclick="changeFontSize(16)">A</div>
                            <div id="size-20" class="btn-size text-lg" onclick="changeFontSize(20)">A</div>
                        </div>
                        <button onclick="loadData()" class="hover:rotate-180 transition-all duration-500 text-xl">🔄</button>
                        <a href="index.html" class="bg-white/5 w-10 h-10 flex items-center justify-center rounded-xl hover:bg-white/10 transition-all">🏠</a>
                    </div>
                </div>
                
                <div class="relative">
                    <input type="text" id="search-box" 
                           class="w-full bg-black/40 border border-white/10 rounded-2xl p-4 pl-12 text-lg text-white outline-none focus:border-teal-500 transition-all" 
                           placeholder="ค้นหาชื่อสัตว์, HN, เบอร์โทร..." oninput="filterAnimals()">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 opacity-30 text-xl">🔍</span>
                </div>
            </div>

            <div id="animal-list" class="flex-1 overflow-y-auto px-6 pb-4"></div>

            <div class="p-6 bg-black/20 border-t border-white/5">
                <button onclick="createNewForm()" class="w-full bg-teal-600 hover:bg-teal-500 text-white font-black py-4 rounded-2xl text-xl shadow-lg active:scale-95 transition-all">
                    + ลงทะเบียนรายใหม่
                </button>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-12 bg-[#080f1a]" id="form-view">
            <div class="h-full flex flex-col items-center justify-center opacity-10 text-center">
                <div class="text-[10rem] mb-4">📋</div>
                <h3 class="text-3xl font-black">PK-VMS Dashboard</h3>
                <p class="text-lg">เลือกรายชื่อสัตว์ป่วยจากแถบด้านซ้ายเพื่อจัดการข้อมูล</p>
            </div>
        </main>
    </div>

    <script>
        let allAnimals = []; let allOwners = []; let allPhones = [];
        const MONTHS_TH = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];

        // ระบบปรับขนาด Font (เหมือน index.html)
        function changeFontSize(size) {
            document.documentElement.style.setProperty('--base-font-size', size + 'px');
            localStorage.setItem('preferred-font-size', size);
            document.querySelectorAll('.btn-size').forEach(btn => btn.classList.remove('active'));
            const activeBtn = document.getElementById('size-' + size);
            if(activeBtn) activeBtn.classList.add('active');
        }

        // Sidebar Resizer
        const sidebar = document.getElementById("sidebar");
        const resizer = document.getElementById("resizer");
        resizer.addEventListener("mousedown", () => {
            document.addEventListener("mousemove", resize);
            document.addEventListener("mouseup", () => document.removeEventListener("mousemove", resize));
        });
        function resize(e) { 
            if(e.pageX > 350 && e.pageX < 900) sidebar.style.width = e.pageX + "px"; 
        }

        window.onload = async () => {
            // โหลด Font Size
            const savedSize = localStorage.getItem('preferred-font-size') || '14';
            changeFontSize(parseInt(savedSize));

            if (sessionStorage.getItem("isLoggedIn") !== "true") { window.location.href = "index.html"; return; }
            await loadData();
        };

        async function loadData() {
            try {
                const [resA, resO, resP] = await Promise.all([
                    db.from('animals').select('*').order('created_at', { ascending: false }),
                    db.from('owners').select('*'),
                    db.from('owner_phones').select('*')
                ]);
                allAnimals = resA.data || []; allOwners = resO.data || []; allPhones = resP.data || [];
                renderList(allAnimals);
            } catch (e) { console.error(e); }
        }

        function renderList(list) {
            const container = document.getElementById('animal-list');
            container.innerHTML = list.map(pet => {
                const owner = allOwners.find(o => o.hn === pet.owner_hn) || { owner_name: '-' };
                const phones = allPhones.filter(p => p.owner_hn === pet.owner_hn).map(p => p.phone_number).join(', ');
                const icon = pet.pet_type === 'สุนัข' ? '🐶' : (pet.pet_type === 'แมว' ? '🐱' : '🐾');
                return `
                    <div class="animal-item" onclick="editOwner('${pet.owner_hn}')" id="hn-${pet.owner_hn}">
                        <div class="text-3xl bg-white/5 w-12 h-12 flex items-center justify-center rounded-2xl">${icon}</div>
                        <div class="flex-1">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="hn-badge">HN ${pet.owner_hn}</span>
                                <span class="text-xl font-bold text-white">${pet.pet_name}</span>
                            </div>
                            <div class="flex flex-col text-sm">
                                <span class="text-slate-400 font-medium">👤 ${owner.owner_name}</span>
                                <span class="text-teal-500 font-bold">📞 ${phones || 'ไม่มีเบอร์'}</span>
                            </div>
                        </div>
                    </div>`;
            }).join('');
        }

        // --- ส่วนที่เหลือของ Logic เดิม (createNewForm, editOwner, renderForm, saveAllData, etc.) ---
        // ใส่ Code เดิมของคุณต่อจากตรงนี้ได้เลยครับ โดยใช้ HTML Template ที่ปรับปรุงแล้วข้างต้น

        async function createNewForm() {
            let nextHN = "690001";
            if (allOwners.length > 0) {
                const maxHN = Math.max(...allOwners.map(o => parseInt(o.hn)).filter(n => !isNaN(n)));
                if (maxHN !== -Infinity) nextHN = (maxHN + 1).toString();
            }
            renderForm({ hn: nextHN, owner_name: '', address: '' }, [], [], true); 
        }

        function editOwner(hn) {
            document.querySelectorAll('.animal-item').forEach(el => el.classList.remove('active'));
            const item = document.getElementById(`hn-${hn}`);
            if(item) item.classList.add('active');
            const owner = allOwners.find(o => o.hn === hn);
            const pets = allAnimals.filter(a => a.owner_hn === hn);
            const phones = allPhones.filter(p => p.owner_hn === hn);
            renderForm(owner, pets, phones, false);
        }

        function renderForm(owner, pets, phones = [], isNew = false) {
            const formView = document.getElementById('form-view');
            const p1 = phones[0]?.phone_number || '';
            const p2 = phones[1]?.phone_number || '';

            formView.innerHTML = `
                <div class="max-w-5xl mx-auto animate-in fade-in slide-in-from-bottom-4 duration-500 pb-20">
                    <div class="flex justify-between items-center mb-10">
                        <h2 class="text-4xl font-black text-white">📂 ${isNew ? 'ลงทะเบียนใหม่' : 'แก้ไขเวชระเบียน'} <span class="text-teal-500 ml-2">HN: ${owner.hn}</span></h2>
                    </div>
                    
                    <div class="zone-owner">
                        <h3 class="text-xl font-bold text-blue-400 mb-6 flex items-center gap-2">👤 ข้อมูลเจ้าของ</h3>
                        <div class="grid grid-cols-12 gap-5">
                            <div class="col-span-3"><label class="label-text">เลข HN</label>
                                <input type="text" id="f_hn" class="input-box" value="${owner.hn}" readonly></div>
                            <div class="col-span-5"><label class="label-text">ชื่อเจ้าของ</label>
                                <input type="text" id="f_owner_name" class="input-box" value="${owner.owner_name || ''}" placeholder="ระบุชื่อ-นามสกุล"></div>
                            <div class="col-span-2"><label class="label-text">เบอร์โทร 1</label>
                                <input type="tel" id="f_phone1" class="input-box" value="${p1}" placeholder="08xxxxxxxx"></div>
                            <div class="col-span-2"><label class="label-text">เบอร์โทร 2</label>
                                <input type="tel" id="f_phone2" class="input-box" value="${p2}"></div>
                            <div class="col-span-12"><label class="label-text">ที่อยู่</label>
                                <input type="text" id="f_address" class="input-box" value="${owner.address || ''}"></div>
                        </div>
                    </div>

                    <div class="flex justify-between items-end mt-12 mb-6">
                        <h3 class="text-2xl font-black text-indigo-400">🐾 รายการสัตว์เลี้ยง</h3>
                        <button onclick="addPetRow()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-2 rounded-xl font-bold shadow-lg active:scale-95 transition-all">+ เพิ่มสัตว์</button>
                    </div>

                    <div id="pets-container" class="space-y-6">
                        ${pets.length ? pets.map(p => petRowHtml(p)).join('') : petRowHtml({})}
                    </div>

                    <button onclick="saveAllData()" class="w-full bg-teal-600 hover:bg-teal-500 text-white font-black py-6 rounded-3xl text-3xl shadow-2xl mt-12 active:scale-95 transition-all">
                        💾 บันทึกข้อมูลทั้งหมด
                    </button>
                </div>`;
        }

        // --- ฟังชั่นช่วยอื่นๆ --- (petRowHtml, calcAge, saveAllData ฯลฯ ใช้ตาม Logic เดิมของคุณได้เลยครับ)
        function petRowHtml(pet) {
            let thaiDate = "ยังไม่ได้ระบุ";
            let ageY = ""; let ageM = "";
            if(pet.birth_date) {
                const d = new Date(pet.birth_date);
                thaiDate = `${d.getDate()} ${MONTHS_TH[d.getMonth()]} ${d.getFullYear()+543}`;
                const now = new Date();
                ageY = now.getFullYear() - d.getFullYear();
                ageM = now.getMonth() - d.getMonth();
                if(ageM < 0) { ageY--; ageM += 12; }
            }

            return `
                <div class="zone-pet group relative">
                    <div class="flex justify-between items-center mb-6">
                        <div class="flex items-center gap-4">
                             <div class="text-3xl">${pet.pet_type === 'สุนัข' ? '🐶' : (pet.pet_type === 'แมว' ? '🐱' : '🐾')}</div>
                             <h4 class="text-xl font-black text-white">${pet.pet_name || 'ข้อมูลสัตว์ใหม่'}</h4>
                        </div>
                        ${pet.id ? `
                        <button onclick="gotoMedicalRecord('${pet.id}', '${pet.pet_name}', '${pet.owner_hn}')" class="btn-medical flex items-center gap-2">
                            🏥 ประวัติการรักษา
                        </button>` : ''}
                    </div>

                    <div class="grid grid-cols-12 gap-5">
                        <div class="col-span-3">
                            <label class="label-text">ชื่อสัตว์ / ชนิด / เพศ</label>
                            <input type="text" class="p_name input-box mb-3 font-bold" value="${pet.pet_name || ''}" placeholder="ชื่อสัตว์">
                            <div class="grid grid-cols-2 gap-2">
                                <select class="p_type input-box !text-base !py-2"><option value="แมว" ${pet.pet_type==='แมว'?'selected':''}>🐱 แมว</option><option value="สุนัข" ${pet.pet_type==='สุนัข'?'selected':''}>🐶 สุนัข</option><option value="อื่นๆ" ${pet.pet_type==='อื่นๆ'?'selected':''}>🐾 อื่นๆ</option></select>
                                <select class="p_gender input-box !text-base !py-2"><option value="เมีย" ${(!pet.gender||pet.gender==='เมีย')?'selected':''}>♀️ เมีย</option><option value="ผู้" ${pet.gender==='ผู้'?'selected':''}>♂️ ผู้</option><option value="ผู้ตอน" ${pet.gender==='ผู้ตอน'?'selected':''}>♂️ ผู้ตอน</option><option value="เมียหมัน" ${pet.gender==='เมียหมัน'?'selected':''}>♀️ เมียหมัน</option></select>
                            </div>
                        </div>
                        <div class="col-span-3">
                            <label class="label-text">สายพันธุ์ / ไมโครชิพ</label>
                            <input type="text" class="p_breed input-box mb-3" value="${pet.breed || ''}" placeholder="สายพันธุ์">
                            <input type="text" class="p_microchip input-box" value="${pet.microchip_number || ''}" placeholder="เลขไมโครชิพ">
                        </div>
                        <div class="col-span-4">
                            <label class="label-text">วันเกิด: <span class="text-teal-400 p_dob_display font-bold">${thaiDate}</span></label>
                            <input type="date" class="p_dob input-box mb-3" value="${pet.birth_date || ''}" onchange="calcAge(this)">
                            <div class="flex gap-4">
                                <div class="flex-1"><label class="text-[10px] text-indigo-300 font-bold uppercase">ปี</label>
                                    <input type="number" class="p_age_y input-box !py-1 font-bold text-teal-400" value="${ageY}" placeholder="0" oninput="calcDOB(this)"></div>
                                <div class="flex-1"><label class="text-[10px] text-indigo-300 font-bold uppercase">เดือน</label>
                                    <input type="number" class="p_age_m input-box !py-1 font-bold text-teal-400" value="${ageM}" placeholder="0" oninput="calcDOB(this)"></div>
                            </div>
                        </div>
                        <div class="col-span-2">
                            <label class="label-text">น้ำหนัก (กก.)</label>
                            <input type="number" step="0.1" class="p_weight input-box font-bold text-yellow-400" value="${pet.weight || ''}" placeholder="0.0">
                        </div>
                        <div class="col-span-12">
                            <label class="label-text">โรคประจำตัว / แพ้ยา</label>
                            <textarea class="p_congenital input-box h-[60px]" placeholder="ระบุสิ่งที่ต้องระวัง...">${pet.congenital_disease || ''}</textarea>
                        </div>
                    </div>
                    <button onclick="this.parentElement.remove()" class="absolute -right-3 -top-3 bg-red-500 hover:bg-red-600 text-white w-8 h-8 rounded-full font-bold opacity-0 group-hover:opacity-100 transition-all shadow-lg">✕</button>
                </div>`;
        }
        
        // ... (ใส่ฟังชั่นอื่นๆ ที่เหลือ เช่น calcAge, calcDOB, saveAllData และ filterAnimals) ...
    </script>
</body>
</html>
