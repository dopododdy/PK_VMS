<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เวชระเบียนสัตว์ | PK-VMS Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Kanit:wght@300;400;500;600;700&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="ui-settings.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/th.js"></script>

    <style>
        :root { --navy: #020617; --navy-light: #0f172a; --teal: #14b8b1; --border: rgba(255, 255, 255, 0.1); }
        * { font-family: "Sarabun", sans-serif !important; }
        body { background: var(--navy); color: #e2e8f0; margin: 0; overflow: hidden; }

        .sidebar-container { position: relative; width: 480px; background: #0f172a; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .pet-card { 
            padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer;
            display: grid; grid-template-columns: 85px 1fr 100px; gap: 12px; align-items: stretch; transition: 0.2s;
        }
        .pet-card:hover { background: rgba(255,255,255,0.07); }
        .pet-card.active { background: rgba(20, 184, 177, 0.12); border-left: 4px solid var(--teal); }
        
        .pet-main-name { color: #fff; font-weight: 800; font-size: 1.1rem; line-height: 1.2; }
        .hn-col { background: rgba(30, 41, 59, 1); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 900; color: #60a5fa; font-size: 1.1rem; border: 1px solid rgba(255,255,255,0.1); }
        .owner-subtext { color: #94a3b8; font-size: 0.85rem; }
        .phone-badge { color: var(--teal); font-weight: 700; font-size: 0.85rem; }

        .btn-base {
            padding: 10px 20px; border-radius: 12px; font-weight: 800;
            display: inline-flex; align-items: center; justify-content: center;
            gap: 8px; transition: all 0.2s; border: none; cursor: pointer; color: white !important;
        }
        .btn-base:active { transform: scale(0.95); }
        .btn-teal { background-color: #0d9488 !important; } 
        .btn-teal:hover { background-color: #0f766e !important; }
        .btn-blue { background-color: #2563eb !important; } 
        .btn-blue:hover { background-color: #1d4ed8 !important; }
        .btn-red { background-color: #dc2626 !important; } 
        .btn-red:hover { background-color: #b91c1c !important; }
        .btn-gray { background-color: #475569 !important; } 
        .btn-gray:hover { background-color: #334155 !important; }
        .btn-orange { background-color: #ea580c !important; }
        .btn-orange:hover { background-color: #c2410c !important; }

        .input-box { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; padding: 12px; color: white; width: 100%; outline: none; transition: 0.2s; }
        .input-box:focus { border-color: var(--teal); background: rgba(0,0,0,0.5); }
        .zone-pet { background: rgba(30, 41, 59, 0.4); border-radius: 25px; padding: 25px; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.05); }
        .label-text { color: #94a3b8; font-size: 0.85rem; margin-bottom: 6px; display: block; font-weight: 700; }
        .critical-box { background: #7f1d1d !important; color: #ffffff !important; font-weight: 800; border: 2px solid #ef4444 !important; }
        
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        /* ─── Bulk OPD Modal ─── */
        .bulk-modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.85); backdrop-filter:blur(6px); z-index:200; display:none; align-items:center; justify-content:center; padding:20px; }
        .bulk-modal-content { background:#0f172a; border:1px solid rgba(255,255,255,0.1); border-radius:24px; width:100%; max-width:900px; max-height:92vh; display:flex; flex-direction:column; overflow:hidden; box-shadow:0 25px 50px rgba(0,0,0,0.6); }
        .bulk-item-tag { display:inline-flex; align-items:center; gap:6px; padding:4px 10px; border-radius:20px; font-weight:700; font-size:0.82rem; cursor:default; }
        .bulk-item-tag .remove-tag { cursor:pointer; opacity:0.7; font-size:1rem; line-height:1; }
        .bulk-item-tag .remove-tag:hover { opacity:1; }
        .animal-checkbox-row { display:flex; align-items:center; gap:10px; padding:10px 14px; border-radius:12px; border:1px solid rgba(255,255,255,0.06); background:rgba(0,0,0,0.2); cursor:pointer; transition:0.15s; }
        .animal-checkbox-row:hover { background:rgba(20,184,177,0.08); border-color:rgba(20,184,177,0.3); }
        .animal-checkbox-row input[type=checkbox] { width:18px; height:18px; accent-color:#14b8b1; cursor:pointer; flex-shrink:0; }
        .label-clinical-bulk { color:#14b8b1; font-weight:800; font-size:1rem; margin-bottom:4px; display:block; }
    </style>
</head>
<body>
    <div class="flex h-screen overflow-hidden">
        <aside class="sidebar-container">
            <div class="p-6 flex-shrink-0 border-b border-white/5">
                <div class="flex justify-between items-center mb-5">
                    <div class="flex items-center gap-3">
                        <span class="text-4xl">🐾</span>
                        <h2 class="text-2xl font-black text-white">เวชระเบียน</h2>
                    </div>
                    <a href="index.html" class="flex items-center gap-2 px-3 py-2 rounded-xl bg-white/5 hover:bg-teal-500/20 hover:text-teal-400 transition-all text-gray-300 font-bold text-sm">
                        <span class="text-xl">🏠</span><span>หน้าหลัก</span>
                    </a>
                </div>
                <input type="text" id="search-box" class="input-box" placeholder="ค้นหา HN, ชื่อ, เบอร์โทร, ที่อยู่, บันทึกการรักษา..." oninput="renderSidebar()">
            </div>
            <div class="flex gap-2 px-4 py-2 flex-shrink-0 border-b border-white/5">
                <button id="tab-all" onclick="switchTab('all')" class="flex-1 py-2 rounded-xl font-bold text-sm transition-all bg-teal-500/20 text-teal-400 border border-teal-500/30">📋 เวชระเบียน</button>
                <button id="tab-today" onclick="switchTab('today')" class="flex-1 py-2 rounded-xl font-bold text-sm transition-all bg-white/5 text-gray-400 hover:bg-white/10 border border-transparent relative">📅 นัดหมายวันนี้<span id="tab-today-badge" class="hidden absolute -top-1.5 -right-1.5 bg-orange-500 text-white text-xs font-black rounded-full w-5 h-5 flex items-center justify-center"></span></button>
            </div>
            <div id="owner-list" class="flex-1 overflow-y-auto px-2 pb-10 custom-scroll"></div>
            <div class="p-5">
                <button onclick="createNewForm()" class="w-full btn-base btn-teal py-4 text-xl shadow-lg">
                    + ลงทะเบียนเจ้าของใหม่
                </button>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-12 bg-[#020617] custom-scroll" id="form-view">
            <div class="h-full flex flex-col items-center justify-center opacity-10">
                <div class="text-9xl mb-4">📋</div>
                <h3 class="text-3xl font-bold">เลือกรายการเจ้าของเพื่อดูข้อมูลหรือเพิ่มสัตว์ใหม่</h3>
            </div>
        </main>
    </div>

    <script>
        let allAnimals = []; 
        let allOwners = []; 
        let allPhones = [];
        let masterSpecies = [];
        let masterBreeds = [];
        let allMedRecs = [];
        let allMedItems = [];
        // Precomputed lookup maps – rebuilt whenever data is refreshed
        let _primaryPhoneMap = new Map();
        let _allPhonesMap = new Map();
        let _medTextByAnimalId = new Map();
        let petCollapseCount = 0;

        function formatThaiDate(dateString, format = 'long') {
            if (!dateString) return "-";
            const date = new Date(dateString);
            const monthsShort = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];
            const monthsLong = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
            const d = date.getDate();
            const m = format === 'short' ? monthsShort[date.getMonth()] : monthsLong[date.getMonth()];
            const y = date.getFullYear() + 543;
            return `${d} ${m} ${y}`;
        }

        async function loadData() {
            const [resO, resA, resP, resSpecies, resBreeds, resMedRecs, resMedItems] = await Promise.all([
                db.from('owners').select('*'),
                db.from('animals').select('*'),
                db.from('owner_phones').select('*'),
                db.from('mas_species').select('*').order('name'),
                db.from('mas_breeds').select('*').order('name'),
                db.from('medical_records').select('id, animal_id, owner_hn, created_at, cc, hx, pe, dx, appointment, appointment_2, appointment_note, appointment_note_2'),
                db.from('medical_record_items').select('record_id, item_name')
            ]);
            allOwners = resO.data || [];
            allAnimals = resA.data || [];
            allPhones = resP.data || [];
            masterSpecies = resSpecies.data || [];
            masterBreeds = resBreeds.data || [];
            allMedRecs = resMedRecs.data || [];
            allMedItems = resMedItems.data || [];
            buildLookupMaps();
            if (currentSidebarTab === 'today') renderTodayAppointments();
            else renderSidebar();
        }

        function buildLookupMaps() {
            _primaryPhoneMap = new Map();
            _allPhonesMap = new Map();
            allPhones.forEach(p => {
                if (p.label === 'เบอร์หลัก' && !_primaryPhoneMap.has(p.owner_hn)) {
                    _primaryPhoneMap.set(p.owner_hn, p.phone_number);
                }
                if (!_allPhonesMap.has(p.owner_hn)) _allPhonesMap.set(p.owner_hn, []);
                _allPhonesMap.get(p.owner_hn).push(p.phone_number);
            });

            const medItemMap = new Map();
            allMedItems.forEach(mi => {
                if (!medItemMap.has(mi.record_id)) medItemMap.set(mi.record_id, []);
                medItemMap.get(mi.record_id).push((mi.item_name || '').toLowerCase());
            });

            _medTextByAnimalId = new Map();
            allMedRecs.forEach(rec => {
                const dateStr = (rec.created_at || '').slice(0, 10);
                const items = medItemMap.get(rec.id) || [];
                const text = [dateStr, rec.cc, rec.hx, rec.pe, rec.dx, ...items]
                    .filter(Boolean).join(' ').toLowerCase();
                const prev = _medTextByAnimalId.get(rec.animal_id) || '';
                _medTextByAnimalId.set(rec.animal_id, prev + ' ' + text);
            });
            updateTodayBadge();
        }

        let currentSidebarTab = 'all';

        function switchTab(tab) {
            currentSidebarTab = tab;
            const searchBox = document.getElementById('search-box');
            const tabAll = document.getElementById('tab-all');
            const tabToday = document.getElementById('tab-today');
            if (tab === 'all') {
                tabAll.className = 'flex-1 py-2 rounded-xl font-bold text-sm transition-all bg-teal-500/20 text-teal-400 border border-teal-500/30';
                tabToday.className = 'flex-1 py-2 rounded-xl font-bold text-sm transition-all bg-white/5 text-gray-400 hover:bg-white/10 border border-transparent relative';
                searchBox.style.display = '';
                renderSidebar();
            } else {
                tabAll.className = 'flex-1 py-2 rounded-xl font-bold text-sm transition-all bg-white/5 text-gray-400 hover:bg-white/10 border border-transparent';
                tabToday.className = 'flex-1 py-2 rounded-xl font-bold text-sm transition-all bg-orange-500/20 text-orange-400 border border-orange-500/30 relative';
                searchBox.style.display = 'none';
                renderTodayAppointments();
            }
        }

        function getTodayStr() {
            const now = new Date();
            return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
        }

        function updateTodayBadge() {
            const today = getTodayStr();
            const seenAnimals = new Set();
            allMedRecs.forEach(r => {
                if (r.appointment === today || r.appointment_2 === today) seenAnimals.add(r.animal_id);
            });
            const badge = document.getElementById('tab-today-badge');
            if (!badge) return;
            if (seenAnimals.size > 0) {
                badge.textContent = seenAnimals.size;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }

        function renderTodayAppointments() {
            const today = getTodayStr();
            const container = document.getElementById('owner-list');
            const ownerMap = new Map(allOwners.map(o => [o.hn, o]));

            // Group today's appointment records by animal_id
            const animalApptMap = new Map();
            allMedRecs.forEach(r => {
                const notes = [];
                if (r.appointment === today) notes.push(r.appointment_note || 'นัดหมาย');
                if (r.appointment_2 === today) notes.push(r.appointment_note_2 || 'นัดหมาย');
                if (notes.length === 0) return;
                if (!animalApptMap.has(r.animal_id)) animalApptMap.set(r.animal_id, new Set());
                notes.forEach(n => animalApptMap.get(r.animal_id).add(n));
            });

            const animalsWithAppt = allAnimals.filter(a => animalApptMap.has(a.id));

            if (animalsWithAppt.length === 0) {
                container.innerHTML = `<div class="text-center text-slate-500 py-16 px-4"><div class="text-5xl mb-4">📅</div><div class="font-bold text-lg">ไม่มีนัดหมายวันนี้</div></div>`;
                return;
            }

            const todayDisplay = formatThaiDate(today);
            container.innerHTML = `
                <div class="px-4 py-3 text-orange-400 font-bold text-sm border-b border-white/5 flex items-center gap-2">
                    <span>📅</span><span>นัดหมาย ${todayDisplay}</span>
                    <span class="ml-auto bg-orange-500/20 text-orange-300 text-xs px-2 py-0.5 rounded-full border border-orange-500/30">${animalsWithAppt.length} รายการ</span>
                </div>
                ${animalsWithAppt.map(animal => {
                    const owner = ownerMap.get(animal.owner_hn);
                    const p1 = _primaryPhoneMap.get(animal.owner_hn) || '-';
                    const typeIcon = animal.pet_type === 'สุนัข' ? '🐶' : (animal.pet_type === 'แมว' ? '🐱' : '🐾');
                    const notes = [...animalApptMap.get(animal.id)];
                    const apptHtml = notes.map(n =>
                        `<span class="inline-flex items-center gap-1 bg-orange-500/20 text-orange-300 text-xs px-2 py-0.5 rounded-full font-bold border border-orange-500/30">📌 ${n}</span>`
                    ).join('');
                    return `
                        <div class="pet-card" onclick="editOwner('${animal.owner_hn}')" id="appt-${animal.id}">
                            <div class="hn-col">#${animal.owner_hn}</div>
                            <div class="flex flex-col justify-center min-w-0 px-2 gap-1">
                                <span class="pet-main-name truncate">${animal.pet_name}</span>
                                <span class="owner-subtext truncate">👤 ${owner?.owner_name || '-'}</span>
                                <span class="phone-badge">📞 ${p1}</span>
                                <div class="flex flex-wrap gap-1 mt-1">${apptHtml}</div>
                            </div>
                            <div class="flex items-center justify-end gap-1 text-2xl pr-2">
                                <span>${typeIcon}</span>
                            </div>
                        </div>`;
                }).join('')}`;
        }

        function renderSidebar() {
            const term = document.getElementById('search-box').value.toLowerCase();
            const container = document.getElementById('owner-list');
            const ownerMap = new Map(allOwners.map(o => [o.hn, o]));

            // Owners who have no pets yet
            const ownersWithPets = new Set(allAnimals.map(a => a.owner_hn));
            const ownerOnlyEntries = allOwners
                .filter(o => !ownersWithPets.has(o.hn))
                .map(o => ({ _ownerOnly: true, owner_hn: o.hn }));

            // Merge pets and owner-only entries, sorted by owner_hn descending
            const allItems = [...allAnimals, ...ownerOnlyEntries]
                .sort((a, b) => parseInt(b.owner_hn) - parseInt(a.owner_hn));

            const filtered = !term ? allItems : allItems.filter(item => {
                const owner = ownerMap.get(item.owner_hn);
                const phones = _allPhonesMap.get(item.owner_hn) || [];
                const address = (owner?.address || '').toLowerCase();
                const ownerName = (owner?.owner_name || '').toLowerCase();
                const lineId = (owner?.line_id || '').toLowerCase();
                const email = (owner?.email || '').toLowerCase();
                const basicMatch = item.owner_hn.includes(term) || ownerName.includes(term) ||
                    phones.some(p => p.includes(term)) || address.includes(term) || lineId.includes(term) || email.includes(term);
                if (item._ownerOnly) {
                    return basicMatch;
                }
                const medText = _medTextByAnimalId.get(item.id) || '';
                return basicMatch || item.pet_name.toLowerCase().includes(term) || medText.includes(term);
            });

            container.innerHTML = filtered.map(item => {
                const owner = ownerMap.get(item.owner_hn);
                const p1 = _primaryPhoneMap.get(item.owner_hn) || '-';
                if (item._ownerOnly) {
                    return `
                        <div class="pet-card" onclick="editOwner('${item.owner_hn}')" ondblclick="document.getElementById('search-box').value='${item.owner_hn}'; renderSidebar()" id="owner-${item.owner_hn}">
                            <div class="hn-col">#${item.owner_hn}</div>
                            <div class="flex flex-col justify-center min-w-0 px-2">
                                <span class="pet-main-name truncate text-slate-400">ยังไม่มีสัตว์เลี้ยง</span>
                                <span class="owner-subtext truncate">👤 ${owner?.owner_name || '-'}</span>
                                <span class="phone-badge">📞 ${p1}</span>
                            </div>
                            <div class="flex items-center justify-end gap-1 text-2xl pr-2">
                                <span>👤</span>
                            </div>
                        </div>`;
                }
                const typeIcon = item.pet_type === 'สุนัข' ? '🐶' : (item.pet_type === 'แมว' ? '🐱' : '🐾');
                return `
                    <div class="pet-card" onclick="editOwner('${item.owner_hn}')" ondblclick="document.getElementById('search-box').value='${item.owner_hn}'; renderSidebar()" id="pet-${item.id}">
                        <div class="hn-col">#${item.owner_hn}</div>
                        <div class="flex flex-col justify-center min-w-0 px-2">
                            <span class="pet-main-name truncate">${item.pet_name}</span>
                            <span class="owner-subtext truncate">👤 ${owner?.owner_name || '-'}</span>
                            <span class="phone-badge">📞 ${p1}</span>
                        </div>
                        <div class="flex items-center justify-end gap-1 text-2xl pr-2">
                            <span>${typeIcon}</span>
                        </div>
                    </div>`;
            }).join('');
        }

        async function editOwner(hn) {
            document.querySelectorAll('.pet-card').forEach(el => el.classList.remove('active'));
            const owner = allOwners.find(o => o.hn === hn);
            if (!owner) return createNewForm();
            const pets = allAnimals.filter(a => a.owner_hn === hn);
            const phones = allPhones.filter(p => p.owner_hn === hn);
            renderForm(owner, pets, phones);
        }

        function createNewForm() { renderForm({ hn: '', owner_name: '', address: '', line_id: '', email: '' }, [], []); document.getElementById('f_hn').focus(); }

        function renderForm(owner, pets, phones = []) {
            const formView = document.getElementById('form-view');
            const isNew = owner.hn === '';
            const sortedPets = [...pets].sort((a, b) => (a.pet_name || '').localeCompare(b.pet_name || '', 'th'));
            formView.innerHTML = `
                <div class="max-w-5xl mx-auto pb-32">
                    <div class="bg-slate-800/40 p-10 rounded-[40px] border border-white/5 mb-8 shadow-2xl">
                        <div class="flex justify-between items-center mb-8">
                            <h3 class="text-3xl font-black text-blue-400 flex items-center gap-3">👤 ข้อมูลเจ้าของสัตว์</h3>
                            <div class="flex gap-3">
                                <button onclick="readSmartCard()" class="btn-base btn-blue">
                                    <i data-lucide="id-card" class="w-5 h-5"></i> อ่านบัตรประชาชน
                                </button>
                                ${!isNew ? `
                                    <button onclick="openBulkOpdModal('${owner.hn}')" class="btn-base shadow-lg" style="background-color:#7c3aed !important;">🏥 OPD พร้อมกัน</button>
                                    <button onclick="goToConsent('${owner.hn}')" class="btn-base btn-orange shadow-lg">📋 ใบยินยอมรวม</button>
                                    <button onclick="deleteOwner('${owner.hn}', '${owner.owner_name}')" class="btn-base btn-red">🗑️ ลบเจ้าของ</button>
                                ` : ''}
                            </div>
                        </div>
                        <div class="grid grid-cols-12 gap-6">
                            <div class="col-span-3">
                                <label class="label-text">HN <span class="text-[10px] text-gray-500">(เว้นว่างเพื่อ Auto)</span></label>
                                <input type="text" id="f_hn" class="input-box font-black text-blue-400 text-xl" 
                                       value="${owner.hn}" 
                                       placeholder="สร้างให้อัตโนมัติ" 
                                       ${!isNew ? 'readonly' : ''}> </div>
                            <div class="col-span-5"><label class="label-text">ชื่อ-นามสกุล เจ้าของ</label><input type="text" id="f_owner_name" class="input-box" value="${owner.owner_name || ''}"></div>
                            <div class="col-span-2"><label class="label-text">เบอร์โทรศัพท์หลัก</label><input type="tel" id="f_phone1" class="input-box text-teal-400 font-bold" value="${phones.find(p=>p.label==='เบอร์หลัก')?.phone_number || ''}"></div>
                            <div class="col-span-2"><label class="label-text">เบอร์โทรศัพท์สำรอง</label><input type="tel" id="f_phone2" class="input-box" value="${phones.find(p=>p.label==='เบอร์สำรอง')?.phone_number || ''}"></div>
                            <div class="col-span-3"><label class="label-text">LINE ID</label><input type="text" id="f_line_id" class="input-box" value="${owner.line_id || ''}"></div>

        function togglePetCollapse(headerEl) {
            const body = headerEl.nextElementSibling;
            const chevron = headerEl.querySelector('.chevron-icon');
            const isHidden = body.style.display === 'none';
            body.style.display = isHidden ? '' : 'none';
            headerEl.setAttribute('aria-expanded', isHidden ? 'true' : 'false');
            if (chevron) chevron.style.transform = isHidden ? 'rotate(180deg)' : '';
        }

        function updateCalendarYearToBE(instance) {
            if (!instance.calendarContainer) return;
            const yearInput = instance.calendarContainer.querySelector('.cur-year');
            if (yearInput) yearInput.value = instance.currentYear + 543;
        }

        function initAllPickers() {
            flatpickr(".datepicker-thai", {
                locale: "th", dateFormat: "Y-m-d", altInput: true, altFormat: "j F Y",
                onReady: (selectedDates, dateStr, instance) => {
                    const altInp = instance.altInput;
                    if (dateStr) {
                        const yearBE = new Date(dateStr).getFullYear() + 543;
                        altInp.value = altInp.value.replace(new Date(dateStr).getFullYear(), yearBE);
                    }
                    updateCalendarYearToBE(instance);
                },
                onOpen: (selectedDates, dateStr, instance) => {
                    updateCalendarYearToBE(instance);
                },
                onMonthChange: (selectedDates, dateStr, instance) => {
                    updateCalendarYearToBE(instance);
                },
                onYearChange: (selectedDates, dateStr, instance) => {
                    updateCalendarYearToBE(instance);
                },
                onChange: (selectedDates, dateStr, instance) => {
                    const row = instance.element.closest('.zone-pet');
                    const age = getAgeDetail(dateStr);
                    row.querySelector('.p_age_years').value = age.y;
                    row.querySelector('.p_age_months').value = age.m;
                    const yearBE = new Date(dateStr).getFullYear() + 543;
                    instance.altInput.value = instance.altInput.value.replace(new Date(dateStr).getFullYear(), yearBE);
                }
            });
        }

        function syncFromAge(el) {
            const row = el.closest('.zone-pet');
            const years = parseInt(row.querySelector('.p_age_years').value) || 0;
            const months = parseInt(row.querySelector('.p_age_months').value) || 0;
            const d = new Date(); d.setFullYear(d.getFullYear() - years); d.setMonth(d.getMonth() - months);
            const dateStr = d.toISOString().split('T')[0];
            const picker = row.querySelector('.datepicker-thai')._flatpickr;
            picker.setDate(dateStr, true);
        }

        function getAgeDetail(dob) {
            if (!dob) return { y: 0, m: 0 };
            const birth = new Date(dob); const now = new Date();
            let years = now.getFullYear() - birth.getFullYear();
            let months = now.getMonth() - birth.getMonth();
            if (months < 0) { years--; months += 12; }
            return { y: years, m: months };
        }

        function updateBreedOptions(typeSelectEl) {
            if (!typeSelectEl) return;
            const row = typeSelectEl.closest('.zone-pet');
            const breedSelect = row.querySelector('.p_breed');
            const savedVal = breedSelect.getAttribute('data-val');
            const selectedOption = typeSelectEl.options[typeSelectEl.selectedIndex];
            const speciesId = selectedOption ? selectedOption.getAttribute('data-id') : null;
            let filteredBreeds = speciesId ? masterBreeds.filter(b => b.species_id === speciesId) : [];
            breedSelect.innerHTML = '<option value="">-- เลือกสายพันธุ์ --</option>' + filteredBreeds.map(b => `<option value="${b.name}" ${b.name === savedVal ? 'selected' : ''}>${b.name}</option>`).join('');
            if (!breedSelect.value && filteredBreeds.some(b => b.name === 'ไทย')) breedSelect.value = 'ไทย';
        }

        function addNewPetRow() {
            const div = document.createElement('div');
            div.innerHTML = petRowHtml({}, true);
            const newPetEl = div.firstElementChild;
            document.getElementById('pets-container').insertBefore(newPetEl, document.querySelector('button[onclick="addNewPetRow()"]'));
            initAllPickers();
            updateBreedOptions(newPetEl.querySelector('.p_type'));
            newPetEl.querySelector('.p_name').focus();
        }

        async function readSmartCard() {
            try {
                const res = await fetch('http://127.0.0.1:8080/read');
                const result = await res.json();
                if (result.status === "success") {
                    const p = result.data;
                    document.getElementById("f_owner_name").value = p.prefix + p.firstname + " " + p.lastname;
                    document.getElementById("f_address").value = p.address;
                }
            } catch (e) { alert("❌ โปรดเปิดโปรแกรม Agent บัตรประชาชน"); }
        }

        async function saveAllData() {
            const name = document.getElementById('f_owner_name').value.trim();
            const p1 = document.getElementById('f_phone1').value.trim();
            if (!name || !p1) return alert("❌ กรุณากรอกชื่อและเบอร์โทรหลัก");
            
            let hn = document.getElementById('f_hn').value.trim();
            
            // กรณีสร้างใหม่และไม่ได้กรอก HN ให้รัน Auto
            if (!hn) {
                const hns = allOwners.map(o => parseInt(o.hn)).filter(n => !isNaN(n));
                hn = (Math.max(...hns, 690000) + 1).toString().padStart(6, '0');
            }

            try {
                const ownerData = {
                    hn,
                    owner_name: name,
                    address: document.getElementById('f_address').value,
                    line_id: document.getElementById('f_line_id').value.trim() || null,
                    email: document.getElementById('f_email').value.trim() || null
                };
                const { error: ownerErr } = await db.from('owners').upsert(ownerData, { onConflict: 'hn' });
                if (ownerErr) throw ownerErr;

                const { error: delErr } = await db.from('owner_phones').delete().eq('owner_hn', hn);
                if (delErr) throw delErr;

                const pList = [{ owner_hn: hn, phone_number: p1, label: 'เบอร์หลัก' }];
                const p2 = document.getElementById('f_phone2').value.trim();
                if(p2) pList.push({ owner_hn: hn, phone_number: p2, label: 'เบอร์สำรอง' });
                const { error: phoneErr } = await db.from('owner_phones').insert(pList);
                if (phoneErr) throw phoneErr;
                
                const petNodes = document.querySelectorAll('.zone-pet');
                for (const node of petNodes) {
                    const petName = node.querySelector('.p_name').value;
                    if (!petName) continue;
                    const { error: petErr } = await db.from('animals').upsert({
                        id: node.getAttribute('data-pet-id') || undefined,
                        owner_hn: hn, pet_name: petName, pet_type: node.querySelector('.p_type').value || 'อื่นๆ',
                        breed: node.querySelector('.p_breed').value, gender: node.querySelector('.p_gender').value,
                        weight: parseFloat(node.querySelector('.p_weight').value) || 0, birth_date: node.querySelector('.datepicker-thai').value || null,
                        microchip_number: node.querySelector('.p_microchip').value, congenital_disease: node.querySelector('.p_congenital').value, updated_at: new Date()
                    });
                    if (petErr) throw petErr;
                }
                alert("✅ บันทึกสำเร็จ"); await loadData(); editOwner(hn);
            } catch (err) { alert(err.message); }
        }

        async function deleteOwner(hn, name) {
            if (!confirm(`⚠️ ยืนยันการลบเจ้าของ: ${name}?\nข้อมูลสัตว์ทั้งหมดจะหายไป`)) return;
            await Promise.all([
                db.from('owner_phones').delete().eq('owner_hn', hn),
                db.from('animals').delete().eq('owner_hn', hn)
            ]);
            await db.from('owners').delete().eq('hn', hn); await loadData();
            document.getElementById('form-view').innerHTML = `<div class="h-full flex flex-col items-center justify-center opacity-10"><h3>เลือกรายการเจ้าของ</h3></div>`;
        }

        async function deletePetRecord(petId, petName) {
            if (!confirm(`ลบสัตว์ "${petName}"?`)) return;
            await db.from('animals').delete().eq('id', petId); await loadData();
            editOwner(document.getElementById('f_hn').value);
        }

        function gotoMedicalRecord(id, name, hn) { window.location.href = `medrec.html?id=${id}&name=${encodeURIComponent(name)}&hn=${hn}`; }

        async function printPetLabel(petId) {
            const pet = allAnimals.find(a => String(a.id) === String(petId));
            const owner = allOwners.find(o => o.hn === pet.owner_hn);
            if (!pet) return alert("ไม่พบข้อมูลสัตว์");

            try {
                const { data: dbTemplate } = await db.from('print_templates')
                    .select('config').eq('template_type', 'sticker_pet_id').single();

                if (!dbTemplate) return alert("❌ ไม่พบ Template 'sticker_pet_id'");

                const config = dbTemplate.config;
                const pw = config.width || 80;
                const ph = config.height || 45;

                const ownerPhone = (allPhones.find(p => p.owner_hn === pet.owner_hn && p.label === 'เบอร์หลัก') || allPhones.find(p => p.owner_hn === pet.owner_hn))?.phone_number || '-';

                const printData = {
                    clinic_name: "PK-VMS Animal Clinic",
                    pet_name: pet.pet_name,
                    hn: pet.owner_hn,
                    owner_name: owner?.owner_name || '-',
                    owner_phone: ownerPhone,
                    owner_address: owner?.address || '-',
                    species: pet.pet_type,
                    sex: pet.gender,
                    weight: pet.weight,
                    breed: pet.breed,
                    date: new Date().toLocaleDateString('th-TH'),
                    time: new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' })
                };

                const printContent = config.lines.map(l => {
                    const val = (l.text || "").replace(/\{\{(.*?)\}\}/g, (match, key) => printData[key.trim()] || match);
                    const fontSizePt = l.size || 12;
                    const textColor = l.color || '#000000';
                    let style = `position:absolute; top:${l.y}mm; font-family:${l.font || 'Sarabun'}; font-size:${fontSizePt}pt; font-weight:${l.bold ? 'bold' : 'normal'}; color:${textColor}; line-height:1.1; white-space:pre-wrap;`;

                    if (l.align === 'center') style += `left:0; width:${pw}mm; text-align:center;`;
                    else if (l.align === 'right') style += `left:0; width:${pw}mm; text-align:right; padding-right:${l.x}mm;`;
                    else style += `left:${l.x}mm; width:${l.w ? l.w + 'mm' : 'auto'}; text-align:left;`;

                    if (l.type === 'text') return `<div style="${style}">${val}</div>`;
                    if (l.type === 'rect') return `<div style="position:absolute; top:${l.y}mm; left:${l.x}mm; width:${l.w}mm; height:${l.h}mm; border:1px solid ${textColor}; border-radius:${l.radius || 0}mm;"></div>`;
                    if (l.type === 'image') return `<img src="${l.url}" style="position:absolute; top:${l.y}mm; left:${l.x}mm; width:${l.w}mm; height:${l.h}mm; object-fit:contain;">`;
                    return '';
                }).join('');

                const iframe = document.createElement('iframe');
                iframe.style.display = 'none';
                document.body.appendChild(iframe);
                const pri = iframe.contentWindow;
                pri.document.open();
               pri.document.write(`
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            font-family: 'Sarabun', sans-serif; /* บังคับใช้ฟอนต์ Sarabun */
        } 
        .page { 
            position: relative; 
            width: ${pw}mm; 
            height: ${ph}mm; 
            overflow: hidden; 
        }
    </style>
</head>
<body>
    <div class="page">${printContent}</div>
</body>
</html>
`);
                pri.document.close();
                setTimeout(() => { pri.focus(); pri.print(); document.body.removeChild(iframe); }, 700);

            } catch (err) { alert("Error: " + err.message); }
        }

    </script>

                    <label class="label-clinical-bulk text-purple-300">🔬 Lab / หัตถการ</label>
                    <div class="flex gap-2 mb-2">
                        <input type="text" id="bulk-lab-input" class="input-box flex-1" placeholder="พิมพ์ชื่อรายการ Lab แล้วกด Enter…" onkeydown="if(event.key==='Enter'){event.preventDefault();addBulkItem('Lab','bulk-lab-input','bulk-lab-tags')}">
                        <button onclick="addBulkItem('Lab','bulk-lab-input','bulk-lab-tags')" class="btn-base" style="background:#6d28d9 !important;white-space:nowrap">+ เพิ่ม</button>
                    </div>
                    <div id="bulk-lab-tags" class="flex flex-wrap gap-2 min-h-[36px] p-2 bg-black/20 rounded-xl border border-white/5"></div>
                </div>

                <!-- Tx items -->
                <div>
                    <label class="label-clinical-bulk text-pink-300">💉 Tx (ยาฉีด / หัตถการ)</label>
                    <div class="flex gap-2 mb-2">
                        <input type="text" id="bulk-tx-input" class="input-box flex-1" placeholder="พิมพ์ชื่อรายการ Tx แล้วกด Enter…" onkeydown="if(event.key==='Enter'){event.preventDefault();addBulkItem('Tx','bulk-tx-input','bulk-tx-tags')}">
                        <button onclick="addBulkItem('Tx','bulk-tx-input','bulk-tx-tags')" class="btn-base" style="background:#be185d !important;white-space:nowrap">+ เพิ่ม</button>
                    </div>
                    <div id="bulk-tx-tags" class="flex flex-wrap gap-2 min-h-[36px] p-2 bg-black/20 rounded-xl border border-white/5"></div>
                </div>

                <!-- Rx items -->
                <div>
                    <label class="label-clinical-bulk text-green-300">💊 Rx (ยากลับบ้าน)</label>
                    <div class="flex gap-2 mb-2">
                        <input type="text" id="bulk-rx-input" class="input-box flex-1" placeholder="พิมพ์ชื่อรายการ Rx แล้วกด Enter…" onkeydown="if(event.key==='Enter'){event.preventDefault();addBulkItem('Rx','bulk-rx-input','bulk-rx-tags')}">
                        <button onclick="addBulkItem('Rx','bulk-rx-input','bulk-rx-tags')" class="btn-base" style="background:#047857 !important;white-space:nowrap">+ เพิ่ม</button>
                    </div>
                    <div id="bulk-rx-tags" class="flex flex-wrap gap-2 min-h-[36px] p-2 bg-black/20 rounded-xl border border-white/5"></div>
                </div>

                <!-- Plan -->
                <div>
                    <label class="label-clinical-bulk">Plan (แผนการรักษาต่อ)</label>
                    <input type="text" id="bulk-plan" class="input-box" placeholder="แผนการรักษาต่อ...">
                </div>

            </div><!-- end body -->

            <!-- Footer -->
            <div class="p-6 border-t border-white/10 flex gap-3 flex-wrap" style="background:rgba(0,0,0,0.3)">
                <button onclick="closeBulkOpdModal()" class="btn-base btn-gray px-8">ยกเลิก</button>
                <button onclick="saveBulkOpd()" class="btn-base flex-1 text-xl py-4 shadow-2xl" style="background:#7c3aed !important;">
                    💾 บันทึก OPD ทั้งหมดที่เลือก
                </button>
            </div>
        </div>
    </div>

    <script>
        /* ════════════════════════════════════════════
           BULK OPD – state & helpers
           ════════════════════════════════════════════ */
        let bulkItems = { Lab: [], Tx: [], Rx: [] };
        let bulkOpdOwnerHn = null;
        let _bulkVisitPicker = null;
        let _bulkApptPicker  = null;

        const BULK_ITEM_COLORS = {
            Lab: { bg: '#4c1d95', border: '#7c3aed', text: '#c4b5fd' },
            Tx:  { bg: '#831843', border: '#db2777', text: '#f9a8d4' },
            Rx:  { bg: '#064e3b', border: '#059669', text: '#6ee7b7' }
        };

        function openBulkOpdModal(ownerHn) {
            bulkOpdOwnerHn = ownerHn;
            bulkItems = { Lab: [], Tx: [], Rx: [] };

            // Reset form fields
            ['bulk-cc','bulk-hx','bulk-pe','bulk-dx','bulk-plan','bulk-appt-note'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.value = '';
            });
            ['bulk-lab-tags','bulk-tx-tags','bulk-rx-tags'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.innerHTML = '';
            });

            // Init datepickers
            if (_bulkVisitPicker) _bulkVisitPicker.destroy();
            if (_bulkApptPicker) _bulkApptPicker.destroy();
            const dpCfg = {
                locale: "th", dateFormat: "Y-m-d", altInput: true, altFormat: "j F Y",
                onReady: (_, dateStr, inst) => {
                    if (dateStr && inst.altInput) {
                        const y = new Date(dateStr).getFullYear();
                        inst.altInput.value = inst.altInput.value.replace(String(y), String(y + 543));
                    }
                },
                onChange: (_, dateStr, inst) => {
                    if (dateStr && inst.altInput) {
                        const y = new Date(dateStr).getFullYear();
                        inst.altInput.value = inst.altInput.value.replace(String(y), String(y + 543));
                    }
                }
            };
            _bulkVisitPicker = flatpickr('#bulk-visit-date', { ...dpCfg, defaultDate: 'today' });
            _bulkApptPicker  = flatpickr('#bulk-appointment', dpCfg);

            // Build animal list
            const pets = allAnimals.filter(a => a.owner_hn === ownerHn);
            const list = document.getElementById('bulk-animal-list');
            document.getElementById('bulk-select-all').checked = false;

            if (pets.length === 0) {
                list.innerHTML = '<p class="text-gray-500 text-sm col-span-2">ไม่พบสัตว์ในเจ้าของนี้</p>';
            } else {
                list.innerHTML = '';
                pets.forEach(p => {
                    const icon = p.pet_type === 'สุนัข' ? '🐶' : (p.pet_type === 'แมว' ? '🐱' : '🐾');
                    const label = document.createElement('label');
                    label.className = 'animal-checkbox-row';

                    const cb = document.createElement('input');
                    cb.type = 'checkbox';
                    cb.className = 'bulk-animal-cb';
                    cb.value = p.id;
                    cb.onchange = updateBulkCount;

                    const iconSpan = document.createElement('span');
                    iconSpan.className = 'text-lg';
                    iconSpan.textContent = icon;

                    const nameSpan = document.createElement('span');
                    nameSpan.className = 'font-bold text-white flex-1';
                    nameSpan.textContent = p.pet_name || '-';

                    const infoSpan = document.createElement('span');
                    infoSpan.className = 'text-xs text-gray-400';
                    infoSpan.textContent = [p.pet_type, p.gender].filter(Boolean).join(' ');

                    label.append(cb, iconSpan, nameSpan, infoSpan);
                    list.appendChild(label);
                });
            }
            updateBulkCount();
            document.getElementById('bulk-opd-modal').style.display = 'flex';
        }

        function closeBulkOpdModal() {
            document.getElementById('bulk-opd-modal').style.display = 'none';
        }

        function toggleAllBulkAnimals(masterCb) {
            document.querySelectorAll('.bulk-animal-cb').forEach(cb => { cb.checked = masterCb.checked; });
            updateBulkCount();
        }

        function updateBulkCount() {
            const checked = document.querySelectorAll('.bulk-animal-cb:checked').length;
            const total   = document.querySelectorAll('.bulk-animal-cb').length;
            document.getElementById('bulk-selected-count').textContent =
                checked > 0 ? `เลือกแล้ว ${checked} / ${total} ตัว` : '';
            document.getElementById('bulk-select-all').checked = (total > 0 && checked === total);
            document.getElementById('bulk-select-all').indeterminate = (checked > 0 && checked < total);
        }

        function addBulkItem(type, inputId, tagContainerId) {
            const input = document.getElementById(inputId);
            const name = (input.value || '').trim();
            if (!name) return;
            if (bulkItems[type].includes(name)) { input.value = ''; return; }
            bulkItems[type].push(name);
            input.value = '';

            const c = BULK_ITEM_COLORS[type];
            const tag = document.createElement('span');
            tag.className = 'bulk-item-tag';
            tag.style.cssText = `background:${c.bg};border:1px solid ${c.border};color:${c.text}`;
            tag.dataset.type = type;
            tag.dataset.name = name;

            const nameText = document.createTextNode(name + ' ');
            const removeBtn = document.createElement('span');
            removeBtn.className = 'remove-tag';
            removeBtn.textContent = '✕';
            removeBtn.onclick = () => removeBulkItem(type, tag);
            tag.appendChild(nameText);
            tag.appendChild(removeBtn);
            document.getElementById(tagContainerId).appendChild(tag);
        }

        function removeBulkItem(type, tagEl) {
            const name = tagEl.dataset.name;
            bulkItems[type] = bulkItems[type].filter(n => n !== name);
            tagEl.remove();
        }

        async function saveBulkOpd() {
            const selectedCbs = [...document.querySelectorAll('.bulk-animal-cb:checked')];
            if (selectedCbs.length === 0) {
                alert('⚠️ กรุณาเลือกสัตว์อย่างน้อย 1 ตัว');
                return;
            }

            const visitDate   = document.getElementById('bulk-visit-date').value || new Date().toISOString().split('T')[0];
            const cc          = document.getElementById('bulk-cc').value;
            const hx          = document.getElementById('bulk-hx').value;
            const pe          = document.getElementById('bulk-pe').value;
            const dx          = document.getElementById('bulk-dx').value;
            const plan        = document.getElementById('bulk-plan').value;
            const appointment = document.getElementById('bulk-appointment').value || null;
            const apptNote    = document.getElementById('bulk-appt-note').value;

            const btn = document.querySelector('#bulk-opd-modal .flex-1.text-xl');
            btn.disabled = true;
            btn.textContent = '⏳ กำลังบันทึก...';

            try {
                let savedCount = 0;
                const savedAnimalIds = [];
                const failedPets = [];

                for (const cb of selectedCbs) {
                    const animalId = cb.value;
                    const pet = allAnimals.find(a => String(a.id) === String(animalId));
                    if (!pet) { failedPets.push(animalId); continue; }

                    const headerData = {
                        animal_id:         animalId,
                        owner_hn:          bulkOpdOwnerHn,
                        created_at:        visitDate,
                        weight:            pet.weight || 0,
                        cc, hx, pe, dx, plan,
                        appointment,
                        appointment_note:  apptNote,
                        appointment_2:     null,
                        appointment_note_2:'',
                        total_cost:        0,
                        payment_status:    (bulkItems.Lab.length + bulkItems.Tx.length + bulkItems.Rx.length) > 0 ? 'pending' : 'no_charge',
                        dld_categories:    []
                    };

                    const { data: record, error: recErr } = await db
                        .from('medical_records')
                        .insert([headerData])
                        .select()
                        .single();

                    if (recErr) {
                        console.error('บันทึกไม่สำเร็จ (' + (pet.pet_name || animalId) + '):', recErr);
                        failedPets.push(pet.pet_name || animalId);
                        continue;
                    }

                    const itemInserts = [
                        ...bulkItems.Lab.map(name => ({ record_id: record.id, item_type: 'Lab', item_name: name, quantity: 1, unit_price: 0, total_price: 0 })),
                        ...bulkItems.Tx.map(name  => ({ record_id: record.id, item_type: 'Tx',  item_name: name, quantity: 1, unit_price: 0, total_price: 0 })),
                        ...bulkItems.Rx.map(name  => ({ record_id: record.id, item_type: 'Rx',  item_name: name, quantity: 1, unit_price: 0, total_price: 0 }))
                    ];

                    if (itemInserts.length > 0) {
                        const { error: itemErr } = await db.from('medical_record_items').insert(itemInserts);
                        if (itemErr) {
                            console.error('บันทึก items ไม่สำเร็จ (' + (pet.pet_name || animalId) + '):', itemErr);
                            // Roll back the header record to avoid orphan
                            await db.from('medical_records').delete().eq('id', record.id);
                            failedPets.push(pet.pet_name || animalId);
                            continue;
                        }
                    }

                    savedCount++;
                    savedAnimalIds.push(animalId);
                }

                closeBulkOpdModal();

                let resultMsg = `✅ บันทึก OPD สำเร็จ ${savedCount} ตัว`;
                if (failedPets.length > 0) resultMsg += `\n⚠️ บันทึกไม่สำเร็จ: ${failedPets.join(', ')}`;

                // Offer to print appointment labels
                if (savedCount > 0 && appointment) {
                    const doPrint = confirm(resultMsg + '\n\nต้องการพิมพ์ใบนัดหมายสำหรับสัตว์ที่บันทึกสำเร็จด้วยหรือไม่?');
                    if (doPrint) {
                        await printBulkApptLabels(savedAnimalIds, appointment, apptNote);
                    }
                } else {
                    alert(resultMsg);
                }

                await loadData();

            } catch (err) {
                console.error(err);
                alert('❌ เกิดข้อผิดพลาด: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '💾 บันทึก OPD ทั้งหมดที่เลือก';
            }
        }

        async function printBulkApptLabels(animalIds, appointmentDate, appointmentNote) {
            try {
                const { data: t } = await db
                    .from('print_templates')
                    .select('config')
                    .eq('template_type', 'sticker_appt')
                    .single();
                if (!t) { alert('ไม่พบ Template ใบนัด (sticker_appt)'); return; }

                const config = t.config;
                const px = 3.78;
                const apptDateDisplay = appointmentDate
                    ? formatThaiDate(appointmentDate)
                    : '-';

                const dataList = animalIds.map(id => {
                    const pet   = allAnimals.find(a => String(a.id) === String(id));
                    const owner = allOwners.find(o => o.hn === (pet?.owner_hn));
                    return {
                        clinic_name:        'PK-VMS Animal Clinic',
                        owner_name:         owner?.owner_name || '-',
                        pet_name:           pet?.pet_name || '-',
                        hn:                 pet?.owner_hn || '-',
                        appointment_date_1: apptDateDisplay,
                        appointment_note_1: appointmentNote || '-',
                        appointment_date_2: '-',
                        appointment_note_2: '-',
                        date:               formatThaiDate(new Date().toISOString().split('T')[0], 'short')
                    };
                });

                const pw = window.open('', '_blank');
                let html = `<html><head>
                    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
                    <style>
                        body { margin:0; padding:0; font-family:'Sarabun',sans-serif; }
                        .sticker { position:relative; width:${config.width}mm; height:${config.height}mm; overflow:hidden; page-break-after:always; }
                        .elem { position:absolute; color:black; line-height:1.2; }
                        @page { size:${config.width}mm ${config.height}mm; margin:0; }
                    </style>
                </head><body>`;

                dataList.forEach(data => {
                    html += `<div class="sticker">`;
                    config.lines.forEach(l => {
                        let txt = (l.text || '').replace(/\{\{(.*?)\}\}/g, (m, k) => data[k.trim()] || '');
                        let style = `top:${l.y * px}px; font-family:'Sarabun',sans-serif; font-size:${(l.size || 12) * 1.33}px; font-weight:${l.bold ? 'bold' : 'normal'};`;
                        if (l.align === 'center')      style += `left:0; width:100%; text-align:center;`;
                        else if (l.align === 'right')  style += `right:${l.x * px}px; text-align:right;`;
                        else                           style += `left:${l.x * px}px;`;
                        html += `<div class="elem" style="${style}">${txt}</div>`;
                    });
                    html += `</div>`;
                });

                html += `</body><script>window.onload=()=>{setTimeout(()=>{window.print();window.close();},800);};<\/script></html>`;
                pw.document.write(html);
                pw.document.close();

            } catch (err) {
                alert('พิมพ์ไม่สำเร็จ: ' + err.message);
            }
        }

        window.onload = async () => {
            lucide.createIcons();
            if (sessionStorage.getItem("isLoggedIn") !== "true") { window.location.href = "index.html"; return; }
            await loadData();
        };
    </script>
</body>
</html>
