<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <title>เวชระเบียนสัตว์ | PK-VMS Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>

    <style>
        :root { --navy: #0b1929; --navy-light: #112240; --teal: #14b8b1; --border: rgba(255, 255, 255, 0.1); }
        * { font-family: "Sarabun", sans-serif !important; }
        body { background: var(--navy); color: #e2e8f0; margin: 0; overflow: hidden; }

        .sidebar-container { position: relative; width: 420px; background: #0f172a; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .owner-card { 
            padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer;
            display: grid; grid-template-columns: 85px 40px 1fr 110px; 
            gap: 10px; align-items: center; font-size: 15px;
        }
        .owner-card:hover { background: rgba(255,255,255,0.07); }
        .owner-card.active { background: rgba(20, 184, 177, 0.18); border-left: 5px solid var(--teal); }
        
        .input-box { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 8px; padding: 10px; color: white; width: 100%; outline: none; font-size: 16px; }
        .input-box:focus { border-color: var(--teal); background: rgba(0,0,0,0.5); }
        
        .zone-pet { background: rgba(30, 41, 59, 0.4); border-radius: 20px; padding: 22px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); position: relative; }
        .label-text { color: #94a3b8; font-size: 0.85rem; margin-bottom: 4px; display: block; font-weight: 600; }
        
        .btn-danger { background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1.5px solid rgba(239, 68, 68, 0.3); padding: 6px 14px; border-radius: 10px; font-weight: 800; font-size: 0.85rem; transition: 0.2s; }
        .btn-danger:hover { background: #ef4444; color: white; }

        .critical-box { background: #7f1d1d !important; color: #ffffff !important; border: 2px solid #ef4444 !important; font-weight: 700; }
    </style>
</head>
<body>
    <div class="flex h-screen overflow-hidden">
        <aside class="sidebar-container">
            <div class="p-5 flex-shrink-0 border-b border-white/5">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-2xl font-black text-white">เวชระเบียน</h2>
                    <a href="index.html" class="text-3xl opacity-70 hover:opacity-100 hover:scale-110">🏠</a>
                </div>
                <input type="text" id="search-box" class="input-box" placeholder="ค้นหา HN, ชื่อเจ้าของ, เบอร์โทร..." oninput="filterData()">
            </div>
            <div id="owner-list" class="flex-1 overflow-y-auto px-1"></div>
            <div class="p-4 bg-black/20 text-center">
                <button onclick="createNewForm()" class="w-full bg-teal-600 hover:bg-teal-500 text-white font-black py-4 rounded-xl text-lg shadow-lg">
                    + ลงทะเบียนใหม่
                </button>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-10 bg-[#020617]" id="form-view">
            <div class="h-full flex flex-col items-center justify-center opacity-10">
                <div class="text-9xl mb-4">📋</div>
                <h3 class="text-3xl font-bold">เลือกรายชื่อเจ้าของจากด้านซ้าย</h3>
            </div>
        </main>
    </div>

    <script>
        let allAnimals = []; let allOwners = []; let allPhones = [];
        const BREEDS = {
            "สุนัข": ["ไทย", "ไทยหลังอาน", "บางแก้ว", "โกลเด้น", "ชิสุ", "พุดเดิ้ล", "ปอม", "ไซบีเรียน", "เฟรนช์", "บีเกิ้ล", "ชิวาวา", "ผสม"],
            "แมว": ["ไทย", "เปอร์เซีย", "บริติช", "สก๊อตติช", "เบงกอล", "เมนคูน", "แมวบ้าน", "ผสม"],
            "อื่นๆ": ["กระต่าย", "นก", "หนูแฮมสเตอร์", "เต่า", "ชูการ์ไกลเดอร์", "อื่น ๆ"]
        };

        async function loadData() {
            const [resO, resA, resP] = await Promise.all([
                db.from('owners').select('*').order('hn', { ascending: false }),
                db.from('animals').select('*'),
                db.from('owner_phones').select('*')
            ]);
            allOwners = resO.data || [];
            allAnimals = resA.data || [];
            allPhones = resP.data || [];
            renderSidebar(allOwners);
        }

        function renderSidebar(owners) {
            const container = document.getElementById('owner-list');
            container.innerHTML = owners.map(owner => {
                const pets = allAnimals.filter(a => a.owner_hn === owner.hn);
                const p1 = allPhones.find(p => p.owner_hn === owner.hn && p.label === 'เบอร์หลัก')?.phone_number || '-';
                const petNames = pets.map(p => p.pet_name).join(', ') || '<span class="text-gray-600">ยังไม่มีสัตว์เลี้ยง</span>';
                
                return `
                    <div class="owner-card" onclick="editOwner('${owner.hn}')" id="hn-${owner.hn}">
                        <div class="font-bold text-blue-400">#${owner.hn}</div>
                        <div class="text-xl">👤</div>
                        <div class="flex flex-col min-width-0">
                            <span class="font-bold text-white truncate">${owner.owner_name}</span>
                            <span class="text-xs text-slate-500 truncate">${petNames}</span>
                        </div>
                        <div class="text-right font-bold text-teal-500 text-sm">${p1}</div>
                    </div>`;
            }).join('');
        }

        function renderForm(owner, pets, phones = []) {
            const p1 = phones.find(p => p.label === 'เบอร์หลัก')?.phone_number || '';
            const p2 = phones.find(p => p.label === 'เบอร์สำรอง')?.phone_number || '';
            
            document.getElementById('form-view').innerHTML = `
                <div class="max-w-5xl mx-auto pb-20">
                    <div class="bg-slate-800/40 p-8 rounded-[30px] border border-white/5 mb-8 shadow-xl">
                        <div class="flex justify-between items-start mb-6">
                            <div>
                                <h3 class="text-2xl font-bold text-blue-400">👤 ข้อมูลเจ้าของสัตว์</h3>
                                <p class="text-slate-500 text-sm">จัดการข้อมูลผู้ขอรับบริการและสัตว์เลี้ยง</p>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="readSmartCardRecord()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-blue-500">🪪 อ่านบัตร</button>
                                ${owner.hn !== 'AUTO' ? `<button onclick="deleteOwnerFull('${owner.hn}', '${owner.owner_name}')" class="btn-danger">🗑️ ลบข้อมูลเจ้าของนี้</button>` : ''}
                            </div>
                        </div>
                        <div class="grid grid-cols-12 gap-5">
                            <div class="col-span-2"><label class="label-text">HN No.</label><input type="text" id="f_hn" class="input-box font-bold text-blue-400 text-center" value="${owner.hn}" readonly></div>
                            <div class="col-span-4"><label class="label-text">ชื่อ-นามสกุล</label><input type="text" id="f_owner_name" class="input-box font-bold" value="${owner.owner_name || ''}"></div>
                            <div class="col-span-3"><label class="label-text text-teal-400">เบอร์โทรหลัก</label><input type="tel" id="f_phone1" class="input-box text-teal-400 font-bold" value="${p1}"></div>
                            <div class="col-span-3"><label class="label-text">เบอร์โทรสำรอง</label><input type="tel" id="f_phone2" class="input-box" value="${p2}"></div>
                            <div class="col-span-12"><label class="label-text">ที่อยู่</label><input type="text" id="f_address" class="input-box" value="${owner.address || ''}"></div>
                        </div>
                    </div>

                    <div id="pets-container" class="space-y-6">
                        ${pets.map(p => petRowHtml(p)).join('')}
                    </div>
                    
                    <button onclick="addNewPetRow()" class="w-full mt-4 border-2 border-dashed border-white/10 py-4 rounded-xl text-slate-500 hover:border-teal-500 hover:text-teal-500 font-bold transition-all">+ เพิ่มสัตว์เลี้ยง</button>

                    <button onclick="saveAllData()" class="w-full bg-teal-500 py-5 rounded-2xl text-navy font-black text-2xl mt-8 shadow-2xl hover:bg-teal-400 transition-all">💾 บันทึกข้อมูลทั้งหมด</button>
                </div>`;
            updateBreedOptions();
        }

        function petRowHtml(pet) {
            const ageText = calculateAge(pet.birth_date);
            return `
                <div class="zone-pet border-l-8 border-teal-500" data-pet-id="${pet.id || ''}">
                    <div class="flex justify-between items-center mb-4">
                        <h4 class="font-bold text-white">🐾 ${pet.pet_name || 'สัตว์เลี้ยงใหม่'} <span class="text-teal-400 ml-2 font-normal text-sm">${ageText}</span></h4>
                        <div class="flex gap-2">
                            ${pet.id ? `<button onclick="gotoMedicalRecord('${pet.id}', '${pet.pet_name}', '${pet.owner_hn}')" class="text-xs bg-white/5 px-3 py-1 rounded-md hover:bg-white/10 text-teal-400 border border-teal-500/30">🏥 เวชระเบียน</button>` : ''}
                            <button onclick="this.closest('.zone-pet').remove()" class="text-xs text-red-400 hover:underline">ลบออกจากรายการ</button>
                        </div>
                    </div>
                    <div class="grid grid-cols-12 gap-4">
                        <div class="col-span-3"><label class="label-text">ชื่อสัตว์</label><input type="text" class="p_name input-box" value="${pet.pet_name || ''}"></div>
                        <div class="col-span-2"><label class="label-text">ชนิด</label><select class="p_type input-box" onchange="updateBreedOptions(this)"><option value="สุนัข" ${pet.pet_type==='สุนัข'?'selected':''}>สุนัข</option><option value="แมว" ${pet.pet_type==='แมว'?'selected':''}>แมว</option><option value="อื่นๆ" ${pet.pet_type==='อื่นๆ'?'selected':''}>อื่นๆ</option></select></div>
                        <div class="col-span-3"><label class="label-text">สายพันธุ์</label><select class="p_breed input-box" data-val="${pet.breed || 'ไทย'}"></select></div>
                        <div class="col-span-2"><label class="label-text">เพศ</label><select class="p_gender input-box"><option value="เมีย" ${pet.gender==='เมีย'?'selected':''}>เมีย</option><option value="ผู้" ${pet.gender==='ผู้'?'selected':''}>ผู้</option><option value="ผู้ตอน" ${pet.gender==='ผู้ตอน'?'selected':''}>ผู้ตอน</option><option value="เมียหมัน" ${pet.gender==='เมียหมัน'?'selected':''}>เมียหมัน</option></select></div>
                        <div class="col-span-2"><label class="label-text">น้ำหนัก (กก.)</label><input type="number" step="0.1" class="p_weight input-box text-yellow-400" value="${pet.weight || ''}"></div>
                        <div class="col-span-4"><label class="label-text">วดป. เกิด</label><input type="date" class="p_dob input-box" value="${pet.birth_date || ''}" onchange="handleDobChange(this)"></div>
                        <div class="col-span-2"><label class="label-text">อายุ (ปี)</label><input type="number" class="p_age_years input-box text-center" oninput="handleAgeInput(this)"></div>
                        <div class="col-span-2"><label class="label-text">อายุ (เดือน)</label><input type="number" class="p_age_months input-box text-center" oninput="handleAgeInput(this)"></div>
                        <div class="col-span-4"><label class="label-text text-red-400 font-bold">🚨 ข้อควรระวัง/แพ้ยา</label><input type="text" class="p_congenital input-box critical-box" value="${pet.congenital_disease || ''}"></div>
                    </div>
                </div>`;
        }

        async function saveAllData() {
            const owner_name = document.getElementById('f_owner_name').value.trim();
            const p1 = document.getElementById('f_phone1').value.trim();
            if (!owner_name || !p1) return alert("❌ กรุณากรอกชื่อเจ้าของและเบอร์โทร");

            let hn = document.getElementById('f_hn').value.trim();
            if (hn === "AUTO" || hn === "") {
                // --- Logic: Gap Filling HN ---
                const existingHNs = allOwners.map(o => parseInt(o.hn)).sort((a, b) => a - b);
                let nextHN = 690001; 
                for (let i = 0; i < existingHNs.length; i++) {
                    if (existingHNs[i] === nextHN) {
                        nextHN++;
                    } else if (existingHNs[i] > nextHN) {
                        break; // พบช่องว่างแล้ว
                    }
                }
                hn = nextHN.toString().padStart(6, '0');
            }

            try {
                // 1. Save Owner
                await db.from('owners').upsert({ hn, owner_name, address: document.getElementById('f_address').value, updated_at: new Date() });
                
                // 2. Save Phones
                await db.from('owner_phones').delete().eq('owner_hn', hn);
                const pList = [{ owner_hn: hn, phone_number: p1, label: 'เบอร์หลัก' }];
                const p2 = document.getElementById('f_phone2').value.trim();
                if(p2) pList.push({ owner_hn: hn, phone_number: p2, label: 'เบอร์สำรอง' });
                await db.from('owner_phones').insert(pList);

                // 3. Save Animals (Only those in the form)
                const petNodes = document.querySelectorAll('.zone-pet');
                const activePetIds = [];
                for (const node of petNodes) {
                    const petName = node.querySelector('.p_name').value;
                    if (!petName) continue;
                    const petId = node.getAttribute('data-pet-id') || undefined;
                    const { data, error } = await db.from('animals').upsert({
                        id: petId, owner_hn: hn, pet_name: petName, 
                        pet_type: node.querySelector('.p_type').value,
                        breed: node.querySelector('.p_breed').value,
                        gender: node.querySelector('.p_gender').value,
                        weight: parseFloat(node.querySelector('.p_weight').value) || 0,
                        birth_date: node.querySelector('.p_dob').value || null,
                        congenital_disease: node.querySelector('.p_congenital').value,
                        updated_at: new Date()
                    }).select();
                    if(data?.[0]) activePetIds.push(data[0].id);
                }
                
                alert(`✅ บันทึกสำเร็จ (HN: ${hn})`);
                await loadData();
                editOwner(hn);
            } catch (err) { alert(err.message); }
        }

        async function deleteOwnerFull(hn, name) {
            if (!confirm(`⚠️ คำเตือน: คุณกำลังจะลบข้อมูลของ "${name}" (HN: ${hn})\nข้อมูลสัตว์และประวัติการรักษาทั้งหมดจะถูกลบถาวร!\nยืนยันการลบ?`)) return;
            try {
                // Supabase Cascading Delete (ถ้าตั้งไว้) หรือต้องลบทีละตาราง
                await db.from('animals').delete().eq('owner_hn', hn);
                await db.from('owner_phones').delete().eq('owner_hn', hn);
                await db.from('owners').delete().eq('hn', hn);
                alert("ลบข้อมูลเรียบร้อยแล้ว");
                location.reload();
            } catch (err) { alert("ลบไม่สำเร็จ: " + err.message); }
        }

        // --- Helper Functions ---
        function calculateAge(dob) {
            if (!dob) return "";
            const birth = new Date(dob); const now = new Date();
            let y = now.getFullYear() - birth.getFullYear();
            let m = now.getMonth() - birth.getMonth();
            if (m < 0) { y--; m += 12; }
            return `${y}ปี ${m}ด`;
        }

        function handleAgeInput(el) {
            const row = el.closest('.zone-pet');
            const y = parseInt(row.querySelector('.p_age_years').value) || 0;
            const m = parseInt(row.querySelector('.p_age_months').value) || 0;
            if (y > 0 || m > 0) {
                const d = new Date(); d.setFullYear(d.getFullYear() - y); d.setMonth(d.getMonth() - m);
                row.querySelector('.p_dob').value = d.toISOString().split('T')[0];
            }
        }

        function handleDobChange(el) {
            const row = el.closest('.zone-pet');
            row.querySelector('.age-display').innerText = calculateAge(el.value);
        }

        function updateBreedOptions(el) {
            const rows = el ? [el.closest('.zone-pet')] : document.querySelectorAll('.zone-pet');
            rows.forEach(row => {
                const type = row.querySelector('.p_type').value;
                const breedSelect = row.querySelector('.p_breed');
                const savedVal = breedSelect.getAttribute('data-val') || "ไทย";
                breedSelect.innerHTML = (BREEDS[type] || BREEDS["อื่นๆ"]).map(b => `<option value="${b}" ${b===savedVal?'selected':''}>${b}</option>`).join('');
            });
        }

        function addNewPetRow() {
            const container = document.getElementById('pets-container');
            const div = document.createElement('div');
            div.innerHTML = petRowHtml({});
            container.appendChild(div.firstElementChild);
            updateBreedOptions();
        }

        function editOwner(hn) {
            document.querySelectorAll('.owner-card').forEach(el => el.classList.remove('active'));
            document.getElementById(`hn-${hn}`)?.classList.add('active');
            const owner = allOwners.find(o => o.hn === hn);
            const pets = allAnimals.filter(a => a.owner_hn === hn);
            const phones = allPhones.filter(p => p.owner_hn === hn);
            renderForm(owner, pets, phones);
        }

        function filterData() {
            const term = document.getElementById('search-box').value.toLowerCase();
            const filtered = allOwners.filter(o => {
                const phones = allPhones.filter(p => p.owner_hn === o.hn).map(p => p.phone_number).join(' ');
                return o.hn.includes(term) || o.owner_name.toLowerCase().includes(term) || phones.includes(term);
            });
            renderSidebar(filtered);
        }

        function createNewForm() { renderForm({ hn: 'AUTO', owner_name: '', address: '' }, [], []); }

        window.onload = async () => {
            if (sessionStorage.getItem("isLoggedIn") !== "true") window.location.href = "index.html";
            await loadData();
        };
    </script>
</body>
</html>
