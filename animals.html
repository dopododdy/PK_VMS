<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <title>เวชระเบียนสัตว์ | PK-VMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>

    <style>
        :root {
            --navy: #0b1929; --navy-mid: #112240; --teal: #14b8b1;
            --surface: rgba(255,255,255,0.06); --border: rgba(255,255,255,0.12);
        }
        body { font-family: "Sarabun", sans-serif; background: var(--navy); color: #e2e8f0; margin: 0; overflow: hidden; }
        
        .mesh-bg { 
            position: fixed; inset: 0; z-index: -1; 
            background: radial-gradient(circle at 50% -20%, rgba(20, 184, 177, 0.18), transparent 75%);
        }

        /* Custom Scrollbar แบบหน้า Index */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--teal); }

        /* Sidebar Styling */
        .sidebar-container {
            background: rgba(17, 34, 64, 0.4);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
        }

        .search-input {
            background: rgba(0,0,0,0.3); border: 2px solid var(--border);
            color: white; padding: 1rem 1.25rem; border-radius: 20px;
            width: 100%; outline: none; transition: all 0.3s; font-size: 1.1rem;
        }
        .search-input:focus { border-color: var(--teal); background: rgba(0,0,0,0.5); }

        /* Animal Card ในรายการค้นหา */
        .animal-item {
            background: var(--surface); border: 2px solid transparent;
            border-radius: 24px; padding: 1.25rem; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); margin-bottom: 1rem;
            position: relative; overflow: hidden;
        }
        .animal-item:hover {
            transform: translateX(8px);
            background: rgba(20, 184, 177, 0.08);
            border-color: rgba(20, 184, 177, 0.3);
        }
        .animal-item.active {
            border-color: var(--teal);
            background: rgba(20, 184, 177, 0.15);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .gender-male { color: #60a5fa; }
        .gender-female { color: #f472b6; }

        .hn-badge {
            background: var(--teal); color: white;
            padding: 2px 10px; border-radius: 10px;
            font-size: 0.75rem; font-weight: 800; letter-spacing: 0.05em;
        }
    </style>
</head>
<body>
    <div class="mesh-bg"></div>

    <div class="flex h-screen overflow-hidden">
        <aside class="w-full md:w-[400px] sidebar-container flex flex-col">
            <div class="p-8 pb-6">
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <h2 class="text-3xl font-black text-white">เวชระเบียน</h2>
                        <p class="text-teal-400 text-sm font-bold mt-1">PK-VMS MANAGEMENT</p>
                    </div>
                    <a href="index.html" class="bg-white/5 hover:bg-white/10 p-3 rounded-2xl transition">
                        🏠
                    </a>
                </div>
                <input type="text" id="search-box" class="search-input" placeholder="ค้นหาชื่อ, HN, เบอร์โทร..." oninput="filterAnimals()">
            </div>

            <div id="animal-list" class="flex-1 overflow-y-auto px-6 pb-6">
                <div class="text-center py-10 text-gray-500 font-bold">กำลังโหลดข้อมูล...</div>
            </div>

            <div class="p-6 border-t border-white/5 bg-navy/20">
                <button onclick="openAddModal()" class="w-full bg-teal-600 hover:bg-teal-500 text-white font-black py-4 rounded-2xl transition-all text-lg shadow-lg active:scale-95">
                    + ลงทะเบียนสัตว์ใหม่
                </button>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-12" id="detail-view">
            <div class="h-full flex flex-col items-center justify-center text-gray-500">
                <div class="bg-white/5 p-16 rounded-[50px] border border-white/5 text-center backdrop-blur-sm">
                    <div class="text-8xl mb-8 opacity-20">🐾</div>
                    <h3 class="text-2xl font-black text-white/50 mb-2">ยินดีต้อนรับสู่ระบบเวชระเบียน</h3>
                    <p class="text-lg">กรุณาเลือกรายชื่อสัตว์จากด้านซ้ายเพื่อดูรายละเอียด</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        let allAnimals = [];

        window.onload = async () => {
            if (sessionStorage.getItem("isLoggedIn") !== "true") {
                window.location.href = "index.html";
                return;
            }
            await fetchAnimals();
        };

        async function fetchAnimals() {
            try {
                // สมมติว่าใช้ตารางชื่อ 'animals'
                const { data, error } = await db
                    .from('animals')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;
                allAnimals = data;
                renderAnimalList(allAnimals);
            } catch (err) {
                console.error("Fetch Error:", err);
                document.getElementById('animal-list').innerHTML = `<div class="text-red-400 text-center font-bold">ไม่สามารถเชื่อมต่อฐานข้อมูลได้</div>`;
            }
        }

        function renderAnimalList(list) {
            const container = document.getElementById('animal-list');
            if (list.length === 0) {
                container.innerHTML = `<div class="text-center py-10 text-gray-500 font-bold">ไม่พบข้อมูลในระบบ</div>`;
                return;
            }

            container.innerHTML = list.map(pet => {
                // 1. Icon ประเภทสัตว์
                const typeIcon = pet.type === 'สุนัข' ? '🐶' : (pet.type === 'แมว' ? '🐱' : '🐾');
                // 2. Icon เพศ + สี
                const genderIcon = pet.gender === 'ผู้' ? '♂️' : (pet.gender === 'เมีย' ? '♀️' : '❓');
                const genderClass = pet.gender === 'ผู้' ? 'gender-male' : (pet.gender === 'เมีย' ? 'gender-female' : 'text-gray-500');

                return `
                    <div class="animal-item" onclick="viewDetail('${pet.id}')" id="pet-${pet.id}">
                        <div class="flex justify-between items-start mb-3">
                            <span class="hn-badge">HN: ${pet.hn || 'NEW'}</span>
                            <span class="text-2xl">${typeIcon}</span>
                        </div>
                        
                        <div class="flex items-center gap-2 mb-3">
                            <h4 class="font-black text-white text-xl tracking-wide">${pet.name}</h4>
                            <span class="${genderClass} font-black text-lg">${genderIcon}</span>
                        </div>

                        <div class="space-y-2 border-t border-white/5 pt-3">
                            <div class="flex items-center gap-3 text-gray-300">
                                <span class="bg-white/10 p-1.5 rounded-lg text-xs">👤</span>
                                <span class="font-bold text-sm">เจ้าของ: ${pet.owner_name}</span>
                            </div>
                            <div class="flex items-center gap-3">
                                <span class="bg-teal-500/10 p-1.5 rounded-lg text-xs">📞</span>
                                <span class="text-teal-400 font-black text-sm">${pet.owner_tel}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterAnimals() {
            const term = document.getElementById('search-box').value.toLowerCase();
            const filtered = allAnimals.filter(pet => 
                pet.name.toLowerCase().includes(term) ||
                (pet.hn && pet.hn.toLowerCase().includes(term)) ||
                pet.owner_name.toLowerCase().includes(term) ||
                pet.owner_tel.includes(term)
            );
            renderAnimalList(filtered);
        }

        function viewDetail(id) {
            document.querySelectorAll('.animal-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`pet-${id}`).classList.add('active');
            
            const pet = allAnimals.find(p => p.id == id);
            
            // การแสดงผลด้านขวาที่ปรับให้สวยงามเหมือนหน้า Index
            document.getElementById('detail-view').innerHTML = `
                <div class="max-w-5xl mx-auto">
                    <div class="bg-navy-mid/50 backdrop-blur-xl p-10 rounded-[40px] border border-white/10 shadow-2xl">
                        <div class="flex justify-between items-center mb-10">
                            <div class="flex items-center gap-6">
                                <div class="text-7xl bg-white/5 p-6 rounded-[30px] border border-white/5">
                                    ${pet.type === 'สุนัข' ? '🐶' : (pet.type === 'แมว' ? '🐱' : '🐾')}
                                </div>
                                <div>
                                    <div class="flex items-center gap-3 mb-2">
                                        <h2 class="text-5xl font-black text-white">${pet.name}</h2>
                                        <span class="text-3xl">${pet.gender === 'ผู้' ? '♂️' : '♀️'}</span>
                                    </div>
                                    <span class="bg-teal-500 text-navy font-black px-4 py-1 rounded-full text-sm uppercase tracking-widest">
                                        HN: ${pet.hn}
                                    </span>
                                </div>
                            </div>
                            <div class="text-right">
                                <button class="bg-white/5 hover:bg-white/10 text-white px-6 py-3 rounded-2xl font-bold transition">แก้ไขข้อมูล</button>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-8">
                            <div class="bg-white/5 p-6 rounded-3xl border border-white/5">
                                <p class="text-teal-400 font-bold text-sm uppercase mb-4 tracking-widest">ข้อมูลพื้นฐาน</p>
                                <div class="space-y-4 text-lg">
                                    <p><span class="text-gray-500">พันธุ์:</span> <span class="font-bold">${pet.breed || '-'}</span></p>
                                    <p><span class="text-gray-500">อายุ:</span> <span class="font-bold">${pet.age || '-'} ปี</span></p>
                                    <p><span class="text-gray-500">น้ำหนัก:</span> <span class="font-bold text-teal-400">${pet.weight || '-'} kg</span></p>
                                </div>
                            </div>
                            <div class="bg-white/5 p-6 rounded-3xl border border-white/5">
                                <p class="text-teal-400 font-bold text-sm uppercase mb-4 tracking-widest">ข้อมูลการติดต่อ</p>
                                <div class="space-y-4 text-lg">
                                    <p><span class="text-gray-500">ชื่อเจ้าของ:</span> <span class="font-bold">${pet.owner_name}</span></p>
                                    <p><span class="text-gray-500">เบอร์โทรศัพท์:</span> <span class="font-bold text-teal-400">${pet.owner_tel}</span></p>
                                    <p><span class="text-gray-500">ที่อยู่:</span> <span class="text-sm font-bold text-gray-300">${pet.address || '-'}</span></p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function openAddModal() {
            // ฟังก์ชันสำหรับเปิด Modal เพิ่มข้อมูล
            alert("ระบบกำลังเปิดหน้าต่างลงทะเบียนใหม่...");
        }
    </script>
</body>
</html>
