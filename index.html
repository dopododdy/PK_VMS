<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<title>PK-VMS | คลินิกรักษาสัตว์หมอปิติพัฒน์</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<!-- ⚡ Prefetch หน้าหลักล่วงหน้า เพื่อให้หลัง login เปิดเร็วทันที -->
<link rel="prefetch" href="medrec.html" as="document">
<link rel="prefetch" href="bottom-nav.js" as="script">
<link rel="prefetch" href="supabase-config.js" as="script">

<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root { --navy:#020617; --teal:#14b8b1; }
  * { font-family:"Sarabun",sans-serif !important; }
  body {
    background: var(--navy);
    color:#e2e8f0; margin:0; min-height:100vh;
    display:flex; align-items:center; justify-content:center;
  }
  .mesh-bg {
    position:fixed; inset:0; z-index:-1;
    background:
      radial-gradient(circle at 10% 10%, rgba(20,184,177,0.08), transparent 40%),
      radial-gradient(circle at 90% 90%, rgba(59,130,246,0.08), transparent 40%);
  }
</style>
</head>
<body data-pk-nav="hide">
<div class="mesh-bg"></div>

<div class="bg-slate-900/50 p-12 rounded-[50px] border border-white/10 w-full max-w-md text-center backdrop-blur-3xl mx-4">
  <div class="w-20 h-20 bg-teal-500 rounded-3xl flex items-center justify-center text-4xl mx-auto mb-8 shadow-2xl shadow-teal-500/20">🔐</div>
  <h2 class="text-4xl font-black text-white mb-2">PK-VMS Pro</h2>
  <p class="text-slate-400 mb-10">ระบบบริหารจัดการคลินิกสัตว์</p>
  <input type="password" id="pw"
         class="w-full bg-black/40 border-2 border-white/10 rounded-2xl p-5 text-center text-3xl tracking-[0.5em] text-white outline-none focus:border-teal-500 transition-all"
         placeholder="••••" autofocus inputmode="numeric">
  <button id="go"
          class="w-full mt-8 bg-teal-600 hover:bg-teal-500 text-white font-black py-5 rounded-2xl text-xl transition-all active:scale-95 shadow-xl">
    เข้าสู่ระบบ
  </button>
</div>

<script>
  // ⚠️ ขอแนะนำให้ย้ายไป Supabase Auth — รหัสในหน้านี้ใครก็เห็น
  const PW = "044641460";
  const HOME = "medrec.html";   // หลัง login ไปหน้านี้แทน dashboard

  // ถ้า login แล้ว ข้ามหน้านี้ไปหน้า home เลย
  if (sessionStorage.getItem("isLoggedIn") === "true") {
    location.replace(HOME);
  }

  const pw = document.getElementById("pw");
  const go = document.getElementById("go");

  function login() {
    if (pw.value === PW) {
      sessionStorage.setItem("isLoggedIn", "true");
      location.replace(HOME);
    } else {
      alert("รหัสผ่านไม่ถูกต้อง!");
      pw.value = "";
      pw.focus();
    }
  }
  go.addEventListener("click", login);
  pw.addEventListener("keypress", e => { if (e.key === "Enter") login(); });
</script>
</body>
</html>
