<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <title>ประวัติการรักษา | PK-VMS Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/th.js"></script>

    <style>
        :root { 
            --navy: #0b1929; 
            --navy-mid: #112240; 
            --teal: #14b8b1; 
            --slate-400: #94a3b8;
        }
        
        * { font-family: "Sarabun", sans-serif !important; }
        body { background: var(--navy); color: #e2e8f0; line-height: 1.5; font-size: 15px; }
        
        .glass-card { background: rgba(17, 34, 64, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.08); }
        
        /* IDENTITY SECTION */
        .identity-card { 
            background: linear-gradient(145deg, rgba(20, 184, 177, 0.08), rgba(15, 23, 42, 0.5));
            border: 1px solid rgba(20, 184, 177, 0.2); 
            border-radius: 20px; padding: 24px; margin-bottom: 24px;
        }
        .info-label { color: var(--slate-400); font-size: 0.85rem; font-weight: 700; text-transform: uppercase; }
        .info-value { color: #ffffff; font-size: 1.25rem; font-weight: 700; }
        .info-highlight { color: var(--teal); font-size: 1.25rem; font-weight: 800; }

        /* ALLERGY ALERT */
        .allergy-bar {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 12px; padding: 12px 20px; margin-top: 15px;
            display: flex; align-items: center; gap: 12px;
        }
        .allergy-text { color: #f87171; font-size: 1.1rem; font-weight: 700; }
        
        /* VISIT ITEMS */
        .record-item { border: 1px solid rgba(255,255,255,0.05); transition: all 0.2s ease; margin-bottom: 15px; }
        .record-header { cursor: pointer; padding: 18px 24px; }
        .record-content { max-height: 0; overflow: hidden; transition: all 0.3s ease; background: rgba(0, 0, 0, 0.2); }
        .record-item.active .record-content { max-height: 3000px; padding: 25px; border-top: 1px solid rgba(255,255,255,0.1); }
        .record-item.active .arrow-icon { transform: rotate(180deg); color: var(--teal); }

        /* FORM INPUTS */
        .label-text { color: var(--slate-400); font-size: 0.9rem; font-weight: 600; margin-bottom: 6px; display: block; }
        .input-dark { 
            background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 10px; padding: 10px 14px; width: 100%; color: white; 
            font-size: 1rem; outline: none;
        }
        .input-dark:focus { border-color: var(--teal); }
        textarea.input-dark { min-height: 100px; font-size: 1rem; }

        .input-stats { font-size: 1.5rem !important; font-weight: 800 !important; text-align: center; }

        .section-title { color: var(--teal); font-weight: 700; font-size: 1.1rem; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .badge-date { background: rgba(20, 184, 177, 0.1); color: var(--teal); padding: 4px 10px; border-radius: 8px; font-weight: 700; font-size: 1rem; }

        input[readonly].flatpickr-input { background: rgba(0,0,0,0.3) !important; cursor: pointer; }
    </style>
</head>
<body class="p-6">

    <div class="max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-8 gap-4">
            <div>
                <a href="animals.html" class="flex items-center gap-2 text-teal-400 hover:text-teal-300 font-bold text-sm transition-all mb-2">
                    <span>←</span> กลับหน้าเวชระเบียน
                </a>
                <h1 id="pet-display-name" class="text-4xl font-black text-white tracking-tight">ประวัติการรักษา</h1>
                <div class="mt-1">
                    <span id="owner-display-info" class="text-blue-400/80 text-sm font-bold"></span>
                </div>
            </div>
            <button onclick="toggleNewVisitForm()" class="bg-teal-600 hover:bg-teal-500 text-white px-6 py-3 rounded-xl font-bold text-lg shadow-lg transition-all active:scale-95">
                + บันทึกการตรวจ
            </button>
        </div>

        <div id="new-visit-form" class="hidden glass-card rounded-3xl p-8 mb-10 border-teal-500/20 border shadow-xl">
            <div id="animal-info-card" class="identity-card">
                <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
                    <div class="flex flex-col"><span class="info-label">ชื่อสัตว์</span><span id="info-name" class="info-value">-</span></div>
                    <div class="flex flex-col"><span class="info-label">ชนิด</span><span id="info-type" class="info-value">-</span></div>
                    <div class="flex flex-col"><span class="info-label">เพศ</span><span id="info-gender" class="info-value">-</span></div>
                    <div class="flex flex-col"><span class="info-label">อายุ</span><span id="info-age" class="info-highlight">-</span></div>
                </div>
                <div id="info-congenital" class="allergy-bar hidden">
                    <span class="text-2xl">⚠️</span>
                    <div class="flex flex-col">
                        <span class="text-red-400 text-[10px] font-black uppercase tracking-wider">Medical Alert</span>
                        <span id="info-disease" class="allergy-text">-</span>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-12 gap-6">
                <div class="col-span-6 md:col-span-3">
                    <label class="label-text">BW (kg)</label>
                    <input type="number" step="0.01" id="v_weight" class="input-dark input-stats text-yellow-400">
                </div>
                <div class="col-span-6 md:col-span-3">
                    <label class="label-text">Temp (F)</label>
                    <input type="number" step="0.1" id="v_temp" class="input-dark input-stats text-red-400">
                </div>
                <div class="col-span-12 md:col-span-6">
                    <label class="label-text">วันนัดครั้งถัดไป</label>
                    <input type="text" id="v_next_app" class="input-dark font-bold">
                </div>

                <div class="col-span-12 md:col-span-6 space-y-4">
                    <div>
                        <div class="section-title">1. CC / History</div>
                        <textarea id="v_cc" class="input-dark" placeholder="อาการที่มา..."></textarea>
                    </div>
                    <div>
                        <div class="section-title">2. Physical Exam</div>
                        <textarea id="v_pe" class="input-dark" placeholder="ผลการตรวจร่างกาย..."></textarea>
                    </div>
                    <div>
                        <div class="section-title">3. Diagnosis</div>
                        <input type="text" id="v_tdx" class="input-dark font-bold text-indigo-300" placeholder="การวินิจฉัย...">
                    </div>
                </div>

                <div class="col-span-12 md:col-span-6 space-y-4">
                    <div>
                        <div class="section-title">4. Treatment (Tx)</div>
                        <textarea id="v_tx" class="input-dark" placeholder="การรักษา..."></textarea>
                    </div>
                    <div>
                        <div class="section-title">5. Prescription (Rx)</div>
                        <textarea id="v_rx" class="input-dark border-emerald-500/20" placeholder="รายการยา..."></textarea>
                    </div>
                    <div>
                        <div class="section-title">Appointment Note</div>
                        <input type="text" id="v_next_note" class="input-dark" placeholder="หมายเหตุนัด...">
                    </div>
                </div>
            </div>

            <div class="flex gap-4 mt-8">
                <button onclick="saveVisit()" class="flex-1 bg-emerald-600 hover:bg-emerald-500 py-4 rounded-xl font-bold text-xl shadow-lg transition-all">💾 บันทึกประวัติ</button>
                <button onclick="toggleNewVisitForm()" class="px-8 bg-slate-700 hover:bg-slate-600 rounded-xl font-bold">ยกเลิก</button>
            </div>
        </div>

        <div id="visit-history-list" class="space-y-4 pb-20"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const petId = urlParams.get('id');
        const petName = urlParams.get('name');
        const ownerHN = urlParams.get('hn');

        let defaultWeight = 0;

        window.onload = async () => {
            document.getElementById('pet-display-name').innerText = `${petName}`;
            document.getElementById('owner-display-info').innerText = `HN: ${ownerHN}`;
            
            await fetchAnimalDetails();
            loadVisitHistory();

            flatpickr("#v_next_app", {
                enableTime: true,
                dateFormat: "Y-m-d H:i", 
                altInput: true,         
                altFormat: "j F Y เวลา H:i น.", 
                time_24hr: true,
                locale: "th",
                minDate: "today",
                onReady: function(selectedDates, dateStr, instance) {
                    const wrapFormat = () => {
                        if (instance.selectedDates.length > 0) {
                            const date = instance.selectedDates[0];
                            const d = date.getDate();
                            const m = instance.l10n.months.longhand[date.getMonth()];
                            const y = date.getFullYear() + 543;
                            const h = date.getHours().toString().padStart(2, '0');
                            const i = date.getMinutes().toString().padStart(2, '0');
                            instance.altInput.value = `${d} ${m} ${y} เวลา ${h}:${i} น.`;
                        }
                    };
                    instance.config.onChange.push(wrapFormat);
                }
            });
        };

        async function fetchAnimalDetails() {
            const { data, error } = await db.from('animals').select('*').eq('id', petId).single();
            if (error || !data) return;

            defaultWeight = data.weight;
            document.getElementById('info-name').innerText = data.pet_name;
            const typeIcons = { 'แมว': '🐱 แมว', 'สุนัข': '🐶 สุนัข', 'อื่นๆ': '🐰 อื่นๆ' };
            document.getElementById('info-type').innerText = typeIcons[data.pet_type] || data.pet_type;
            const genderIcons = { 'ผู้': '♂️ ผู้', 'เมีย': '♀️ เมีย', 'ผู้ตอน': '♂️ ผู้ (ทำหมัน)', 'เมียหมัน': '♀️ เมีย (ทำหมัน)' };
            document.getElementById('info-gender').innerText = genderIcons[data.gender] || data.gender;

            if (data.birth_date) {
                const birth = new Date(data.birth_date);
                const now = new Date();
                let years = now.getFullYear() - birth.getFullYear();
                let months = now.getMonth() - birth.getMonth();
                if (months < 0) { years--; months += 12; }
                document.getElementById('info-age').innerText = `${years} ปี ${months} เดือน`;
            }

            if (data.congenital_disease && data.congenital_disease.trim() !== "" && data.congenital_disease !== "-") {
                document.getElementById('info-congenital').classList.remove('hidden');
                document.getElementById('info-disease').innerText = data.congenital_disease;
            }
        }

        async function loadVisitHistory() {
            const { data, error } = await db.from('visit_history').select('*').eq('animal_id', petId).order('visit_date', { ascending: false });
            if (error) return;

            document.getElementById('v_weight').value = (data.length > 0) ? (data[0].weight || defaultWeight) : (defaultWeight || "");

            const listContainer = document.getElementById('visit-history-list');
            if (data.length === 0) {
                listContainer.innerHTML = `<div class="text-center py-20 opacity-20 text-2xl font-bold">ไม่พบประวัติการตรวจ</div>`;
                return;
            }

            listContainer.innerHTML = data.map(v => {
                const d = new Date(v.visit_date);
                const dateStr = `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()+543}`;
                
                let nextApptStr = "";
                if(v.next_appointment) {
                    const nd = new Date(v.next_appointment);
                    const months = ["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
                    nextApptStr = `${nd.getDate()} ${months[nd.getMonth()]} ${nd.getFullYear()+543} (${nd.getHours().toString().padStart(2,'0')}:${nd.getMinutes().toString().padStart(2,'0')})`;
                }

                return `
                    <div class="record-item glass-card rounded-2xl overflow-hidden shadow-lg">
                        <div class="record-header flex justify-between items-center" onclick="this.parentElement.classList.toggle('active')">
                            <div class="flex items-center gap-4">
                                <div class="badge-date">${dateStr}</div>
                                <div class="text-white font-bold text-lg md:text-xl">${v.diagnosis || '<span class="opacity-30 text-sm">ไม่ระบุ Dx</span>'}</div>
                            </div>
                            <div class="flex items-center gap-6 text-sm font-bold">
                                <div class="hidden md:flex gap-4">
                                    <span class="text-yellow-400">BW: ${v.weight || '-'} kg</span>
                                    <span class="text-red-400">T: ${v.temp || '-'} F</span>
                                </div>
                                <span class="arrow-icon opacity-30 transition-transform">▼</span>
                            </div>
                        </div>
                        <div class="record-content">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <div class="space-y-4">
                                    <div><h4 class="text-teal-500 text-[11px] font-black uppercase tracking-wider mb-1">1. Subjective (CC)</h4><p class="text-white text-md whitespace-pre-wrap pl-3 border-l-2 border-white/10">${v.symptoms || '-'}</p></div>
                                    <div><h4 class="text-teal-500 text-[11px] font-black uppercase tracking-wider mb-1">2. Objective (PE)</h4><p class="text-white text-md whitespace-pre-wrap pl-3 border-l-2 border-white/10">${v.physical_exam || '-'}</p></div>
                                </div>
                                <div class="space-y-4">
                                    <div><h4 class="text-indigo-400 text-[11px] font-black uppercase tracking-wider mb-1">4. Treatment (Tx)</h4><p class="text-white text-md whitespace-pre-wrap pl-3 border-l-2 border-white/10">${v.treatment || '-'}</p></div>
                                    <div><h4 class="text-emerald-400 text-[11px] font-black uppercase tracking-wider mb-1">5. Prescription (Rx)</h4><p class="text-white text-md whitespace-pre-wrap pl-3 border-l-2 border-white/10 bg-emerald-500/5 p-3 rounded-lg">${v.prescription || '-'}</p></div>
                                </div>
                            </div>
                            ${v.next_appointment ? `<div class="mt-6 p-4 bg-indigo-500/10 border border-indigo-500/20 rounded-xl flex items-center gap-4">📅 <div><div class="text-indigo-300 font-bold text-sm">นัดครั้งต่อไป: ${nextApptStr}</div><div class="text-gray-400 text-xs">${v.next_note || ''}</div></div></div>` : ''}
                        </div>
                    </div>`;
            }).join('');
        }

        async function saveVisit() {
            // ปลดล็อกเงื่อนไขการบังคับกรอก (Validation Bypass)
            const nextAppValue = document.getElementById('v_next_app').value;

            const visitData = {
                animal_id: petId,
                weight: parseFloat(document.getElementById('v_weight').value) || 0,
                temp: parseFloat(document.getElementById('v_temp').value) || 0,
                symptoms: document.getElementById('v_cc').value || "-", // ถ้าไม่ใส่ให้เป็นขีด
                physical_exam: document.getElementById('v_pe').value || "-",
                diagnosis: document.getElementById('v_tdx').value || "-",
                treatment: document.getElementById('v_tx').value || "-",
                prescription: document.getElementById('v_rx').value || "-",
                next_appointment: nextAppValue === "" ? null : nextAppValue,
                next_note: document.getElementById('v_next_note').value || ""
            };
            
            const { error } = await db.from('visit_history').insert(visitData);
            if (error) alert("Error: " + error.message);
            else location.reload();
        }

        function toggleNewVisitForm() {
            const form = document.getElementById('new-visit-form');
            form.classList.toggle('hidden');
            if(!form.classList.contains('hidden')) {
                window.scrollTo({ top: 0, behavior: 'smooth' });
                document.getElementById('v_cc').focus();
            }
        }
    </script>
</body>
</html>
