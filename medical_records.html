<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <title>ประวัติการรักษา | PK-VMS Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/th.js"></script>

    <style>
        :root { --navy: #0b1929; --navy-mid: #112240; --teal: #14b8b1; }
        body { font-family: "Sarabun", sans-serif; background: var(--navy); color: #e2e8f0; }
        
        .glass-card { background: rgba(17, 34, 64, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .record-header { cursor: pointer; transition: all 0.2s; }
        .record-header:hover { background: rgba(20, 184, 177, 0.1); }
        .record-content { max-height: 0; overflow: hidden; transition: all 0.3s ease-out; background: rgba(0, 0, 0, 0.2); }
        .record-item.active .record-content { max-height: 2000px; padding: 24px; border-top: 1px solid rgba(255,255,255,0.1); }
        .record-item.active .arrow-icon { transform: rotate(180deg); }
        .record-item.active { border-color: var(--teal); }

        .label-text { color: #94a3b8; font-size: 1rem; font-weight: 600; margin-bottom: 6px; display: block; }
        .input-dark { 
            background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 12px; padding: 12px; width: 100%; color: white; font-size: 1.1rem; outline: none;
        }
        .input-dark:focus { border-color: var(--teal); box-shadow: 0 0 10px rgba(20, 184, 177, 0.2); }
        .section-title { color: var(--teal); font-weight: 800; font-size: 1.1rem; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
    </style>
</head>
<body class="p-8">

    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-end mb-8">
            <div>
                <a href="animals.html" class="text-teal-400 hover:text-teal-300 font-bold">← กลับหน้าเวชระเบียน</a>
                <h1 id="pet-display-name" class="text-5xl font-black mt-2">ประวัติการรักษา: ...</h1>
                <p id="owner-display-info" class="text-gray-400 text-xl font-bold mt-1">HN: ...</p>
            </div>
            <button onclick="toggleNewVisitForm()" class="bg-teal-600 hover:bg-teal-500 text-white px-8 py-4 rounded-2xl font-black text-xl shadow-lg transition-all">
                + บันทึกการตรวจรักษา
            </button>
        </div>

        <div id="new-visit-form" class="hidden glass-card rounded-[32px] p-8 mb-10 border-teal-500/40 border-2 shadow-2xl">
            <h3 class="text-3xl font-black text-white mb-8 flex items-center gap-3">🩺 บันทึกตรวจรักษาใหม่</h3>
            
            <div class="grid grid-cols-12 gap-6">
                <div class="col-span-3">
                    <label class="label-text">น้ำหนัก BW (kg)</label>
                    <input type="number" step="0.01" id="v_weight" class="input-dark text-2xl font-black text-yellow-400">
                </div>
                <div class="col-span-3">
                    <label class="label-text">อุณหภูมิ Temp (F)</label>
                    <input type="number" step="0.1" id="v_temp" class="input-dark text-2xl font-black text-red-400">
                </div>
                <div class="col-span-6">
                    <label class="label-text">6. วัน-เวลานัดครั้งถัดไป (Appt)</label>
                    <input type="text" id="v_next_app" class="input-dark font-bold text-indigo-400" placeholder="คลิกเพื่อเลือกวันที่และเวลา">
                </div>

                <div class="col-span-6 space-y-5">
                    <div>
                        <div class="section-title"><span>1.</span> อาการที่มา (CC)</div>
                        <textarea id="v_cc" class="input-dark h-24" placeholder="เจ้าของแจ้งว่า..."></textarea>
                    </div>
                    <div>
                        <div class="section-title"><span>2.</span> การตรวจร่างกาย (PE)</div>
                        <textarea id="v_pe" class="input-dark h-24" placeholder="ผลการตรวจร่างกาย..."></textarea>
                    </div>
                    <div>
                        <div class="section-title"><span>3.</span> วินิจฉัยเบื้องต้น (TDx)</div>
                        <input type="text" id="v_tdx" class="input-dark" placeholder="โรคที่สงสัย...">
                    </div>
                </div>

                <div class="col-span-6 space-y-5">
                    <div>
                        <div class="section-title"><span>4.</span> การรักษา (Tx)</div>
                        <textarea id="v_tx" class="input-dark h-24" placeholder="หัตถการ / การรักษา..."></textarea>
                    </div>
                    <div>
                        <div class="section-title"><span>5.</span> ยา (Rx)</div>
                        <textarea id="v_rx" class="input-dark h-24" placeholder="รายการยาที่จ่าย..."></textarea>
                    </div>
                    <div>
                        <div class="section-title">รายละเอียดการนัดหมาย</div>
                        <input type="text" id="v_next_note" class="input-dark" placeholder="เช่น มาดูแผล, มาฉีดวัคซีนซ้ำ...">
                    </div>
                </div>
            </div>

            <div class="flex gap-4 mt-10">
                <button onclick="saveVisit()" class="flex-1 bg-emerald-600 hover:bg-emerald-500 py-5 rounded-2xl font-black text-2xl shadow-xl transition-all">💾 บันทึกประวัติการตรวจ</button>
                <button onclick="toggleNewVisitForm()" class="px-12 bg-gray-700 hover:bg-gray-600 rounded-2xl font-bold">ยกเลิก</button>
            </div>
        </div>

        <div id="visit-history-list" class="space-y-4 pb-20"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const petId = urlParams.get('id');
        const petName = urlParams.get('name');
        const ownerHN = urlParams.get('hn');

        window.onload = () => {
            document.getElementById('pet-display-name').innerText = `ประวัติการรักษา: ${petName}`;
            document.getElementById('owner-display-info').innerText = `HN: ${ownerHN}`;
            
            // ตั้งค่า DatePicker
            flatpickr("#v_next_app", {
                enableTime: true,
                dateFormat: "Y-m-d H:i",
                time_24hr: true,
                locale: "th",
                minDate: "today"
            });

            loadVisitHistory();
        };

        function toggleNewVisitForm() {
            const form = document.getElementById('new-visit-form');
            form.classList.toggle('hidden');
            if(!form.classList.contains('hidden')) window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function loadVisitHistory() {
            const { data, error } = await db.from('visit_history')
                .select('*')
                .eq('animal_id', petId)
                .order('visit_date', { ascending: false });

            if (error) return;

            // ดึงน้ำหนักล่าสุดมาใส่ใน Form
            if (data.length > 0) {
                document.getElementById('v_weight').value = data[0].weight || "";
            }

            const listContainer = document.getElementById('visit-history-list');
            if (data.length === 0) {
                listContainer.innerHTML = `<div class="text-center py-20 opacity-20 text-3xl font-black">ยังไม่มีประวัติการตรวจ</div>`;
                return;
            }

            listContainer.innerHTML = data.map(v => {
                const d = new Date(v.visit_date);
                const dateStr = `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()+543}`;
                return `
                    <div class="record-item glass-card rounded-2xl overflow-hidden">
                        <div class="record-header p-6 flex justify-between items-center" onclick="this.parentElement.classList.toggle('active')">
                            <div class="flex items-center gap-6">
                                <div class="bg-teal-500/20 text-teal-400 px-4 py-1 rounded-lg font-black text-xl">${dateStr}</div>
                                <div class="text-white font-bold text-2xl">${v.diagnosis || 'ไม่ระบุ Dx'}</div>
                            </div>
                            <div class="flex items-center gap-6">
                                <div class="text-right">
                                    <span class="text-yellow-400 font-bold">BW: ${v.weight || '-'} kg</span>
                                    <span class="text-red-400 font-bold ml-4">Temp: ${v.temp || '-'} F</span>
                                </div>
                                <span class="arrow-icon text-2xl opacity-50">▼</span>
                            </div>
                        </div>
                        <div class="record-content">
                            <div class="grid grid-cols-2 gap-10">
                                <div>
                                    <div class="mb-4">
                                        <h4 class="text-teal-400 text-xs font-bold uppercase tracking-widest mb-1">1. Symptoms (CC)</h4>
                                        <p class="text-gray-200 text-lg whitespace-pre-wrap">${v.symptoms || '-'}</p>
                                    </div>
                                    <div>
                                        <h4 class="text-teal-400 text-xs font-bold uppercase tracking-widest mb-1">2. Physical Exam (PE)</h4>
                                        <p class="text-gray-200 text-lg whitespace-pre-wrap">${v.physical_exam || '-'}</p>
                                    </div>
                                </div>
                                <div>
                                    <div class="mb-4">
                                        <h4 class="text-teal-400 text-xs font-bold uppercase tracking-widest mb-1">4. Treatment (Tx)</h4>
                                        <p class="text-gray-200 text-lg whitespace-pre-wrap">${v.treatment || '-'}</p>
                                    </div>
                                    <div>
                                        <h4 class="text-teal-400 text-xs font-bold uppercase tracking-widest mb-1">5. Prescription (Rx)</h4>
                                        <p class="text-gray-200 text-lg whitespace-pre-wrap">${v.prescription || '-'}</p>
                                    </div>
                                </div>
                            </div>
                            ${v.next_appointment ? `
                            <div class="mt-8 p-4 bg-indigo-500/10 border border-indigo-500/30 rounded-xl flex items-center gap-4">
                                <span class="text-2xl">📅</span>
                                <div>
                                    <div class="text-indigo-300 font-bold text-lg">นัดหมายครั้งถัดไป: ${new Date(v.next_appointment).toLocaleString('th-TH')}</div>
                                    <div class="text-gray-400">${v.next_note || 'ไม่มีรายละเอียดเพิ่มเติม'}</div>
                                </div>
                            </div>` : ''}
                        </div>
                    </div>`;
            }).join('');
        }

        async function saveVisit() {
            const visitData = {
                animal_id: petId,
                weight: parseFloat(document.getElementById('v_weight').value),
                temp: parseFloat(document.getElementById('v_temp').value),
                symptoms: document.getElementById('v_cc').value,
                physical_exam: document.getElementById('v_pe').value,
                diagnosis: document.getElementById('v_tdx').value,
                treatment: document.getElementById('v_tx').value,
                prescription: document.getElementById('v_rx').value,
                next_appointment: document.getElementById('v_next_app').value || null,
                next_note: document.getElementById('v_next_note').value
            };

            const { error } = await db.from('visit_history').insert(visitData);
            if (error) {
                alert("Error: " + error.message);
            } else {
                alert("บันทึกประวัติการรักษาเรียบร้อย");
                location.reload();
            }
        }
    </script>
</body>
</html>
