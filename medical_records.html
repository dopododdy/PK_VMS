<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <title>ประวัติการรักษา | PK-VMS Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/th.js"></script>

    <style>
        :root { --navy: #0b1929; --navy-mid: #112240; --teal: #14b8b1; }
        body { font-family: "Sarabun", sans-serif; background: var(--navy); color: #e2e8f0; }
        
        .glass-card { background: rgba(17, 34, 64, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        
        /* ปรับปรุง Identity Card ใหม่ */
        .identity-card { 
            background: linear-gradient(145deg, rgba(20, 184, 177, 0.15), rgba(11, 25, 41, 0.4));
            border: 2px solid rgba(20, 184, 177, 0.3); 
            border-radius: 24px; 
            padding: 28px; 
            margin-bottom: 24px;
        }

        /* ปรับขนาดตัวหนังสือใน Identity Card */
        .info-label { color: #94a3b8; font-size: 1.1rem; font-weight: 600; }
        .info-value { color: #ffffff; font-size: 1.6rem; font-weight: 800; }
        .info-highlight { color: var(--teal); font-size: 1.6rem; font-weight: 800; }

        /* แถบแจ้งเตือนแพ้ยาแบบเต็มความกว้าง */
        .allergy-bar {
            background: rgba(239, 68, 68, 0.15);
            border: 2px solid rgba(239, 68, 68, 0.4);
            border-radius: 16px;
            padding: 16px 24px;
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
        }
        .allergy-text { color: #f87171; font-size: 1.4rem; font-weight: 800; }
        
        .record-item { border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; margin-bottom: 16px; }
        .record-header { cursor: pointer; transition: all 0.2s; }
        .record-header:hover { background: rgba(20, 184, 177, 0.1); }
        .record-content { max-height: 0; overflow: hidden; transition: all 0.3s ease-out; background: rgba(0, 0, 0, 0.2); }
        .record-item.active .record-content { max-height: 2000px; padding: 24px; border-top: 1px solid rgba(255,255,255,0.1); }
        .record-item.active .arrow-icon { transform: rotate(180deg); }
        .record-item.active { border-color: var(--teal); box-shadow: 0 10px 30px rgba(0,0,0,0.4); }

        .label-text { color: #94a3b8; font-size: 1rem; font-weight: 600; margin-bottom: 6px; display: block; }
        .input-dark { 
            background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 12px; padding: 12px; width: 100%; color: white; font-size: 1.2rem; outline: none;
        }
        .input-dark:focus { border-color: var(--teal); }

        .flatpickr-input[readonly] {
            background: rgba(0,0,0,0.3) !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            border-radius: 12px !important;
            padding: 12px !important;
            width: 100% !important;
            color: #818cf8 !important;
            font-size: 1.2rem !important;
            font-weight: bold !important;
            cursor: pointer;
        }

        .section-title { color: var(--teal); font-weight: 800; font-size: 1.2rem; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
    </style>
</head>
<body class="p-8">

    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-end mb-8">
            <div>
                <a href="animals.html" class="text-teal-400 hover:text-teal-300 font-bold text-lg">← กลับหน้าเวชระเบียน</a>
                <h1 id="pet-display-name" class="text-5xl font-black mt-2 text-white">ประวัติการรักษา</h1>
                <p id="owner-display-info" class="text-gray-400 text-xl font-bold mt-1"></p>
            </div>
            <button onclick="toggleNewVisitForm()" class="bg-teal-600 hover:bg-teal-500 text-white px-8 py-4 rounded-2xl font-black text-xl shadow-lg transition-all">
                + บันทึกการตรวจรักษา
            </button>
        </div>

        <div id="new-visit-form" class="hidden glass-card rounded-[32px] p-8 mb-10 border-teal-500/40 border-2 shadow-2xl">
            
            <div id="animal-info-card" class="identity-card shadow-inner">
                <div class="flex flex-wrap items-center gap-x-12 gap-y-4">
                    <div class="flex flex-col">
                        <span class="info-label">ชื่อสัตว์</span>
                        <span id="info-name" class="info-value">-</span>
                    </div>
                    <div class="flex flex-col">
                        <span class="info-label">ชนิด</span>
                        <span id="info-type" class="info-value">-</span>
                    </div>
                    <div class="flex flex-col">
                        <span class="info-label">เพศ</span>
                        <span id="info-gender" class="info-value">-</span>
                    </div>
                    <div class="flex flex-col">
                        <span class="info-label">อายุ</span>
                        <span id="info-age" class="info-highlight">-</span>
                    </div>
                </div>

                <div id="info-congenital" class="allergy-bar hidden">
                    <span class="text-3xl">⚠️</span>
                    <div class="flex flex-col">
                        <span class="text-red-300 text-sm font-bold uppercase tracking-wider">แพ้ยา / โรคประจำตัว</span>
                        <span id="info-disease" class="allergy-text">-</span>
                    </div>
                </div>
            </div>

            <h3 class="text-2xl font-black text-white mb-6 flex items-center gap-3">🩺 บันทึกตรวจรักษา (SOAP)</h3>
            
            <div class="grid grid-cols-12 gap-6">
                <div class="col-span-3">
                    <label class="label-text">น้ำหนักปัจจุบัน BW (kg)</label>
                    <input type="number" step="0.01" id="v_weight" class="input-dark text-3xl font-black text-yellow-400">
                </div>
                <div class="col-span-3">
                    <label class="label-text">อุณหภูมิ Temp (F)</label>
                    <input type="number" step="0.1" id="v_temp" class="input-dark text-3xl font-black text-red-400" placeholder="101.5">
                </div>
                <div class="col-span-6">
                    <label class="label-text">6. วัน-เวลานัดครั้งถัดไป (Appt)</label>
                    <input type="text" id="v_next_app" class="input-dark">
                </div>

                <div class="col-span-6 space-y-5">
                    <div><div class="section-title">1. อาการที่มา (CC)</div><textarea id="v_cc" class="input-dark h-28" placeholder="ระบุอาการสำคัญ..."></textarea></div>
                    <div><div class="section-title">2. การตรวจร่างกาย (PE)</div><textarea id="v_pe" class="input-dark h-28" placeholder="ระบุผลการตรวจร่างกาย..."></textarea></div>
                    <div><div class="section-title">3. วินิจฉัยเบื้องต้น (TDx)</div><input type="text" id="v_tdx" class="input-dark" placeholder="สรุปผลวินิจฉัย..."></div>
                </div>

                <div class="col-span-6 space-y-5">
                    <div><div class="section-title">4. การรักษา (Tx)</div><textarea id="v_tx" class="input-dark h-28" placeholder="หัตถการ / การรักษา..."></textarea></div>
                    <div><div class="section-title">5. รายการยา (Rx)</div><textarea id="v_rx" class="input-dark h-28" placeholder="รายการยาที่จ่าย..."></textarea></div>
                    <div><div class="section-title">รายละเอียดการนัดหมาย</div><input type="text" id="v_next_note" class="input-dark" placeholder="เช่น นัดดูแผล, นัดตรวจเลือด..."></div>
                </div>
            </div>

            <div class="flex gap-4 mt-10">
                <button onclick="saveVisit()" class="flex-1 bg-emerald-600 hover:bg-emerald-500 py-5 rounded-2xl font-black text-2xl shadow-xl transition-all">💾 บันทึกประวัติการตรวจ</button>
                <button onclick="toggleNewVisitForm()" class="px-12 bg-gray-700 hover:bg-gray-600 rounded-2xl font-bold">ยกเลิก</button>
            </div>
        </div>

        <div id="visit-history-list" class="space-y-4 pb-20"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const petId = urlParams.get('id');
        const petName = urlParams.get('name');
        const ownerHN = urlParams.get('hn');

        let defaultWeight = 0;

        window.onload = async () => {
            document.getElementById('pet-display-name').innerText = `ประวัติการรักษา: ${petName}`;
            document.getElementById('owner-display-info').innerText = `HN: ${ownerHN}`;
            
            await fetchAnimalDetails();
            loadVisitHistory();

            flatpickr("#v_next_app", {
                enableTime: true,
                dateFormat: "Y-m-d H:i",
                altInput: true,
                time_24hr: true,
                locale: "th",
                minDate: "today",
                formatDate: (date, format, locale) => {
                    const d = date.getDate();
                    const m = locale.months.longhand[date.getMonth()];
                    const y = date.getFullYear() + 543;
                    const time = date.getHours().toString().padStart(2, '0') + ":" + date.getMinutes().toString().padStart(2, '0');
                    return `${d} ${m} ${y} ${time} น.`;
                }
            });
        };

        async function fetchAnimalDetails() {
            const { data, error } = await db.from('animals').select('*').eq('id', petId).single();
            if (error || !data) return;

            defaultWeight = data.weight;

            document.getElementById('info-name').innerText = data.pet_name;
            const typeIcons = { 'แมว': '🐱 แมว', 'สุนัข': '🐶 สุนัข', 'อื่นๆ': '🐰 อื่นๆ' };
            document.getElementById('info-type').innerText = typeIcons[data.pet_type] || data.pet_type;
            const genderIcons = { 'ผู้': '♂️ ผู้', 'เมีย': '♀️ เมีย', 'ผู้ตอน': '♂️ ผู้ (ทำหมัน)', 'เมียหมัน': '♀️ เมีย (ทำหมัน)' };
            document.getElementById('info-gender').innerText = genderIcons[data.gender] || data.gender;

            if (data.birth_date) {
                const birth = new Date(data.birth_date);
                const now = new Date();
                let years = now.getFullYear() - birth.getFullYear();
                let months = now.getMonth() - birth.getMonth();
                if (months < 0) { years--; months += 12; }
                document.getElementById('info-age').innerText = `${years} ปี ${months} เดือน`;
            }

            // แสดงแพ้ยา/โรคประจำตัวแบบแถบเต็มความกว้าง
            if (data.congenital_disease && data.congenital_disease.trim() !== "" && data.congenital_disease !== "-") {
                document.getElementById('info-congenital').classList.remove('hidden');
                document.getElementById('info-disease').innerText = data.congenital_disease;
            } else {
                document.getElementById('info-congenital').classList.add('hidden');
            }
        }

        async function loadVisitHistory() {
            const { data, error } = await db.from('visit_history').select('*').eq('animal_id', petId).order('visit_date', { ascending: false });
            if (error) return;

            if (data.length > 0) {
                document.getElementById('v_weight').value = data[0].weight || defaultWeight;
            } else {
                document.getElementById('v_weight').value = defaultWeight || "";
            }

            const listContainer = document.getElementById('visit-history-list');
            if (data.length === 0) {
                listContainer.innerHTML = `<div class="text-center py-20 opacity-20 text-3xl font-black">ไม่พบประวัติการตรวจ</div>`;
                return;
            }

            listContainer.innerHTML = data.map(v => {
                const d = new Date(v.visit_date);
                const dateStr = `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()+543}`;
                
                let nextApptStr = "";
                if(v.next_appointment) {
                    const nd = new Date(v.next_appointment);
                    const months = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];
                    nextApptStr = `${nd.getDate()} ${months[nd.getMonth()]} ${nd.getFullYear()+543} ${nd.getHours().toString().padStart(2,'0')}:${nd.getMinutes().toString().padStart(2,'0')} น.`;
                }

                return `
                    <div class="record-item glass-card rounded-2xl overflow-hidden">
                        <div class="record-header p-6 flex justify-between items-center" onclick="this.parentElement.classList.toggle('active')">
                            <div class="flex items-center gap-6">
                                <div class="bg-teal-500/20 text-teal-400 px-4 py-1 rounded-lg font-black text-xl">${dateStr}</div>
                                <div class="text-white font-bold text-2xl">${v.diagnosis || 'ไม่ระบุ Dx'}</div>
                            </div>
                            <div class="flex items-center gap-6 text-xl font-bold">
                                <span class="text-yellow-400">BW: ${v.weight || '-'} kg</span>
                                <span class="text-red-400">T: ${v.temp || '-'} F</span>
                                <span class="arrow-icon text-2xl opacity-50 ml-4">▼</span>
                            </div>
                        </div>
                        <div class="record-content">
                            <div class="grid grid-cols-2 gap-10">
                                <div class="space-y-6">
                                    <div><h4 class="text-teal-500 text-sm font-black uppercase mb-2">1. CC</h4><p class="text-white text-lg whitespace-pre-wrap">${v.symptoms || '-'}</p></div>
                                    <div><h4 class="text-teal-500 text-sm font-black uppercase mb-2">2. PE</h4><p class="text-white text-lg whitespace-pre-wrap">${v.physical_exam || '-'}</p></div>
                                </div>
                                <div class="space-y-6">
                                    <div><h4 class="text-indigo-400 text-sm font-black uppercase mb-2">4. Tx</h4><p class="text-white text-lg whitespace-pre-wrap">${v.treatment || '-'}</p></div>
                                    <div><h4 class="text-emerald-400 text-sm font-black uppercase mb-2">5. Rx</h4><p class="text-white text-lg whitespace-pre-wrap">${v.prescription || '-'}</p></div>
                                </div>
                            </div>
                            ${v.next_appointment ? `<div class="mt-10 p-5 bg-indigo-500/10 border border-indigo-500/30 rounded-2xl flex items-center gap-5"><div class="text-4xl">📅</div><div><div class="text-indigo-300 font-black text-xl">นัดครั้งหน้า: ${nextApptStr}</div><div class="text-gray-400 text-lg">${v.next_note || ''}</div></div></div>` : ''}
                        </div>
                    </div>`;
            }).join('');
        }

        async function saveVisit() {
            const visitData = {
                animal_id: petId,
                weight: parseFloat(document.getElementById('v_weight').value) || 0,
                temp: parseFloat(document.getElementById('v_temp').value) || 0,
                symptoms: document.getElementById('v_cc').value,
                physical_exam: document.getElementById('v_pe').value,
                diagnosis: document.getElementById('v_tdx').value,
                treatment: document.getElementById('v_tx').value,
                prescription: document.getElementById('v_rx').value,
                next_appointment: document.getElementById('v_next_app').value || null,
                next_note: document.getElementById('v_next_note').value
            };
            const { error } = await db.from('visit_history').insert(visitData);
            if (error) alert("Error: " + error.message);
            else location.reload();
        }

        function toggleNewVisitForm() {
            const form = document.getElementById('new-visit-form');
            form.classList.toggle('hidden');
            if(!form.classList.contains('hidden')) window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
