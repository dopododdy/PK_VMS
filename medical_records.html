<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประวัติการรักษา | PK-VMS Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <style>
        :root { --navy: #020617; --card: #0f172a; --teal: #14b8b1; --border: rgba(255, 255, 255, 0.1); }
        * { font-family: "Sarabun", sans-serif !important; }
        body { background: var(--navy); color: #e2e8f0; }
        .input-box { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; padding: 12px; color: white; width: 100%; outline: none; transition: 0.2s; }
        .input-box:focus { border-color: var(--teal); background: rgba(0,0,0,0.5); box-shadow: 0 0 0 2px rgba(20, 184, 177, 0.2); }
        .label-text { color: #94a3b8; font-size: 0.85rem; margin-bottom: 6px; display: block; font-weight: 600; }
        .history-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; transition: 0.3s; }
        .history-card:hover { border-color: var(--teal); transform: translateY(-2px); }
        .btn-edit { background: rgba(59, 130, 246, 0.1); color: #60a5fa; padding: 6px 14px; border-radius: 10px; font-weight: 700; transition: 0.2s; }
        .btn-edit:hover { background: #3b82f6; color: white; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-4">
                <button onclick="goBack()" class="text-3xl opacity-50 hover:opacity-100 transition-all">⬅️</button>
                <div>
                    <h1 class="text-3xl font-black text-white" id="display-pet-name">กำลังโหลด...</h1>
                    <p class="text-teal-400 font-bold" id="display-hn">HN: -</p>
                </div>
            </div>
            <div class="text-right">
                <span class="bg-teal-500/10 text-teal-400 px-4 py-2 rounded-full text-sm font-bold border border-teal-500/20">🏥 บันทึกการตรวจ</span>
            </div>
        </header>

        <section id="record-form" class="bg-slate-800/40 p-8 rounded-[30px] border border-white/5 mb-10 shadow-2xl relative">
            <div id="edit-badge" class="hidden absolute -top-3 left-8 bg-blue-600 text-white px-4 py-1 rounded-full text-xs font-black animate-bounce">กำลังแก้ไขข้อมูลเดิม ✏️</div>
            
            <div class="grid grid-cols-12 gap-5">
                <div class="col-span-12 md:col-span-8">
                    <label class="label-text">อาการ/ปัญหาที่พบ (Symptoms)</label>
                    <textarea id="f_symptoms" class="input-box h-24" placeholder="ระบุอาการเบื้องต้น..."></textarea>
                </div>
                <div class="col-span-12 md:col-span-4">
                    <label class="label-text text-yellow-400">การวินิจฉัย (Diagnosis)</label>
                    <textarea id="f_diagnosis" class="input-box h-24 border-yellow-500/30" placeholder="ผลการวินิจฉัย..."></textarea>
                </div>
                <div class="col-span-12">
                    <label class="label-text text-teal-400 font-bold">การรักษาและสั่งยา (Treatment & Medications)</label>
                    <textarea id="f_treatment" class="input-box h-32 border-teal-500/30" placeholder="ระบุวิธีรักษาและรายการยาที่จ่าย..."></textarea>
                </div>
                <div class="col-span-12 md:col-span-6">
                    <label class="label-text">หมายเหตุเพิ่มเติม</label>
                    <input type="text" id="f_note" class="input-box" placeholder="เช่น นัดตรวจครั้งถัดไป...">
                </div>
                <div class="col-span-6 md:col-span-3">
                    <label class="label-text">สัตวแพทย์ผู้ตรวจ</label>
                    <input type="text" id="f_vet" class="input-box" placeholder="หมอ...">
                </div>
                <div class="col-span-6 md:col-span-3">
                    <label class="label-text">ค่ารักษา (บาท)</label>
                    <input type="number" id="f_cost" class="input-box text-right font-bold text-yellow-400" placeholder="0.00">
                </div>
            </div>

            <div class="flex gap-3 mt-8">
                <button id="btn-save" onclick="saveRecord()" class="flex-1 bg-teal-500 hover:bg-teal-400 text-navy font-black py-4 rounded-2xl text-xl shadow-lg transition-all active:scale-95">
                    💾 บันทึกการตรวจ
                </button>
                <button id="btn-cancel" onclick="resetForm()" class="hidden bg-slate-700 hover:bg-slate-600 text-white px-6 rounded-2xl font-bold transition-all">
                    ยกเลิก
                </button>
            </div>
        </section>

        <section>
            <h3 class="text-xl font-black text-white mb-6 flex items-center gap-2">
                ⏳ ประวัติการรักษาย้อนหลัง
                <span id="history-count" class="bg-white/10 text-xs px-2 py-1 rounded-md">0 รายการ</span>
            </h3>
            <div id="history-list" class="space-y-4">
                <div class="text-center py-20 opacity-20">กำลังโหลดประวัติ...</div>
            </div>
        </section>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const petId = urlParams.get('id');
        const petName = urlParams.get('name');
        const hn = urlParams.get('hn');

        let editingRecordId = null;
        let allRecords = [];

        // 1. Initial Load
        window.onload = async () => {
            if (!petId) return goBack();
            document.getElementById('display-pet-name').innerText = decodeURIComponent(petName);
            document.getElementById('display-hn').innerText = `HN: ${hn}`;
            await loadHistory();
        };

        async function loadHistory() {
            const { data, error } = await db.from('medical_records')
                .select('*')
                .eq('animal_id', petId)
                .order('created_at', { ascending: false });

            if (error) return console.error(error);
            allRecords = data;
            renderHistory(data);
        }

        function renderHistory(records) {
            const list = document.getElementById('history-list');
            document.getElementById('history-count').innerText = `${records.length} รายการ`;
            
            if (records.length === 0) {
                list.innerHTML = `<div class="bg-white/5 border-2 border-dashed border-white/5 p-10 rounded-[30px] text-center text-slate-500 font-bold">ไม่พบประวัติการรักษาเดิม</div>`;
                return;
            }

            list.innerHTML = records.map(rec => `
                <div class="history-card p-6 shadow-lg">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <span class="text-teal-400 font-black text-lg">${new Date(rec.created_at).toLocaleDateString('th-TH', { day:'numeric', month:'short', year:'numeric' })}</span>
                            <span class="ml-3 text-xs bg-white/5 px-3 py-1 rounded-full text-slate-400">ID: ${rec.id.split('-')[0]}</span>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="editRecord('${rec.id}')" class="btn-edit">✏️ แก้ไข</button>
                            <button onclick="deleteRecord('${rec.id}')" class="bg-red-500/10 text-red-400 hover:bg-red-500 hover:text-white p-2 px-3 rounded-lg transition-all text-sm">🗑️</button>
                        </div>
                    </div>
                    <div class="space-y-3">
                        ${rec.symptoms ? `<p class="text-sm"><b class="text-slate-400">อาการ:</b> <span class="text-white">${rec.symptoms}</span></p>` : ''}
                        ${rec.diagnosis ? `<p class="text-sm"><b class="text-yellow-500">วินิจฉัย:</b> <span class="text-yellow-100">${rec.diagnosis}</span></p>` : ''}
                        ${rec.treatment ? `<div class="bg-black/20 p-4 rounded-xl border border-white/5"><b class="text-teal-400 block mb-1 text-xs uppercase tracking-wider">การรักษา & ยา</b><span class="text-teal-50 text-base whitespace-pre-line">${rec.treatment}</span></div>` : ''}
                    </div>
                    <div class="mt-4 pt-4 border-t border-white/5 flex justify-between items-center text-xs text-slate-500">
                        <span>👨‍⚕️ สัตวแพทย์: ${rec.vet_name || '-'}</span>
                        <span class="font-bold text-yellow-400 text-sm">${rec.cost ? rec.cost.toLocaleString() + ' ฿' : ''}</span>
                    </div>
                </div>
            `).join('');
        }

        // 2. Edit Action
        function editRecord(id) {
            const rec = allRecords.find(r => r.id === id);
            if (!rec) return;

            editingRecordId = id;
            
            // Fill Form
            document.getElementById('f_symptoms').value = rec.symptoms || '';
            document.getElementById('f_diagnosis').value = rec.diagnosis || '';
            document.getElementById('f_treatment').value = rec.treatment || '';
            document.getElementById('f_note').value = rec.note || '';
            document.getElementById('f_vet').value = rec.vet_name || '';
            document.getElementById('f_cost').value = rec.cost || '';

            // Update UI to "Edit Mode"
            document.getElementById('edit-badge').classList.remove('hidden');
            document.getElementById('btn-cancel').classList.remove('hidden');
            const saveBtn = document.getElementById('btn-save');
            saveBtn.innerText = "💾 อัปเดตข้อมูลการตรวจ";
            saveBtn.classList.replace('bg-teal-500', 'bg-blue-600');
            saveBtn.classList.replace('hover:bg-teal-400', 'hover:bg-blue-500');

            // Scroll up to form
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 3. Save / Update
        async function saveRecord() {
            const symptoms = document.getElementById('f_symptoms').value.trim();
            const treatment = document.getElementById('f_treatment').value.trim();

            if (!treatment) return alert("❌ กรุณาระบุการรักษาหรือยาที่จ่าย");

            const recordData = {
                animal_id: petId,
                owner_hn: hn,
                symptoms: symptoms,
                diagnosis: document.getElementById('f_diagnosis').value.trim(),
                treatment: treatment,
                note: document.getElementById('f_note').value.trim(),
                vet_name: document.getElementById('f_vet').value.trim(),
                cost: parseFloat(document.getElementById('f_cost').value) || 0,
                updated_at: new Date()
            };

            if (editingRecordId) recordData.id = editingRecordId;

            try {
                const { error } = await db.from('medical_records').upsert(recordData);
                if (error) throw error;

                alert(editingRecordId ? "✅ อัปเดตข้อมูลสำเร็จ" : "✅ บันทึกข้อมูลสำเร็จ");
                resetForm();
                await loadHistory();
            } catch (err) {
                alert("เกิดข้อผิดพลาด: " + err.message);
            }
        }

        // 4. Delete
        async function deleteRecord(id) {
            if (!confirm("⚠️ ต้องการลบบันทึกการตรวจนี้ใช่หรือไม่?\n(ไม่สามารถเรียกคืนได้)")) return;
            try {
                await db.from('medical_records').delete().eq('id', id);
                await loadHistory();
            } catch (err) { alert(err.message); }
        }

        function resetForm() {
            editingRecordId = null;
            document.getElementById('edit-badge').classList.add('hidden');
            document.getElementById('btn-cancel').classList.add('hidden');
            
            const saveBtn = document.getElementById('btn-save');
            saveBtn.innerText = "💾 บันทึกการตรวจ";
            saveBtn.classList.replace('bg-blue-600', 'bg-teal-500');
            saveBtn.classList.replace('hover:bg-blue-500', 'hover:bg-teal-400');

            document.querySelectorAll('.input-box').forEach(el => el.value = '');
        }

        function goBack() { window.location.href = `animals.html`; }
    </script>
</body>
</html>
