<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ศูนย์เอกสารทางการแพทย์ | PK-VMS Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=Prompt:wght@300;400;600&family=Sarabun:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <style>
        :root { --navy: #020617; --navy-light: #0f172a; --teal: #14b8a6; --border: rgba(255, 255, 255, 0.1); }
        * { font-family: "Sarabun", sans-serif; }
        body { background: var(--navy); color: #e2e8f0; margin: 0; overflow: hidden; }

        .sidebar-container { width: 380px; background: #0f172a; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .owner-card { padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.2s; }
        .owner-card:hover { background: rgba(255,255,255,0.03); }
        .owner-card.active { background: rgba(20, 184, 166, 0.1); border-left: 4px solid var(--teal); }

        .doc-tab { padding: 12px 20px; font-weight: 800; font-size: 0.85rem; cursor: pointer; border-radius: 12px; transition: 0.2s; color: #94a3b8; border: 1px solid transparent; white-space: nowrap; }
        .doc-tab:hover { background: rgba(255,255,255,0.05); }
        .doc-tab.active { background: var(--teal); color: white; box-shadow: 0 4px 15px rgba(20, 184, 166, 0.3); }

        .section-card { background: rgba(30, 41, 59, 0.4); border-radius: 24px; padding: 24px; border: 1px solid var(--border); }
        .input-box { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; color: white; width: 100%; outline: none; transition: 0.2s; }
        .input-box:focus { border-color: var(--teal); background: rgba(0,0,0,0.5); }

        .pet-mini-card { background: rgba(15, 23, 42, 0.6); border: 2px solid transparent; border-radius: 16px; padding: 12px; cursor: pointer; transition: 0.2s; text-align: center; }
        .pet-mini-card:hover { border-color: rgba(20, 184, 166, 0.4); }
        .pet-mini-card.selected { border-color: var(--teal); background: rgba(20, 184, 166, 0.1); }

        .check-pill { 
            display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 20px; font-size: 12px; cursor: pointer; transition: 0.2s; color: #94a3b8;
        }
        .check-pill:hover { background: rgba(255,255,255,0.1); color: white; }
        .check-pill input { display: none; }
        .check-pill.active { background: var(--teal); color: white; border-color: var(--teal); box-shadow: 0 4px 10px rgba(20, 184, 166, 0.2); }

        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="sidebar-container shadow-2xl z-10">
        <div class="p-6 border-b border-white/5 bg-navy">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-black text-white italic tracking-tighter">PK-VMS <span class="text-teal-500 underline decoration-2">DOCS</span></h2>
                <a href="master_data.html" class="p-2 hover:bg-white/10 rounded-lg transition text-gray-400"><i data-lucide="arrow-left"></i></a>
            </div>
            <div class="relative">
                <i data-lucide="search" class="absolute left-3 top-3.5 w-4 h-4 text-gray-500"></i>
                <input type="text" id="search-owner" class="input-box pl-10 h-11" placeholder="ค้นหา HN หรือชื่อเจ้าของ..." oninput="searchOwners()">
            </div>
        </div>
        <div id="owner-list" class="flex-1 overflow-y-auto custom-scroll">
            <div class="p-10 text-center opacity-30"><p class="text-sm">กำลังโหลดข้อมูล...</p></div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden relative">
        <nav class="p-4 bg-navy-light/80 backdrop-blur-md border-b border-white/5 flex gap-2 overflow-x-auto custom-scroll z-10">
            <div class="doc-tab active" data-type="doc_consent_a5" onclick="switchDocType('doc_consent_a5')">📋 ใบยินยอมผ่าตัด (A5)</div>
            <div class="doc-tab" data-type="doc_rx_label" onclick="switchDocType('doc_rx_label')">💊 ฉลากยา</div>
            <div class="doc-tab" data-type="doc_receipt_80mm" onclick="switchDocType('doc_receipt_80mm')">💰 ใบเสร็จ (80mm)</div>
            <div class="doc-tab" data-type="doc_appointment" onclick="switchDocType('doc_appointment')">📅 ใบนัดหมาย</div>
        </nav>

        <div id="content-area" class="flex-1 overflow-y-auto p-8 custom-scroll bg-gradient-to-b from-navy to-black">
            <div id="no-selection" class="h-full flex flex-col items-center justify-center opacity-20">
                <i data-lucide="file-text" class="w-32 h-32 mb-4"></i>
                <h2 class="text-3xl font-bold italic">SELECT OWNER TO BEGIN</h2>
            </div>

            <div id="editor-container" class="hidden max-w-4xl mx-auto space-y-8 pb-32">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-6">
                    <div>
                        <span class="text-teal-500 font-black text-xs uppercase tracking-[0.3em]">Document Processor</span>
                        <h1 class="text-4xl font-black text-white mt-1" id="doc-title">เอกสารทางการแพทย์</h1>
                        <p class="text-gray-400 font-medium mt-2 bg-white/5 inline-block px-3 py-1 rounded-full border border-white/5" id="owner-info">-</p>
                    </div>
                    <button onclick="printCurrentDoc()" class="w-full md:w-auto bg-teal-600 hover:bg-teal-500 text-white px-12 py-5 rounded-2xl font-black text-xl flex items-center justify-center gap-3 shadow-2xl shadow-teal-900/20 transition-all hover:scale-105 active:scale-95">
                        <i data-lucide="printer"></i> สั่งพิมพ์เอกสาร
                    </button>
                </div>

                <div class="section-card" id="pet-selector-card">
                    <h3 class="text-[10px] font-black text-gray-500 mb-4 uppercase tracking-[0.2em]">Step 1: เลือกสัตว์เลี้ยง</h3>
                    <div id="pet-list-grid" class="grid grid-cols-2 sm:grid-cols-4 gap-4"></div>
                </div>

                <div id="dynamic-form" class="space-y-6">
                    </div>
            </div>
        </div>
    </main>

    <script>
        let currentOwner = null;
        let ownerPets = [];
        let selectedPetIds = new Set();
        let activeDocType = 'doc_consent_a5';
        const VET_NAME = "ผศ.น.สพ.ดร.ปิติพัฒน์ กิตติ์พิภัทร์กุล";

        window.onload = async () => {
            lucide.createIcons();
            await fetchOwners();
            
            const params = new URLSearchParams(window.location.search);
            const hn = params.get('hn');
            if (hn) await selectOwner(hn);
        };

        async function fetchOwners() {
            const { data } = await db.from('owners').select('*').order('hn', { ascending: false }).limit(20);
            renderOwnerList(data);
        }

        async function searchOwners() {
            const term = document.getElementById('search-owner').value;
            if (!term) return fetchOwners();
            const { data } = await db.from('owners').select('*').or(`owner_name.ilike.%${term}%,hn.ilike.%${term}%`).limit(20);
            renderOwnerList(data);
        }

        function renderOwnerList(owners) {
            const container = document.getElementById('owner-list');
            container.innerHTML = owners.map(o => `
                <div class="owner-card ${currentOwner?.hn === o.hn ? 'active' : ''}" onclick="selectOwner('${o.hn}')" id="owner-${o.hn}">
                    <div class="flex justify-between items-start">
                        <span class="text-[10px] font-black bg-slate-800 text-teal-400 px-2 py-0.5 rounded">HN ${o.hn}</span>
                    </div>
                    <div class="text-white font-bold mt-2 text-lg">${o.owner_name}</div>
                    <div class="text-gray-500 text-xs mt-1 truncate">${o.address || 'ไม่ระบุที่อยู่'}</div>
                </div>`).join('');
        }

        async function selectOwner(hn) {
            const [{ data: owner }, { data: pets }] = await Promise.all([
                db.from('owners').select('*').eq('hn', hn).single(),
                db.from('animals').select('*').eq('owner_hn', hn)
            ]);
            
            currentOwner = owner;
            ownerPets = pets || [];
            selectedPetIds.clear();
            
            document.getElementById('no-selection').classList.add('hidden');
            document.getElementById('editor-container').classList.remove('hidden');
            document.getElementById('owner-info').innerText = `👤 ${owner.owner_name} | 📍 ${owner.address || '-'}`;
            
            renderPetList();
            switchDocType(activeDocType);
            document.querySelectorAll('.owner-card').forEach(c => c.classList.remove('active'));
            document.getElementById(`owner-${hn}`)?.classList.add('active');
        }

        function renderPetList() {
            const container = document.getElementById('pet-list-grid');
            container.innerHTML = ownerPets.map(p => `
                <div class="pet-mini-card" id="p-card-${p.id}" onclick="togglePet('${p.id}')">
                    <div class="text-3xl mb-1">${p.pet_type === 'สุนัข' ? '🐶' : '🐱'}</div>
                    <div class="text-white font-black truncate text-sm">${p.pet_name}</div>
                    <div class="text-[10px] text-gray-500 font-bold">${p.breed || '-'}</div>
                </div>`).join('');
        }

        function togglePet(id) {
            const card = document.getElementById(`p-card-${id}`);
            if (selectedPetIds.has(id)) {
                selectedPetIds.delete(id);
                card.classList.remove('selected');
            } else {
                selectedPetIds.add(id);
                card.classList.add('selected');
            }
            if (activeDocType === 'doc_consent_a5') refreshSurgeryRows();
        }

        function switchDocType(type) {
            activeDocType = type;
            document.querySelectorAll('.doc-tab').forEach(t => t.classList.remove('active'));
            const activeTab = document.querySelector(`[data-type="${type}"]`);
            if(activeTab) activeTab.classList.add('active');
            
            const form = document.getElementById('dynamic-form');
            const title = document.getElementById('doc-title');
            title.innerText = activeTab?.innerText || "เอกสาร";

            if (type === 'doc_consent_a5') {
                form.innerHTML = `
                    <div class="section-card space-y-6">
                        <div class="flex justify-between items-center border-b border-white/5 pb-4">
                            <h3 class="text-[10px] font-black text-gray-500 uppercase tracking-widest">Step 2: รายละเอียดหัตถการ</h3>
                            <div class="text-right">
                                <span class="text-[9px] text-gray-500 uppercase block font-black">สัตวแพทย์ผู้รับผิดชอบ</span>
                                <span class="text-teal-400 font-bold text-sm">${VET_NAME}</span>
                            </div>
                        </div>
                        <div id="surgery-rows" class="space-y-6"></div>
                        <div class="pt-6 border-t border-white/5">
                            <label class="text-[10px] font-black text-gray-500 mb-2 block uppercase">หมายเหตุเพิ่มเติม (รวม)</label>
                            <textarea id="f-note" class="input-box min-h-[80px]" placeholder="ระบุหมายเหตุความเสี่ยง หรือข้อตกลงพิเศษ..."></textarea>
                        </div>
                    </div>`;
                refreshSurgeryRows();
            } else {
                form.innerHTML = `<div class="section-card text-center py-20 opacity-50"><p>ฟีเจอร์สำหรับเอกสารประเภทนี้กำลังอยู่ในการพัฒนา...</p></div>`;
            }
            lucide.createIcons();
        }

        function refreshSurgeryRows() {
            const container = document.getElementById('surgery-rows');
            if (selectedPetIds.size === 0) {
                container.innerHTML = '<div class="py-10 text-center text-gray-500 italic text-sm">กรุณาเลือกสัตว์เลี้ยงจากรายการด้านบน...</div>';
                return;
            }
            let html = '';
            selectedPetIds.forEach(id => {
                const pet = ownerPets.find(p => p.id === id);
                html += `
                    <div class="bg-white/5 p-6 rounded-3xl border border-white/5 hover:border-teal-500/30 transition-all space-y-4">
                        <div class="flex items-center gap-3">
                            <span class="w-10 h-10 rounded-full bg-teal-500/20 flex items-center justify-center text-xl">${pet.pet_type === 'สุนัข' ? '🐶' : '🐱'}</span>
                            <div>
                                <div class="text-white font-black">${pet.pet_name}</div>
                                <div class="text-[10px] text-gray-500 uppercase">${pet.gender} | ${pet.breed}</div>
                            </div>
                        </div>
                        <div class="flex flex-wrap gap-2">
                            ${['วางยาสลบ', 'ขูดหินปูน', 'ทำหมันผู้', 'ทำหมันเมีย', 'ผ่าตัดเนื้องอก', 'X-Ray', 'ตรวจเลือด'].map(opt => `
                                <label class="check-pill" id="label-${pet.id}-${opt}">
                                    <input type="checkbox" onchange="syncSurgeryText('${pet.id}')" value="${opt}" class="p-opt-${pet.id}">
                                    ${opt}
                                </label>
                            `).join('')}
                        </div>
                        <input type="text" id="text-${pet.id}" class="input-box surgery-input font-bold text-teal-400" 
                            data-pet-id="${pet.id}" data-pet-name="${pet.pet_name}" 
                            placeholder="รายการหัตถการเพิ่มเติม...">
                    </div>`;
            });
            container.innerHTML = html;
        }

        function syncSurgeryText(petId) {
            const checks = document.querySelectorAll(`.p-opt-${petId}:checked`);
            const textbox = document.getElementById(`text-${petId}`);
            const selectedValues = Array.from(checks).map(c => c.value);
            document.querySelectorAll(`[id^="label-${petId}"]`).forEach(l => l.classList.remove('active'));
            checks.forEach(c => c.parentElement.classList.add('active'));
            textbox.value = selectedValues.join(', ');
        }

        // ==========================================
        // PK-VMS PRINT ENGINE (Logic เหมือนหน้า Designer)
        // ==========================================
        
        async function printCurrentDoc() {
            if (selectedPetIds.size === 0) return alert("❌ กรุณาเลือกสัตว์เลี้ยงอย่างน้อย 1 ตัว");
            
            // 1. ดึง Template Config จาก Database
            const { data: template, error } = await db.from('print_templates').select('config').eq('template_type', activeDocType).single();
            
            if (error || !template) {
                return alert(`❌ ไม่พบรูปแบบพิมพ์ "${activeDocType}" กรุณาไปตั้งค่าที่หน้า Printer Setup ก่อนครับ`);
            }

            const config = template.config;
            const paper_w = config.width || 148; // mm
            const paper_h = config.height || 210; // mm

            // 2. เตรียมข้อมูลสำหรับตาราง {{pet_surgery_list}}
            const surgeryInputs = document.querySelectorAll('.surgery-input');
            const petSurgeries = Array.from(surgeryInputs).map(i => ({
                name: i.dataset.pet_name,
                surgery: i.value || '-'
            }));

            // 3. Mapping ตัวแปรทั้งหมด
            const dataMap = {
                clinic_name: "PK-VMS Animal Clinic",
                clinic_address: "123 ถ.นเรศวร ต.ในเมือง อ.เมือง จ.พิษณุโลก 65000",
                owner_name: currentOwner.owner_name,
                owner_address: currentOwner.address || "-",
                owner_phone: currentOwner.phone || "-",
                hn: currentOwner.hn,
                vet_name: VET_NAME,
                date: new Date().toLocaleDateString('th-TH', { day: 'numeric', month: 'long', year: 'numeric' }),
                time: new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }),
                note: document.getElementById('f-note')?.value || "-",
            };

            // 4. สร้าง HTML Elements แบบ Dynamic Push
            const sortedLines = [...config.lines].sort((a, b) => parseFloat(a.y) - parseFloat(b.y));
            let pushOffset = 0;
            
            const printContent = sortedLines.map(l => {
                const currentY = parseFloat(l.y) + pushOffset;
                const fontSizePt = l.size || 12;
                const textColor = l.color || 'black';
                
                let style = `position:absolute; top:${currentY}mm; font-family:'${l.font || 'Sarabun'}'; font-size:${fontSizePt}pt; color:${textColor}; line-height:1.4; white-space:pre-wrap;`;
                if (l.bold) style += 'font-weight:bold;';
                if (l.italic) style += 'font-style:italic;';

                // คำนวณความกว้างและการจัดแนว
                const boxWidthMm = l.w || (paper_w - parseFloat(l.x));
                style += `width:${boxWidthMm}mm;`;
                
                if (l.align === 'center') style += `left:0; width:100%; text-align:center;`;
                else if (l.align === 'right') style += `left:0; width:100%; text-align:right; padding-right:${l.x}mm;`;
                else style += `left:${l.x}mm;`;

                // กรณีเป็นตารางรายการ (Dynamic Push)
                if (l.text && l.text.includes("{{pet_surgery_list}}")) {
                    const rowHeightMm = 8; // ระยะเผื่อต่อแถว
                    pushOffset += (petSurgeries.length) * rowHeightMm;
                    
                    return `
                    <div style="${style}">
                        <table style="width:100%; border-collapse:collapse; margin-top:2mm; font-size:${fontSizePt * 0.9}pt; color:${textColor};">
                            <tr style="border-bottom:1px solid ${textColor}; font-weight:bold;">
                                <th style="text-align:left; padding:1mm;">ชื่อสัตว์</th>
                                <th style="text-align:left; padding:1mm;">หัตถการ/ผ่าตัด</th>
                            </tr>
                            ${petSurgeries.map(ps => `
                                <tr style="border-bottom:0.5px dotted #ccc;">
                                    <td style="padding:2mm 1mm; width:30%; vertical-align:top;">${ps.name}</td>
                                    <td style="padding:2mm 1mm; vertical-align:top;">${ps.surgery}</td>
                                </tr>
                            `).join('')}
                        </table>
                    </div>`;
                }

                // กรณีข้อความปกติ
                if (l.type === 'text') {
                    const textContent = l.text.replace(/\{\{(.*?)\}\}/g, (match, key) => dataMap[key.trim()] || match);
                    return `<div style="${style}">${textContent}</div>`;
                }
                
                // กรณีสี่เหลี่ยม
                if (l.type === 'rect') {
                    return `<div style="position:absolute; top:${currentY}mm; left:${l.x}mm; width:${l.w}mm; height:${l.h}mm; border:1px solid black; border-radius:${l.radius || 0}mm;"></div>`;
                }

                // กรณีรูปภาพ
                if (l.type === 'image') {
                    let iStyle = `position:absolute; top:${currentY}mm; width:${l.w}mm; height:${l.h}mm; object-fit:contain;`;
                    if (l.align === 'center') iStyle += `left:50%; transform:translateX(-50%);`;
                    else iStyle += `left:${l.x}mm;`;
                    return `<img src="${l.url}" style="${iStyle}">`;
                }
                return '';
            }).join('');

            // 5. เปิดหน้าต่างพิมพ์
            const win = window.open('', '_blank', 'width=900,height=700');
            win.document.write(`
                <html>
                <head>
                    <title>PK-VMS Print Studio</title>
                    <style>
                        @import url('https://fonts.googleapis.com/css2?family=Kanit&family=Prompt&family=Sarabun:wght@400;700&display=swap');
                        body { margin: 0; padding: 0; background: #eee; }
                        .page { 
                            position: relative; 
                            width: ${paper_w}mm; 
                            min-height: ${paper_h}mm; 
                            background: white; 
                            margin: 10px auto;
                            box-shadow: 0 0 10px rgba(0,0,0,0.1);
                        }
                        @media print {
                            @page { size: ${paper_w}mm auto; margin: 0; }
                            body { background: white; margin: 0; }
                            .page { margin: 0; box-shadow: none; width: ${paper_w}mm; }
                        }
                        table, th, td { border-color: inherit; }
                    </style>
                </head>
                <body>
                    <div class="page">${printContent}</div>
                    <script>
                        window.onload = () => {
                            setTimeout(() => {
                                window.print();
                                window.close();
                            }, 800);
                        };
                    <\/script>
                </body>
                </html>
            `);
            win.document.close();
        }
    </script>
</body>
</html>
