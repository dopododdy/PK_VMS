<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ศูนย์เอกสารทางการแพทย์ | PK-VMS Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Kanit:wght@300;400;500;600;700&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="ui-settings.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>

    <style>
        :root { --navy: #020617; --navy-light: #0f172a; --teal: #14b8b1; --border: rgba(255, 255, 255, 0.1); }
        * { font-family: "Sarabun", sans-serif; box-sizing: border-box; }
        body { background: var(--navy); color: #e2e8f0; margin: 0; overflow: hidden; }

        .sidebar-container { width: 380px; background: #0f172a; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .owner-card { padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.2s; }
        .owner-card:hover { background: rgba(255,255,255,0.03); }
        .owner-card.active { background: rgba(20, 184, 166, 0.1); border-left: 4px solid var(--teal); }

        .doc-tab { padding: 12px 20px; font-weight: 800; font-size: 0.85rem; cursor: pointer; border-radius: 12px; transition: 0.2s; color: #94a3b8; border: 1px solid transparent; white-space: nowrap; }
        .doc-tab:hover { background: rgba(255,255,255,0.05); }
        .doc-tab.active { background: var(--teal); color: white; box-shadow: 0 4px 15px rgba(20, 184, 166, 0.3); }

        .section-card { background: rgba(30, 41, 59, 0.4); border-radius: 24px; padding: 24px; border: 1px solid var(--border); }
        .input-box { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; color: white; width: 100%; outline: none; }
        
        .pet-mini-card { background: rgba(15, 23, 42, 0.6); border: 2px solid transparent; border-radius: 16px; padding: 12px; cursor: pointer; transition: 0.2s; text-align: center; }
        .pet-mini-card.selected { border-color: var(--teal); background: rgba(20, 184, 166, 0.1); }

        .check-pill { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; font-size: 12px; cursor: pointer; transition: 0.2s; }
        .check-pill input { display: none; }
        .check-pill.active { background: var(--teal); color: white; border-color: var(--teal); }

        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="sidebar-container">
        <div class="p-6 border-b border-white/5 bg-navy">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-black text-white italic text-teal-500">PK-VMS DOCS</h2>
                <a href="index.html" class="p-2 hover:bg-white/10 rounded-lg transition text-gray-400"><i data-lucide="home"></i></a>
            </div>
            <div class="relative">
                <i data-lucide="search" class="absolute left-3 top-3.5 w-4 h-4 text-gray-500"></i>
                <input type="text" id="search-owner" class="input-box pl-10 h-11" placeholder="ค้นหา HN หรือชื่อ..." oninput="searchOwners()">
            </div>
        </div>
        <div id="owner-list" class="flex-1 overflow-y-auto custom-scroll"></div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <nav class="p-4 bg-navy-light/50 border-b border-white/5 flex gap-2 overflow-x-auto custom-scroll">
            <div class="doc-tab active" data-type="doc_consent" onclick="switchDocType('doc_consent')">📋 ใบยินยอมหัตถการ</div>
            <div class="doc-tab" data-type="doc_lab" onclick="switchDocType('doc_lab')">🔬 รายงานผล Lab</div>
            <div class="doc-tab" data-type="doc_referral" onclick="switchDocType('doc_referral')">📨 ใบส่งตัว</div>
        </nav>

        <div id="content-area" class="flex-1 overflow-y-auto p-8 custom-scroll bg-[#020617]">
            <div id="no-selection" class="h-full flex flex-col items-center justify-center opacity-20">
                <i data-lucide="file-text" class="w-32 h-32 mb-4"></i>
                <h2 class="text-3xl font-bold uppercase tracking-widest">กรุณาเลือกเจ้าของสัตว์</h2>
            </div>

            <div id="editor-container" class="hidden max-w-4xl mx-auto space-y-8 pb-32">
                <div class="flex justify-between items-end">
                    <div>
                        <h1 class="text-4xl font-black text-white" id="doc-title">ใบยินยอมผ่าตัด/วางยาสลบ</h1>
                        <p class="text-teal-500 font-bold mt-2 bg-teal-500/10 px-4 py-1 rounded-full inline-block" id="owner-info">-</p>
                    </div>
                    <button onclick="printCurrentDoc()" class="bg-teal-600 hover:bg-teal-500 px-10 py-5 rounded-2xl font-black text-xl flex items-center gap-3 shadow-xl transition-all">
                        <i data-lucide="printer"></i> พิมพ์เอกสาร
                    </button>
                </div>

                <div class="section-card">
                    <h3 class="text-[10px] font-black text-gray-500 mb-4 uppercase tracking-[0.2em]">Step 1: เลือกสัตว์เลี้ยง</h3>
                    <div id="pet-list-grid" class="grid grid-cols-2 sm:grid-cols-4 gap-4"></div>
                </div>

                <div id="dynamic-form" class="space-y-6"></div>
            </div>
        </div>
    </main>

    <script>
        let currentOwner = null;
        let ownerPets = [];
        let selectedPetIds = new Set();
        let activeDocType = 'doc_consent'; 
        const VET_NAME = "ผศ.น.สพ.ดร.ปิติพัฒน์ กิตติ์พิภัทร์กุล";

        const COMMON_PROCEDURES = [
            'วางยาสลบ', 'ทำหมันเมีย', 'ตอน (เพศผู้)', 
            'ฉีดวัคซีนรวม - แมว', 'ฉีดวัคซีนรวม - สุนัข', 
            'ฉีดยา Convenia', 'ขูดหินปูน', 'ผ่าตัดเนื้องอก', 'ผ่าตัดหน้าท้อง'
        ];

        window.onload = async () => { 
            lucide.createIcons(); 
            const urlParams = new URLSearchParams(window.location.search);
            const hn = urlParams.get('hn');
            const type = urlParams.get('type');
            const petId = urlParams.get('id');

            if (hn) {
                document.getElementById('search-owner').value = hn;
                await searchOwners(); 
                if (type) activeDocType = type;
                await selectOwner(hn, petId);
            } else {
                await fetchOwners(); 
            }
        };

        async function fetchOwners() {
            const { data } = await db.from('owners').select('*').order('hn', { ascending: false }).limit(20);
            renderOwnerList(data);
        }

        async function searchOwners() {
            const term = document.getElementById('search-owner').value;
            const { data } = await db.from('owners').select('*').or(`owner_name.ilike.%${term}%,hn.ilike.%${term}%`).limit(20);
            renderOwnerList(data);
            return data;
        }

        function renderOwnerList(owners) {
            const container = document.getElementById('owner-list');
            container.innerHTML = owners.map(o => `
                <div class="owner-card ${currentOwner?.hn === o.hn ? 'active' : ''}" onclick="selectOwner('${o.hn}')" id="owner-${o.hn}">
                    <span class="text-[10px] font-bold bg-slate-800 text-teal-400 px-2 py-1 rounded">HN: ${o.hn}</span>
                    <div class="text-white font-bold mt-2">${o.owner_name}</div>
                </div>`).join('');
        }

        async function selectOwner(hn, targetPetId = null) {
            const [{ data: owner }, { data: pets }, { data: phones }] = await Promise.all([
                db.from('owners').select('*').eq('hn', hn).single(),
                db.from('animals').select('*').eq('owner_hn', hn),
                db.from('owner_phones').select('phone_number').eq('owner_hn', hn)
            ]);
            if (!owner) return;
            currentOwner = owner;
            currentOwner.phone = phones?.[0]?.phone_number || "-";
            ownerPets = pets || [];
            selectedPetIds.clear();
            if (targetPetId) selectedPetIds.add(targetPetId.toString());

            document.querySelectorAll('.owner-card').forEach(el => el.classList.remove('active'));
            document.getElementById(`owner-${hn}`)?.classList.add('active');
            document.getElementById('no-selection').classList.add('hidden');
            document.getElementById('editor-container').classList.remove('hidden');
            document.getElementById('owner-info').innerText = `เจ้าของ: ${owner.owner_name} | HN: ${owner.hn}`;
            renderPetList();
            switchDocType(activeDocType);
        }

        function renderPetList() {
            const container = document.getElementById('pet-list-grid');
            container.innerHTML = ownerPets.map(p => `
                <div class="pet-mini-card ${selectedPetIds.has(p.id.toString()) ? 'selected' : ''}" 
                     id="p-card-${p.id}" onclick="togglePet('${p.id}')">
                    <div class="text-2xl mb-1">${p.pet_type === 'สุนัข' ? '🐶' : '🐱'}</div>
                    <div class="text-white font-black truncate text-sm">${p.pet_name}</div>
                </div>`).join('');
        }

        function togglePet(id) {
            const card = document.getElementById(`p-card-${id}`);
            if (selectedPetIds.has(id.toString())) { selectedPetIds.delete(id.toString()); card.classList.remove('selected'); }
            else { selectedPetIds.add(id.toString()); card.classList.add('selected'); }
            if (activeDocType === 'doc_consent') refreshSurgeryRows();
            if (activeDocType === 'doc_lab') refreshLabPicker();
        }

        function switchDocType(type) {
            activeDocType = type;
            document.querySelectorAll('.doc-tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`[data-type="${type}"]`)?.classList.add('active');
            const form = document.getElementById('dynamic-form');
            const title = document.getElementById('doc-title');
            if (type === 'doc_consent') {
                title.innerText = "ใบยินยอมผ่าตัด/วางยาสลบ";
                form.innerHTML = `<div class="section-card space-y-6"><div id="surgery-rows" class="space-y-6"></div><div class="pt-4 border-t border-white/5"><label class="text-[10px] font-black text-gray-500 uppercase">หมายเหตุความเสี่ยงเพิ่มเติม</label><input type="text" id="f-note" class="input-box font-bold text-teal-400 mt-2" placeholder="เช่น สัตว์มีภาวะโรคหัวใจ, อายุมาก..."></div></div>`;
                refreshSurgeryRows();
            } else if (type === 'doc_lab') {
                title.innerText = "รายงานผลทางห้องปฏิบัติการ";
                form.innerHTML = `<div class="section-card space-y-6"><div id="lab-session-list" class="space-y-4"></div></div>`;
                refreshLabPicker();
            } else if (type === 'doc_referral') {
                title.innerText = "ใบส่งตัวสัตว์ป่วย";
                form.innerHTML = `
                    <div class="section-card space-y-5">
                        <h3 class="text-[10px] font-black text-gray-500 uppercase tracking-[0.2em]">ข้อมูลการส่งตัว</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="text-[10px] font-black text-gray-500 uppercase block mb-2">ส่งตัวไปยัง (โรงพยาบาล/คลินิก)</label>
                                <input type="text" id="ref-to" class="input-box" placeholder="เช่น โรงพยาบาลสัตว์ มหาวิทยาลัยเกษตรศาสตร์">
                            </div>
                            <div>
                                <label class="text-[10px] font-black text-gray-500 uppercase block mb-2">แพทย์ผู้รับ (ถ้าทราบ)</label>
                                <input type="text" id="ref-doc" class="input-box" placeholder="เช่น น.สพ. สมชาย ใจดี">
                            </div>
                        </div>
                        <div>
                            <label class="text-[10px] font-black text-gray-500 uppercase block mb-2">เหตุผลในการส่งตัว</label>
                            <input type="text" id="ref-reason" class="input-box font-bold text-teal-400" placeholder="เช่น เพื่อทำ MRI, ผ่าตัดเฉพาะทาง, ตรวจ Echocardiography">
                        </div>
                        <div>
                            <label class="text-[10px] font-black text-gray-500 uppercase block mb-2">การวินิจฉัยเบื้องต้น / ประวัติย่อ</label>
                            <textarea id="ref-diagnosis" class="input-box" rows="3" placeholder="เช่น สุนัขพันธุ์ชิวาวา อายุ 5 ปี มีอาการ..."></textarea>
                        </div>
                        <div>
                            <label class="text-[10px] font-black text-gray-500 uppercase block mb-2">การรักษาที่ได้รับไปแล้ว / ยาที่ได้รับ</label>
                            <textarea id="ref-treatment" class="input-box" rows="2" placeholder="เช่น ได้รับ Amoxicillin 250mg วันละ 2 ครั้ง เป็นเวลา 5 วัน..."></textarea>
                        </div>
                        <div>
                            <label class="text-[10px] font-black text-gray-500 uppercase block mb-2">ความเร่งด่วน</label>
                            <div class="flex gap-3 flex-wrap">
                                <label class="check-pill" id="urgency-normal"><input type="radio" name="ref-urgency" value="ปกติ" checked onchange="syncUrgency()"> ปกติ</label>
                                <label class="check-pill" id="urgency-urgent"><input type="radio" name="ref-urgency" value="เร่งด่วน" onchange="syncUrgency()"> ⚡ เร่งด่วน</label>
                                <label class="check-pill" id="urgency-emergency"><input type="radio" name="ref-urgency" value="ฉุกเฉิน" onchange="syncUrgency()"> 🔴 ฉุกเฉิน</label>
                            </div>
                        </div>
                        <div>
                            <label class="text-[10px] font-black text-gray-500 uppercase block mb-2">เอกสาร/ผลตรวจที่แนบ</label>
                            <input type="text" id="ref-attachments" class="input-box" placeholder="เช่น ผลเลือด CBC, ฟิล์ม X-ray, ผล USG">
                        </div>
                        <div>
                            <label class="text-[10px] font-black text-gray-500 uppercase block mb-2">หมายเหตุเพิ่มเติม</label>
                            <textarea id="ref-note" class="input-box" rows="2" placeholder="ข้อมูลอื่นๆ ที่แพทย์ผู้รับควรทราบ..."></textarea>
                        </div>
                    </div>`;
                // Apply active styles to default urgency selection
                setTimeout(() => {
                    document.getElementById('urgency-normal')?.classList.add('active');
                    lucide.createIcons();
                }, 50);
            }
            lucide.createIcons();
        }

        function syncUrgency() {
            document.querySelectorAll('[id^="urgency-"]').forEach(l => l.classList.remove('active'));
            const checked = document.querySelector('input[name="ref-urgency"]:checked');
            if (checked) checked.parentElement.classList.add('active');
        }

        function refreshSurgeryRows() {
            const container = document.getElementById('surgery-rows');
            if (selectedPetIds.size === 0) { 
                container.innerHTML = '<p class="text-gray-500 italic">เลือกสัตว์เลี้ยงด้านบนเพื่อระบุรายการหัตถการ...</p>'; 
                return; 
            }
            
            let html = '';
            selectedPetIds.forEach(id => {
                const pet = ownerPets.find(p => p.id.toString() === id.toString());
                if (!pet) return;

                const filteredOptions = COMMON_PROCEDURES.filter(opt => {
                    if (pet.gender.includes('เมีย') && opt.includes('ตอน (เพศผู้)')) return false;
                    if ((pet.gender === 'ผู้' || pet.gender === 'ผู้ตอน') && opt.includes('ทำหมันเมีย')) return false;
                    if (pet.pet_type === 'แมว' && opt.includes('สุนัข')) return false;
                    if (pet.pet_type === 'สุนัข' && opt.includes('แมว')) return false;
                    return true;
                });

                html += `
                    <div class="bg-white/5 p-5 rounded-3xl border border-white/5 space-y-4">
                        <div class="text-white font-black">🐾 ${pet.pet_name} (${pet.pet_type} / ${pet.gender})</div>
                        <div class="flex flex-wrap gap-2">
                            ${filteredOptions.map(opt => `
                                <label class="check-pill" id="label-${pet.id}-${opt}">
                                    <input type="checkbox" onchange="syncSurgeryText('${pet.id}')" value="${opt}" class="p-opt-${pet.id}"> ${opt}
                                </label>`).join('')}
                        </div>
                        <div class="relative">
                            <i data-lucide="edit-3" class="absolute left-3 top-3 w-4 h-4 text-gray-500"></i>
                            <input type="text" id="text-${pet.id}" class="input-box pl-10 surgery-input text-teal-400 font-bold" 
                                data-pet-id="${pet.id}" data-pet-name="${pet.pet_name}" placeholder="ระบุรายละเอียดเพิ่มเติม...">
                        </div>
                    </div>`;
            });
            container.innerHTML = html;
            lucide.createIcons();
        }

        function syncSurgeryText(petId) {
            const checks = document.querySelectorAll(`.p-opt-${petId}:checked`);
            const textbox = document.getElementById(`text-${petId}`);
            const selectedValues = Array.from(checks).map(c => c.value);
            document.querySelectorAll(`[id^="label-${petId}"]`).forEach(l => l.classList.remove('active'));
            checks.forEach(c => c.parentElement.classList.add('active'));
            textbox.value = selectedValues.join(', ');
        }

        async function refreshLabPicker() {
            const container = document.getElementById('lab-session-list');
            if (selectedPetIds.size === 0) { container.innerHTML = '<p class="text-gray-500 italic">กรุณาเลือกสัตว์เพื่อดึงประวัติผลตรวจ...</p>'; return; }
            container.innerHTML = '<p class="text-gray-500 animate-pulse">กำลังโหลดข้อมูลล่าสุด...</p>';
            const ids = Array.from(selectedPetIds);
            const [{data: bloods}, {data: images}] = await Promise.all([
                db.from('lab_results').select('*').in('animal_id', ids).order('created_at', {ascending: false}).limit(15),
                db.from('imaging_results').select('*').in('id', ids).order('created_at', {ascending: false}).limit(15)
            ]);
            let html = '<h4 class="text-xs font-bold text-teal-500 uppercase mb-2">เลือกข้อมูลที่ต้องการรวมในรายงาน</h4>';
            const sessions = {};
            bloods.forEach(b => { if(!sessions[b.created_at]) sessions[b.created_at] = []; sessions[b.created_at].push(b); });
            Object.keys(sessions).forEach(ts => {
                const date = new Date(ts).toLocaleString('th-TH');
                html += `<label class="flex items-center gap-3 p-4 bg-white/5 rounded-2xl border border-white/5 cursor-pointer hover:bg-teal-500/5 transition"><input type="checkbox" class="lab-pick-input w-5 h-5 accent-teal-500" value="${ts}" data-type="blood"><div><div class="text-white font-bold">🩸 ผลเลือด (Blood Results)</div><div class="text-xs text-gray-500">${date}</div></div></label>`;
            });
            images.forEach(img => {
                const date = new Date(img.created_at).toLocaleString('th-TH');
                html += `<label class="flex items-center gap-3 p-4 bg-white/5 rounded-2xl border border-white/5 cursor-pointer hover:bg-teal-500/5 transition"><input type="checkbox" class="img-pick-input w-5 h-5 accent-teal-500" value="${img.id}" data-type="imaging"><div><div class="text-white font-bold">${img.exam_type === 'Echocardiography' ? '💓 Echocardiography' : '📸 Imaging: ' + img.region}</div><div class="text-xs text-gray-500">${date}</div></div></label>`;
            });
            if(!bloods.length && !images.length) html = '<p class="text-gray-600 italic py-10 text-center">ไม่พบประวัติผลตรวจของสัตว์ที่เลือก</p>';
            container.innerHTML = html;
        }

        async function printCurrentDoc() {
            if (activeDocType !== 'doc_referral' && selectedPetIds.size === 0) return alert("❌ กรุณาเลือกสัตว์");

            // ใบส่งตัว: สร้าง layout เอง ไม่ต้องใช้ template
            if (activeDocType === 'doc_referral') {
                const refTo       = document.getElementById('ref-to')?.value || '-';
                const refDoc      = document.getElementById('ref-doc')?.value || '-';
                const refReason   = document.getElementById('ref-reason')?.value || '-';
                const refDiagnosis= document.getElementById('ref-diagnosis')?.value || '-';
                const refTreatment= document.getElementById('ref-treatment')?.value || '-';
                const refUrgency  = document.querySelector('input[name="ref-urgency"]:checked')?.value || 'ปกติ';
                const refAttach   = document.getElementById('ref-attachments')?.value || '-';
                const refNote     = document.getElementById('ref-note')?.value || '-';
                const petNames    = ownerPets.filter(p => selectedPetIds.has(p.id.toString())).map(p => `${p.pet_name} (${p.pet_type}/${p.gender})`).join(', ') || '-';
                const urgColor    = refUrgency === 'ฉุกเฉิน' ? '#dc2626' : refUrgency === 'เร่งด่วน' ? '#ea580c' : '#16a34a';
                const dateStr     = new Date().toLocaleDateString('th-TH', { day: 'numeric', month: 'long', year: 'numeric' });
                const win = window.open('', '_blank');
                win.document.write(`<html><head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap');
  * { font-family: 'Sarabun', sans-serif; box-sizing: border-box; }
  body { margin: 0; padding: 20mm 20mm; background: white; color: #111; font-size: 11pt; }
  h1 { font-size: 18pt; font-weight: 800; margin: 0 0 4px; }
  h2 { font-size: 14pt; font-weight: 700; margin: 0 0 12px; }
  .header { border-bottom: 3px solid #0891b2; padding-bottom: 10px; margin-bottom: 16px; }
  .clinic { font-size: 9pt; color: #555; }
  .urgency-badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-weight: 800; font-size: 10pt; color: white; background: ${urgColor}; }
  table { width: 100%; border-collapse: collapse; margin-top: 12px; }
  td { padding: 7px 10px; border: 1px solid #ccc; vertical-align: top; }

</head><body>
  <div class="header">
    <div style="display:flex; justify-content:space-between; align-items:flex-start;">
      <div>
        <h1>ใบส่งตัวสัตว์ป่วย</h1>

  </div>

    <tr><td class="label">เบอร์โทรศัพท์</td><td>${currentOwner?.phone || '-'}</td></tr>

  </table>

      <div style="font-size:9pt;">(${VET_NAME})</div>
    </div>
    <div class="signature-block">
      <div style="height:30px;"></div>
      <div class="sig-line">ลายมือชื่อเจ้าของสัตว์</div>
      <div style="font-size:9pt;">(${currentOwner?.owner_name || ''})</div>

<script>window.onload=()=>{ setTimeout(()=>{ window.print(); window.close(); }, 800); };<\/script>
</body></html>`);
                win.document.close();
                return;
            }

            const { data: template } = await db.from('print_templates').select('config').eq('template_type', activeDocType).single();
            if (!template) return alert(`❌ ไม่พบรูปแบบพิมพ์ "${activeDocType}"`);
            
            const config = template.config;
            const pw = parseFloat(config.width) || 210;
            const ph = parseFloat(config.height) || 297;
            const dataMap = { clinic_name: "PK-VMS Animal Clinic", clinic_address: "123 ถ.นเรศวร ต.ในเมือง อ.เมือง จ.พิษณุโลก 65000", owner_name: currentOwner?.owner_name || "-", owner_address: currentOwner?.address || "-", owner_phone: currentOwner?.phone || "-", hn: currentOwner?.hn || "-", vet_name: VET_NAME, date: new Date().toLocaleDateString('th-TH', { day: 'numeric', month: 'long', year: 'numeric' }), time: new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }), note: document.getElementById('f-note')?.value || "-", };

            const printContent = config.lines.map(l => {
                const currentY = parseFloat(l.y); 
                const fontSizePt = l.size || 12;
                const textColor = l.color || '#000000';
                
                let style = `position:absolute; top:${currentY}mm; font-family:'${l.font || 'Sarabun'}'; font-size:${fontSizePt}pt; color:${textColor}; line-height:1; white-space:pre-wrap;`;
                if (l.bold) style += 'font-weight:bold;';
                
                if (l.align === 'center') style += `left:0; width:${pw}mm; text-align:center;`;
                else if (l.align === 'right') style += `left:0; width:${pw}mm; text-align:right; padding-right:${l.x}mm;`;
                else style += `left:${l.x}mm; width:${l.w || (pw - l.x)}mm; text-align:left;`;

                // ✅ จัดการตารางหัตถการ (บีบชื่อสัตว์เหลือ 10% / ขยายหัตถการ / ใส่หัวข้อเดิม)
                if (l.text && l.text.includes("{{pet_surgery_list}}")) {
                    const surgeryInputs = document.querySelectorAll('.surgery-input');
                    const petSurgeries = Array.from(surgeryInputs).map(i => ({ name: i.dataset.petName, surgery: i.value || '-' }));
                    const cb = `<div style="width:3.2mm; height:3.2mm; border:0.8px solid ${textColor}; display:inline-block; vertical-align:middle;"></div>`;
                    
                    return `<div style="${style}">
                        <table style="width:100%; border-collapse:collapse; font-size:inherit; color:inherit; table-layout:fixed;">
                            <thead>
                                <tr style="border-bottom:1.2px solid ${textColor}; font-weight:bold;">
                                    <th style="text-align:left; padding-bottom:1mm; width:10%;">สัตว์</th>
                                    <th style="text-align:left; padding-bottom:1mm; width:54%;">หัตถการ</th>
                                    <th style="text-align:center; padding-bottom:1mm; width:18%;">ไม่ตรวจเลือด</th>
                                    <th style="text-align:center; padding-bottom:1mm; width:18%;">ตรวจเลือด</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${petSurgeries.map(ps => `<tr>
                                    <td style="padding:0.2mm 0; overflow:hidden; white-space:nowrap;">${ps.name}</td>
                                    <td style="padding:0.2mm 0; word-wrap:break-word; line-height:1.1;">${ps.surgery}</td>
                                    <td style="text-align:center; padding:0.2mm 0;">${cb}</td>
                                    <td style="text-align:center; padding:0.2mm 0;">${cb}</td>
                                </tr>`).join('')}
                            </tbody>
                        </table>
                    </div>`;
                }

                if (l.type === 'text') {
                    const content = l.text.replace(/\{\{(.*?)\}\}/g, (match, key) => dataMap[key.trim()] || match);
                    return `<div style="${style}">${content}</div>`;
                }
                if (l.type === 'rect') return `<div style="position:absolute; top:${currentY}mm; left:${l.x}mm; width:${l.w}mm; height:${l.h}mm; border:1px solid ${textColor}; border-radius:${l.radius || 0}mm;"></div>`;
                if (l.type === 'image') return `<img src="${l.url}" style="position:absolute; top:${currentY}mm; left:${l.x}mm; width:${l.w}mm; height:${l.h}mm; object-fit:contain;">`;
                return '';
            }).join('');

if (activeDocType === 'doc_consent') {
                const surgeryInputs = document.querySelectorAll('.surgery-input');
                const queuePayload = [];
                
                surgeryInputs.forEach(i => {
                    const surgeryText = i.value.trim();
                    if (surgeryText && surgeryText !== '-') {
                        queuePayload.push({
                            animal_id: i.dataset.petId,
                            pet_name: i.dataset.petName,
                            owner_name: currentOwner.owner_name,
                            procedures: surgeryText,
                            status: 'รอผ่าตัด', // สถานะเริ่มต้น
                            created_at: new Date().toISOString()
                        });
                    }
                });
                
                if (queuePayload.length > 0) {
                    // แอบส่งข้อมูลไปที่ Supabase ด้านหลัง โดยไม่รบกวนจังหวะเปิดหน้าต่างพิมพ์
                    db.from('surgery_queue').insert(queuePayload).then(({error}) => {
                        if (error) console.error("Error inserting to surgery queue:", error);
                    });
                }
            }


            
            const win = window.open('', '_blank');
            win.document.write(`<html><head><style>@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap');body { margin: 0; padding: 0; background: white; }.page { position: relative; width: ${pw}mm; height: ${ph}mm; overflow: hidden; }@media print { @page { size: ${pw}mm ${ph}mm; margin: 0; } }</style></head><body><div class="page">${printContent}</div><script>window.onload=()=>{ setTimeout(()=>{ window.print(); window.close(); }, 800); };<\/script></body></html>`);
            win.document.close();
        }
    </script>
</body>
</html>
