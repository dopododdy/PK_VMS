<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ศูนย์เอกสารทางการแพทย์ | PK-VMS Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=Prompt:wght@300;400;600&family=Sarabun:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>

    <style>
        :root { --navy: #020617; --navy-light: #0f172a; --teal: #14b8a6; --border: rgba(255, 255, 255, 0.1); }
        * { font-family: "Sarabun", sans-serif; box-sizing: border-box; }
        body { background: var(--navy); color: #e2e8f0; margin: 0; overflow: hidden; }

        .sidebar-container { width: 380px; background: #0f172a; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .owner-card { padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.2s; }
        .owner-card:hover { background: rgba(255,255,255,0.03); }
        .owner-card.active { background: rgba(20, 184, 166, 0.1); border-left: 4px solid var(--teal); }

        .doc-tab { padding: 12px 20px; font-weight: 800; font-size: 0.85rem; cursor: pointer; border-radius: 12px; transition: 0.2s; color: #94a3b8; border: 1px solid transparent; white-space: nowrap; }
        .doc-tab:hover { background: rgba(255,255,255,0.05); }
        .doc-tab.active { background: var(--teal); color: white; box-shadow: 0 4px 15px rgba(20, 184, 166, 0.3); }

        .section-card { background: rgba(30, 41, 59, 0.4); border-radius: 24px; padding: 24px; border: 1px solid var(--border); }
        .input-box { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; color: white; width: 100%; outline: none; }
        
        .pet-mini-card { background: rgba(15, 23, 42, 0.6); border: 2px solid transparent; border-radius: 16px; padding: 12px; cursor: pointer; transition: 0.2s; text-align: center; }
        .pet-mini-card.selected { border-color: var(--teal); background: rgba(20, 184, 166, 0.1); }

        .check-pill { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; font-size: 12px; cursor: pointer; }
        .check-pill input { display: none; }
        .check-pill.active { background: var(--teal); color: white; }

        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="sidebar-container">
        <div class="p-6 border-b border-white/5 bg-navy">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-black text-white italic text-teal-500">PK-VMS DOCS</h2>
                <a href="index.html" class="p-2 hover:bg-white/10 rounded-lg transition text-gray-400"><i data-lucide="home"></i></a>
            </div>
            <div class="relative">
                <i data-lucide="search" class="absolute left-3 top-3.5 w-4 h-4 text-gray-500"></i>
                <input type="text" id="search-owner" class="input-box pl-10 h-11" placeholder="ค้นหา HN หรือชื่อ..." oninput="searchOwners()">
            </div>
        </div>
        <div id="owner-list" class="flex-1 overflow-y-auto custom-scroll"></div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <nav class="p-4 bg-navy-light/50 border-b border-white/5 flex gap-2 overflow-x-auto custom-scroll">
            <div class="doc-tab active" data-type="doc_consent" onclick="switchDocType('doc_consent')">📋 ใบยินยอมผ่าตัด</div>
            <div class="doc-tab" data-type="doc_lab" onclick="switchDocType('doc_lab')">🔬 รายงานผล Lab</div>
        </nav>

        <div id="content-area" class="flex-1 overflow-y-auto p-8 custom-scroll bg-[#020617]">
            <div id="no-selection" class="h-full flex flex-col items-center justify-center opacity-20">
                <i data-lucide="file-text" class="w-32 h-32 mb-4"></i>
                <h2 class="text-3xl font-bold uppercase tracking-widest">กรุณาเลือกเจ้าของสัตว์</h2>
            </div>

            <div id="editor-container" class="hidden max-w-4xl mx-auto space-y-8 pb-32">
                <div class="flex justify-between items-end">
                    <div>
                        <h1 class="text-4xl font-black text-white" id="doc-title">ใบยินยอมผ่าตัด</h1>
                        <p class="text-teal-500 font-bold mt-2 bg-teal-500/10 px-4 py-1 rounded-full inline-block" id="owner-info">-</p>
                    </div>
                    <button onclick="printCurrentDoc()" class="bg-teal-600 hover:bg-teal-500 px-10 py-5 rounded-2xl font-black text-xl flex items-center gap-3 shadow-xl transition-all">
                        <i data-lucide="printer"></i> พิมพ์เอกสาร
                    </button>
                </div>

                <div class="section-card">
                    <h3 class="text-[10px] font-black text-gray-500 mb-4 uppercase tracking-[0.2em]">Step 1: เลือกสัตว์เลี้ยง</h3>
                    <div id="pet-list-grid" class="grid grid-cols-2 sm:grid-cols-4 gap-4"></div>
                </div>

                <div id="dynamic-form" class="space-y-6"></div>
            </div>
        </div>
    </main>

    <script>
        let currentOwner = null;
        let ownerPets = [];
        let selectedPetIds = new Set();
        let activeDocType = 'doc_consent'; 
        const VET_NAME = "ผศ.น.สพ.ดร.ปิติพัฒน์ กิตติ์พิภัทร์กุล";

        window.onload = async () => { lucide.createIcons(); await fetchOwners(); };

        async function fetchOwners() {
            const { data } = await db.from('owners').select('*').order('hn', { ascending: false }).limit(20);
            renderOwnerList(data);
        }

        async function searchOwners() {
            const term = document.getElementById('search-owner').value;
            const { data } = await db.from('owners').select('*').or(`owner_name.ilike.%${term}%,hn.ilike.%${term}%`).limit(20);
            renderOwnerList(data);
        }

        function renderOwnerList(owners) {
            const container = document.getElementById('owner-list');
            container.innerHTML = owners.map(o => `
                <div class="owner-card ${currentOwner?.hn === o.hn ? 'active' : ''}" onclick="selectOwner('${o.hn}')" id="owner-${o.hn}">
                    <span class="text-[10px] font-bold bg-slate-800 text-teal-400 px-2 py-1 rounded">HN: ${o.hn}</span>
                    <div class="text-white font-bold mt-2">${o.owner_name}</div>
                </div>`).join('');
        }

        async function selectOwner(hn) {
            const [{ data: owner }, { data: pets }, { data: phones }] = await Promise.all([
                db.from('owners').select('*').eq('hn', hn).single(),
                db.from('animals').select('*').eq('owner_hn', hn),
                db.from('owner_phones').select('phone_number').eq('owner_hn', hn)
            ]);
            currentOwner = owner;
            currentOwner.phone = phones?.[0]?.phone_number || "-";
            ownerPets = pets || [];
            selectedPetIds.clear();
            document.getElementById('no-selection').classList.add('hidden');
            document.getElementById('editor-container').classList.remove('hidden');
            document.getElementById('owner-info').innerText = `เจ้าของ: ${owner.owner_name} | HN: ${owner.hn}`;
            renderPetList();
            switchDocType(activeDocType);
        }

        function renderPetList() {
            const container = document.getElementById('pet-list-grid');
            container.innerHTML = ownerPets.map(p => `
                <div class="pet-mini-card" id="p-card-${p.id}" onclick="togglePet('${p.id}')">
                    <div class="text-2xl mb-1">${p.pet_type === 'สุนัข' ? '🐶' : '🐱'}</div>
                    <div class="text-white font-black truncate text-sm">${p.pet_name}</div>
                </div>`).join('');
        }

        function togglePet(id) {
            const card = document.getElementById(`p-card-${id}`);
            if (selectedPetIds.has(id)) { selectedPetIds.delete(id); card.classList.remove('selected'); }
            else { selectedPetIds.add(id); card.classList.add('selected'); }
            if (activeDocType === 'doc_consent') refreshSurgeryRows();
            if (activeDocType === 'doc_lab') refreshLabPicker();
        }

        function switchDocType(type) {
            activeDocType = type;
            document.querySelectorAll('.doc-tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`[data-type="${type}"]`)?.classList.add('active');
            const form = document.getElementById('dynamic-form');
            const title = document.getElementById('doc-title');
            
            if (type === 'doc_consent') {
                title.innerText = "ใบยินยอมผ่าตัด";
                form.innerHTML = `<div class="section-card space-y-6"><div id="surgery-rows" class="space-y-6"></div><input type="text" id="f-note" class="input-box font-bold text-teal-400" placeholder="ระบุหมายเหตุความเสี่ยงเพิ่มเติม..."></div>`;
                refreshSurgeryRows();
            } else if (type === 'doc_lab') {
                title.innerText = "รายงานผลทางห้องปฏิบัติการ";
                form.innerHTML = `<div class="section-card space-y-6"><div id="lab-session-list" class="space-y-4"></div></div>`;
                refreshLabPicker();
            }
            lucide.createIcons();
        }

        function refreshSurgeryRows() {
            const container = document.getElementById('surgery-rows');
            if (selectedPetIds.size === 0) { container.innerHTML = '<p class="text-gray-500 italic">เลือกสัตว์เลี้ยงด้านบนเพื่อทำรายการ...</p>'; return; }
            let html = '';
            selectedPetIds.forEach(id => {
                const pet = ownerPets.find(p => p.id === id);
                html += `
                    <div class="bg-white/5 p-5 rounded-3xl border border-white/5 space-y-4">
                        <div class="text-white font-black">🐾 ${pet.pet_name} (${pet.pet_type})</div>
                        <div class="flex flex-wrap gap-2">
                            ${['วางยาสลบ', 'ทำหมัน', 'ขูดหินปูน', 'ผ่าตัดเนื้องอก'].map(opt => `
                                <label class="check-pill" id="label-${pet.id}-${opt}">
                                    <input type="checkbox" onchange="syncSurgeryText('${pet.id}')" value="${opt}" class="p-opt-${pet.id}"> ${opt}
                                </label>`).join('')}
                        </div>
                        <input type="text" id="text-${pet.id}" class="input-box surgery-input text-teal-400 font-bold" data-pet-id="${pet.id}" data-pet-name="${pet.pet_name}" placeholder="รายละเอียดเพิ่มเติม...">
                    </div>`;
            });
            container.innerHTML = html;
        }

        function syncSurgeryText(petId) {
            const checks = document.querySelectorAll(`.p-opt-${petId}:checked`);
            const textbox = document.getElementById(`text-${petId}`);
            const selectedValues = Array.from(checks).map(c => c.value);
            document.querySelectorAll(`[id^="label-${petId}"]`).forEach(l => l.classList.remove('active'));
            checks.forEach(c => c.parentElement.classList.add('active'));
            textbox.value = selectedValues.join(', ');
        }

        async function refreshLabPicker() {
            const container = document.getElementById('lab-session-list');
            if (selectedPetIds.size === 0) { container.innerHTML = '<p class="text-gray-500 italic">กรุณาเลือกสัตว์เพื่อดึงประวัติผลตรวจ...</p>'; return; }
            
            container.innerHTML = '<p class="text-gray-500 animate-pulse">กำลังโหลดข้อมูลล่าสุด...</p>';
            
            const ids = Array.from(selectedPetIds);
            const [{data: bloods}, {data: images}] = await Promise.all([
                db.from('lab_results').select('*').in('animal_id', ids).order('created_at', {ascending: false}).limit(20),
                db.from('imaging_results').select('*').in('animal_id', ids).order('created_at', {ascending: false}).limit(20)
            ]);

            let html = '<h4 class="text-xs font-bold text-teal-500 uppercase tracking-widest mb-2">เลือกข้อมูลที่ต้องการรวมในรายงาน</h4>';
            
            // กลุ่มผลเลือด (Group by created_at)
            const sessions = {};
            bloods.forEach(b => { if(!sessions[b.created_at]) sessions[b.created_at] = []; sessions[b.created_at].push(b); });
            
            Object.keys(sessions).forEach(ts => {
                const date = new Date(ts).toLocaleString('th-TH');
                html += `<label class="flex items-center gap-3 p-4 bg-white/5 rounded-2xl border border-white/5 cursor-pointer hover:bg-teal-500/5 transition">
                    <input type="checkbox" class="lab-pick-input w-5 h-5 rounded accent-teal-500" value="${ts}" data-type="blood">
                    <div>
                        <div class="text-white font-bold">🩸 ผลเลือด (Blood Results)</div>
                        <div class="text-xs text-gray-500">${date}</div>
                    </div>
                </label>`;
            });

            // กลุ่ม Imaging/Echo
            images.forEach(img => {
                const date = new Date(img.created_at).toLocaleString('th-TH');
                html += `<label class="flex items-center gap-3 p-4 bg-white/5 rounded-2xl border border-white/5 cursor-pointer hover:bg-teal-500/5 transition">
                    <input type="checkbox" class="img-pick-input w-5 h-5 rounded accent-teal-500" value="${img.id}" data-type="imaging">
                    <div>
                        <div class="text-white font-bold">${img.exam_type === 'Echocardiography' ? '💓 Echocardiography' : '📸 Imaging: ' + img.region}</div>
                        <div class="text-xs text-gray-500">${date}</div>
                    </div>
                </label>`;
            });

            if(bloods.length === 0 && images.length === 0) html = '<p class="text-gray-600 italic py-10 text-center">ไม่พบประวัติผลตรวจของสัตว์ที่เลือก</p>';
            container.innerHTML = html;
        }

        // ==========================================
        // PK-VMS PRINT ENGINE (Full Lab Integrated)
        // ==========================================
        
        async function printCurrentDoc() {
            if (selectedPetIds.size === 0) return alert("❌ กรุณาเลือกสัตว์");
            
            const { data: template } = await db.from('print_templates').select('config').eq('template_type', activeDocType).single();
            if (!template) return alert(`❌ ไม่พบรูปแบบพิมพ์ "${activeDocType}"`);

            const config = template.config;
            const pw = parseFloat(config.width) || 210;
            const ph = parseFloat(config.height) || 297;

            // ดึงข้อมูลสำหรับแทนที่ในตาราง
            const dataMap = {
                clinic_name: "PK-VMS Animal Clinic",
                clinic_address: "123 ถ.นเรศวร ต.ในเมือง อ.เมือง จ.พิษณุโลก 65000",
                owner_name: currentOwner?.owner_name || "-",
                owner_address: currentOwner?.address || "-",
                owner_phone: currentOwner?.phone || "-",
                hn: currentOwner?.hn || "-",
                vet_name: VET_NAME,
                date: new Date().toLocaleDateString('th-TH', { day: 'numeric', month: 'long', year: 'numeric' }),
                time: new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }),
                note: document.getElementById('f-note')?.value || "-",
            };

            // เตรียมข้อมูล Lab หากเป็น doc_lab
            let pickedLabData = { bloods: [], imaging: [] };
            if (activeDocType === 'doc_lab') {
                const bloodTs = Array.from(document.querySelectorAll('.lab-pick-input:checked')).map(i => i.value);
                const imgIds = Array.from(document.querySelectorAll('.img-pick-input:checked')).map(i => i.value);
                
                const [{data: b_res}, {data: i_res}] = await Promise.all([
                    db.from('lab_results').select('*').in('created_at', bloodTs),
                    db.from('imaging_results').select('*').in('id', imgIds)
                ]);
                pickedLabData.bloods = b_res || [];
                pickedLabData.imaging = i_res || [];
            }

            const sortedLines = [...config.lines].sort((a, b) => parseFloat(a.y) - parseFloat(b.y));
            let pushOffset = 0;
            
            const printContent = sortedLines.map(l => {
                const currentY = parseFloat(l.y) + pushOffset;
                const fontSizePt = l.size || 12;
                const textColor = l.color || '#000000';
                
                let style = `position:absolute; top:${currentY}mm; font-family:'${l.font || 'Sarabun'}'; font-size:${fontSizePt}pt; color:${textColor}; line-height:1; white-space:pre-wrap;`;
                if (l.bold) style += 'font-weight:bold;';
                if (l.italic) style += 'font-style:italic;';
                
                if (l.align === 'center') {
                    style += `left:0; width:${pw}mm; text-align:center;`;
                } else if (l.align === 'right') {
                    style += `left:0; width:${pw}mm; text-align:right; padding-right:${l.x}mm;`;
                } else {
                    style += `left:${l.x}mm; width:${l.w || (pw - parseFloat(l.x))}mm; text-align:left;`;
                }

                // --- 📋 ตารางรายการผ่าตัด (Fixed Position) ---
                if (l.text && l.text.includes("{{pet_surgery_list}}")) {
                    const surgeryInputs = document.querySelectorAll('.surgery-input');
                    const petSurgeries = Array.from(surgeryInputs).map(i => ({ name: i.dataset.petName, surgery: i.value || '-' }));
                    const cb = `<div style="width:3.8mm; height:3.8mm; border:1px solid ${textColor}; display:inline-block; vertical-align:middle;"></div>`;
                    return `<div style="${style}"><table style="width:100%; border-collapse:collapse; font-size:${fontSizePt * 0.85}pt;">
                        <tr style="border-bottom:1.2px solid ${textColor}; font-weight:bold;"><th style="text-align:left; padding:1mm 0.5mm; width:16.6%;">ชื่อสัตว์</th><th style="text-align:left; padding:1mm 0.5mm; width:50%;">รายการหัตถการ</th><th style="text-align:center; width:16.7%;">ไม่ตรวจเลือด</th><th style="text-align:center; width:16.7%;">ตรวจเลือด</th></tr>
                        ${petSurgeries.map(ps => `<tr><td style="padding:0.8mm 0.5mm; vertical-align:top;">${ps.name}</td><td style="padding:0.8mm 0.5mm; vertical-align:top;">${ps.surgery}</td><td style="text-align:center;">${cb}</td><td style="text-align:center;">${cb}</td></tr>`).join('')}
                    </table></div>`;
                }

                // --- 🔬 ตารางผลเลือด (Dynamic) ---
                if (l.text && l.text.includes("{{lab_table}}")) {
                    if (pickedLabData.bloods.length === 0) return '';
                    const rowHeightMm = 6;
                    pushOffset += (pickedLabData.bloods.length) * rowHeightMm;
                    return `<div style="${style}">
                        <table style="width:100%; border-collapse:collapse; font-size:${fontSizePt * 0.9}pt;">
                            <tr style="border-bottom:1px solid black; font-weight:bold;"><th style="text-align:left;">Parameter</th><th style="text-align:center;">Value</th><th style="text-align:right;">Unit</th></tr>
                            ${pickedLabData.bloods.map(b => `<tr><td style="padding:1mm 0;">${b.parameter_name}</td><td style="text-align:center; font-weight:bold;">${b.test_value}</td><td style="text-align:right;">${b.unit || ''}</td></tr>`).join('')}
                        </table>
                    </div>`;
                }

                // --- 💓 ตาราง Echocardiography (Dynamic) ---
                if (l.text && l.text.includes("{{echo_table}}")) {
                    const echo = pickedLabData.imaging.find(i => i.exam_type === 'Echocardiography');
                    if (!echo) return '';
                    const f = echo.findings;
                    const items = [
                        {n: 'LA/Ao Ratio', v: (f.la / f.ao).toFixed(2), r: '< 1.6'},
                        {n: 'FS %', v: (((f.lvidd - f.lvids)/f.lvidd)*100).toFixed(1) + '%', r: '25-45%'},
                        {n: 'n-LVIDd', v: (f.lvidd / Math.pow(f.bw, 0.294)).toFixed(2), r: '1.27-1.85'}
                    ];
                    pushOffset += (items.length * 6) + 10;
                    return `<div style="${style}">
                        <div style="font-weight:bold; margin-bottom:2mm;">Echocardiography Measurements (BW: ${f.bw} kg)</div>
                        <table style="width:100%; border-collapse:collapse; font-size:${fontSizePt * 0.9}pt;">
                            <tr style="background:#eee;"><td>Parameter</td><td>Result</td><td>Ref. Range</td></tr>
                            ${items.map(it => `<tr><td>${it.n}</td><td style="font-weight:bold;">${it.v}</td><td>${it.r}</td></tr>`).join('')}
                        </table>
                        <div style="margin-top:2mm; font-style:italic;">Impression: ${echo.impression}</div>
                    </div>`;
                }

                // --- 📸 รายละเอียด Imaging (Dynamic) ---
                if (l.text && l.text.includes("{{imaging_details}}")) {
                    const imgs = pickedLabData.imaging.filter(i => i.exam_type !== 'Echocardiography');
                    if (imgs.length === 0) return '';
                    pushOffset += (imgs.length * 20);
                    return `<div style="${style}">
                        ${imgs.map(img => `
                            <div style="margin-bottom:5mm; border-bottom:0.5px solid #ccc; padding-bottom:2mm;">
                                <div style="font-weight:bold; color:#333;">${img.exam_type}: ${img.region}</div>
                                <div style="font-size:0.9em;">Findings: ${img.findings}</div>
                                <div style="font-weight:bold; font-size:0.9em;">Impression: ${img.impression}</div>
                            </div>
                        `).join('')}
                    </div>`;
                }

                if (l.type === 'text') {
                    const content = l.text.replace(/\{\{(.*?)\}\}/g, (match, key) => dataMap[key.trim()] || match);
                    return `<div style="${style}">${content}</div>`;
                }
                if (l.type === 'rect') return `<div style="position:absolute; top:${currentY}mm; left:${l.x}mm; width:${l.w}mm; height:${l.h}mm; border:1px solid ${textColor}; border-radius:${l.radius || 0}mm;"></div>`;
                if (l.type === 'image') return `<img src="${l.url}" style="position:absolute; top:${currentY}mm; left:${l.align==='center'?'50%':l.x+'mm'}; ${l.align==='center'?'transform:translateX(-50%);':''} width:${l.w}mm; height:${l.h}mm; object-fit:contain;">`;
                return '';
            }).join('');

            const win = window.open('', '_blank');
            win.document.write(`
                <html>
                <head>
                    <style>
                        @import url('https://fonts.googleapis.com/css2?family=Kanit&family=Prompt&family=Sarabun:wght@400;700&display=swap');
                        * { box-sizing: border-box; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
                        html, body { margin: 0 !important; padding: 0 !important; background: white; line-height: 1.2; }
                        .page { position: relative; width: ${pw}mm; height: ${ph}mm; background: white; overflow: hidden; }
                        @media print {
                            @page { size: ${pw}mm ${ph}mm; margin: 0 !important; }
                            html, body, .page { width: ${pw}mm; height: ${ph}mm; }
                        }
                    </style>
                </head>
                <body>
                    <div class="page">${printContent}</div>
                    <script>window.onload = () => { setTimeout(() => { window.print(); window.close(); }, 1000); };<\/script>
                </body>
                </html>
            `);
            win.document.close();
        }
    </script>
</body>
