<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ศูนย์เอกสารทางการแพทย์ | PK-VMS Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <style>
        :root { --navy: #020617; --navy-light: #0f172a; --teal: #14b8a6; --border: rgba(255, 255, 255, 0.1); }
        * { font-family: "Sarabun", sans-serif !important; }
        body { background: var(--navy); color: #e2e8f0; margin: 0; overflow: hidden; }

        .sidebar-container { width: 380px; background: #0f172a; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .owner-card { padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.2s; }
        .owner-card:hover { background: rgba(255,255,255,0.03); }
        .owner-card.active { background: rgba(20, 184, 166, 0.1); border-left: 4px solid var(--teal); }

        .doc-tab { padding: 12px 16px; font-weight: 800; font-size: 0.85rem; cursor: pointer; border-radius: 12px; transition: 0.2s; color: #94a3b8; border: 1px solid transparent; white-space: nowrap; }
        .doc-tab:hover { background: rgba(255,255,255,0.05); }
        .doc-tab.active { background: var(--teal); color: white; box-shadow: 0 4px 15px rgba(20, 184, 166, 0.3); }

        .section-card { background: rgba(30, 41, 59, 0.4); border-radius: 24px; padding: 24px; border: 1px solid var(--border); }
        .input-box { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; color: white; width: 100%; outline: none; transition: 0.2s; }
        .input-box:focus { border-color: var(--teal); }

        .pet-mini-card { background: rgba(15, 23, 42, 0.6); border: 2px solid transparent; border-radius: 16px; padding: 12px; cursor: pointer; transition: 0.2s; text-align: center; }
        .pet-mini-card:hover { border-color: rgba(20, 184, 166, 0.4); }
        .pet-mini-card.selected { border-color: var(--teal); background: rgba(20, 184, 166, 0.1); }

        .check-pill { 
            display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 20px; font-size: 11px; cursor: pointer; transition: 0.2s;
        }
        .check-pill:hover { background: rgba(255,255,255,0.1); }
        .check-pill input { display: none; }
        .check-pill.active { background: var(--teal); color: white; border-color: var(--teal); }

        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="sidebar-container">
        <div class="p-6 border-b border-white/5">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-black text-white italic">PK-VMS <span class="text-teal-500">DOCS</span></h2>
                <a href="index.html" class="p-2 hover:bg-white/10 rounded-lg transition"><i data-lucide="home"></i></a>
            </div>
            <div class="relative">
                <i data-lucide="search" class="absolute left-3 top-3 w-4 h-4 text-gray-500"></i>
                <input type="text" id="search-owner" class="input-box pl-10" placeholder="ค้นหา HN หรือชื่อ..." oninput="searchOwners()">
            </div>
        </div>
        <div id="owner-list" class="flex-1 overflow-y-auto custom-scroll"></div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        
        <nav class="p-4 bg-navy-light/50 border-b border-white/5 flex gap-2 overflow-x-auto custom-scroll">
            <div class="doc-tab active" data-type="consent" onclick="switchDocType('consent')">📋 ใบยินยอมผ่าตัด</div>
            <div class="doc-tab" data-type="lab" onclick="switchDocType('lab')">🔬 รายงานผลแล็บ</div>
            <div class="doc-tab" data-type="refer" onclick="switchDocType('refer')">🚑 ใบส่งตัว</div>
            <div class="doc-tab" data-type="history" onclick="switchDocType('history')">📜 ประวัติการรักษา</div>
            <div class="doc-tab" data-type="parcel" onclick="switchDocType('parcel')">📦 แปะหน้ากล่อง</div>
        </nav>

        <div id="content-area" class="flex-1 overflow-y-auto p-10 custom-scroll bg-[#020617]">
            <div id="no-selection" class="h-full flex flex-col items-center justify-center opacity-20">
                <i data-lucide="file-text" class="w-32 h-32 mb-4"></i>
                <h2 class="text-3xl font-bold">กรุณาเลือกเจ้าของสัตว์</h2>
            </div>

            <div id="editor-container" class="hidden max-w-5xl mx-auto space-y-8 pb-20">
                <div class="flex justify-between items-end">
                    <div>
                        <h1 class="text-4xl font-black text-white" id="doc-title">ใบยินยอมผ่าตัด</h1>
                        <p class="text-teal-500 font-bold mt-2" id="owner-info">-</p>
                    </div>
                    <button onclick="printCurrentDoc()" class="bg-teal-600 hover:bg-teal-500 px-10 py-4 rounded-2xl font-black text-xl flex items-center gap-2 shadow-xl transition">
                        <i data-lucide="printer"></i> พิมพ์เอกสาร
                    </button>
                </div>

                <div class="section-card" id="pet-selector-card">
                    <h3 class="text-xs font-bold text-gray-500 mb-4 uppercase tracking-widest">เลือกสัตว์เลี้ยงที่เกี่ยวข้อง</h3>
                    <div id="pet-list-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
                </div>

                <div id="dynamic-form" class="space-y-6"></div>
            </div>
        </div>
    </main>

    <script>
        let currentOwner = null;
        let ownerPets = [];
        let selectedPetIds = new Set();
        let activeDocType = 'consent';

        window.onload = async () => {
            lucide.createIcons();
            const params = new URLSearchParams(window.location.search);
            const hn = params.get('hn');
            if (hn) await selectOwner(hn);
            await fetchOwners();
        };

        async function fetchOwners() {
            const { data } = await db.from('owners').select('*').order('hn', { ascending: false }).limit(10);
            renderOwnerList(data);
        }

        async function searchOwners() {
            const term = document.getElementById('search-owner').value;
            if (term.length < 2) return;
            const { data } = await db.from('owners').select('*').or(`owner_name.ilike.%${term}%,hn.ilike.%${term}%`).limit(20);
            renderOwnerList(data);
        }

        function renderOwnerList(owners) {
            const container = document.getElementById('owner-list');
            container.innerHTML = owners.map(o => `
                <div class="owner-card ${currentOwner?.hn === o.hn ? 'active' : ''}" onclick="selectOwner('${o.hn}')" id="owner-${o.hn}">
                    <span class="text-[10px] font-bold bg-slate-800 text-blue-400 px-2 py-1 rounded">#${o.hn}</span>
                    <div class="text-white font-bold mt-1">${o.owner_name}</div>
                </div>`).join('');
        }

        async function selectOwner(hn) {
            const [{ data: owner }, { data: pets }] = await Promise.all([
                db.from('owners').select('*').eq('hn', hn).single(),
                db.from('animals').select('*').eq('owner_hn', hn)
            ]);
            currentOwner = owner;
            ownerPets = pets || [];
            selectedPetIds.clear();
            
            document.getElementById('no-selection').classList.add('hidden');
            document.getElementById('editor-container').classList.remove('hidden');
            document.getElementById('owner-info').innerText = `เจ้าของ: ${owner.owner_name} | HN: ${owner.hn}`;
            
            renderPetList();
            switchDocType(activeDocType);
            document.querySelectorAll('.owner-card').forEach(c => c.classList.remove('active'));
            document.getElementById(`owner-${hn}`)?.classList.add('active');
        }

        function renderPetList() {
            const container = document.getElementById('pet-list-grid');
            container.innerHTML = ownerPets.map(p => `
                <div class="pet-mini-card" id="p-card-${p.id}" onclick="togglePet('${p.id}')">
                    <div class="text-xl">${p.pet_type === 'สุนัข' ? '🐶' : '🐱'}</div>
                    <div class="text-white font-bold truncate">${p.pet_name}</div>
                </div>`).join('');
        }

        function togglePet(id) {
            const card = document.getElementById(`p-card-${id}`);
            if (selectedPetIds.has(id)) {
                selectedPetIds.delete(id);
                card.classList.remove('selected');
            } else {
                selectedPetIds.add(id);
                card.classList.add('selected');
            }
            if (activeDocType === 'consent') refreshSurgeryRows();
        }

        function switchDocType(type) {
            activeDocType = type;
            document.querySelectorAll('.doc-tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`[data-type="${type}"]`).classList.add('active');
            const form = document.getElementById('dynamic-form');
            const title = document.getElementById('doc-title');

            if (type === 'consent') {
                title.innerText = "ใบยินยอมทำวิสัญญีและผ่าตัด";
                form.innerHTML = `
                    <div class="section-card space-y-6">
                        <h3 class="text-sm font-bold text-gray-500 uppercase tracking-widest">รายการผ่าตัดรายตัว</h3>
                        <div id="surgery-rows" class="space-y-6"></div>
                        <div class="grid grid-cols-2 gap-4 mt-6 pt-6 border-t border-white/5">
                            <div><label class="text-xs text-gray-500 mb-2 block">ชื่อสัตวแพทย์</label><input type="text" id="f-vet" class="input-box" placeholder="น.สพ. ..."></div>
                            <div><label class="text-xs text-gray-500 mb-2 block">หมายเหตุรวม</label><input type="text" id="f-note" class="input-box"></div>
                        </div>
                    </div>`;
                refreshSurgeryRows();
            } else {
                form.innerHTML = `<div class="section-card text-center p-10"><p class="text-gray-400 italic">เลือกสัตว์เพื่อทำรายการประเภท ${type}</p></div>`;
            }
            lucide.createIcons();
        }

        function refreshSurgeryRows() {
            const container = document.getElementById('surgery-rows');
            if (selectedPetIds.size === 0) {
                container.innerHTML = '<p class="text-gray-500 italic">กรุณาเลือกสัตว์เลี้ยงจากรายการด้านบน...</p>';
                return;
            }
            
            let html = '';
            selectedPetIds.forEach(id => {
                const pet = ownerPets.find(p => p.id === id);
                const speciesIcon = pet.pet_type === 'สุนัข' ? '🐶' : '🐱';
                const genderIcon = pet.gender.includes('ผู้') ? '♂️' : '♀️';

                html += `
                    <div class="bg-white/5 p-5 rounded-2xl border border-white/5 space-y-4">
                        <div class="flex items-center gap-2">
                            <span class="text-2xl">${speciesIcon}</span>
                            <span class="text-xl font-bold text-white">${pet.pet_name}</span>
                            <span class="text-lg opacity-60">${genderIcon}</span>
                        </div>
                        
                        <div class="flex flex-wrap gap-2">
                            ${['วางยาสลบ', 'ขูดหินปูน', 'ทำหมันผู้', 'ทำหมันเมีย', 'ฉีดวัคซีนรวมสุนัข (6 โรค)', 'ฉีดวัคซีนรวมแมว (รวมแมว + พิษสุนัขบ้า)', 'ฉีดยา Convenia'].map(opt => `
                                <label class="check-pill" id="label-${pet.id}-${opt}">
                                    <input type="checkbox" onchange="syncSurgeryText('${pet.id}')" value="${opt}" class="p-opt-${pet.id}">
                                    ${opt}
                                </label>
                            `).join('')}
                        </div>

                        <input type="text" id="text-${pet.id}" class="input-box surgery-input" data-pet-id="${pet.id}" data-pet-name="${pet.pet_name}" placeholder="รายการหัตถการ...">
                    </div>`;
            });
            container.innerHTML = html;
        }

        function syncSurgeryText(petId) {
            const checks = document.querySelectorAll(`.p-opt-${petId}:checked`);
            const textbox = document.getElementById(`text-${petId}`);
            const selectedValues = Array.from(checks).map(c => c.value);
            
            // UI Visual Update
            document.querySelectorAll(`[id^="label-${petId}"]`).forEach(l => l.classList.remove('active'));
            checks.forEach(c => c.parentElement.classList.add('active'));

            textbox.value = selectedValues.join(', ');
        }

        function printCurrentDoc() {
            if (selectedPetIds.size === 0) return alert("กรุณาเลือกสัตว์เลี้ยง");
            
            const win = window.open('', '_blank');
            win.document.write(`
                <html>
                <head>
                    <title>Print PK-VMS</title>
                    <style>
                        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap');
                        body { font-family: 'Sarabun', sans-serif; padding: 20mm; color: #000; font-size: 14pt; line-height: 1.6; }
                        .header { text-align: center; border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 20px; }
                        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
                        table, th, td { border: 1px solid black; padding: 10px; text-align: left; }
                        .sig-area { margin-top: 60px; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
                        .sig { text-align: center; border-top: 1px dotted #000; padding-top: 5px; margin-top: 40px; }
                    </style>
                </head>
                <body>
                    <div class="header">
                        <div style="font-size: 20pt; font-weight: bold;">ใบยินยอมทำวิสัญญีและผ่าตัด</div>
                        <div>PK-VMS Animal Clinic</div>
                    </div>
                    <div style="margin-bottom: 20px;">
                        วันที่: ${new Date().toLocaleDateString('th-TH', { day:'numeric', month:'long', year:'numeric' })} <br>
                        เจ้าของ: ${currentOwner.owner_name} (HN: ${currentOwner.hn})
                    </div>
                    <p>ข้าพเจ้ายินยอมให้สัตวแพทย์ทำวิสัญญีและหัตถการแก่สัตว์เลี้ยงตามรายการดังนี้:</p>
                    <table>
                        <tr style="background:#eee;"><th>ชื่อสัตว์เลี้ยง</th><th>รายการหัตถการ</th></tr>
                        ${Array.from(document.querySelectorAll('.surgery-input')).map(i => `<tr><td>${i.dataset.pet_name}</td><td>${i.value || '-'}</td></tr>`).join('')}
                    </table>
                    <p>สัตวแพทย์ผู้รับผิดชอบ: ${document.getElementById('f-vet').value || '....................'}</p>
                    <p><b>คำยืนยัน:</b> ข้าพเจ้าได้รับทราบและเข้าใจถึงความเสี่ยงของการวางยาสลบและการผ่าตัดเป็นอย่างดีแล้ว ข้าพเจ้าตกลงให้สัตวแพทย์ดำเนินการรักษาตามดุลยพินิจของสัตวแพทย์ หากเกิดเหตุสุดวิสัยอันมิอาจคาดการณ์ได้ ข้าพเจ้าจะไม่เรียกร้องความรับผิดชอบใดๆ จากทางคลินิกและสัตวแพทย์</p>
                    <div class="sig-area">
                        <div class="sig">ลงชื่อเจ้าของสัตว์/ผู้มีอำนาจ</div>
                        <div class="sig">ลงชื่อสัตวแพทย์</div>
                    </div>
                    <script>window.onload = () => { setTimeout(() => { window.print(); window.close(); }, 500); };<\/script>
                </body></html>`);
            win.document.close();
        }
    </script>
</body>
</html>
