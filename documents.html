<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ศูนย์เอกสารทางการแพทย์ | PK-VMS Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Kanit:wght@300;400;500;600;700&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="ui-settings.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>

    <style>
        :root { --navy: #020617; --navy-light: #0f172a; --teal: #14b8b1; --border: rgba(255, 255, 255, 0.1); }
        * { font-family: "Sarabun", sans-serif; box-sizing: border-box; }
        body { background: var(--navy); color: #e2e8f0; margin: 0; overflow: hidden; }

        .sidebar-container { width: 380px; background: #0f172a; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .owner-card { padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.2s; }
        .owner-card:hover { background: rgba(255,255,255,0.03); }
        .owner-card.active { background: rgba(20, 184, 166, 0.1); border-left: 4px solid var(--teal); }

        .doc-tab { padding: 12px 20px; font-weight: 800; font-size: 0.85rem; cursor: pointer; border-radius: 12px; transition: 0.2s; color: #94a3b8; border: 1px solid transparent; white-space: nowrap; }
        .doc-tab:hover { background: rgba(255,255,255,0.05); }
        .doc-tab.active { background: var(--teal); color: white; box-shadow: 0 4px 15px rgba(20, 184, 166, 0.3); }

        .section-card { background: rgba(30, 41, 59, 0.4); border-radius: 24px; padding: 24px; border: 1px solid var(--border); }
        .input-box { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; color: white; width: 100%; outline: none; }
        
        .pet-mini-card { background: rgba(15, 23, 42, 0.6); border: 2px solid transparent; border-radius: 16px; padding: 12px; cursor: pointer; transition: 0.2s; text-align: center; }
        .pet-mini-card.selected { border-color: var(--teal); background: rgba(20, 184, 166, 0.1); }

        .check-pill { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; font-size: 12px; cursor: pointer; transition: 0.2s; }
        .check-pill input { display: none; }
        .check-pill.active { background: var(--teal); color: white; border-color: var(--teal); }

        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        /* ─── Responsive Mobile Sidebar ─── */
        .sidebar-toggle {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 60;
            background: var(--teal);
            color: #020617;
            border: none;
            border-radius: 50px;
            padding: 12px 24px;
            font-weight: 900;
            font-size: 0.95rem;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(20,184,177,0.4);
            white-space: nowrap;
            align-items: center;
            gap: 8px;
        }
        .sidebar-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            z-index: 49;
            backdrop-filter: blur(2px);
        }
        @media (max-width: 767px) {
            body { overflow: auto !important; }
            .sidebar-container {
                position: fixed;
                top: 0;
                left: -100%;
                height: 100%;
                width: min(85vw, 360px) !important;
                z-index: 50;
                transition: left 0.3s ease;
                overflow-y: auto;
            }
            .sidebar-container.sidebar-open {
                left: 0;
            }
            .sidebar-backdrop.sidebar-open {
                display: block;
            }
            .sidebar-toggle {
                display: flex;
            }
            main { overflow-y: auto !important; }
            #content-area { padding: 1rem !important; overflow-y: auto !important; }
        }

        .btn-base { padding: 8px 16px; border-radius: 10px; font-weight: 800; display: inline-flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.2s; border: none; cursor: pointer; color: white; font-size: 0.9rem; }

        /* DLD Report table styles */
        .dld-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        .dld-table th { background: rgba(0,0,0,0.4); padding: 6px 8px; text-align: center; border: 1px solid var(--border); font-weight: 700; font-size: 0.75rem; }
        .dld-table td { padding: 5px 8px; border: 1px solid var(--border); text-align: center; }
        .dld-table td:first-child { text-align: left; font-weight: 600; white-space: nowrap; }
        .dld-table tr:hover td { background: rgba(255,255,255,0.03); }
        .dld-table .col-dog { color: #60a5fa; }
        .dld-table .col-cat { color: #f472b6; }
        .dld-table .total-row td { background: rgba(20,184,177,0.1); font-weight: 800; color: #14b8b1; }
        @media print {
            aside, nav { display: none !important; }
            #dld-report-container { display: block !important; }
            #editor-container, #no-selection { display: none !important; }
            body { overflow: auto; }
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden">
    <div class="sidebar-backdrop" id="sidebar-backdrop" onclick="closeSidebar()"></div>
    <aside class="sidebar-container" id="main-sidebar">
        <div class="p-6 border-b border-white/5 bg-navy">
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-3">
                    <span class="text-4xl">📄</span>
                    <h2 class="text-xl font-black text-white">เอกสาร</h2>
                </div>
                <a href="index.html" class="flex items-center gap-2 px-3 py-2 rounded-xl bg-white/5 hover:bg-teal-500/20 hover:text-teal-400 transition-all text-gray-300 font-bold text-sm">
                    <span class="text-xl">🏠</span><span>หน้าหลัก</span>
                </a>
            </div>
            <div class="relative">
                <i data-lucide="search" class="absolute left-3 top-3.5 w-4 h-4 text-gray-500"></i>
                <input type="text" id="search-owner" class="input-box pl-10 h-11" placeholder="ค้นหา HN หรือชื่อ..." oninput="searchOwners()">
            </div>
        </div>
        <div id="owner-list" class="flex-1 overflow-y-auto custom-scroll"></div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <nav class="p-4 bg-navy-light/50 border-b border-white/5 flex gap-2 overflow-x-auto custom-scroll">
            <div class="doc-tab active" data-type="doc_consent" onclick="switchDocType('doc_consent')">📋 ใบยินยอมหัตถการ</div>
            <div class="doc-tab" data-type="doc_lab" onclick="switchDocType('doc_lab')">🔬 รายงานผล Lab</div>
            <div class="doc-tab" data-type="doc_referral" onclick="switchDocType('doc_referral')">📨 ใบส่งตัว</div>
            <div class="doc-tab" data-type="doc_dld" onclick="switchDocType('doc_dld')">📊 รายงานกรมปศุสัตว์</div>
            <div class="doc-tab" data-type="doc_history" onclick="switchDocType('doc_history')">📋 ประวัติการรักษา</div>
            <div class="doc-tab" data-type="doc_echo" onclick="switchDocType('doc_echo')">🫀 ใบยินยิมรักษาโรคหัวใจ</div>
        </nav>

        <div id="content-area" class="flex-1 overflow-y-auto p-8 custom-scroll bg-[#020617]">
            <div id="no-selection" class="h-full flex flex-col items-center justify-center opacity-20">
                <i data-lucide="file-text" class="w-32 h-32 mb-4"></i>
                <h2 class="text-3xl font-bold uppercase tracking-widest">กรุณาเลือกเจ้าของสัตว์</h2>
            </div>

            <!-- DLD Report Container (shown when doc_dld tab is active, independent of owner) -->
            <div id="dld-report-container" class="hidden w-full pb-32">
                <div class="flex flex-wrap justify-between items-center gap-4 mb-8">
                    <div>
                        <h1 class="text-4xl font-black text-white">📊 รายงานสรุปประจำปี</h1>
                        <p class="text-purple-400 font-bold mt-2">สำหรับรายงานต่อกรมปศุสัตว์ (DLD Annual Report)</p>
                    </div>
                    <div class="flex flex-wrap items-center gap-3">
                        <select id="dld-year-select" class="input-box w-32" onchange="loadDldReport()"></select>
                        <button onclick="loadDldReport()" class="btn-base bg-purple-700 hover:bg-purple-600 text-sm px-5 py-3">🔄 โหลดข้อมูล</button>
                        <button onclick="printDldReport()" class="btn-base bg-teal-700 hover:bg-teal-600 text-sm px-5 py-3">🖨️ พิมพ์/PDF</button>
                        <button onclick="exportDldCsv()" class="btn-base bg-green-700 hover:bg-green-600 text-sm px-5 py-3">📥 CSV</button>
                        <button onclick="exportDldXls()" class="btn-base bg-blue-700 hover:bg-blue-600 text-sm px-5 py-3">📊 XLS</button>
                    </div>
                </div>
                <div id="dld-loading" class="hidden text-center py-20 text-gray-500 animate-pulse">กำลังโหลดข้อมูล...</div>
                <div id="dld-report-body" class="space-y-10"></div>
            </div>

            <div id="editor-container" class="hidden max-w-4xl mx-auto space-y-8 pb-32">
                <div class="flex justify-between items-end">
                    <div>
                        <h1 class="text-4xl font-black text-white" id="doc-title">ใบยินยอมผ่าตัด/วางยาสลบ</h1>
                        <p class="text-teal-500 font-bold mt-2 bg-teal-500/10 px-4 py-1 rounded-full inline-block" id="owner-info">-</p>
                    </div>
                    <div class="flex gap-3 items-center flex-wrap">
                        <button id="btn-print-queue" onclick="printQueueCard()" class="hidden bg-orange-700 hover:bg-orange-600 px-6 py-5 rounded-2xl font-black text-xl flex items-center gap-3 shadow-xl transition-all">
                            🎫 พิมพ์บัตรคิว
                        </button>
                        <button onclick="printCurrentDoc()" class="bg-teal-600 hover:bg-teal-500 px-10 py-5 rounded-2xl font-black text-xl flex items-center gap-3 shadow-xl transition-all">
                            <i data-lucide="printer"></i> พิมพ์เอกสาร
                        </button>
                        <button onclick="saveCurrentDocAsPdf()" class="bg-blue-700 hover:bg-blue-600 px-6 py-5 rounded-2xl font-black text-xl flex items-center gap-3 shadow-xl transition-all">
                            <i data-lucide="file-down"></i> บันทึกเป็น PDF
                        </button>
                        <button onclick="shareCurrentDoc()" class="bg-violet-700 hover:bg-violet-600 px-6 py-5 rounded-2xl font-black text-xl flex items-center gap-3 shadow-xl transition-all">
                            <i data-lucide="share-2"></i> แชร์
                        </button>
                    </div>
                </div>

                <div class="section-card">
                    <h3 class="text-[10px] font-black text-gray-500 mb-4 uppercase tracking-[0.2em]">Step 1: เลือกสัตว์เลี้ยง</h3>
                    <div id="pet-list-grid" class="grid grid-cols-2 sm:grid-cols-4 gap-4"></div>
                </div>

                <div id="dynamic-form" class="space-y-6"></div>
            </div>
        </div>
    </main>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('main-sidebar');
            const backdrop = document.getElementById('sidebar-backdrop');
            const btn = document.getElementById('sidebar-toggle-btn');
            const isOpen = sidebar.classList.contains('sidebar-open');
            if (isOpen) { closeSidebar(); }
            else {
                sidebar.classList.add('sidebar-open');
                backdrop.classList.add('sidebar-open');
                if (btn) btn.textContent = '✕ ปิด';
            }
        }
        function closeSidebar() {
            const sidebar = document.getElementById('main-sidebar');
            const backdrop = document.getElementById('sidebar-backdrop');
            const btn = document.getElementById('sidebar-toggle-btn');
            sidebar.classList.remove('sidebar-open');
            backdrop.classList.remove('sidebar-open');
            if (btn) btn.textContent = '☰ รายชื่อ';
        }

        let currentOwner = null;
        let ownerPets = [];
        let selectedPetIds = new Set();
        let activeDocType = 'doc_consent'; 
        const VET_NAME = "ผศ.น.สพ.ดร.ปิติพัฒน์ กิตติ์พิภัทร์กุล";
        const VET_LICENSE = "01-6186/2550";
        const CLINIC_PHONE = "02-123-4567";
        const CLINIC_TAX_ID = "0105560001234";
        const CLINIC_NAME = "PK-VMS Animal Clinic";
        const CLINIC_ADDRESS = "123 ถ.นเรศวร ต.ในเมือง อ.เมือง จ.พิษณุโลก 65000";

        const COMMON_PROCEDURES = [
            'วางยาสลบ', 'ทำหมันเมีย', 'ตอน (เพศผู้)', 
            'ฉีดวัคซีนรวม - แมว', 'ฉีดวัคซีนรวม - สุนัข', 
            'ฉีดยา Convenia', 'ขูดหินปูน', 'ผ่าตัดเนื้องอก', 'ผ่าตัดหน้าท้อง'
        ];

        window.onload = async () => { 
            lucide.createIcons(); 
            const urlParams = new URLSearchParams(window.location.search);
            const hn = urlParams.get('hn');
            const type = urlParams.get('type');
            const petId = urlParams.get('id');

            if (hn) {
                document.getElementById('search-owner').value = hn;
                await searchOwners(); 
                if (type) activeDocType = type;
                await selectOwner(hn, petId);
            } else {
                await fetchOwners(); 
            }
        };

        async function fetchOwners() {
            const { data } = await db.from('owners').select('*').order('hn', { ascending: false }).limit(20);
            renderOwnerList(data);
        }

        async function searchOwners() {
            const term = document.getElementById('search-owner').value;
            const { data } = await db.from('owners').select('*').or(`owner_name.ilike.%${term}%,hn.ilike.%${term}%`).order('hn', { ascending: false }).limit(20);
            renderOwnerList(data);
            return data;
        }

        function renderOwnerList(owners) {
            const container = document.getElementById('owner-list');
            container.innerHTML = owners.map(o => `
                <div class="owner-card ${currentOwner?.hn === o.hn ? 'active' : ''}" onclick="selectOwner('${o.hn}')" id="owner-${o.hn}">
                    <span class="text-[10px] font-bold bg-slate-800 text-teal-400 px-2 py-1 rounded">HN: ${o.hn}</span>
                    <div class="text-white font-bold mt-2">${o.owner_name}</div>
                </div>`).join('');
        }

        async function selectOwner(hn, targetPetId = null) {
            closeSidebar();
            const [{ data: owner }, { data: pets }, { data: phones }] = await Promise.all([
                db.from('owners').select('*').eq('hn', hn).single(),
                db.from('animals').select('*').eq('owner_hn', hn),
                db.from('owner_phones').select('phone_number').eq('owner_hn', hn)
            ]);
            if (!owner) return;
            currentOwner = owner;
            currentOwner.phone = phones?.[0]?.phone_number || "-";
            ownerPets = pets || [];
            selectedPetIds.clear();
            if (targetPetId) selectedPetIds.add(targetPetId.toString());

            document.querySelectorAll('.owner-card').forEach(el => el.classList.remove('active'));
            document.getElementById(`owner-${hn}`)?.classList.add('active');
            document.getElementById('no-selection').classList.add('hidden');
            document.getElementById('editor-container').classList.remove('hidden');
            document.getElementById('owner-info').innerText = `เจ้าของ: ${owner.owner_name} | HN: ${owner.hn}`;
            renderPetList();
            switchDocType(activeDocType);
        }

        function renderPetList() {
            const container = document.getElementById('pet-list-grid');
            container.innerHTML = ownerPets.map(p => `
                <div class="pet-mini-card ${selectedPetIds.has(p.id.toString()) ? 'selected' : ''}" 
                     id="p-card-${p.id}" onclick="togglePet('${p.id}')">
                    <div class="text-2xl mb-1">${p.pet_type === 'สุนัข' ? '🐶' : '🐱'}</div>
                    <div class="text-white font-black truncate text-sm">${p.pet_name}</div>
                </div>`).join('');
        }

        function togglePet(id) {
            const card = document.getElementById(`p-card-${id}`);
            if (activeDocType === 'doc_referral') {
                if (selectedPetIds.has(id.toString())) {
                    selectedPetIds.delete(id.toString());
                    card.classList.remove('selected');
                    clearReferralPetFields();
                } else {
                    selectedPetIds.forEach(prevId => document.getElementById(`p-card-${prevId}`)?.classList.remove('selected'));
                    selectedPetIds.clear();
                    selectedPetIds.add(id.toString());
                    card.classList.add('selected');
                    loadReferralDataForPet(id);
                }
                return;
            }
            if (activeDocType === 'doc_echo') {
                if (selectedPetIds.has(id.toString())) {
                    selectedPetIds.delete(id.toString());
                    card.classList.remove('selected');
                    clearEchoPetFields();
                } else {
                    selectedPetIds.forEach(prevId => document.getElementById(`p-card-${prevId}`)?.classList.remove('selected'));
                    selectedPetIds.clear();
                    selectedPetIds.add(id.toString());
                    card.classList.add('selected');
                    loadEchoDataForPet(id);
                }
                return;
            }
            if (selectedPetIds.has(id.toString())) { selectedPetIds.delete(id.toString()); card.classList.remove('selected'); }
            else { selectedPetIds.add(id.toString()); card.classList.add('selected'); }
            if (activeDocType === 'doc_consent') refreshSurgeryRows();
            if (activeDocType === 'doc_lab') refreshLabPicker();
            if (activeDocType === 'doc_history') refreshHistoryPreview();
        }

        function clearReferralPetFields() {
            const petFields = document.getElementById('ref-pet-fields');
            const petInfo = document.getElementById('ref-pet-info-section');
            if (petFields) petFields.classList.add('hidden');
            if (petInfo) petInfo.classList.remove('hidden');
            ['ref-pet-name','ref-pet-species','ref-pet-gender','ref-pet-weight',
             'ref-hx','ref-pe','ref-other-exam','ref-dx','ref-treatment'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.value = '';
            });
        }

        async function loadReferralDataForPet(petId) {
            const pet = ownerPets.find(p => p.id.toString() === petId.toString());
            if (!pet) return;

            const petFields = document.getElementById('ref-pet-fields');
            const petInfo = document.getElementById('ref-pet-info-section');
            if (petFields) {
                petFields.classList.remove('hidden');
                document.getElementById('ref-pet-name').value = pet.pet_name || '';
                document.getElementById('ref-pet-species').value = [pet.pet_type, pet.breed].filter(Boolean).join(' / ');
                document.getElementById('ref-pet-gender').value = pet.gender || '';
                document.getElementById('ref-pet-weight').value = pet.weight ? `${pet.weight} กก.` : '';
            }
            if (petInfo) petInfo.classList.add('hidden');

            const { data: records } = await db
                .from('medical_records')
                .select('*, medical_record_items(*)')
                .eq('animal_id', petId)
                .order('created_at', { ascending: false })
                .limit(1);

            if (!records || records.length === 0) return;
            const rec = records[0];

            const hxEl = document.getElementById('ref-hx');
            if (hxEl && !hxEl.value) {
                const parts = [];
                if (rec.cc) parts.push(`CC: ${rec.cc}`);
                if (rec.hx) parts.push(`Hx: ${rec.hx}`);
                hxEl.value = parts.join('\n');
            }

            const peEl = document.getElementById('ref-pe');
            if (peEl && !peEl.value && rec.pe) peEl.value = rec.pe;

            const labItems = (rec.medical_record_items || []).filter(i => i.item_type === 'Lab');
            const otherExamEl = document.getElementById('ref-other-exam');
            if (otherExamEl && !otherExamEl.value && labItems.length > 0) {
                otherExamEl.value = labItems.map(i => i.item_name).join(', ');
            }

            const dxEl = document.getElementById('ref-dx');
            if (dxEl && !dxEl.value && rec.dx) dxEl.value = rec.dx;

            const txItems = (rec.medical_record_items || []).filter(i => i.item_type === 'Tx');
            const rxItems = (rec.medical_record_items || []).filter(i => i.item_type === 'Rx');
            const treatmentEl = document.getElementById('ref-treatment');
            if (treatmentEl && !treatmentEl.value) {
                const parts = [];
                if (txItems.length > 0) parts.push(`Tx: ${txItems.map(i => i.item_name).join(', ')}`);
                if (rxItems.length > 0) {
                    parts.push(`Rx: ${rxItems.map(formatRxItem).join(', ')}`);
                }
                if (parts.length > 0) treatmentEl.value = parts.join('\n');
            }
        }

        function formatRxItem(i) {
            let s = i.item_name;
            if (i.dose_per_time) s += ` ${i.dose_per_time}${i.unit || ''}`;
            if (i.frequency) s += ` ${i.frequency}`;
            if (i.duration_days) s += ` ${i.duration_days} วัน`;
            return s;
        }

        function clearEchoPetFields() {
            const petFields = document.getElementById('echo-pet-fields');
            const petInfo = document.getElementById('echo-pet-info-section');
            if (petFields) petFields.classList.add('hidden');
            if (petInfo) petInfo.classList.remove('hidden');
            ['echo-pet-name','echo-pet-species','echo-pet-gender','echo-pet-weight',
             'echo-dx','echo-treatment','echo-note'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.value = '';
            });
        }

        async function loadEchoDataForPet(petId) {
            const pet = ownerPets.find(p => p.id.toString() === petId.toString());
            if (!pet) return;
            const petFields = document.getElementById('echo-pet-fields');
            const petInfo = document.getElementById('echo-pet-info-section');
            if (petFields) {
                petFields.classList.remove('hidden');
                document.getElementById('echo-pet-name').value = pet.pet_name || '';
                document.getElementById('echo-pet-species').value = [pet.pet_type, pet.breed].filter(Boolean).join(' / ');
                document.getElementById('echo-pet-gender').value = pet.gender || '';
                document.getElementById('echo-pet-weight').value = pet.weight ? `${pet.weight} กก.` : '';
            }
            if (petInfo) petInfo.classList.add('hidden');
            const { data: records } = await db
                .from('medical_records')
                .select('*, medical_record_items(*)')
                .eq('animal_id', petId)
                .order('created_at', { ascending: false })
                .limit(1);
            if (!records || records.length === 0) return;
            const rec = records[0];
            const dxEl = document.getElementById('echo-dx');
            if (dxEl && !dxEl.value && rec.dx) dxEl.value = rec.dx;

        const MONTH_LABELS_SHORT = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];
        let dldReportData = null;

        function initDldYearSelect() {
            const sel = document.getElementById('dld-year-select');
            if (!sel || sel.options.length > 1) return;
            const currentYear = new Date().getFullYear();
            sel.innerHTML = '';
            for (let y = currentYear; y >= currentYear - 5; y--) {
                const opt = document.createElement('option');
                opt.value = y;
                opt.textContent = y + 543; // Buddhist Era
                sel.appendChild(opt);
            }
        }

        async function loadDldReport() {
            const sel = document.getElementById('dld-year-select');
            const year = parseInt(sel?.value || new Date().getFullYear());
            const loading = document.getElementById('dld-loading');
            const body = document.getElementById('dld-report-body');
            loading.classList.remove('hidden');
            body.innerHTML = '';

            try {
                // Fetch all records in the year with non-empty dld_categories
                const startDate = `${year}-01-01`;
                const endDate = `${year + 1}-01-01`;
                const { data: records, error } = await db
                    .from('medical_records')
                    .select('created_at, dld_categories, animal_id')
                    .gte('created_at', startDate)
                    .lt('created_at', endDate)
                    .not('dld_categories', 'is', null);

                if (error) throw error;

                const filtered = (records || []).filter(r => Array.isArray(r.dld_categories) && r.dld_categories.length > 0);

                if (filtered.length === 0) {
                    body.innerHTML = `<div class="text-center py-20 text-gray-500 italic">ไม่พบข้อมูลรายงาน DLD ในปี ${year + 543}<br><span class="text-sm">กรุณาบันทึกการรักษาพร้อมเลือกหมวดหมู่กรมปศุสัตว์ใน medrec.html</span></div>`;
                    loading.classList.add('hidden');
                    return;
                }

                // Get pet types for all involved animal IDs
                const animalIds = [...new Set(filtered.map(r => r.animal_id))];
                const { data: animals } = await db.from('animals').select('id, pet_type').in('id', animalIds);
                const petTypeMap = {};
                (animals || []).forEach(a => { petTypeMap[a.id] = a.pet_type; });

                // Build aggregation structure: { mainCat: { item: { month: { dog, cat } } } }
                const agg = {};
                Object.keys(DLD_DEF).forEach(mainCat => {
                    agg[mainCat] = {};
                    DLD_DEF[mainCat].items.forEach(item => {
                        agg[mainCat][item] = {};
                        for (let m = 1; m <= 12; m++) agg[mainCat][item][m] = { dog: 0, cat: 0 };
                    });
                });

                filtered.forEach(rec => {
                    const month = new Date(rec.created_at).getMonth() + 1;
                    const petType = petTypeMap[rec.animal_id] || '';
                    const isDog = petType === 'สุนัข';
                    rec.dld_categories.forEach(key => {
                        const colonIdx = key.indexOf(':');
                        if (colonIdx === -1) return;
                        const main = key.substring(0, colonIdx);
                        const item = key.substring(colonIdx + 1);
                        if (agg[main] && agg[main][item]) {
                            if (isDog) agg[main][item][month].dog++;
                            else agg[main][item][month].cat++;
                        }
                    });
                });

                dldReportData = { year, agg };
                renderDldTables(year, agg);
            } catch (err) {
                const isDldColumnMissing = err.message && err.message.includes('dld_categories') && err.message.includes('does not exist');
                if (isDldColumnMissing) {
                    body.innerHTML = `<div class="text-center py-12 px-4">
                        <div class="text-4xl mb-4">⚠️</div>
                        <p class="text-amber-400 font-bold text-base mb-2">ยังไม่ได้อัปเดต Schema ฐานข้อมูล</p>
                        <p class="text-gray-400 text-sm mb-4">Column <code class="bg-white/10 px-1 rounded text-red-300">dld_categories</code> ยังไม่มีในตาราง <code class="bg-white/10 px-1 rounded text-red-300">medical_records</code></p>
                        <p class="text-gray-400 text-sm mb-5">กรุณารัน SQL Migration ใน <strong class="text-white">Supabase → SQL Editor</strong> เพื่อเพิ่ม Column ที่ขาดหายไป</p>
                        <a href="set-db.html" class="inline-flex items-center gap-2 bg-teal-600 hover:bg-teal-500 text-white font-bold px-5 py-2.5 rounded-xl transition text-sm">🛠️ ไปที่หน้าจัดการฐานข้อมูล</a>
                    </div>`;
                } else {
                    body.innerHTML = `<div class="text-red-400 text-center py-10">เกิดข้อผิดพลาด: ${err.message}</div>`;
                }
            }
            loading.classList.add('hidden');
        }

        function renderDldTables(year, agg) {
            const body = document.getElementById('dld-report-body');
            const yearBE = year + 543;
            let html = `<div class="text-center mb-6 text-gray-400 text-sm">คลินิกรักษาสัตว์หมอปิติพัฒน์ | รายงานสรุปประจำปี พ.ศ. ${yearBE}</div>`;

            Object.entries(DLD_DEF).forEach(([mainCat, def]) => {
                html += `
                <div class="section-card overflow-x-auto mb-8" id="dld-table-${mainCat}">
                    <h3 class="text-xl font-black mb-4" style="color:${def.color}">${def.label} — ปี พ.ศ. ${yearBE}</h3>
                    <table class="dld-table">
                        <thead>
                            <tr>
                                <th rowspan="2" style="text-align:left; min-width:140px;">ประเภท</th>
                                ${MONTH_LABELS_SHORT.map(m => `<th colspan="2">${m}</th>`).join('')}
                                <th colspan="2">รวม</th>
                            </tr>
                            <tr>
                                ${MONTH_LABELS_SHORT.map(() => `<th class="col-dog">🐶</th><th class="col-cat">🐱</th>`).join('')}
                                <th class="col-dog">🐶</th><th class="col-cat">🐱</th>
                            </tr>
                        </thead>
                        <tbody>`;

                let totalDog = new Array(12).fill(0);
                let totalCat = new Array(12).fill(0);

                def.items.forEach(item => {
                    const rowDog = [], rowCat = [];
                    let sumDog = 0, sumCat = 0;
                    for (let m = 1; m <= 12; m++) {
                        const d = agg[mainCat][item][m].dog;
                        const c = agg[mainCat][item][m].cat;
                        rowDog.push(d); rowCat.push(c);
                        sumDog += d; sumCat += c;
                        totalDog[m - 1] += d; totalCat[m - 1] += c;
                    }
                    const hasData = sumDog + sumCat > 0;
                    html += `<tr style="${hasData ? '' : 'opacity:0.3'}">
                        <td>${item}</td>
                        ${rowDog.map((d, i) => `<td class="col-dog">${d || ''}</td><td class="col-cat">${rowCat[i] || ''}</td>`).join('')}
                        <td class="col-dog font-bold">${sumDog || ''}</td><td class="col-cat font-bold">${sumCat || ''}</td>
                    </tr>`;
                });

                // Total row
                const grandDog = totalDog.reduce((a, b) => a + b, 0);
                const grandCat = totalCat.reduce((a, b) => a + b, 0);
                html += `<tr class="total-row">
                    <td>รวม</td>

        function buildDldCsvData() {
            if (!dldReportData) return null;
            const { year, agg } = dldReportData;
            const yearBE = year + 543;
            let csv = `\uFEFF`; // BOM for Thai charset in Excel
            csv += `รายงานสรุปประจำปี พ.ศ. ${yearBE} — คลินิกรักษาสัตว์หมอปิติพัฒน์\n\n`;

            Object.entries(DLD_DEF).forEach(([mainCat, def]) => {
                csv += `${def.label}\n`;
                csv += `ประเภท,` + MONTH_LABELS_SHORT.flatMap(m => [`${m}(🐶)`, `${m}(🐱)`]).join(',') + `,รวม(🐶),รวม(🐱)\n`;

                def.items.forEach(item => {
                    let row = `"${item}",`;
                    let sumDog = 0, sumCat = 0;
                    for (let m = 1; m <= 12; m++) {
                        const d = agg[mainCat][item][m].dog;
                        const c = agg[mainCat][item][m].cat;
                        sumDog += d; sumCat += c;
                        row += `${d},${c},`;
                    }
                    csv += row + `${sumDog},${sumCat}\n`;
                });

                // Total row
                let totalRow = 'รวม,';
                let grandDog = 0, grandCat = 0;
                for (let m = 1; m <= 12; m++) {
                    let md = 0, mc = 0;
                    def.items.forEach(item => { md += agg[mainCat][item][m].dog; mc += agg[mainCat][item][m].cat; });
                    grandDog += md; grandCat += mc;
                    totalRow += `${md},${mc},`;
                }
                csv += totalRow + `${grandDog},${grandCat}\n\n`;
            });
            return csv;
        }

        async function shareHtmlAsFile(html, filename, title) {
            try {
                const file = new File([html], filename, { type: 'text/html' });
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({ title, files: [file] });
                    return;
                }
                if (navigator.share) {
                    await navigator.share({ title, text: title });
                    return;
                }
            } catch(e) {
                if (e.name !== 'AbortError') console.error('Share error:', e);
                else return;
            }
            // Fallback: open in new window for user to print/save
            const win = window.open('', '_blank');
            if (!win) return alert('❌ กรุณาอนุญาตการเปิด popup ใน browser');
            win.document.write(html);
            win.document.close();
        }

                const base = `position:absolute; top:${parseFloat(l.y)}mm; left:${l.x}mm;`;
                if (l.type === 'image') {
                    return `<div style="${base} width:${l.w}mm; height:${l.h}mm; overflow:hidden;"><img src="${l.url || ''}" style="width:100%;height:100%;object-fit:contain;" /></div>`;
                } else if (l.type === 'rect') {
                    return `<div style="${base} width:${l.w}mm; height:${l.h}mm; border:1px solid ${l.color || '#000'};"></div>`;
                } else {
                    const content = (l.text || "").replace(/\{\{(.*?)\}\}/g, (m, k) => { const val = dataMap[k.trim()]; return val !== undefined ? val : m; });
                    const fw = l.bold ? 'font-weight:bold;' : '';
                    const fs = l.italic ? 'font-style:italic;' : '';
                    const td = l.underline ? 'text-decoration:underline;' : '';
                    const alignStyle = l.align === 'center' ? 'left:0; width:100%; text-align:center;' :
                                       l.align === 'right' ? `left:0; width:100%; text-align:right; padding-right:${l.x}mm;` : '';
                    const widthStyle = alignStyle ? '' : `width:${pw - parseFloat(l.x)}mm;`;
                    return `<div style="${base} ${widthStyle} font-family:'${l.font || 'Sarabun'}',sans-serif; font-size:${l.size}pt; color:${l.color || '#000'}; ${fw} ${fs} ${td} ${alignStyle}">${content}</div>`;
                }
            }).join('');
            const iframe = document.createElement('iframe');
            iframe.style.cssText = 'position:fixed;top:0;left:0;width:0;height:0;border:0;visibility:hidden;';
            document.body.appendChild(iframe);
            const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
            iframeDoc.open();
            iframeDoc.write(`<html><head><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><style>@page{size:${pw}mm ${ph}mm; margin:0;} html,body{margin:0; padding:0; font-family:'Sarabun',sans-serif;} *{box-sizing:border-box;}</style></head><body><div style="position:relative; width:${pw}mm; height:${ph}mm;">${elements}</div></body></html>`);
            iframeDoc.close();
            iframe.contentWindow.document.fonts.ready.then(function() {
                iframe.contentWindow.addEventListener('afterprint', function() {
                    try { document.body.removeChild(iframe); } catch(e) { console.warn(e); }
                }, { once: true });
                iframe.contentWindow.print();
            });
        }
    </script>
<button class="sidebar-toggle" id="sidebar-toggle-btn" onclick="toggleSidebar()">☰ รายชื่อ</button>
