<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คลังยา PK-VMS Pro | Master Data</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Kanit:wght@300;400;500;600;700&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="ui-settings.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>

    <style>
        :root { --navy: #020617; --navy-light: #0f172a; --teal: #14b8b1; --border: rgba(255, 255, 255, 0.1); }
        * { font-family: "Sarabun", sans-serif !important; }
        body { background: var(--navy); color: #e2e8f0; font-size: 1rem; }
        
        /* ปรับขนาดตัวหนังสือใน input ให้ชัดเจนและเท่ากันทั้งหมด */
        .input-box { 
            background: rgba(0,0,0,0.3); 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            padding: 10px 14px; 
            color: white; 
            width: 100%; 
            outline: none; 
            transition: 0.2s; 
            font-size: 1rem; /* ขนาดเท่ากับตัวหนังสือ SID เดิม */
        }
        .input-box:focus { border-color: var(--teal); background: rgba(0,0,0,0.5); }
        
        .label-clinical { color: var(--teal); font-weight: 700; font-size: 1rem; margin-bottom: 6px; display: block; text-transform: uppercase; }
        .section-card { background: rgba(30, 41, 59, 0.4); border-radius: 20px; padding: 25px; border: 1px solid var(--border); }
        
        .med-item { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 12px; padding: 12px; cursor: pointer; transition: 0.2s; }
        .med-item:hover { border-color: var(--teal); background: rgba(20, 184, 177, 0.05); }
        
        .dose-table-header { font-size: 0.9rem; font-weight: 800; color: var(--teal); opacity: 0.8; margin-bottom: 4px; padding: 0 8px; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        /* ─── Responsive fixes ─── */
        @media (max-width: 767px) {
            .section-card { padding: 1rem !important; border-radius: 12px; }
            header .flex.items-center.gap-4 { gap: 0.75rem; }
        }
    </style>
</head>
<body class="p-4 md:p-6">

    <div class="max-w-[1400px] mx-auto">
        <header class="flex flex-wrap justify-between items-center gap-4 mb-8">
            <div class="flex items-center gap-4">
                <button onclick="goBack()" class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center hover:bg-white/10 transition-all text-2xl flex-shrink-0">⬅️</button>
                <div>
                    <h1 class="text-xl md:text-3xl font-black text-white">จัดการคลังยา (Master Data)</h1>
                    <p class="text-teal-400 text-sm md:text-base font-bold">บันทึกข้อมูลยาและ Dose ไกด์ไลน์สำหรับสัตว์</p>
                </div>
            </div>
            <button onclick="addNewMed()" class="bg-teal-500 hover:bg-teal-400 text-navy px-6 py-3 rounded-full font-black shadow-lg transition-all text-base">+ เพิ่มยาใหม่</button>
        </header>

        <div class="grid grid-cols-12 gap-6">
            <div class="col-span-12 lg:col-span-3">
                <div class="section-card h-auto lg:h-[calc(100vh-180px)] flex flex-col">
                    <label class="label-clinical">🔍 ค้นหายา</label>
                    <input type="text" id="med-search" class="input-box mb-4" placeholder="ชื่อยา..." oninput="filterMeds()">
                    <div id="med-list" class="space-y-2 overflow-y-auto flex-1 pr-1"></div>
                </div>
            </div>

            <div class="col-span-12 lg:col-span-9">
                <div class="section-card border-t-8 border-teal-500">
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                        <div class="md:col-span-2">
                            <label class="label-clinical">ชื่อยา (English Generic Name)</label>
                            <input type="text" id="f_name_en" class="input-box" placeholder="เช่น Amoxicillin">
                        </div>
                        <div class="md:col-span-2">
                            <label class="label-clinical">ชื่อภาษาไทย / ชื่อการค้า</label>
                            <input type="text" id="f_name_th" class="input-box" placeholder="เช่น ยาฆ่าเชื้อสีชมพู">
                        </div>
                        <div>
                            <label class="label-clinical">หมวดหมู่</label>
                            <select id="f_category" class="input-box">
                                <option value="Antibiotic">Antibiotic (ฆ่าเชื้อ)</option>
                                <option value="NSAIDs">NSAIDs (แก้ปวดลดอักเสบ)</option>
                                <option value="Antiprotozoal">Antiprotozoal</option>
                                <option value="Heart">Heart (โรคหัวใจ)</option>
                                <option value="Supplements">บำรุง / วิตามิน</option>
                                <option value="Other">อื่นๆ</option>
                            </select>
                        </div>
                        <div>
                            <label class="label-clinical">ความเข้มข้น</label>
                            <div class="flex items-center gap-2">
                                <input type="number" id="f_conc" class="input-box" placeholder="0">
                                <span class="text-sm font-bold text-slate-400">mg/unit</span>
                            </div>
                        </div>
                        <div>
                            <label class="label-clinical">หน่วย (Unit)</label>
                            <select id="f_unit" class="input-box" onchange="toggleBottleVolumeField()">
                                <option value="tablet">Tablet (เม็ด)</option>
                                <option value="capsule">Capsule (แคปซูล)</option>
                                <option value="mL">mL (มิลลิลิตร)</option>
                                <option value="bottle">Bottle (ขวด)</option>
                            </select>
                        </div>
                        <div>
                            <label class="label-clinical text-yellow-400" id="price-label">ราคาขาย (฿/หน่วย)</label>
                            <input type="number" id="f_price" class="input-box text-yellow-400 font-bold" placeholder="0.00">
                        </div>
                        <div id="bottle-volume-field" class="hidden md:col-span-2" style="display:none;">
                            <label class="label-clinical text-teal-400">🧪 ขนาดขวด (mL/ขวด) — สำหรับยาน้ำที่จ่ายเป็นขวด</label>
                            <input type="number" id="f_bottle_volume_ml" class="input-box" placeholder="เช่น 60 หมายถึง 60 mL/ขวด" min="0" step="1" oninput="toggleBottleVolumeField()">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                        <div class="bg-blue-500/5 p-5 rounded-2xl border border-blue-500/20 shadow-inner">
                            <h3 class="text-blue-400 font-black text-xl mb-4 flex items-center gap-2">🐕 DOG DOSAGE GUIDE</h3>
                            <div class="grid grid-cols-12 gap-2 dose-table-header uppercase">
                                <div class="col-span-4">Dose (mg/kg)</div>
                                <div class="col-span-8">For (Indication)</div>
                            </div>
                            <div class="space-y-3">
                                <div class="grid grid-cols-12 gap-2">
                                    <input type="number" id="f_dog_dose_1" class="col-span-4 input-box text-center" placeholder="0">
                                    <input type="text" id="f_dog_for_1" class="col-span-8 input-box" placeholder="Dose 1: เช่น General">
                                </div>
                                <div class="grid grid-cols-12 gap-2">
                                    <input type="number" id="f_dog_dose_2" class="col-span-4 input-box text-center" placeholder="0">
                                    <input type="text" id="f_dog_for_2" class="col-span-8 input-box" placeholder="Dose 2: เช่น Skin">
                                </div>
                                <div class="grid grid-cols-12 gap-2">
                                    <input type="number" id="f_dog_dose_3" class="col-span-4 input-box text-center" placeholder="0">
                                    <input type="text" id="f_dog_for_3" class="col-span-8 input-box" placeholder="Dose 3: เช่น Ortho">
                                </div>
                            </div>
                        </div>

                        <div class="bg-pink-500/5 p-5 rounded-2xl border border-pink-500/20 shadow-inner">
                            <h3 class="text-pink-400 font-black text-xl mb-4 flex items-center gap-2">🐈 CAT DOSAGE GUIDE</h3>
                            <div class="grid grid-cols-12 gap-2 dose-table-header uppercase">
                                <div class="col-span-4">Dose (mg/kg)</div>
                                <div class="col-span-8">For (Indication)</div>
                            </div>
                            <div class="space-y-3">
                                <div class="grid grid-cols-12 gap-2">
                                    <input type="number" id="f_cat_dose_1" class="col-span-4 input-box text-center" placeholder="0">
                                    <input type="text" id="f_cat_for_1" class="col-span-8 input-box" placeholder="...">
                                </div>
                                <div class="grid grid-cols-12 gap-2">
                                    <input type="number" id="f_cat_dose_2" class="col-span-4 input-box text-center" placeholder="0">
                                    <input type="text" id="f_cat_for_2" class="col-span-8 input-box" placeholder="...">
                                </div>
                                <div class="grid grid-cols-12 gap-2">
                                    <input type="number" id="f_cat_dose_3" class="col-span-4 input-box text-center" placeholder="0">
                                    <input type="text" id="f_cat_for_3" class="col-span-8 input-box" placeholder="...">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="mb-8">
                        <label class="label-clinical text-red-400">🚨 คำเตือน / ข้อควรระวัง (จะแสดงบนฉลากยา)</label>
                        <textarea id="f_side_effects" class="input-box h-28 text-lg" placeholder="ระบุคำเตือนที่จำเป็นสำหรับสติ๊กเกอร์ยา..."></textarea>
                    </div>

                    <div class="flex justify-between items-center pt-6 border-t border-white/10">
                        <button onclick="deleteMed()" id="btn-delete" class="hidden text-red-500 hover:text-red-400 font-black px-6 text-lg transition-all">🗑️ ลบออกจากคลัง</button>
                        <div class="flex gap-4 ml-auto">
                            <button onclick="addNewMed()" class="px-8 py-3 rounded-xl bg-white/5 border border-white/10 font-bold hover:bg-white/10 transition-all">ล้างฟอร์ม</button>
                            <button onclick="saveMedMaster()" class="px-12 py-3 rounded-xl bg-teal-500 text-navy font-black text-xl hover:bg-teal-400 shadow-xl transition-all">💾 บันทึกข้อมูลคลังยา</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let meds = [], selectedMed = null;

        window.onload = async () => { await fetchMeds(); };

        async function fetchMeds() {
            const { data } = await db.from('pharmacy').select('*').order('item_name');
            meds = data || [];
            renderMedList(meds);
        }

        function renderMedList(data) {
            document.getElementById('med-list').innerHTML = data.map(m => `
                <div class="med-item" onclick="selectMed('${m.id}')">
                    <div class="font-black text-white text-base uppercase tracking-tight">${m.item_name}</div>
                    <div class="text-sm text-teal-500/70 font-bold">${m.name_th || ''}</div>
                </div>`).join('');
        }

        function selectMed(id) {
            selectedMed = meds.find(m => m.id === id);
            if (!selectedMed) return;

            document.getElementById('f_name_en').value = selectedMed.item_name || '';
            document.getElementById('f_name_th').value = selectedMed.name_th || '';
            document.getElementById('f_category').value = selectedMed.category || 'Other';
            document.getElementById('f_conc').value = selectedMed.concentration_mg_unit || 1;
            document.getElementById('f_unit').value = selectedMed.unit || 'tablet';
            document.getElementById('f_price').value = selectedMed.price_per_unit || 0;
            document.getElementById('f_bottle_volume_ml').value = selectedMed.bottle_volume_ml || 0;
            document.getElementById('f_side_effects').value = selectedMed.side_effects || '';
            toggleBottleVolumeField();

            // Mapping Dog Doses
            document.getElementById('f_dog_dose_1').value = selectedMed.dog_dose_1 || 0;
            document.getElementById('f_dog_for_1').value = selectedMed.dog_for_1 || '';
            document.getElementById('f_dog_dose_2').value = selectedMed.dog_dose_2 || 0;
            document.getElementById('f_dog_for_2').value = selectedMed.dog_for_2 || '';
            document.getElementById('f_dog_dose_3').value = selectedMed.dog_dose_3 || 0;
            document.getElementById('f_dog_for_3').value = selectedMed.dog_for_3 || '';

            // Mapping Cat Doses
            document.getElementById('f_cat_dose_1').value = selectedMed.cat_dose_1 || 0;
            document.getElementById('f_cat_for_1').value = selectedMed.cat_for_1 || '';
            document.getElementById('f_cat_dose_2').value = selectedMed.cat_dose_2 || 0;
            document.getElementById('f_cat_for_2').value = selectedMed.cat_for_2 || '';
            document.getElementById('f_cat_dose_3').value = selectedMed.cat_dose_3 || 0;
            document.getElementById('f_cat_for_3').value = selectedMed.cat_for_3 || '';

            document.getElementById('btn-delete').classList.remove('hidden');
        }

        async function saveMedMaster() {
            const enName = document.getElementById('f_name_en').value.trim();
            if (!enName) return alert('กรุณาระบุชื่อยา');

            const payload = {
                item_name: enName,
                name_th: document.getElementById('f_name_th').value,
                category: document.getElementById('f_category').value,
                concentration_mg_unit: parseFloat(document.getElementById('f_conc').value),
                unit: document.getElementById('f_unit').value,
                price_per_unit: parseFloat(document.getElementById('f_price').value),
                bottle_volume_ml: parseFloat(document.getElementById('f_bottle_volume_ml').value) || 0,
                side_effects: document.getElementById('f_side_effects').value,
                // Doses & Labels
                dog_dose_1: parseFloat(document.getElementById('f_dog_dose_1').value),
                dog_for_1: document.getElementById('f_dog_for_1').value,
                dog_dose_2: parseFloat(document.getElementById('f_dog_dose_2').value),
                dog_for_2: document.getElementById('f_dog_for_2').value,
                dog_dose_3: parseFloat(document.getElementById('f_dog_dose_3').value),
                dog_for_3: document.getElementById('f_dog_for_3').value,
                cat_dose_1: parseFloat(document.getElementById('f_cat_dose_1').value),
                cat_for_1: document.getElementById('f_cat_for_1').value,
                cat_dose_2: parseFloat(document.getElementById('f_cat_dose_2').value),
                cat_for_2: document.getElementById('f_cat_for_2').value,
                cat_dose_3: parseFloat(document.getElementById('f_cat_dose_3').value),
                cat_for_3: document.getElementById('f_cat_for_3').value,
                is_medication: true
            };

            const { error } = selectedMed 
                ? await db.from('pharmacy').update(payload).eq('id', selectedMed.id)
                : await db.from('pharmacy').insert([payload]);

            if (error) alert('Error: ' + error.message);
            else {
                alert('บันทึกข้อมูลคลังยาสำเร็จ!');
                fetchMeds();
                addNewMed();
            }
        }

        function addNewMed() {
            selectedMed = null;
            document.querySelectorAll('input[type="text"], input[type="number"], textarea').forEach(el => el.value = '');
            document.getElementById('f_conc').value = 1;
            document.getElementById('f_price').value = 0;
            document.getElementById('f_bottle_volume_ml').value = 0;
            document.getElementById('btn-delete').classList.add('hidden');
            toggleBottleVolumeField();
        }

        function toggleBottleVolumeField() {
            const unit = document.getElementById('f_unit').value;
            const bottleVol = parseFloat(document.getElementById('f_bottle_volume_ml').value) || 0;
            const field = document.getElementById('bottle-volume-field');
            const priceLabel = document.getElementById('price-label');
            const unitLabels = { tablet: '฿/เม็ด', capsule: '฿/แคปซูล', bottle: '฿/ขวด' };
            if (unit === 'mL') {
                field.style.display = '';
                if (priceLabel) priceLabel.innerText = `ราคาขาย (${bottleVol > 0 ? '฿/ขวด' : '฿/mL'})`;
            } else {
                field.style.display = 'none';
                if (priceLabel) priceLabel.innerText = `ราคาขาย (${unitLabels[unit] || '฿/หน่วย'})`;
            }
        }

        async function deleteMed() {
            if (confirm('ยืนยันลบยานี้ออกจากระบบ?')) {
                await db.from('pharmacy').delete().eq('id', selectedMed.id);
                fetchMeds();
                addNewMed();
            }
        }

        function filterMeds() {
            const term = document.getElementById('med-search').value.toLowerCase();
            renderMedList(meds.filter(m => m.item_name.toLowerCase().includes(term) || (m.name_th && m.name_th.includes(term))));
        }

        function goBack() { window.location.href = 'index.html'; }
    </script>
</body>
</html>
