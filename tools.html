<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เครื่องมือสัตวแพทย์ | PK-VMS Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Kanit:wght@300;400;500;600;700&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="ui-settings.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --navy: #020617; --navy-mid: #0f172a; --teal: #14b8b1; --border: rgba(255,255,255,0.1); }
        * { font-family: "Sarabun", sans-serif !important; }
        body { background: var(--navy); color: #e2e8f0; margin: 0; overflow: hidden; }
        .sidebar { width: 300px; background: var(--navy-mid); border-right: 1px solid var(--border); }
        .tool-content { flex: 1; overflow-y: auto; padding: 2rem; background: radial-gradient(circle at top right, rgba(20, 184, 177, 0.05), transparent); }
        .nav-item { padding: 12px 20px; cursor: pointer; transition: 0.2s; border-radius: 12px; margin: 4px 12px; color: #94a3b8; font-size: 0.9rem; }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-item.active { background: var(--teal); color: var(--navy); font-weight: 800; }
        .input-group { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .calc-box { background: rgba(0,0,0,0.2); border-radius: 15px; padding: 15px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: var(--teal); font-size: 0.8rem; text-transform: uppercase; padding: 10px; border-bottom: 1px solid var(--border); }
        td { padding: 12px 10px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 0.95rem; }
        .res-val { color: #4ade80; font-weight: 800; font-family: monospace; }
        .conc-select { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; padding: 4px 8px; color: #e2e8f0; font-size: 0.8rem; cursor: pointer; outline: none; max-width: 170px; }
        .conc-select:hover, .conc-select:focus { border-color: var(--teal); }
        .custom-conc-input { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; padding: 4px 8px; color: #e2e8f0; font-size: 0.8rem; outline: none; width: 80px; }
        .custom-conc-input:focus { border-color: var(--teal); }
        .conc-cell-wrapper { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
        .save-conc-btn { background: none; border: none; cursor: pointer; font-size: 1rem; padding: 3px 5px; border-radius: 6px; transition: 0.2s; opacity: 0.55; line-height: 1; }
        .save-conc-btn:hover { opacity: 1; background: rgba(255,255,255,0.08); }
        .badge { display: inline-block; font-size: 0.7rem; padding: 1px 8px; border-radius: 999px; font-weight: 600; white-space: nowrap; }
        .tool-input { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; padding: 8px 12px; color: #e2e8f0; font-size: 0.95rem; outline: none; width: 100%; box-sizing: border-box; }
        .tool-input:focus { border-color: var(--teal); }
        .score-btn { padding: 6px 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05); color: #94a3b8; cursor: pointer; font-size: 0.85rem; transition: 0.15s; }
        .score-btn:hover { border-color: var(--teal); color: #e2e8f0; }
        .score-btn.selected { background: var(--teal); border-color: var(--teal); color: var(--navy); font-weight: 700; }
    </style>
</head>
<body class="flex h-screen">

    <aside class="sidebar flex flex-col shrink-0">
        <div class="p-6 border-b border-white/5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="text-4xl">🧮</span>
                <h1 class="font-bold text-lg text-white">เครื่องมือ</h1>
            </div>
            <a href="index.html" class="flex items-center gap-2 px-3 py-2 rounded-xl bg-white/5 hover:bg-teal-500/20 hover:text-teal-400 transition-all text-gray-300 font-bold text-sm">
                <span class="text-xl">🏠</span><span>หน้าหลัก</span>
            </a>
        </div>
        
        <div class="p-4">
            <label class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-2 block">Patient Data</label>
            <div class="space-y-3">
                <div class="flex gap-2">
                    <button id="btn-dog" onclick="setSpecies('dog')" class="flex-1 py-2 rounded-xl border border-white/10 bg-white/5 active">🐶 Dog</button>
                    <button id="btn-cat" onclick="setSpecies('cat')" class="flex-1 py-2 rounded-xl border border-white/10 bg-white/5">🐱 Cat</button>
                </div>
                <input type="number" id="global-weight" oninput="calculateAll()" placeholder="Weight (kg)" class="w-full bg-black/40 border border-teal-500/30 rounded-xl p-3 text-center text-xl font-bold text-white outline-none">
            </div>
        </div>

        <nav class="flex-1 overflow-y-auto pt-2 custom-scroll">
            <div class="nav-item active" data-tool="emergency" onclick="showTool('emergency')">🚑 Emergency Drugs</div>
            <div class="nav-item" data-tool="anesthetics" onclick="showTool('anesthetics')">💤 Anesthetics</div>
            <div class="nav-item" data-tool="fluids" onclick="showTool('fluids')">💧 Fluid Therapy</div>
            <div class="nav-item" data-tool="cris" onclick="showTool('cris')">🧪 CRI's</div>
            <div class="nav-item" data-tool="transfusions" onclick="showTool('transfusions')">🩸 Transfusions</div>
            <div class="nav-item" data-tool="conversion" onclick="showTool('conversion')">🔄 Unit Conversion</div>
            <div class="nav-item" data-tool="glucose" onclick="showTool('glucose')">📉 Glucose Curve</div>
            <div class="nav-item" data-tool="age" onclick="showTool('age')">🎂 Pet Age</div>
            <div class="nav-item" data-tool="pregnancy" onclick="showTool('pregnancy')">🤰 Pregnancy</div>
            <div class="nav-item" data-tool="pain" onclick="showTool('pain')">📋 Pain Scales</div>
            <div class="nav-item" data-tool="trauma" onclick="showTool('trauma')">💥 Trauma Triage</div>
            <div class="nav-item" data-tool="iris" onclick="showTool('iris')">🏥 IRIS Staging</div>
            <div class="nav-item" data-tool="mitral" onclick="showTool('mitral')">🫀 Mitral (MINE)</div>
            <div class="nav-item" data-tool="rule20" onclick="showTool('rule20')">📜 Rule of 20</div>
        </nav>
    </aside>

    <main class="tool-content">
        <div id="tool-display">
            </div>
    </main>

    <script>
        let patient = { species: 'dog', weight: 0 };
        let currentActiveTool = 'emergency';
        let drugConcentrations = {};
        let drugConcMode = {}; // 'custom' when user selects อื่นๆ ระบุ
        let anestConcentrations = {};
        let anestConcMode = {};
        let criConcentrations = {};
        let criConcMode = {};
        let dehydrationPercent = 5;
        let petAgeInput = '';
        let breedingDate = '';
        let glucoseReadings = [{time:'', glucose:''}];
        let transfData = {currentPCV:'', targetPCV:''};
        let irisData = {creatinine:'', sdma:'', upcr:'', bp:''};
        let mitralData = {grade:'', vhs:'', lviddn:'', laao:''};
        let traumaData = [null, null, null, null, null, null];
        let ruleOf20 = {};

        const emergencyDrugs = [
            { name: 'Atropine',          category: 'Cardiac',           doseText: '0.04 mg/kg IV',        dosePerKg: 0.04,  concentrations: [{value:0.54,label:'0.54 mg/ml'},{value:1.0,label:'1 mg/ml'}] },
            { name: 'Epinephrine',       category: 'Cardiac',           doseText: '0.01 mg/kg IV',        dosePerKg: 0.01,  concentrations: [{value:1.0,label:'1 mg/ml (1:1000)'},{value:0.1,label:'0.1 mg/ml (1:10,000)'}] },
            { name: 'Lidocaine',         category: 'Antiarrhythmic',    doseText: 'Dog: 2 mg/kg | Cat: 0.25 mg/kg IV', speciesDose: {dog:2, cat:0.25},                     concentrations: [{value:20,label:'20 mg/ml (2%)'},{value:10,label:'10 mg/ml (1%)'}] },
            { name: 'Naloxone',          category: 'Reversal',          doseText: '0.04 mg/kg IV',        dosePerKg: 0.04,  concentrations: [{value:0.4,label:'0.4 mg/ml'},{value:1.0,label:'1 mg/ml'}] },
            { name: 'Diazepam',          category: 'Seizure',           doseText: '0.5 mg/kg IV',         dosePerKg: 0.5,   concentrations: [{value:5,label:'5 mg/ml'}] },
            { name: 'Ephedrine',         category: 'Vasopressor',       doseText: '0.05–0.1 mg/kg IV',   dosePerKg: 0.075, concentrations: [{value:3,label:'3 mg/ml'},{value:50,label:'50 mg/ml'}] },
            { name: 'Dexamethasone',     category: 'Anti-inflammatory', doseText: '0.1–0.5 mg/kg IV',    dosePerKg: 0.25,  concentrations: [{value:4,label:'4 mg/ml'},{value:2,label:'2 mg/ml'}] },
            { name: 'Calcium Gluconate', category: 'Electrolyte',       doseText: '50–100 mg/kg slow IV', dosePerKg: 75,    concentrations: [{value:100,label:'100 mg/ml (10%)'}] },
            { name: 'Magnesium Sulfate', category: 'Electrolyte',       doseText: '25–50 mg/kg slow IV',  dosePerKg: 37.5,  concentrations: [{value:500,label:'500 mg/ml (50%)'},{value:250,label:'250 mg/ml (25%)'}] },
            { name: 'Amiodarone',        category: 'Antiarrhythmic',    doseText: '5 mg/kg IV (dog)',     dosePerKg: 5,     concentrations: [{value:50,label:'50 mg/ml'}] },
            { name: 'Dopamine',          category: 'Vasopressor',       doseText: '5–10 μg/kg/min CRI',  dosePerKgMin: 7.5,  isCRI: true, concentrations: [{value:40,label:'40 mg/ml'},{value:200,label:'200 mg/ml'}] },
            { name: 'Isoproterenol',     category: 'Cardiac',           doseText: '0.01–0.1 μg/kg/min CRI', dosePerKgMin: 0.05, isCRI: true, concentrations: [{value:0.2,label:'0.2 mg/ml'}] },
        ];

        const anestheticDrugs = [
            { name: 'Acepromazine',      category: 'Premed',       doseText: '0.025–0.05 mg/kg IM/IV', dosePerKg: 0.05, concentrations: [{value:10,label:'10 mg/ml'}] },
            { name: 'Dexmedetomidine',   category: 'Premed',       doseText: 'Dog: 10 μg/kg | Cat: 20 μg/kg IM', speciesDose:{dog:0.01,cat:0.02}, concentrations: [{value:0.5,label:'0.5 mg/ml (500 μg/ml)'}] },
            { name: 'Butorphanol',       category: 'Premed',       doseText: '0.2–0.4 mg/kg IM/IV', dosePerKg: 0.3, concentrations: [{value:10,label:'10 mg/ml'}] },
            { name: 'Buprenorphine',     category: 'Premed',       doseText: '0.01–0.02 mg/kg IM/IV', dosePerKg: 0.02, concentrations: [{value:0.3,label:'0.3 mg/ml'}] },
            { name: 'Morphine (Premed)', category: 'Premed',       doseText: 'Dog: 0.3 mg/kg | Cat: 0.1 mg/kg IM', speciesDose:{dog:0.3,cat:0.1}, concentrations: [{value:10,label:'10 mg/ml'},{value:1,label:'1 mg/ml'}] },
            { name: 'Methadone',         category: 'Premed',       doseText: '0.1–0.3 mg/kg IM/IV', dosePerKg: 0.2, concentrations: [{value:10,label:'10 mg/ml'}] },
            { name: 'Propofol',          category: 'Induction',    doseText: '4–6 mg/kg IV (to effect)', dosePerKg: 4, concentrations: [{value:10,label:'10 mg/ml (1%)'}] },
            { name: 'Alfaxalone',        category: 'Induction',    doseText: 'Dog: 2 mg/kg | Cat: 3 mg/kg IV', speciesDose:{dog:2,cat:3}, concentrations: [{value:10,label:'10 mg/ml'}] },
            { name: 'Ketamine',          category: 'Induction',    doseText: '5 mg/kg IV (+ co-induction)', dosePerKg: 5, concentrations: [{value:100,label:'100 mg/ml (10%)'}] },
            { name: 'Diazepam',          category: 'Co-induction', doseText: '0.25–0.5 mg/kg IV', dosePerKg: 0.25, concentrations: [{value:5,label:'5 mg/ml'}] },
            { name: 'Midazolam',         category: 'Co-induction', doseText: '0.2–0.4 mg/kg IV/IM', dosePerKg: 0.3, concentrations: [{value:5,label:'5 mg/ml'},{value:1,label:'1 mg/ml'}] },
            { name: 'Atipamezole',       category: 'Reversal',     doseText: '5× dex dose volume IM', dosePerKg: 0.05, concentrations: [{value:5,label:'5 mg/ml'}] },
            { name: 'Naloxone',          category: 'Reversal',     doseText: '0.04 mg/kg IV/IM', dosePerKg: 0.04, concentrations: [{value:0.4,label:'0.4 mg/ml'},{value:1.0,label:'1 mg/ml'}] },
            { name: 'Flumazenil',        category: 'Reversal',     doseText: '0.01 mg/kg IV', dosePerKg: 0.01, concentrations: [{value:0.1,label:'0.1 mg/ml'}] },
        ];

        const criDrugs = [
            { name: 'Fentanyl',        category: 'Opioid',      doseText: '2–10 μg/kg/hr',    doseUnit: 'μg/kg/hr',  doseVal: 5,    concentrations: [{value:0.05,label:'0.05 mg/ml (50 μg/ml)'}] },
            { name: 'Morphine',        category: 'Opioid',      doseText: '0.1–0.5 mg/kg/hr', doseUnit: 'mg/kg/hr',  doseVal: 0.2,  concentrations: [{value:1,label:'1 mg/ml'},{value:10,label:'10 mg/ml'}] },
            { name: 'Methadone',       category: 'Opioid',      doseText: '0.1–0.2 mg/kg/hr', doseUnit: 'mg/kg/hr',  doseVal: 0.15, concentrations: [{value:10,label:'10 mg/ml'}] },
            { name: 'Ketamine',        category: 'NMDA',        doseText: '0.2–1 mg/kg/hr',   doseUnit: 'mg/kg/hr',  doseVal: 0.6,  concentrations: [{value:10,label:'10 mg/ml'},{value:100,label:'100 mg/ml'}] },
            { name: 'Lidocaine',       category: 'Analgesic',   doseText: '1.5–3 mg/kg/hr',   doseUnit: 'mg/kg/hr',  doseVal: 2,    concentrations: [{value:20,label:'20 mg/ml (2%)'},{value:10,label:'10 mg/ml (1%)'}] },
            { name: 'Dexmedetomidine', category: 'α2-agonist',  doseText: '0.5–2 μg/kg/hr',   doseUnit: 'μg/kg/hr',  doseVal: 1,    concentrations: [{value:0.5,label:'0.5 mg/ml (500 μg/ml)'}] },
            { name: 'Dopamine',        category: 'Vasopressor', doseText: '2–10 μg/kg/min',   doseUnit: 'μg/kg/min', doseVal: 5,    concentrations: [{value:40,label:'40 mg/ml'},{value:200,label:'200 mg/ml'}] },
            { name: 'Dobutamine',      category: 'Inotrope',    doseText: '2–15 μg/kg/min',   doseUnit: 'μg/kg/min', doseVal: 5,    concentrations: [{value:12.5,label:'12.5 mg/ml'},{value:50,label:'50 mg/ml'}] },
            { name: 'Norepinephrine',  category: 'Vasopressor', doseText: '0.1–1 μg/kg/min',  doseUnit: 'μg/kg/min', doseVal: 0.3,  concentrations: [{value:1,label:'1 mg/ml'}] },
        ];

        function setSpecies(s) {
            patient.species = s;
            document.getElementById('btn-dog').classList.toggle('bg-teal-600', s==='dog');
            document.getElementById('btn-cat').classList.toggle('bg-teal-600', s==='cat');
            calculateAll();
        }

        function calculateAll() {
            patient.weight = parseFloat(document.getElementById('global-weight').value) || 0;
            renderCurrentTool();
        }

        function showTool(toolId) {
            currentActiveTool = toolId;
            document.querySelectorAll('.nav-item').forEach(el => {
                el.classList.toggle('active', el.dataset.tool === toolId);
            });
            renderCurrentTool();
        }

        function renderCurrentTool() {
            const container = document.getElementById('tool-display');
            const w = patient.weight;
            
            let html = `<h2 class="text-3xl font-black mb-6 uppercase tracking-tight">${currentActiveTool.replace('_',' ')}</h2>`;

            if (currentActiveTool === 'emergency') {
                const catColors = {
                    'Cardiac':'bg-blue-500/20 text-blue-300', 'Antiarrhythmic':'bg-purple-500/20 text-purple-300',
                    'Reversal':'bg-green-500/20 text-green-300', 'Seizure':'bg-yellow-500/20 text-yellow-300',
                    'Vasopressor':'bg-red-500/20 text-red-300', 'Anti-inflammatory':'bg-teal-500/20 text-teal-300',
                    'Electrolyte':'bg-cyan-500/20 text-cyan-300'
                };
                const rows = emergencyDrugs.map((drug, idx) => {
                    const conc = drugConcentrations[idx] !== undefined ? drugConcentrations[idx] : drug.concentrations[0].value;
                    const doseText = drug.speciesDose ? `${drug.speciesDose[patient.species]} mg/kg IV` : drug.doseText;
                    let vol = 0;
                    if (w > 0) {
                        if (drug.isCRI) { vol = (drug.dosePerKgMin * w * 60) / (conc * 1000); }
                        else if (drug.speciesDose) { vol = (drug.speciesDose[patient.species] * w) / conc; }
                        else { vol = (drug.dosePerKg * w) / conc; }
                    }
                    const volText = w > 0 ? vol.toFixed(2) : '—';
                    const volUnit = drug.isCRI ? 'ml/hr' : 'ml';
                    const badgeClass = catColors[drug.category] || 'bg-gray-500/20 text-gray-300';
                    const isCustomMode = drugConcMode[idx] === 'custom';
                    const concOptions = drug.concentrations.map(c =>
                        `<option value="${c.value}"${!isCustomMode && c.value === conc ? ' selected' : ''}>${c.label}</option>`
                    ).join('') + `<option value="custom"${isCustomMode ? ' selected' : ''}>อื่นๆ ระบุ</option>`;
                    const customInput = isCustomMode
                        ? `<input type="number" class="custom-conc-input" placeholder="mg/ml" value="${conc > 0 ? conc : ''}" onchange="changeCustomConc(${idx},this.value)" min="0.001" step="any">`
                        : '';
                    const concCell = `<div class="conc-cell-wrapper"><select class="conc-select" onchange="changeEmergencyConc(${idx},this.value)">${concOptions}</select>${customInput}<button class="save-conc-btn" data-save-btn="${idx}" onclick="saveEmergencyConc(${idx})" title="บันทึกความเข้มข้นเริ่มต้น">💾</button></div>`;
                    return `<tr>
                        <td><div class="font-semibold">${drug.name}</div><span class="badge ${badgeClass}">${drug.category}</span></td>
                        <td class="text-gray-300 text-sm">${doseText}</td>
                        <td>${concCell}</td>
                        <td class="res-val">${volText} <span class="text-xs text-gray-500 font-normal">${volUnit}</span></td>
                    </tr>`;
                }).join('');
                html += `<div class="overflow-hidden rounded-2xl border border-white/5 bg-white/5">
                    <table>
                        <thead><tr><th>Drug</th><th>Dosage</th><th>Concentration</th><th>Volume</th></tr></thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>`;
            } 
            
            else if (currentActiveTool === 'anesthetics') {
                const anestCatColors = {
                    'Premed':       'bg-indigo-500/20 text-indigo-300',
                    'Induction':    'bg-orange-500/20 text-orange-300',
                    'Co-induction': 'bg-yellow-500/20 text-yellow-300',
                    'Reversal':     'bg-green-500/20 text-green-300'
                };
                const rows = anestheticDrugs.map((drug, idx) => {
                    const conc = anestConcentrations[idx] !== undefined ? anestConcentrations[idx] : drug.concentrations[0].value;
                    const doseText = drug.speciesDose ? `${drug.speciesDose[patient.species]} mg/kg` : drug.doseText;
                    let vol = 0;
                    if (w > 0) {
                        const dose = drug.speciesDose ? drug.speciesDose[patient.species] : drug.dosePerKg;
                        vol = (dose * w) / conc;
                    }
                    const volText = w > 0 ? vol.toFixed(2) : '—';
                    const badgeClass = anestCatColors[drug.category] || 'bg-gray-500/20 text-gray-300';
                    const isCustomMode = anestConcMode[idx] === 'custom';
                    const concOptions = drug.concentrations.map(c =>
                        `<option value="${c.value}"${!isCustomMode && c.value === conc ? ' selected' : ''}>${c.label}</option>`
                    ).join('') + `<option value="custom"${isCustomMode ? ' selected' : ''}>อื่นๆ ระบุ</option>`;
                    const customInput = isCustomMode
                        ? `<input type="number" class="custom-conc-input" placeholder="mg/ml" value="${conc > 0 ? conc : ''}" onchange="changeAnestCustomConc(${idx},this.value)" min="0.001" step="any">`
                        : '';
                    const concCell = `<div class="conc-cell-wrapper"><select class="conc-select" onchange="changeAnestConc(${idx},this.value)">${concOptions}</select>${customInput}<button class="save-conc-btn" data-anest-save-btn="${idx}" onclick="saveAnestConc(${idx})" title="บันทึกความเข้มข้นเริ่มต้น">💾</button></div>`;
                    return `<tr>
                        <td><div class="font-semibold">${drug.name}</div><span class="badge ${badgeClass}">${drug.category}</span></td>
                        <td class="text-gray-300 text-sm">${doseText}</td>
                        <td>${concCell}</td>
                        <td class="res-val">${volText} <span class="text-xs text-gray-500 font-normal">ml</span></td>
                    </tr>`;
                }).join('');
                html += `<div class="overflow-hidden rounded-2xl border border-white/5 bg-white/5">
                    <table>
                        <thead><tr><th>Drug</th><th>Dosage</th><th>Concentration</th><th>Volume</th></tr></thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>`;
            }

            else if (currentActiveTool === 'fluids') {
                const maint = patient.species === 'dog' ? (w * 60) : (w * 40);
                const dehydVol = w > 0 ? (dehydrationPercent / 100) * w * 1000 : 0;
                const shockVol = w > 0 ? (patient.species === 'dog' ? w * 90 : w * 45) : 0;
                html += `
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div class="calc-box">
                        <label class="block text-gray-400 text-xs mb-2">Maintenance Rate</label>
                        <div class="text-3xl font-black text-teal-400">${w > 0 ? maint.toFixed(1) : '—'} ml/day</div>
                        <div class="text-sm mt-1">${w > 0 ? (maint/24).toFixed(1) : '—'} ml/hr</div>
                    </div>
                    <div class="calc-box">
                        <label class="block text-gray-400 text-xs mb-2">Shock Dose (Bolus)</label>
                        <div class="text-3xl font-black text-orange-400">${w > 0 ? shockVol : '—'} ml</div>
                        <div class="text-xs text-gray-500 mt-1">1/4 dose over 15 mins</div>
                    </div>
                </div>
                <div class="calc-box mb-4">
                    <label class="block text-gray-400 text-xs mb-3">Dehydration Replacement</label>
                    <div class="flex gap-2 mb-3 flex-wrap">
                        ${[5,7,10,12].map(p => `<button onclick="setDehydration(${p})" class="score-btn${dehydrationPercent===p?' selected':''}">${p}%</button>`).join('')}
                    </div>
                    <div class="text-2xl font-black text-teal-400">${w > 0 ? dehydVol.toFixed(0) : '—'} ml</div>
                    <div class="text-xs text-gray-500 mt-1">Replace over 4–6 hrs (${w > 0 ? (dehydVol/6).toFixed(1) : '—'} – ${w > 0 ? (dehydVol/4).toFixed(1) : '—'} ml/hr)</div>
                </div>
                <div class="calc-box">

                if (!isNaN(grade) && grade >= 1) {
                    if (grade === 0) { mmvdStage = 'A'; stageColor = 'text-gray-400'; stageDesc2 = 'At-risk breed, no murmur detected'; }
                    else if (!hasEnlargement) { mmvdStage = 'B1'; stageColor = 'text-yellow-400'; stageDesc2 = 'Murmur present, no cardiac enlargement'; }
                    else { mmvdStage = 'B2'; stageColor = 'text-orange-400'; stageDesc2 = 'Murmur + cardiac enlargement — consider treatment (ACVIM 2019)'; }
                }
                html += `<div class="calc-box mb-4">
                    <label class="block text-xs text-gray-500 mb-2">Heart Murmur Grade</label>
                    <div class="flex gap-2 flex-wrap">
                        ${[0,1,2,3,4,5,6].map(g => `<button onclick="mitralData.grade='${g}'; renderCurrentTool()" class="score-btn${mitralData.grade==g?' selected':''}">${g===0?'None':'Grade '+g}</button>`).join('')}
                    </div>
                </div>
                <div class="grid grid-cols-3 gap-3 mb-4">
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">VHS (vertebrae)</label>
                        <input type="number" class="tool-input" placeholder="e.g. 10.8" value="${mitralData.vhs}" oninput="mitralData.vhs=this.value; renderCurrentTool()" step="0.1">
                        ${!isNaN(vhs) ? `<div class="text-xs mt-1 ${vhsAbnormal?'text-orange-400':'text-green-400'}">${vhsAbnormal?'↑ Enlarged':'Normal (≤10.5)'}</div>` : ''}
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">LVIDDN</label>
                        <input type="number" class="tool-input" placeholder="e.g. 1.85" value="${mitralData.lviddn}" oninput="mitralData.lviddn=this.value; renderCurrentTool()" step="0.01">
                        ${!isNaN(lviddn) ? `<div class="text-xs mt-1 ${lviddnAbnormal?'text-orange-400':'text-green-400'}">${lviddnAbnormal?'↑ Enlarged':'Normal (≤1.7)'}</div>` : ''}
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">LA : Ao ratio</label>
                        <input type="number" class="tool-input" placeholder="e.g. 1.7" value="${mitralData.laao}" oninput="mitralData.laao=this.value; renderCurrentTool()" step="0.01">
                        ${!isNaN(laao) ? `<div class="text-xs mt-1 ${laaoAbnormal?'text-orange-400':'text-green-400'}">${laaoAbnormal?'↑ Enlarged':'Normal (<1.6)'}</div>` : ''}
                    </div>
                </div>
                <div class="calc-box text-center py-6">
                    <div class="text-xs text-gray-500 mb-1 uppercase tracking-wider">MMVD Stage</div>
                    <div class="text-6xl font-black ${stageColor}">${mmvdStage || '—'}</div>
                    ${stageDesc2 ? `<div class="text-sm text-gray-400 mt-2">${stageDesc2}</div>` : ''}
                </div>`;
            }

            else if (currentActiveTool === 'rule20') {
                const items = [
                    'Fluid balance','Oncotic pressure (albumin/colloid)','Glucose',
                    'Electrolytes & acid-base','Oxygenation & ventilation','Mentation & pain/analgesia',
                    'Blood pressure','Heart rate & rhythm','Temperature regulation','Urine output (renal function)',
                    'Red blood cell mass','Coagulation','Bones, joints & muscles','Gastrointestinal tract & nutrition',
                    'Immune status & infection control','Skin & wounds','Drug dosing & metabolism',
                    'Nursing care & physical therapy','Diagnostics & monitoring','Owner communication'
                ];
                const checkedCount = items.filter((_, i) => ruleOf20[i]).length;
                html += `<div class="mb-3 flex items-center gap-3">
                    <div class="text-3xl font-black text-teal-500">${checkedCount}<span class="text-lg text-gray-500"> / ${items.length}</span></div>
                    <div class="text-sm text-gray-400">items addressed</div>
                    <button onclick="Object.keys(ruleOf20).forEach(k=>delete ruleOf20[k]); renderCurrentTool()" class="ml-auto text-xs text-gray-600 hover:text-gray-400 border border-white/10 rounded-lg px-3 py-1">Reset</button>
                </div>
                <div class="grid grid-cols-1 gap-2">
                    ${items.map((item, i) => `
                    <label class="calc-box flex items-center gap-3 cursor-pointer hover:border-teal-500/30 transition">
                        <input type="checkbox" ${ruleOf20[i]?'checked':''} onchange="ruleOf20[${i}]=this.checked; document.getElementById('r20count').textContent=Object.values(ruleOf20).filter(Boolean).length" class="w-4 h-4 accent-teal-500">
                        <span class="text-sm ${ruleOf20[i]?'text-gray-400 line-through':'text-gray-200'}">${i+1}. ${item}</span>
                    </label>`).join('')}
                </div>`.replace('text-3xl font-black text-teal-500">', `text-3xl font-black text-teal-500" id="r20count">`);
            }

            else {
                html += `<div class="p-20 text-center border-2 border-dashed border-white/5 rounded-3xl opacity-30">
                    <div class="text-5xl mb-4">⚙️</div>
                    <p>ระบบการคำนวณสำหรับ ${currentActiveTool.toUpperCase()} กำลังอยู่ในขั้นตอนการพัฒนาเพิ่มเติม</p>
                </div>`;
            }

            container.innerHTML = html;
        }

        function renderTable(headers, rows) {
            return `<div class="overflow-hidden rounded-2xl border border-white/5 bg-white/5">
                <table>
                    <thead><tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr></thead>
                    <tbody>
                        ${rows.map(r => `<tr><td>${r.name}</td><td>${r.dose}</td><td class="res-val">${r.calc.toFixed(2)}</td></tr>`).join('')}
                    </tbody>
                </table>
            </div>`;
        }

        function changeEmergencyConc(idx, val) {
            if (val === 'custom') {
                drugConcMode[idx] = 'custom';
                // Keep existing concentration value for calculation until user types a new one
            } else {
                delete drugConcMode[idx];
                drugConcentrations[idx] = parseFloat(val);
            }
            renderCurrentTool();
        }

        function changeCustomConc(idx, val) {
            const numVal = parseFloat(val);
            if (!isNaN(numVal) && numVal >= 0.001) {
                drugConcentrations[idx] = numVal;
                renderCurrentTool();
            }
        }

        function saveEmergencyConc(idx) {
            const drug = emergencyDrugs[idx];
            const conc = drugConcentrations[idx] !== undefined ? drugConcentrations[idx] : drug.concentrations[0].value;
            const isCustom = drugConcMode[idx] === 'custom';
            localStorage.setItem(`emgConc_${idx}`, JSON.stringify({ value: conc, isCustom }));
            const btn = document.querySelector(`[data-save-btn="${idx}"]`);
            if (btn) { btn.textContent = '✅'; setTimeout(() => { btn.textContent = '💾'; }, 1500); }
        }

        function changeAnestConc(idx, val) {
            if (val === 'custom') {
                anestConcMode[idx] = 'custom';
            } else {
                delete anestConcMode[idx];
                anestConcentrations[idx] = parseFloat(val);
            }
            renderCurrentTool();
        }

        function changeAnestCustomConc(idx, val) {
            const numVal = parseFloat(val);
            if (!isNaN(numVal) && numVal >= 0.001) {
                anestConcentrations[idx] = numVal;
                renderCurrentTool();
            }
        }

        function saveAnestConc(idx) {
            const drug = anestheticDrugs[idx];
            const conc = anestConcentrations[idx] !== undefined ? anestConcentrations[idx] : drug.concentrations[0].value;
            const isCustom = anestConcMode[idx] === 'custom';
            localStorage.setItem(`anestConc_${idx}`, JSON.stringify({ value: conc, isCustom }));
            const btn = document.querySelector(`[data-anest-save-btn="${idx}"]`);
            if (btn) { btn.textContent = '✅'; setTimeout(() => { btn.textContent = '💾'; }, 1500); }
        }

        function changeCriConc(idx, val) {
            if (val === 'custom') {
                criConcMode[idx] = 'custom';
            } else {
                delete criConcMode[idx];
                criConcentrations[idx] = parseFloat(val);
            }
            renderCurrentTool();
        }

        function changeCriCustomConc(idx, val) {
            const numVal = parseFloat(val);
            if (!isNaN(numVal) && numVal >= 0.001) {
                criConcentrations[idx] = numVal;
                renderCurrentTool();
            }
        }

        function saveCriConc(idx) {
            const drug = criDrugs[idx];
            const conc = criConcentrations[idx] !== undefined ? criConcentrations[idx] : drug.concentrations[0].value;
            const isCustom = criConcMode[idx] === 'custom';
            localStorage.setItem(`criConc_${idx}`, JSON.stringify({ value: conc, isCustom }));
            const btn = document.querySelector(`[data-cri-save-btn="${idx}"]`);
            if (btn) { btn.textContent = '✅'; setTimeout(() => { btn.textContent = '💾'; }, 1500); }
        }

        function setDehydration(pct) {
            dehydrationPercent = pct;
            renderCurrentTool();
        }

        function addGlucoseRow() {
            glucoseReadings.push({time:'', glucose:''});
            renderCurrentTool();
        }

        function removeGlucoseRow(idx) {
            if (glucoseReadings.length > 1) {
                glucoseReadings.splice(idx, 1);
                renderCurrentTool();
            }
        }

        function setTrauma(paramIdx, score) {
            traumaData[paramIdx] = score;
            renderCurrentTool();
        }

        window.onload = () => {
            if (sessionStorage.getItem("isLoggedIn") !== "true") window.location.href = "index.html";
            emergencyDrugs.forEach((drug, idx) => {
                const saved = localStorage.getItem(`emgConc_${idx}`);
                if (saved) {
                    try {
                        const data = JSON.parse(saved);
                        drugConcentrations[idx] = data.value;
                        if (data.isCustom) drugConcMode[idx] = 'custom';
                    } catch (e) { console.warn('Failed to parse saved concentration:', e); }
                }
            });
            anestheticDrugs.forEach((drug, idx) => {
                const saved = localStorage.getItem(`anestConc_${idx}`);
                if (saved) {
                    try {
                        const data = JSON.parse(saved);
                        anestConcentrations[idx] = data.value;
                        if (data.isCustom) anestConcMode[idx] = 'custom';
                    } catch (e) { console.warn('Failed to parse saved anesthetic concentration:', e); }
                }
            });
            criDrugs.forEach((drug, idx) => {
                const saved = localStorage.getItem(`criConc_${idx}`);
                if (saved) {
                    try {
                        const data = JSON.parse(saved);
                        criConcentrations[idx] = data.value;
                        if (data.isCustom) criConcMode[idx] = 'custom';
                    } catch (e) { console.warn('Failed to parse saved CRI concentration:', e); }
                }
            });
            setSpecies('dog');
        };
    </script>
</body>
</html>
