<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เครื่องมือสัตวแพทย์ | PK-VMS Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Kanit:wght@300;400;500;600;700&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="ui-settings.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --navy: #020617; --navy-mid: #0f172a; --teal: #14b8b1; --border: rgba(255,255,255,0.1); }
        * { font-family: "Sarabun", sans-serif !important; }
        body { background: var(--navy); color: #e2e8f0; margin: 0; overflow: hidden; }
        .sidebar { width: 300px; background: var(--navy-mid); border-right: 1px solid var(--border); }
        .tool-content { flex: 1; overflow-y: auto; padding: 2rem; background: radial-gradient(circle at top right, rgba(20, 184, 177, 0.05), transparent); }
        .nav-item { padding: 12px 20px; cursor: pointer; transition: 0.2s; border-radius: 12px; margin: 4px 12px; color: #94a3b8; font-size: 0.9rem; }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-item.active { background: var(--teal); color: var(--navy); font-weight: 800; }
        .input-group { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .calc-box { background: rgba(0,0,0,0.2); border-radius: 15px; padding: 15px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: var(--teal); font-size: 0.8rem; text-transform: uppercase; padding: 10px; border-bottom: 1px solid var(--border); }
        td { padding: 12px 10px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 0.95rem; }
        .res-val { color: #4ade80; font-weight: 800; font-family: monospace; }
        .conc-select { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; padding: 4px 8px; color: #e2e8f0; font-size: 0.8rem; cursor: pointer; outline: none; max-width: 170px; }
        .conc-select:hover, .conc-select:focus { border-color: var(--teal); }
        .custom-conc-input { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; padding: 4px 8px; color: #e2e8f0; font-size: 0.8rem; outline: none; width: 80px; }
        .custom-conc-input:focus { border-color: var(--teal); }
        .conc-cell-wrapper { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
        .save-conc-btn { background: none; border: none; cursor: pointer; font-size: 1rem; padding: 3px 5px; border-radius: 6px; transition: 0.2s; opacity: 0.55; line-height: 1; }
        .save-conc-btn:hover { opacity: 1; background: rgba(255,255,255,0.08); }
        /* ─── Responsive Mobile Sidebar ─── */
        .sidebar-toggle {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 60;
            background: var(--teal);
            color: #020617;
            border: none;
            border-radius: 50px;
            padding: 12px 24px;
            font-weight: 900;
            font-size: 0.95rem;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(20,184,177,0.4);
            white-space: nowrap;
            align-items: center;
            gap: 8px;
        }
        .sidebar-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            z-index: 49;
            backdrop-filter: blur(2px);
        }
        @media (max-width: 767px) {
            body { overflow: auto !important; }
            .sidebar {
                position: fixed;
                top: 0;
                left: -100%;
                height: 100%;
                z-index: 50;
                transition: left 0.3s ease;
                overflow-y: auto;
            }
            .sidebar.sidebar-open {
                left: 0;
            }
            .sidebar-backdrop.sidebar-open {
                display: block;
            }
            .sidebar-toggle {
                display: flex;
            }
            .tool-content {
                padding: 1rem !important;
            }
            table { font-size: 0.85rem; }
        }
        .badge { display: inline-block; font-size: 0.7rem; padding: 1px 8px; border-radius: 999px; font-weight: 600; white-space: nowrap; }
        .tool-input { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; padding: 8px 12px; color: #e2e8f0; font-size: 0.95rem; outline: none; width: 100%; box-sizing: border-box; }
        .tool-input:focus { border-color: var(--teal); }
        .score-btn { padding: 6px 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05); color: #94a3b8; cursor: pointer; font-size: 0.85rem; transition: 0.15s; }
        .score-btn:hover { border-color: var(--teal); color: #e2e8f0; }
        .score-btn.selected { background: var(--teal); border-color: var(--teal); color: var(--navy); font-weight: 700; }
        /* Common Drugs: category tabs */
        .cat-tab-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
        .cat-tab-btn { padding: 5px 13px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05); color: #94a3b8; cursor: pointer; font-size: 0.78rem; font-weight: 600; transition: 0.15s; white-space: nowrap; }
        .cat-tab-btn:hover { border-color: var(--teal); color: #e2e8f0; }
        .cat-tab-btn.active { background: var(--teal); border-color: var(--teal); color: var(--navy); font-weight: 700; }
        /* Dosage dropdown */
        .dose-select { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; padding: 4px 8px; color: #e2e8f0; font-size: 0.78rem; cursor: pointer; outline: none; max-width: 200px; width: 100%; }
        .dose-select:hover, .dose-select:focus { border-color: var(--teal); }
        /* Drug search */
        .drug-search-wrap { position: relative; margin-bottom: 12px; }
        .drug-search { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; padding: 8px 14px 8px 36px; color: #e2e8f0; font-size: 0.9rem; outline: none; width: 100%; box-sizing: border-box; }
        .drug-search:focus { border-color: var(--teal); }
        .drug-search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: #64748b; pointer-events: none; font-size: 0.9rem; }
    </style>
</head>
<body class="flex h-screen">

        }

        function setSpecies(s) {
            patient.species = s;
            document.getElementById('btn-dog').classList.toggle('bg-teal-600', s==='dog');
            document.getElementById('btn-cat').classList.toggle('bg-teal-600', s==='cat');
            calculateAll();
        }

        function calculateAll() {
            patient.weight = parseFloat(document.getElementById('global-weight').value) || 0;
            renderCurrentTool();
        }

        function showTool(toolId) {
            closeSidebar();
            currentActiveTool = toolId;
            document.querySelectorAll('.nav-item').forEach(el => {
                el.classList.toggle('active', el.dataset.tool === toolId);
            });
            renderCurrentTool();
        }

                    let vol = 0;
                    if (w > 0) {

                    const isCustomMode = drugConcMode[idx] === 'custom';
                    const concOptions = drug.concentrations.map(c =>

                    'Nursing care & physical therapy','Diagnostics & monitoring','Owner communication'
                ];
                const checkedCount = items.filter((_, i) => ruleOf20[i]).length;
                html += `<div class="mb-3 flex items-center gap-3">
                    <div class="text-3xl font-black text-teal-500">${checkedCount}<span class="text-lg text-gray-500"> / ${items.length}</span></div>
                    <div class="text-sm text-gray-400">items addressed</div>
                    <button onclick="Object.keys(ruleOf20).forEach(k=>delete ruleOf20[k]); renderCurrentTool()" class="ml-auto text-xs text-gray-600 hover:text-gray-400 border border-white/10 rounded-lg px-3 py-1">Reset</button>
                </div>
                <div class="grid grid-cols-1 gap-2">
                    ${items.map((item, i) => `
                    <label class="calc-box flex items-center gap-3 cursor-pointer hover:border-teal-500/30 transition">
                        <input type="checkbox" ${ruleOf20[i]?'checked':''} onchange="ruleOf20[${i}]=this.checked; document.getElementById('r20count').textContent=Object.values(ruleOf20).filter(Boolean).length" class="w-4 h-4 accent-teal-500">
                        <span class="text-sm ${ruleOf20[i]?'text-gray-400 line-through':'text-gray-200'}">${i+1}. ${item}</span>
                    </label>`).join('')}
                </div>`.replace('text-3xl font-black text-teal-500">', `text-3xl font-black text-teal-500" id="r20count">`);
            }

            else if (currentActiveTool === 'common_drugs') {
                const commonCatColors = {
                    'Antibiotic':      'bg-blue-500/20 text-blue-300',
                    'NSAID':           'bg-orange-500/20 text-orange-300',
                    'Corticosteroid':  'bg-yellow-500/20 text-yellow-300',
                    'GI':              'bg-green-500/20 text-green-300',
                    'Antiparasitic':   'bg-teal-500/20 text-teal-300',
                    'Antihistamine':   'bg-purple-500/20 text-purple-300',
                    'Antifungal':      'bg-pink-500/20 text-pink-300',
                    'Antipruritic':    'bg-indigo-500/20 text-indigo-300',
                    'Sedative':        'bg-slate-500/20 text-slate-300',
                    'Analgesic':       'bg-rose-500/20 text-rose-300',
                    'Anesthetic':      'bg-violet-500/20 text-violet-300',
                    'Cardiac':         'bg-cyan-500/20 text-cyan-300',
                    'Diuretic':        'bg-sky-500/20 text-sky-300',
                    'Anticonvulsant':  'bg-amber-500/20 text-amber-300',
                    'Immunosuppressant':'bg-fuchsia-500/20 text-fuchsia-300',
                    'Behavioral':      'bg-lime-500/20 text-lime-300',
                    'Endocrine':       'bg-emerald-500/20 text-emerald-300',
                    'Muscle Relaxant': 'bg-stone-500/20 text-stone-300',
                    'Antidote':        'bg-red-500/20 text-red-300',
                    'Hematology':      'bg-red-900/20 text-red-200',
                    'Respiratory':     'bg-sky-700/20 text-sky-200',
                    'Supplement':      'bg-teal-700/20 text-teal-200',
                    'Chemotherapy':    'bg-gray-700/20 text-gray-200',
                    'Other':           'bg-gray-500/20 text-gray-300'
                };

                // Build ordered unique category list
                const cdCategories = [];
                commonDrugs.forEach(d => { if (!cdCategories.includes(d.category)) cdCategories.push(d.category); });
                if (!commonActiveTab || !cdCategories.includes(commonActiveTab)) commonActiveTab = cdCategories[0];

                // Category tab bar
                const tabBarHtml = `<div class="cat-tab-bar">${cdCategories.map(cat => {
                    const cnt = commonDrugs.filter(d => d.category === cat).length;
                    return `<button onclick="setCommonTab('${cat}')" class="cat-tab-btn${cat === commonActiveTab ? ' active' : ''}">${cat} <span style="opacity:0.6">(${cnt})</span></button>`;
                }).join('')}</div>`;

                // Search box
                const safeSearch = (commonSearch || '').replace(/"/g, '&quot;');
                const searchHtml = `<div class="drug-search-wrap"><span class="drug-search-icon">🔍</span><input type="text" class="drug-search" placeholder="ค้นหาชื่อยา..." value="${safeSearch}" oninput="setCommonSearch(this.value)"></div>`;

                // Filter drugs
                const query = (commonSearch || '').toLowerCase();
                const filteredDrugs = commonDrugs
                    .map((drug, idx) => ({drug, idx}))
                    .filter(({drug}) => drug.category === commonActiveTab)
                    .filter(({drug}) => !query || drug.name.toLowerCase().includes(query));

                const rows = filteredDrugs.map(({drug, idx}) => {
                    const conc = commonConcentrations[idx] !== undefined ? commonConcentrations[idx] : drug.concentrations[0].value;
                    const isCustomMode = commonConcMode[idx] === 'custom';
                    const concObj = drug.concentrations.find(c => c.value === conc);
                    const resultUnit = commonConcUnit[idx] || (concObj ? concObj.unit : drug.concentrations[0].unit);
                    const badgeClass = commonCatColors[drug.category] || 'bg-gray-500/20 text-gray-300';

                    // Dosage cell: dropdown if indications exist, else plain text
                    let doseCell, doseForCalc;
                    if (drug.indications && drug.indications.length > 0) {
                        const selIdx = commonDoseSelection[idx] || 0;
                        const ind = drug.indications[selIdx];
                        const doseOptions = drug.indications.map((d, i) =>
                            `<option value="${i}"${i === selIdx ? ' selected' : ''}>${d.label}</option>`
                        ).join('');
                        doseCell = `<select class="dose-select" onchange="setCommonDoseSelection(${idx}, this.value)">${doseOptions}</select>`;
                        doseForCalc = typeof ind.dose === 'object' ? ind.dose[patient.species] : ind.dose;
                    } else {
                        doseCell = `<span class="text-gray-300 text-sm">${drug.doseText}</span>`;
                        doseForCalc = typeof drug.calcDose === 'object' ? drug.calcDose[patient.species] : drug.calcDose;
                    }

                    let result = 0;
                    if (w > 0 && doseForCalc != null && !isNaN(doseForCalc) && doseForCalc > 0) {
                        result = (doseForCalc * w) / conc;
                    }
                    const resultText = (w > 0 && doseForCalc != null && !isNaN(doseForCalc) && doseForCalc > 0) ? result.toFixed(2) : '—';
                    const fractionText = (w > 0 && doseForCalc != null && !isNaN(doseForCalc) && doseForCalc > 0) ? formatFraction(result) : '—';

                    const concOptions = drug.concentrations.map(c =>
                        `<option value="${c.value}"${!isCustomMode && c.value === conc ? ' selected' : ''}>${c.label}</option>`
                    ).join('') + `<option value="custom"${isCustomMode ? ' selected' : ''}>อื่นๆ ระบุ</option>`;
                    const customInput = isCustomMode
                        ? `<input type="number" class="custom-conc-input" placeholder="mg/unit" value="${conc > 0 ? conc : ''}" onchange="changeCommonCustomConc(${idx},this.value)" min="0.001" step="any">`
                        : '';
                    const concCell = `<div class="conc-cell-wrapper"><select class="conc-select" onchange="changeCommonConc(${idx},this.value)">${concOptions}</select>${customInput}<button class="save-conc-btn" data-common-save-btn="${idx}" onclick="saveCommonConc(${idx})" title="บันทึกความเข้มข้นเริ่มต้น">💾</button></div>`;
                    return `<tr>
                        <td><div class="font-semibold">${drug.name}</div><span class="badge ${badgeClass}">${drug.category}</span></td>
                        <td>${doseCell}</td>
                        <td>${concCell}</td>
                        <td class="res-val">${resultText} <span class="text-xs text-gray-500 font-normal">${resultUnit}</span></td>
                        <td class="res-val">${fractionText} <span class="text-xs text-gray-500 font-normal">${resultUnit}</span></td>
                    </tr>`;
                }).join('');

                const emptyMsg = filteredDrugs.length === 0
                    ? `<tr><td colspan="5" class="text-center py-8 text-gray-600">ไม่พบยาที่ค้นหา "${commonSearch}"</td></tr>`
                    : '';

                html += tabBarHtml + searchHtml + `<div class="overflow-hidden rounded-2xl border border-white/5 bg-white/5">
                    <table>
                        <thead><tr><th>Drug</th><th>Dosage / Indication</th><th>Formulation</th><th>Dose/admin</th><th>เม็ด/ครั้ง</th></tr></thead>
                        <tbody>${rows || emptyMsg}</tbody>
                    </table>
                </div>`;
            }

            else {
                html += `<div class="p-20 text-center border-2 border-dashed border-white/5 rounded-3xl opacity-30">
                    <div class="text-5xl mb-4">⚙️</div>
                    <p>ระบบการคำนวณสำหรับ ${currentActiveTool.toUpperCase()} กำลังอยู่ในขั้นตอนการพัฒนาเพิ่มเติม</p>
                </div>`;
            }

            container.innerHTML = html;
        }

        function renderTable(headers, rows) {
            return `<div class="overflow-hidden rounded-2xl border border-white/5 bg-white/5">
                <table>
                    <thead><tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr></thead>
                    <tbody>
                        ${rows.map(r => `<tr><td>${r.name}</td><td>${r.dose}</td><td class="res-val">${r.calc.toFixed(2)}</td></tr>`).join('')}
                    </tbody>
                </table>
            </div>`;
        }

        function changeEmergencyConc(idx, val) {
            if (val === 'custom') {
                drugConcMode[idx] = 'custom';
                // Keep existing concentration value for calculation until user types a new one
            } else {
                delete drugConcMode[idx];
                drugConcentrations[idx] = parseFloat(val);
            }
            renderCurrentTool();
        }

        function changeCustomConc(idx, val) {
            const numVal = parseFloat(val);
            if (!isNaN(numVal) && numVal >= 0.001) {
                drugConcentrations[idx] = numVal;
                renderCurrentTool();
            }
        }

        function saveEmergencyConc(idx) {
            const drug = emergencyDrugs[idx];
            const conc = drugConcentrations[idx] !== undefined ? drugConcentrations[idx] : drug.concentrations[0].value;
            const isCustom = drugConcMode[idx] === 'custom';
            localStorage.setItem(`emgConc_${idx}`, JSON.stringify({ value: conc, isCustom }));
            const btn = document.querySelector(`[data-save-btn="${idx}"]`);
            if (btn) { btn.textContent = '✅'; setTimeout(() => { btn.textContent = '💾'; }, 1500); }
        }

        function changeAnestConc(idx, val) {
            if (val === 'custom') {
                anestConcMode[idx] = 'custom';
            } else {
                delete anestConcMode[idx];
                anestConcentrations[idx] = parseFloat(val);
            }
            renderCurrentTool();
        }

        function changeAnestCustomConc(idx, val) {
            const numVal = parseFloat(val);
            if (!isNaN(numVal) && numVal >= 0.001) {
                anestConcentrations[idx] = numVal;
                renderCurrentTool();
            }
        }

        function saveAnestConc(idx) {
            const drug = anestheticDrugs[idx];
            const conc = anestConcentrations[idx] !== undefined ? anestConcentrations[idx] : drug.concentrations[0].value;
            const isCustom = anestConcMode[idx] === 'custom';
            localStorage.setItem(`anestConc_${idx}`, JSON.stringify({ value: conc, isCustom }));
            const btn = document.querySelector(`[data-anest-save-btn="${idx}"]`);
            if (btn) { btn.textContent = '✅'; setTimeout(() => { btn.textContent = '💾'; }, 1500); }
        }

        function changeCriConc(idx, val) {
            if (val === 'custom') {
                criConcMode[idx] = 'custom';
            } else {
                delete criConcMode[idx];
                criConcentrations[idx] = parseFloat(val);
            }
            renderCurrentTool();
        }

        function changeCriCustomConc(idx, val) {
            const numVal = parseFloat(val);
            if (!isNaN(numVal) && numVal >= 0.001) {
                criConcentrations[idx] = numVal;
                renderCurrentTool();
            }
        }

        function saveCriConc(idx) {
            const drug = criDrugs[idx];
            const conc = criConcentrations[idx] !== undefined ? criConcentrations[idx] : drug.concentrations[0].value;
            const isCustom = criConcMode[idx] === 'custom';
            localStorage.setItem(`criConc_${idx}`, JSON.stringify({ value: conc, isCustom }));
            const btn = document.querySelector(`[data-cri-save-btn="${idx}"]`);
            if (btn) { btn.textContent = '✅'; setTimeout(() => { btn.textContent = '💾'; }, 1500); }
        }

        function changeCommonConc(idx, val) {
            if (val === 'custom') {
                commonConcMode[idx] = 'custom';
            } else {
                delete commonConcMode[idx];
                const numVal = parseFloat(val);
                commonConcentrations[idx] = numVal;
                const concObj = commonDrugs[idx].concentrations.find(c => c.value === numVal);
                if (concObj) commonConcUnit[idx] = concObj.unit;
            }
            renderCurrentTool();
        }

        function changeCommonCustomConc(idx, val) {
            const numVal = parseFloat(val);
            if (!isNaN(numVal) && numVal >= 0.001) {
                commonConcentrations[idx] = numVal;
                renderCurrentTool();
            }
        }

        function formatFraction(val) {
            if (!(val > 0)) return '—';
            if (val > 10) return Math.round(val).toString(); // above 10 units, integer is clear enough
            const fracs = [
                [1,8],[1,6],[1,4],[1,3],[3,8],[1,2],[2,3],[3,4],
                [1,1],[5,4],[4,3],[3,2],[5,3],[7,4],[2,1],
                [5,2],[3,1],[7,2],[4,1],[5,1],[6,1],[7,1],[8,1],[9,1],[10,1]
            ];
            let best = fracs[0], bestDiff = Infinity;
            for (const f of fracs) {
                const diff = Math.abs(val - f[0]/f[1]);
                if (diff < bestDiff) { bestDiff = diff; best = f; }
            }
            return best[1] === 1 ? `${best[0]}` : `${best[0]}/${best[1]}`;
        }

        function saveCommonConc(idx) {
            const drug = commonDrugs[idx];
            const conc = commonConcentrations[idx] !== undefined ? commonConcentrations[idx] : drug.concentrations[0].value;
            const isCustom = commonConcMode[idx] === 'custom';
            const unit = commonConcUnit[idx] || drug.concentrations[0].unit;
            localStorage.setItem(`commonConc_${idx}`, JSON.stringify({ value: conc, isCustom, unit }));
            const btn = document.querySelector(`[data-common-save-btn="${idx}"]`);
            if (btn) { btn.textContent = '✅'; setTimeout(() => { btn.textContent = '💾'; }, 1500); }
        }

        function setCommonTab(cat) {
            commonActiveTab = cat;
            commonSearch = '';
            renderCurrentTool();
        }

        function setCommonSearch(query) {
            commonSearch = query;
            renderCurrentTool();
        }

        function setCommonDoseSelection(idx, selIdx) {
            commonDoseSelection[idx] = parseInt(selIdx);
            renderCurrentTool();
        }

        function setDehydration(pct) {
            dehydrationPercent = pct;
            renderCurrentTool();
        }

        function addGlucoseRow() {
            glucoseReadings.push({time:'', glucose:''});
            renderCurrentTool();
        }

        function removeGlucoseRow(idx) {
            if (glucoseReadings.length > 1) {
                glucoseReadings.splice(idx, 1);
                renderCurrentTool();
            }
        }

        function setTrauma(paramIdx, score) {
            traumaData[paramIdx] = score;
            renderCurrentTool();
        }

        window.onload = () => {
            if (sessionStorage.getItem("isLoggedIn") !== "true") window.location.href = "index.html";
            emergencyDrugs.forEach((drug, idx) => {
                const saved = localStorage.getItem(`emgConc_${idx}`);
                if (saved) {
                    try {
                        const data = JSON.parse(saved);
                        drugConcentrations[idx] = data.value;
                        if (data.isCustom) drugConcMode[idx] = 'custom';
                    } catch (e) { console.warn('Failed to parse saved concentration:', e); }
                }
            });
            anestheticDrugs.forEach((drug, idx) => {
                const saved = localStorage.getItem(`anestConc_${idx}`);
                if (saved) {
                    try {
                        const data = JSON.parse(saved);
                        anestConcentrations[idx] = data.value;
                        if (data.isCustom) anestConcMode[idx] = 'custom';
                    } catch (e) { console.warn('Failed to parse saved anesthetic concentration:', e); }
                }
            });
            criDrugs.forEach((drug, idx) => {
                const saved = localStorage.getItem(`criConc_${idx}`);
                if (saved) {
                    try {
                        const data = JSON.parse(saved);
                        criConcentrations[idx] = data.value;
                        if (data.isCustom) criConcMode[idx] = 'custom';
                    } catch (e) { console.warn('Failed to parse saved CRI concentration:', e); }
                }
            });
            commonDrugs.forEach((drug, idx) => {
                const saved = localStorage.getItem(`commonConc_${idx}`);
                if (saved) {
                    try {
                        const data = JSON.parse(saved);
                        commonConcentrations[idx] = data.value;
                        if (data.isCustom) commonConcMode[idx] = 'custom';
                        if (data.unit) commonConcUnit[idx] = data.unit;
                    } catch (e) { console.warn('Failed to parse saved common drug concentration:', e); }
                }
            });
            const cdCats = [];
            commonDrugs.forEach(d => { if (!cdCats.includes(d.category)) cdCats.push(d.category); });
            commonActiveTab = cdCats[0] || '';
            setSpecies('dog');
        };
    </script>
<button class="sidebar-toggle" id="sidebar-toggle-btn" onclick="toggleSidebar()" aria-label="Toggle tools sidebar">☰ เครื่องมือ</button>
</body>
</html>
