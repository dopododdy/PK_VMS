<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Results | PK-VMS Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <style>
        :root { --navy: #020617; --navy-light: #0f172a; --teal: #14b8b1; --border: rgba(255, 255, 255, 0.1); }
        * { font-family: "Sarabun", sans-serif !important; }
        body { background: var(--navy); color: #e2e8f0; margin: 0; overflow: hidden; }

        /* Sidebar - แบบ 3 ส่วนเหมือน medrec */
        .sidebar-container { width: 450px; background: #0f172a; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .pet-card { padding: 14px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; display: grid; grid-template-columns: 80px 1fr 60px; gap: 12px; transition: 0.2s; }
        .pet-card.active { background: rgba(20, 184, 177, 0.12); border-left: 4px solid var(--teal); }
        .hn-col { background: rgba(30, 41, 59, 1); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 900; color: #60a5fa; }

        /* Main Lab Area */
        .lab-tab { @apply px-6 py-3 font-bold transition-all cursor-pointer border-b-4 border-transparent; }
        .lab-tab.active { @apply border-teal-500 text-teal-400 bg-teal-500/5; }
        
        .section-card { background: rgba(30, 41, 59, 0.4); border-radius: 25px; padding: 25px; border: 1px solid var(--border); }
        .input-box { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 10px; padding: 8px 12px; color: white; width: 100%; outline: none; }
        
        .btn-base { padding: 10px 20px; border-radius: 12px; font-weight: 800; display: inline-flex; align-items: center; justify-content: center; gap: 8px; color: white !important; }
        .btn-teal { background-color: #0d9488 !important; }
        .btn-blue { background-color: #2563eb !important; }
        
        /* สไตล์ตารางค่าเลือด */
        .blood-grid { display: grid; grid-template-columns: 1fr 120px 150px; gap: 10px; align-items: center; padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>
    <div class="flex h-screen overflow-hidden">
        <aside class="sidebar-container">
            <div class="p-6 border-b border-white/5">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-black">🔬 รายการตรวจแล็บ</h2>
                    <a href="index.html" class="text-2xl">🏠</a>
                </div>
                <input type="text" id="search-box" class="input-box" placeholder="ค้นหา HN, ชื่อ..." oninput="renderSidebar()">
            </div>
            <div id="owner-list" class="flex-1 overflow-y-auto px-2"></div>
        </aside>

        <main class="flex-1 overflow-y-auto p-8" id="main-view">
            <div id="no-selection" class="h-full flex flex-col items-center justify-center opacity-20">
                <span class="text-9xl">🔬</span>
                <h2 class="text-3xl font-bold">เลือกสัตว์เพื่อบันทึกผลแล็บ</h2>
            </div>

            <div id="lab-editor" class="hidden">
                <div class="flex justify-between items-center mb-8">
                    <div>
                        <h1 class="text-3xl font-black" id="p-name">ชื่อสัตว์</h1>
                        <p class="text-teal-400 font-bold" id="p-hn">HN: 000000</p>
                    </div>
                    <div class="flex gap-3">
                        <button onclick="printLabReport()" class="btn-base btn-blue">🖨️ พิมพ์รายงาน</button>
                        <button onclick="saveLab()" class="btn-base btn-teal">💾 บันทึกผลแล็บ</button>
                    </div>
                </div>

                <div class="flex border-b border-white/10 mb-8">
                    <div class="lab-tab active" onclick="switchTab('blood', this)">🩸 ตรวจเลือด (Blood Test)</div>
                    <div class="lab-tab" onclick="switchTab('us', this)">🌊 Ultrasound</div>
                    <div class="lab-tab" onclick="switchTab('echo', this)">❤️ Echocardiography</div>
                </div>

                <div id="lab-content" class="section-card">
                    </div>
            </div>
        </main>
    </div>

    <script>
        let currentAnimal = null;
        let currentTab = 'blood';

        const LAB_TEMPLATES = {
            blood: `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div>
                        <h4 class="text-teal-400 font-black mb-4">Hematology (CBC)</h4>
                        <div class="blood-grid font-bold text-xs text-slate-500 uppercase"><span>รายการ</span><span>ค่าที่วัดได้</span><span>ค่าปกติ</span></div>
                        <div class="blood-grid"><span>WBC</span><input type="number" class="input-box py-1" id="wbc"><span>6.0 - 17.0</span></div>
                        <div class="blood-grid"><span>RBC</span><input type="number" class="input-box py-1" id="rbc"><span>5.5 - 8.5</span></div>
                        <div class="blood-grid"><span>HGB</span><input type="number" class="input-box py-1" id="hgb"><span>12.0 - 18.0</span></div>
                        <div class="blood-grid"><span>PLT Count</span><input type="number" class="input-box py-1" id="plt"><span>200 - 500</span></div>
                    </div>
                    <div>
                        <h4 class="text-yellow-400 font-black mb-4">Chemistry / Electrolytes</h4>
                        <div class="blood-grid"><span>BUN</span><input type="number" class="input-box py-1" id="bun"><span>7.0 - 27.0</span></div>
                        <div class="blood-grid"><span>Creatinine</span><input type="number" class="input-box py-1" id="cre"><span>0.5 - 1.8</span></div>
                        <div class="blood-grid"><span>ALT / SGPT</span><input type="number" class="input-box py-1" id="alt"><span>10 - 100</span></div>
                    </div>
                </div>
            `,
            us: `
                <div class="space-y-4">
                    <label class="label-clinical">Ultrasound Findings (ผลการตรวจช่องท้อง/อวัยวะ)</label>
                    <textarea class="input-box h-64" id="us_finding" placeholder="ระบุรายละเอียดสิ่งที่พบในแต่ละ Organs..."></textarea>
                </div>
            `,
            echo: `
                <div class="grid grid-cols-2 gap-6">
                    <div class="col-span-2"><label class="label-clinical">Echocardiography Report</label></div>
                    <div><label class="label-text">LA/Ao Ratio</label><input type="text" class="input-box" id="la_ao"></div>
                    <div><label class="label-text">FS (%)</label><input type="text" class="input-box" id="fs"></div>
                    <div class="col-span-2"><label class="label-text">สรุปผลการตรวจหัวใจ</label><textarea class="input-box h-32" id="echo_summary"></textarea></div>
                </div>
            `
        };

        async function renderSidebar() {
            const { data: animals } = await db.from('animals').select('*');
            const container = document.getElementById('owner-list');
            container.innerHTML = animals.map(a => `
                <div class="pet-card" onclick="selectAnimal('${a.id}', '${a.pet_name}', '${a.owner_hn}')">
                    <div class="hn-col">#${a.owner_hn}</div>
                    <div class="flex flex-col justify-center px-2">
                        <span class="font-black text-white text-lg">${a.pet_name}</span>
                        <span class="text-xs text-slate-500">${a.pet_type} (${a.breed})</span>
                    </div>
                    <div class="flex items-center justify-center text-2xl">${a.pet_type==='สุนัข'?'🐶':'🐱'}</div>
                </div>
            `).join('');
        }

        function selectAnimal(id, name, hn) {
            currentAnimal = {id, name, hn};
            document.getElementById('no-selection').classList.add('hidden');
            document.getElementById('lab-editor').classList.remove('hidden');
            document.getElementById('p-name').innerText = name;
            document.getElementById('p-hn').innerText = 'HN: ' + hn;
            switchTab('blood', document.querySelector('.lab-tab'));
        }

        function switchTab(type, el) {
            currentTab = type;
            document.querySelectorAll('.lab-tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('lab-content').innerHTML = LAB_TEMPLATES[type];
        }

        async function saveLab() {
            alert('บันทึกผลแล็บสำเร็จ! (เชื่อมโยงเข้าประวัติการรักษาแล้ว)');
            // Logic: ดึงค่าจาก input ทั้งหมดใน tab นั้นๆ มาทำ JSON และ save ลง lab_results
        }

        function goBack() { window.location.href = 'index.html'; }
        window.onload = renderSidebar;
    </script>
</body>
</html>
