<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Results & Trends | PK-VMS Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <style>
        :root { --navy: #020617; --navy-light: #0f172a; --teal: #14b811; --border: rgba(255, 255, 255, 0.1); }
        * { font-family: "Sarabun", sans-serif !important; }
        body { background: var(--navy); color: #e2e8f0; margin: 0; overflow: hidden; }

        .sidebar-container { width: 400px; background: #0f172a; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .pet-card { padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; display: grid; grid-template-columns: 70px 1fr 40px; gap: 12px; transition: 0.2s; }
        .pet-card.active { background: rgba(20, 184, 177, 0.12); border-left: 4px solid var(--teal); }
        .hn-col { background: rgba(30, 41, 59, 1); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 900; color: #60a5fa; font-size: 0.85rem; }

        .lab-tab { padding: 12px 24px; font-weight: 800; cursor: pointer; transition: 0.2s; border-bottom: 3px solid transparent; opacity: 0.5; }
        .lab-tab.active { border-color: var(--teal); color: var(--teal); opacity: 1; }

        .section-card { background: rgba(30, 41, 59, 0.4); border-radius: 25px; padding: 25px; border: 1px solid var(--border); }
        .input-box { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 10px; padding: 8px 12px; color: white; width: 100%; outline: none; }
        
        /* Trend Table Styles */
        .trend-container { overflow-x: auto; border-radius: 15px; border: 1px solid var(--border); background: rgba(0,0,0,0.2); }
        .trend-table { width: 100%; border-collapse: collapse; min-width: 600px; }
        .trend-table th { background: rgba(15, 23, 42, 0.8); padding: 12px; text-align: center; border: 1px solid var(--border); font-size: 0.75rem; color: #94a3b8; vertical-align: top; }
        .trend-table td { padding: 12px; border: 1px solid var(--border); text-align: center; font-size: 1rem; }
        .trend-param-name { text-align: left !important; font-weight: 800; color: #fff; background: rgba(255,255,255,0.02); line-height: 1.2; }

        .val-high { color: #ef4444; font-weight: 800; }
        .val-low { color: #38bdf8; font-weight: 800; }
        .val-normal { color: #10b981; }
        .trend-arrow { font-size: 0.75rem; margin-left: 4px; font-weight: 900; }

        .btn-del-col { color: #64748b; transition: 0.2s; margin-bottom: 5px; cursor: pointer; }
        .btn-del-col:hover { color: #ef4444; transform: scale(1.2); }

        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="sidebar-container">
        <div class="p-6 border-b border-white/5">
            <div class="flex justify-between items-center mb-5">
                <h2 class="text-xl font-black text-white">🔬 Lab Room</h2>
                <a href="index.html" class="p-2 hover:bg-white/10 rounded-lg transition"><i data-lucide="home"></i></a>
            </div>
            <input type="text" id="search-box" class="input-box" placeholder="ค้นหา HN, ชื่อ..." oninput="fetchAnimals()">
        </div>
        <div id="animal-list" class="flex-1 overflow-y-auto custom-scroll p-2"></div>
    </aside>

    <main class="flex-1 overflow-y-auto bg-[#020617] flex flex-col">
        <div id="no-selection" class="flex-1 flex flex-col items-center justify-center opacity-10">
            <i data-lucide="line-chart" class="w-32 h-32 mb-4"></i>
            <h2 class="text-3xl font-bold">เลือกสัตว์เพื่อดูแนวโน้มผลแล็บ</h2>
        </div>

        <div id="lab-editor" class="hidden flex-1 flex flex-col overflow-hidden">
            <div class="p-8 border-b border-white/5 flex justify-between items-center">
                <div>
                    <h1 class="text-3xl font-black text-white" id="disp-name">-</h1>
                    <p class="text-teal-400 font-bold" id="disp-hn">-</p>
                </div>
                <div class="flex gap-3">
                    <button onclick="saveLabResults()" class="bg-teal-600 hover:bg-teal-500 px-6 py-3 rounded-xl font-bold transition flex items-center gap-2">
                        <i data-lucide="save" class="w-5 h-5"></i> บันทึกผลตรวจชุดนี้
                    </button>
                </div>
            </div>

            <div class="flex px-8 border-b border-white/5 bg-navy-light/20">
                <div class="lab-tab active" onclick="switchTab('input', this)">➕ กรอกผลเลือดใหม่</div>
                <div class="lab-tab" onclick="switchTab('trends', this)">📊 ติดตามแนวโน้ม (Trends)</div>
            </div>

            <div class="flex-1 overflow-y-auto p-8 custom-scroll" id="content-area">
                <div id="view-input">
                    <div class="section-card mb-8">
                        <div class="grid grid-cols-12 gap-4 mb-4 text-xs font-black text-gray-500 uppercase tracking-widest">
                            <div class="col-span-4">Parameter</div>
                            <div class="col-span-4 text-center">Result (ผลที่ได้)</div>
                            <div class="col-span-4">Reference Range</div>
                        </div>
                        <div id="parameters-container" class="space-y-2"></div>
                    </div>
                </div>

                <div id="view-trends" class="hidden">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-2xl font-black text-white flex items-center gap-2">
                            <i data-lucide="history" class="text-teal-400"></i> ตารางเปรียบเทียบผลย้อนหลัง
                        </h3>
                        <p class="text-xs text-gray-500">* ข้อมูลจะถูกจัดกลุ่มตามเวลาที่บันทึก (รอบการตรวจ)</p>
                    </div>
                    <div class="trend-container custom-scroll">
                        <table class="trend-table" id="trend-table-el">
                            <thead><tr id="trend-head"></tr></thead>
                            <tbody id="trend-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let masterParams = [];
        let currentAnimal = null;
        let labHistory = [];

        window.onload = async () => {
            lucide.createIcons();
            await fetchMasterParams();
            await fetchAnimals();
        };

        async function fetchMasterParams() {
            const { data } = await db.from('mas_lab_parameters').select('*').order('parameter_name');
            masterParams = data || [];
        }

        async function fetchAnimals() {
            const term = document.getElementById('search-box').value.toLowerCase();
            const { data } = await db.from('animals').select('*, owners(owner_name)');
            const filtered = data.filter(a => a.pet_name.toLowerCase().includes(term) || a.owner_hn.includes(term));
            
            document.getElementById('animal-list').innerHTML = filtered.map(a => `
                <div class="pet-card" onclick="selectAnimal('${a.id}')" id="pet-${a.id}">
                    <div class="hn-col">#${a.owner_hn}</div>
                    <div class="flex flex-col justify-center min-w-0">
                        <span class="text-white font-bold truncate">${a.pet_name}</span>
                        <span class="text-[10px] text-gray-500 truncate">${a.owners?.owner_name || '-'}</span>
                    </div>
                    <div class="text-lg flex items-center justify-center">${a.pet_type === 'สุนัข' ? '🐶' : '🐱'}</div>
                </div>`).join('');
        }

        async function selectAnimal(id) {
            const { data: a } = await db.from('animals').select('*').eq('id', id).single();
            currentAnimal = a;
            document.querySelectorAll('.pet-card').forEach(c => c.classList.remove('active'));
            document.getElementById(`pet-${id}`).classList.add('active');
            document.getElementById('no-selection').classList.add('hidden');
            document.getElementById('lab-editor').classList.remove('hidden');
            document.getElementById('disp-name').innerText = a.pet_name;
            document.getElementById('disp-hn').innerText = `HN: ${a.owner_hn} | ${a.pet_type} (${a.breed})`;
            
            renderInputForm();
            await fetchLabHistory(id);
        }

        function renderInputForm() {
            const container = document.getElementById('parameters-container');
            const isDog = currentAnimal.pet_type === 'สุนัข';
            container.innerHTML = masterParams.map(p => {
                const min = isDog ? p.dog_min : p.cat_min;
                const max = isDog ? p.dog_max : p.cat_max;
                return `
                    <div class="grid grid-cols-12 gap-4 items-center p-3 border-b border-white/5 hover:bg-white/5 transition-all rounded-lg">
                        <div class="col-span-4 font-bold text-slate-300">${p.parameter_name} <span class="text-[10px] opacity-40">${p.unit || ''}</span></div>
                        <div class="col-span-4 text-center">
                            <input type="number" step="0.001" class="input-box text-center lab-input" 
                                data-id="${p.id}" data-name="${p.parameter_name}" data-min="${min}" data-max="${max}" data-unit="${p.unit}">
                        </div>
                        <div class="col-span-4 text-xs text-gray-500 font-mono">${min} - ${max}</div>
                    </div>`;
            }).join('');
        }

        async function fetchLabHistory(animalId) {
            const { data } = await db.from('lab_results')
                .select('*')
                .eq('animal_id', animalId)
                .order('created_at', { ascending: false });
            labHistory = data || [];
            renderTrendTable();
        }

        function renderTrendTable() {
            const isDog = currentAnimal.pet_type === 'สุนัข';
            const sessions = {};
            labHistory.forEach(row => {
                // ใช้ ISO string ของ created_at เป็น key เพื่อความแม่นยำในการรวมกลุ่มชุดเดียวกัน
                const key = row.created_at; 
                if (!sessions[key]) sessions[key] = {};
                sessions[key][row.parameter_name] = row;
            });

            const sortedTimestamps = Object.keys(sessions).sort((a, b) => new Date(b) - new Date(a));
            
            // Header ตาราง
            const headRow = document.getElementById('trend-head');
            headRow.innerHTML = `<th class="trend-param-name text-center">Parameter<br><span class="font-normal text-gray-500">(Ref. Range)</span></th>` + sortedTimestamps.map(ts => {
                const d = new Date(ts);
                return `<th>
                    <div class="btn-del-col" onclick="deleteSession('${ts}')" title="ลบคอลัมน์นี้">✕</div>
                    <div class="text-white">${formatThaiDate(d)}</div>
                    <div class="text-teal-400 text-[10px]">${d.toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit'})}</div>
                </th>`;
            }).join('');

            // Body ตาราง
            const body = document.getElementById('trend-body');
            body.innerHTML = masterParams.map(pMaster => {
                const paramName = pMaster.parameter_name;
                const min = isDog ? pMaster.dog_min : pMaster.cat_min;
                const max = isDog ? pMaster.dog_max : pMaster.cat_max;
                
                let rowHtml = `<td class="trend-param-name">
                    ${paramName}
                    <span class="block text-[10px] text-gray-500 font-normal">
                        (${min}-${max}) ${pMaster.unit || ''}
                    </span>
                </td>`;
                
                sortedTimestamps.forEach((ts, idx) => {
                    const result = sessions[ts][paramName];
                    if (!result) {
                        rowHtml += `<td class="text-gray-800 opacity-20">-</td>`;
                    } else {
                        // คำนวณแนวโน้ม
                        let arrow = '';
                        if (idx < sortedTimestamps.length - 1) {
                            const prevSession = sessions[sortedTimestamps[idx+1]][paramName];
                            if (prevSession) {
                                if (result.test_value > prevSession.test_value) arrow = '<span class="trend-arrow text-orange-500">↑</span>';
                                else if (result.test_value < prevSession.test_value) arrow = '<span class="trend-arrow text-blue-500">↓</span>';
                            }
                        }

                        const val = result.test_value;
                        const statusClass = (val > max) ? 'val-high' : (val < min) ? 'val-low' : 'val-normal';
                        rowHtml += `<td class="${statusClass}">${val}${arrow}</td>`;
                    }
                });
                return `<tr>${rowHtml}</tr>`;
            }).join('');
        }

        async function deleteSession(timestamp) {
            if (!confirm(`⚠️ ยืนยันการลบผลการตรวจรอบเวลา ${new Date(timestamp).toLocaleString('th-TH')} ?\nข้อมูลจะหายไปอย่างถาวร`)) return;

            try {
                const { error } = await db.from('lab_results')
                    .delete()
                    .eq('animal_id', currentAnimal.id)
                    .eq('created_at', timestamp);
                
                if (error) throw error;
                alert("🗑️ ลบผลการตรวจสำเร็จ");
                await fetchLabHistory(currentAnimal.id);
            } catch (err) { alert(err.message); }
        }

        async function saveLabResults() {
            const results = [];
            const timestamp = new Date().toISOString();
            document.querySelectorAll('.lab-input').forEach(inp => {
                if (inp.value) {
                    const val = parseFloat(inp.value);
                    const min = parseFloat(inp.dataset.min);
                    const max = parseFloat(inp.dataset.max);
                    results.push({
                        animal_id: currentAnimal.id,
                        parameter_id: inp.dataset.id,
                        parameter_name: inp.dataset.name,
                        test_value: val,
                        unit: inp.dataset.unit,
                        is_abnormal: (val < min || val > max),
                        created_at: timestamp
                    });
                }
            });

            if (results.length === 0) return alert("กรุณากรอกผลแล็บอย่างน้อย 1 รายการ");
            const { error } = await db.from('lab_results').insert(results);
            if (!error) {
                alert("✅ บันทึกสำเร็จ");
                document.querySelectorAll('.lab-input').forEach(i => i.value = '');
                await fetchLabHistory(currentAnimal.id);
            } else alert(error.message);
        }

        function switchTab(tab, el) {
            document.querySelectorAll('.lab-tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('view-input').classList.toggle('hidden', tab !== 'input');
            document.getElementById('view-trends').classList.toggle('hidden', tab !== 'trends');
        }

        function formatThaiDate(date) {
            const months = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];
            return `${date.getDate()} ${months[date.getMonth()]} ${date.getFullYear() + 543}`;
        }
    </script>
</body>
</html>
