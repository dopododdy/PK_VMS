<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <title>ราคาค่ารักษาและบริการ | PK-VMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Kanit:wght@300;400;500;600;700&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="ui-settings.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --navy:     #020617;
            --navy-mid: #0f172a;
            --teal:     #14b8b1;
            --border:   rgba(255, 255, 255, 0.08);
        }
        * { font-family: "Sarabun", sans-serif !important; }
        html { font-size: var(--base-font-size, 14px); }
        body {
            background: var(--navy);
            color: #e2e8f0;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .mesh-bg {
            position: fixed; inset: 0; z-index: -1;
            background:
                radial-gradient(circle at 20% 20%, rgba(20,184,177,0.07), transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(59,130,246,0.05), transparent 50%);
        }

        /* ─── Tab Bar ─── */
        .tab-bar {
            display: flex;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 5px;
            gap: 4px;
        }
        .tab-btn {
            flex: 1;
            padding: 10px 16px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s;
            color: #94a3b8;
            border: none;
            background: transparent;
        }
        .tab-btn.active {
            background: var(--teal);
            color: #020617;
            box-shadow: 0 4px 14px rgba(20,184,177,0.35);
        }
        .tab-btn:not(.active):hover {
            background: rgba(255,255,255,0.06);
            color: #e2e8f0;
        }

        /* ─── Category Badge ─── */
        .category-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0 6px;
        }
        .category-label {
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--teal);
            white-space: nowrap;
        }
        .category-line {
            flex: 1;
            height: 1px;
            background: rgba(20,184,177,0.2);
        }

        /* ─── Price Item Card ─── */
        .price-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            transition: all 0.2s;
        }
        .price-card:hover {
            background: rgba(20,184,177,0.05);
            border-color: rgba(20,184,177,0.25);
        }
        .item-name {
            font-weight: 600;
            font-size: 1rem;
            color: #e2e8f0;
            line-height: 1.4;
        }
        .item-note {
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 2px;
        }
        .price-tag {
            font-weight: 800;
            font-size: 1rem;
            color: #fbbf24;
            white-space: nowrap;
            text-align: right;
        }
        .price-unit {
            font-size: 0.75rem;
            font-weight: 500;
            color: #94a3b8;
        }

        /* ─── Search ─── */
        .search-box {
            background: rgba(0,0,0,0.35);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 11px 16px 11px 44px;
            outline: none;
            color: #e2e8f0;
            font-size: 1rem;
            width: 100%;
            transition: border-color 0.2s;
        }
        .search-box:focus { border-color: var(--teal); }
        .search-box::placeholder { color: #475569; }

        /* ─── Empty State ─── */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: #475569;
        }
        .empty-state .emoji { font-size: 3rem; margin-bottom: 1rem; }

        /* ─── Sticky header on mobile ─── */
        header {
            position: sticky;
            top: 0;
            z-index: 40;
            background: rgba(2,6,23,0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
        }

        /* ─── Scrollbar ─── */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 10px; }

        /* ─── Pulse badge ─── */
        @keyframes pulse-teal { 0%,100%{ opacity:1 } 50%{ opacity:0.6 } }
        .live-badge { animation: pulse-teal 2.5s infinite; }
    </style>
</head>
<body>
    <div class="mesh-bg"></div>

    <!-- ── Header ── -->
    <header class="px-4 py-3">
        <div class="max-w-2xl mx-auto flex items-center justify-between gap-3">
            <div class="flex items-center gap-3">
                <a href="index.html"
                   class="w-9 h-9 flex items-center justify-center rounded-xl bg-white/5 hover:bg-teal-500/20 transition text-gray-400 hover:text-teal-400 text-xl">
                    🏠
                </a>
                <div>
                    <h1 class="font-black text-white text-lg leading-tight">ราคาค่ารักษา / บริการ</h1>
                    <p class="text-xs text-gray-500 leading-none">PK-VMS Price List</p>
                </div>
            </div>
            <span class="live-badge text-xs font-bold px-3 py-1 rounded-full"
                  style="background:rgba(20,184,177,0.15); color:var(--teal); border:1px solid rgba(20,184,177,0.3);">
                ● ข้อมูลปัจจุบัน
            </span>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-4 pb-12 pt-5">

        <!-- ── Search ── -->
        <div class="relative mb-4">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-lg pointer-events-none">🔍</span>
            <input type="search" id="search-input" class="search-box"
                   placeholder="ค้นหาบริการหรือสินค้า..."
                   oninput="applySearch()" />
        </div>

        <!-- ── Tab Bar ── -->
        <div class="tab-bar mb-5">
            <button class="tab-btn active" id="tab-service" onclick="switchTab('service')">
                🏥 บริการ
            </button>
            <button class="tab-btn" id="tab-product" onclick="switchTab('product')">
                🛍️ สินค้า
            </button>
        </div>

        <!-- ── List Container ── -->
        <div id="list-container">
            <div class="empty-state">
                <div class="emoji">⏳</div>
                <p class="font-semibold">กำลังโหลดข้อมูล...</p>
            </div>
        </div>

    </main>

    <footer class="text-center py-8 text-gray-600 text-xs tracking-widest uppercase">
        PK-VMS © 2026 · ราคาอาจมีการเปลี่ยนแปลง กรุณาสอบถามเจ้าหน้าที่
    </footer>

    <script>
    // ══════════════════════════════════════════════════════
    //  DATA  —  โหลดจาก localStorage  key: pk-pricelist
    // ══════════════════════════════════════════════════════
    const STORAGE_KEY = 'pk-pricelist';

    function getItems() {
        try {
            return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        } catch (e) {
            return [];
        }
    }

    // ══════════════════════════════════════════════════════
    //  STATE
    // ══════════════════════════════════════════════════════
    let currentTab    = 'service';   // 'service' | 'product'
    let currentSearch = '';

    // ══════════════════════════════════════════════════════
    //  TAB SWITCH
    // ══════════════════════════════════════════════════════
    function switchTab(tab) {
        currentTab = tab;
        document.getElementById('tab-service').classList.toggle('active', tab === 'service');
        document.getElementById('tab-product').classList.toggle('active', tab === 'product');
        renderList();
    }

    // ══════════════════════════════════════════════════════
    //  SEARCH
    // ══════════════════════════════════════════════════════
    function applySearch() {
        currentSearch = (document.getElementById('search-input').value || '').trim().toLowerCase();
        renderList();
    }

    // ══════════════════════════════════════════════════════
    //  FORMAT PRICE
    // ══════════════════════════════════════════════════════
    function formatPrice(item) {
        const min = parseFloat(item.price_min);
        const max = parseFloat(item.price_max);
        const unit = item.unit || 'บาท';
        if (isNaN(min)) return '<span class="text-gray-500">—</span>';
        if (isNaN(max) || max === min) {
            return min.toLocaleString('th-TH') + ' <span class="price-unit">' + unit + '</span>';
        }
        return min.toLocaleString('th-TH') + ' – ' + max.toLocaleString('th-TH')
             + ' <span class="price-unit">' + unit + '</span>';
    }

    // ══════════════════════════════════════════════════════
    //  RENDER
    // ══════════════════════════════════════════════════════
    function renderList() {
        const container = document.getElementById('list-container');
        const all       = getItems();
        const q         = currentSearch;

        // filter by type
        let items = all.filter(function(i) {
            return i.type === currentTab && i.active !== false;
        });

        // filter by search
        if (q) {
            items = items.filter(function(i) {
                return (i.name  || '').toLowerCase().includes(q)
                    || (i.category || '').toLowerCase().includes(q)
                    || (i.note    || '').toLowerCase().includes(q);
            });
        }

        if (!items.length) {
            container.innerHTML =
                '<div class="empty-state">'
              + '<div class="emoji">' + (q ? '🔍' : (currentTab === 'service' ? '🏥' : '🛍️')) + '</div>'
              + '<p class="font-semibold text-gray-400">'
              + (q ? 'ไม่พบรายการที่ค้นหา' : 'ยังไม่มีรายการ' + (currentTab === 'service' ? 'บริการ' : 'สินค้า'))
              + '</p>'
              + (q ? '' : '<p class="text-sm mt-1">เพิ่มข้อมูลได้ที่ <a href="set-pricelist.html" class="underline" style="color:var(--teal)">ตั้งค่า Pricelist</a></p>')
              + '</div>';
            return;
        }

        // group by category
        const groups = {};
        items.forEach(function(item) {
            const cat = item.category || 'ทั่วไป';
            if (!groups[cat]) groups[cat] = [];
            groups[cat].push(item);
        });

        let html = '';
        Object.keys(groups).forEach(function(cat) {
            html += '<div class="category-header">'
                 +  '<span class="category-label">' + escHtml(cat) + '</span>'
                 +  '<div class="category-line"></div>'
                 +  '</div>';
            html += '<div class="space-y-2 mb-3">';
            groups[cat].forEach(function(item) {
                html += '<div class="price-card">'
                     +  '<div class="flex-1 min-w-0">'
                     +  '<div class="item-name">' + escHtml(item.name) + '</div>'
                     +  (item.note ? '<div class="item-note">' + escHtml(item.note) + '</div>' : '')
                     +  '</div>'
                     +  '<div class="price-tag">' + formatPrice(item) + '</div>'
                     +  '</div>';
            });
            html += '</div>';
        });

        container.innerHTML = html;
    }

    function escHtml(s) {
        if (!s) return '';
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ══════════════════════════════════════════════════════
    //  INIT
    // ══════════════════════════════════════════════════════
    document.addEventListener('DOMContentLoaded', function() {
        renderList();
    });
    </script>
</body>
</html>
