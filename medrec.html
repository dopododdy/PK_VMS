<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกการรักษา | PK-VMS Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/th.js"></script>

    <style>
        :root { --navy: #020617; --navy-light: #0f172a; --teal: #14b8b1; --border: rgba(255, 255, 255, 0.1); }
        * { font-family: "Sarabun", sans-serif !important; }
        body { background: var(--navy); color: #e2e8f0; }
        
        .input-box { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; padding: 10px; color: white; width: 100%; outline: none; transition: 0.2s; }
        .input-box:focus { border-color: var(--teal); background: rgba(0,0,0,0.5); }
        
        .label-text { color: #94a3b8; font-size: 0.85rem; margin-bottom: 4px; display: block; font-weight: 600; }
        .label-clinical { color: var(--teal); font-weight: 800; font-size: 0.9rem; margin-bottom: 4px; display: block; }
        .pet-info-val { font-size: 1.15rem; font-weight: 800; line-height: 1.5; }

        .section-card { background: rgba(30, 41, 59, 0.4); border-radius: 30px; padding: 30px; border: 1px solid var(--border); margin-bottom: 24px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3); }
        .history-item { background: rgba(255, 255, 255, 0.03); border-radius: 20px; padding: 25px; border: 1px solid var(--border); transition: 0.3s; margin-bottom: 15px; }

        .btn-base { padding: 10px 20px; border-radius: 12px; font-weight: 800; display: inline-flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; border: none; cursor: pointer; color: white !important; }
        .btn-teal { background-color: #0d9488 !important; }
        .btn-blue { background-color: #2563eb !important; }
        .btn-red { background-color: #dc2626 !important; }

        .list-box { background: rgba(20, 184, 177, 0.05); border: 1.5px dashed var(--teal); border-radius: 12px; min-height: 80px; padding: 12px; cursor: pointer; }
        .view-hidden { display: none; }

        /* Modal Style */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--navy-light); border: 1px solid var(--border); border-radius: 30px; width: 100%; max-width: 600px; max-height: 80vh; display: flex; flex-direction: column; overflow: hidden; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-6">
                <button onclick="goBack()" class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center hover:bg-white/10 transition-all text-2xl shadow-lg">⬅️</button>
                <div>
                    <h1 class="text-4xl font-black text-white" id="head-pet-name">กำลังโหลด...</h1>
                    <p class="text-teal-400 font-bold text-lg" id="head-hn">HN: -</p>
                </div>
            </div>
            <a href="index.html" class="w-14 h-14 rounded-2xl bg-white/5 flex items-center justify-center hover:bg-white/10 text-3xl shadow-xl border border-white/5">🏠</a>
        </header>

        <div class="section-card border-l-8 border-blue-500">
            <h3 class="text-xl font-bold text-blue-400 mb-6 flex items-center gap-2">👤 ข้อมูลเจ้าของสัตว์</h3>
            <div class="grid grid-cols-12 gap-6">
                <div class="col-span-12 md:col-span-4"><label class="label-text">ชื่อ-นามสกุล เจ้าของ</label><div id="info-owner-name" class="text-lg font-bold text-white">-</div></div>
                <div class="col-span-12 md:col-span-3"><label class="label-text">เบอร์โทรศัพท์</label><div id="info-owner-phone" class="text-lg font-bold text-teal-400">-</div></div>
                <div class="col-span-12 md:col-span-5"><label class="label-text">ที่อยู่</label><div id="info-owner-address" class="text-sm text-slate-400">-</div></div>
            </div>
        </div>

        <div id="history-view-container">
            <div class="section-card border-l-8 border-teal-500">
                <div class="flex justify-between items-center mb-8">
                    <h3 class="text-xl font-bold text-white flex items-center gap-2" id="animal-info-head">🐾 ข้อมูลสัตว์</h3>
                    <button onclick="showFormView()" class="btn-base btn-teal text-lg py-3 px-6 shadow-xl">+ เพิ่มประวัติการรักษา</button>
                </div>
                <div class="grid grid-cols-12 gap-4">
                    <div class="col-span-6 md:col-span-2"><label class="label-text">ชื่อสัตว์</label><div id="v-pet-name" class="pet-info-val text-white">-</div></div>
                    <div class="col-span-6 md:col-span-3"><label class="label-text">ชนิด/สายพันธุ์</label><div id="v-pet-breed" class="pet-info-val text-white">-</div></div>
                    <div class="col-span-4 md:col-span-1"><label class="label-text">เพศ</label><div id="v-pet-gender" class="pet-info-val text-white">-</div></div>
                    <div class="col-span-4 md:col-span-1"><label class="label-text">นน.(กก.)</label><div id="v-pet-weight" class="pet-info-val text-yellow-400">-</div></div>
                    <div class="col-span-12 md:col-span-5"><label class="label-text">⚠️ แพ้ยา/ข้อควรระวัง</label><div id="v-pet-congenital" class="pet-info-val">-</div></div>
                </div>
            </div>

            <section class="mt-8 pb-20">
                <h3 class="text-2xl font-black text-white mb-8 flex items-center gap-3">⏳ ประวัติการรักษาย้อนหลัง <span id="record-count" class="bg-white/10 text-sm px-3 py-1 rounded-full font-normal">0 รายการ</span></h3>
                <div id="history-list" class="space-y-4"></div>
            </section>
        </div>

        <div id="form-view-container" class="view-hidden">
            <div class="section-card border-l-8 border-teal-400">
                <div class="flex justify-between items-center mb-8">
                    <h3 class="text-xl font-bold text-white flex items-center gap-2">🏥 บันทึกการตรวจรักษา</h3>
                    <div id="edit-mode-badge" class="hidden bg-orange-500 text-black px-4 py-1 rounded-full text-xs font-black animate-pulse">กำลังแก้ไขข้อมูลเดิม ✏️</div>
                </div>

                <div class="grid grid-cols-12 gap-4 mb-8 p-4 bg-white/5 rounded-2xl border border-white/5">
                    <div class="col-span-4 md:col-span-2"><label class="label-text">สัตว์ป่วย</label><div id="f-pet-name" class="font-bold text-white">-</div></div>
                    <div class="col-span-4 md:col-span-1"><label class="label-text">ชนิด</label><div id="f-pet-type" class="text-white">-</div></div>
                    <div class="col-span-4 md:col-span-1"><label class="label-text">เพศ</label><div id="f-pet-gender" class="text-white">-</div></div>
                    <div class="col-span-6 md:col-span-2"><label class="label-text">พันธุ์</label><div id="f-pet-breed" class="text-white truncate">-</div></div>
                    <div class="col-span-6 md:col-span-2"><label class="label-text">อายุ</label><div id="f-pet-age" class="text-white">-</div></div>
                    <div class="col-span-12 md:col-span-4"><label class="label-text text-red-400">แพ้ยา</label><div id="f-pet-congenital" class="font-bold text-red-400">-</div></div>
                </div>

                <div class="grid grid-cols-12 gap-5">
                    <div class="col-span-12 md:col-span-2">
                        <label class="label-clinical text-yellow-400">น้ำหนัก (กก.)</label>
                        <input type="number" id="f_weight" class="input-box font-bold text-yellow-400 text-xl" step="0.1">
                    </div>
                    <div class="col-span-12 md:col-span-5"><label class="label-clinical">CC (Chief Complaint)</label><textarea id="f_cc" class="input-box h-20" placeholder="ระบุอาการสำคัญ..."></textarea></div>
                    <div class="col-span-12 md:col-span-5"><label class="label-clinical">Hx (History)</label><textarea id="f_hx" class="input-box h-20" placeholder="ประวัติย้อนหลัง..."></textarea></div>
                    
                    <div class="col-span-12 md:col-span-4"><label class="label-clinical">PE (Physical Exam)</label><textarea id="f_pe" class="input-box h-32" placeholder="ผลการตรวจร่างกาย..."></textarea></div>
                    
                    <div class="col-span-12 md:col-span-4">
                        <label class="label-clinical">🔬 Lab (ผลแล็บ)</label>
                        <div id="list_lab_display" class="list-box text-sm overflow-y-auto max-h-32" onclick="openCatalog('lab')">คลิกเพื่อเลือกรายการแล็บ...</div>
                        <input type="hidden" id="f_lab">
                    </div>
                    
                    <div class="col-span-12 md:col-span-4"><label class="label-clinical text-yellow-400">Dx (Diagnosis)</label><textarea id="f_dx" class="input-box h-32 border-yellow-500/30" placeholder="การวินิจฉัย..."></textarea></div>
                    
                    <div class="col-span-12 md:col-span-6">
                        <label class="label-clinical">💉 Tx (Treatment)</label>
                        <div id="list_tx_display" class="list-box overflow-y-auto max-h-32" onclick="openCatalog('tx')">คลิกเพื่อเลือกหัตถการ...</div>
                        <input type="hidden" id="f_tx">
                    </div>
                    <div class="col-span-12 md:col-span-6">
                        <label class="label-clinical">💊 Rx (Medication)</label>
                        <div id="list_rx_display" class="list-box border-blue-500/50 overflow-y-auto max-h-32" onclick="openCatalog('rx')">คลิกเพื่อเลือกยา...</div>
                        <input type="hidden" id="f_rx">
                    </div>
                    
                    <div class="col-span-12 md:col-span-3"><label class="label-clinical">Plan / แผนการรักษา</label><input type="text" id="f_plan" class="input-box"></div>
                    <div class="col-span-6 md:col-span-3"><label class="label-clinical text-orange-400">📅 Appointment / วันนัด</label><input type="text" id="f_appointment" class="input-box datepicker"></div>
                    <div class="col-span-6 md:col-span-3"><label class="label-clinical text-orange-400">นัดหมายเพื่อ</label><input type="text" id="f_app_note" class="input-box" placeholder="เหตุผลการนัด..."></div>
                    <div class="col-span-12 md:col-span-3"><label class="label-text font-bold text-yellow-400">รวมค่ารักษา (฿)</label><input type="number" id="f_cost" class="input-box text-2xl font-black text-yellow-400" value="0"></div>
                    
                    <div class="col-span-12"><label class="label-text">Note / หมายเหตุ</label><input type="text" id="f_note" class="input-box"></div>
                </div>

                <div class="flex gap-4 mt-10">
                    <button onclick="saveMedicalRecord()" class="btn-base btn-teal flex-1 text-xl py-4">💾 บันทึกข้อมูลการตรวจ</button>
                    <button onclick="showHistoryView()" class="btn-base btn-red px-10">ยกเลิก</button>
                </div>
            </div>
        </div>
    </div>

    <div id="catalog-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="p-6 border-b border-white/10 flex justify-between items-center">
                <h3 id="modal-title" class="text-xl font-bold">เลือกรายการ</h3>
                <button onclick="closeCatalog()" class="text-2xl opacity-50 hover:opacity-100">✕</button>
            </div>
            <div class="p-4 bg-white/5 border-b border-white/5">
                <input type="text" id="catalog-search" class="input-box" placeholder="ค้นหาชื่อรายการ..." oninput="filterCatalog()">
            </div>
            <div id="catalog-items" class="flex-1 overflow-y-auto p-4 space-y-2">
                </div>
            <div class="p-6 border-t border-white/10 text-right">
                <button onclick="closeCatalog()" class="btn-base btn-blue">เสร็จสิ้น</button>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const animalId = urlParams.get('id');
        const ownerHN = urlParams.get('hn');
        let editingId = null;
        let records = [];
        
        // สำหรับจัดการรายการที่เลือก
        let selectedLabs = [], selectedTxs = [], selectedRxs = [];
        let currentCatalogType = '';
        let fullCatalog = [];

        window.onload = async () => {
            if (!animalId) return goBack();
            flatpickr(".datepicker", { locale: "th", dateFormat: "Y-m-d", altInput: true, altFormat: "j F Y" });
            await fetchInfo();
            await fetchRecords();
        };

        function calculateAge(dob) {
            if (!dob) return "ไม่ระบุ";
            const birth = new Date(dob);
            const now = new Date();
            let years = now.getFullYear() - birth.getFullYear();
            let months = now.getMonth() - birth.getMonth();
            if (months < 0) { years--; months += 12; }
            return `${years} ปี ${months} เดือน`;
        }

        async function fetchInfo() {
            const { data: owner } = await db.from('owners').select('*').eq('hn', ownerHN).single();
            const { data: phones } = await db.from('owner_phones').select('phone_number').eq('owner_hn', ownerHN);
            if (owner) {
                document.getElementById('info-owner-name').innerText = owner.owner_name;
                document.getElementById('info-owner-phone').innerText = phones?.[0]?.phone_number || '-';
                document.getElementById('info-owner-address').innerText = owner.address || '-';
                document.getElementById('head-hn').innerText = `HN: ${owner.hn}`;
            }

            const { data: pet } = await db.from('animals').select('*').eq('id', animalId).single();
            if (pet) {
                const icon = pet.pet_type === 'สุนัข' ? '🐶' : (pet.pet_type === 'แมว' ? '🐱' : '🐾');
                document.getElementById('animal-info-head').innerHTML = `${icon} ข้อมูลสัตว์`;
                document.getElementById('head-pet-name').innerText = pet.pet_name;
                document.getElementById('v-pet-name').innerText = pet.pet_name;
                document.getElementById('v-pet-breed').innerText = `${pet.pet_type} (${pet.breed || '-'})`;
                document.getElementById('v-pet-gender').innerText = pet.gender || '-';
                document.getElementById('v-pet-weight').innerText = pet.weight || '0';
                document.getElementById('f-pet-name').innerText = pet.pet_name;
                document.getElementById('f-pet-type').innerText = pet.pet_type;
                document.getElementById('f-pet-gender').innerText = pet.gender;
                document.getElementById('f-pet-breed').innerText = pet.breed || '-';
                document.getElementById('f-pet-age').innerText = calculateAge(pet.birth_date);
                document.getElementById('f_weight').value = pet.weight || 0;

                const allergyValue = pet.congenital_disease;
                const allergyElV = document.getElementById('v-pet-congenital');
                const allergyElF = document.getElementById('f-pet-congenital');
                if (allergyValue && allergyValue.trim() !== "" && allergyValue !== "ไม่มี" && allergyValue !== "-") {
                    allergyElV.innerText = allergyElF.innerText = allergyValue;
                    allergyElV.className = allergyElF.className = "pet-info-val text-red-500 font-black";
                } else {
                    allergyElV.innerText = allergyElF.innerText = "ไม่มีประวัติแพ้ยา";
                    allergyElV.className = allergyElF.className = "pet-info-val text-slate-400";
                }
            }
        }

        async function fetchRecords() {
            const { data } = await db.from('medical_records').select('*').eq('animal_id', animalId).order('created_at', { ascending: false });
            records = data || [];
            renderRecordsList();
        }

        function renderRecordsList() {
            const list = document.getElementById('history-list');
            document.getElementById('record-count').innerText = `${records.length} รายการ`;

            if (records.length === 0) {
                list.innerHTML = `<div class="text-center py-20 bg-slate-800/20 rounded-[40px] border-4 border-dashed border-white/5"><p class="text-slate-400 text-xl">ยังไม่เคยมีประวัติการรักษา</p></div>`;
                return;
            }

            list.innerHTML = records.map(rec => {
                const dateStr = new Date(rec.created_at).toLocaleDateString('th-TH', { day:'numeric', month:'short', year:'2-digit' });
                return `
                    <div class="history-item overflow-hidden" id="card-${rec.id}">
                        <div class="flex flex-wrap md:flex-nowrap items-center gap-4 cursor-pointer" onclick="toggleCollapse('${rec.id}')">
                            <div class="w-24 flex-shrink-0 text-teal-400 font-black text-lg">${dateStr}</div>
                            <div class="flex-1 grid grid-cols-1 md:grid-cols-2 gap-4 border-l border-white/10 pl-4">
                                <div class="truncate text-sm"><b class="text-teal-500 mr-1">CC:</b> <span class="text-slate-300">${rec.cc || '-'}</span></div>
                                <div class="truncate text-sm"><b class="text-teal-500 mr-1">PE:</b> <span class="text-slate-300">${rec.pe || '-'}</span></div>
                            </div>
                            <div class="flex items-center gap-2 ml-auto">
                                <button onclick="event.stopPropagation(); editRecord('${rec.id}')" class="btn-base btn-blue !py-1.5 !px-3 text-xs">✏️ แก้ไข</button>
                                <button onclick="event.stopPropagation(); deleteRecord('${rec.id}')" class="btn-base btn-red !py-1.5 !px-3 text-xs">🗑️</button>
                                <div class="text-teal-400 ml-2 transition-transform duration-300" id="arrow-${rec.id}">🔽</div>
                            </div>
                        </div>
                        <div id="detail-${rec.id}" class="hidden mt-6 pt-6 border-t border-white/5 animate-in slide-in-from-top-2 duration-300">
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 text-sm mb-6">
                                <div><b class="label-clinical text-xs">Hx:</b><p class="text-slate-300">${rec.hx || '-'}</p></div>
                                <div><b class="label-clinical text-xs">🔬 Lab:</b><p class="text-slate-300">${rec.lab || '-'}</p></div>
                                <div><b class="label-clinical text-xs text-yellow-400">Dx:</b><p class="text-yellow-100 font-bold">${rec.dx || '-'}</p></div>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                <div class="bg-black/40 p-4 rounded-xl border border-white/5 text-slate-200"><b class="text-teal-400">Tx:</b> ${rec.tx || '-'}</div>
                                <div class="bg-black/40 p-4 rounded-xl border border-white/5 text-slate-200"><b class="text-blue-400">Rx:</b> ${rec.rx || '-'}</div>
                            </div>
                            <div class="flex justify-between items-center pt-4 border-t border-white/5">
                                <div class="text-sm"><b>นัดเพื่อ:</b> ${rec.appointment_note || '-'}</div>
                                <div class="text-2xl font-black text-yellow-400">฿ ${rec.cost?.toLocaleString()}</div>
                            </div>
                        </div>
                    </div>`;
            }).join('');
        }

        // --- Logic สำหรับ Catalog (Master Data Connection) ---

        async function openCatalog(type) {
            currentCatalogType = type;
            const modal = document.getElementById('catalog-modal');
            const listContainer = document.getElementById('catalog-items');
            const title = document.getElementById('modal-title');
            listContainer.innerHTML = '<div class="text-center py-10 opacity-50">กำลังดึงข้อมูล...</div>';
            modal.style.display = 'flex';

            let items = [];
            if (type === 'lab') {
                title.innerText = 'เลือกรายการ Lab';
                // แสดงเฉพาะ Lab (ไม่แสดงหัตถการ)
                const { data } = await db.from('services')
                    .select('*')
                    .or('category.eq.Lab,category.eq.ตรวจเลือด,category.eq.ห้องแล็บ');
                if (data) items = data.map(i => ({ name: i.service_name, price: i.price, id: i.id }));
                
            } else if (type === 'tx') {
                title.innerText = 'เลือกหัตถการ';
                // แสดงเฉพาะหัตถการ
                const { data } = await db.from('services')
                    .select('*')
                    .eq('category', 'หัตถการ');
                if (data) items = data.map(i => ({ name: i.service_name, price: i.price, id: i.id }));
                
            } else if (type === 'rx') {
                title.innerText = 'เลือกยา และ สินค้า';
                // แสดง ยา และ สินค้า
                const { data } = await db.from('pharmacy')
                    .select('*')
                    .or('category.eq.ยา,category.eq.สินค้า');
                if (data) items = data.map(i => ({ name: i.item_name, price: i.price_per_unit, id: i.id }));
            }
            
            fullCatalog = items;
            renderCatalogItems(items);
        }

        function renderCatalogItems(items) {
            const listContainer = document.getElementById('catalog-items');
            if (items.length === 0) {
                listContainer.innerHTML = '<div class="text-center py-10 opacity-50">ไม่พบรายการข้อมูล</div>';
                return;
            }
            listContainer.innerHTML = items.map(item => `
                <div class="p-4 bg-white/5 rounded-xl border border-white/5 hover:border-teal-500 cursor-pointer flex justify-between items-center" 
                     onclick="addItemToSelection('${item.name.replace(/'/g, "\\'")}', ${item.price})">
                    <div>
                        <div class="font-bold text-white">${item.name}</div>
                        <div class="text-xs text-slate-500">ราคา: ฿${item.price}</div>
                    </div>
                    <div class="text-teal-400 text-xl">+</div>
                </div>
            `).join('');
        }

        function filterCatalog() {
            const term = document.getElementById('catalog-search').value.toLowerCase();
            const filtered = fullCatalog.filter(i => i.name.toLowerCase().includes(term));
            renderCatalogItems(filtered);
        }

        function addItemToSelection(name, price) {
            if (currentCatalogType === 'lab') selectedLabs.push(name);
            else if (currentCatalogType === 'tx') selectedTxs.push(name);
            else if (currentCatalogType === 'rx') selectedRxs.push(name);
            
            // บวกราคาให้อัตโนมัติ
            const costInput = document.getElementById('f_cost');
            costInput.value = parseFloat(costInput.value) + parseFloat(price);
            
            updateDisplayLists();
        }

        function updateDisplayLists() {
            document.getElementById('list_lab_display').innerText = selectedLabs.join(', ') || 'คลิกเพื่อเลือกรายการแล็บ...';
            document.getElementById('f_lab').value = selectedLabs.join(', ');
            
            document.getElementById('list_tx_display').innerText = selectedTxs.join(', ') || 'คลิกเพื่อเลือกหัตถการ...';
            document.getElementById('f_tx').value = selectedTxs.join(', ');
            
            document.getElementById('list_rx_display').innerText = selectedRxs.join(', ') || 'คลิกเพื่อเลือกรายการยา...';
            document.getElementById('f_rx').value = selectedRxs.join(', ');
        }

        function closeCatalog() { 
            document.getElementById('catalog-modal').style.display = 'none'; 
            document.getElementById('catalog-search').value = '';
        }

        // --- CRUD Logic ---

        async function saveMedicalRecord() {
            const data = {
                animal_id: animalId, owner_hn: ownerHN,
                cc: document.getElementById('f_cc').value, hx: document.getElementById('f_hx').value,
                pe: document.getElementById('f_pe').value, dx: document.getElementById('f_dx').value,
                lab: document.getElementById('f_lab').value, tx: document.getElementById('f_tx').value,
                rx: document.getElementById('f_rx').value, plan: document.getElementById('f_plan').value,
                appointment: document.getElementById('f_appointment').value || null,
                appointment_note: document.getElementById('f_app_note').value,
                note: document.getElementById('f_note').value,
                cost: parseFloat(document.getElementById('f_cost').value) || 0,
                updated_at: new Date()
            };
            try {
                if (editingId) await db.from('medical_records').update(data).eq('id', editingId);
                else await db.from('medical_records').insert([data]);
                await db.from('animals').update({ weight: parseFloat(document.getElementById('f_weight').value) }).eq('id', animalId);
                alert("✅ บันทึกสำเร็จ");
                location.reload();
            } catch (err) { alert(err.message); }
        }

        async function deleteRecord(id) {
            if(!confirm("ยืนยันการลบประวัตินี้?")) return;
            try {
                await db.from('medical_records').delete().eq('id', id);
                location.reload();
            } catch (err) { alert(err.message); }
        }

        function editRecord(id) {
            const rec = records.find(r => r.id === id);
            if (!rec) return;
            editingId = id;
            document.getElementById('f_cc').value = rec.cc || '';
            document.getElementById('f_hx').value = rec.hx || '';
            document.getElementById('f_pe').value = rec.pe || '';
            document.getElementById('f_dx').value = rec.dx || '';
            document.getElementById('f_plan').value = rec.plan || '';
            document.getElementById('f_app_note').value = rec.appointment_note || '';
            document.getElementById('f_cost').value = rec.cost || 0;
            document.getElementById('f_weight').value = rec.weight || document.getElementById('v-pet-weight').innerText;
            
            // ดึงรายการเดิมมาใส่ array
            selectedLabs = rec.lab ? rec.lab.split(', ') : [];
            selectedTxs = rec.tx ? rec.tx.split(', ') : [];
            selectedRxs = rec.rx ? rec.rx.split(', ') : [];
            updateDisplayLists();

            if (rec.appointment) document.getElementById('f_appointment')._flatpickr.setDate(rec.appointment);
            showFormView();
            document.getElementById('edit-mode-badge').classList.remove('hidden');
        }

        function showFormView() {
            document.getElementById('history-view-container').classList.add('view-hidden');
            document.getElementById('form-view-container').classList.remove('view-hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function showHistoryView() { location.reload(); }
        
        function toggleCollapse(id) {
            const detail = document.getElementById(`detail-${id}`);
            const arrow = document.getElementById(`arrow-${id}`);
            if(!detail) return;
            detail.classList.toggle('hidden');
            arrow.style.transform = detail.classList.contains('hidden') ? 'rotate(0deg)' : 'rotate(180deg)';
        }
        
        function goBack() { window.location.href = 'animals.html'; }
    </script>
</body>
</html>
