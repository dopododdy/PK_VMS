<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกการรักษา | PK-VMS Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/th.js"></script>

    <style>
        :root { --navy: #020617; --navy-light: #0f172a; --teal: #14b8b1; --border: rgba(255, 255, 255, 0.1); }
        * { font-family: "Sarabun", sans-serif !important; }
        body { background: var(--navy); color: #e2e8f0; }
        
        .input-box { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; padding: 10px; color: white; width: 100%; outline: none; transition: 0.2s; }
        .input-box:focus { border-color: var(--teal); background: rgba(0,0,0,0.5); }
        
        .label-text { color: #94a3b8; font-size: 0.85rem; margin-bottom: 4px; display: block; font-weight: 600; }
        .label-clinical { color: var(--teal); font-weight: 800; font-size: 0.9rem; margin-bottom: 4px; display: block; }
        
        /* สไตล์สำหรับค่าข้อมูลสัตว์ที่ต้องการความเท่ากัน */
        .pet-info-val { font-size: 1.125rem; font-weight: 800; line-height: 1.5; }

        .section-card { background: rgba(30, 41, 59, 0.4); border-radius: 30px; padding: 30px; border: 1px solid var(--border); margin-bottom: 24px; }
        .history-item { background: rgba(255, 255, 255, 0.03); border-radius: 20px; padding: 20px; border: 1px solid var(--border); transition: 0.3s; }

        .btn-base { padding: 12px 24px; border-radius: 15px; font-weight: 800; transition: 0.2s; display: flex; align-items: center; gap: 8px; justify-content: center; color: white !important; }
        .btn-teal { background-color: #0d9488 !important; }
        .btn-teal:hover { background-color: #0f766e !important; transform: translateY(-2px); }
        .btn-red { background-color: #dc2626 !important; }
        .btn-blue { background-color: #2563eb !important; }

        /* ปรับแต่งช่อง Readonly List */
        .list-box { background: rgba(20, 184, 177, 0.05); border: 1.5px dashed var(--teal); border-radius: 12px; min-height: 80px; padding: 10px; cursor: pointer; transition: 0.2s; }
        .list-box:hover { background: rgba(20, 184, 177, 0.1); }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div class="flex items-center gap-6">
                <button onclick="goBack()" class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center hover:bg-white/10 transition-all text-2xl">⬅️</button>
                <div>
                    <h1 class="text-4xl font-black text-white" id="head-pet-name">กำลังโหลด...</h1>
                    <p class="text-teal-400 font-bold text-lg" id="head-hn">HN: -</p>
                </div>
            </div>
            <div class="bg-teal-500/10 border border-teal-500/20 px-6 py-3 rounded-2xl text-teal-400 font-black">
                🩺 ONE-MAN SHOW CLINIC
            </div>
        </header>

        <div class="section-card border-l-8 border-blue-500">
            <h3 class="text-xl font-bold text-blue-400 mb-6 flex items-center gap-2">👤 ข้อมูลเจ้าของสัตว์</h3>
            <div class="grid grid-cols-12 gap-6">
                <div class="col-span-12 md:col-span-4">
                    <label class="label-text">ชื่อ-นามสกุล เจ้าของ</label>
                    <div id="info-owner-name" class="text-lg font-bold text-white">-</div>
                </div>
                <div class="col-span-12 md:col-span-3">
                    <label class="label-text">เบอร์โทรศัพท์</label>
                    <div id="info-owner-phone" class="text-lg font-bold text-teal-400">-</div>
                </div>
                <div class="col-span-12 md:col-span-5">
                    <label class="label-text">ที่อยู่</label>
                    <div id="info-owner-address" class="text-sm text-slate-400">-</div>
                </div>
            </div>
        </div>

        <div class="section-card border-l-8 border-teal-500">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-xl font-bold text-white flex items-center gap-2" id="animal-title-icon">🐾 ข้อมูลสัตว์และการตรวจรักษา</h3>
                <div id="edit-mode-badge" class="hidden bg-orange-500 text-black px-4 py-1 rounded-full text-xs font-black animate-pulse">กำลังแก้ไขข้อมูลเดิม ✏️</div>
            </div>

            <div class="grid grid-cols-12 gap-4 mb-10 pb-8 border-b border-white/5">
                <div class="col-span-6 md:col-span-2">
                    <label class="label-text">ชื่อสัตว์</label>
                    <div id="info-pet-name" class="pet-info-val text-white">-</div>
                </div>
                <div class="col-span-6 md:col-span-2">
                    <label class="label-text">ชนิด/สายพันธุ์</label>
                    <div id="info-pet-breed" class="pet-info-val text-white">-</div>
                </div>
                <div class="col-span-3 md:col-span-1">
                    <label class="label-text">เพศ</label>
                    <div id="info-pet-gender" class="pet-info-val text-white">-</div>
                </div>
                <div class="col-span-3 md:col-span-1">
                    <label class="label-text">นน.(กก.)</label>
                    <input type="number" id="f_weight" class="input-box text-center pet-info-val text-yellow-400 p-1" step="0.1">
                </div>
                <div class="col-span-12 md:col-span-6">
                    <label class="label-text text-red-500">⚠️ แพ้ยา/ข้อควรระวัง (Drug Allergy & Warning)</label>
                    <div id="info-pet-congenital" class="pet-info-val text-red-500 whitespace-normal">-</div>
                </div>
            </div>

            <div class="grid grid-cols-12 gap-5">
                <div class="col-span-12 md:col-span-6">
                    <label class="label-clinical">CC (Chief Complaint) / อาการสำคัญ</label>
                    <textarea id="f_cc" class="input-box h-20" placeholder="ระบุเหตุผลที่มา..."></textarea>
                </div>
                <div class="col-span-12 md:col-span-6">
                    <label class="label-clinical">Hx (History) / ประวัติการเจ็บป่วย</label>
                    <textarea id="f_hx" class="input-box h-20" placeholder="ประวัติย้อนหลัง..."></textarea>
                </div>
                <div class="col-span-12 md:col-span-4">
                    <label class="label-clinical">PE (Physical Exam) / ตรวจร่างกาย</label>
                    <textarea id="f_pe" class="input-box h-32" placeholder="ผลการตรวจร่างกาย..."></textarea>
                </div>

                <div class="col-span-12 md:col-span-4">
                    <label class="label-clinical">🔬 Lab / ผลแล็บ (คลิกเพื่อเลือก)</label>
                    <div id="list_lab" class="list-box text-sm" onclick="alert('Module lab.html กำลังพัฒนา')">เลือกรายการแล็บ...</div>
                    <textarea id="f_lab" class="hidden"></textarea>
                </div>
                <div class="col-span-12 md:col-span-4">
                    <label class="label-clinical text-yellow-400">Dx (Diagnosis) / วินิจฉัย</label>
                    <textarea id="f_dx" class="input-box h-32 border-yellow-500/30" placeholder="ระบุการวินิจฉัย..."></textarea>
                </div>
                
                <div class="col-span-12 md:col-span-6">
                    <label class="label-clinical">💉 Tx (Treatment) / การรักษา (คลิกเพื่อเลือก)</label>
                    <div id="list_tx" class="list-box" onclick="alert('Module tx.html กำลังพัฒนา')">เลือกหัตถการ/การรักษา...</div>
                    <textarea id="f_tx" class="hidden"></textarea>
                </div>
                <div class="col-span-12 md:col-span-6">
                    <label class="label-clinical">💊 Rx (Medication) / สั่งยา (คลิกเพื่อเลือก)</label>
                    <div id="list_rx" class="list-box border-blue-500/50" onclick="alert('Module rx.html กำลังพัฒนา')">เลือกรายการยา...</div>
                    <textarea id="f_rx" class="hidden"></textarea>
                </div>

                <div class="col-span-12 md:col-span-4">
                    <label class="label-clinical">Plan / แผนการรักษาต่อไป</label>
                    <input type="text" id="f_plan" class="input-box" placeholder="แผนในอนาคต...">
                </div>
                <div class="col-span-6 md:col-span-4">
                    <label class="label-clinical text-orange-400">📅 Appointment / วันนัด</label>
                    <input type="text" id="f_appointment" class="input-box datepicker" placeholder="เลือกวันนัด...">
                </div>
                <div class="col-span-6 md:col-span-4">
                    <label class="label-text font-bold text-yellow-400">รวมค่ารักษาทั้งหมด (฿)</label>
                    <input type="number" id="f_cost" class="input-box text-2xl font-black text-yellow-400" value="0">
                </div>
                <div class="col-span-12">
                    <label class="label-text">Note / หมายเหตุเพิ่มเติม</label>
                    <input type="text" id="f_note" class="input-box">
                </div>
            </div>

            <div class="flex gap-4 mt-10">
                <button onclick="saveMedicalRecord()" class="btn-base btn-teal flex-1 text-xl">
                    💾 บันทึกการรักษา
                </button>
                <button id="btn-cancel" onclick="resetForm()" class="hidden btn-base btn-red">
                    ยกเลิกแก้ไข
                </button>
            </div>
        </div>

        <section class="mt-16 pb-20">
            <h3 class="text-2xl font-black text-white mb-8 flex items-center gap-3">
                ⏳ ประวัติการรักษาย้อนหลัง
                <span id="record-count" class="bg-white/10 text-sm px-3 py-1 rounded-full font-normal">0 รายการ</span>
            </h3>
            <div id="history-container" class="space-y-6"></div>
        </section>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const animalId = urlParams.get('id');
        const ownerHN = urlParams.get('hn');
        let editingId = null;
        let records = [];

        window.onload = async () => {
            if (!animalId) return goBack();
            flatpickr(".datepicker", { locale: "th", dateFormat: "Y-m-d", altInput: true, altFormat: "j F Y" });
            await fetchInfo();
            await fetchRecords();
        };

        async function fetchInfo() {
            // Owner Info
            const { data: owner } = await db.from('owners').select('*').eq('hn', ownerHN).single();
            const { data: phones } = await db.from('owner_phones').select('phone_number').eq('owner_hn', ownerHN);
            if (owner) {
                document.getElementById('info-owner-name').innerText = owner.owner_name;
                document.getElementById('info-owner-phone').innerText = phones?.[0]?.phone_number || '-';
                document.getElementById('info-owner-address').innerText = owner.address || '-';
                document.getElementById('head-hn').innerText = `HN: ${owner.hn}`;
            }

            // Pet Info
            const { data: pet } = await db.from('animals').select('*').eq('id', animalId).single();
            if (pet) {
                const icon = pet.pet_type === 'สุนัข' ? '🐶' : (pet.pet_type === 'แมว' ? '🐱' : '🐾');
                document.getElementById('animal-title-icon').innerHTML = `${icon} ข้อมูลสัตว์และการตรวจรักษา`;
                document.getElementById('head-pet-name').innerText = pet.pet_name;
                document.getElementById('info-pet-name').innerText = pet.pet_name;
                document.getElementById('info-pet-breed').innerText = pet.breed;
                document.getElementById('info-pet-gender').innerText = pet.gender;
                document.getElementById('f_weight').value = pet.weight;
                document.getElementById('info-pet-congenital').innerText = pet.congenital_disease || 'ไม่มีประวัติแพ้ยา';
            }
        }

        async function fetchRecords() {
            const { data } = await db.from('medical_records').select('*').eq('animal_id', animalId).order('created_at', { ascending: false });
            records = data || [];
            renderRecords();
        }

        function renderRecords() {
            const container = document.getElementById('history-container');
            document.getElementById('record-count').innerText = `${records.length} รายการ`;
            if (records.length === 0) {
                container.innerHTML = `<div class="text-center p-20 border-2 border-dashed border-white/5 rounded-3xl text-slate-500 font-bold">ยังไม่มีประวัติการรักษา</div>`;
                return;
            }
            container.innerHTML = records.map(rec => `
                <div class="history-item">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <span class="text-teal-400 font-black text-lg">${new Date(rec.created_at).toLocaleDateString('th-TH', { day:'numeric', month:'long', year:'numeric' })}</span>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="editRecord('${rec.id}')" class="btn-base btn-blue py-1 px-3 text-sm">✏️ แก้ไข</button>
                            <button onclick="deleteRecord('${rec.id}')" class="btn-base btn-red py-1 px-3 text-sm">🗑️</button>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
                        <div class="text-slate-300"><b>CC:</b> ${rec.cc || '-'}</div>
                        <div class="text-yellow-200"><b>Dx:</b> ${rec.dx || '-'}</div>
                        <div class="col-span-full bg-black/40 p-3 rounded-lg border border-white/5">
                            <div class="text-teal-400 font-bold mb-1">การรักษาและยา:</div>
                            <div class="text-white whitespace-pre-line">${rec.tx ? 'Tx: '+rec.tx : ''}\n${rec.rx ? 'Rx: '+rec.rx : ''}</div>
                        </div>
                    </div>
                    <div class="mt-4 text-right font-black text-yellow-400">฿ ${rec.cost?.toLocaleString()}</div>
                </div>
            `).join('');
        }

        async function saveMedicalRecord() {
            const data = {
                animal_id: animalId, owner_hn: ownerHN,
                cc: document.getElementById('f_cc').value, hx: document.getElementById('f_hx').value,
                pe: document.getElementById('f_pe').value, dx: document.getElementById('f_dx').value,
                lab: document.getElementById('f_lab').value, tx: document.getElementById('f_tx').value,
                rx: document.getElementById('f_rx').value, plan: document.getElementById('f_plan').value,
                appointment: document.getElementById('f_appointment').value || null,
                note: document.getElementById('f_note').value,
                cost: parseFloat(document.getElementById('f_cost').value) || 0,
                updated_at: new Date()
            };

            try {
                if (editingId) await db.from('medical_records').update(data).eq('id', editingId);
                else await db.from('medical_records').insert([data]);
                
                await db.from('animals').update({ weight: parseFloat(document.getElementById('f_weight').value) }).eq('id', animalId);
                
                alert("✅ บันทึกเรียบร้อย");
                location.reload();
            } catch (err) { alert(err.message); }
        }

        function editRecord(id) {
            const rec = records.find(r => r.id === id);
            if (!rec) return;
            editingId = id;
            document.getElementById('f_cc').value = rec.cc || '';
            document.getElementById('f_hx').value = rec.hx || '';
            document.getElementById('f_pe').value = rec.pe || '';
            document.getElementById('f_dx').value = rec.dx || '';
            document.getElementById('f_lab').value = rec.lab || '';
            document.getElementById('f_tx').value = rec.tx || '';
            document.getElementById('f_rx').value = rec.rx || '';
            document.getElementById('f_plan').value = rec.plan || '';
            document.getElementById('f_note').value = rec.note || '';
            document.getElementById('f_cost').value = rec.cost || 0;
            if (rec.appointment) document.getElementById('f_appointment')._flatpickr.setDate(rec.appointment);
            
            document.getElementById('edit-mode-badge').classList.remove('hidden');
            document.getElementById('btn-cancel').classList.remove('hidden');
            window.scrollTo({ top: 300, behavior: 'smooth' });
        }

        async function deleteRecord(id) {
            if (confirm("ยืนยันการลบ?")) {
                await db.from('medical_records').delete().eq('id', id);
                fetchRecords();
            }
        }

        function resetForm() {
            editingId = null;
            document.getElementById('edit-mode-badge').classList.add('hidden');
            document.getElementById('btn-cancel').classList.add('hidden');
            location.reload();
        }

        function goBack() { window.location.href = 'animals.html'; }
    </script>
</body>
</html>
