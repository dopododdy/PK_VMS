<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกการรักษา | PK-VMS Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/th.js"></script>

    <style>
        :root { --navy: #020617; --navy-light: #0f172a; --teal: #14b8b1; --border: rgba(255, 255, 255, 0.1); }
        * { font-family: "Sarabun", sans-serif !important; }
        body { background: var(--navy); color: #e2e8f0; }
        .input-box { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; padding: 10px; color: white; width: 100%; outline: none; transition: 0.2s; }
        .input-box:focus { border-color: var(--teal); background: rgba(0,0,0,0.5); }
        .label-text { color: #94a3b8; font-size: 0.85rem; margin-bottom: 4px; display: block; font-weight: 600; }
        .label-clinical { color: var(--teal); font-weight: 800; font-size: 0.9rem; margin-bottom: 4px; display: block; }
        .section-card { background: rgba(30, 41, 59, 0.4); border-radius: 30px; padding: 30px; border: 1px solid var(--border); margin-bottom: 24px; }
        .history-item { background: rgba(255, 255, 255, 0.03); border-radius: 20px; padding: 25px; border: 1px solid var(--border); margin-bottom: 15px; }
        .btn-base { padding: 10px 20px; border-radius: 12px; font-weight: 800; display: inline-flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; border: none; cursor: pointer; color: white !important; }
        .btn-teal { background-color: #0d9488 !important; }
        .btn-blue { background-color: #2563eb !important; }
        .btn-red { background-color: #dc2626 !important; }
        .list-box { background: rgba(20, 184, 177, 0.05); border: 1.5px dashed var(--teal); border-radius: 12px; min-height: 80px; padding: 12px; cursor: pointer; }
        .view-hidden { display: none; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--navy-light); border: 1px solid var(--border); border-radius: 30px; width: 100%; max-width: 600px; max-height: 85vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .clinical-list { list-style-type: none; padding-left: 0; margin: 0; }
        .clinical-list li { position: relative; padding-left: 18px; margin-bottom: 4px; color: #cbd5e1; font-size: 0.9rem; }
        .clinical-list li::before { content: "•"; position: absolute; left: 0; color: var(--teal); font-weight: bold; }

        /* Route Checkbox Styling */
        .route-chip input { display: none; }
        .route-chip span { display: inline-block; padding: 8px 16px; border-radius: 10px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); cursor: pointer; transition: 0.2s; font-weight: bold; font-size: 0.8rem; }
        .route-chip input:checked + span { background: var(--teal); color: black; border-color: var(--teal); }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-6">
                <button onclick="goBack()" class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center hover:bg-white/10 transition-all text-2xl shadow-lg">⬅️</button>
                <div>
                    <h1 class="text-4xl font-black text-white" id="head-pet-name">กำลังโหลด...</h1>
                    <p class="text-teal-400 font-bold text-lg" id="head-hn">HN: -</p>
                </div>
            </div>
            <a href="index.html" class="w-14 h-14 rounded-2xl bg-white/5 flex items-center justify-center hover:bg-white/10 text-3xl shadow-xl border border-white/5">🏠</a>
        </header>

        <div id="history-view-container">
            <div class="section-card border-l-8 border-teal-500">
                <div class="flex justify-between items-center mb-8">
                    <h3 class="text-xl font-bold text-white flex items-center gap-2" id="animal-info-head">🐾 ข้อมูลสัตว์</h3>
                    <button onclick="showFormView()" class="btn-base btn-teal text-lg py-3 px-6 shadow-xl">+ เพิ่มประวัติการรักษา</button>
                </div>
                <div class="grid grid-cols-12 gap-4">
                    <div class="col-span-6 md:col-span-3"><label class="label-text">ชื่อสัตว์/พันธุ์</label><div id="v-pet-name" class="font-bold text-white text-xl">-</div></div>
                    <div class="col-span-3 md:col-span-2"><label class="label-text">เพศ</label><div id="v-pet-gender" class="font-bold text-white">-</div></div>
                    <div class="col-span-3 md:col-span-2"><label class="label-text">นน.(กก.)</label><div id="v-pet-weight" class="font-bold text-yellow-400 text-xl">-</div></div>
                    <div class="col-span-12 md:col-span-5"><label class="label-text">⚠️ แพ้ยา/ข้อควรระวัง</label><div id="v-pet-congenital" class="font-bold text-red-400">-</div></div>
                </div>
            </div>

            <section class="mt-8 pb-20">
                <h3 class="text-2xl font-black text-white mb-8 flex items-center gap-3">⏳ ประวัติการรักษาย้อนหลัง <span id="record-count" class="bg-white/10 text-sm px-3 py-1 rounded-full font-normal">0 รายการ</span></h3>
                <div id="history-list" class="space-y-4"></div>
            </section>
        </div>

        <div id="form-view-container" class="view-hidden">
            <div class="section-card border-l-8 border-teal-400">
                <div class="flex justify-between items-center mb-8">
                    <h3 class="text-xl font-bold text-white flex items-center gap-2">🏥 บันทึกการตรวจรักษา</h3>
                    <div id="edit-mode-badge" class="hidden bg-orange-500 text-black px-4 py-1 rounded-full text-xs font-black animate-pulse">กำลังแก้ไขข้อมูลเดิม ✏️</div>
                </div>

                <div class="grid grid-cols-12 gap-5">
                    <div class="col-span-12 md:col-span-2">
                        <label class="label-clinical text-yellow-400">น้ำหนัก (กก.)</label>
                        <input type="number" id="f_weight" class="input-box font-bold text-yellow-400 text-xl" step="0.1">
                    </div>
                    <div class="col-span-12 md:col-span-5"><label class="label-clinical">CC (Chief Complaint)</label><textarea id="f_cc" class="input-box h-20" placeholder="ระบุอาการสำคัญ..."></textarea></div>
                    <div class="col-span-12 md:col-span-5"><label class="label-clinical">Dx (Diagnosis)</label><textarea id="f_dx" class="input-box h-20" placeholder="การวินิจฉัย..."></textarea></div>
                    
                    <div class="col-span-12 md:col-span-4"><label class="label-clinical">🔬 Lab (ผลแล็บ)</label><div id="list_lab_display" class="list-box overflow-y-auto max-h-32" onclick="openCatalog('lab')">คลิกเพื่อเลือก...</div><input type="hidden" id="f_lab"></div>
                    <div class="col-span-12 md:col-span-4"><label class="label-clinical">💉 Tx (Treatment)</label><div id="list_tx_display" class="list-box overflow-y-auto max-h-32" onclick="openCatalog('tx')">คลิกเพื่อเลือก...</div><input type="hidden" id="f_tx"></div>
                    <div class="col-span-12 md:col-span-4"><label class="label-clinical">💊 Rx (Pharmacy)</label><div id="list_rx_display" class="list-box overflow-y-auto max-h-32 border-blue-500/30" onclick="openCatalog('rx')">คลิกเพื่อเลือก...</div><input type="hidden" id="f_rx"></div>
                    
                    <div class="col-span-12 md:col-span-9"><label class="label-clinical">Plan / Note</label><input type="text" id="f_plan" class="input-box" placeholder="แผนการรักษาหรือหมายเหตุเพิ่มเติม..."></div>
                    <div class="col-span-12 md:col-span-3"><label class="label-text font-bold text-yellow-400">รวมค่ารักษา (฿)</label><input type="number" id="f_cost" class="input-box text-2xl font-black text-yellow-400" value="0"></div>
                </div>

                <div class="flex gap-4 mt-10">
                    <button onclick="saveMedicalRecord()" class="btn-base btn-teal flex-1 text-xl py-4">💾 บันทึกประวัติ</button>
                    <button onclick="showHistoryView()" class="btn-base btn-red px-10">ยกเลิก</button>
                </div>
            </div>
        </div>
    </div>

    <div id="catalog-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="p-6 border-b border-white/10 flex justify-between items-center bg-slate-900/50">
                <h3 id="modal-title" class="text-xl font-bold text-white">เลือกรายการ</h3>
                <button onclick="closeCatalog()" class="text-2xl opacity-50 hover:opacity-100">✕</button>
            </div>
            <div class="p-4 bg-white/5 border-b border-white/5">
                <input type="text" id="catalog-search" class="input-box" placeholder="ค้นหาตามชื่อ..." oninput="filterCatalog()">
            </div>
            <div id="catalog-items" class="flex-1 overflow-y-auto p-4 space-y-2 bg-black/20"></div>
            
            <div class="p-4 bg-teal-500/10 border-t border-teal-500/20">
                <label class="text-[10px] font-bold text-teal-400 uppercase mb-2 block text-center">รายการที่เลือกเพิ่มแล้วในรอบนี้:</label>
                <div id="modal-session-tags" class="flex flex-wrap gap-2 justify-center">
                    <span class="text-slate-500 text-xs italic">ยังไม่มีรายการ...</span>
                </div>
            </div>

            <div class="p-6 border-t border-white/10 bg-slate-900/50">
                <button onclick="closeCatalog()" class="btn-base btn-blue w-full">ปิดหน้าต่าง</button>
            </div>
        </div>
    </div>

    <div id="injection-modal" class="modal-overlay" style="z-index: 110;">
        <div class="modal-content !max-w-md">
            <div class="p-6 border-b border-white/10 bg-teal-900/20">
                <h3 class="text-xl font-bold text-teal-400">รายละเอียดการให้ยา</h3>
                <p id="inj-item-name" class="text-sm text-slate-300 mt-1">-</p>
            </div>
            <div class="p-6 space-y-6">
                <div>
                    <label class="label-clinical text-yellow-400">ปริมาณยา (ml)</label>
                    <input type="number" id="inj-ml" class="input-box text-2xl font-black text-yellow-400" step="0.05" value="0.1">
                </div>
                <div>
                    <label class="label-clinical mb-3">Route (ช่องทางการให้ยา)</label>
                    <div class="flex flex-wrap gap-3">
                        <label class="route-chip"><input type="checkbox" name="inj-route" value="SC"><span>SC</span></label>
                        <label class="route-chip"><input type="checkbox" name="inj-route" value="IM"><span>IM</span></label>
                        <label class="route-chip"><input type="checkbox" name="inj-route" value="IV"><span>IV</span></label>
                        <label class="route-chip"><input type="checkbox" name="inj-route" value="ID"><span>ID</span></label>
                        <label class="route-chip"><input type="checkbox" name="inj-route" value="Topical"><span>Topical</span></label>
                    </div>
                </div>
            </div>
            <div class="p-6 border-t border-white/10 flex gap-3">
                <button onclick="confirmInjection()" class="btn-base btn-teal flex-1">ยืนยันข้อมูล</button>
                <button onclick="document.getElementById('injection-modal').style.display='none'" class="btn-base bg-slate-700 text-white">ยกเลิก</button>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const animalId = urlParams.get('id');
        const ownerHN = urlParams.get('hn');
        let records = [];
        let selectedLabs = [], selectedTxs = [], selectedRxs = [];
        let currentCatalogType = '';
        let fullCatalog = [];
        let pendingItem = null; // เก็บ item ที่กำลังรอระบุ ml/route

        window.onload = async () => {
            if (!animalId) return goBack();
            await fetchInfo();
            await fetchRecords();
        };

        function formatToBullet(str) {
            if (!str || str.trim() === "") return "-";
            const items = str.split(', ');
            return `<ul class="clinical-list">${items.map(i => `<li>${i}</li>`).join('')}</ul>`;
        }

        async function fetchInfo() {
            const { data: owner } = await db.from('owners').select('*').eq('hn', ownerHN).single();
            const { data: pet } = await db.from('animals').select('*').eq('id', animalId).single();
            if (owner && pet) {
                document.getElementById('head-pet-name').innerText = pet.pet_name;
                document.getElementById('head-hn').innerText = `HN: ${owner.hn} | ${owner.owner_name}`;
                document.getElementById('v-pet-name').innerText = `${pet.pet_name} (${pet.pet_type})`;
                document.getElementById('v-pet-gender').innerText = pet.gender;
                document.getElementById('v-pet-weight').innerText = pet.weight || '0';
                document.getElementById('f_weight').value = pet.weight || 0;
                document.getElementById('v-pet-congenital').innerText = pet.congenital_disease || 'ไม่มีประวัติแพ้ยา';
            }
        }

        async function fetchRecords() {
            const { data } = await db.from('medical_records').select('*').eq('animal_id', animalId).order('created_at', { ascending: false });
            records = data || [];
            renderRecordsList();
        }

        function renderRecordsList() {
            const list = document.getElementById('history-list');
            document.getElementById('record-count').innerText = `${records.length} รายการ`;
            list.innerHTML = records.map(rec => {
                const dateStr = new Date(rec.created_at).toLocaleDateString('th-TH', { day:'numeric', month:'short', year:'2-digit' });
                return `
                    <div class="history-item">
                        <div class="flex items-center gap-4 cursor-pointer" onclick="toggleCollapse('${rec.id}')">
                            <div class="w-20 text-teal-400 font-black">${dateStr}</div>
                            <div class="flex-1 grid grid-cols-2 gap-4 border-l border-white/10 pl-4">
                                <div class="truncate text-xs"><b class="text-teal-500">CC:</b> ${rec.cc || '-'}</div>
                                <div class="truncate text-xs"><b class="text-teal-500">Dx:</b> ${rec.dx || '-'}</div>
                            </div>
                            <div id="arrow-${rec.id}" class="text-teal-500">🔽</div>
                        </div>
                        <div id="detail-${rec.id}" class="hidden mt-4 pt-4 border-t border-white/5 space-y-4">
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 text-sm">
                                <div><b class="label-clinical text-[10px]">🔬 Lab:</b> ${formatToBullet(rec.lab)}</div>
                                <div><b class="label-clinical text-[10px]">💉 Tx:</b> ${formatToBullet(rec.tx)}</div>
                                <div><b class="label-clinical text-[10px]">💊 Rx:</b> ${formatToBullet(rec.rx)}</div>
                            </div>
                            <div class="flex justify-between items-center bg-black/20 p-3 rounded-xl">
                                <div class="text-xs text-slate-400">Note: ${rec.plan || '-'}</div>
                                <div class="font-black text-yellow-400">฿ ${rec.cost?.toLocaleString()}</div>
                            </div>
                        </div>
                    </div>`;
            }).join('');
        }

        async function openCatalog(type) {
            currentCatalogType = type;
            const modal = document.getElementById('catalog-modal');
            const title = document.getElementById('modal-title');
            modal.style.display = 'flex';
            updateModalSessionUI();

            let items = [];
            if (type === 'lab') {
                title.innerText = '🔬 เลือกรายการ Lab';
                const { data } = await db.from('services').select('*').or('category.eq.Lab,category.eq.ตรวจเลือด').order('service_name', { ascending: true });
                items = data.map(i => ({ name: i.service_name, price: i.price, config: i.price_config }));
            } else if (type === 'tx') {
                title.innerText = '💉 เลือกหัตถการ / การรักษา';
                const { data } = await db.from('services').select('*').eq('category', 'หัตถการ').order('service_name', { ascending: true });
                items = data.map(i => ({ name: i.service_name, price: i.price, config: i.price_config }));
            } else if (type === 'rx') {
                title.innerText = '💊 เลือกยา และ สินค้า';
                const { data } = await db.from('pharmacy').select('*').order('item_name', { ascending: true });
                items = data.map(i => ({ name: i.item_name, price: i.price_per_unit }));
            }
            fullCatalog = items;
            renderCatalogItems(items);
        }

        function renderCatalogItems(items) {
            const listContainer = document.getElementById('catalog-items');
            listContainer.innerHTML = items.map(item => `
                <div class="p-4 bg-white/5 rounded-2xl border border-white/5 hover:border-teal-500 cursor-pointer flex justify-between items-center group transition-all" 
                     onclick="handleItemSelection(${JSON.stringify(item).replace(/"/g, '&quot;')})">
                    <div>
                        <div class="font-bold text-white group-hover:text-teal-400">${item.name || item.item_name}</div>
                        <div class="text-xs text-slate-500">฿${item.price || item.price_per_unit}</div>
                    </div>
                    <div class="text-teal-500 text-xl font-black">+</div>
                </div>`).join('');
        }

        function handleItemSelection(item) {
            // ถ้าเป็น Tx และมี config (คือยาฉีด) ให้เปิด Injection Modal
            if (currentCatalogType === 'tx' && item.config && Array.isArray(item.config)) {
                pendingItem = item;
                document.getElementById('inj-item-name').innerText = item.name;
                document.getElementById('inj-ml').value = 0.1;
                // reset checkboxes
                document.querySelectorAll('input[name="inj-route"]').forEach(cb => cb.checked = false);
                document.getElementById('injection-modal').style.display = 'flex';
            } else {
                // ถ้าเป็นอย่างอื่น หรือ Tx แบบเหมา ให้เพิ่มทันที
                addItem(item.name || item.item_name, parseFloat(item.price || item.price_per_unit));
            }
        }

        function confirmInjection() {
            if (!pendingItem) return;
            const ml = document.getElementById('inj-ml').value;
            if (!ml || isNaN(ml)) return alert("กรุณาระบุปริมาณยา");

            // รวบรวม route จาก checkbox
            const checkedRoutes = Array.from(document.querySelectorAll('input[name="inj-route"]:checked')).map(cb => cb.value);
            const routeStr = checkedRoutes.length > 0 ? checkedRoutes.join('/') : '';
            
            // คำนวณราคากลาง Tier
            let finalPrice = parseFloat(pendingItem.price);
            const u = parseFloat(ml);
            const tiers = pendingItem.config.sort((a,b) => a.max - b.max);
            const match = tiers.find(t => u <= t.max);
            if (match) finalPrice = parseFloat(match.price);

            const finalName = `${pendingItem.name} (${ml}ml) ${routeStr}`.trim();
            addItem(finalName, finalPrice);

            document.getElementById('injection-modal').style.display = 'none';
            pendingItem = null;
        }

        function addItem(name, price) {
            if (currentCatalogType === 'lab') selectedLabs.push(name);
            else if (currentCatalogType === 'tx') selectedTxs.push(name);
            else if (currentCatalogType === 'rx') selectedRxs.push(name);

            document.getElementById('f_cost').value = (parseFloat(document.getElementById('f_cost').value) + price).toFixed(2);
            updateDisplayLists();
            updateModalSessionUI();
        }

        function updateModalSessionUI() {
            const sessionDiv = document.getElementById('modal-session-tags');
            let currentArray = currentCatalogType === 'lab' ? selectedLabs : (currentCatalogType === 'tx' ? selectedTxs : selectedRxs);
            if (currentArray.length === 0) {
                sessionDiv.innerHTML = '<span class="text-slate-500 text-xs italic">ยังไม่มีรายการ...</span>';
            } else {
                sessionDiv.innerHTML = currentArray.map(name => `<span class="bg-teal-500 text-black px-2 py-1 rounded-lg text-[10px] font-bold">✓ ${name}</span>`).join('');
            }
        }

        function updateDisplayLists() {
            document.getElementById('list_lab_display').innerHTML = formatToBullet(selectedLabs.join(', ')) || 'คลิกเพื่อเลือก...';
            document.getElementById('f_lab').value = selectedLabs.join(', ');
            document.getElementById('list_tx_display').innerHTML = formatToBullet(selectedTxs.join(', ')) || 'คลิกเพื่อเลือก...';
            document.getElementById('f_tx').value = selectedTxs.join(', ');
            document.getElementById('list_rx_display').innerHTML = formatToBullet(selectedRxs.join(', ')) || 'คลิกเพื่อเลือก...';
            document.getElementById('f_rx').value = selectedRxs.join(', ');
        }

        function filterCatalog() {
            const term = document.getElementById('catalog-search').value.toLowerCase();
            const filtered = fullCatalog.filter(i => (i.name || i.item_name).toLowerCase().includes(term));
            renderCatalogItems(filtered);
        }

        async function saveMedicalRecord() {
            const data = {
                animal_id: animalId, owner_hn: ownerHN,
                weight: parseFloat(document.getElementById('f_weight').value),
                cc: document.getElementById('f_cc').value, dx: document.getElementById('f_dx').value,
                lab: document.getElementById('f_lab').value, tx: document.getElementById('f_tx').value,
                rx: document.getElementById('f_rx').value, plan: document.getElementById('f_plan').value,
                cost: parseFloat(document.getElementById('f_cost').value) || 0,
                updated_at: new Date()
            };
            await db.from('medical_records').insert([data]);
            await db.from('animals').update({ weight: data.weight }).eq('id', animalId);
            location.reload();
        }

        function toggleCollapse(id) {
            const detail = document.getElementById(`detail-${id}`);
            const arrow = document.getElementById(`arrow-${id}`);
            detail.classList.toggle('hidden');
            arrow.style.transform = detail.classList.contains('hidden') ? 'rotate(0deg)' : 'rotate(180deg)';
        }
        function showFormView() { 
            document.getElementById('history-view-container').classList.add('view-hidden');
            document.getElementById('form-view-container').classList.remove('view-hidden');
        }
        function showHistoryView() { location.reload(); }
        function closeCatalog() { document.getElementById('catalog-modal').style.display = 'none'; }
        function goBack() { window.location.href = 'animals.html'; }
    </script>
</body>
</html>
