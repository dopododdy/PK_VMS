<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกการรักษา | PK-VMS Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/th.js"></script>

    <style>
        :root { --navy: #020617; --navy-light: #0f172a; --teal: #14b8b1; --border: rgba(255, 255, 255, 0.1); }
        * { font-family: "Sarabun", sans-serif !important; }
        body { background: var(--navy); color: #e2e8f0; }
        
        .input-box { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; padding: 10px; color: white; width: 100%; outline: none; transition: 0.2s; }
        .input-box:focus { border-color: var(--teal); background: rgba(0,0,0,0.5); }
        
        .label-text { color: #94a3b8; font-size: 0.85rem; margin-bottom: 4px; display: block; font-weight: 600; }
        .label-clinical { color: var(--teal); font-weight: 800; font-size: 0.9rem; margin-bottom: 4px; display: block; }
        
        .section-card { background: rgba(30, 41, 59, 0.4); border-radius: 30px; padding: 30px; border: 1px solid var(--border); margin-bottom: 24px; shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        
        .history-item { background: rgba(255, 255, 255, 0.03); border-radius: 20px; padding: 20px; border: 1px solid var(--border); transition: 0.3s; }
        .history-item:hover { border-color: var(--teal); background: rgba(20, 184, 177, 0.05); }

        .btn-base { padding: 12px 24px; border-radius: 15px; font-weight: 800; transition: 0.2s; display: flex; align-items: center; gap: 8px; justify-content: center; }
        .btn-teal { background: var(--teal); color: var(--navy); }
        .btn-teal:hover { background: #11a39d; transform: translateY(-2px); }
        .btn-red { background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div class="flex items-center gap-6">
                <button onclick="goBack()" class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center hover:bg-white/10 transition-all text-2xl">⬅️</button>
                <div>
                    <h1 class="text-4xl font-black text-white" id="head-pet-name">กำลังโหลด...</h1>
                    <p class="text-teal-400 font-bold text-lg" id="head-hn">HN: -</p>
                </div>
            </div>
            <div class="hidden md:block">
                <div class="bg-teal-500/10 border border-teal-500/20 px-6 py-3 rounded-2xl text-teal-400 font-black">
                    VETERINARY MEDICAL RECORD
                </div>
            </div>
        </header>

        <div class="section-card border-l-8 border-blue-500">
            <h3 class="text-xl font-bold text-blue-400 mb-6 flex items-center gap-2">👤 ข้อมูลเจ้าของสัตว์</h3>
            <div class="grid grid-cols-12 gap-6">
                <div class="col-span-12 md:col-span-4">
                    <label class="label-text">ชื่อ-นามสกุล เจ้าของ</label>
                    <div id="info-owner-name" class="text-lg font-bold text-white">-</div>
                </div>
                <div class="col-span-12 md:col-span-3">
                    <label class="label-text">เบอร์โทรศัพท์</label>
                    <div id="info-owner-phone" class="text-lg font-bold text-teal-400">-</div>
                </div>
                <div class="col-span-12 md:col-span-5">
                    <label class="label-text">ที่อยู่</label>
                    <div id="info-owner-address" class="text-sm text-slate-400">-</div>
                </div>
            </div>
        </div>

        <div class="section-card border-l-8 border-teal-500">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-xl font-bold text-white flex items-center gap-2">🐾 ข้อมูลสัตว์และการตรวจรักษา</h3>
                <div id="edit-mode-badge" class="hidden bg-orange-500 text-navy px-4 py-1 rounded-full text-xs font-black animate-pulse">กำลังแก้ไขข้อมูลเดิม ✏️</div>
            </div>

            <div class="grid grid-cols-12 gap-5 mb-10 pb-8 border-b border-white/5">
                <div class="col-span-6 md:col-span-3">
                    <label class="label-text">ชื่อสัตว์</label>
                    <div id="info-pet-name" class="text-xl font-black text-white">-</div>
                </div>
                <div class="col-span-6 md:col-span-3">
                    <label class="label-text">ชนิด/สายพันธุ์</label>
                    <div id="info-pet-breed" class="text-white font-bold">-</div>
                </div>
                <div class="col-span-6 md:col-span-2">
                    <label class="label-text">เพศ</label>
                    <div id="info-pet-gender" class="text-white">-</div>
                </div>
                <div class="col-span-6 md:col-span-2">
                    <label class="label-text">น้ำหนักล่าสุด (กก.)</label>
                    <input type="number" id="f_weight" class="input-box text-center font-bold text-yellow-400" step="0.1">
                </div>
                <div class="col-span-12 md:col-span-2">
                    <label class="label-text text-red-400 font-bold">⚠️ แพ้ยา/ข้อควรระวัง</label>
                    <div id="info-pet-congenital" class="text-xs text-red-300">-</div>
                </div>
            </div>

            <div class="grid grid-cols-12 gap-5">
                <div class="col-span-12 md:col-span-6">
                    <label class="label-clinical">CC (Chief Complaint) / อาการสำคัญ</label>
                    <textarea id="f_cc" class="input-box h-20" placeholder="เหตุผลที่มาหาหมอ..."></textarea>
                </div>
                <div class="col-span-12 md:col-span-6">
                    <label class="label-clinical">Hx (History) / ประวัติการเจ็บป่วย</label>
                    <textarea id="f_hx" class="input-box h-20" placeholder="ประวัติย้อนหลัง..."></textarea>
                </div>
                <div class="col-span-12 md:col-span-4">
                    <label class="label-clinical">PE (Physical Exam) / ตรวจร่างกาย</label>
                    <textarea id="f_pe" class="input-box h-24" placeholder="อุณหภูมิ, อัตราเต้นหัวใจ ฯลฯ..."></textarea>
                </div>
                <div class="col-span-12 md:col-span-4">
                    <label class="label-clinical">Lab / ผลทางห้องปฏิบัติการ</label>
                    <textarea id="f_lab" class="input-box h-24" placeholder="ผลเลือด, X-ray, Ultrasound..."></textarea>
                </div>
                <div class="col-span-12 md:col-span-4">
                    <label class="label-clinical text-yellow-400">Dx (Diagnosis) / การวินิจฉัย</label>
                    <textarea id="f_dx" class="input-box h-24 border-yellow-500/30" placeholder="ชื่อโรคหรือสาเหตุ..."></textarea>
                </div>
                <div class="col-span-12 md:col-span-6">
                    <label class="label-clinical">Tx (Treatment) / การรักษา</label>
                    <textarea id="f_tx" class="input-box h-32" placeholder="หัตถการ, การผ่าตัด, การทำแผล..."></textarea>
                </div>
                <div class="col-span-12 md:col-span-6">
                    <label class="label-clinical">Rx (Medication) / สั่งยา</label>
                    <textarea id="f_rx" class="input-box h-32 border-blue-500/30" placeholder="รายการยาและขนาดที่จ่าย..."></textarea>
                </div>
                <div class="col-span-12 md:col-span-4">
                    <label class="label-clinical">Plan / แผนการรักษาต่อไป</label>
                    <input type="text" id="f_plan" class="input-box" placeholder="แผนการในอนาคต...">
                </div>
                <div class="col-span-6 md:col-span-4">
                    <label class="label-clinical text-orange-400">📅 Appointment / วันนัดครั้งถัดไป</label>
                    <input type="text" id="f_appointment" class="input-box datepicker" placeholder="เลือกวันนัด...">
                </div>
                <div class="col-span-6 md:col-span-4">
                    <label class="label-clinical">สัตวแพทย์ผู้ตรวจ</label>
                    <input type="text" id="f_vet" class="input-box" placeholder="ชื่อสัตวแพทย์...">
                </div>
                <div class="col-span-12">
                    <label class="label-text">Note / หมายเหตุเพิ่มเติม</label>
                    <input type="text" id="f_note" class="input-box" placeholder="...">
                </div>
                <div class="col-span-12 md:col-span-4 mt-4">
                    <label class="label-text font-bold text-yellow-400">ค่ารักษา (฿)</label>
                    <input type="number" id="f_cost" class="input-box text-2xl font-black text-yellow-400" placeholder="0.00">
                </div>
            </div>

            <div class="flex gap-4 mt-10">
                <button onclick="saveMedicalRecord()" class="btn-base btn-teal flex-1 text-xl">
                    💾 บันทึกการรักษา
                </button>
                <button id="btn-cancel" onclick="resetForm()" class="hidden btn-base btn-red">
                    ยกเลิกแก้ไข
                </button>
            </div>
        </div>

        <section class="mt-16">
            <h3 class="text-2xl font-black text-white mb-8 flex items-center gap-3">
                ⏳ ประวัติการรักษาย้อนหลัง
                <span id="record-count" class="bg-white/10 text-sm px-3 py-1 rounded-full font-normal">0 รายการ</span>
            </h3>
            <div id="history-container" class="space-y-6 pb-20">
                <div class="text-center py-20 opacity-20">กำลังโหลดข้อมูล...</div>
            </div>
        </section>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const animalId = urlParams.get('id');
        const ownerHN = urlParams.get('hn');
        
        let editingId = null;
        let records = [];

        window.onload = async () => {
            if (!animalId) return goBack();
            initDatePicker();
            await fetchInfo();
            await fetchRecords();
        };

        function initDatePicker() {
            flatpickr(".datepicker", { locale: "th", dateFormat: "Y-m-d", altInput: true, altFormat: "j F Y" });
        }

        async function fetchInfo() {
            // ดึงข้อมูลเจ้าของ
            const { data: owner } = await db.from('owners').select('*').eq('hn', ownerHN).single();
            const { data: phones } = await db.from('owner_phones').select('phone_number').eq('owner_hn', ownerHN);
            
            if (owner) {
                document.getElementById('info-owner-name').innerText = owner.owner_name;
                document.getElementById('info-owner-phone').innerText = phones?.[0]?.phone_number || '-';
                document.getElementById('info-owner-address').innerText = owner.address || '-';
                document.getElementById('head-hn').innerText = `HN: ${owner.hn}`;
            }

            // ดึงข้อมูลสัตว์
            const { data: pet } = await db.from('animals').select('*').eq('id', animalId).single();
            if (pet) {
                document.getElementById('head-pet-name').innerText = pet.pet_name;
                document.getElementById('info-pet-name').innerText = pet.pet_name;
                document.getElementById('info-pet-breed').innerText = `${pet.pet_type} (${pet.breed})`;
                document.getElementById('info-pet-gender').innerText = pet.gender;
                document.getElementById('f_weight').value = pet.weight;
                document.getElementById('info-pet-congenital').innerText = pet.congenital_disease || 'ไม่มี';
            }
        }

        async function fetchRecords() {
            const { data, error } = await db.from('medical_records')
                .select('*')
                .eq('animal_id', animalId)
                .order('created_at', { ascending: false });
            
            if (error) return;
            records = data;
            renderRecords();
        }

        function renderRecords() {
            const container = document.getElementById('history-container');
            document.getElementById('record-count').innerText = `${records.length} รายการ`;

            if (records.length === 0) {
                container.innerHTML = `<div class="text-center p-20 border-4 border-dashed border-white/5 rounded-[40px] text-slate-500 font-bold">ไม่พบประวัติการรักษา</div>`;
                return;
            }

            container.innerHTML = records.map(rec => `
                <div class="history-item">
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <span class="text-teal-400 font-black text-xl">${new Date(rec.created_at).toLocaleDateString('th-TH', { day:'numeric', month:'long', year:'numeric' })}</span>
                            <span class="ml-4 text-xs bg-white/5 px-3 py-1 rounded-full text-slate-400">🕒 ${new Date(rec.created_at).toLocaleTimeString('th-TH', { hour:'2-digit', minute:'2-digit' })} น.</span>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="editRecord('${rec.id}')" class="bg-blue-500/20 text-blue-400 hover:bg-blue-500 hover:text-white px-4 py-2 rounded-xl text-sm font-bold transition-all">✏️ แก้ไข</button>
                            <button onclick="deleteRecord('${rec.id}')" class="bg-red-500/10 text-red-400 hover:bg-red-500 hover:text-white px-4 py-2 rounded-xl text-sm transition-all">🗑️</button>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 text-sm">
                        ${rec.cc ? `<div><b class="text-teal-500">CC:</b> <span class="text-white">${rec.cc}</span></div>` : ''}
                        ${rec.dx ? `<div><b class="text-yellow-500">Dx:</b> <span class="text-white font-bold">${rec.dx}</span></div>` : ''}
                        ${rec.rx ? `<div class="col-span-full bg-black/30 p-4 rounded-xl border border-white/5"><b class="text-blue-400 block mb-1">Rx (รายการยา):</b><p class="text-slate-200 whitespace-pre-line">${rec.rx}</p></div>` : ''}
                    </div>
                    <div class="mt-6 pt-4 border-t border-white/5 flex justify-between items-center text-xs text-slate-500">
                        <span>👩‍⚕️ สัตวแพทย์: ${rec.vet_name || '-'}</span>
                        <span class="text-yellow-400 font-bold text-lg">${rec.cost ? rec.cost.toLocaleString() + ' ฿' : '0 ฿'}</span>
                    </div>
                </div>
            `).join('');
        }

        async function saveMedicalRecord() {
            const data = {
                animal_id: animalId,
                owner_hn: ownerHN,
                cc: document.getElementById('f_cc').value,
                hx: document.getElementById('f_hx').value,
                pe: document.getElementById('f_pe').value,
                lab: document.getElementById('f_lab').value,
                dx: document.getElementById('f_dx').value,
                tx: document.getElementById('f_tx').value,
                rx: document.getElementById('f_rx').value,
                plan: document.getElementById('f_plan').value,
                appointment: document.getElementById('f_appointment').value || null,
                note: document.getElementById('f_note').value,
                vet_name: document.getElementById('f_vet').value,
                cost: parseFloat(document.getElementById('f_cost').value) || 0,
                updated_at: new Date()
            };

            // อัปเดตน้ำหนักในตาราง animals ด้วย
            const currentWeight = parseFloat(document.getElementById('f_weight').value);
            if (currentWeight) {
                await db.from('animals').update({ weight: currentWeight }).eq('id', animalId);
            }

            try {
                if (editingId) {
                    await db.from('medical_records').update(data).eq('id', editingId);
                    alert("✅ อัปเดตบันทึกสำเร็จ");
                } else {
                    await db.from('medical_records').insert([data]);
                    alert("✅ บันทึกการรักษาสำเร็จ");
                }
                resetForm();
                await fetchRecords();
            } catch (err) { alert(err.message); }
        }

        function editRecord(id) {
            const rec = records.find(r => r.id === id);
            if (!rec) return;
            editingId = id;
            
            document.getElementById('f_cc').value = rec.cc || '';
            document.getElementById('f_hx').value = rec.hx || '';
            document.getElementById('f_pe').value = rec.pe || '';
            document.getElementById('f_lab').value = rec.lab || '';
            document.getElementById('f_dx').value = rec.dx || '';
            document.getElementById('f_tx').value = rec.tx || '';
            document.getElementById('f_rx').value = rec.rx || '';
            document.getElementById('f_plan').value = rec.plan || '';
            document.getElementById('f_note').value = rec.note || '';
            document.getElementById('f_vet').value = rec.vet_name || '';
            document.getElementById('f_cost').value = rec.cost || '';
            
            if (rec.appointment) {
                document.getElementById('f_appointment')._flatpickr.setDate(rec.appointment);
            }

            document.getElementById('edit-mode-badge').classList.remove('hidden');
            document.getElementById('btn-cancel').classList.remove('hidden');
            window.scrollTo({ top: 400, behavior: 'smooth' });
        }

        async function deleteRecord(id) {
            if (!confirm("ลบประวัตินี้ใช่หรือไม่?")) return;
            await db.from('medical_records').delete().eq('id', id);
            await fetchRecords();
        }

        function resetForm() {
            editingId = null;
            document.querySelectorAll('textarea, input:not(#f_weight)').forEach(el => el.value = '');
            document.getElementById('edit-mode-badge').classList.add('hidden');
            document.getElementById('btn-cancel').classList.add('hidden');
        }

        function goBack() { window.location.href = 'animals.html'; }
    </script>
</body>
</html>
