<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกการรักษา | PK-VMS Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/th.js"></script>

    <style>
        :root { --navy: #020617; --navy-light: #0f172a; --teal: #14b8b1; --border: rgba(255, 255, 255, 0.1); }
        * { font-family: "Sarabun", sans-serif !important; }
        body { background: var(--navy); color: #e2e8f0; font-size: 1rem; }
        
        /* ปรับขนาด Input และ Placeholder ให้ใหญ่ชัดเจน */
        .input-box { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; padding: 12px; color: white; width: 100%; outline: none; transition: 0.2s; font-size: 1.1rem; }
        .input-box:focus { border-color: var(--teal); background: rgba(0,0,0,0.5); }
        
        /* ปรับขนาด Label ขั้นต่ำให้เท่ากับตัวหนังสือในช่องกรอก */
        .label-text { color: #94a3b8; font-size: 1rem; margin-bottom: 4px; display: block; font-weight: 600; }
        .label-clinical { color: var(--teal); font-weight: 800; font-size: 1.1rem; margin-bottom: 4px; display: block; }
        .pet-info-val { font-size: 1.2rem; font-weight: 800; line-height: 1.5; }

        .section-card { background: rgba(30, 41, 59, 0.4); border-radius: 30px; padding: 30px; border: 1px solid var(--border); margin-bottom: 24px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3); }
        .history-item { background: rgba(255, 255, 255, 0.03); border-radius: 20px; padding: 25px; border: 1px solid var(--border); transition: 0.3s; margin-bottom: 15px; }

        .btn-base { padding: 12px 24px; border-radius: 12px; font-weight: 800; display: inline-flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; border: none; cursor: pointer; color: white !important; font-size: 1.1rem; }
        .btn-teal { background-color: #0d9488 !important; }
        .btn-blue { background-color: #2563eb !important; }
        .btn-red { background-color: #dc2626 !important; }

        .list-box { background: rgba(20, 184, 177, 0.05); border: 1.5px dashed var(--teal); border-radius: 12px; min-height: 80px; padding: 12px; cursor: pointer; font-size: 1rem; }
        .view-hidden { display: none; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--navy-light); border: 1px solid var(--border); border-radius: 30px; width: 100%; max-width: 700px; max-height: 85vh; display: flex; flex-direction: column; overflow: hidden; }

        .bullet-list { list-style: none; padding: 0; margin: 0; }
        .bullet-list li { position: relative; padding-left: 18px; font-size: 1.1rem; margin-bottom: 4px; cursor: pointer; }
        .bullet-list li:hover { color: #f87171; text-decoration: line-through; }
        .bullet-list li::before { content: "•"; position: absolute; left: 0; color: var(--teal); font-weight: bold; }

        .route-opt input { display: none; }
        .route-opt span { display: inline-block; padding: 10px 20px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-size: 1.1rem; font-weight: bold; }
        .route-opt input:checked + span { background: var(--teal); color: black; border-color: var(--teal); }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-6">
                <button onclick="goBack()" class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center hover:bg-white/10 transition-all text-2xl shadow-lg">⬅️</button>
                <div>
                    <h1 class="text-4xl font-black text-white" id="head-pet-name">กำลังโหลด...</h1>
                    <p class="text-teal-400 font-bold text-xl" id="head-hn">HN: -</p>
                </div>
            </div>
            <a href="index.html" class="w-14 h-14 rounded-2xl bg-white/5 flex items-center justify-center hover:bg-white/10 text-3xl shadow-xl border border-white/5">🏠</a>
        </header>

        <div class="section-card border-l-8 border-blue-500">
            <h3 class="text-2xl font-bold text-blue-400 mb-6 flex items-center gap-2">👤 ข้อมูลเจ้าของสัตว์</h3>
            <div class="grid grid-cols-12 gap-6">
                <div class="col-span-12 md:col-span-4"><label class="label-text">ชื่อ-นามสกุล เจ้าของ</label><div id="info-owner-name" class="text-xl font-bold text-white">-</div></div>
                <div class="col-span-12 md:col-span-3"><label class="label-text">เบอร์โทรศัพท์</label><div id="info-owner-phone" class="text-xl font-bold text-teal-400">-</div></div>
                <div class="col-span-12 md:col-span-5"><label class="label-text">ที่อยู่</label><div id="info-owner-address" class="text-base text-slate-400">-</div></div>
            </div>
        </div>

        <div id="history-view-container">
            <div class="section-card border-l-8 border-teal-500">
                <div class="flex justify-between items-center mb-8">
                    <h3 class="text-2xl font-bold text-white flex items-center gap-2">🐾 ข้อมูลสัตว์</h3>
                    <button onclick="showFormView()" class="btn-base btn-teal text-xl py-4 px-8 shadow-xl">+ เพิ่มประวัติการรักษา</button>
                </div>
                <div class="grid grid-cols-12 gap-4">
                    <div class="col-span-6 md:col-span-2"><label class="label-text">ชื่อสัตว์</label><div id="v-pet-name" class="pet-info-val text-white">-</div></div>
                    <div class="col-span-6 md:col-span-3"><label class="label-text">ชนิด/สายพันธุ์</label><div id="v-pet-breed" class="pet-info-val text-white">-</div></div>
                    <div class="col-span-4 md:col-span-1"><label class="label-text">เพศ</label><div id="v-pet-gender" class="pet-info-val text-white">-</div></div>
                    <div class="col-span-4 md:col-span-1"><label class="label-text">นน.(กก.)</label><div id="v-pet-weight" class="pet-info-val text-yellow-400">-</div></div>
                    <div class="col-span-12 md:col-span-5"><label class="label-text">⚠️ แพ้ยา/ข้อควรระวัง</label><div id="v-pet-congenital" class="pet-info-val">-</div></div>
                </div>
            </div>
            <section class="mt-8 pb-20">
                <h3 class="text-3xl font-black text-white mb-8 flex items-center gap-3">⏳ ประวัติการรักษาย้อนหลัง <span id="record-count" class="bg-white/10 text-base px-4 py-1 rounded-full font-normal">0 รายการ</span></h3>
                <div id="history-list" class="space-y-4"></div>
            </section>
        </div>

        <div id="form-view-container" class="view-hidden">
            <div class="section-card border-l-8 border-teal-400">
                <div class="flex justify-between items-center mb-8">
                    <h3 class="text-2xl font-bold text-white flex items-center gap-2">🏥 บันทึกการตรวจรักษา</h3>
                    <div id="edit-mode-badge" class="hidden bg-orange-500 text-black px-4 py-2 rounded-full text-sm font-black animate-pulse">กำลังแก้ไขข้อมูลเดิม ✏️</div>
                </div>
                <div class="grid grid-cols-12 gap-5">
                    <div class="col-span-12 md:col-span-2">
                        <label class="label-clinical text-yellow-400">น้ำหนัก (กก.)</label>
                        <input type="number" id="f_weight" class="input-box font-bold text-yellow-400 text-2xl" step="0.1">
                    </div>
                    <div class="col-span-12 md:col-span-5"><label class="label-clinical">CC (Chief Complaint)</label><textarea id="f_cc" class="input-box h-24" placeholder="ระบุอาการสำคัญ..."></textarea></div>
                    <div class="col-span-12 md:col-span-5"><label class="label-clinical">Hx (History)</label><textarea id="f_hx" class="input-box h-24" placeholder="ประวัติย้อนหลัง..."></textarea></div>
                    <div class="col-span-12 md:col-span-4"><label class="label-clinical">PE (Physical Exam)</label><textarea id="f_pe" class="input-box h-32" placeholder="ผลการตรวจร่างกาย..."></textarea></div>
                    <div class="col-span-12 md:col-span-4">
                        <label class="label-clinical">🔬 Lab (คลิกเพื่อลบ)</label>
                        <div id="list_lab_display" class="list-box overflow-y-auto max-h-40" onclick="if(event.target === this) openCatalog('lab')">คลิกเพื่อเลือก...</div>
                        <input type="hidden" id="f_lab">
                    </div>
                    <div class="col-span-12 md:col-span-4"><label class="label-clinical text-yellow-400">Dx (Diagnosis)</label><textarea id="f_dx" class="input-box h-32 border-yellow-500/30" placeholder="การวินิจฉัย..."></textarea></div>
                    <div class="col-span-12 md:col-span-6">
                        <label class="label-clinical">💉 Tx (คลิกเพื่อลบ)</label>
                        <div id="list_tx_display" class="list-box overflow-y-auto max-h-40" onclick="if(event.target === this) openCatalog('tx')">คลิกเพื่อเลือก...</div>
                        <input type="hidden" id="f_tx">
                    </div>
                    <div class="col-span-12 md:col-span-6">
                        <label class="label-clinical">💊 Rx (คลิกเพื่อลบ)</label>
                        <div id="list_rx_display" class="list-box border-blue-500/50 overflow-y-auto max-h-40" onclick="if(event.target === this) openCatalog('rx')">คลิกเพื่อเลือก...</div>
                        <input type="hidden" id="f_rx">
                    </div>
                    <div class="col-span-12 md:col-span-3"><label class="label-clinical">Plan / แผนการรักษา</label><input type="text" id="f_plan" class="input-box"></div>
                    <div class="col-span-6 md:col-span-3"><label class="label-clinical text-orange-400">📅 วันนัด</label><input type="text" id="f_appointment" class="input-box datepicker"></div>
                    <div class="col-span-6 md:col-span-3"><label class="label-clinical text-orange-400">นัดหมายเพื่อ</label><input type="text" id="f_app_note" class="input-box" placeholder="เหตุผลการนัด..."></div>
                    <div class="col-span-12 md:col-span-3"><label class="label-text font-bold text-yellow-400">รวมค่ารักษา (฿)</label><input type="number" id="f_cost" class="input-box text-3xl font-black text-yellow-400" value="0"></div>
                </div>
                <div class="flex gap-4 mt-10">
                    <button onclick="saveMedicalRecord()" class="btn-base btn-teal flex-1 text-2xl py-5">💾 บันทึกข้อมูลการตรวจ</button>
                    <button onclick="showHistoryView()" class="btn-base btn-red px-10">ยกเลิก</button>
                </div>
            </div>
        </div>
    </div>

    <div id="catalog-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="p-6 border-b border-white/10 flex justify-between items-center bg-slate-900/50">
                <h3 id="modal-title" class="text-2xl font-bold">เลือกรายการ</h3>
                <button onclick="closeCatalog()" class="text-3xl opacity-50 hover:opacity-100">✕</button>
            </div>
            <div class="p-4 bg-white/5 border-b border-white/5">
                <input type="text" id="catalog-search" class="input-box" placeholder="ค้นหาชื่อรายการ..." oninput="filterCatalog()">
            </div>
            <div id="catalog-items" class="flex-1 overflow-y-auto p-4 space-y-3 bg-black/20"></div>
            <div class="p-5 bg-teal-500/10 border-t border-teal-500/20">
                <label class="text-sm font-bold text-teal-400 uppercase mb-3 block">รายการที่เลือก (คลิกเพื่อลบ):</label>
                <div id="modal-session-list" class="flex flex-wrap gap-3"></div>
            </div>
            <div class="p-6 border-t border-white/10 bg-slate-900/50">
                <button onclick="closeCatalog()" class="btn-base btn-blue w-full text-xl py-4">เสร็จสิ้น</button>
            </div>
        </div>
    </div>

    <div id="inj-modal" class="modal-overlay" style="z-index: 110;">
        <div class="modal-content !max-w-md">
            <div class="p-6 border-b border-white/10 bg-teal-900/30">
                <h4 id="inj-name" class="text-xl font-bold text-teal-400">-</h4>
            </div>
            <div class="p-6 space-y-6">
                <div>
                    <label class="label-clinical">ปริมาณยา (ml)</label>
                    <input type="number" id="inj-ml" class="input-box text-2xl font-bold" step="0.1" value="0.1">
                </div>
                <div>
                    <label class="label-clinical">Route (ทางที่ให้ยา)</label>
                    <div class="flex flex-wrap gap-3">
                        <label class="route-opt"><input type="checkbox" name="route" value="SC"><span>SC</span></label>
                        <label class="route-opt"><input type="checkbox" name="route" value="IM"><span>IM</span></label>
                        <label class="route-opt"><input type="checkbox" name="route" value="IV"><span>IV</span></label>
                        <label class="route-opt"><input type="checkbox" name="route" value="ID"><span>ID</span></label>
                    </div>
                </div>
            </div>
            <div class="p-6 border-t border-white/10 flex gap-3">
                <button onclick="confirmInj()" class="btn-base btn-teal flex-1 py-4 text-xl">ยืนยัน</button>
                <button onclick="document.getElementById('inj-modal').style.display='none'" class="btn-base bg-slate-700 px-8">ยกเลิก</button>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const animalId = urlParams.get('id');
        const ownerHN = urlParams.get('hn');
        let editingId = null;
        let records = [], fullCatalog = [], pendingItem = null;
        let selectedLabs = [], selectedTxs = [], selectedRxs = [];
        let currentCatalogType = '';

        window.onload = async () => {
            if (!animalId) return goBack();
            flatpickr(".datepicker", { locale: "th", dateFormat: "Y-m-d", altInput: true, altFormat: "j F Y" });
            await fetchInfo();
            await fetchRecords();
        };

        function drawBullets(arr, type = null) {
            if (!arr || arr.length === 0) return "-";
            return `<ul class="bullet-list">${arr.map((item, idx) => {
                const name = typeof item === 'object' ? item.name : item;
                const onclickStr = type ? `onclick="removeItem('${type}', ${idx})"` : "";
                return `<li ${onclickStr}>${name}</li>`;
            }).join('')}</ul>`;
        }

        async function fetchInfo() {
            const { data: owner } = await db.from('owners').select('*').eq('hn', ownerHN).single();
            const { data: pet } = await db.from('animals').select('*').eq('id', animalId).single();
            const { data: phones } = await db.from('owner_phones').select('phone_number').eq('owner_hn', ownerHN);
            if (owner && pet) {
                document.getElementById('info-owner-name').innerText = owner.owner_name;
                document.getElementById('info-owner-phone').innerText = phones?.[0]?.phone_number || '-';
                document.getElementById('info-owner-address').innerText = owner.address || '-';
                document.getElementById('head-hn').innerText = `HN: ${owner.hn}`;
                document.getElementById('head-pet-name').innerText = pet.pet_name;
                document.getElementById('v-pet-name').innerText = pet.pet_name;
                document.getElementById('v-pet-breed').innerText = `${pet.pet_type} (${pet.breed || '-'})`;
                document.getElementById('v-pet-gender').innerText = pet.gender || '-';
                document.getElementById('v-pet-weight').innerText = pet.weight || '0';
                document.getElementById('f_weight').value = pet.weight || 0;
                document.getElementById('v-pet-congenital').innerText = pet.congenital_disease || 'ไม่มี';
            }
        }

        async function fetchRecords() {
            const { data } = await db.from('medical_records').select('*').eq('animal_id', animalId).order('created_at', { ascending: false });
            records = data || [];
            renderRecordsList();
        }

        function renderRecordsList() {
            const list = document.getElementById('history-list');
            document.getElementById('record-count').innerText = `${records.length} รายการ`;
            list.innerHTML = records.map(rec => {
                const dateStr = new Date(rec.created_at).toLocaleDateString('th-TH', { day:'numeric', month:'short', year:'2-digit' });
                const labs = rec.lab ? rec.lab.split(', ') : [];
                const txs = rec.tx ? rec.tx.split(', ') : [];
                const rxs = rec.rx ? rec.rx.split(', ') : [];

                return `
                    <div class="history-item">
                        <div class="flex items-center gap-4 cursor-pointer" onclick="toggleCollapse('${rec.id}')">
                            <div class="w-24 text-teal-400 font-black text-xl">${dateStr}</div>
                            <div class="flex-1 grid grid-cols-2 gap-4 border-l border-white/10 pl-4">
                                <div class="truncate text-base"><b class="text-teal-500">CC:</b> ${rec.cc || '-'}</div>
                                <div class="truncate text-base"><b class="text-teal-500">Dx:</b> ${rec.dx || '-'}</div>
                            </div>
                            <div class="flex items-center gap-3">
                                <button onclick="event.stopPropagation(); editRecord('${rec.id}')" class="btn-base btn-blue !py-2 !px-4 text-sm">✏️</button>
                                <button onclick="event.stopPropagation(); deleteRecord('${rec.id}')" class="btn-base btn-red !py-2 !px-4 text-sm">🗑️</button>
                                <div id="arrow-${rec.id}" class="text-teal-400 text-xl">🔽</div>
                            </div>
                        </div>
                        <div id="detail-${rec.id}" class="hidden mt-6 pt-6 border-t border-white/5">
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 text-base mb-4">
                                <div><b class="label-clinical text-sm">🔬 Lab:</b> ${drawBullets(labs)}</div>
                                <div><b class="label-clinical text-sm">💉 Tx:</b> ${drawBullets(txs)}</div>
                                <div><b class="label-clinical text-sm">💊 Rx:</b> ${drawBullets(rxs)}</div>
                            </div>
                            <div class="flex justify-between items-center border-t border-white/5 pt-4">
                                <div class="text-sm text-slate-500">Plan: ${rec.plan || '-'}</div>
                                <div class="text-2xl font-black text-yellow-400">฿ ${rec.cost?.toLocaleString()}</div>
                            </div>
                        </div>
                    </div>`;
            }).join('');
        }

        async function openCatalog(type) {
            currentCatalogType = type;
            const modal = document.getElementById('catalog-modal');
            const title = document.getElementById('modal-title');
            modal.style.display = 'flex';
            updateModalUI();

            let items = [];
            if (type === 'lab') {
                title.innerText = '🔬 เลือกรายการ Lab';
                const { data } = await db.from('services').select('*').eq('category', 'Lab').order('service_name');
                items = data.map(i => ({ name: i.service_name, price: i.price, config: i.price_config, type: 'service' }));
            } else if (type === 'tx') {
                title.innerText = '💉 หัตถการ และ ยาฉีด';
                const [resInj, resProc] = await Promise.all([
                    db.from('pharmacy').select('*').eq('category', 'Injection').order('item_name'),
                    db.from('services').select('*').eq('category', 'หัตถการ').order('service_name')
                ]);
                items = [
                    ...(resInj.data || []).map(i => ({ name: i.item_name, price: i.price_per_unit, config: i.price_config, type: 'injection' })),
                    ...(resProc.data || []).map(i => ({ name: i.service_name, price: i.price, config: i.price_config, type: 'procedure' }))
                ];
            } else if (type === 'rx') {
                title.innerHTML = `💊 สินค้า / ยาจ่ายกลับ <button onclick="window.location.href='rx.html?id=${animalId}&hn=${ownerHN}'" class="ml-4 btn-base bg-orange-500 !py-1 !px-4 text-sm">ระบบจ่ายยาคำนวณโดส ➔</button>`;
                const { data } = await db.from('pharmacy').select('*').in('category', ['TakeHome', 'General', 'Oral', 'ยา']).order('item_name');
                items = data.map(i => ({ name: i.item_name, price: i.price_per_unit, type: 'product' }));
            }
            fullCatalog = items;
            renderItems(items);
        }

        function renderItems(items) {
            const list = document.getElementById('catalog-items');
            list.innerHTML = items.map(item => `
                <div class="p-5 bg-white/5 rounded-2xl border border-white/5 hover:border-teal-500 cursor-pointer flex justify-between items-center group transition-all" 
                     onclick='handleItemSelection(${JSON.stringify(item)})'>
                    <div>
                        <div class="font-bold text-white text-lg group-hover:text-teal-400">${item.name}</div>
                        <div class="text-sm text-slate-500">฿${item.price || 0}</div>
                    </div>
                    <div class="text-teal-500 text-2xl font-black">+</div>
                </div>`).join('');
        }

        function handleItemSelection(item) {
            const weight = parseFloat(document.getElementById('f_weight').value) || 0;
            if (item.type === 'injection') {
                pendingItem = item;
                document.getElementById('inj-name').innerText = item.name;
                document.getElementById('inj-ml').value = 0.1;
                document.querySelectorAll('input[name="route"]').forEach(c => c.checked = false);
                document.getElementById('inj-modal').style.display = 'flex';
            } else {
                let finalPrice = parseFloat(item.price) || 0;
                if (item.config && Array.isArray(item.config)) {
                    const sortedTiers = [...item.config].sort((a,b) => a.max - b.max);
                    const tier = sortedTiers.find(t => weight <= t.max);
                    if (tier) finalPrice = tier.price;
                }
                addItemToList(item.name, finalPrice);
            }
        }

        function confirmInj() {
            const ml = document.getElementById('inj-ml').value;
            const routes = Array.from(document.querySelectorAll('input[name="route"]:checked')).map(c => c.value);
            const routeStr = routes.length > 0 ? routes.join('/') : '';
            let finalPrice = parseFloat(pendingItem.price) || 0;
            if (pendingItem.config && Array.isArray(pendingItem.config)) {
                const tier = [...pendingItem.config].sort((a,b) => a.max - b.max).find(t => parseFloat(ml) <= t.max);
                if (tier) finalPrice = tier.price;
            }
            addItemToList(`${pendingItem.name} (${ml}ml) ${routeStr}`.trim(), finalPrice);
            document.getElementById('inj-modal').style.display = 'none';
        }

        function removeItem(type, index) {
            let targetArr = type === 'lab' ? selectedLabs : (type === 'tx' ? selectedTxs : selectedRxs);
            if (targetArr && targetArr[index]) {
                const price = targetArr[index].price;
                const costInput = document.getElementById('f_cost');
                costInput.value = (parseFloat(costInput.value) - price).toFixed(2);
                targetArr.splice(index, 1);
                updateFormDisplays();
                updateModalUI();
            }
        }

        function addItemToList(name, price) {
            const itemObj = { name, price };
            if (currentCatalogType === 'lab') selectedLabs.push(itemObj);
            else if (currentCatalogType === 'tx') selectedTxs.push(itemObj);
            else if (currentCatalogType === 'rx') selectedRxs.push(itemObj);
            const costInput = document.getElementById('f_cost');
            costInput.value = (parseFloat(costInput.value) + price).toFixed(2);
            updateFormDisplays();
            updateModalUI();
        }

        function updateModalUI() {
            const div = document.getElementById('modal-session-list');
            let arr = currentCatalogType === 'lab' ? selectedLabs : (currentCatalogType === 'tx' ? selectedTxs : selectedRxs);
            div.innerHTML = arr.length ? arr.map((n, idx) => 
                `<span onclick="removeItem('${currentCatalogType}', ${idx})" class="bg-teal-500 hover:bg-red-500 text-black px-3 py-2 rounded-lg text-sm font-bold cursor-pointer transition-colors">✕ ${n.name}</span>`
            ).join('') : '<span class="text-slate-500 text-base italic">ยังไม่ได้เลือก...</span>';
        }

        function updateFormDisplays() {
            document.getElementById('list_lab_display').innerHTML = drawBullets(selectedLabs, 'lab');
            document.getElementById('f_lab').value = selectedLabs.map(i => i.name).join(', ');
            document.getElementById('list_tx_display').innerHTML = drawBullets(selectedTxs, 'tx');
            document.getElementById('f_tx').value = selectedTxs.map(i => i.name).join(', ');
            document.getElementById('list_rx_display').innerHTML = drawBullets(selectedRxs, 'rx');
            document.getElementById('f_rx').value = selectedRxs.map(i => i.name).join(', ');
        }

        function filterCatalog() {
            const term = document.getElementById('catalog-search').value.toLowerCase();
            renderItems(fullCatalog.filter(i => i.name.toLowerCase().includes(term)));
        }

        async function saveMedicalRecord() {
            const data = {
                animal_id: animalId, owner_hn: ownerHN,
                weight: parseFloat(document.getElementById('f_weight').value),
                cc: document.getElementById('f_cc').value, hx: document.getElementById('f_hx').value,
                pe: document.getElementById('f_pe').value, dx: document.getElementById('f_dx').value,
                lab: document.getElementById('f_lab').value, tx: document.getElementById('f_tx').value,
                rx: document.getElementById('f_rx').value, plan: document.getElementById('f_plan').value,
                appointment: document.getElementById('f_appointment').value || null,
                appointment_note: document.getElementById('f_app_note').value,
                note: document.getElementById('f_note').value,
                cost: parseFloat(document.getElementById('f_cost').value) || 0,
                updated_at: new Date()
            };
            try {
                if (editingId) await db.from('medical_records').update(data).eq('id', editingId);
                else await db.from('medical_records').insert([data]);
                await db.from('animals').update({ weight: data.weight }).eq('id', animalId);
                location.reload();
            } catch (err) { alert(err.message); }
        }

        function editRecord(id) {
            const rec = records.find(r => r.id === id);
            if (!rec) return;
            editingId = id;
            document.getElementById('f_cc').value = rec.cc || '';
            document.getElementById('f_hx').value = rec.hx || '';
            document.getElementById('f_pe').value = rec.pe || '';
            document.getElementById('f_dx').value = rec.dx || '';
            document.getElementById('f_plan').value = rec.plan || '';
            document.getElementById('f_app_note').value = rec.appointment_note || '';
            document.getElementById('f_cost').value = rec.cost || 0;
            document.getElementById('f_weight').value = rec.weight || 0;
            document.getElementById('f_note').value = rec.note || '';
            selectedLabs = rec.lab ? rec.lab.split(', ').map(n => ({name: n, price: 0})) : [];
            selectedTxs = rec.tx ? rec.tx.split(', ').map(n => ({name: n, price: 0})) : [];
            selectedRxs = rec.rx ? rec.rx.split(', ').map(n => ({name: n, price: 0})) : [];
            updateFormDisplays();
            if (rec.appointment) document.getElementById('f_appointment')._flatpickr.setDate(rec.appointment);
            showFormView();
            document.getElementById('edit-mode-badge').classList.remove('hidden');
        }

        async function deleteRecord(id) {
            if(!confirm("ยืนยันการลบประวัตินี้?")) return;
            await db.from('medical_records').delete().eq('id', id);
            location.reload();
        }

        function toggleCollapse(id) {
            const d = document.getElementById(`detail-${id}`);
            const a = document.getElementById(`arrow-${id}`);
            d.classList.toggle('hidden');
            a.style.transform = d.classList.contains('hidden') ? 'rotate(0deg)' : 'rotate(180deg)';
        }

        function showFormView() { 
            document.getElementById('history-view-container').classList.add('view-hidden');
            document.getElementById('form-view-container').classList.remove('view-hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function showHistoryView() { location.reload(); }
        function closeCatalog() { document.getElementById('catalog-modal').style.display = 'none'; }
        function goBack() { window.location.href = 'animals.html'; }
    </script>
</body>
</html>
