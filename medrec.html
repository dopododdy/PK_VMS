<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกการรักษา | PK-VMS Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/th.js"></script>

    <style>
        :root { --navy: #020617; --navy-light: #0f172a; --teal: #14b811; --border: rgba(255, 255, 255, 0.1); }
        * { font-family: "Sarabun", sans-serif !important; }
        body { background: var(--navy); color: #e2e8f0; font-size: 1rem; margin: 0; padding: 0; }
        
        .input-box { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; padding: 12px; color: white; width: 100%; outline: none; transition: 0.2s; font-size: 1.1rem; }
        .input-box:focus { border-color: var(--teal); background: rgba(0,0,0,0.5); }
        
        .label-text { color: #94a3b8; font-size: 1rem; margin-bottom: 4px; display: block; font-weight: 600; }
        .label-clinical { color: var(--teal); font-weight: 800; font-size: 1.1rem; margin-bottom: 4px; display: block; }

        .section-card { background: rgba(30, 41, 59, 0.4); border-radius: 30px; padding: 30px; border: 1px solid var(--border); margin-bottom: 24px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3); }
        .history-item { background: rgba(255, 255, 255, 0.03); border-radius: 20px; padding: 25px; border: 1px solid var(--border); transition: 0.3s; margin-bottom: 15px; }

        .btn-base { padding: 12px 24px; border-radius: 12px; font-weight: 800; display: inline-flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; border: none; cursor: pointer; color: white !important; font-size: 1.1rem; }
        .btn-teal { background-color: #0d9488 !important; }
        .btn-blue { background-color: #2563eb !important; }
        .btn-red { background-color: #dc2626 !important; }

        .list-box { background: rgba(20, 184, 177, 0.05); border: 1.5px dashed var(--teal); border-radius: 12px; min-height: 80px; padding: 12px; cursor: pointer; }
        .view-hidden { display: none; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--navy-light); border: 1px solid var(--border); border-radius: 30px; width: 100%; max-width: 800px; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; }

        .bullet-list { list-style: none; padding: 0; margin: 0; }
        .bullet-list li { position: relative; padding-left: 20px; font-size: 1.1rem; margin-bottom: 6px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .bullet-list li::before { content: "•"; position: absolute; left: 0; color: var(--teal); font-weight: bold; }

        /* ปรับปรุง CSS สำหรับการพิมพ์ */
        #sticker-container { display: none; background: white; color: black; box-sizing: border-box; position: relative; overflow: hidden; font-family: "Sarabun", sans-serif; margin: 0; }
        .canvas-line { position: absolute; white-space: pre-wrap; word-break: break-word; line-height: 1.2; color: #000; }
        
        @media print {
            body { background: white; }
            #main-ui, #rx-calc-modal, #catalog-modal, #inj-modal, .modal-overlay { display: none !important; }
            #sticker-container { display: block !important; position: absolute; left: 0; top: 0; }
        }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="sticker-container"></div>

    <div id="main-ui" class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-6">
                <button onclick="goBack()" class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center hover:bg-white/10 text-2xl shadow-lg">⬅️</button>
                <div><h1 class="text-4xl font-black text-white" id="head-pet-name">กำลังโหลด...</h1><p class="text-teal-400 font-bold text-xl" id="head-hn">HN: -</p></div>
            </div>
            <a href="index.html" class="w-14 h-14 rounded-2xl bg-white/5 flex items-center justify-center hover:bg-white/10 text-3xl border border-white/5">🏠</a>
        </header>

        <div class="section-card border-l-8 border-blue-500">
            <h3 class="text-2xl font-bold text-blue-400 mb-6 flex items-center gap-2">👤 ข้อมูลเจ้าของสัตว์</h3>
            <div class="grid grid-cols-12 gap-6">
                <div class="col-span-12 md:col-span-4"><label class="label-text">ชื่อ-นามสกุล เจ้าของ</label><div id="info-owner-name" class="text-xl font-bold text-white">-</div></div>
                <div class="col-span-12 md:col-span-3"><label class="label-text">เบอร์โทรศัพท์</label><div id="info-owner-phone" class="text-xl font-bold text-teal-400">-</div></div>
                <div class="col-span-12 md:col-span-5"><label class="label-text">ที่อยู่</label><div id="info-owner-address" class="text-base text-slate-400">-</div></div>
            </div>
        </div>

        <div id="history-view-container">
            <div class="section-card border-l-8 border-teal-500">
                <div class="flex justify-between items-center mb-8">
                    <h3 class="text-2xl font-bold text-white flex items-center gap-2">🐾 ข้อมูลสัตว์</h3>
                    <button onclick="showFormView()" class="btn-base btn-teal text-xl py-4 px-8 shadow-xl">+ เพิ่มประวัติการรักษา</button>
                </div>
                <div class="grid grid-cols-12 gap-4">
                    <div class="col-span-6 md:col-span-2"><label class="label-text">ชื่อสัตว์</label><div id="v-pet-name" class="text-xl font-bold text-white">-</div></div>
                    <div class="col-span-6 md:col-span-3"><label class="label-text">นน.(กก.)</label><div id="v-pet-weight" class="text-xl font-bold text-yellow-400">-</div></div>
                    <div class="col-span-12 md:col-span-7"><label class="label-text">⚠️ แพ้ยา/ข้อควรระวัง</label><div id="v-pet-congenital" class="text-lg font-bold text-red-400">-</div></div>
                </div>
            </div>
            <h3 class="text-3xl font-black text-white mb-8 flex items-center gap-3">⏳ ประวัติการรักษา <span id="record-count" class="bg-white/10 text-base px-4 py-1 rounded-full">0</span></h3>
            <div id="history-list" class="space-y-4"></div>
        </div>

        <div id="form-view-container" class="view-hidden">
            <div class="section-card border-l-8 border-teal-400">
                <h3 class="text-2xl font-bold text-white mb-8">🏥 บันทึกการตรวจรักษา</h3>
                <div class="grid grid-cols-12 gap-5">
                    <div class="col-span-12 md:col-span-2"><label class="label-clinical text-yellow-400">น้ำหนัก (กก.)</label><input type="number" id="f_weight" class="input-box font-bold text-yellow-400 text-2xl" step="0.1"></div>
                    <div class="col-span-12 md:col-span-5"><label class="label-clinical">CC</label><textarea id="f_cc" class="input-box h-24" placeholder="ระบุอาการสำคัญ..."></textarea></div>
                    <div class="col-span-12 md:col-span-5"><label class="label-clinical">Hx</label><textarea id="f_hx" class="input-box h-24" placeholder="ประวัติย้อนหลัง..."></textarea></div>
                    <div class="col-span-12 md:col-span-4"><label class="label-clinical">PE</label><textarea id="f_pe" class="input-box h-32" placeholder="ร่างกาย..."></textarea></div>
                    <div class="col-span-12 md:col-span-4"><label class="label-clinical">🔬 Lab (คลิกเพื่อลบ)</label><div id="list_lab_display" class="list-box overflow-y-auto max-h-40" onclick="if(event.target === this) openCatalog('lab')">คลิกเพื่อเลือก...</div><input type="hidden" id="f_lab"></div>
                    <div class="col-span-12 md:col-span-4"><label class="label-clinical text-yellow-400">Dx</label><textarea id="f_dx" class="input-box h-32" placeholder="วินิจฉัย..."></textarea></div>
                    <div class="col-span-12 md:col-span-6"><label class="label-clinical">💉 Tx (หัตถการ/ยาฉีด)</label><div id="list_tx_display" class="list-box overflow-y-auto max-h-40" onclick="if(event.target === this) openCatalog('tx')">คลิกเพื่อเลือก...</div><input type="hidden" id="f_tx"></div>
                    <div class="col-span-12 md:col-span-6"><label class="label-clinical">💊 Rx (ยากลับบ้าน/สินค้า)</label><div id="list_rx_display" class="list-box border-blue-500/50 overflow-y-auto max-h-40" onclick="if(event.target === this) openCatalog('rx')">คลิกเพื่อเลือก...</div><input type="hidden" id="f_rx"></div>
                    <div class="col-span-12 md:col-span-3"><label class="label-clinical">Plan / แผนรักษา</label><input type="text" id="f_plan" class="input-box"></div>
                    <div class="col-span-6 md:col-span-3"><label class="label-clinical text-orange-400">📅 วันนัด</label><input type="text" id="f_appointment" class="input-box datepicker"></div>
                    <div class="col-span-6 md:col-span-3"><label class="label-clinical text-orange-400">นัดหมายเพื่อ</label><input type="text" id="f_app_note" class="input-box" placeholder="เหตุผลการนัด..."></div>
                    <div class="col-span-12 md:col-span-3"><label class="label-text text-yellow-400">รวมค่ารักษา (฿)</label><input type="number" id="f_cost" class="input-box text-3xl font-black text-yellow-400" value="0"></div>
                    <div class="col-span-12"><label class="label-text">Note / หมายเหตุ</label><input type="text" id="f_note" class="input-box" placeholder="บันทึกเพิ่มเติม..."></div>
                </div>
                <div class="flex gap-4 mt-10">
                    <button onclick="saveMedicalRecord()" class="btn-base btn-teal flex-1 text-2xl py-5">💾 บันทึกข้อมูลการตรวจ</button>
                    <button onclick="showHistoryView()" class="btn-base btn-red px-10">ยกเลิก</button>
                </div>
            </div>
        </div>
    </div>

    <div id="catalog-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="p-6 border-b border-white/10 flex justify-between bg-slate-900/50">
                <h3 id="modal-title" class="text-2xl font-bold">เลือกรายการ</h3><button onclick="closeCatalog()" class="text-3xl">✕</button>
            </div>
            <div class="p-4 bg-white/5"><input type="text" id="catalog-search" class="input-box" placeholder="ค้นหาชื่อรายการ..." oninput="filterCatalog()"></div>
            <div id="catalog-items" class="flex-1 overflow-y-auto p-4 space-y-3 bg-black/20"></div>
            <div class="p-5 bg-teal-500/10 border-t border-teal-500/20">
                <label class="text-sm font-bold text-teal-400 uppercase mb-3 block">เลือกแล้ว (คลิกเพื่อลบ):</label>
                <div id="modal-session-list" class="flex flex-wrap gap-3"></div>
            </div>
            <div class="p-6 border-t border-white/10 bg-slate-900/50"><button onclick="closeCatalog()" class="btn-base btn-blue w-full text-xl py-4">เสร็จสิ้น</button></div>
        </div>
    </div>

    <div id="rx-calc-modal" class="modal-overlay" style="z-index: 120;">
        <div class="modal-content !max-w-2xl">
            <div class="p-6 border-b border-white/10 bg-blue-900/30">
                <h4 id="rx-calc-name" class="text-2xl font-black text-blue-400">💊 กำหนดการให้ยา</h4>
            </div>
            <div class="p-6 grid grid-cols-1 md:grid-cols-2 gap-6 overflow-y-auto">
                <div class="space-y-4">
                    <div>
                        <label class="label-clinical">เลือกโดสแนะนำ (mg/kg)</label>
                        <select id="rx-dose-select" class="input-box w-full" onchange="document.getElementById('rx-dose-val').value=this.value; calculateRxTablets();"></select>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="label-clinical">โดสใช้จริง</label><input type="number" id="rx-dose-val" class="input-box" step="0.1" oninput="calculateRxTablets()"></div>
                        <div><label class="label-clinical">ความเข้มข้น</label><input type="number" id="rx-conc-val" class="input-box bg-white/5" readonly></div>
                    </div>
                    <div class="p-4 bg-teal-500/10 rounded-2xl border border-teal-500/20">
                        <label class="label-clinical text-teal-400">ป้อนครั้งละ</label>
                        <div id="rx-tabs-display" class="text-3xl font-black text-white">0</div>
                        <input type="hidden" id="rx-tabs-val">
                    </div>
                </div>
                <div class="space-y-4 border-l border-white/5 pl-6">
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="label-clinical">ความถี่/วัน</label>
                            <select id="rx-freq" class="input-box" onchange="calculateRxTotal(); updateTimeOfDay();">
                                <option value="1">1 ครั้ง</option>
                                <option value="2" selected>2 ครั้ง</option>
                                <option value="3">3 ครั้ง</option>
                                <option value="4">4 ครั้ง</option>
                                <option value="0.5">วันเว้นวัน</option>
                            </select>
                        </div>
                        <div><label class="label-clinical">จำนวนวัน</label><input type="number" id="rx-days" class="input-box" value="7" oninput="calculateRxTotal()"></div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="label-clinical">มื้ออาหาร</label>
                            <select id="rx-meal-timing" class="input-box">
                                <option value="หลังอาหาร">หลังอาหาร</option>
                                <option value="หลังอาหารทันที">หลังอาหารทันที</option>
                                <option value="ก่อนอาหาร">ก่อนอาหาร</option>
                                <option value="พร้อมอาหาร">พร้อมอาหาร</option>
                            </select>
                        </div>
                        <div>
                            <label class="label-clinical">ช่วงเวลา</label>
                            <select id="rx-day-timing" class="input-box">
                                <option value="เช้า">เช้า</option>
                                <option value="เย็น">เย็น</option>
                                <option value="เช้า-เย็น" selected>เช้า-เย็น</option>
                                <option value="เช้า-กลางวัน-เย็น">เช้า-กลางวัน-เย็น</option>
                                <option value="เช้า-กลางวัน-เย็น-ก่อนนอน">เช้า-กลางวัน-เย็น-ก่อนนอน</option>
                                <option value="ก่อนนอน">ก่อนนอน</option>
                            </select>
                        </div>
                    </div>

                    <div class="p-4 bg-yellow-500/10 rounded-2xl border border-yellow-500/20 text-sm">
                        <div id="rx-info-text" class="text-slate-300 font-bold mb-1">ราคาต่อหน่วย: ฿0 | ทั้งหมด 0 เม็ด</div>
                        <div id="rx-total-price-display" class="text-2xl font-black text-white text-right">฿ 0</div>
                        <input type="hidden" id="rx-final-price-val">
                    </div>
                </div>
            </div>
            <div class="p-6 border-t border-white/10 flex gap-4">
                <button onclick="printRxSticker()" class="btn-base bg-slate-700 px-6">🖨️ พิมพ์สติ๊กเกอร์</button>
                <button onclick="confirmRxCalc()" class="btn-base btn-teal flex-1">✅ เพิ่มรายการ</button>
            </div>
        </div>
    </div>

    <div id="inj-modal" class="modal-overlay" style="z-index: 110;">
        <div class="modal-content !max-w-sm">
            <div class="p-6 border-b border-white/10 bg-teal-900/30"><h4 id="inj-name" class="font-bold text-teal-400">-</h4></div>
            <div class="p-6 space-y-5">
                <div><label class="label-clinical">ปริมาณ (ml)</label><input type="number" id="inj-ml" class="input-box text-2xl font-bold" step="0.1" value="0.1"></div>
                <div><label class="label-clinical">Route</label>
                    <div class="flex flex-wrap gap-3">
                        <label class="route-opt"><input type="checkbox" name="route" value="SC"><span>SC</span></label>
                        <label class="route-opt"><input type="checkbox" name="route" value="IM"><span>IM</span></label>
                        <label class="route-opt"><input type="checkbox" name="route" value="IV"><span>IV</span></label>
                    </div>
                </div>
            </div>
            <div class="p-6 border-t border-white/10 flex gap-3">
                <button onclick="confirmInj()" class="btn-base btn-teal flex-1">ยืนยัน</button>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const animalId = urlParams.get('id'), ownerHN = urlParams.get('hn');
        let editingId = null, records = [], fullCatalog = [], pendingItem = null;
        let selectedLabs = [], selectedTxs = [], selectedRxs = [], petType = 'สุนัข';
        let petData = { sex: "ผู้", dob: "" };
        
        let printConfigCache = null;

        window.onload = async () => {
            if (!animalId) return goBack();
            flatpickr(".datepicker", { locale: "th", dateFormat: "Y-m-d", altInput: true, altFormat: "j F Y" });
            await fetchInfo(); await fetchRecords();
        };

        async function fetchInfo() {
            const { data: owner } = await db.from('owners').select('*').eq('hn', ownerHN).single();
            const { data: pet } = await db.from('animals').select('*').eq('id', animalId).single();
            if (owner && pet) {
                petType = pet.pet_type;
                petData.sex = pet.gender || "ไม่ระบุ"; // สอดคล้องกับ SQL Schema
                petData.dob = pet.birth_date ? new Date(pet.birth_date).toLocaleDateString('th-TH') : "-";
                
                document.getElementById('info-owner-name').innerText = owner.owner_name;
                document.getElementById('info-owner-phone').innerText = (await db.from('owner_phones').select('phone_number').eq('owner_hn', ownerHN)).data?.[0]?.phone_number || '-';
                document.getElementById('info-owner-address').innerText = owner.address || '-';
                document.getElementById('head-hn').innerText = `HN: ${owner.hn}`;
                document.getElementById('head-pet-name').innerText = pet.pet_name;
                document.getElementById('v-pet-name').innerText = pet.pet_name;
                document.getElementById('v-pet-weight').innerText = pet.weight || '0';
                document.getElementById('f_weight').value = pet.weight || 0;
                document.getElementById('v-pet-congenital').innerText = pet.congenital_disease || 'ไม่มี';
            }
        }

        async function fetchRecords() {
            const { data } = await db.from('medical_records').select('*').eq('animal_id', animalId).order('created_at', { ascending: false });
            records = data || []; renderRecordsList();
        }

        function renderRecordsList() {
            const list = document.getElementById('history-list');
            document.getElementById('record-count').innerText = records.length;
            list.innerHTML = records.map(rec => {
                const dateStr = new Date(rec.created_at).toLocaleDateString('th-TH', { day:'numeric', month:'short', year:'2-digit' });
                return `<div class="history-item"><div class="flex items-center gap-4 cursor-pointer" onclick="toggleCollapse('${rec.id}')"><div class="w-24 text-teal-400 font-black text-xl">${dateStr}</div><div class="flex-1 border-l border-white/10 pl-4"><div class="truncate text-base"><b>CC:</b> ${rec.cc || '-'} | <b>Dx:</b> ${rec.dx || '-'}</div></div><div class="flex items-center gap-3"><button onclick="event.stopPropagation(); editRecord('${rec.id}')" class="btn-base btn-blue !py-2 !px-4 text-sm">✏️</button><button onclick="event.stopPropagation(); deleteRecord('${rec.id}')" class="btn-base btn-red !py-2 !px-4 text-sm">🗑️</button><div id="arrow-${rec.id}" class="text-teal-400 text-xl">🔽</div></div></div><div id="detail-${rec.id}" class="hidden mt-6 pt-6 border-t border-white/5"><div class="grid grid-cols-1 md:grid-cols-3 gap-6 text-base"><div><b class="label-clinical text-sm">🔬 Lab:</b> ${drawBullets(rec.lab?.split(', ') || [])}</div><div><b class="label-clinical text-sm">💉 Tx:</b> ${drawBullets(rec.tx?.split(', ') || [])}</div><div><b class="label-clinical text-sm">💊 Rx:</b> ${drawBullets(rec.rx?.split(', ') || [], 'rx_history', dateStr)}</div></div><div class="flex justify-between items-center border-t border-white/5 pt-4"><div class="text-sm"><b>Plan:</b> ${rec.plan || '-'} | <b>Note:</b> ${rec.note || '-'}</div><div class="text-2xl font-black text-yellow-400">฿ ${rec.cost?.toLocaleString()}</div></div></div></div>`;
            }).join('');
        }

        async function saveMedicalRecord() {
            const data = {
                animal_id: animalId, owner_hn: ownerHN,
                weight: parseFloat(document.getElementById('f_weight').value) || 0,
                cc: document.getElementById('f_cc').value, hx: document.getElementById('f_hx').value, pe: document.getElementById('f_pe').value, dx: document.getElementById('f_dx').value, lab: document.getElementById('f_lab').value, tx: document.getElementById('f_tx').value, rx: document.getElementById('f_rx').value, plan: document.getElementById('f_plan').value,
                appointment: document.getElementById('f_appointment').value || null, appointment_note: document.getElementById('f_app_note').value, note: document.getElementById('f_note').value, cost: parseFloat(document.getElementById('f_cost').value) || 0, updated_at: new Date()
            };
            const { error } = editingId ? await db.from('medical_records').update(data).eq('id', editingId) : await db.from('medical_records').insert([data]);
            if (error) alert(error.message); else { await db.from('animals').update({ weight: data.weight }).eq('id', animalId); alert("บันทึกสำเร็จ!"); location.reload(); }
        }

        async function openCatalog(type) {
            currentCatalogType = type; document.getElementById('catalog-modal').style.display = 'flex';
            updateModalUI();
            let items = [];
            if (type === 'lab') items = (await db.from('services').select('*').eq('category', 'Lab')).data.map(i=>({name:i.service_name, price:i.price, config:i.price_config, type:'service'}));
            else if (type === 'tx') {
                const r1 = await db.from('pharmacy').select('*').eq('category', 'Injection');
                const r2 = await db.from('services').select('*').eq('category', 'หัตถการ');
                items = [...(r1.data||[]).map(i=>({name:i.item_name, price:i.price_per_unit, type:'injection', data:i})), ...(r2.data||[]).map(i=>({name:i.service_name, price:i.price, config:i.price_config, type:'procedure'}))];
            } else if (type === 'rx') items = (await db.from('pharmacy').select('*').in('category', ['TakeHome', 'General', 'Oral', 'ยา'])).data.map(i=>({name:i.item_name, price:i.price_per_unit, type:(i.category==='General'?'product':'medication'), data:i}));
            fullCatalog = items; renderItems(items);
        }

        function renderItems(data) { document.getElementById('catalog-items').innerHTML = data.map(i=>`<div class="p-5 bg-white/5 rounded-2xl border border-white/5 hover:border-teal-500 cursor-pointer flex justify-between items-center group" onclick='handleItemSelection(${JSON.stringify(i)})'><div><div class="font-bold text-white text-lg">${i.name}</div><div class="text-sm text-slate-500">฿${i.price||0}</div></div><div class="text-teal-500 text-2xl">+</div></div>`).join(''); }

        function handleItemSelection(i) {
            const w = parseFloat(document.getElementById('f_weight').value) || 0;
            if (i.type === 'injection') { pendingItem = i; document.getElementById('inj-name').innerText = i.name; document.getElementById('inj-modal').style.display='flex'; }
            else if (i.type === 'medication') openRxCalc(i);
            else {
                let p = i.price;
                if(i.config) { const t = [...i.config].sort((a,b)=>a.max-b.max).find(x=>w<=x.max); if(t) p=t.price; }
                addItemToList(i.name, parseFloat(p)||0);
            }
        }

        // --- ระบบคำนวณและสั่งยาใหม่ ---

        function openRxCalc(item) {
            pendingItem = item;
            document.getElementById('rx-calc-name').innerText = item.name;
            document.getElementById('rx-conc-val').value = item.data.concentration_mg_unit || 1;
            const ds = document.getElementById('rx-dose-select'); ds.innerHTML = '<option value="">-- โดสแนะนำ --</option>';
            const p = petType === 'แมว' ? 'cat' : 'dog';
            for(let i=1; i<=5; i++) if(item.data[`${p}_dose_${i}`] > 0) ds.innerHTML += `<option value="${item.data[`${p}_dose_${i}`]}">${item.data[`${p}_dose_${i}`]} mg/kg (${item.data[`${p}_for_${i}`] || ''})</option>`;
            document.getElementById('rx-calc-modal').style.display = 'flex';
            
            updateTimeOfDay(); // เซ็ตค่าเริ่มต้นของช่วงเวลาตามความถี่
            calculateRxTablets();
        }

        function calculateRxTablets() {
            const w = parseFloat(document.getElementById('f_weight').value) || 0, d = parseFloat(document.getElementById('rx-dose-val').value) || 0, c = parseFloat(document.getElementById('rx-conc-val').value) || 1;
            let t = Math.round(((w * d) / c) * 4) / 4;
            document.getElementById('rx-tabs-val').value = t;
            let disp = t;
            if (t % 1 !== 0) {
                const whole = Math.floor(t), frac = t % 1;
                const fStr = frac === 0.25 ? "1/4" : frac === 0.5 ? "1/2" : "3/4";
                disp = whole > 0 ? `${whole} ${fStr}` : fStr;
            }
            document.getElementById('rx-tabs-display').innerText = `${disp} ${pendingItem.data.unit || 'เม็ด'}`;
            calculateRxTotal();
        }

        function updateTimeOfDay() {
            // ปรับช่วงเวลาให้สอดคล้องกับความถี่อัตโนมัติ
            const f = document.getElementById('rx-freq').value;
            const dt = document.getElementById('rx-day-timing');
            
            if(f == "1" || f == "0.5") dt.value = "เช้า";
            else if(f == "2") dt.value = "เช้า-เย็น";
            else if(f == "3") dt.value = "เช้า-กลางวัน-เย็น";
            else if(f == "4") dt.value = "เช้า-กลางวัน-เย็น-ก่อนนอน";
        }

        function calculateRxTotal() {
            const t = parseFloat(document.getElementById('rx-tabs-val').value) || 0, f = parseFloat(document.getElementById('rx-freq').value) || 1, d = parseInt(document.getElementById('rx-days').value) || 1;
            const q = t * f * d, pr = pendingItem.price || 0;
            const total = Math.ceil((q * pr) / 10) * 10;
            document.getElementById('rx-info-text').innerText = `ราคาต่อหน่วย: ฿${pr} | ทั้งหมด ${q} ${pendingItem.data.unit || 'เม็ด'}`;
            document.getElementById('rx-total-price-display').innerText = `฿ ${total}`;
            document.getElementById('rx-final-price-val').value = total;
        }

        function confirmRxCalc() {
            const disp = document.getElementById('rx-tabs-display').innerText.split(' ')[0] || "0";
            const unit = pendingItem.data.unit || 'เม็ด';
            
            const fVal = document.getElementById('rx-freq').value;
            const freqText = fVal === "0.5" ? "วันเว้นวัน" : `วันละ ${fVal} ครั้ง`;
            
            const mealTiming = document.getElementById('rx-meal-timing').value;
            const dayTiming = document.getElementById('rx-day-timing').value;
            const days = document.getElementById('rx-days').value;
            const finalP = parseFloat(document.getElementById('rx-final-price-val').value) || 0;
            
            // สร้าง String ให้ไปโชว์ใน list ปกติ
            const historyStr = `${pendingItem.name} (ป้อนครั้งละ ${disp} ${unit} ${freqText} ${mealTiming} ${dayTiming} x ${days} วัน)`;
            addItemToList(historyStr, finalP);
            document.getElementById('rx-calc-modal').style.display = 'none';
        }

        function addItemToList(name, price) {
            const list = currentCatalogType === 'lab' ? selectedLabs : (currentCatalogType === 'tx' ? selectedTxs : selectedRxs);
            list.push({ name, price });
            document.getElementById('f_cost').value = (parseFloat(document.getElementById('f_cost').value) + price).toFixed(2);
            updateFormDisplays(); updateModalUI();
        }
        function removeItem(type, idx) {
            const list = type === 'lab' ? selectedLabs : (type === 'tx' ? selectedTxs : selectedRxs);
            document.getElementById('f_cost').value = (parseFloat(document.getElementById('f_cost').value) - list[idx].price).toFixed(2);
            list.splice(idx, 1); updateFormDisplays(); updateModalUI();
        }
        function updateFormDisplays() {
            document.getElementById('list_lab_display').innerHTML = drawBullets(selectedLabs.map(i=>i.name), 'lab');
            document.getElementById('list_tx_display').innerHTML = drawBullets(selectedTxs.map(i=>i.name), 'tx');
            document.getElementById('list_rx_display').innerHTML = drawBullets(selectedRxs.map(i=>i.name), 'rx');
            document.getElementById('f_lab').value = selectedLabs.map(i=>i.name).join(', ');
            document.getElementById('f_tx').value = selectedTxs.map(i=>i.name).join(', ');
            document.getElementById('f_rx').value = selectedRxs.map(i=>i.name).join(', ');
        }
        function updateModalUI() {
            const list = currentCatalogType === 'lab' ? selectedLabs : (currentCatalogType === 'tx' ? selectedTxs : selectedRxs);
            document.getElementById('modal-session-list').innerHTML = list.map((i, idx) => `<span onclick="removeItem('${currentCatalogType}', ${idx})" class="bg-teal-500 text-black px-3 py-1 rounded-lg text-sm font-bold cursor-pointer">✕ ${i.name}</span>`).join('');
        }
        function drawBullets(arr, type = null, date = null) {
            if (!arr || arr.length === 0) return "-";
            return `<ul class="bullet-list">${arr.map((n, idx) => {
                const rep = type === 'rx_history' ? `<button onclick="reprintFromHistory('${n.replace(/'/g, "\\'")}', '${date}')" class="ml-2">🖨️</button>` : "";
                const act = (type && type !== 'rx_history') ? `onclick="removeItem('${type}', ${idx})"` : "";
                return `<li ${act}><span>${n}</span> ${rep}</li>`;
            }).join('')}</ul>`;
        }

        function toggleCollapse(id) { document.getElementById(`detail-${id}`).classList.toggle('hidden'); }
        function showFormView() { document.getElementById('history-view-container').classList.add('view-hidden'); document.getElementById('form-view-container').classList.remove('view-hidden'); }
        function showHistoryView() { location.reload(); }
        function closeCatalog() { document.getElementById('catalog-modal').style.display = 'none'; }
        function goBack() { location.href = 'animals.html'; }
        function confirmInj() { addItemToList(`${pendingItem.name} (${document.getElementById('inj-ml').value}ml) ${Array.from(document.querySelectorAll('input[name="route"]:checked')).map(c=>c.value).join('/')}`, pendingItem.price||0); document.getElementById('inj-modal').style.display='none'; }
        function filterCatalog() { const t = document.getElementById('catalog-search').value.toLowerCase(); renderItems(fullCatalog.filter(i=>i.name.toLowerCase().includes(t))); }
        function editRecord(id) { const r = records.find(i=>i.id===id); editingId = id; document.getElementById('f_cc').value = r.cc; document.getElementById('f_hx').value = r.hx; document.getElementById('f_pe').value = r.pe; document.getElementById('f_dx').value = r.dx; document.getElementById('f_plan').value = r.plan; document.getElementById('f_cost').value = r.cost; document.getElementById('f_weight').value = r.weight; document.getElementById('f_note').value = r.note; selectedLabs = r.lab?r.lab.split(', ').map(n=>({name:n, price:0})):[]; selectedTxs = r.tx?r.tx.split(', ').map(n=>({name:n, price:0})):[]; selectedRxs = r.rx?r.rx.split(', ').map(n=>({name:n, price:0})):[]; updateFormDisplays(); showFormView(); document.getElementById('edit-mode-badge')?.classList.remove('hidden'); }
        async function deleteRecord(id) { if(confirm("ลบประวัติ?")) db.from('medical_records').delete().eq('id', id).then(()=>location.reload()); }

        // ==========================================
        // ระบบพิมพ์สติ๊กเกอร์ (ดึงข้อมูลจาก Database)
        // ==========================================
        
        async function getPrintConfig(type) {
            if (printConfigCache && printConfigCache[type]) return printConfigCache[type];
            try {
                const { data } = await db.from('print_templates').select('config').eq('template_type', type).single();
                if (!printConfigCache) printConfigCache = {};
                printConfigCache[type] = data ? data.config : { width: 80, height: 50, lines: [] };
                return printConfigCache[type];
            } catch(e) {
                return { width: 80, height: 50, lines: [] };
            }
        }

        async function executeDynamicPrint(mockData, templateType) {
            const config = await getPrintConfig(templateType);
            const container = document.getElementById('sticker-container');
            
            container.style.width = config.width + 'mm';
            container.style.height = config.height + 'mm';
            container.innerHTML = '';

            let style = document.getElementById('dynamic-print-style');
            if(!style) {
                style = document.createElement('style');
                style.id = 'dynamic-print-style';
                document.head.appendChild(style);
            }
            style.innerHTML = `@media print { @page { size: ${config.width}mm ${config.height}mm; margin: 0; } }`;

            (config.lines || []).forEach(l => {
                const div = document.createElement("div");
                div.className = "canvas-line";
                div.style.left = l.x + "px";
                div.style.top = l.y + "px";
                div.style.fontSize = l.size + "px";
                div.style.textAlign = l.align || "left";
                div.style.fontFamily = l.font || "Sarabun";
                div.style.fontWeight = l.bold ? "700" : "400";
                div.style.width = l.align === 'center' ? "100%" : `calc(100% - ${l.x}px)`;
                if(l.align === 'center') div.style.left = "0px";

                let txt = l.text || "";
                Object.keys(mockData).forEach(key => {
                    const regex = new RegExp(`{{${key}}}`, 'g');
                    txt = txt.replace(regex, mockData[key] || "");
                });
                
                div.innerHTML = txt;
                container.appendChild(div);
            });

            setTimeout(() => { window.print(); }, 200);
        }

        async function printRxSticker() {
            const petName = document.getElementById('head-pet-name').innerText;
            const dateStr = new Date().toLocaleDateString('th-TH', { day: '2-digit', month: 'short', year: 'numeric' });
            
            const disp = document.getElementById('rx-tabs-display').innerText.split(' ')[0] || "0";
            const unit = pendingItem.data.unit || 'เม็ด';
            
            const fVal = document.getElementById('rx-freq').value;
            const freqText = fVal === "0.5" ? "วันเว้นวัน" : `วันละ ${fVal} ครั้ง`;
            
            const mealTiming = document.getElementById('rx-meal-timing').value;
            const dayTiming = document.getElementById('rx-day-timing').value;
            const daysVal = document.getElementById('rx-days').value;
            
            const doseStr = `ป้อนครั้งละ ${disp} ${unit}`;
            const timingCombinedStr = `${mealTiming} ${dayTiming}`.trim(); // แบบรวม
            const durationStr = `${daysVal} วัน`;
            const instructionStr = `${doseStr} ${freqText} ${timingCombinedStr}`;

            const totalQty = (parseFloat(document.getElementById('rx-tabs-val').value) * parseFloat(fVal) * parseInt(daysVal)) || 0;
            
            const printData = {
                clinic_name: "PK-VMS Clinic",
                phone: document.getElementById('info-owner-phone').innerText,
                hn: ownerHN,
                pet_name: petName,
                owner_name: document.getElementById('info-owner-name').innerText,
                species: petType,
                sex: petData.sex,
                dob: petData.dob,
                drug_name: pendingItem.data.item_name,
                drug_name_th: pendingItem.data.name_th || pendingItem.data.item_name,
                dose: doseStr,
                frequency: freqText,
                timing: timingCombinedStr, // ตัวแปรรวม (กรณีหมอใช้บรรทัดเดียว)
                meal_timing: mealTiming,   // ตัวแปรแยก (เช่น หลังอาหาร)
                day_timing: dayTiming,     // ตัวแปรแยก (เช่น เช้า-เย็น)
                duration: durationStr,
                qty: `${totalQty} ${unit}`,
                total_qty: totalQty,
                instruction: instructionStr,
                warning: pendingItem.data.side_effects || "",
                date: dateStr,
                time: new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }),
                queue: ""
            };

            await executeDynamicPrint(printData, 'drug_sticker');
        }

        async function reprintFromHistory(textStr, dateStr) {
            // จำลองการตัดคำแบบง่ายๆ เพื่อพิมพ์ซ้ำจากประวัติ String เก่า
            const parts = textStr.split(' (');
            const drugName = parts[0].trim();
            const instruction = parts[1] ? parts[1].replace(')', '') : '';
            
            // 1. วิ่งไปดึงชื่อยาภาษาไทย และ คำเตือน จากฐานข้อมูล Pharmacy
            let drugNameTh = drugName;
            let warningText = "";
            try {
                const { data } = await db.from('pharmacy').select('name_th, side_effects').eq('item_name', drugName).maybeSingle();
                if (data) {
                    drugNameTh = data.name_th || drugName;
                    warningText = data.side_effects || "";
                }
            } catch(e) {
                console.log("ไม่พบข้อมูลยาในระบบ");
            }

            // 2. พยายามหั่นข้อความวิธีใช้ กลับมาเป็นตัวแปรย่อยๆ
            let doseStr = "", freqStr = "", timingStr = "", durationStr = "", mealTiming = "", dayTiming = "";
            let frontPart = instruction;
            
            // หั่นจำนวนวัน (x 7 วัน)
            if (instruction.includes(' x ')) {
                const insParts = instruction.split(' x ');
                frontPart = insParts[0].trim();
                durationStr = insParts[1].trim() + (insParts[1].includes('วัน') ? '' : ' วัน');
            }

            // หั่นความถี่ และเวลา
            if (frontPart.includes(' วันละ ')) {
                const fParts = frontPart.split(' วันละ ');
                doseStr = fParts[0].trim(); 
                
                const kIdx = fParts[1].indexOf('ครั้ง');
                if (kIdx !== -1) {
                    freqStr = "วันละ " + fParts[1].substring(0, kIdx + 5).trim();
                    timingStr = fParts[1].substring(kIdx + 5).trim(); 
                } else {
                    freqStr = "วันละ " + fParts[1].trim();
                }
            } else if (frontPart.includes(' วันเว้นวัน ')) {
                const fParts = frontPart.split(' วันเว้นวัน ');
                doseStr = fParts[0].trim();
                freqStr = "วันเว้นวัน";
                timingStr = fParts[1] ? fParts[1].trim() : "";
            } else {
                doseStr = frontPart;
            }

            // พยายามแยกมื้ออาหาร (meal_timing) ออกจาก ช่วงเวลา (day_timing)
            const knownMeals = ["หลังอาหารทันที", "หลังอาหาร", "ก่อนอาหาร 30 นาที", "ก่อนอาหาร 1 ชั่วโมง", "ก่อนอาหาร", "พร้อมอาหาร"];
            mealTiming = timingStr; 
            dayTiming = "";
            for (let m of knownMeals) {
                if (timingStr.startsWith(m)) {
                    mealTiming = m;
                    dayTiming = timingStr.replace(m, "").trim();
                    break;
                }
            }

            // 3. เครื่องคิดเลขคำนวณจำนวนเม็ดรวมจากข้อความประวัติ
            let calculatedQtyStr = "-";
            let calculatedTotalQtyNum = "-";
            try {
                let doseVal = 0;
                let doseTokens = doseStr.split(' ');
                for(let t of doseTokens) {
                    if(t.includes('/')) {
                        let sp = t.split('/');
                        if(!isNaN(parseFloat(sp[0])) && !isNaN(parseFloat(sp[1]))) {
                            doseVal += parseFloat(sp[0])/parseFloat(sp[1]);
                        }
                    } else if (!isNaN(parseFloat(t))) {
                        doseVal += parseFloat(t);
                    }
                }

                let freqNum = 1;
                if (freqStr.includes('เว้นวัน')) {
                    freqNum = 0.5;
                } else {
                    let fMatch = freqStr.match(/\d+(\.\d+)?/);
                    if (fMatch) freqNum = parseFloat(fMatch[0]);
                }

                let durNum = 1;
                let dMatch = durationStr.match(/\d+/);
                if (dMatch) durNum = parseInt(dMatch[0]);

                // ถ้าดึงเลขสำเร็จ เอามาคูณกัน
                if (doseVal > 0 && freqNum > 0 && durNum > 0) {
                    let total = Math.ceil(doseVal * freqNum * durNum);
                    
                    // สแกนหาหน่วยของยา
                    let unit = "เม็ด"; // ค่าพื้นฐาน
                    if (doseStr.match(/แคปซูล/i)) unit = "แคปซูล";
                    else if (doseStr.match(/ml/i)) unit = "ml";
                    else if (doseStr.match(/cc/i)) unit = "cc";
                    else if (doseStr.match(/หยด/i)) unit = "หยด";

                    calculatedTotalQtyNum = total;
                    calculatedQtyStr = `${total} ${unit}`;
                }
            } catch (e) {
                console.log("ไม่สามารถคำนวณยอดรวมอัตโนมัติได้", e);
            }

            const printData = {
                clinic_name: "PK-VMS Clinic",
                phone: document.getElementById('info-owner-phone').innerText,
                hn: ownerHN,
                pet_name: document.getElementById('v-pet-name').innerText,
                owner_name: document.getElementById('info-owner-name').innerText,
                species: petType,
                sex: petData.sex,
                dob: petData.dob,
                drug_name: drugName,
                drug_name_th: drugNameTh,
                dose: doseStr,
                frequency: freqStr,
                timing: timingStr,
                meal_timing: mealTiming, 
                day_timing: dayTiming, 
                duration: durationStr,
                qty: calculatedQtyStr,             // ใส่จำนวนที่คำนวณได้
                total_qty: calculatedTotalQtyNum,  // ใส่จำนวนเพียวๆ
                instruction: instruction,
                warning: warningText,
                date: dateStr,
                time: "", 
                queue: ""
            };
            
            await executeDynamicPrint(printData, 'drug_sticker');
        }
    </script>
