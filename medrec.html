<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <title>เวชระเบียน | PK-VMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>

    <style>
        :root { --navy: #0b1929; --navy-mid: #112240; --teal: #0ea5a0; --border: rgba(255,255,255,0.1); }
        body { font-family: "Sarabun", sans-serif; background: var(--navy); color: #e2e8f0; }
        .form-input { background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 12px; padding: 10px 15px; width: 100%; color: white; outline: none; }
        .form-input:focus { border-color: var(--teal); box-shadow: 0 0 10px rgba(14,165,160,0.2); }
        .glass-table { background: rgba(255,255,255,0.02); border-radius: 16px; overflow: hidden; border: 1px solid var(--border); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <a href="index.html" class="text-gray-400 text-sm hover:text-white transition">← กลับหน้าหลัก</a>
                <h1 class="text-3xl font-bold text-white mt-2">📝 เวชระเบียนสัตว์ป่วย</h1>
            </div>
            <button onclick="toggleForm()" class="bg-teal-600 hover:bg-teal-500 text-white px-6 py-2 rounded-xl transition font-bold">
                + เพิ่มเคสใหม่
            </button>
        </header>

        <section id="record-form" class="hidden mb-10 bg-navy-mid p-6 rounded-3xl border border-teal-500/30 shadow-2xl shadow-teal-900/20">
            <h2 class="text-xl font-bold mb-6 flex items-center gap-2 text-teal-400">📝 ลงทะเบียนสัตว์ป่วย</h2>
            <form id="pet-form" onsubmit="saveData(event)" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div>
                    <label class="block text-xs text-gray-400 mb-2 uppercase tracking-widest">ชื่อสัตว์เลี้ยง</label>
                    <input type="text" id="pet_name" class="form-input" placeholder="เช่น ถุงเงิน" required>
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-2 uppercase tracking-widest">ชื่อเจ้าของ</label>
                    <input type="text" id="owner_name" class="form-input" placeholder="ชื่อ-นามสกุล" required>
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-2 uppercase tracking-widest">ชนิดสัตว์</label>
                    <select id="pet_type" class="form-input">
                        <option value="สุนัข">สุนัข</option>
                        <option value="แมว">แมว</option>
                        <option value="นก">นก</option>
                        <option value="อื่นๆ">อื่นๆ</option>
                    </select>
                </div>
                <div class="lg:col-span-3">
                    <label class="block text-xs text-gray-400 mb-2 uppercase tracking-widest">อาการเบื้องต้น / ประวัติ</label>
                    <textarea id="symptoms" class="form-input h-24" placeholder="ระบุอาการอย่างละเอียด"></textarea>
                </div>
                <div class="lg:col-span-3 flex justify-end gap-3">
                    <button type="button" onclick="toggleForm()" class="px-6 py-2 text-gray-400 hover:text-white">ยกเลิก</button>
                    <button type="submit" class="bg-teal-600 hover:bg-teal-500 text-white px-10 py-2 rounded-xl font-bold">บันทึกข้อมูล</button>
                </div>
            </form>
        </section>

        <div class="mb-6">
            <input type="text" id="search" oninput="fetchRecords()" class="form-input max-w-md" placeholder="🔍 ค้นหาชื่อสัตว์ หรือเจ้าของ...">
        </div>

        <div class="glass-table">
            <table class="w-full text-left">
                <thead class="bg-white/5 text-gray-400 text-xs uppercase tracking-widest">
                    <tr>
                        <th class="p-4">วันที่ลงทะเบียน</th>
                        <th class="p-4">สัตว์เลี้ยง</th>
                        <th class="p-4">เจ้าของ</th>
                        <th class="p-4">อาการ</th>
                        <th class="p-4 text-center">จัดการ</th>
                    </tr>
                </thead>
                <tbody id="med-list" class="divide-y divide-white/5">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        function toggleForm() {
            const form = document.getElementById('record-form');
            form.classList.toggle('hidden');
        }

        // ดึงข้อมูลจาก Supabase
        async function fetchRecords() {
            const searchTerm = document.getElementById('search').value;
            let query = db.from('medrec').select('*').order('created_at', { ascending: false });

            if (searchTerm) {
                query = query.or(`pet_name.ilike.%${searchTerm}%,owner_name.ilike.%${searchTerm}%`);
            }

            const { data, error } = await query;

            if (error) {
                console.error(error);
                return;
            }

            const listBody = document.getElementById('med-list');
            listBody.innerHTML = data.map(item => `
                <tr class="hover:bg-white/5 transition group">
                    <td class="p-4 text-sm">${new Date(item.created_at).toLocaleDateString('th-TH')}</td>
                    <td class="p-4">
                        <div class="font-bold text-teal-400">${item.pet_name}</div>
                        <div class="text-[10px] text-gray-500">${item.pet_type}</div>
                    </td>
                    <td class="p-4 text-sm text-gray-300">${item.owner_name}</td>
                    <td class="p-4 text-sm text-gray-400 truncate max-w-xs">${item.symptoms || '-'}</td>
                    <td class="p-4 text-center">
                        <button class="text-xs bg-white/5 hover:bg-white/10 px-3 py-1 rounded-lg transition">ดูประวัติ</button>
                    </td>
                </tr>
            `).join('');
        }

        // บันทึกข้อมูล
        async function saveData(e) {
            e.preventDefault();
            const pet_name = document.getElementById('pet_name').value;
            const owner_name = document.getElementById('owner_name').value;
            const pet_type = document.getElementById('pet_type').value;
            const symptoms = document.getElementById('symptoms').value;

            const { error } = await db.from('medrec').insert([
                { pet_name, owner_name, pet_type, symptoms }
            ]);

            if (error) {
                alert('เกิดข้อผิดพลาด: ' + error.message);
            } else {
                alert('บันทึกสำเร็จ!');
                document.getElementById('pet-form').reset();
                toggleForm();
                fetchRecords();
            }
        }

        // โหลดข้อมูลครั้งแรก
        window.onload = fetchRecords;
    </script>
</body>
</html>
