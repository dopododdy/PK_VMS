<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <title>เวชระเบียน | PK-VMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>

    <style>
        :root { --navy: #0b1929; --navy-mid: #112240; --teal: #0ea5a0; --border: rgba(255,255,255,0.1); }
        body { font-family: "Sarabun", sans-serif; background: var(--navy); color: #e2e8f0; }
        .form-input { background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 12px; padding: 10px 15px; width: 100%; color: white; outline: none; }
        .form-input:focus { border-color: var(--teal); box-shadow: 0 0 10px rgba(14,165,160,0.2); }
        .glass-table { background: rgba(255,255,255,0.02); border-radius: 20px; overflow: hidden; border: 1px solid var(--border); }
        select option { background: var(--navy-mid); color: white; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-white flex items-center gap-3">
                    <span class="text-teal-400">📝</span> เวชระเบียนสัตว์ป่วย
                </h1>
                <p class="text-gray-400 text-sm mt-1">Hospital Number & Patient Records</p>
            </div>
            <div class="flex items-center gap-3 w-full md:w-auto">
                <a href="index.html" class="flex-1 md:flex-none text-center bg-white/5 hover:bg-white/10 text-white px-5 py-2.5 rounded-xl transition border border-white/10 text-sm">
                    🏠 หน้าหลัก
                </a>
                <button onclick="toggleForm()" class="flex-1 md:flex-none bg-teal-600 hover:bg-teal-500 text-white px-6 py-2.5 rounded-xl transition font-bold shadow-lg shadow-teal-900/20">
                    + เพิ่มเคสใหม่
                </button>
            </div>
        </header>

        <section id="record-form" class="hidden mb-10 bg-navy-mid p-8 rounded-3xl border border-teal-500/30 shadow-2xl">
            <h2 class="text-xl font-bold mb-6 text-teal-400">📋 ลงทะเบียนสัตว์ป่วยใหม่</h2>
            <form id="pet-form" onsubmit="saveData(event)" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div>
                    <label class="block text-xs text-gray-400 mb-2 uppercase tracking-widest">หมายเลขเวชระเบียน (HN)</label>
                    <input type="text" id="hn" class="form-input" placeholder="เช่น 690001" required>
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-2 uppercase tracking-widest">ชื่อสัตว์</label>
                    <input type="text" id="pet_name" class="form-input" placeholder="ชื่อสัตว์เลี้ยง" required>
                </div>

                <div>
                    <label class="block text-xs text-gray-400 mb-2 uppercase tracking-widest">ชนิดสัตว์</label>
                    <select id="pet_type" class="form-input" onchange="updateBreedOptions()" required>
                        <option value="แมว" selected>แมว</option>
                        <option value="สุนัข">สุนัข</option>
                        <option value="อื่นๆ">อื่นๆ</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs text-gray-400 mb-2 uppercase tracking-widest">เพศ</label>
                    <select id="gender" class="form-input">
                        <option value="ผู้">ผู้</option>
                        <option value="ผู้ตอน">ผู้ตอน</option>
                        <option value="เมีย">เมีย</option>
                        <option value="เมียหมัน">เมียหมัน</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs text-gray-400 mb-2 uppercase tracking-widest">พันธุ์</label>
                    <select id="breed_select" class="form-input"></select>
                    <input type="text" id="breed_custom" class="form-input mt-2 hidden" placeholder="ระบุพันธุ์">
                </div>

                <div>
                    <label class="block text-xs text-gray-400 mb-2 uppercase tracking-widest">เบอร์โทรศัพท์เจ้าของ</label>
                    <input type="text" id="phone" class="form-input" placeholder="08x-xxxxxxx" required>
                </div>

                <div class="md:col-span-1">
                    <label class="block text-xs text-gray-400 mb-2 uppercase tracking-widest">ชื่อเจ้าของ</label>
                    <input type="text" id="owner_name" class="form-input" placeholder="ชื่อ-นามสกุล" required>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-xs text-gray-400 mb-2 uppercase tracking-widest">ที่อยู่</label>
                    <textarea id="address" class="form-input h-[42px]" placeholder="ที่อยู่ปัจจุบัน"></textarea>
                </div>

                <div class="md:col-span-3 flex justify-end gap-3 mt-4">
                    <button type="button" onclick="toggleForm()" class="px-6 py-2 text-gray-400 hover:text-white transition">ยกเลิก</button>
                    <button type="submit" class="bg-teal-600 hover:bg-teal-500 text-white px-10 py-3 rounded-xl font-bold shadow-lg">บันทึกข้อมูล</button>
                </div>
            </form>
        </section>

        <div class="mb-6">
            <div class="relative max-w-md">
                <input type="text" id="search" oninput="fetchRecords()" class="form-input pl-10" placeholder="ค้นหา HN, ชื่อสัตว์, หรือเบอร์โทร...">
                <span class="absolute left-3 top-2.5 opacity-40">🔍</span>
            </div>
        </div>

        <div class="glass-table overflow-x-auto">
            <table class="w-full text-left">
                <thead class="bg-white/5 text-gray-400 text-[11px] uppercase tracking-widest">
                    <tr>
                        <th class="p-4">HN</th>
                        <th class="p-4">ชื่อสัตว์ / พันธุ์</th>
                        <th class="p-4">เพศ</th>
                        <th class="p-4">เจ้าของ / เบอร์โทร</th>
                        <th class="p-4 text-center">จัดการ</th>
                    </tr>
                </thead>
                <tbody id="med-list" class="divide-y divide-white/5"></tbody>
            </table>
        </div>
    </div>

    <script>
        const breedData = {
            "สุนัข": [
                "ไทย", "โกลเด้น รีทรีฟเวอร์", "ไซบีเรียน ฮัสกี้", "ปอมเมอเรเนียน", "พุดเดิ้ล", 
                "ชิสุ", "บูลด็อก", "เฟรนช์ บูลด็อก", "บีเกิล", "ชิวาวา", "อื่นๆ"
            ],
            "แมว": [
                "ไทย", "เปอร์เซีย", "สก็อตติช โฟลด์", "บริติช ชอร์ตแฮร์", "วิเชียรมาศ", 
                "เบงกอล", "อเมริกัน ชอร์ตแฮร์", "เมนคูน", "รัสเซียน บลู", "ขาวมณี", "อื่นๆ"
            ]
        };

        function updateBreedOptions() {
            const type = document.getElementById('pet_type').value;
            const breedSelect = document.getElementById('breed_select');
            const breedCustom = document.getElementById('breed_custom');
            
            breedSelect.innerHTML = '';
            breedCustom.classList.add('hidden');

            if (type === "อื่นๆ" || !type) {
                const opt = document.createElement('option');
                opt.value = "อื่นๆ";
                opt.textContent = type === "อื่นๆ" ? "ระบุเองด้านล่าง" : "กรุณาเลือกชนิดสัตว์";
                breedSelect.appendChild(opt);
                if (type === "อื่นๆ") breedCustom.classList.remove('hidden');
            } else {
                breedData[type].forEach(breed => {
                    const opt = document.createElement('option');
                    opt.value = breed;
                    opt.textContent = breed;
                    // ให้ "ไทย" ถูกเลือกเป็นค่าเริ่มต้น
                    if (breed === "ไทย") opt.selected = true;
                    breedSelect.appendChild(opt);
                });
                
                breedSelect.onchange = function() {
                    if (this.value === "อื่นๆ") breedCustom.classList.remove('hidden');
                    else breedCustom.classList.add('hidden');
                };
            }
        }

        function toggleForm() {
            const form = document.getElementById('record-form');
            form.classList.toggle('hidden');
            if(!form.classList.contains('hidden')) window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function fetchRecords() {
            const search = document.getElementById('search').value;
            let query = db.from('medrec').select('*').order('created_at', { ascending: false });
            if (search) query = query.or(`hn.ilike.%${search}%,pet_name.ilike.%${search}%,phone.ilike.%${search}%,owner_name.ilike.%${search}%`);

            const { data, error } = await query;
            if (error) return console.error(error);

            const listBody = document.getElementById('med-list');
            listBody.innerHTML = data.map(item => `
                <tr class="hover:bg-white/5 transition group">
                    <td class="p-4 font-mono text-teal-400 font-bold">${item.hn || '-'}</td>
                    <td class="p-4">
                        <div class="font-bold text-white">${item.pet_name}</div>
                        <div class="text-[10px] text-gray-500">${item.pet_type} | ${item.breed || 'ไม่ระบุพันธุ์'}</div>
                    </td>
                    <td class="p-4 text-sm text-gray-300">${item.gender || '-'}</td>
                    <td class="p-4">
                        <div class="text-sm">${item.owner_name}</div>
                        <div class="text-[10px] text-teal-500 font-bold">${item.phone || '-'}</div>
                    </td>
                    <td class="p-4 text-center">
                        <button class="text-[10px] bg-white/5 hover:bg-teal-500 hover:text-white px-3 py-1.5 rounded-lg border border-white/10 transition font-bold">Details</button>
                    </td>
                </tr>
            `).join('');
        }

        async function saveData(e) {
            e.preventDefault();
            const petType = document.getElementById('pet_type').value;
            const breedSelect = document.getElementById('breed_select').value;
            const breedCustom = document.getElementById('breed_custom').value;
            const finalBreed = (breedSelect === "อื่นๆ") ? breedCustom : breedSelect;

            const payload = {
                hn: document.getElementById('hn').value,
                pet_name: document.getElementById('pet_name').value,
                pet_type: petType,
                gender: document.getElementById('gender').value,
                breed: finalBreed,
                owner_name: document.getElementById('owner_name').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value
            };

            const { error } = await db.from('medrec').insert([payload]);
            if (error) {
                alert('Error: ' + error.message);
            } else {
                alert('บันทึกข้อมูลเรียบร้อย!');
                document.getElementById('pet-form').reset();
                // คืนค่า Default หลังบันทึก
                document.getElementById('pet_type').value = "แมว";
                updateBreedOptions(); 
                toggleForm();
                fetchRecords();
            }
        }

        // เมื่อโหลดหน้าเว็บ ให้รันการดึงข้อมูลและตั้งค่าพันธุ์ไม้ทันที
        window.onload = function() {
            fetchRecords();
            updateBreedOptions(); // เรียกเพื่อให้ "ไทย" ปรากฏขึ้นมาเป็นค่าแรก
        };
    </script>
</body>
</html>
