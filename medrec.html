<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกการรักษา | PK-VMS Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=Prompt:wght@300;400;600&family=Sarabun:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/th.js"></script>

    <style>
        :root { --navy: #020617; --navy-light: #0f172a; --teal: #14b811; --border: rgba(255, 255, 255, 0.1); }
        * { font-family: "Sarabun", sans-serif !important; }
        body { background: var(--navy); color: #e2e8f0; font-size: 1rem; margin: 0; padding: 0; }
        .input-box { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; padding: 12px; color: white; width: 100%; outline: none; transition: 0.2s; font-size: 1.1rem; }
        .input-box:focus { border-color: var(--teal); background: rgba(0,0,0,0.5); }
        .label-text { color: #94a3b8; font-size: 1rem; margin-bottom: 4px; display: block; font-weight: 600; }
        .label-clinical { color: var(--teal); font-weight: 800; font-size: 1.1rem; margin-bottom: 4px; display: block; }
        .section-card { background: rgba(30, 41, 59, 0.4); border-radius: 30px; padding: 30px; border: 1px solid var(--border); margin-bottom: 24px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3); }
        
        .history-record-box { background: rgba(0,0,0,0.2); border-radius: 15px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 15px; }
        .data-label { font-size: 0.75rem; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 4px; }
        .data-value { font-size: 1rem; color: #cbd5e1; }
        
        .btn-base { padding: 12px 24px; border-radius: 12px; font-weight: 800; display: inline-flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; border: none; cursor: pointer; color: white !important; font-size: 1.1rem; }
        .btn-teal { background-color: #0d9488 !important; }
        .btn-blue { background-color: #2563eb !important; }
        .btn-red { background-color: #dc2626 !important; }
        .list-box { background: rgba(20, 184, 177, 0.05); border: 1.5px dashed var(--teal); border-radius: 12px; min-height: 80px; padding: 12px; cursor: pointer; }
        .view-hidden { display: none; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--navy-light); border: 1px solid var(--border); border-radius: 30px; width: 100%; max-width: 800px; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; }
        .bullet-list { list-style: none; padding: 0; margin: 0; }
        .bullet-list li { position: relative; padding-left: 20px; font-size: 1.1rem; margin-bottom: 6px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .bullet-list li::before { content: "•"; position: absolute; left: 0; color: var(--teal); font-weight: bold; }
        
        .lab-table-container { overflow-x: auto; background: rgba(0,0,0,0.2); border-radius: 15px; border: 1px solid var(--border); }
        .lab-table { width: 100%; border-collapse: collapse; }
        .lab-table th { background: rgba(15, 23, 42, 0.8); padding: 10px; font-size: 0.7rem; color: #94a3b8; border: 1px solid var(--border); }
        .lab-table td { padding: 10px; border: 1px solid var(--border); text-align: center; }
        .lab-param-name { text-align: left !important; font-weight: bold; color: #fff; background: rgba(255,255,255,0.02); }
        @media print { #main-ui, .modal-overlay { display: none !important; } }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="main-ui" class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-6">
                <button onclick="goBack()" class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center hover:bg-white/10 text-2xl shadow-lg">⬅️</button>
                <div><h1 class="text-4xl font-black text-white" id="head-pet-name">กำลังโหลด...</h1><p class="text-teal-400 font-bold text-xl" id="head-hn">HN: -</p></div>
            </div>
            <a href="index.html" class="w-14 h-14 rounded-2xl bg-white/5 flex items-center justify-center hover:bg-white/10 text-3xl border border-white/5">🏠</a>
        </header>

        <div class="section-card border-l-8 border-blue-500">
            <h3 class="text-2xl font-bold text-blue-400 mb-6 flex items-center gap-2">👤 ข้อมูลเจ้าของสัตว์</h3>
            <div class="grid grid-cols-12 gap-6">
                <div class="col-span-12 md:col-span-4"><label class="label-text">ชื่อ-นามสกุล เจ้าของ</label><div id="info-owner-name" class="text-xl font-bold text-white">-</div></div>
                <div class="col-span-12 md:col-span-3"><label class="label-text">เบอร์โทรศัพท์</label><div id="info-owner-phone" class="text-xl font-bold text-teal-400">-</div></div>
                <div class="col-span-12 md:col-span-5"><label class="label-text">ที่อยู่</label><div id="info-owner-address" class="text-base text-slate-400">-</div></div>
            </div>
        </div>

        <div id="history-view-container">
            <div class="section-card border-l-8 border-teal-500">
                <div class="flex justify-between items-center mb-8">
                    <h3 class="text-2xl font-bold text-white flex items-center gap-2">🐾 ข้อมูลสัตว์</h3>
                    <button onclick="showFormView()" class="btn-base btn-teal text-xl py-4 px-8 shadow-xl">+ เพิ่มประวัติการรักษา</button>
                </div>
                <div class="grid grid-cols-12 gap-4">
                    <div class="col-span-6 md:col-span-2"><label class="label-text">ชื่อสัตว์</label><div id="v-pet-name" class="text-xl font-bold text-white">-</div></div>
                    <div class="col-span-6 md:col-span-3"><label class="label-text">นน.(กก.)</label><div id="v-pet-weight" class="text-xl font-bold text-yellow-400">-</div></div>
                    <div class="col-span-12 md:col-span-7"><label class="label-text">⚠️ แพ้ยา/ข้อควรระวัง</label><div id="v-pet-congenital" class="text-lg font-bold text-red-400">-</div></div>
                </div>
            </div>
            
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-3xl font-black text-white flex items-center gap-3">
                    ⏳ ประวัติการรักษา <span id="record-count" class="bg-white/10 text-base px-4 py-1 rounded-full">0</span>
                </h3>
                <div class="flex gap-3">
                    <button onclick="printBothLabels(animalId)" class="btn-base bg-emerald-600 hover:bg-emerald-500 shadow-lg text-sm px-4 py-2">🖨️ ข้อมูลสัตว์ + นัดหมาย</button>
                    <button onclick="printPetLabel(animalId)" class="btn-base bg-indigo-600 hover:bg-indigo-500 shadow-lg text-sm px-4 py-2">🪪 บัตรประจำตัวสัตว์</button>
                    <button onclick="printApptLabel(animalId)" class="btn-base bg-orange-600 hover:bg-orange-500 shadow-lg text-sm px-4 py-2">📅 ใบนัดหมาย</button>
                </div>
            </div>
            <div id="history-list" class="space-y-4"></div>
        </div>

        <div id="form-view-container" class="view-hidden">
            <div class="section-card border-l-8 border-teal-400">
                <h3 class="text-2xl font-bold text-white mb-8" id="form-title">🏥 บันทึกการตรวจรักษา</h3>
                <div class="grid grid-cols-12 gap-5">
                    <div class="col-span-12 md:col-span-2"><label class="label-clinical text-yellow-400">น้ำหนัก (กก.)</label><input type="number" id="f_weight" class="input-box font-bold text-yellow-400 text-2xl" step="0.1" oninput="renderCatalog()"></div>
                    <div class="col-span-12 md:col-span-5"><label class="label-clinical">CC</label><textarea id="f_cc" class="input-box h-24" placeholder="ระบุอาการสำคัญ..."></textarea></div>
                    <div class="col-span-12 md:col-span-5"><label class="label-clinical">Hx</label><textarea id="f_hx" class="input-box h-24" placeholder="ประวัติย้อนหลัง..."></textarea></div>
                    <div class="col-span-12 md:col-span-4"><label class="label-clinical">PE</label><textarea id="f_pe" class="input-box h-32" placeholder="ร่างกาย..."></textarea></div>
                    <div class="col-span-12 md:col-span-4">
                        <label class="label-clinical">🔬 Lab/หัตถการ</label>
                        <div id="list_lab_display" class="list-box overflow-y-auto max-h-40" onclick="openCatalog('lab')">คลิกเพื่อเลือก...</div>
                    </div>
                    <div class="col-span-12 md:col-span-4"><label class="label-clinical text-yellow-400">Dx</label><textarea id="f_dx" class="input-box h-32" placeholder="วินิจฉัย..."></textarea></div>
                    <div class="col-span-12 md:col-span-6">
                        <label class="label-clinical">💉 Tx (ยาฉีด)</label>
                        <div id="list_tx_display" class="list-box overflow-y-auto max-h-40" onclick="openCatalog('tx')">คลิกเพื่อเลือก...</div>
                    </div>
                    <div class="col-span-12 md:col-span-6">
                        <div class="flex justify-between items-center mb-1"><label class="label-clinical">💊 Rx (ยากลับบ้าน)</label><button onclick="printAllRx()" class="bg-slate-700 hover:bg-slate-600 text-white text-xs px-3 py-1 rounded-lg font-bold">🖨️ พิมพ์ที่เลือก</button></div>
                        <div id="list_rx_display" class="list-box border-blue-500/50 overflow-y-auto max-h-40" onclick="openCatalog('rx')">คลิกเพื่อเลือก...</div>
                    </div>
                    
                    <div class="col-span-12 md:col-span-3"><label class="label-clinical text-orange-400">📅 วันนัด</label><input type="text" id="f_appointment" class="input-box datepicker"></div>
                    <div class="col-span-12 md:col-span-3"><label class="label-clinical text-orange-400">นัดหมายเพื่อ</label><input type="text" id="f_app_note" class="input-box"></div>
                    <div class="col-span-12 md:col-span-3"><label class="label-clinical text-orange-400">📅 วันนัด (2)</label><input type="text" id="f_appointment_2" class="input-box datepicker"></div>
                    <div class="col-span-12 md:col-span-3"><label class="label-clinical text-orange-400">นัดหมายเพื่อ (2)</label><input type="text" id="f_app_note_2" class="input-box"></div>
                    
                    <div class="col-span-12 md:col-span-9"><label class="label-clinical">Plan (แผนการรักษาต่อ)</label><input type="text" id="f_plan" class="input-box" placeholder="ระบุการนัดติดตามหรือแผนการจัดการระยะยาว..."></div>
                    <div class="col-span-12 md:col-span-3"><label class="label-text text-yellow-400">รวมค่ารักษา (฿)</label><input type="number" id="f_cost" class="input-box text-3xl font-black text-yellow-400" value="0" step="0.01"></div>
                </div>
                <div class="flex gap-4 mt-10">
                    <button onclick="saveMedicalRecord()" class="btn-base btn-teal flex-1 text-2xl py-5 shadow-2xl" id="btn-save-main">💾 บันทึกการรักษา</button>
                    <button onclick="showHistoryView()" class="btn-base btn-red px-10">ยกเลิก</button>
                </div>
            </div>
        </div>
    </div>

    <div id="catalog-modal" class="modal-overlay"><div class="modal-content"><div class="p-6 border-b border-white/10 flex justify-between bg-slate-900/50"><h3 id="modal-title" class="text-2xl font-bold">เลือกรายการ</h3><button onclick="closeCatalog()" class="text-3xl">✕</button></div><div class="p-4 bg-white/5"><input type="text" id="catalog-search" class="input-box" placeholder="ค้นหา..." oninput="filterCatalog()"></div><div id="catalog-items" class="flex-1 overflow-y-auto p-4 space-y-3 bg-black/20"></div><div class="p-5 bg-teal-500/10 border-t border-teal-500/20"><div id="modal-session-list" class="flex flex-wrap gap-3"></div></div><div class="p-6 border-t border-white/10 bg-slate-900/50"><button onclick="closeCatalog()" class="btn-base btn-blue w-full text-xl py-4">เสร็จสิ้น</button></div></div></div>
    
    <div id="rx-calc-modal" class="modal-overlay" style="z-index: 120;"><div class="modal-content !max-w-2xl"><div class="p-6 border-b border-white/10 bg-blue-900/30"><h4 id="rx-calc-name" class="text-2xl font-black text-blue-400">💊 กำหนดการให้ยา</h4></div><div class="p-6 grid grid-cols-1 md:grid-cols-2 gap-6 overflow-y-auto"><div class="space-y-4"><div><label class="label-clinical">โดสแนะนำ (mg/kg)</label><select id="rx-dose-select" class="input-box w-full" onchange="document.getElementById('rx-dose-val').value=this.value; calculateRxTablets();"></select></div><div class="grid grid-cols-2 gap-4"><div><label class="label-clinical">โดสจริง</label><input type="number" id="rx-dose-val" class="input-box" step="0.1" oninput="calculateRxTablets()"></div><div><label class="label-clinical">Conc.</label><input type="number" id="rx-conc-val" class="input-box bg-white/5" readonly></div></div><div class="p-4 bg-teal-500/10 rounded-2xl"><label class="label-clinical text-teal-400">ป้อนครั้งละ</label><div id="rx-tabs-display" class="text-3xl font-black text-white">0</div><input type="hidden" id="rx-tabs-val"></div></div><div class="space-y-4 border-l border-white/5 pl-6"><div class="grid grid-cols-2 gap-2"><div><label class="label-clinical">ความถี่/วัน</label><select id="rx-freq" class="input-box" onchange="calculateRxTotal(); updateTimeOfDay();"><option value="1">1 ครั้ง</option><option value="2" selected>2 ครั้ง</option><option value="3">3 ครั้ง</option><option value="4">4 ครั้ง</option><option value="0.5">วันเว้นวัน</option></select></div><div><label class="label-clinical">จำนวนวัน</label><input type="number" id="rx-days" class="input-box" value="7" oninput="calculateRxTotal()"></div></div><div class="grid grid-cols-2 gap-2"><div><label class="label-clinical">มื้ออาหาร</label><select id="rx-meal-timing" class="input-box"><option value="หลังอาหาร">หลังอาหาร</option><option value="หลังอาหารทันที">หลังอาหารทันที</option><option value="ก่อนอาหาร">ก่อนอาหาร</option><option value="พร้อมอาหาร">พร้อมอาหาร</option></select></div><div><label class="label-clinical">ช่วงเวลา</label><select id="rx-day-timing" class="input-box"><option value="เช้า">เช้า</option><option value="เย็น">เย็น</option><option value="เช้า-เย็น" selected>เช้า-เย็น</option><option value="เช้า-กลางวัน-เย็น">เช้า-กลางวัน-เย็น</option><option value="ก่อนนอน">ก่อนนอน</option></select></div></div><div class="p-4 bg-yellow-500/10 rounded-2xl border border-yellow-500/20"><div id="rx-info-text" class="text-slate-300 font-bold mb-1">฿0 /เม็ด | รวม 0 เม็ด</div><div id="rx-total-price-display" class="text-2xl font-black text-white">฿ 0.00</div><input type="hidden" id="rx-final-price-val"></div></div></div><div class="p-6 border-t border-white/10 flex gap-4"><button onclick="printCurrentRx()" class="btn-base bg-slate-700 px-6">🖨️ พิมพ์</button><button onclick="confirmRxCalc()" class="btn-base btn-teal flex-1">✅ เพิ่มรายการ</button></div></div></div>

    <div id="inj-modal" class="modal-overlay" style="z-index: 110;">
        <div class="modal-content !max-w-sm">
            <div class="p-6 border-b border-white/10 bg-teal-900/30"><h4 id="inj-name" class="font-bold text-teal-400">-</h4></div>
            <div class="p-6 space-y-5">
                <div><label class="label-clinical">โดสแนะนำ (mg/kg)</label><select id="inj-dose-select" class="input-box" onchange="calculateInjMl()"></select></div>
                <div><label class="label-clinical">ปริมาณ (ml)</label><input type="number" id="inj-ml" class="input-box text-2xl font-black text-yellow-400" step="0.01" value="0.1"></div>
                <div><label class="label-clinical">Route</label><div class="flex flex-wrap gap-3"><label class="route-opt flex items-center gap-1"><input type="checkbox" name="route" value="SC"> SC</label><label class="route-opt flex items-center gap-1"><input type="checkbox" name="route" value="IM"> IM</label><label class="route-opt flex items-center gap-1"><input type="checkbox" name="route" value="IV"> IV</label></div></div>
                <div class="p-4 bg-yellow-500/10 rounded-xl border border-yellow-500/20 text-center"><label class="label-clinical text-yellow-400">ราคาคำนวณตามน้ำหนัก</label><div id="inj-pop-price" class="text-3xl font-black text-white">฿ 0.00</div><input type="hidden" id="inj-final-price"></div>
            </div>
            <div class="p-6 border-t border-white/10 flex gap-3"><button onclick="confirmInj()" class="btn-base btn-teal flex-1">ยืนยัน</button></div>
        </div>
    </div>

    <div id="lab-view-modal" class="modal-overlay" style="z-index: 150;">
        <div class="modal-content !max-w-4xl">
            <div class="p-6 border-b border-white/10 flex justify-between bg-slate-900/50"><h3 class="text-2xl font-bold flex items-center gap-2">🔬 ผลตรวจ Lab</h3><button onclick="document.getElementById('lab-view-modal').style.display='none'" class="text-3xl">✕</button></div>
            <div class="p-6 flex-1 overflow-y-auto custom-scroll space-y-6"><div class="lab-table-container"><table class="lab-table"><thead><tr id="lab-view-head"></tr></thead><tbody id="lab-view-body"></tbody></table></div></div>
            <div class="p-4 border-t border-white/10 text-right"><button onclick="document.getElementById('lab-view-modal').style.display='none'" class="btn-base btn-blue px-8">ปิดหน้าต่าง</button></div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const animalId = urlParams.get('id'), ownerHN = urlParams.get('hn');
        let records = [], fullCatalog = [], displayedItems = [], pendingItem = null, currentCatalogType = null;
        let selectedItems = [], petType = 'สุนัข', editingId = null;

        function formatThaiDate(dateString, format = 'long') {
            if (!dateString) return "-";
            const date = new Date(dateString);
            const monthsShort = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];
            const monthsLong = ["มีนาคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
            const d = date.getDate(), m = format === 'short' ? monthsShort[date.getMonth()] : monthsLong[date.getMonth()], y = date.getFullYear() + 543;
            return `${d} ${m} ${y}`;
        }

        window.onload = async () => {
            if (!animalId || !ownerHN) return location.href='animals.html';
            flatpickr(".datepicker", { locale: "th", dateFormat: "Y-m-d", altInput: true, altFormat: "j F Y" });
            await fetchInfo(); await fetchRecords();
        };

        async function fetchInfo() {
            const { data: owner } = await db.from('owners').select('*').eq('hn', ownerHN).single();
            const { data: pet } = await db.from('animals').select('*').eq('id', animalId).single();
            const { data: phones } = await db.from('owner_phones').select('phone_number').eq('owner_hn', ownerHN);
            if (owner && pet) {
                petType = pet.pet_type;
                document.getElementById('info-owner-name').innerText = owner.owner_name;
                document.getElementById('info-owner-phone').innerText = phones?.[0]?.phone_number || '-';
                document.getElementById('info-owner-address').innerText = owner.address || '-';
                document.getElementById('head-hn').innerText = `HN: ${owner.hn}`;
                document.getElementById('head-pet-name').innerText = pet.pet_name;
                document.getElementById('v-pet-name').innerText = pet.pet_name;
                document.getElementById('v-pet-weight').innerText = pet.weight || '0';
                document.getElementById('f_weight').value = pet.weight || 0;
                document.getElementById('v-pet-congenital').innerText = pet.congenital_disease || 'ไม่มี';
            }
        }

        async function fetchRecords() {
            const { data } = await db.from('medical_records').select('*, medical_record_items(*)').eq('animal_id', animalId).order('created_at', { ascending: false });
            records = data || []; renderRecordsList();
        }

        function renderRecordsList() {
            const list = document.getElementById('history-list');
            document.getElementById('record-count').innerText = records.length;
            if (records.length === 0) { list.innerHTML = `<p class="text-gray-500 py-10 text-center">ยังไม่มีประวัติการรักษา</p>`; return; }
            list.innerHTML = records.map(rec => {
                const labItems = rec.medical_record_items.filter(i => i.item_type === 'Lab');
                const txs = rec.medical_record_items.filter(i => i.item_type === 'Tx').map(i => i.item_name).join(', ') || '-';
                const rxItems = rec.medical_record_items.filter(i => i.item_type === 'Rx');

        async function viewLabResults(id) {
            const modal = document.getElementById('lab-view-modal'); modal.style.display = 'flex';
            const head = document.getElementById('lab-view-head'), body = document.getElementById('lab-view-body');
            head.innerHTML = '<th>กำลังโหลด...</th>'; body.innerHTML = '';
            try {
                const { data: masterParams } = await db.from('mas_lab_parameters').select('*').order('parameter_name');
                const { data: labData } = await db.from('lab_results').select('*').eq('animal_id', id).order('created_at', { ascending: false });
                if (!labData || labData.length === 0) { head.innerHTML = '<th class="p-10 text-center">ไม่พบข้อมูล</th>'; return; }
                const sessions = {}; labData.forEach(row => { if (!sessions[row.created_at]) sessions[row.created_at] = {}; sessions[row.created_at][row.parameter_name] = row; });
                const sortedTimestamps = Object.keys(sessions).sort((a, b) => new Date(b) - new Date(a));
                head.innerHTML = `<th class="lab-param-name text-center">Parameter</th>` + sortedTimestamps.map(ts => { const d = new Date(ts); return `<th>${d.toLocaleDateString('th-TH')}<br><span class="text-[9px] text-teal-400">${d.toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit'})}</span></th>`; }).join('');
                body.innerHTML = masterParams.map(p => {
                    const isDog = petType === 'สุนัข', min = isDog ? p.dog_min : p.cat_min, max = isDog ? p.dog_max : p.cat_max;
                    let rowHtml = `<td class="lab-param-name text-xs">${p.parameter_name} <span class="text-[9px] text-gray-500">(${min}-${max})</span></td>`;
                    sortedTimestamps.forEach(ts => { const res = sessions[ts][p.parameter_name]; if (!res) rowHtml += `<td class="opacity-10">-</td>`; else { const val = res.test_value; const status = (val > max) ? 'val-high' : (val < min) ? 'val-low' : 'val-normal'; rowHtml += `<td class="${status} font-bold">${val}</td>`; } });
                    return `<tr>${rowHtml}</tr>`;
                }).join('');
            } catch (e) { head.innerHTML = '<th>เกิดข้อผิดพลาด</th>'; }
        }

        async function executeDynamicPrint(dataList, templateType) {
            const { data: t } = await db.from('print_templates').select('config').eq('template_type', templateType).single();
            const config = t.config, px = 3.78, pw = window.open('', '_blank');
            let html = `<html><head><style>body{margin:0;padding:0;}.sticker{position:relative;width:${config.width}mm;height:${config.height}mm;overflow:hidden;page-break-after:always;}.elem{position:absolute;color:black;line-height:1.2;}@page{size:${config.width}mm ${config.height}mm;margin:0;}</style></head><body>`;
            dataList.forEach(data => {
                html += `<div class="sticker">`;
                config.lines.forEach(l => {
                    let txt = l.text.replace(/\{\{(.*?)\}\}/g, (m, k) => data[k.trim()] || "");
                    let style = `top:${l.y*px}px; font-family:'Sarabun'; font-size:${l.size*1.33}px; font-weight:${l.bold?'bold':'normal'};`;
                    if (l.align === 'center') style += `left:0; width:100%; text-align:center;`;
                    else if (l.align === 'right') style += `right:${l.x*px}px; text-align:right;`;
                    else style += `left:${l.x*px}px;`;
                    html += `<div class="elem" style="${style}">${txt}</div>`;
                });
                html += `</div>`;
            });
            html += `</body><script>window.onload=()=>{setTimeout(()=>{window.print();window.close();},500);};<\/script></html>`;
            pw.document.write(html); pw.document.close();
        }

        function executeMultiTemplatePrint(jobs) {
            const px = 3.78, pw = window.open('', '_blank', 'width=400');
            const pageWidth = jobs[0].config.width || 80, pageHeight = jobs[0].config.height || 50;
            let html = `<html><head><style>body{margin:0;padding:0;}.sticker{position:relative;width:${pageWidth}mm;height:${pageHeight}mm;overflow:hidden;page-break-after:always;}.elem{position:absolute;color:black;line-height:1.2;}@page{size:${pageWidth}mm ${pageHeight}mm;margin:0;}</style></head><body>`;
            jobs.forEach(job => {
                html += `<div class="sticker">`;
                job.config.lines.forEach(l => {
                    let style = `top:${l.y*px}px; left:${l.x*px}px; font-family:'Sarabun'; font-size:${l.size*1.33}px; font-weight:${l.bold?'bold':'normal'}; position:absolute;`;
                    if (l.align === 'center') style = `top:${l.y*px}px; left:0; width:${pageWidth*px}px; text-align:center; position:absolute; font-size:${l.size*1.33}px;`;
                    let content = (l.text || "").replace(/\{\{(.*?)\}\}/g, (m, k) => job.data[k.trim()] || m);
                    html += `<div class="elem" style="${style}">${content}</div>`;
                });
                html += `</div>`;
            });
            html += `</body><script>window.onload=()=>{setTimeout(()=>{window.print();window.close();},500);};<\/script></html>`;
            pw.document.write(html); pw.document.close();
        }
    </script>
</body>
</html>
