<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เวชระเบียนสัตว์ | PK-VMS Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/th.js"></script>

    <style>
        :root { --navy: #0b1929; --navy-light: #112240; --teal: #14b8b1; --border: rgba(255, 255, 255, 0.1); }
        * { font-family: "Sarabun", sans-serif !important; }
        body { background: var(--navy); color: #e2e8f0; margin: 0; overflow: hidden; }

        /* Sidebar Style */
        .sidebar-container { position: relative; width: 480px; background: #0f172a; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .pet-card { 
            padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer;
            display: grid; grid-template-columns: 85px 1fr 100px; gap: 12px; align-items: stretch; transition: 0.2s;
        }
        .pet-card:hover { background: rgba(255,255,255,0.07); }
        .pet-card.active { background: rgba(20, 184, 177, 0.12); border-left: 4px solid var(--teal); }
        
        .pet-main-name { color: #fff; font-weight: 800; font-size: 1.1rem; line-height: 1.2; }
        .hn-col { background: rgba(30, 41, 59, 1); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 900; color: #60a5fa; font-size: 1.1rem; border: 1px solid rgba(255,255,255,0.1); }
        .owner-subtext { color: #94a3b8; font-size: 0.85rem; }
        .phone-badge { color: var(--teal); font-weight: 700; font-size: 0.85rem; }

        .btn-base {
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 800;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
            color: white !important;
        }
        .btn-base:active { transform: scale(0.95); }

        .btn-teal { background-color: #0d9488 !important; } 
        .btn-teal:hover { background-color: #0f766e !important; }

        .btn-blue { background-color: #2563eb !important; } 
        .btn-blue:hover { background-color: #1d4ed8 !important; }

        .btn-red { background-color: #dc2626 !important; } 
        .btn-red:hover { background-color: #b91c1c !important; }
        
        .btn-gray { background-color: #475569 !important; } 
        .btn-gray:hover { background-color: #334155 !important; }

        /* Form Controls */
        .input-box { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; padding: 12px; color: white; width: 100%; outline: none; transition: 0.2s; }
        .input-box:focus { border-color: var(--teal); background: rgba(0,0,0,0.5); }
        .zone-pet { background: rgba(30, 41, 59, 0.4); border-radius: 25px; padding: 25px; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.05); }
        .label-text { color: #94a3b8; font-size: 0.85rem; margin-bottom: 6px; display: block; font-weight: 700; }
        
        .critical-box { background: #7f1d1d !important; color: #ffffff !important; font-weight: 800; border: 2px solid #ef4444 !important; }

        /* History Details Styles */
        .history-record-box { background: rgba(0,0,0,0.2); border-radius: 15px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 15px; }
        .data-label { font-size: 0.75rem; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 4px; }
        .data-value { font-size: 1rem; color: #cbd5e1; }
    </style>
</head>
<body>
    <div class="flex h-screen overflow-hidden">
        <aside class="sidebar-container">
            <div class="p-6 flex-shrink-0 border-b border-white/5">
                <div class="flex justify-between items-center mb-5">
                    <h2 class="text-2xl font-black text-white">เวชระเบียนสัตว์</h2>
                    <a href="index.html" class="text-3xl opacity-60 hover:opacity-100 transition-all">🏠</a>
                </div>
                <input type="text" id="search-box" class="input-box" placeholder="ค้นหาชื่อสัตว์, HN, เจ้าของ..." oninput="renderSidebar()">
            </div>
            <div id="owner-list" class="flex-1 overflow-y-auto px-2 pb-10 custom-scroll"></div>
            <div class="p-5">
                <button onclick="createNewForm()" class="w-full btn-base btn-teal py-4 text-xl shadow-lg">
                    + ลงทะเบียนสัตว์ใหม่
                </button>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-12 bg-[#020617] custom-scroll" id="form-view">
            <div class="h-full flex flex-col items-center justify-center opacity-10">
                <div class="text-9xl mb-4">📋</div>
                <h3 class="text-3xl font-bold">เลือกรายการสัตว์จากแถบด้านซ้าย</h3>
            </div>
        </main>
    </div>

    <script>
        let allAnimals = []; 
        let allOwners = []; 
        let allPhones = [];
        
        let masterSpecies = [];
        let masterBreeds = [];

        // ตัวแปรเก็บข้อมูลสำหรับใช้พิมพ์นัดหมาย
        let currentPetIdForPrint = null;
        let allMedicalRecordsForPet = [];

        // ฟังก์ชันช่วยจัดรูปแบบวันที่
        function formatThaiDate(dateString, format = 'long') {
            if (!dateString) return "-";
            const date = new Date(dateString);
            const monthsShort = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];
            const monthsLong = ["มีนาคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
            const d = date.getDate();
            const m = format === 'short' ? monthsShort[date.getMonth()] : monthsLong[date.getMonth()];
            const y = date.getFullYear() + 543;
            return `${d} ${m} ${y}`;
        }

        async function loadData() {
            const [resO, resA, resP, resSpecies, resBreeds] = await Promise.all([
                db.from('owners').select('*'),
                db.from('animals').select('*'),
                db.from('owner_phones').select('*'),
                db.from('mas_species').select('*').order('name'),
                db.from('mas_breeds').select('*').order('name')
            ]);
            
            allOwners = resO.data || [];
            allAnimals = resA.data || [];
            allPhones = resP.data || [];
            masterSpecies = resSpecies.data || [];
            masterBreeds = resBreeds.data || [];
            
            renderSidebar();
        }

        function renderSidebar() {
            const term = document.getElementById('search-box').value.toLowerCase();
            const container = document.getElementById('owner-list');
            const sorted = [...allAnimals].sort((a, b) => parseInt(a.owner_hn) - parseInt(b.owner_hn));
            const filtered = sorted.filter(pet => {
                const owner = allOwners.find(o => o.hn === pet.owner_hn);
                return pet.pet_name.toLowerCase().includes(term) || pet.owner_hn.includes(term) || owner?.owner_name.toLowerCase().includes(term);
            });

            container.innerHTML = filtered.map(pet => {
                const owner = allOwners.find(o => o.hn === pet.owner_hn);
                const p1 = allPhones.find(p => p.owner_hn === pet.owner_hn && p.label === 'เบอร์หลัก')?.phone_number || '-';
                const typeIcon = pet.pet_type === 'สุนัข' ? '🐶' : (pet.pet_type === 'แมว' ? '🐱' : '🐾');
                
                let genderIcon = '';
                if(pet.gender === 'ผู้') genderIcon = '♂️';
                else if(pet.gender === 'เมีย') genderIcon = '♀️';
                else if(pet.gender === 'ผู้ตอน') genderIcon = '✂️♂️';
                else if(pet.gender === 'เมียหมัน') genderIcon = '✂️♀️';

                return `
                    <div class="pet-card" onclick="editOwner('${pet.owner_hn}')" id="pet-${pet.id}">
                        <div class="hn-col">#${pet.owner_hn}</div>
                        <div class="flex flex-col justify-center min-w-0 px-2">
                            <span class="pet-main-name truncate">${pet.pet_name}</span>
                            <span class="owner-subtext truncate">👤 ${owner?.owner_name || '-'}</span>
                            <span class="phone-badge">📞 ${p1}</span>
                        </div>
                        <div class="flex items-center justify-end gap-1 text-2xl pr-2">
                            <span>${typeIcon}</span>
                            <span class="text-lg opacity-80">${genderIcon}</span>
                        </div>
                    </div>`;
            }).join('');
        }

        async function editOwner(hn) {
            document.querySelectorAll('.pet-card').forEach(el => el.classList.remove('active'));
            const owner = allOwners.find(o => o.hn === hn);
            if (!owner) return createNewForm();
            
            const pets = allAnimals.filter(a => a.owner_hn === hn);
            const phones = allPhones.filter(p => p.owner_hn === hn);
            
            // ดึงประวัติการรักษาของสัตว์ตัวแรกที่เจอเพื่อเตรียมไว้แสดง
            if (pets.length > 0) {
                currentPetIdForPrint = pets[0].id;
                const { data: recs } = await db.from('medical_records').select('*, medical_record_items(*)').eq('animal_id', currentPetIdForPrint).order('created_at', { ascending: false });
                allMedicalRecordsForPet = recs || [];
            }

            renderForm(owner, pets, phones);
        }

        function createNewForm() { 
            currentPetIdForPrint = null;
            allMedicalRecordsForPet = [];
            renderForm({ hn: 'AUTO', owner_name: '', address: '' }, [], []); 
        }

        function renderForm(owner, pets, phones = []) {
            const formView = document.getElementById('form-view');
            formView.innerHTML = `
                <div class="max-w-5xl mx-auto pb-32">
                    <div class="bg-slate-800/40 p-10 rounded-[40px] border border-white/5 mb-8 shadow-2xl">
                        <div class="flex justify-between items-center mb-8">
                            <h3 class="text-3xl font-black text-blue-400 flex items-center gap-3">👤 ข้อมูลเจ้าของสัตว์</h3>
                            <div class="flex gap-3">
                                <button onclick="readSmartCard()" class="btn-base btn-blue">🪪 อ่านบัตรประชาชน</button>
                                ${owner.hn !== 'AUTO' ? `<button onclick="deleteOwner('${owner.hn}', '${owner.owner_name}')" class="btn-base btn-red">🗑️ ลบเจ้าของ</button>` : ''}
                            </div>
                        </div>
                        <div class="grid grid-cols-12 gap-6">
                            <div class="col-span-2"><label class="label-text">HN</label><input type="text" id="f_hn" class="input-box font-black text-blue-400 text-center text-xl" value="${owner.hn}" readonly></div>
                            <div class="col-span-4"><label class="label-text">ชื่อ-นามสกุล เจ้าของ</label><input type="text" id="f_owner_name" class="input-box" value="${owner.owner_name || ''}"></div>
                            <div class="col-span-3"><label class="label-text">เบอร์โทรศัพท์หลัก</label><input type="tel" id="f_phone1" class="input-box text-teal-400 font-bold" value="${phones.find(p=>p.label==='เบอร์หลัก')?.phone_number || ''}"></div>
                            <div class="col-span-3"><label class="label-text">เบอร์โทรศัพท์สำรอง</label><input type="tel" id="f_phone2" class="input-box" value="${phones.find(p=>p.label==='เบอร์สำรอง')?.phone_number || ''}"></div>
                            <div class="col-span-12"><label class="label-text">ที่อยู่ปัจจุบัน</label><input type="text" id="f_address" class="input-box" value="${owner.address || ''}"></div>
                        </div>
                    </div>

                    <div id="pets-container" class="space-y-8">
                        ${pets.length ? pets.map(p => petRowHtml(p)).join('') : petRowHtml({})}
                        <button onclick="addNewPetRow()" class="w-full border-4 border-dashed border-white/5 py-6 rounded-3xl text-slate-500 hover:text-teal-400 transition-all font-black text-xl">+ เพิ่มสัตว์เลี้ยงรายการใหม่</button>
                    </div>

                    ${pets.length > 0 ? renderHistorySection() : ''}

                    <button onclick="saveAllData()" class="w-full btn-base btn-teal py-6 text-3xl mt-10 shadow-2xl">💾 บันทึกข้อมูลทั้งหมด</button>
                </div>`;
            initAllPickers();
            document.querySelectorAll('.zone-pet').forEach(el => updateBreedOptions(el.querySelector('.p_type')));
        }

        function petRowHtml(pet) {
            const ageInfo = getAgeDetail(pet.birth_date);
            const headIcon = pet.pet_type === 'สุนัข' ? '🐶' : (pet.pet_type === 'แมว' ? '🐱' : '🐾');
            
            const speciesOptions = masterSpecies.map(s => 
                `<option value="${s.name}" data-id="${s.id}" ${pet.pet_type === s.name ? 'selected' : ''}>${s.name}</option>`
            ).join('');

            return `
                <div class="zone-pet border-l-[12px] border-teal-500 shadow-2xl" data-pet-id="${pet.id || ''}">
                    <div class="flex justify-between items-center mb-8">
                        <h4 class="text-3xl font-black text-white">${headIcon} ${pet.pet_name || 'ข้อมูลสัตว์ใหม่'}</h4>
                        <div class="flex gap-3">
                            ${pet.id ? `<button onclick="gotoMedicalRecord('${pet.id}', '${pet.pet_name}', '${pet.owner_hn}')" class="btn-base btn-teal">🏥 ประวัติการรักษา</button>` : ''}
                            <button onclick="${pet.id ? `deletePetRecord('${pet.id}', '${pet.pet_name}')` : `this.closest('.zone-pet').remove()`}" class="btn-base btn-red">🗑️ ลบ</button>
                        </div>
                    </div>
                    <div class="grid grid-cols-12 gap-5">
                        <div class="col-span-3"><label class="label-text">ชื่อสัตว์</label><input type="text" class="p_name input-box font-black text-xl" value="${pet.pet_name || ''}"></div>
                        <div class="col-span-2"><label class="label-text">ชนิด</label>
                            <select class="p_type input-box" onchange="updateBreedOptions(this)">
                                <option value="">-- เลือกชนิด --</option>
                                ${speciesOptions}
                            </select>
                        </div>
                        <div class="col-span-3"><label class="label-text">สายพันธุ์</label><select class="p_breed input-box" data-val="${pet.breed || ''}"></select></div>
                        <div class="col-span-2"><label class="label-text">เพศ</label>
                            <select class="p_gender input-box">
                                <option value="เมีย" ${pet.gender==='เมีย'?'selected':''}>♀️ เมีย</option>
                                <option value="ผู้" ${pet.gender==='ผู้'?'selected':''}>♂️ ผู้</option>
                                <option value="ผู้ตอน" ${pet.gender==='ผู้ตอน'?'selected':''}>✂️♂️ ผู้ตอน</option>
                                <option value="เมียหมัน" ${pet.gender==='เมียหมัน'?'selected':''}>✂️♀️ เมียหมัน</option>
                            </select>
                        </div>
                        <div class="col-span-2"><label class="label-text">น้ำหนัก (กก.)</label><input type="number" step="0.1" class="p_weight input-box text-center text-yellow-400 font-black text-xl" value="${pet.weight || ''}"></div>
                        <div class="col-span-4"><label class="label-text">วดป. เกิด</label><input type="text" class="p_dob input-box datepicker-thai" value="${pet.birth_date || ''}" placeholder="เลือกวันที่..."></div>
                        <div class="col-span-2"><label class="label-text">อายุ (ปี)</label><input type="number" class="p_age_years input-box text-center font-bold" value="${ageInfo.y}" oninput="syncFromAge(this)"></div>
                        <div class="col-span-2"><label class="label-text">อายุ (เดือน)</label><input type="number" class="p_age_months input-box text-center font-bold" value="${ageInfo.m}" oninput="syncFromAge(this)"></div>
                        <div class="col-span-4"><label class="label-text">เลขไมโครชิพ</label><input type="text" class="p_microchip input-box" value="${pet.microchip_number || ''}"></div>
                        <div class="col-span-12"><label class="label-text text-red-400 font-bold">🚨 ข้อควรระวัง / ประวัติแพ้ยา</label><textarea class="p_congenital input-box critical-box h-[80px]">${pet.congenital_disease || ''}</textarea></div>
                    </div>
                </div>`;
        }

        function renderHistorySection() {
            let historyHtml = '';
            if (allMedicalRecordsForPet.length === 0) {
                historyHtml = `<p class="text-gray-500 py-10 text-center">ยังไม่มีประวัติการรักษา</p>`;
            } else {
                historyHtml = allMedicalRecordsForPet.map(rec => {
                    const dateStr = formatThaiDate(rec.created_at, 'long');
                    const weightStr = rec.weight ? `${rec.weight} กก.` : '-';
                    
                    const labs = rec.medical_record_items.filter(i => i.item_type === 'Lab').map(i => i.item_name).join(', ') || '-';
                    const txs = rec.medical_record_items.filter(i => i.item_type === 'Tx').map(i => i.item_name).join(', ') || '-';
                    const rxs = rec.medical_record_items.filter(i => i.item_type === 'Rx').map(i => `${i.item_name} x ${Math.floor(i.quantity)}`).join(', ') || '-';
                    
                    let apptStr = '-';
                    if(rec.appointment) {
                        apptStr = formatThaiDate(rec.appointment, 'short');
                        if(rec.appointment_note) apptStr += ` (${rec.appointment_note})`;
                    }

                    return `
                        <div class="history-record-box shadow-xl">
                            <div class="flex justify-between items-start mb-4 border-b border-white/10 pb-4">
                                <div>
                                    <span class="text-teal-400 font-black text-xl">${dateStr}</span>
                                    <span class="text-slate-400 text-sm ml-3">น้ำหนัก: ${weightStr}</span>
                                </div>
                                <div class="text-right">
                                    <span class="data-label">ค่ารักษา</span>
                                    <span class="text-yellow-400 font-black text-xl">฿${(rec.total_cost || 0).toLocaleString(undefined, {minimumFractionDigits:2})}</span>
                                </div>
                            </div>
                            
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-y-4 gap-x-8 mb-4 border-b border-white/10 pb-4">
                                <div><span class="data-label">CC (อาการสำคัญ)</span><div class="data-value">${rec.cc || '-'}</div></div>
                                <div><span class="data-label">Dx (วินิจฉัย)</span><div class="data-value text-blue-300 font-bold">${rec.dx || '-'}</div></div>
                                <div><span class="data-label">Hx (ประวัติ)</span><div class="data-value">${rec.hx || '-'}</div></div>
                                <div><span class="data-label">PE (ตรวจร่างกาย)</span><div class="data-value">${rec.pe || '-'}</div></div>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4 border-b border-white/10 pb-4">
                                <div><span class="data-label text-purple-400">🔬 Lab / หัตถการ</span><div class="data-value">${labs}</div></div>
                                <div><span class="data-label text-pink-400">💉 Tx (ยาฉีด)</span><div class="data-value">${txs}</div></div>
                                <div><span class="data-label text-emerald-400">💊 Rx (ยากลับบ้าน)</span><div class="data-value">${rxs}</div></div>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div><span class="data-label text-orange-300">📌 Plan (แผนการรักษา)</span><div class="data-value">${rec.plan || '-'}</div></div>
                                <div><span class="data-label text-orange-400">📅 การนัดหมาย</span><div class="data-value font-bold">${apptStr}</div></div>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            return `
                <div class="mt-12 bg-slate-900/60 p-8 rounded-3xl border border-white/10">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-2xl font-black text-white flex items-center gap-3">
                            ⏳ ประวัติการรักษา <span class="bg-white/10 text-base px-4 py-1 rounded-full">${allMedicalRecordsForPet.length}</span>
                        </h3>
                        ${currentPetIdForPrint ? `
                        <div class="flex gap-3">
                            <button onclick="printPetLabel('${currentPetIdForPrint}')" class="btn-base bg-indigo-600 hover:bg-indigo-500 shadow-lg text-sm px-4">
                                🪪 พิมพ์ข้อมูลประจำตัวสัตว์
                            </button>
                            <button onclick="printApptLabel('${currentPetIdForPrint}')" class="btn-base bg-orange-600 hover:bg-orange-500 shadow-lg text-sm px-4">
                                📅 พิมพ์ใบนัดหมาย
                            </button>
                        </div>
                        ` : ''}
                    </div>
                    <div class="space-y-4">
                        ${historyHtml}
                    </div>
                </div>
            `;
        }

        function initAllPickers() {
            flatpickr(".datepicker-thai", {
                locale: "th", dateFormat: "Y-m-d", altInput: true, altFormat: "j F Y",
                onReady: (selectedDates, dateStr, instance) => {
                    const altInp = instance.altInput;
                    if (dateStr) {
                        const yearBE = new Date(dateStr).getFullYear() + 543;
                        altInp.value = altInp.value.replace(new Date(dateStr).getFullYear(), yearBE);
                    }
                },
                onChange: (selectedDates, dateStr, instance) => {
                    const row = instance.element.closest('.zone-pet');
                    const age = getAgeDetail(dateStr);
                    row.querySelector('.p_age_years').value = age.y;
                    row.querySelector('.p_age_months').value = age.m;
                    const yearBE = new Date(dateStr).getFullYear() + 543;
                    instance.altInput.value = instance.altInput.value.replace(new Date(dateStr).getFullYear(), yearBE);
                }
            });
        }

        function syncFromAge(el) {
            const row = el.closest('.zone-pet');
            const years = parseInt(row.querySelector('.p_age_years').value) || 0;
            const months = parseInt(row.querySelector('.p_age_months').value) || 0;
            const d = new Date(); d.setFullYear(d.getFullYear() - years); d.setMonth(d.getMonth() - months);
            const dateStr = d.toISOString().split('T')[0];
            const picker = row.querySelector('.datepicker-thai')._flatpickr;
            picker.setDate(dateStr, true);
        }

        function getAgeDetail(dob) {
            if (!dob) return { y: 0, m: 0 };
            const birth = new Date(dob); const now = new Date();
            let years = now.getFullYear() - birth.getFullYear();
            let months = now.getMonth() - birth.getMonth();
            if (months < 0) { years--; months += 12; }
            return { y: years, m: months };
        }

        function updateBreedOptions(typeSelectEl) {
            if (!typeSelectEl) return;
            const row = typeSelectEl.closest('.zone-pet');
            const breedSelect = row.querySelector('.p_breed');
            const savedVal = breedSelect.getAttribute('data-val');
            const selectedOption = typeSelectEl.options[typeSelectEl.selectedIndex];
            const speciesId = selectedOption ? selectedOption.getAttribute('data-id') : null;

            let filteredBreeds = [];
            if (speciesId) filteredBreeds = masterBreeds.filter(b => b.species_id === speciesId);

            breedSelect.innerHTML = '<option value="">-- เลือกสายพันธุ์ --</option>' + 
                filteredBreeds.map(b => `<option value="${b.name}" ${b.name === savedVal ? 'selected' : ''}>${b.name}</option>`).join('');
        }

        function addNewPetRow() {
            const div = document.createElement('div');
            div.innerHTML = petRowHtml({});
            document.getElementById('pets-container').insertBefore(div.firstElementChild, document.querySelector('button[onclick="addNewPetRow()"]'));
            initAllPickers();
            updateBreedOptions(div.querySelector('.p_type'));
        }

        async function readSmartCard() {
            try {
                const res = await fetch('http://127.0.0.1:8080/read');
                const result = await res.json();
                if (result.status === "success") {
                    const p = result.data;
                    document.getElementById("f_owner_name").value = p.prefix + p.firstname + " " + p.lastname;
                    document.getElementById("f_address").value = p.address;
                }
            } catch (e) { alert("❌ โปรดเปิดโปรแกรม Agent บัตรประชาชน"); }
        }

        async function saveAllData() {
            const name = document.getElementById('f_owner_name').value.trim();
            const p1 = document.getElementById('f_phone1').value.trim();
            if (!name || !p1) return alert("❌ กรุณากรอกชื่อและเบอร์โทร");
            let hn = document.getElementById('f_hn').value;
            if (hn === "AUTO") {
                const hns = allOwners.map(o => parseInt(o.hn)).filter(n => !isNaN(n));
                hn = (Math.max(...hns, 690000) + 1).toString().padStart(6, '0');
            }
            try {
                await db.from('owners').upsert({ hn, owner_name: name, address: document.getElementById('f_address').value, updated_at: new Date() });
                await db.from('owner_phones').delete().eq('owner_hn', hn);
                const pList = [{ owner_hn: hn, phone_number: p1, label: 'เบอร์หลัก' }];
                const p2 = document.getElementById('f_phone2').value.trim();
                if(p2) pList.push({ owner_hn: hn, phone_number: p2, label: 'เบอร์สำรอง' });
                await db.from('owner_phones').insert(pList);
                
                const petNodes = document.querySelectorAll('.zone-pet');
                for (const node of petNodes) {
                    const petName = node.querySelector('.p_name').value;
                    if (!petName) continue;
                    await db.from('animals').upsert({
                        id: node.getAttribute('data-pet-id') || undefined,
                        owner_hn: hn, pet_name: petName, 
                        pet_type: node.querySelector('.p_type').value || 'อื่นๆ',
                        breed: node.querySelector('.p_breed').value, 
                        gender: node.querySelector('.p_gender').value,
                        weight: parseFloat(node.querySelector('.p_weight').value) || 0,
                        birth_date: node.querySelector('.datepicker-thai').value || null,
                        microchip_number: node.querySelector('.p_microchip').value,
                        congenital_disease: node.querySelector('.p_congenital').value, 
                        updated_at: new Date()
                    });
                }
                alert("✅ บันทึกสำเร็จ");
                await loadData();
                editOwner(hn);
            } catch (err) { alert(err.message); }
        }

        async function deleteOwner(hn, name) {
            if (!confirm(`⚠️ ยืนยันการลบเจ้าของ: ${name}?\nข้อมูลสัตว์ทั้งหมดจะหายไป`)) return;
            await db.from('owner_phones').delete().eq('owner_hn', hn);
            await db.from('animals').delete().eq('owner_hn', hn);
            await db.from('owners').delete().eq('hn', hn);
            await loadData();
            document.getElementById('form-view').innerHTML = `<div class="h-full flex flex-col items-center justify-center opacity-10"><h3>เลือกรายการสัตว์</h3></div>`;
        }

        async function deletePetRecord(petId, petName) {
            if (!confirm(`ลบสัตว์ "${petName}"?`)) return;
            await db.from('animals').delete().eq('id', petId);
            await loadData();
            editOwner(document.getElementById('f_hn').value);
        }

        function gotoMedicalRecord(petId, petName, hn) { window.location.href = `medrec.html?id=${petId}&name=${encodeURIComponent(petName)}&hn=${hn}`; }

        // --- Print Functions ---
        async function printPetLabel(petId) {
            try {
                const pet = allAnimals.find(a => a.id === petId);
                const owner = allOwners.find(o => o.hn === pet.owner_hn);
                const phoneInfo = allPhones.find(p => p.owner_hn === pet.owner_hn && p.label === 'เบอร์หลัก');
                const ownerPhone = phoneInfo ? phoneInfo.phone_number : '-';

                if (!pet || !owner) return alert("ไม่พบข้อมูลสัตว์หรือเจ้าของ");

                const { data: template } = await db.from('print_templates').select('config').eq('template_type', 'sticker_pet_id').single();
                if (!template) return alert("ไม่พบ Template: sticker_pet_id");

                const config = template.config;
                const pw = config.width || 80, ph = config.height || 50;

                const printData = {
                    clinic_name: "PK-VMS Animal Clinic",
                    owner_name: owner.owner_name || "-",
                    owner_phone: ownerPhone,
                    pet_name: pet.pet_name || "-",
                    hn: pet.owner_hn || "-",
                    species: pet.pet_type || "-",
                    breed: pet.breed || "-",
                    sex: pet.gender || "-",
                    weight: (pet.weight || 0).toFixed(2),
                    date: formatThaiDate(new Date().toISOString(), 'long')
                };

                executeDynamicPrint(printData, config, pw, ph);
            } catch (e) { alert("Error: " + e.message); }
        }

        async function printApptLabel(petId) {
            try {
                const pet = allAnimals.find(a => a.id === petId);
                const owner = allOwners.find(o => o.hn === pet.owner_hn);
                const phoneInfo = allPhones.find(p => p.owner_hn === pet.owner_hn && p.label === 'เบอร์หลัก');
                
                // หาประวัติการรักษาล่าสุดที่มีการลงวันนัดไว้
                const latestRecWithAppt = allMedicalRecordsForPet.find(r => r.appointment || r.appointment_2);
                if (!latestRecWithAppt) return alert("ไม่พบข้อมูลการนัดหมายในประวัติการรักษา");

                const { data: template } = await db.from('print_templates').select('config').eq('template_type', 'sticker_appt').single();
                if (!template) return alert("ไม่พบ Template: sticker_appt");

                const config = template.config;
                const pw = config.width || 80, ph = config.height || 50;

                const printData = {
                    clinic_name: "PK-VMS Animal Clinic",
                    owner_name: owner.owner_name || "-",
                    owner_phone: phoneInfo ? phoneInfo.phone_number : '-',
                    pet_name: pet.pet_name || "-",
                    hn: pet.owner_hn || "-",
                    appointment_date_1: formatThaiDate(latestRecWithAppt.appointment, 'long'),
                    appointment_note_1: latestRecWithAppt.appointment_note || "-",
                    appointment_date_2: latestRecWithAppt.appointment_2 ? formatThaiDate(latestRecWithAppt.appointment_2, 'long') : "-",
                    appointment_note_2: latestRecWithAppt.appointment_note_2 || "-",
                    date: formatThaiDate(new Date().toISOString(), 'short')
                };

                executeDynamicPrint(printData, config, pw, ph);
            } catch (e) { alert("Error: " + e.message); }
        }

        // Shared Print Executor
        function executeDynamicPrint(printData, config, pw, ph) {
            const elements = [...config.lines].sort((a,b) => parseFloat(a.y) - parseFloat(b.y)).map(l => {
                const availableWidthMm = pw - parseFloat(l.x);
                const finalWidth = l.w ? l.w : availableWidthMm;
                
                let style = `top:${l.y}mm; left:${l.x}mm; width:${finalWidth}mm; font-family:${l.font || 'Sarabun'}; font-size:${l.size}pt; position:absolute; ${l.bold?'font-weight:bold;':''}`;
                if (l.align === 'center') style = `top:${l.y}mm; left:0; width:${pw}mm; text-align:center; font-family:${l.font || 'Sarabun'}; font-size:${l.size}pt; position:absolute; ${l.bold?'font-weight:bold;':''}`;
                else if (l.align === 'right') style = `top:${l.y}mm; left:0; width:${pw - parseFloat(l.x)}mm; text-align:right; font-family:${l.font || 'Sarabun'}; font-size:${l.size}pt; position:absolute; ${l.bold?'font-weight:bold;':''}`;
                
                let content = (l.text || "").replace(/\{\{(.*?)\}\}/g, (m, k) => printData[k.trim()] || m);
                
                if (l.type==='text') return `<div style="${style}">${content}</div>`;
                if (l.type==='rect') return `<div style="top:${l.y}mm; left:${l.x}mm; width:${l.w}mm; height:${l.h}mm; border:1px solid black; position:absolute; border-radius:${l.radius || 0}mm;"></div>`;
                if (l.type==='image') return `<img src="${l.url}" style="top:${l.y}mm; left:${l.x}mm; width:${l.w}mm; height:${l.h}mm; position:absolute; object-fit:contain;">`;
            }).join('');

            const win = window.open('', '_blank', 'width=400');
            win.document.write(`<html><head><style>
                @import url('https://fonts.googleapis.com/css2?family=Sarabun&display=swap'); 
                body{margin:0; padding:0;} 
                .page{position:relative; width:${pw}mm; min-height:${ph}mm; font-family:Sarabun;} 
                @media print { @page { size: ${pw}mm ${ph}mm; margin: 0; } }
            </style></head><body><div class="page">${elements}</div><script>window.onload=()=>{setTimeout(()=>{window.print();window.close();},500);};<\/script></body></html>`);
            win.document.close();
        }

        window.onload = async () => {
            if (sessionStorage.getItem("isLoggedIn") !== "true") { window.location.href = "index.html"; return; }
            await loadData();
        };
    </script>
