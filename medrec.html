<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <title>เวชระเบียน | PK-VMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <style>
        :root {
            --navy: #0b1929;
            --navy-mid: #112240;
            --teal: #0ea5a0;
            --border: rgba(255,255,255,0.1);
        }
        body { font-family: "Sarabun", sans-serif; background: var(--navy); color: #e2e8f0; }
        .glass-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border: 1px solid var(--border); }
        input, select, textarea { 
            background: rgba(255,255,255,0.05) !important; 
            border: 1px solid rgba(255,255,255,0.1) !important;
            color: white !important;
        }
        input:focus { border-color: var(--teal) !important; outline: none; box-shadow: 0 0 10px rgba(14,165,160,0.3); }
        .btn-teal { background: linear-gradient(135deg, var(--teal), #14c4bc); }
    </style>
</head>
<body x-data="medRecApp()">

    <header class="p-4 border-b border-white/5 bg-navy/80 sticky top-0 z-50 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <a href="index.html" class="text-gray-400 hover:text-white transition">← กลับหน้าหลัก</a>
            <h1 class="text-xl font-bold border-l pl-4 border-white/20">📋 เวชระเบียนสัตว์ป่วย</h1>
        </div>
        <button @click="openModal('add')" class="btn-teal text-white px-5 py-2 rounded-xl font-bold hover:opacity-90 transition">
            + เพิ่มทะเบียนใหม่
        </button>
    </header>

    <main class="max-w-7xl mx-auto p-6">
        <div class="mb-6 flex gap-4">
            <input type="text" x-model="search" placeholder="ค้นหา OPD, ชื่อสัตว์ หรือชื่อเจ้าของ..." class="flex-1 p-3 rounded-xl">
        </div>

        <div class="glass-card rounded-2xl overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-white/5 text-teal-400 text-sm">
                            <th class="p-4">OPD No.</th>
                            <th class="p-4">สัตว์ป่วย</th>
                            <th class="p-4">เจ้าของ / เบอร์โทร</th>
                            <th class="p-4">สถานะทำหมัน</th>
                            <th class="p-4">นัดหมาย</th>
                            <th class="p-4 text-center">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template x-for="(item, index) in filteredRecords" :key="item.id">
                            <tr class="border-b border-white/5 hover:bg-white/5 transition text-sm">
                                <td class="p-4 font-mono text-teal-300" x-text="item.opd"></td>
                                <td class="p-4">
                                    <div class="font-bold text-white" x-text="item.petName"></div>
                                    <div class="text-xs text-gray-400" x-text="`${item.species} | ${item.breed} | ${item.gender}`"></div>
                                </td>
                                <td class="p-4">
                                    <div x-text="item.ownerName"></div>
                                    <div class="text-xs text-gray-400" x-text="item.phone"></div>
                                </td>
                                <td class="p-4">
                                    <span :class="item.neutered === 'ทำหมันแล้ว' ? 'text-green-400' : 'text-amber-400'" x-text="item.neutered"></span>
                                </td>
                                <td class="p-4 text-rose-400" x-text="item.appointment || '-'"></td>
                                <td class="p-4 text-center">
                                    <div class="flex justify-center gap-2">
                                        <button @click="openModal('edit', item)" class="p-2 hover:bg-blue-500/20 rounded text-blue-400">แก้ไข</button>
                                        <button @click="deleteRecord(item.id)" class="p-2 hover:bg-red-500/20 rounded text-red-400">ลบ</button>
                                    </div>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div x-show="showModal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm" x-cloak>
        <div class="glass-card bg-[#112240] w-full max-w-4xl max-h-[90vh] overflow-y-auto rounded-3xl p-8 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-teal-400" x-text="editMode ? 'แก้ไขข้อมูลเวชระเบียน' : 'เพิ่มเวชระเบียนสัตว์ป่วยใหม่'"></h2>
                <button @click="showModal = false" class="text-gray-400 text-2xl hover:text-white">&times;</button>
            </div>

            <form @submit.prevent="saveRecord" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-4">
                    <h3 class="text-sm font-bold uppercase tracking-wider text-gray-500">ข้อมูลสัตว์</h3>
                    <div>
                        <label class="block text-xs mb-1">หมายเลข OPD</label>
                        <input type="text" x-model="form.opd" required class="w-full p-2 rounded-lg">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs mb-1">ชื่อสัตว์</label>
                            <input type="text" x-model="form.petName" required class="w-full p-2 rounded-lg">
                        </div>
                        <div>
                            <label class="block text-xs mb-1">ชนิด (เช่น สุนัข, แมว)</label>
                            <input type="text" x-model="form.species" class="w-full p-2 rounded-lg">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs mb-1">เพศ</label>
                            <select x-model="form.gender" class="w-full p-2 rounded-lg">
                                <option value="ผู้">ผู้</option>
                                <option value="เมีย">เมีย</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs mb-1">สถานะทำหมัน</label>
                            <select x-model="form.neutered" class="w-full p-2 rounded-lg">
                                <option value="ยังไม่ทำหมัน">ยังไม่ทำหมัน</option>
                                <option value="ทำหมันแล้ว">ทำหมันแล้ว</option>
                            </select>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs mb-1">พันธุ์</label>
                            <input type="text" x-model="form.breed" class="w-full p-2 rounded-lg">
                        </div>
                        <div>
                            <label class="block text-xs mb-1">วดป. เกิด / อายุ</label>
                            <input type="text" x-model="form.age" placeholder="เช่น 2 ปี หรือ 12/05/65" class="w-full p-2 rounded-lg">
                        </div>
                    </div>
                </div>

                <div class="space-y-4">
                    <h3 class="text-sm font-bold uppercase tracking-wider text-gray-500">ข้อมูลเจ้าของ & การรักษา</h3>
                    <div>
                        <label class="block text-xs mb-1">ชื่อเจ้าของ</label>
                        <input type="text" x-model="form.ownerName" required class="w-full p-2 rounded-lg">
                    </div>
                    <div>
                        <label class="block text-xs mb-1">เบอร์โทรศัพท์</label>
                        <input type="tel" x-model="form.phone" required class="w-full p-2 rounded-lg">
                    </div>
                    <div>
                        <label class="block text-xs mb-1">ที่อยู่</label>
                        <textarea x-model="form.address" rows="2" class="w-full p-2 rounded-lg"></textarea>
                    </div>
                    <div>
                        <label class="block text-xs mb-1 text-teal-400">วันนัดหมายครั้งถัดไป</label>
                        <input type="date" x-model="form.appointment" class="w-full p-2 rounded-lg border-teal-500/30">
                    </div>
                </div>

                <div class="md:col-span-2">
                    <label class="block text-xs mb-1">ประวัติการรักษา / บันทึกเพิ่มเติม</label>
                    <textarea x-model="form.history" rows="3" class="w-full p-2 rounded-lg" placeholder="ระบุอาการเบื้องต้น หรือประวัติการเจ็บป่วย..."></textarea>
                </div>

                <div class="md:col-span-2 flex justify-end gap-3 mt-4">
                    <button type="button" @click="showModal = false" class="px-6 py-2 text-gray-400 hover:text-white">ยกเลิก</button>
                    <button type="submit" class="btn-teal px-8 py-2 rounded-xl text-white font-bold shadow-lg shadow-teal-500/20">บันทึกข้อมูล</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function medRecApp() {
            return {
                records: JSON.parse(localStorage.getItem('pk_vms_medrec') || '[]'),
                search: '',
                showModal: false,
                editMode: false,
                form: {
                    id: null, opd: '', petName: '', species: '', gender: 'ผู้', 
                    breed: '', neutered: 'ยังไม่ทำหมัน', age: '', 
                    ownerName: '', address: '', phone: '', history: '', appointment: ''
                },

                get filteredRecords() {
                    if (this.search === '') return this.records;
                    const s = this.search.toLowerCase();
                    return this.records.filter(r => 
                        r.opd.toLowerCase().includes(s) || 
                        r.petName.toLowerCase().includes(s) || 
                        r.ownerName.toLowerCase().includes(s)
                    );
                },

                openModal(mode, data = null) {
                    this.editMode = mode === 'edit';
                    if (this.editMode && data) {
                        this.form = { ...data };
                    } else {
                        this.form = { 
                            id: Date.now(), opd: 'OPD-' + (this.records.length + 1).toString().padStart(4, '0'), 
                            petName: '', species: '', gender: 'ผู้', breed: '', 
                            neutered: 'ยังไม่ทำหมัน', age: '', ownerName: '', 
                            address: '', phone: '', history: '', appointment: ''
                        };
                    }
                    this.showModal = true;
                },

                saveRecord() {
                    if (this.editMode) {
                        const index = this.records.findIndex(r => r.id === this.form.id);
                        if (index !== -1) this.records[index] = { ...this.form };
                    } else {
                        this.records.push({ ...this.form });
                    }
                    this.persist();
                    this.showModal = false;
                },

                deleteRecord(id) {
                    if (confirm('ยืนยันการลบเวชระเบียนนี้? ข้อมูลจะหายไปถาวร')) {
                        this.records = this.records.filter(r => r.id !== id);
                        this.persist();
                    }
                },

                persist() {
                    localStorage.setItem('pk_vms_medrec', JSON.stringify(this.records));
                }
            }
        }
    </script>
</body>
</html>
