<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกการรักษา | PK-VMS Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/th.js"></script>

    <style>
        :root { --navy: #020617; --navy-light: #0f172a; --teal: #14b8b1; --border: rgba(255, 255, 255, 0.1); }
        * { font-family: "Sarabun", sans-serif !important; }
        body { background: var(--navy); color: #e2e8f0; }
        
        .input-box { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; padding: 10px; color: white; width: 100%; outline: none; transition: 0.2s; }
        .input-box:focus { border-color: var(--teal); background: rgba(0,0,0,0.5); }
        .label-text { color: #94a3b8; font-size: 0.85rem; margin-bottom: 4px; display: block; font-weight: 600; }
        .label-clinical { color: var(--teal); font-weight: 800; font-size: 0.9rem; margin-bottom: 4px; display: block; }
        .pet-info-val { font-size: 1.15rem; font-weight: 800; line-height: 1.5; }

        .section-card { background: rgba(30, 41, 59, 0.4); border-radius: 30px; padding: 30px; border: 1px solid var(--border); margin-bottom: 24px; }
        .history-item { background: rgba(255, 255, 255, 0.03); border-radius: 20px; padding: 25px; border: 1px solid var(--border); transition: 0.3s; margin-bottom: 15px; }

        .btn-base { padding: 10px 20px; border-radius: 12px; font-weight: 800; display: inline-flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; border: none; cursor: pointer; color: white !important; }
        .btn-teal { background-color: #0d9488 !important; }
        .btn-blue { background-color: #2563eb !important; }
        .btn-red { background-color: #dc2626 !important; }

        .list-box { background: rgba(20, 184, 177, 0.05); border: 1.5px dashed var(--teal); border-radius: 12px; min-height: 80px; padding: 10px; cursor: pointer; }
        .view-hidden { display: none; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-6">
                <button onclick="goBack()" class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center hover:bg-white/10 transition-all text-2xl shadow-lg">⬅️</button>
                <div>
                    <h1 class="text-4xl font-black text-white" id="head-pet-name">กำลังโหลด...</h1>
                    <p class="text-teal-400 font-bold text-lg" id="head-hn">HN: -</p>
                </div>
            </div>
            <a href="index.html" class="w-14 h-14 rounded-2xl bg-white/5 flex items-center justify-center hover:bg-white/10 text-3xl shadow-xl border border-white/5">🏠</a>
        </header>

        <div class="section-card border-l-8 border-teal-500 shadow-2xl">
            <h3 class="text-xl font-bold text-white mb-6 flex items-center gap-2">🐾 ข้อมูลสัตว์ป่วย</h3>
            <div class="grid grid-cols-12 gap-6">
                <div class="col-span-6 md:col-span-2">
                    <label class="label-text">ชื่อสัตว์</label>
                    <div id="disp-name" class="pet-info-val text-white">-</div>
                </div>
                <div class="col-span-6 md:col-span-2">
                    <label class="label-text">ชนิด / สายพันธุ์</label>
                    <div id="disp-breed" class="pet-info-val text-white">-</div>
                </div>
                <div class="col-span-4 md:col-span-1">
                    <label class="label-text">เพศ</label>
                    <div id="disp-gender" class="pet-info-val text-white">-</div>
                </div>
                <div class="col-span-4 md:col-span-2">
                    <label class="label-text">อายุ (ปี/เดือน)</label>
                    <div id="disp-age" class="pet-info-val text-white">-</div>
                </div>
                <div class="col-span-4 md:col-span-1">
                    <label class="label-text">นน.(กก.)</label>
                    <div id="disp-weight" class="pet-info-val text-yellow-400">-</div>
                </div>
                <div class="col-span-12 md:col-span-4">
                    <label class="label-text">⚠️ แพ้ยา/ข้อควรระวัง</label>
                    <div id="disp-allergy" class="pet-info-val">-</div>
                </div>
            </div>
        </div>

        <div id="history-view-container">
            <section class="mt-8 pb-20">
                <div class="flex justify-between items-center mb-8">
                    <h3 class="text-2xl font-black text-white flex items-center gap-3">⏳ ประวัติการรักษา <span id="record-count" class="bg-white/10 text-sm px-3 py-1 rounded-full font-normal">0 รายการ</span></h3>
                    <button onclick="showFormView()" class="btn-base btn-teal text-lg py-3 px-6 shadow-xl">+ เพิ่มบันทึกการรักษา</button>
                </div>
                <div id="history-list" class="space-y-4"></div>
            </section>
        </div>

        <div id="form-view-container" class="view-hidden">
            <div class="section-card border-l-8 border-teal-400">
                <h3 class="text-xl font-bold text-white mb-8 flex items-center gap-2">🏥 บันทึกการตรวจรักษา</h3>
                
                <div class="grid grid-cols-12 gap-5">
                    <div class="col-span-12 md:col-span-2">
                        <label class="label-clinical text-yellow-400">น้ำหนัก (กก.)</label>
                        <input type="number" id="f_weight" class="input-box font-bold text-yellow-400 text-xl" step="0.1">
                    </div>
                    <div class="col-span-12 md:col-span-5"><label class="label-clinical">CC (Chief Complaint)</label><textarea id="f_cc" class="input-box h-20"></textarea></div>
                    <div class="col-span-12 md:col-span-5"><label class="label-clinical">Hx (History)</label><textarea id="f_hx" class="input-box h-20"></textarea></div>
                    
                    <div class="col-span-12 md:col-span-4"><label class="label-clinical">PE (Physical Exam)</label><textarea id="f_pe" class="input-box h-32"></textarea></div>
                    <div class="col-span-12 md:col-span-4"><label class="label-clinical">🔬 Lab</label><div class="list-box text-sm" onclick="alert('Module Lab กำลังพัฒนา')">เลือกผลแล็บ...</div></div>
                    <div class="col-span-12 md:col-span-4"><label class="label-clinical text-yellow-400">Dx (Diagnosis)</label><textarea id="f_dx" class="input-box h-32 border-yellow-500/30"></textarea></div>
                    
                    <div class="col-span-12 md:col-span-6"><label class="label-clinical">💉 Tx (Treatment)</label><div class="list-box" onclick="alert('Module Tx กำลังพัฒนา')">เลือกหัตถการ...</div></div>
                    <div class="col-span-12 md:col-span-6"><label class="label-clinical">💊 Rx (Medication)</label><div class="list-box border-blue-500/50" onclick="alert('Module Rx กำลังพัฒนา')">เลือกรายการยา...</div></div>
                    
                    <div class="col-span-12 md:col-span-4"><label class="label-clinical">Plan</label><input type="text" id="f_plan" class="input-box"></div>
                    <div class="col-span-6 md:col-span-4"><label class="label-clinical text-orange-400">📅 Appointment</label><input type="text" id="f_appointment" class="input-box datepicker"></div>
                    <div class="col-span-6 md:col-span-4"><label class="label-text font-bold text-yellow-400">รวมค่ารักษา (฿)</label><input type="number" id="f_cost" class="input-box text-2xl font-black text-yellow-400" value="0"></div>
                </div>

                <div class="flex gap-4 mt-10">
                    <button onclick="saveMedicalRecord()" class="btn-base btn-teal flex-1 text-xl py-4">💾 บันทึกการรักษา</button>
                    <button onclick="showHistoryView()" class="btn-base btn-red px-10">ยกเลิก</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const animalId = urlParams.get('id');
        const ownerHN = urlParams.get('hn');
        let editingId = null;
        let records = [];

        window.onload = async () => {
            if (!animalId) return goBack();
            flatpickr(".datepicker", { locale: "th", dateFormat: "Y-m-d", altInput: true, altFormat: "j F Y" });
            await fetchInfo();
            await fetchRecords();
        };

        // ฟังก์ชันคำนวณอายุ
        function calculateAge(dob) {
            if (!dob) return "ไม่ระบุ";
            const birth = new Date(dob);
            const now = new Date();
            let years = now.getFullYear() - birth.getFullYear();
            let months = now.getMonth() - birth.getMonth();
            if (months < 0) { years--; months += 12; }
            return `${years} ปี ${months} เดือน`;
        }

        async function fetchInfo() {
            // ดึงข้อมูลเจ้าของ
            const { data: owner } = await db.from('owners').select('*').eq('hn', ownerHN).single();
            const { data: phones } = await db.from('owner_phones').select('phone_number').eq('owner_hn', ownerHN);
            if (owner) {
                document.getElementById('info-owner-name').innerText = owner.owner_name;
                document.getElementById('info-owner-phone').innerText = phones?.[0]?.phone_number || '-';
                document.getElementById('info-owner-address').innerText = owner.address || '-';
                document.getElementById('head-hn').innerText = `HN: ${owner.hn}`;
            }

            // ดึงข้อมูลสัตว์
            const { data: pet } = await db.from('animals').select('*').eq('id', animalId).single();
            if (pet) {
                document.getElementById('head-pet-name').innerText = pet.pet_name;
                document.getElementById('disp-name').innerText = pet.pet_name;
                document.getElementById('disp-breed').innerText = `${pet.pet_type} (${pet.breed || '-'})`;
                document.getElementById('disp-gender').innerText = pet.gender;
                document.getElementById('disp-age').innerText = calculateAge(pet.birth_date);
                document.getElementById('disp-weight').innerText = pet.weight || '0';
                document.getElementById('f_weight').value = pet.weight || 0;

                // Logic สีแพ้ยา
                const allergyEl = document.getElementById('disp-allergy');
                if (pet.congenital_disease && pet.congenital_disease !== "ไม่มี" && pet.congenital_disease !== "-") {
                    allergyEl.innerText = pet.congenital_disease;
                    allergyEl.className = "pet-info-val text-red-500 font-black";
                } else {
                    allergyEl.innerText = "ไม่มีประวัติแพ้ยา";
                    allergyEl.className = "pet-info-val text-slate-400";
                }
            }
        }

        async function fetchRecords() {
            const { data } = await db.from('medical_records').select('*').eq('animal_id', animalId).order('created_at', { ascending: false });
            records = data || [];
            renderRecordsList();
        }

        function renderRecordsList() {
            const list = document.getElementById('history-list');
            document.getElementById('record-count').innerText = `${records.length} รายการ`;
            if (records.length === 0) {
                list.innerHTML = `<div class="text-center py-20 opacity-20">ยังไม่มีประวัติการรักษา</div>`;
                return;
            }
            list.innerHTML = records.map(rec => `
                <div class="history-item" onclick="toggleCollapse('${rec.id}')">
                    <div class="flex justify-between items-center cursor-pointer">
                        <div class="flex gap-6 items-center">
                            <span class="text-teal-400 font-black text-lg">${new Date(rec.created_at).toLocaleDateString('th-TH', { day:'numeric', month:'short', year:'2-digit' })}</span>
                            <span class="text-sm text-slate-300"><b>CC:</b> ${rec.cc || '-'}</span>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="event.stopPropagation(); editRecord('${rec.id}')" class="btn-base btn-blue !py-1 !px-3 text-xs">✏️ แก้ไข</button>
                        </div>
                    </div>
                    <div id="detail-${rec.id}" class="hidden mt-4 pt-4 border-t border-white/5 text-sm">
                        <div class="grid grid-cols-2 gap-4">
                            <div><b class="text-teal-500">Dx:</b> ${rec.dx || '-'}</div>
                            <div><b class="text-teal-500">Tx/Rx:</b> ${rec.tx || '-'} / ${rec.rx || '-'}</div>
                        </div>
                        <div class="mt-4 text-right font-bold text-yellow-400 text-lg">฿ ${rec.cost?.toLocaleString()}</div>
                    </div>
                </div>
            `).join('');
        }

        function toggleCollapse(id) {
            const el = document.getElementById(`detail-${id}`);
            el.classList.toggle('hidden');
        }

        function showFormView() {
            editingId = null;
            document.getElementById('history-view-container').classList.add('view-hidden');
            document.getElementById('form-view-container').classList.remove('view-hidden');
        }

        function showHistoryView() {
            document.getElementById('history-view-container').classList.remove('view-hidden');
            document.getElementById('form-view-container').classList.add('view-hidden');
            fetchRecords();
        }

        async function saveMedicalRecord() {
            const data = {
                animal_id: animalId, owner_hn: ownerHN,
                cc: document.getElementById('f_cc').value, hx: document.getElementById('f_hx').value,
                pe: document.getElementById('f_pe').value, dx: document.getElementById('f_dx').value,
                cost: parseFloat(document.getElementById('f_cost').value) || 0,
                updated_at: new Date()
            };
            try {
                if (editingId) await db.from('medical_records').update(data).eq('id', editingId);
                else await db.from('medical_records').insert([data]);
                
                await db.from('animals').update({ weight: parseFloat(document.getElementById('f_weight').value) }).eq('id', animalId);
                alert("✅ บันทึกสำเร็จ");
                showHistoryView();
            } catch (err) { alert(err.message); }
        }

        function goBack() { window.location.href = 'animals.html'; }
    </script>
</body>
</html>
