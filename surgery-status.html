<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สถานะห้องผ่าตัด | PK-VMS Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Kanit:wght@300;400;500;600;700&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="ui-settings.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>

    <style>
        :root { --navy: #020617; --border: rgba(255, 255, 255, 0.1); }
        * { font-family: "Sarabun", sans-serif !important; }
        body { background: var(--navy); color: #e2e8f0; min-height: 100vh; }

        /* Status dropdown — ใหญ่ขึ้นสำหรับมือถือ */
        .status-select {
            background: rgba(0,0,0,0.5); border: 2px solid transparent; border-radius: 14px;
            padding: 14px 16px; color: white; font-weight: 800; cursor: pointer; outline: none;
            transition: 0.2s; appearance: none; text-align: center; font-size: 1rem; width: 100%;
        }

        /* สีตามสถานะ */
        .status-waiting   { border-color: #f97316; color: #fdba74; background: rgba(249,115,22,0.12); }
        .status-recovering{ border-color: #3b82f6; color: #93c5fd; background: rgba(59,130,246,0.12); }
        .status-done      { border-color: #10b981; color: #86efac; background: rgba(16,185,129,0.12); }
        .status-emergency { border-color: #ef4444; color: #fca5a5; background: rgba(239,68,68,0.15); animation: pulse-red 1.2s infinite; }
        @keyframes pulse-red { 0%,100%{ box-shadow:0 0 0 0 rgba(239,68,68,0.5); } 50%{ box-shadow:0 0 0 8px rgba(239,68,68,0); } }

        /* Card */
        .queue-card {
            background: rgba(15,23,42,0.8); border-radius: 20px;
            border: 1px solid var(--border); border-left: 5px solid;
            padding: 20px; margin-bottom: 14px; transition: border-left-color 0.3s;
        }
        .card-emergency { border-left-color: #ef4444; }
        .card-waiting   { border-left-color: #f97316; }
        .card-recovering{ border-left-color: #3b82f6; }
        .card-done      { border-left-color: #10b981; }

        /* ปุ่มลบ */
        .btn-delete {
            width: 38px; height: 38px; border-radius: 50%; border: none; cursor: pointer;
            background: rgba(239,68,68,0.1); color: #f87171;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; transition: 0.2s; flex-shrink: 0;
        }
        .btn-delete:hover { background: #ef4444; color: white; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="px-4 py-6">

    <div class="max-w-lg mx-auto">

        <!-- Header -->
        <header class="mb-8">
            <div class="text-center">
                <div class="text-5xl mb-3">🔪</div>
                <h1 class="text-2xl font-black text-white tracking-tight">สถานะผ่าตัด</h1>
                <p class="text-teal-400 text-sm font-bold mt-1">คลินิกรักษาสัตว์หมอปิติพัฒน์</p>
                <p class="text-teal-400 text-sm font-bold mt-1">จะโทรแจ้งด้วยเบอร์ 085-5251545 เมื่อสัตว์พร้อมรับกลับ</p>
                <div class="flex items-center justify-center gap-3 mt-4">
                    <span id="last-updated" class="text-xs text-slate-500 font-medium">—</span>
                    <span class="text-xs text-slate-600 font-medium">🔄 อัปเดตอัตโนมัติทุก 1 นาที</span>
                </div>
            </div>
        </header>

        <!-- รายการคิว -->
        <div id="queue-list">
            <div class="py-16 text-center text-gray-500 animate-pulse font-bold text-lg">กำลังโหลดข้อมูล...</div>
        </div>

    </div>

    <script>
        const SECRETPWD = "044641460"; // รหัสผ่านสำหรับเปลี่ยนสถานะและลบ
        let queueData = [];

        window.onload = async () => {
            // ผูก Event delegation ครั้งเดียวบน container
            const container = document.getElementById('queue-list');
            container.addEventListener('change', async e => {
                if (e.target.dataset.action !== 'status') return;
                const cardEl = e.target.closest('.queue-card');
                await attemptStatusUpdate(e.target, cardEl.dataset.id, cardEl.dataset.status, cardEl);
            });
            container.addEventListener('click', async e => {
                const btn = e.target.closest('[data-action="delete"]');
                if (!btn) return;
                const cardEl = btn.closest('.queue-card');
                await attemptDelete(cardEl.dataset.id, cardEl.dataset.pet);
            });

            await fetchQueue();
            // รีเฟรชกระดานอัตโนมัติทุกๆ 1 นาที
            setInterval(fetchQueue, 60000);
        };

        async function fetchQueue() {
            // ดึงข้อมูลคิวของวันนี้ (ย้อนหลังไม่เกิน 24 ชม.)
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);

            const { data, error } = await db.from('surgery_queue')
                .select('*')
                .gte('created_at', yesterday.toISOString())
                .order('created_at', { ascending: false });

            if (error) {
                console.error("Error fetching queue:", error);
                return;
            }
            queueData = data || [];
            renderBoard();

            // อัปเดตเวลาที่โหลดล่าสุด
            const now = new Date();
            document.getElementById('last-updated').innerText =
                `อัปเดตล่าสุด ${now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' })} น.`;
        }

        // HTML-escape เพื่อป้องกัน XSS
        function esc(str) {
            return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
        }

        // คืนค่า CSS class ตามสถานะ
        function statusCls(status) {
            if (status === 'ฉุกเฉิน/ลัดคิวผ่าตัด') return { sel: 'status-emergency', card: 'card-emergency' };
            if (status === 'กำลังพักฟื้น')          return { sel: 'status-recovering', card: 'card-recovering' };
            if (status === 'ฟื้นแล้ว/รอรับกลับ')    return { sel: 'status-done',       card: 'card-done' };
            return { sel: 'status-waiting', card: 'card-waiting' };
        }

        function renderBoard() {
            const container = document.getElementById('queue-list');

            if (queueData.length === 0) {
                container.innerHTML = `
                    <div class="py-24 flex flex-col items-center justify-center opacity-30 text-center">
                        <div class="text-6xl mb-4">✅</div>
                        <h2 class="text-xl font-bold">ไม่มีคิวผ่าตัดค้างในระบบ</h2>
                    </div>`;
                return;
            }

            container.innerHTML = queueData.map(q => {
                const { sel, card } = statusCls(q.status);
                const hnBadge = q.owner_hn
                    ? `<span class="text-xs font-bold text-blue-400 bg-blue-400/10 border border-blue-400/30 rounded-full px-3 py-0.5">HN: ${esc(q.owner_hn)}</span>`
                    : '';

                return `
                <div class="queue-card ${card}" data-id="${esc(q.id)}" data-pet="${esc(q.pet_name)}" data-status="${esc(q.status)}">
                    <div class="flex justify-between items-center mb-4">
                        <div class="flex flex-col gap-2">
                            <span class="text-white font-black text-2xl leading-tight">🐾 ${esc(q.pet_name)}</span>
                            ${hnBadge}
                        </div>
                        <button class="btn-delete" data-action="delete" title="นำออกจากกระดาน">✓</button>
                    </div>
                    <select class="status-select ${sel}" data-action="status">
                        <option value="ฉุกเฉิน/ลัดคิวผ่าตัด" ${q.status === 'ฉุกเฉิน/ลัดคิวผ่าตัด' ? 'selected' : ''} class="bg-slate-800 text-white">🔴 ฉุกเฉิน/ลัดคิวผ่าตัด</option>
                        <option value="รอผ่าตัด"          ${q.status === 'รอผ่าตัด'          ? 'selected' : ''} class="bg-slate-800 text-white">🟠 รอผ่าตัด</option>
                        <option value="กำลังพักฟื้น"      ${q.status === 'กำลังพักฟื้น'      ? 'selected' : ''} class="bg-slate-800 text-white">🔵 กำลังพักฟื้น</option>
                        <option value="ฟื้นแล้ว/รอรับกลับ" ${q.status === 'ฟื้นแล้ว/รอรับกลับ' ? 'selected' : ''} class="bg-slate-800 text-white">🟢 ฟื้นแล้ว/รอรับกลับ</option>
                    </select>
                </div>`;
            }).join('');
        }

        async function attemptStatusUpdate(selectElement, id, oldStatus, cardEl) {
            const pwd = prompt("🔐 สงวนสิทธิ์เฉพาะสัตวแพทย์\nกรุณาใส่รหัสผ่านเพื่อแก้ไขสถานะ:");

            if (pwd === SECRETPWD) {
                const newStatus = selectElement.value;
                const { error } = await db.from('surgery_queue').update({ status: newStatus }).eq('id', id);

                if (error) {
                    alert("❌ เกิดข้อผิดพลาดในการบันทึกข้อมูล: " + error.message);
                    selectElement.value = oldStatus;
                } else {
                    const { sel, card } = statusCls(newStatus);
                    selectElement.className = `status-select ${sel}`;
                    cardEl.className = cardEl.className.replace(/card-\S+/, card);
                    cardEl.dataset.status = newStatus;
                    const idx = queueData.findIndex(q => q.id === id);
                    if (idx > -1) queueData[idx].status = newStatus;
                }
            } else {
                if (pwd !== null) alert("❌ รหัสผ่านไม่ถูกต้อง");
                selectElement.value = oldStatus;
            }
        }

        // ลบรายการเมื่อรับกลับบ้านเรียบร้อยแล้ว
        async function attemptDelete(id, petName) {
            const pwd = prompt(`🔐 ยืนยันการนำ "${petName}" ออกจากกระดาน\nกรุณาใส่รหัสผ่าน:`);

            if (pwd === SECRETPWD) {
                const { error } = await db.from('surgery_queue').delete().eq('id', id);
                if (error) {
                    alert("❌ ลบข้อมูลไม่สำเร็จ: " + error.message);
                } else {
                    await fetchQueue();
                }
            } else if (pwd !== null) {
                alert("❌ รหัสผ่านไม่ถูกต้อง");
            }
        }
    </script>
</body>
</html>
