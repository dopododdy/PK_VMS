<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ข้อมูลพื้นฐานระบบ | PK-VMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script> 
    <style>
        :root { --navy: #0b1929; --navy-mid: #112240; --teal: #0ea5a0; --border: rgba(255,255,255,0.1); }
        body { font-family: "Sarabun", sans-serif; background: var(--navy); color: #e2e8f0; min-height: 100vh; overflow: hidden; }
        .mesh-bg { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% 50%, rgba(14,165,160,0.05) 0%, transparent 80%); }
        .input-box { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: white; width: 100%; outline: none; transition: border-color 0.2s; }
        .input-box:focus { border-color: var(--teal); }
        .input-box:read-only { opacity: 0.5; cursor: not-allowed; background: rgba(255,255,255,0.05); }
        .tab-btn { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; border-radius: 12px; color: #94a3b8; transition: all 0.2s; cursor: pointer; }
        .tab-btn:hover { background: rgba(255,255,255,0.05); color: white; }
        .tab-btn.active { background: rgba(14,165,160,0.15); color: var(--teal); border: 1px solid rgba(14,165,160,0.3); }
        .list-item { padding: 1rem; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.2s; display: flex; justify-content: space-between; align-items: center; }
        .list-item:hover { background: rgba(255,255,255,0.02); }
        .list-item.selected { background: rgba(14,165,160,0.1); border-left: 3px solid var(--teal); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col h-screen">
    <div class="mesh-bg"></div>

    <header class="p-5 border-b border-white/5 bg-navy/80 backdrop-blur-md shrink-0 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <a href="settings.html" class="text-gray-400 hover:text-white transition text-sm">← กลับหน้าตั้งค่า</a>
            <h1 class="text-xl font-bold border-l pl-4 border-white/20">📑 ข้อมูลพื้นฐานระบบ (Master Data)</h1>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside class="w-64 border-r border-white/5 p-4 space-y-2 overflow-y-auto shrink-0 bg-navy-mid/30">
            <div class="text-xs font-bold text-gray-500 mb-4 tracking-wider uppercase px-2">หมวดหมู่ข้อมูล</div>
            <div class="tab-btn active" onclick="switchTab('units')"><span>📏</span> หน่วยนับสินค้า/ยา</div>
            <div class="tab-btn" onclick="switchTab('species')"><span>🐾</span> ชนิดสัตว์</div>
            <div class="tab-btn" onclick="switchTab('breeds')"><span>🐕</span> สายพันธุ์สัตว์</div>
            <div class="tab-btn" onclick="switchTab('sub_cat')"><span>📂</span> หมวดหมู่สินค้า</div>
            <div class="tab-btn" onclick="switchTab('templates')"><span>🏷️</span> เทมเพลตการพิมพ์ (ถาวร)</div>
        </aside>

        <main class="flex-1 flex gap-4 p-4 overflow-hidden">
            <div class="flex-1 bg-white/5 border border-white/10 rounded-xl flex flex-col overflow-hidden">
                <div class="p-4 border-b border-white/10 flex justify-between items-center bg-black/20">
                    <h2 class="font-bold text-lg" id="list-title">รายการข้อมูล</h2>
                    <input type="text" id="search-input" placeholder="ค้นหา..." class="input-box !w-64 !py-1.5 !text-sm" onkeyup="filterList()">
                </div>
                <div class="flex-1 overflow-y-auto" id="data-list">
                    <div class="p-8 text-center text-gray-500 text-sm">กำลังโหลดข้อมูล...</div>
                </div>
            </div>

            <div class="w-[450px] bg-white/5 border border-white/10 rounded-xl flex flex-col shrink-0 overflow-hidden">
                <div class="p-4 border-b border-white/10 bg-black/20">
                    <h2 class="font-bold text-lg text-teal-400" id="form-title">เพิ่มรายการใหม่</h2>
                </div>
                <div class="p-5 flex-1 overflow-y-auto space-y-4" id="form-fields"></div>
                <div class="p-4 border-t border-white/10 flex gap-3 bg-black/20">
                    <button onclick="saveData()" class="flex-1 bg-teal-600 hover:bg-teal-500 text-white py-2.5 rounded-lg font-medium transition shadow-lg shadow-teal-500/20">💾 บันทึกข้อมูล</button>
                    <button onclick="resetForm()" class="px-4 bg-gray-700 hover:bg-gray-600 text-white rounded-lg transition">ยกเลิก</button>
                    <button id="btn-delete" onclick="deleteData()" class="px-4 bg-red-600 hover:bg-red-500 text-white rounded-lg transition hidden">🗑️</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        // รายชื่อเทมเพลตมาตรฐานที่ห้ามลบ/ห้ามเปลี่ยนชื่อรหัส
        const permanentTemplates = [
            'sticker_drug', 'sticker_pet_id', 'sticker_appt', 'sticker_shipping',
            'thermal_receipt', 'thermal_cage', 'thermal_queue',
            'doc_opd_a5', 'doc_consent_a5', 'doc_referral_a4', 'doc_lab_a4', 'doc_cardio_a4'
        ];

        const config = {
            units: { table: 'mas_units', title: 'หน่วยนับสินค้า/ยา', fields: [{ name: 'name', label: 'ชื่อหน่วยนับ (เช่น เม็ด, ขวด)', type: 'text' }] },
            species: { table: 'mas_species', title: 'ชนิดสัตว์', fields: [{ name: 'name', label: 'ชื่อชนิดสัตว์ (เช่น สุนัข, แมว)', type: 'text' }] },
            breeds: { 
                table: 'mas_breeds', title: 'สายพันธุ์สัตว์', 
                fields: [
                    { name: 'name', label: 'ชื่อสายพันธุ์', type: 'text' },
                    { name: 'species_id', label: 'ชนิดสัตว์', type: 'select', relation: 'mas_species' }
                ] 
            },
            sub_cat: { 
                table: 'mas_sub_cat', title: 'หมวดหมู่สินค้า', 
                fields: [{ name: 'name', label: 'ชื่อหมวดหมู่ (เช่น Antibiotics, ยาฉีด)', type: 'text' }] 
            },
            templates: { 
                table: 'print_templates', title: 'เทมเพลตการพิมพ์', 
                fields: [
                    { name: 'template_type', label: 'รหัสเทมเพลต (ID ถาวร)', type: 'text' },
                    { name: 'config', label: 'การตั้งค่า Layout (JSON)', type: 'textarea' }
                ] 
            }
        };

        let currentTab = 'units', currentData = [], relationData = {}, selectedId = null;

        window.onload = async () => {
            await loadRelationData();
            switchTab('units');
        };

        async function loadRelationData() {
            const { data: species } = await db.from('mas_species').select('id, name').order('name');
            if(species) relationData['mas_species'] = species;
        }

        async function switchTab(tabId) {
            currentTab = tabId;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget?.classList.add('active');
            document.getElementById('list-title').innerText = config[tabId].title;
            resetForm(); buildForm(); await loadData();
        }

        function buildForm() {
            const container = document.getElementById('form-fields');
            container.innerHTML = '';
            
            if (currentTab === 'templates') {
                container.innerHTML += `
                <div class="mb-4 p-4 bg-teal-900/30 border border-teal-500/30 rounded-lg">
                    <label class="block text-sm font-bold text-teal-300 mb-2">💡 โหลดค่าตั้งต้น (Presets)</label>
                    <select id="preset-selector" class="input-box border-teal-500/50 text-sm" onchange="loadPreset(this.value)">
                        <option value="">-- เลือกรูปแบบที่ต้องการ --</option>
                        <optgroup label="1. Thermal Sticker (80x50)">
                            <option value="sticker_drug">สติ๊กเกอร์ยา</option>
                            <option value="sticker_pet_id">หน้าสมุดประจำตัว</option>
                            <option value="sticker_appt">ใบนัดหมาย</option>
                            <option value="sticker_shipping">ที่อยู่จัดส่งยา</option>
                        </optgroup>
                        <optgroup label="2. Thermal 80mm">
                            <option value="thermal_receipt">ใบเสร็จรับเงิน</option>
                            <option value="thermal_cage">ใบติดหน้ากรง</option>
                            <option value="thermal_queue">บัตรคิวผ่าตัด</option>
                        </optgroup>
                        <optgroup label="3. Document A4/A5">
                            <option value="doc_opd_a5">OPD Card (A5)</option>
                            <option value="doc_consent_a5">ใบยินยอมผ่าตัด (A5)</option>
                            <option value="doc_referral_a4">ใบส่งตัว (A4)</option>
                            <option value="doc_lab_a4">รายงานผลแล็บ (A4)</option>
                        </optgroup>
                    </select>
                </div>`;
            }

            config[currentTab].fields.forEach(field => {
                let inputHtml = '';
                const isPK = (currentTab === 'templates' && field.name === 'template_type');
                const readOnly = (isPK && selectedId && permanentTemplates.includes(selectedId)) ? 'readonly' : '';

                if (field.type === 'text') {
                    inputHtml = `<input type="text" id="f_${field.name}" class="input-box" placeholder="ระบุ${field.label}" ${readOnly}>`;
                } else if (field.type === 'textarea') {
                    const height = currentTab === 'templates' ? 'h-80 text-xs font-mono' : 'h-32';
                    inputHtml = `<textarea id="f_${field.name}" class="input-box ${height}"></textarea>`;
                } else if (field.type === 'select') {
                    const opts = (relationData[field.relation] || []).map(o => `<option value="${o.id}" class="bg-navy">${o.name}</option>`).join('');
                    inputHtml = `<select id="f_${field.name}" class="input-box"><option value="">-- เลือก --</option>${opts}</select>`;
                }
                container.innerHTML += `<div class="mb-4"><label class="block text-sm text-gray-400 mb-1">${field.label}</label>${inputHtml}</div>`;
            });
        }

        function loadPreset(val) {
            if (!val) return;
            const typeInput = document.getElementById('f_template_type');
            const configInput = document.getElementById('f_config');
            typeInput.value = val;
            
            let w = 80, h = 50;
            if (val.startsWith('thermal')) h = 150;
            if (val.includes('a5')) { w = 210; h = 148; }
            if (val.includes('a4')) { w = 210; h = 297; }

            const preset = { 
                width: w, height: h, 
                lines: [
                    { x: 5, y: 10, font: "Sarabun", size: 14, text: "หัวข้อ: " + val, align: "left", bold: true },
                    { x: 5, y: 25, font: "Sarabun", size: 12, text: "ชื่อสัตว์: {{pet_name}}", align: "left", bold: false }
                ] 
            };
            configInput.value = JSON.stringify(preset, null, 4);
        }

        async function loadData() {
            const listContainer = document.getElementById('data-list');
            try {
                const orderCol = currentTab === 'templates' ? 'template_type' : 'id';
                const { data } = await db.from(config[currentTab].table).select('*').order(orderCol);
                currentData = data || [];
                renderList(currentData);
            } catch (err) { listContainer.innerHTML = '<div class="p-8 text-red-400">Error loading data</div>'; }
        }

        function renderList(items) {
            const container = document.getElementById('data-list');
            container.innerHTML = items.length ? '' : '<div class="p-8 text-center text-gray-500">ไม่พบข้อมูล</div>';
            items.forEach(item => {
                const id = (currentTab === 'templates') ? item.template_type : item.id;
                const div = document.createElement('div');
                div.className = `list-item ${selectedId === id ? 'selected' : ''}`;
                const isPermanent = permanentTemplates.includes(id);
                div.innerHTML = `<div><div class="font-medium text-white">${item.name || id}</div>${isPermanent ? '<span class="text-[10px] bg-teal-500/20 text-teal-400 px-2 rounded-full">SYSTEM</span>' : ''}</div><div class="text-gray-500 text-xs text-right">ID: ${id.toString().slice(0,12)}</div>`;
                div.onclick = () => selectItem(item, id);
                container.appendChild(div);
            });
        }

        function selectItem(item, id) {
            selectedId = id;
            buildForm(); // Re-build to apply read-only logic
            document.getElementById('form-title').innerText = 'แก้ไขรายการ';
            document.getElementById('form-title').className = 'font-bold text-lg text-yellow-400';
            
            const isPermanent = permanentTemplates.includes(id);
            document.getElementById('btn-delete').classList.toggle('hidden', isPermanent);
            
            config[currentTab].fields.forEach(field => {
                const el = document.getElementById(`f_${field.name}`);
                if (el) el.value = (typeof item[field.name] === 'object') ? JSON.stringify(item[field.name], null, 4) : item[field.name] || '';
            });
            renderList(currentData);
        }

        function resetForm() {
            selectedId = null;
            buildForm();
            document.getElementById('form-title').innerText = 'เพิ่มรายการใหม่';
            document.getElementById('form-title').className = 'font-bold text-lg text-teal-400';
            document.getElementById('btn-delete').classList.add('hidden');
            renderList(currentData);
        }

        async function saveData() {
            const payload = {};
            let hasError = false;
            config[currentTab].fields.forEach(f => {
                const val = document.getElementById(`f_${f.name}`).value.trim();
                if (!val) hasError = true;
                if (f.name === 'config') {
                    try { payload[f.name] = JSON.parse(val); } catch(e) { alert('JSON Invalid'); hasError = true; }
                } else payload[f.name] = val;
            });
            if (hasError) return alert('กรุณากรอกข้อมูลให้ครบถ้วน');

            try {
                const pk = currentTab === 'templates' ? 'template_type' : 'id';
                const { error } = selectedId ? await db.from(config[currentTab].table).update(payload).eq(pk, selectedId) : await db.from(config[currentTab].table).insert([payload]);
                if (error) throw error;
                alert('บันทึกสำเร็จ!'); resetForm(); loadData();
            } catch (err) { alert(err.message); }
        }

        async function deleteData() {
            if (!selectedId || !confirm('ยืนยันการลบ?')) return;
            const pk = currentTab === 'templates' ? 'template_type' : 'id';
            const { error } = await db.from(config[currentTab].table).delete().eq(pk, selectedId);
            if (error) alert('ลบไม่ได้: ' + error.message);
            else { resetForm(); loadData(); }
        }

        function filterList() {
            const term = document.getElementById('search-input').value.toLowerCase();
            renderList(currentData.filter(i => (i.name || i.template_type || '').toLowerCase().includes(term)));
        }
    </script>
</body>
</html>
