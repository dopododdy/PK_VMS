<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบชำระเงิน POS | PK-VMS Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=Prompt:wght@300;400;600&family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>

    <style>
        :root { --navy: #020617; --navy-light: #0f172a; --teal: #14b811; --border: rgba(255, 255, 255, 0.1); }
        * { font-family: "Sarabun", sans-serif !important; }
        body { background: var(--navy); color: #e2e8f0; height: 100vh; overflow: hidden; }
        
        .input-box { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; padding: 12px; color: white; width: 100%; outline: none; transition: 0.2s; }
        .input-box:focus { border-color: var(--teal); background: rgba(0,0,0,0.5); }
        
        .bill-card { background: rgba(30, 41, 59, 0.4); border: 1px solid var(--border); border-radius: 20px; cursor: pointer; transition: 0.2s; }
        .bill-card:hover { border-color: var(--teal); background: rgba(20, 184, 17, 0.1); }
        .bill-card.active { border-color: var(--teal); background: rgba(20, 184, 17, 0.2); box-shadow: 0 0 15px rgba(20, 184, 17, 0.3); }

        .cart-table thead { background: rgba(255, 255, 255, 0.05); }
        .cart-item { border-bottom: 1px solid var(--border); }

        .btn-pay { background: var(--teal); color: white; width: 100%; padding: 18px; border-radius: 15px; font-size: 1.4rem; font-weight: 800; transition: 0.3s; }
        .btn-pay:hover { filter: brightness(1.1); transform: translateY(-2px); }

        .numpad button { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); border-radius: 12px; padding: 15px; font-weight: 700; transition: 0.1s; }
        .numpad button:active { background: var(--teal); color: white; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--navy-light); border: 1px solid var(--border); border-radius: 30px; width: 100%; max-width: 900px; height: 80vh; display: flex; flex-direction: column; overflow: hidden; }

        @media print { #main-ui, .modal-overlay { display: none !important; } }
    </style>
</head>
<body class="flex flex-col">

    <div id="main-ui" class="flex flex-1 overflow-hidden">
        
        <div class="w-1/4 border-r border-white/5 flex flex-col p-4 overflow-y-auto">
            <div class="flex items-center gap-3 mb-6">
                <a href="index.html" class="w-10 h-10 bg-white/5 rounded-full flex items-center justify-center">🏠</a>
                <h2 class="text-xl font-black text-teal-400">บิลรอชำระวันนี้</h2>
            </div>
            
            <div id="pending-bills-list" class="space-y-3">
                <p class="text-gray-500 text-center py-10 italic">กำลังโหลดรายการ...</p>
            </div>
        </div>

        <div class="w-2/4 flex flex-col p-6 bg-black/10">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-black text-white">💰 ตะกร้าสินค้า/ค่ารักษา</h1>
                <button onclick="openCatalog()" class="bg-blue-600 hover:bg-blue-500 text-white px-5 py-2 rounded-xl font-bold transition">+ เพิ่มสินค้า</button>
            </div>

            <div class="flex-1 overflow-y-auto rounded-2xl border border-white/5 bg-navy-light/50">
                <table class="w-full text-left cart-table">
                    <thead class="text-xs text-gray-400 uppercase">
                        <tr>
                            <th class="p-4">รายการ</th>
                            <th class="p-4 text-center">จำนวน</th>
                            <th class="p-4 text-right">ราคา/หน่วย</th>
                            <th class="p-4 text-right">รวม</th>
                            <th class="p-4 text-center">#</th>
                        </tr>
                    </thead>
                    <tbody id="cart-items-body"></tbody>
                </table>
                <div id="cart-empty" class="p-20 text-center text-gray-600 flex flex-col items-center">
                    <span class="text-6xl mb-4">🛒</span>
                    <p>กรุณาเลือก HN หรือเพิ่มสินค้าเพื่อเริ่มการขาย</p>
                </div>
            </div>
        </div>

        <div class="w-1/4 bg-slate-900/80 p-6 flex flex-col shadow-2xl">
            <div class="flex-1">
                <h3 class="text-gray-400 font-bold mb-6">สรุปยอดชำระ</h3>
                <div class="space-y-4 mb-8">
                    <div class="flex justify-between text-lg"><span>รวมเงิน</span><span id="sum-price">0.00</span></div>
                    <div class="flex justify-between text-lg text-red-400">
                        <span>ส่วนลด</span>
                        <input type="number" id="discount-val" class="bg-transparent border-b border-red-400/30 text-right w-20 outline-none" value="0" oninput="calculateTotal()">
                    </div>
                    <div class="border-t border-white/10 pt-4 flex justify-between items-end">
                        <span class="text-xl font-bold">ยอดสุทธิ</span>
                        <span class="text-4xl font-black text-teal-400" id="net-total">0.00</span>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3 mb-6">
                    <button onclick="setPayMethod('cash')" id="m-cash" class="p-3 rounded-xl border-2 border-teal-500 bg-teal-500/10 text-center">
                        <div class="text-2xl">💵</div><div class="text-xs font-bold mt-1">เงินสด</div>
                    </button>
                    <button onclick="setPayMethod('transfer')" id="m-transfer" class="p-3 rounded-xl border-2 border-transparent bg-white/5 text-center">
                        <div class="text-2xl">📱</div><div class="text-xs font-bold mt-1">เงินโอน</div>
                    </button>
                </div>

                <div id="cash-panel" class="space-y-4">
                    <label class="text-xs text-gray-500 block uppercase">รับเงินสด (F10)</label>
                    <input type="number" id="received-amount" class="input-box text-3xl font-black text-yellow-400 text-center" placeholder="0.00" oninput="calculateChange()">
                    <div class="numpad grid grid-cols-3 gap-2">
                        <button onclick="quickCash(100)">100</button>
                        <button onclick="quickCash(500)">500</button>
                        <button onclick="quickCash(1000)">1,000</button>
                    </div>
                    <div class="p-4 bg-black/40 rounded-xl flex justify-between items-center mt-4">
                        <span class="text-gray-400">เงินทอน</span>
                        <span class="text-3xl font-bold text-white" id="change-val">0.00</span>
                    </div>
                </div>
            </div>
            <button onclick="processPayment()" class="btn-pay">✅ ยืนยันชำระเงิน</button>
        </div>
    </div>

    <div id="catalog-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="p-6 border-b border-white/10 flex justify-between items-center bg-slate-900/50">
                <h3 class="text-2xl font-bold">📦 รายการสินค้าทั้งหมด</h3>
                <button onclick="closeCatalog()" class="text-3xl">✕</button>
            </div>
            <div class="p-4 bg-black/20">
                <input type="text" id="catalog-search" class="input-box" placeholder="ค้นหาชื่อสินค้า..." oninput="filterCatalog()">
            </div>
            <div id="catalog-grid" class="flex-1 overflow-y-auto p-6 grid grid-cols-3 gap-4"></div>
        </div>
    </div>

    <script>
        let cart = [];
        let payMethod = 'cash';
        let allProducts = [];

        window.onload = async () => {
            await fetchTodayBills();
            await fetchProducts();
        };

        async function fetchTodayBills() {
            const today = new Date().toISOString().split('T')[0];
            const { data } = await db.from('medical_records')
                .select('id, owner_hn, created_at, owners(owner_name), animals(pet_name)')
                .gte('created_at', today)
                .order('created_at', { ascending: false });

            const list = document.getElementById('pending-bills-list');
            if (data && data.length > 0) {
                list.innerHTML = data.map(rec => `
                    <div class="bill-card p-4" onclick="loadBillToCart('${rec.id}', this)">
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-teal-400 font-bold font-mono">HN: ${rec.owner_hn}</span>
                            <span class="text-[10px] text-gray-500">${new Date(rec.created_at).toLocaleTimeString('th-TH')}</span>
                        </div>
                        <div class="text-white font-bold">${rec.owners.owner_name}</div>
                        <div class="text-xs text-gray-400">สัตว์เลี้ยง: ${rec.animals.pet_name}</div>
                    </div>
                `).join('');
            } else {
                list.innerHTML = '<p class="text-gray-600 text-center py-10 italic">ไม่มีรายการใหม่วันนี้</p>';
            }
        }

        // --- แก้ไข Logic การดึงรายการ: ยา = 1 ซอง ---
        async function loadBillToCart(recordId, element) {
            document.querySelectorAll('.bill-card').forEach(el => el.classList.remove('active'));
            element.classList.add('active');

            const { data } = await db.from('medical_record_items').select('*').eq('record_id', recordId);
            
            cart = (data || []).map(i => {
                const isMed = i.item_type === 'Rx';
                return {
                    id: i.id,
                    name: i.item_name,
                    // หากเป็นยา (Rx) ให้ใช้ total_price เป็นราคาหน่วย (ราคาต่อซอง)
                    price: isMed ? parseFloat(i.total_price) : parseFloat(i.unit_price),
                    // หากเป็นยา (Rx) ให้แสดงเป็น 1 (ซอง) เสมอ
                    qty: isMed ? 1 : parseFloat(i.quantity),
                    type: i.item_type
                };
            });
            renderCart();
        }

        async function fetchProducts() {
            const { data } = await db.from('pharmacy').select('*').order('item_name');
            allProducts = data || [];
        }

        function openCatalog() {
            document.getElementById('catalog-modal').style.display = 'flex';
            renderCatalog(allProducts);
        }

        function closeCatalog() { document.getElementById('catalog-modal').style.display = 'none'; }

        function filterCatalog() {
            const q = document.getElementById('catalog-search').value.toLowerCase();
            renderCatalog(allProducts.filter(p => p.item_name.toLowerCase().includes(q)));
        }

        function renderCatalog(items) {
            const grid = document.getElementById('catalog-grid');
            grid.innerHTML = items.map(p => `
                <div class="p-5 bg-white/5 rounded-2xl border border-white/5 hover:border-blue-500 cursor-pointer transition" onclick='addToCart(${JSON.stringify(p).replace(/'/g, "&apos;")})'>
                    <div class="font-bold text-white text-lg mb-1">${p.item_name}</div>
                    <div class="text-teal-400 font-bold italic">฿${parseFloat(p.price_per_unit).toFixed(2)}</div>
                    <div class="text-[10px] text-gray-500 mt-2 uppercase">${p.category}</div>
                </div>
            `).join('');
        }

        function addToCart(p) {
            const isMed = p.category !== 'General';
            const existing = cart.find(i => i.name === p.item_name);
            
            if (existing && !isMed) {
                existing.qty++;
            } else {
                cart.push({ 
                    name: p.item_name, 
                    price: parseFloat(p.price_per_unit), 
                    qty: 1, 
                    type: isMed ? 'Rx' : 'Product' 
                });
            }
            renderCart();
        }

        function renderCart() {
            const body = document.getElementById('cart-items-body');
            const empty = document.getElementById('cart-empty');
            
            if (cart.length === 0) {
                body.innerHTML = '';
                empty.classList.remove('hidden');
            } else {
                empty.classList.add('hidden');
                body.innerHTML = cart.map((item, idx) => `
                    <tr class="cart-item">
                        <td class="p-4">
                            <div class="font-bold text-white">${item.name}</div>
                            <div class="text-[10px] text-gray-500 uppercase">${item.type}</div>
                        </td>
                        <td class="p-4 text-center">
                            ${item.type === 'Rx' ? 
                                `<span class="font-black text-teal-400 text-lg">1 ซอง</span>` : 
                                `<div class="flex items-center justify-center gap-2">
                                    <button onclick="updateQty(${idx}, -1)" class="w-8 h-8 rounded bg-white/5 hover:bg-red-500/20">-</button>
                                    <span class="font-bold">${item.qty}</span>
                                    <button onclick="updateQty(${idx}, 1)" class="w-8 h-8 rounded bg-white/5 hover:bg-teal-500/20">+</button>
                                </div>`
                            }
                        </td>
                        <td class="p-4 text-right">฿${item.price.toFixed(2)}</td>
                        <td class="p-4 text-right font-black text-white">฿${(item.price * item.qty).toFixed(2)}</td>
                        <td class="p-4 text-center"><button onclick="removeItem(${idx})" class="text-red-500">🗑️</button></td>
                    </tr>
                `).join('');
            }
            calculateTotal();
        }

        function updateQty(idx, delta) {
            cart[idx].qty += delta;
            if (cart[idx].qty <= 0) cart.splice(idx, 1);
            renderCart();
        }

        function removeItem(idx) { cart.splice(idx, 1); renderCart(); }

        function calculateTotal() {
            const sum = cart.reduce((acc, i) => acc + (i.price * i.qty), 0);
            const disc = parseFloat(document.getElementById('discount-val').value) || 0;
            const net = sum - disc;
            document.getElementById('sum-price').innerText = sum.toLocaleString('th-TH', {minimumFractionDigits: 2});
            document.getElementById('net-total').innerText = net.toLocaleString('th-TH', {minimumFractionDigits: 2});
            calculateChange();
        }

        function setPayMethod(m) {
            payMethod = m;
            document.getElementById('m-cash').className = m === 'cash' ? 'p-3 rounded-xl border-2 border-teal-500 bg-teal-500/10 text-center' : 'p-3 rounded-xl border-2 border-transparent bg-white/5 text-center';
            document.getElementById('m-transfer').className = m === 'transfer' ? 'p-3 rounded-xl border-2 border-teal-500 bg-teal-500/10 text-center' : 'p-3 rounded-xl border-2 border-transparent bg-white/5 text-center';
            document.getElementById('cash-panel').style.opacity = m === 'cash' ? '1' : '0.2';
        }

        function quickCash(amt) {
            const el = document.getElementById('received-amount');
            el.value = (parseFloat(el.value) || 0) + amt;
            calculateChange();
        }

        function calculateChange() {
            const net = parseFloat(document.getElementById('net-total').innerText.replace(/,/g, ''));
            const received = parseFloat(document.getElementById('received-amount').value) || 0;
            const change = received - net;
            document.getElementById('change-val').innerText = change > 0 ? change.toLocaleString('th-TH', {minimumFractionDigits: 2}) : "0.00";
        }

        async function processPayment() {
            if (cart.length === 0) return alert("ไม่มีรายการสินค้า");
            if (confirm(`ยืนยันการชำระเงินจำนวน ฿${document.getElementById('net-total').innerText} ?`)) {
                alert("ชำระเงินเสร็จสิ้น!");
                location.reload();
            }
        }
    </script>
</body>
</html>
