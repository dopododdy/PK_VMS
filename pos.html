<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบชำระเงิน POS | PK-VMS Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Prompt:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>

    <style>
        :root { --navy: #020617; --navy-light: #0f172a; --teal: #10b981; --border: rgba(255, 255, 255, 0.08); }
        * { font-family: "Sarabun", sans-serif !important; }
        body { background: var(--navy); color: #f1f5f9; height: 100vh; overflow: hidden; }
        
        .zone-sidebar { width: 22%; background: #020617; border-right: 1px solid var(--border); }
        .zone-cart { width: 53%; background: rgba(0,0,0,0.15); }
        .zone-payment { width: 25%; background: #0f172a; border-left: 1px solid var(--border); }

        .glass-panel { background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border); border-radius: 1.5rem; }
        
        .input-money { background: rgba(0,0,0,0.4); border: 1px solid var(--border); color: #fbbf24; outline: none; border-radius: 1rem; transition: 0.2s; font-weight: 800; }
        .input-money:focus { border-color: var(--teal); background: rgba(0,0,0,0.6); }

        .bill-card { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border); border-radius: 1.25rem; cursor: pointer; transition: 0.3s; }
        .bill-card:hover { background: rgba(255, 255, 255, 0.07); transform: translateX(6px); border-color: var(--teal); }
        .bill-card.active { border-color: var(--teal); background: rgba(16, 185, 129, 0.08); }
        .bill-card.paid { border-left: 5px solid var(--teal); opacity: 0.9; }

        .btn-action { background: linear-gradient(135deg, #10b981 0%, #059669 100%); transition: 0.3s; }
        .numpad button { background: rgba(255, 255, 255, 0.04); border: 1px solid var(--border); border-radius: 1.25rem; font-weight: 700; transition: 0.2s; }
        .numpad button:active { background: var(--teal); transform: scale(0.95); }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 100; display: none; align-items: center; justify-content: center; }
        /* สไตล์ใบเสร็จสำหรับการ Preview */
        .receipt-preview-box { background: white; color: black; position: relative; box-shadow: 0 0 50px rgba(0,0,0,0.6); overflow: hidden; }

        @media print { #main-ui, .modal-overlay { display: none !important; } }
    </style>
</head>
<body class="flex flex-col">

    <div id="main-ui" class="flex flex-1 overflow-hidden">
        <div class="zone-sidebar flex flex-col p-6 overflow-hidden">
            <div class="flex items-center gap-4 mb-10">
                <a href="index.html" class="w-12 h-12 glass-panel flex items-center justify-center text-2xl hover:bg-white/10 transition">🏠</a>
                <h2 class="text-xl font-black text-white leading-tight">PK-VMS <span class="text-teal-500 text-xs block">SMART POS</span></h2>
            </div>
            <div class="flex-1 overflow-y-auto space-y-8">
                <div>
                    <label class="text-[11px] font-black text-gray-500 mb-4 block uppercase tracking-widest">⏳ รอการชำระเงิน</label>
                    <div id="pending-bills-list" class="space-y-4"></div>
                </div>
                <div class="pt-6 border-t border-white/5">
                    <label class="text-[11px] font-black text-teal-600 mb-4 block uppercase tracking-widest">✅ ชำระแล้ววันนี้</label>
                    <div id="paid-bills-list" class="space-y-4"></div>
                </div>
            </div>
        </div>

        <div class="zone-cart flex flex-col p-8 overflow-hidden">
            <div class="flex justify-between items-center mb-8 px-2">
                <h1 class="text-3xl font-black text-white flex items-center gap-4">รายการชำระเงิน</h1>
                <button onclick="openCatalog()" class="bg-blue-600/20 border border-blue-600/30 text-blue-400 px-6 py-2.5 rounded-2xl font-bold hover:bg-blue-600 hover:text-white transition-all">+ สินค้าเสริม</button>
            </div>
            <div class="flex-1 overflow-y-auto glass-panel relative shadow-2xl">
                <table class="w-full text-left">
                    <thead class="sticky top-0 bg-slate-900/95 border-b border-white/5 z-20">
                        <tr class="text-gray-500 text-[11px] font-black uppercase tracking-widest">
                            <th class="p-6">รายการ</th>
                            <th class="p-6 text-center">จำนวน</th>
                            <th class="p-6 text-right">ราคา</th>
                            <th class="p-6 text-right">รวม</th>
                            <th class="p-6 text-center">#</th>
                        </tr>
                    </thead>
                    <tbody id="cart-items-body" class="divide-y divide-white/5"></tbody>
                </table>
                <div id="cart-empty" class="absolute inset-0 flex flex-col items-center justify-center text-gray-700 pointer-events-none">
                    <span class="text-9xl opacity-5 mb-6">🛒</span>
                    <p class="text-xl font-bold opacity-10">เลือกบิลเพื่อเริ่มรับชำระ</p>
                </div>
            </div>
        </div>

        <div class="zone-payment flex flex-col p-8 overflow-y-auto">
            <div class="flex-1">
                <div class="space-y-6 mb-10">
                    <div class="flex justify-between text-gray-400"><span>รวมเงิน</span><span id="sum-price" class="text-2xl font-bold text-white">0.00</span></div>
                    <div class="flex justify-between text-red-400 font-bold">
                        <span>ส่วนลด</span>
                        <input type="number" id="discount-val" class="bg-white/5 border border-white/10 text-right w-28 p-2 rounded-xl outline-none" value="0" oninput="calculateTotal()">
                    </div>
                    <div class="border-t border-white/10 pt-8 flex flex-col items-end">
                        <span class="text-[11px] font-black text-teal-500 uppercase tracking-widest mb-1">ยอดสุทธิ</span>
                        <span class="text-6xl font-black text-white tracking-tighter" id="net-total">0.00</span>
                    </div>
                </div>

                <div class="space-y-5 mt-10">
                    <label class="text-[10px] font-black text-gray-500 uppercase tracking-widest">💵 รับเงินสด</label>
                    <input type="number" id="received-amount" class="input-money w-full text-5xl font-black text-center py-6 shadow-inner" placeholder="0.00" oninput="calculateChange()">
                    <div class="numpad grid grid-cols-3 gap-3">
                        <button onclick="quickCash(100)">100</button><button onclick="quickCash(500)">500</button><button onclick="quickCash(1000)">1000</button>
                    </div>
                    <div class="pt-4 flex justify-between items-center px-2">
                        <span class="text-gray-500 font-bold text-sm">เงินทอน</span>
                        <span class="text-4xl font-black text-emerald-400" id="change-val">0.00</span>
                    </div>
                </div>
            </div>
            
            <div class="mt-10 space-y-4">
                <div id="reprint-info" class="hidden p-4 bg-blue-500/10 text-blue-400 text-center rounded-2xl text-[10px] font-black border border-blue-500/20">⚠️ โหมดพิมพ์ซ้ำ</div>
                <div class="flex gap-3 h-20">
                    <button onclick="showPreview()" class="flex-1 glass-panel hover:bg-white/5 text-white rounded-3xl font-bold transition flex items-center justify-center gap-2">🔍 Preview</button>
                    <button onclick="confirmPayment()" class="flex-[2] btn-action text-white rounded-3xl font-black text-2xl active:scale-95">บันทึก & พิมพ์</button>
                </div>
            </div>
        </div>
    </div>

    <div id="preview-modal" class="modal-overlay">
        <div class="max-w-2xl glass-panel bg-slate-900 p-8 flex flex-col h-[90vh]">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-white">ตรวจสอบรูปแบบใบเสร็จ</h3>
                <button onclick="closePreview()" class="text-2xl">✕</button>
            </div>
            <div class="flex-1 overflow-auto bg-slate-950 p-10 flex justify-center items-start">
                <div id="receipt-preview-content" class="receipt-preview-box"></div>
            </div>
            <div class="grid grid-cols-2 gap-4 mt-6">
                <button onclick="closePreview()" class="bg-slate-700 py-4 rounded-2xl font-bold">แก้ไข</button>
                <button onclick="confirmPayment()" class="btn-action py-4 rounded-2xl font-bold">พิมพ์ทันที</button>
            </div>
        </div>
    </div>

    <div id="catalog-modal" class="modal-overlay">
        <div class="max-w-5xl w-full glass-panel bg-slate-900 flex flex-col h-[80vh]">
            <div class="p-8 border-b border-white/5 flex justify-between items-center text-white">
                <h3 class="text-2xl font-black">📦 แคตตาล็อกสินค้า</h3>
                <button onclick="closeCatalog()" class="text-3xl">✕</button>
            </div>
            <div class="p-6 bg-black/20"><input type="text" id="catalog-search" class="input-money w-full py-4 px-6 text-xl" placeholder="ค้นหาชื่อสินค้า..." oninput="filterCatalog()"></div>
            <div id="catalog-grid" class="flex-1 overflow-y-auto p-8 grid grid-cols-3 gap-6"></div>
        </div>
    </div>

    <script>
        let cart = [], allProducts = [], activeRecord = null, isReprintMode = false, originalPrintData = null;

        window.onload = async () => { await fetchTodayBills(); await fetchProducts(); };

        // --- Logic Functions ---
        async function fetchTodayBills() {
            const today = new Date().toISOString().split('T')[0];
            const { data: pending } = await db.from('medical_records').select('id, owner_hn, created_at, total_cost, owners(owner_name), animals(pet_name)').or('payment_status.is.null,payment_status.eq.pending').gte('created_at', today).order('created_at', { ascending: false });
            const { data: paid } = await db.from('medical_records').select('id, owner_hn, paid_at, owners(owner_name), animals(pet_name), net_amount, received_amount, change_amount, receipt_no, discount').eq('payment_status', 'paid').gte('created_at', today).order('paid_at', { ascending: false });
            renderSidebar(pending, 'pending-bills-list', false);
            renderSidebar(paid, 'paid-bills-list', true);
        }

        function renderSidebar(data, elementId, isPaid) {
            const container = document.getElementById(elementId);
            container.innerHTML = (data || []).map(rec => `
                <div class="bill-card p-5 ${isPaid ? 'paid' : ''}" onclick="selectBill('${rec.id}', ${isPaid}, this)">
                    <div class="flex justify-between mb-1"><span class="text-hn text-[9px]">HN: ${rec.owner_hn}</span><span class="text-[10px] text-gray-500">${new Date(isPaid ? rec.paid_at : rec.created_at).toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'})}</span></div>
                    <div class="text-sm font-bold text-white truncate">${rec.owners.owner_name}</div>
                    <div class="flex justify-between items-center mt-2"><span class="text-[10px] text-gray-400">🐾 ${rec.animals.pet_name}</span><span class="font-black text-sm ${isPaid ? 'text-teal-400' : 'text-white'}">฿${(isPaid ? rec.net_amount : rec.total_cost).toLocaleString()}</span></div>
                </div>`).join('') || `<p class="text-gray-700 text-center py-4 text-xs italic">ไม่มีข้อมูล</p>`;
        }

        async function selectBill(id, isPaid, element) {
            document.querySelectorAll('.bill-card').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            const { data: header } = await db.from('medical_records').select('*, owners(*), animals(*)').eq('id', id).single();
            const { data: items } = await db.from('medical_record_items').select('*').eq('record_id', id);
            activeRecord = header; isReprintMode = isPaid;
            cart = (items || []).map(i => {
                const type = i.item_type; let label = "ชิ้น", qty = parseFloat(i.quantity), price = parseFloat(i.unit_price);
                if(type === 'Rx') { label = "ซอง"; qty = 1; price = parseFloat(i.total_price); }
                else if(type === 'Tx' && i.item_name.toLowerCase().includes('inj')) { label = "เข็ม"; qty = 1; price = parseFloat(i.total_price); }
                return { id: i.id, name: i.item_name, price, qty, type, label };
            });
            if (isPaid) {
                document.getElementById('discount-val').value = header.discount || 0;
                document.getElementById('received-amount').value = header.received_amount || 0;
                document.getElementById('reprint-info').classList.remove('hidden');
                originalPrintData = { receipt_no: header.receipt_no, paid_at: header.paid_at, received: header.received_amount, change: header.change_amount };
            } else {
                document.getElementById('discount-val').value = 0;
                document.getElementById('received-amount').value = "";
                document.getElementById('reprint-info').classList.add('hidden');
                originalPrintData = null;
            }
            renderCart();
        }

        function renderCart() {
            let rxIdx = 0, injIdx = 0;
            document.getElementById('cart-items-body').innerHTML = cart.map((item, idx) => {
                let suffix = "";
                if(item.type === 'Rx') { rxIdx++; suffix = ` (${rxIdx})`; }
                else if(item.type === 'Tx' && item.name.toLowerCase().includes('inj')) { injIdx++; suffix = ` (${injIdx})`; }
                return `<tr class="hover:bg-white/[0.02] transition"><td class="p-6"><div class="font-bold text-white text-lg">${item.name}${suffix}</div><div class="text-[10px] text-gray-500 uppercase font-black">${item.type}</div></td><td class="p-6 text-center">${isReprintMode ? `<span class="font-bold text-teal-400 text-xl">${item.qty}</span>` : `<div class="flex items-center justify-center gap-3"><button onclick="updateQty(${idx},-1)" class="w-8 h-8 rounded bg-white/5 border border-white/5">-</button><span class="font-black text-xl w-6">${item.qty}</span><button onclick="updateQty(${idx},1)" class="w-8 h-8 rounded bg-white/5 border border-white/5">+</button></div>`}</td><td class="p-6 text-right text-gray-400">${item.price.toLocaleString()}</td><td class="p-6 text-right font-black text-white text-xl">฿${(item.price*item.qty).toLocaleString()}</td><td class="p-6 text-center">${isReprintMode ? '' : `<button onclick="removeItem(${idx})" class="text-red-500/20 hover:text-red-500">✕</button>`}</td></tr>`;
            }).join('');
            document.getElementById('cart-empty').classList.toggle('hidden', cart.length > 0);
            calculateTotal();
        }

        function updateQty(idx, delta) { cart[idx].qty += delta; if (cart[idx].qty <= 0) cart.splice(idx, 1); renderCart(); }
        function removeItem(idx) { cart.splice(idx, 1); renderCart(); }
        function calculateTotal() {
            const sum = cart.reduce((acc, i) => acc + (i.price * i.qty), 0);
            const disc = parseFloat(document.getElementById('discount-val').value) || 0;
            const net = Math.max(0, sum - disc);
            document.getElementById('sum-price').innerText = sum.toLocaleString('th-TH',{minimumFractionDigits:2});
            document.getElementById('net-total').innerText = net.toLocaleString('th-TH',{minimumFractionDigits:2});
            calculateChange();
        }
        function quickCash(amt) { const el = document.getElementById('received-amount'); el.value = (parseFloat(el.value) || 0) + amt; calculateChange(); }
        function calculateChange() {
            const net = parseFloat(document.getElementById('net-total').innerText.replace(/,/g, ''));
            const received = parseFloat(document.getElementById('received-amount').value) || 0;
            const change = received - net;
            document.getElementById('change-val').innerText = change >= 0 ? change.toLocaleString('th-TH',{minimumFractionDigits:2}) : "0.00";
        }

        // --- Print Engine ---
        async function generateReceiptID(hn) {
            const now = new Date(), y = (now.getFullYear() + 543).toString(), m = (now.getMonth() + 1).toString().padStart(2, '0'), d = now.getDate().toString().padStart(2, '0');
            const { count } = await db.from('medical_records').select('*', { count: 'exact', head: true }).eq('owner_hn', hn).eq('payment_status', 'paid').gte('paid_at', new Date().toISOString().split('T')[0]);
            return `${y}${m}${d}${hn}${(count + 1).toString().padStart(2, '0')}`;
        }

        async function generateCustomReceipt() {
            const { data: template } = await db.from('print_templates').select('config').eq('template_type', 'thermal_receipt').single();
            if (!template) return alert("ไม่พบ Template 'thermal_receipt'");
            const config = template.config;
            const px = 3.78; // สำหรับ Preview
            const now = isReprintMode ? new Date(originalPrintData.paid_at) : new Date();

            // Table HTML สำหรับรายการสินค้า (รองรับ Sarabun ชิดขวาเป๊ะ)
            const itemsTable = `<table style="width:100%; border-collapse:collapse; font-family:'Sarabun'; font-size:11px; color:black;">${cart.map((item, idx) => `<tr><td style="padding:1px 0;">${idx+1}. ${item.name}</td><td style="text-align:right; white-space:nowrap; padding:1px 0;">${(item.price * item.qty).toLocaleString()}</td></tr>`).join('')}</table>`;

            const dataVars = {
                clinic_name: "PK-VMS Animal Clinic", owner_name: activeRecord?.owners?.owner_name || "ลูกค้าทั่วไป",
                pet_name: activeRecord?.animals?.pet_name || "-", hn: activeRecord?.owner_hn || "-",
                receipt_no: isReprintMode ? originalPrintData.receipt_no : await generateReceiptID(activeRecord?.owner_hn),
                date: now.toLocaleDateString('th-TH'), time: now.toLocaleTimeString('th-TH', {hour:'2-digit',minute:'2-digit'}),
                items_list: itemsTable, total_price: document.getElementById('sum-price').innerText,
                discount_val: document.getElementById('discount-val').value, net_total: document.getElementById('net-total').innerText,
                received_amount: isReprintMode ? originalPrintData.received.toLocaleString() : (document.getElementById('received-amount').value || 0),
                change_amount: isReprintMode ? originalPrintData.change.toLocaleString() : document.getElementById('change-val').innerText,
                pay_method: "เงินสด"
            };

            const sortedLines = [...config.lines].sort((a, b) => a.y - b.y);
            let pushOffset = 0;

            return {
                config,
                html: sortedLines.map(l => {
                    const currentY = parseFloat(l.y) + pushOffset;
                    let text = (l.text || "").replace(/\{\{(.*?)\}\}/g, (m, k) => dataVars[k.trim()] || m);
                    if (l.text && l.text.includes('{{items_list}}')) pushOffset += (cart.length * 4.5);
                    
                    const boxWidthMm = l.w ? l.w : (config.width - (l.x * 2));
                    let style = `position:absolute; top:${currentY}mm; font-family:'Sarabun'; font-size:${l.size}pt; font-weight:${l.bold?'bold':'normal'}; width:${boxWidthMm}mm;`;
                    
                    if (l.type === 'text') {
                        if (l.align === 'center') style += `left:0; width:100%; text-align:center;`;
                        else if (l.align === 'right') style += `right:${l.x}mm; text-align:right;`;
                        else style += `left:${l.x}mm; text-align:left;`;
                        return `<div style="${style}">${text}</div>`;
                    } else if (l.type === 'rect') {
                        let rStyle = `position:absolute; top:${currentY}mm; left:${l.x}mm; width:${l.w}mm; height:${l.h}mm; border:0.5pt solid black; border-radius:${l.radius || 0}mm;`;
                        return `<div style="${rStyle}"></div>`;
                    } else if (l.type === 'image') {
                        let iStyle = `position:absolute; top:${currentY}mm; left:${l.x}mm; width:${l.w}mm; height:${l.h}mm; object-fit:contain;`;
                        if (l.align === 'center') iStyle = `position:absolute; top:${currentY}mm; left:50%; transform:translateX(-50%); width:${l.w}mm; height:${l.h}mm; object-fit:contain;`;
                        return `<img src="${l.url}" style="${iStyle}">`;
                    }
                }).join('')
            };
        }

        async function showPreview() {
            if (cart.length === 0) return alert("กรุณาเลือกรายการ");
            const result = await generateCustomReceipt();
            if (result) {
                const box = document.getElementById('receipt-preview-content');
                box.style.width = result.config.width + "mm";
                box.style.height = (result.config.height + (cart.length * 4.5)) + "mm";
                box.innerHTML = result.html;
                document.getElementById('preview-modal').style.display = 'flex';
            }
        }

        function closePreview() { document.getElementById('preview-modal').style.display = 'none'; }

        async function confirmPayment() {
            try {
                if (cart.length === 0) return alert("ไม่มีรายการสินค้า");
                const net = parseFloat(document.getElementById('net-total').innerText.replace(/,/g, ''));
                const received = parseFloat(document.getElementById('received-amount').value) || 0;
                if (received < net && !isReprintMode) return alert("ยอดเงินรับไม่เพียงพอ");

                const result = await generateCustomReceipt();
                if (!result) return;

                if (!isReprintMode) {
                    const rID = await generateReceiptID(activeRecord.owner_hn);
                    await db.from('medical_records').update({
                        payment_status: 'paid', discount: parseFloat(document.getElementById('discount-val').value),
                        net_amount: net, received_amount: received, change_amount: (received - net),
                        payment_method: 'cash', receipt_no: rID, paid_at: new Date().toISOString()
                    }).eq('id', activeRecord.id);
                }

                const win = window.open('', '_blank', `width=${result.config.width*4},height=800`);
                win.document.write(`<html><head><style>@import url('https://fonts.googleapis.com/css2?family=Sarabun&display=swap'); body { margin:0; padding:0; } .page { position:relative; width:${result.config.width}mm; min-height:${result.config.height}mm; background:white; overflow:hidden; } @media print { @page { size: ${result.config.width}mm auto; margin:0; } }</style></head><body><div class="page">${result.html}</div><script>window.onload=function(){ setTimeout(()=>{window.print();window.close();},500); };<\/script></body></html>`);
                win.document.close();
                alert("บันทึกสำเร็จ!"); location.reload();
            } catch (err) { alert(err.message); }
        }

        // Inventory Catalog
        async function fetchProducts() { const { data } = await db.from('pharmacy').select('*').order('item_name'); allProducts = data || []; }
        function openCatalog() { if(!activeRecord) return alert("เลือกบิลก่อน"); document.getElementById('catalog-modal').style.display = 'flex'; renderCatalog(allProducts); }
        function closeCatalog() { document.getElementById('catalog-modal').style.display = 'none'; }
        function filterCatalog() { const q = document.getElementById('catalog-search').value.toLowerCase(); renderCatalog(allProducts.filter(p => p.item_name.toLowerCase().includes(q))); }
        function renderCatalog(items) {
            document.getElementById('catalog-grid').innerHTML = items.map(p => `<div class="p-8 glass-panel bg-slate-800/40 hover:border-teal-500 cursor-pointer transition active:scale-95" onclick='addToCart(${JSON.stringify(p).replace(/'/g, "&apos;")})'><div class="font-bold text-white text-xl mb-1">${p.item_name}</div><div class="text-teal-400 font-black text-2xl">฿${parseFloat(p.price_per_unit).toLocaleString()}</div></div>`).join('');
        }
        function addToCart(p) {
            const existing = cart.find(i => i.name === p.item_name);
            if (existing) { existing.qty++; } 
            else { cart.push({ name: p.item_name, price: parseFloat(p.price_per_unit), qty: 1, type: 'Product', label: 'ชิ้น' }); }
            renderCart(); closeCatalog();
        }
    </script>
</body>
</html>
