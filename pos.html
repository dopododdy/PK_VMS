<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>PK-VMS Pro | Smart POS</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>

    <style>
        :root { --navy-dark: #020617; --navy-panel: #0f172a; --teal-accent: #10b981; --border: rgba(255, 255, 255, 0.08); }
        * { font-family: "Sarabun", sans-serif !important; }
        body { background: var(--navy-dark); color: #e2e8f0; height: 100vh; overflow: hidden; }

        /* --- 1. Typography Consistency (Uniform across 3 columns) --- */
        .txt-label { font-size: 12px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.025em; }
        .txt-body { font-size: 14px; color: #cbd5e1; }
        .txt-title { font-size: 18px; font-weight: 800; color: #ffffff; }
        .txt-price { font-size: 32px; font-weight: 900; color: #ffffff; letter-spacing: -1px; }

        /* --- 2. Layout Structure --- */
        .col-side { width: 23%; border-right: 1px solid var(--border); }
        .col-main { width: 52%; background: rgba(0,0,0,0.2); }
        .col-pay { width: 25%; background: var(--navy-panel); border-left: 1px solid var(--border); }

        .glass-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 12px; transition: 0.2s; cursor: pointer; }
        .glass-card:hover { border-color: var(--teal-accent); background: rgba(16, 185, 129, 0.05); }
        .glass-card.active { border-color: var(--teal-accent); background: rgba(16, 185, 129, 0.1); }

        .search-input { background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 10px; width: 100%; padding: 10px 12px 10px 40px; outline: none; font-size: 14px; }
        .search-input:focus { border-color: var(--teal-accent); }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .numpad button { background: rgba(255,255,255,0.05); height: 50px; border-radius: 10px; font-weight: 800; font-size: 18px; }
        .numpad button:active { background: var(--teal-accent); color: var(--navy-dark); }
    </style>
</head>
<body class="flex">

    <div class="col-side flex flex-col p-5">
        <div class="mb-6">
            <h2 class="txt-title flex items-center gap-2 mb-4">
                <i data-lucide="activity" class="text-teal-500 w-5"></i> PK-VMS Pro
            </h2>
            <div class="relative">
                <input type="text" id="main-search" class="search-input" placeholder="ค้นหา HN หรือ ชื่อสัตว์..." oninput="filterPatients()">
                <i data-lucide="search" class="absolute left-3 top-3 w-4 text-gray-500"></i>
            </div>
        </div>

        <div class="flex-1 overflow-hidden flex flex-col gap-4">
            <div class="flex flex-col h-1/2">
                <div class="flex justify-between items-center mb-2">
                    <span class="txt-label">รายชื่อคนไข้ (Total: <span id="count-hn">0</span>)</span>
                </div>
                <div id="patient-list" class="flex-1 overflow-y-auto custom-scroll space-y-2 pr-1">
                    </div>
            </div>

            <div class="flex flex-col h-1/2 border-t border-white/5 pt-4">
                <span class="txt-label mb-2 flex items-center gap-2"><i data-lucide="history" class="w-3"></i> ประวัติการชำระเงิน</span>
                <div id="payment-history" class="flex-1 overflow-y-auto custom-scroll space-y-2 pr-1">
                    <p class="text-gray-600 text-center py-10 txt-body">เลือกคนไข้เพื่อดูประวัติ</p>
                </div>
            </div>
        </div>
    </div>

    <div class="col-main flex flex-col p-6">
        <div class="flex justify-between items-start mb-6">
            <div>
                <div id="view-mode-tag" class="hidden bg-amber-500/20 text-amber-500 text-[10px] px-2 py-0.5 rounded font-bold mb-1 w-fit">HISTORY VIEW (PAID)</div>
                <h1 id="display-pet-name" class="txt-title">รายการรอชำระเงิน</h1>
                <p id="display-owner-info" class="txt-body text-gray-500">กรุณาเลือกรายการจากคอลัมน์ซ้าย</p>
            </div>
            <button class="glass-card px-4 py-2 txt-body font-bold text-teal-500 border-teal-500/30">
                + เพิ่มรายการสินค้า
            </button>
        </div>

        <div class="flex-1 glass-card overflow-hidden flex flex-col border-none bg-slate-900/40">
            <div class="grid grid-cols-12 p-4 border-b border-white/5 txt-label">
                <div class="col-span-6">รายการ / การรักษา</div>
                <div class="col-span-2 text-center">จำนวน</div>
                <div class="col-span-2 text-right">หน่วยละ</div>
                <div class="col-span-2 text-right">รวม</div>
            </div>
            <div id="cart-items" class="flex-1 overflow-y-auto custom-scroll divide-y divide-white/5">
                </div>
        </div>
    </div>

    <div class="col-pay flex flex-col p-6">
        <div class="flex-1">
            <div class="space-y-4 mb-8">
                <div class="flex justify-between txt-body">
                    <span class="text-gray-400">รวมยอดเงิน</span>
                    <span id="sum-total" class="font-bold text-white">0.00</span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="txt-label text-red-400">ส่วนลด</span>
                    <input type="number" id="input-discount" class="search-input w-24 text-right p-1 font-bold" value="0" oninput="calculateNet()">
                </div>
                <div class="pt-6 border-t border-white/10 flex flex-col items-end">
                    <label class="txt-label text-teal-500 mb-1">ยอดสุทธิที่ต้องชำระ</label>
                    <div class="txt-price" id="net-total">0.00</div>
                </div>
            </div>

            <div class="space-y-4 mt-10">
                <label class="txt-label flex items-center gap-2"><i data-lucide="banknote" class="w-3"></i> รับเงินสด</label>
                <input type="number" id="received-cash" class="search-input txt-price h-16 text-center text-amber-400" placeholder="0.00" oninput="calculateChange()">
                
                <div class="numpad grid grid-cols-3 gap-2">
                    <button onclick="addCash(100)">100</button>
                    <button onclick="addCash(500)">500</button>
                    <button onclick="addCash(1000)">1000</button>
                </div>

                <div class="flex justify-between items-center pt-6 px-2">
                    <span class="txt-label">เงินทอน</span>
                    <span id="change-amount" class="text-2xl font-black text-white">0.00</span>
                </div>
            </div>
        </div>

        <button id="btn-pay" onclick="processPayment()" class="w-full h-16 bg-teal-500 rounded-xl text-navy-dark font-black text-lg hover:bg-teal-400 transition-all active:scale-95 shadow-lg shadow-teal-500/20">
            ยืนยันการชำระเงิน
        </button>
    </div>

    <script>
        lucide.createIcons();
        let allPatients = [], currentCart = [];

        window.onload = async () => {
            await fetchPatients();
        };

        // --- FETCH PATIENTS (ตรงตาม SQL: owners.hn & animals.owner_hn) ---
        async function fetchPatients() {
            try {
                const { data, error } = await db
                    .from('animals')
                    .select('pet_name, owner_hn, owners(owner_name)');
                
                if (error) throw error;
                allPatients = data || [];
                document.getElementById('count-hn').innerText = allPatients.length;
                renderPatientList(allPatients);
            } catch (err) {
                console.error("Fetch error:", err);
            }
        }

        function filterPatients() {
            const q = document.getElementById('main-search').value.toLowerCase();
            const filtered = allPatients.filter(p => 
                p.owner_hn.toLowerCase().includes(q) || 
                p.pet_name.toLowerCase().includes(q)
            );
            renderPatientList(filtered);
        }

        function renderPatientList(list) {
            const container = document.getElementById('patient-list');
            container.innerHTML = list.map(p => `
                <div class="glass-card p-3" onclick="loadPatientHistory('${p.owner_hn}', '${p.pet_name}', '${p.owners?.owner_name}')">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-teal-500 font-bold txt-body">${p.owner_hn}</span>
                        <span class="text-white font-bold text-[14px]">🐾 ${p.pet_name}</span>
                    </div>
                    <div class="text-gray-500 text-[11px] truncate">เจ้าของ: ${p.owners?.owner_name || 'ไม่ระบุ'}</div>
                </div>
            `).join('');
        }

        // --- LOAD HISTORY (แสดงรายการที่เคยชำระแล้ว) ---
        async function loadPatientHistory(hn, petName, ownerName) {
            // Update Header Information
            document.getElementById('display-pet-name').innerText = `คนไข้: ${petName}`;
            document.getElementById('display-owner-info').innerText = `HN: ${hn} | เจ้าของ: ${ownerName}`;

            const { data: records } = await db
                .from('medical_records')
                .select('*')
                .eq('owner_hn', hn)
                .order('created_at', { ascending: false });

            const historyContainer = document.getElementById('payment-history');
            if (!records || records.length === 0) {
                historyContainer.innerHTML = `<p class="text-gray-600 text-center py-10 txt-body">ไม่พบประวัติ</p>`;
                return;
            }

            historyContainer.innerHTML = records.map(r => `
                <div class="glass-card p-3 border-l-4 ${r.payment_status === 'paid' ? 'border-teal-500' : 'border-amber-500'}" 
                     onclick="viewRecordDetail('${r.id}', '${r.payment_status}')">
                    <div class="flex justify-between txt-label mb-1">
                        <span>${new Date(r.created_at).toLocaleDateString('th-TH')}</span>
                        <span class="${r.payment_status === 'paid' ? 'text-teal-500' : 'text-amber-400'}">${r.payment_status}</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-white font-bold">฿${(r.net_amount || r.total_cost).toLocaleString()}</span>
                        <i data-lucide="chevron-right" class="w-4 text-gray-700"></i>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // --- VIEW RECORD DETAIL (แสดงรายการสินค้า/ราคา ใน Column 2 & 3) ---
        async function viewRecordDetail(recordId, status) {
            const isPaid = status === 'paid';
            document.getElementById('view-mode-tag').classList.toggle('hidden', !isPaid);
            document.getElementById('btn-pay').disabled = isPaid;
            document.getElementById('btn-pay').style.opacity = isPaid ? '0.3' : '1';

            // 1. Get Master Record
            const { data: record } = await db.from('medical_records').select('*').eq('id', recordId).single();
            // 2. Get Items (ตรงตามตาราง medical_record_items)
            const { data: items } = await db.from('medical_record_items').select('*').eq('record_id', recordId);

            currentCart = items || [];
            
            // Render Cart
            const cartContainer = document.getElementById('cart-items');
            cartContainer.innerHTML = currentCart.map(item => `
                <div class="grid grid-cols-12 p-4 items-center">
                    <div class="col-span-6">
                        <div class="txt-body font-bold text-white">${item.item_name}</div>
                        <div class="text-[10px] text-gray-500 font-bold uppercase">${item.item_type}</div>
                    </div>
                    <div class="col-span-2 text-center txt-body">${item.quantity}</div>
                    <div class="col-span-2 text-right txt-body text-gray-400">${parseFloat(item.unit_price).toLocaleString()}</div>
                    <div class="col-span-2 text-right txt-body font-bold text-white">${parseFloat(item.total_price).toLocaleString()}</div>
                </div>
            `).join('');

            // Update Summary
            document.getElementById('sum-total').innerText = parseFloat(record.total_cost).toLocaleString();
            document.getElementById('input-discount').value = record.discount;
            document.getElementById('net-total').innerText = parseFloat(record.net_amount).toLocaleString();
            document.getElementById('received-cash').value = isPaid ? record.received_amount : "";
            calculateChange();
        }

        // --- MATH LOGIC ---
        function calculateNet() {
            const sum = parseFloat(document.getElementById('sum-total').innerText.replace(/,/g, '')) || 0;
            const disc = parseFloat(document.getElementById('input-discount').value) || 0;
            const net = sum - disc;
            document.getElementById('net-total').innerText = net.toLocaleString(undefined, {minimumFractionDigits: 2});
            calculateChange();
        }

        function calculateChange() {
            const net = parseFloat(document.getElementById('net-total').innerText.replace(/,/g, '')) || 0;
            const received = parseFloat(document.getElementById('received-cash').value) || 0;
            const change = received - net;
            document.getElementById('change-amount').innerText = change > 0 ? change.toLocaleString(undefined, {minimumFractionDigits: 2}) : "0.00";
        }

        function addCash(amt) {
            const input = document.getElementById('received-cash');
            input.value = (parseFloat(input.value) || 0) + amt;
            calculateChange();
        }
    </script>
</body>
</html>
