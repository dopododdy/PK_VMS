<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PK-VMS Pro | Smart POS</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>

    <style>
        :root { --navy-dark: #020617; --navy-panel: #0f172a; --teal-accent: #10b981; --border: rgba(255, 255, 255, 0.06); }
        * { font-family: "Sarabun", sans-serif !important; -webkit-font-smoothing: antialiased; }
        body { background: var(--navy-dark); color: #e2e8f0; height: 100vh; overflow: hidden; font-size: 14px; }

        /* Column Controls */
        .col-side { width: 22%; background: var(--navy-dark); border-right: 1px solid var(--border); }
        .col-main { width: 53%; background: rgba(0,0,0,0.2); }
        .col-pay { width: 25%; background: var(--navy-panel); border-left: 1px solid var(--border); }

        /* Uniform Font Sizes */
        .text-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #64748b; }
        .text-body { font-size: 14px; }
        .text-title { font-size: 18px; font-weight: 800; color: #ffffff; }
        .text-price-lg { font-size: 28px; font-weight: 900; letter-spacing: -1px; }

        /* UI Components */
        .glass-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 12px; transition: 0.2s; }
        .glass-card:hover { border-color: var(--teal-accent); background: rgba(16, 185, 129, 0.05); cursor: pointer; }
        .glass-card.active { border-color: var(--teal-accent); background: rgba(16, 185, 129, 0.1); }

        .search-box { background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 10px; width: 100%; padding: 10px 12px; outline: none; }
        .search-box:focus { border-color: var(--teal-accent); box-shadow: 0 0 0 2px rgba(16,185,129,0.1); }

        /* Scrollbar */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .numpad button { background: rgba(255,255,255,0.05); height: 54px; border-radius: 10px; font-weight: 700; font-size: 18px; }
        .numpad button:active { background: var(--teal-accent); transform: scale(0.98); }

        .btn-primary { background: linear-gradient(135deg, #10b981, #059669); font-weight: 800; transition: 0.3s; }
        .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; filter: grayscale(1); }

        .history-tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: rgba(56, 189, 248, 0.1); color: #38bdf8; }
    </style>
</head>
<body class="flex overflow-hidden">

    <div class="col-side flex flex-col p-5">
        <div class="mb-6">
            <h2 class="text-title flex items-center gap-2 mb-4">
                <i data-lucide="shield-check" class="text-teal-500"></i> PK-VMS POS
            </h2>
            <div class="relative">
                <input type="text" id="master-search" class="search-box text-body pl-10" placeholder="ค้นหา HN หรือ ชื่อเจ้าของ..." oninput="filterHN()">
                <i data-lucide="search" class="absolute left-3 top-3 w-4 text-gray-500"></i>
            </div>
        </div>

        <div class="flex-1 overflow-hidden flex flex-col gap-4">
            <section class="flex flex-col h-1/2">
                <label class="text-label mb-2 flex justify-between">
                    <span>รายชื่อคนไข้ (HN)</span>
                    <span id="hn-count" class="text-teal-500">0</span>
                </label>
                <div id="hn-master-list" class="flex-1 overflow-y-auto custom-scroll space-y-2 pr-1">
                    </div>
            </section>

            <section class="flex flex-col h-1/2 border-t border-white/5 pt-4">
                <label class="text-label mb-2 flex items-center gap-2">
                    <i data-lucide="history" class="w-3"></i> ประวัติการชำระเงิน
                </label>
                <div id="hn-history-list" class="flex-1 overflow-y-auto custom-scroll space-y-2 pr-1">
                    <p class="text-gray-600 text-center py-10 text-xs">เลือก HN เพื่อดูประวัติ</p>
                </div>
            </section>
        </div>
    </div>

    <div class="col-main flex flex-col p-6">
        <div class="flex justify-between items-center mb-6">
            <div>
                <span id="record-mode-tag" class="hidden bg-blue-500/20 text-blue-400 text-[10px] px-2 py-1 rounded font-bold mb-1 uppercase tracking-tighter">โหมดพิมพ์ซ้ำ (Paid)</span>
                <h1 id="active-title" class="text-title">กรุณาเลือกรายการ</h1>
                <p id="active-sub" class="text-body text-gray-500">รอดำเนินการ...</p>
            </div>
            <button id="btn-add-item" onclick="openCatalog()" class="glass-card px-4 py-2 text-body font-bold flex items-center gap-2 border-blue-500/30 text-blue-400 hover:bg-blue-500 hover:text-white">
                <i data-lucide="plus" class="w-4"></i> เพิ่มสินค้า
            </button>
        </div>

        <div class="flex-1 glass-card overflow-hidden flex flex-col border-none bg-slate-900/40">
            <div class="grid grid-cols-12 p-4 border-b border-white/5 text-label">
                <div class="col-span-6">รายการสินค้า/บริการ</div>
                <div class="col-span-2 text-center">จำนวน</div>
                <div class="col-span-2 text-right">ราคา/หน่วย</div>
                <div class="col-span-2 text-right">รวม</div>
            </div>
            <div id="cart-items-container" class="flex-1 overflow-y-auto custom-scroll divide-y divide-white/5">
                </div>
        </div>
    </div>

    <div class="col-pay flex flex-col p-6">
        <div class="flex-1">
            <div class="space-y-4 mb-8">
                <div class="flex justify-between text-body text-gray-400">
                    <span>รวมเงินรวม</span>
                    <span id="sum-price" class="text-white font-bold">0.00</span>
                </div>
                <div class="flex justify-between items-center text-red-400">
                    <span class="text-label">ส่วนลด (Discount)</span>
                    <input type="number" id="discount-val" class="search-box w-24 text-right text-body font-bold text-white border-red-500/20" value="0" oninput="calculateTotal()">
                </div>
                <div class="pt-6 border-t border-white/10 flex flex-col items-end">
                    <label class="text-label text-teal-500 mb-1">ยอดสุทธิ</label>
                    <div class="text-price-lg text-white" id="net-total">0.00</div>
                </div>
            </div>

            <div class="space-y-4 mt-8">
                <label class="text-label flex items-center gap-2"><i data-lucide="banknote" class="w-3"></i> รับเงินสด</label>
                <input type="number" id="received-amount" class="search-box text-price-lg h-20 text-center text-amber-400" placeholder="0.00" oninput="calculateChange()">
                
                <div class="numpad grid grid-cols-3 gap-2">
                    <button onclick="quickCash(100)">100</button>
                    <button onclick="quickCash(500)">500</button>
                    <button onclick="quickCash(1000)">1000</button>
                </div>

                <div class="flex justify-between items-center pt-4 px-2">
                    <span class="text-label">เงินทอน</span>
                    <span id="change-val" class="text-2xl font-black text-white">0.00</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-5 gap-3 h-16 mt-6">
            <button class="col-span-2 glass-card flex flex-col items-center justify-center text-gray-400 hover:text-white">
                <i data-lucide="printer" class="w-5"></i>
                <span style="font-size:10px">Preview</span>
            </button>
            <button id="btn-submit" onclick="confirmPayment()" class="col-span-3 btn-primary rounded-xl text-white text-body active:scale-95">
                ยืนยันการชำระ
            </button>
        </div>
    </div>

    <script>
        lucide.createIcons();
        let masterHNs = [], activeCart = [], currentHN = null, isReprint = false;

        window.onload = async () => {
            await fetchAllOwners();
            // Optional: load pending bills automatically
        };

        // --- FETCHING DATA ---
        async function fetchAllOwners() {
            const { data } = await db.from('owners').select('owner_hn, owner_name').order('owner_hn');
            masterHNs = data || [];
            renderHNList(masterHNs);
            document.getElementById('hn-count').innerText = masterHNs.length;
        }

        function filterHN() {
            const q = document.getElementById('master-search').value.toLowerCase();
            const filtered = masterHNs.filter(o => o.owner_hn.includes(q) || o.owner_name.toLowerCase().includes(q));
            renderHNList(filtered);
        }

        function renderHNList(list) {
            const container = document.getElementById('hn-master-list');
            container.innerHTML = list.map(o => `
                <div class="glass-card p-3 mb-2" onclick="selectHN('${o.owner_hn}', '${o.owner_name}')">
                    <div class="flex justify-between items-center">
                        <span class="text-teal-500 font-bold text-body">${o.owner_hn}</span>
                        <i data-lucide="chevron-right" class="w-3 text-gray-600"></i>
                    </div>
                    <div class="text-gray-300 font-medium truncate">${o.owner_name}</div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // --- SELECTING HN & HISTORY ---
        async function selectHN(hn, name) {
            currentHN = hn;
            document.querySelectorAll('#hn-master-list .glass-card').forEach(el => el.classList.remove('active'));
            // Find and highlight active HN card if needed

            // 1. Fetch History for this HN
            const { data: history } = await db.from('medical_records')
                .select('id, paid_at, net_amount, payment_status, animals(pet_name)')
                .eq('owner_hn', hn)
                .order('created_at', { ascending: false });

            const historyContainer = document.getElementById('hn-history-list');
            if (!history || history.length === 0) {
                historyContainer.innerHTML = `<p class="text-gray-600 text-center py-10 text-xs">ไม่พบประวัติ</p>`;
            } else {
                historyContainer.innerHTML = history.map(h => `
                    <div class="glass-card p-3 border-l-4 ${h.payment_status === 'paid' ? 'border-teal-500' : 'border-amber-500'}" 
                         onclick="loadRecord('${h.id}', ${h.payment_status === 'paid'})">
                        <div class="flex justify-between text-[10px] mb-1">
                            <span class="text-gray-500">${new Date(h.paid_at || h.created_at).toLocaleDateString('th-TH')}</span>
                            <span class="${h.payment_status === 'paid' ? 'text-teal-500' : 'text-amber-500'} font-bold uppercase">${h.payment_status || 'pending'}</span>
                        </div>
                        <div class="text-body font-bold text-white flex justify-between">
                            <span>🐾 ${h.animals?.pet_name || '-'}</span>
                            <span>฿${h.net_amount?.toLocaleString() || '0'}</span>
                        </div>
                    </div>
                `).join('');
            }
            lucide.createIcons();
        }

        // --- LOADING RECORD TO MAIN UI ---
        async function loadRecord(recordId, paidStatus) {
            isReprint = paidStatus;
            const { data: record } = await db.from('medical_records').select('*, owners(*), animals(*)').eq('id', recordId).single();
            const { data: items } = await db.from('medical_record_items').select('*').eq('record_id', recordId);

            // Update UI State
            document.getElementById('record-mode-tag').classList.toggle('hidden', !isReprint);
            document.getElementById('btn-add-item').classList.toggle('hidden', isReprint);
            document.getElementById('received-amount').disabled = isReprint;
            document.getElementById('discount-val').disabled = isReprint;
            document.getElementById('btn-submit').innerText = isReprint ? "พิมพ์ใบเสร็จอีกครั้ง" : "ยืนยันการชำระ";

            // Header Info
            document.getElementById('active-title').innerText = `คุณ${record.owners.owner_name}`;
            document.getElementById('active-sub').innerText = `HN: ${record.owner_hn} | สัตว์เลี้ยง: ${record.animals.pet_name}`;

            // Map Items to Cart
            activeCart = items.map(i => ({
                name: i.item_name, qty: i.quantity, price: i.unit_price, total: i.total_price, type: i.item_type
            }));

            // Values
            document.getElementById('discount-val').value = record.discount || 0;
            document.getElementById('received-amount').value = isReprint ? record.received_amount : "";
            
            renderCart();
        }

        function renderCart() {
            const container = document.getElementById('cart-items-container');
            container.innerHTML = activeCart.map(item => `
                <div class="grid grid-cols-12 p-4 items-center group hover:bg-white/[0.02]">
                    <div class="col-span-6">
                        <div class="text-body font-bold text-white">${item.name}</div>
                        <div class="text-[10px] text-gray-500 font-black uppercase tracking-widest">${item.type}</div>
                    </div>
                    <div class="col-span-2 text-center text-body font-bold">${item.qty}</div>
                    <div class="col-span-2 text-right text-body text-gray-400">${parseFloat(item.price).toLocaleString()}</div>
                    <div class="col-span-2 text-right text-body font-bold text-white">${(item.qty * item.price).toLocaleString()}</div>
                </div>
            `).join('');
            calculateTotal();
        }

        // --- CALCULATIONS ---
        function calculateTotal() {
            const sum = activeCart.reduce((acc, i) => acc + (i.price * i.qty), 0);
            const disc = parseFloat(document.getElementById('discount-val').value) || 0;
            const net = Math.max(0, sum - disc);
            
            document.getElementById('sum-price').innerText = sum.toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('net-total').innerText = net.toLocaleString(undefined, {minimumFractionDigits: 2});
            calculateChange();
        }

        function calculateChange() {
            const net = parseFloat(document.getElementById('net-total').innerText.replace(/,/g, ''));
            const received = parseFloat(document.getElementById('received-amount').value) || 0;
            const change = received - net;
            document.getElementById('change-val').innerText = change >= 0 ? change.toLocaleString(undefined, {minimumFractionDigits: 2}) : "0.00";
        }

        function quickCash(amt) {
            const el = document.getElementById('received-amount');
            el.value = (parseFloat(el.value) || 0) + amt;
            calculateChange();
        }
    </script>
</body>
</html>
