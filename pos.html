<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PK-VMS Pro | Smart POS</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>

    <style>
        :root { 
            --navy-dark: #020617; 
            --navy-panel: #0f172a; 
            --teal-accent: #10b981; 
            --border: rgba(255, 255, 255, 0.08); 
        }
        * { font-family: "Sarabun", sans-serif !important; }
        body { background: var(--navy-dark); color: #e2e8f0; height: 100vh; overflow: hidden; }

        /* Typography */
        .txt-label { font-size: 12px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.025em; }
        .txt-body { font-size: 14px; color: #cbd5e1; }
        .txt-title { font-size: 18px; font-weight: 800; color: #ffffff; }
        .txt-price { font-size: 32px; font-weight: 900; color: #ffffff; letter-spacing: -1px; }

        /* Layout Structure */
        .col-side { width: 23%; border-right: 1px solid var(--border); }
        .col-main { width: 52%; background: rgba(0,0,0,0.2); }
        .col-pay { width: 25%; background: var(--navy-panel); border-left: 1px solid var(--border); }

        .glass-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 12px; transition: 0.2s; cursor: pointer; }
        .glass-card:hover { border-color: var(--teal-accent); background: rgba(16, 185, 129, 0.05); }
        .glass-card.active { border-color: var(--teal-accent); background: rgba(16, 185, 129, 0.1); }

        .search-input { background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 10px; width: 100%; padding: 10px 12px 10px 40px; outline: none; font-size: 14px; color: white; }
        .search-input:focus { border-color: var(--teal-accent); }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .numpad button { background: rgba(255,255,255,0.05); height: 50px; border-radius: 10px; font-weight: 800; font-size: 18px; transition: 0.1s; }
        .numpad button:active { background: var(--teal-accent); color: var(--navy-dark); transform: scale(0.95); }
        
        /* Utility for print button */
        .btn-print { background-color: #2563eb !important; color: white !important; box-shadow: 0 4px 14px rgba(37, 99, 235, 0.3) !important; }
        .btn-print:hover { background-color: #1d4ed8 !important; }

        .btn-home { background: rgba(255,255,255,0.1); border-radius: 8px; padding: 8px; transition: 0.2s; }
        .btn-home:hover { background: var(--teal-accent); color: var(--navy-dark); }
    </style>
</head>
<body class="flex">

    <div class="col-side flex flex-col p-5">
        <div class="mb-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="txt-title flex items-center gap-2">
                    <i data-lucide="activity" class="text-teal-500 w-5"></i> PK-VMS POS
                </h2>
                <button onclick="window.location.href='index.html'" class="btn-home text-gray-300" title="กลับหน้าหลัก">
                    <i data-lucide="home" class="w-5 h-5"></i>
                </button>
            </div>
            
            <div class="relative">
                <input type="text" id="main-search" class="search-input" placeholder="ค้นหา HN หรือ ชื่อสัตว์..." oninput="filterPatients()">
                <i data-lucide="search" class="absolute left-3 top-3 w-4 text-gray-500"></i>
            </div>
        </div>

        <div class="flex-1 overflow-hidden flex flex-col gap-4">
            <div class="flex flex-col h-1/2">
                <div class="flex justify-between items-center mb-2">
                    <span class="txt-label">รายชื่อคนไข้ (Total: <span id="count-hn">0</span>)</span>
                </div>
                <div id="patient-list" class="flex-1 overflow-y-auto custom-scroll space-y-2 pr-1">
                    </div>
            </div>

            <div class="flex flex-col h-1/2 border-t border-white/5 pt-4">
                <span class="txt-label mb-2 flex items-center gap-2"><i data-lucide="history" class="w-3"></i> ประวัติการชำระเงิน</span>
                <div id="payment-history" class="flex-1 overflow-y-auto custom-scroll space-y-2 pr-1">
                    <p class="text-gray-600 text-center py-10 txt-body">เลือกคนไข้เพื่อดูประวัติ</p>
                </div>
            </div>
        </div>
    </div>

    <div class="col-main flex flex-col p-6">
        <div class="flex justify-between items-start mb-6">
            <div>
                <div id="view-mode-tag" class="hidden bg-blue-500/20 text-blue-400 text-[10px] px-2 py-0.5 rounded font-bold mb-1 w-fit uppercase">Paid & Reprint Mode</div>
                <h1 id="display-pet-name" class="txt-title text-2xl">รายการรอชำระเงิน</h1>
                <p id="display-owner-info" class="txt-body text-gray-500">กรุณาเลือกรายการจากคอลัมน์ซ้าย</p>
            </div>
            <button class="glass-card px-4 py-2 txt-body font-bold text-teal-500 border-teal-500/30">
                + เพิ่มรายการสินค้า
            </button>
        </div>

        <div class="flex-1 glass-card overflow-hidden flex flex-col border-none bg-slate-900/40">
            <div class="grid grid-cols-12 p-4 border-b border-white/5 txt-label">
                <div class="col-span-6">รายการ / การรักษา</div>
                <div class="col-span-2 text-center">จำนวน</div>
                <div class="col-span-2 text-right">หน่วยละ</div>
                <div class="col-span-2 text-right">รวม</div>
            </div>
            <div id="cart-items" class="flex-1 overflow-y-auto custom-scroll divide-y divide-white/5">
                </div>
        </div>
    </div>

    <div class="col-pay flex flex-col p-6">
        <div class="flex-1">
            <div class="space-y-4 mb-8">
                <div class="flex justify-between txt-body">
                    <span class="text-gray-400">รวมยอดเงิน</span>
                    <span id="sum-total" class="font-bold text-white text-lg">0.00</span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="txt-label text-red-400">ส่วนลด (฿)</span>
                    <input type="number" id="input-discount" class="search-input w-24 text-right p-1 font-bold" value="0" oninput="calculateNet()">
                </div>
                <div class="pt-6 border-t border-white/10 flex flex-col items-end">
                    <label class="txt-label text-teal-500 mb-1">ยอดสุทธิที่ต้องชำระ</label>
                    <div class="txt-price" id="net-total">0.00</div>
                </div>
            </div>

            <div class="space-y-4 mt-10">
                <label class="txt-label flex items-center gap-2"><i data-lucide="banknote" class="w-3"></i> รับเงินสด</label>
                <input type="number" id="received-cash" class="search-input txt-price h-16 text-center text-amber-400" placeholder="0.00" oninput="calculateChange()">
                
                <div class="numpad grid grid-cols-3 gap-2">
                    <button onclick="addCash(100)">100</button>
                    <button onclick="addCash(500)">500</button>
                    <button onclick="addCash(1000)">1000</button>
                </div>

                <div class="flex justify-between items-center pt-6 px-2">
                    <span class="txt-label">เงินทอน</span>
                    <span id="change-amount" class="text-2xl font-black text-white">0.00</span>
                </div>
            </div>
        </div>

        <button id="btn-pay" onclick="processPayment()" class="w-full h-16 bg-teal-500 rounded-xl text-navy-dark font-black text-lg hover:bg-teal-400 transition-all active:scale-95 shadow-lg shadow-teal-500/20 flex items-center justify-center gap-2">
            <i data-lucide="check-circle" class="w-5" id="btn-icon"></i>
            <span id="btn-text">ยืนยันการชำระเงิน</span>
        </button>
    </div>

    <script>
        lucide.createIcons();
        let allPatients = [], currentCart = [];
        let activeRecordId = null; 
        let activePatient = null;

        window.onload = async () => {
            await fetchPatients();
        };

        // --- 1. FETCH & SEARCH PATIENTS ---
        async function fetchPatients() {
            try {
                const { data, error } = await db
                    .from('animals')
                    .select('pet_name, owner_hn, owners(owner_name)');
                
                if (error) throw error;
                allPatients = data || [];
                document.getElementById('count-hn').innerText = allPatients.length;
                renderPatientList(allPatients);
            } catch (err) {
                console.error("Fetch error:", err);
            }
        }

        function filterPatients() {
            const q = document.getElementById('main-search').value.toLowerCase();
            const filtered = allPatients.filter(p => 
                p.owner_hn.toLowerCase().includes(q) || 
                p.pet_name.toLowerCase().includes(q)
            );
            renderPatientList(filtered);
        }

        function renderPatientList(list) {
            const container = document.getElementById('patient-list');
            container.innerHTML = list.map(p => `
                <div class="glass-card p-3" onclick="loadPatientHistory('${p.owner_hn}', '${p.pet_name}', '${p.owners?.owner_name}')">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-teal-500 font-bold txt-body">${p.owner_hn}</span>
                        <span class="text-white font-bold text-[14px]">🐾 ${p.pet_name}</span>
                    </div>
                    <div class="text-gray-500 text-[11px] truncate">เจ้าของ: ${p.owners?.owner_name || 'ไม่ระบุ'}</div>
                </div>
            `).join('');
        }

        // --- 2. LOAD HISTORY ---
        async function loadPatientHistory(hn, petName, ownerName) {
            activePatient = { hn, petName, ownerName };
            document.getElementById('display-pet-name').innerText = `คนไข้: ${petName}`;
            document.getElementById('display-owner-info').innerText = `HN: ${hn} | เจ้าของ: ${ownerName}`;

            const { data: records } = await db
                .from('medical_records')
                .select('*')
                .eq('owner_hn', hn)
                .order('created_at', { ascending: false });

            const historyContainer = document.getElementById('payment-history');
            if (!records || records.length === 0) {
                historyContainer.innerHTML = `<p class="text-gray-600 text-center py-10 txt-body">ไม่พบประวัติ</p>`;
                return;
            }

            historyContainer.innerHTML = records.map(r => `
                <div class="glass-card p-3 border-l-4 ${r.payment_status === 'paid' ? 'border-teal-500' : 'border-amber-500'} mb-2" 
                     onclick="viewRecordDetail('${r.id}', '${r.payment_status}')">
                    <div class="flex justify-between txt-label mb-1">
                        <span>${new Date(r.created_at).toLocaleDateString('th-TH')}</span>
                        <span class="${r.payment_status === 'paid' ? 'text-teal-500' : 'text-amber-400'}">${r.payment_status.toUpperCase()}</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-white font-bold">฿${(r.net_amount || r.total_cost).toLocaleString()}</span>
                        <i data-lucide="chevron-right" class="w-4 text-gray-700"></i>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // --- 3. VIEW RECORD & TOGGLE UI ---
        async function viewRecordDetail(recordId, status) {
            activeRecordId = recordId;
            const isPaid = status === 'paid';
            
            const btnPay = document.getElementById('btn-pay');
            const btnText = document.getElementById('btn-text');
            const btnIcon = document.getElementById('btn-icon');
            
            document.getElementById('view-mode-tag').classList.toggle('hidden', !isPaid);
            
            if (isPaid) {
                btnText.innerText = "พิมพ์ใบเสร็จ (Reprint)";
                btnIcon.setAttribute('data-lucide', 'printer');
                btnPay.classList.add('btn-print');
                btnPay.classList.remove('bg-teal-500');
                btnPay.onclick = () => printReceipt(recordId);
            } else {
                btnText.innerText = "ยืนยันการชำระเงิน";
                btnIcon.setAttribute('data-lucide', 'check-circle');
                btnPay.classList.remove('btn-print');
                btnPay.classList.add('bg-teal-500');
                btnPay.onclick = processPayment; 
            }
            lucide.createIcons();

            const { data: record } = await db.from('medical_records').select('*').eq('id', recordId).single();
            const { data: items } = await db.from('medical_record_items').select('*').eq('record_id', recordId);

            currentCart = items || [];
            const cartContainer = document.getElementById('cart-items');
            cartContainer.innerHTML = currentCart.map(item => `
                <div class="grid grid-cols-12 p-4 items-center">
                    <div class="col-span-6">
                        <div class="txt-body font-bold text-white">${item.item_name}</div>
                        <div class="text-[10px] text-gray-500 font-bold uppercase">${item.item_type}</div>
                    </div>
                    <div class="col-span-2 text-center txt-body">${item.quantity}</div>
                    <div class="col-span-2 text-right txt-body text-gray-400">${parseFloat(item.unit_price).toLocaleString()}</div>
                    <div class="col-span-2 text-right txt-body font-bold text-white">${parseFloat(item.total_price).toLocaleString()}</div>
                </div>
            `).join('');

            document.getElementById('input-discount').disabled = isPaid;
            document.getElementById('received-cash').disabled = isPaid;

            document.getElementById('sum-total').innerText = parseFloat(record.total_cost).toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('input-discount').value = record.discount || 0;
            document.getElementById('net-total').innerText = parseFloat(record.net_amount || record.total_cost).toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('received-cash').value = isPaid ? record.received_amount : "";
            calculateChange();
        }

        // --- 4. PAYMENT PROCESS ---
        async function processPayment() {
            if (!activeRecordId) return alert("กรุณาเลือกรายการชำระเงินก่อน");

            const netTotal = parseFloat(document.getElementById('net-total').innerText.replace(/,/g, ''));
            const receivedCash = parseFloat(document.getElementById('received-cash').value) || 0;
            const discount = parseFloat(document.getElementById('input-discount').value) || 0;
            const changeAmount = receivedCash - netTotal;

            if (receivedCash < netTotal) {
                return alert("จำนวนเงินที่รับมาไม่เพียงพอ");
            }

            const dateStr = new Date().toISOString().slice(0,10).replace(/-/g, '');
            const randomPad = Math.floor(1000 + Math.random() * 9000);
            const receiptNo = `INV${dateStr}-${randomPad}`;

            try {
                const { error } = await db.from('medical_records').update({
                    payment_status: 'paid',
                    receipt_no: receiptNo,
                    discount: discount,
                    net_amount: netTotal,
                    received_amount: receivedCash,
                    change_amount: changeAmount,
                    paid_at: new Date().toISOString()
                }).eq('id', activeRecordId);

                if (error) throw error;

                alert("ชำระเงินสำเร็จ!");
                printReceipt(activeRecordId);
                if (activePatient) loadPatientHistory(activePatient.hn, activePatient.petName, activePatient.ownerName);
                
            } catch (error) {
                console.error("Payment Error:", error);
                alert("เกิดข้อผิดพลาดในการบันทึกข้อมูล: " + error.message);
            }
        }

        // --- 5. DYNAMIC PRINT RECEIPT (ดึงจาก Template Designer) ---
async function printReceipt(recordId) {
    try {
        // 1. ดึงข้อมูลบันทึกการรักษาและรายการสินค้า
        const { data: record } = await db.from('medical_records')
            .select('*, animals(pet_name, breed, species, weight, gender), owners(owner_name, address)')
            .eq('id', recordId).single();
            
        const { data: items } = await db.from('medical_record_items').select('*').eq('record_id', recordId);

        // 2. ดึง Template ที่ออกแบบไว้จากฐานข้อมูล
        const { data: template } = await db.from('print_templates')
            .select('config')
            .eq('template_type', 'thermal_receipt')
            .single();

        if (!template || !template.config) {
            alert("ไม่พบรูปแบบใบเสร็จ (thermal_receipt) ในระบบ กรุณาตั้งค่าในหน้า Designer ก่อน");
            return;
        }

        const config = template.config;
        const pw = config.width || 80;
        const ph = config.height || 50;

        // 3. เตรียมข้อมูลสำหรับ Replace Variables {{...}}
        const printData = {
            clinic_name: "PK-VMS Animal Clinic", // ควรดึงจาก Setting หรือ MasterData
            clinic_address: "123 ถ.นเรศวร ต.ในเมือง อ.เมือง จ.พิษณุโลก 65000",
            phone: "081-999-8888",
            owner_name: record.owners?.owner_name || "-",
            owner_address: record.owners?.address || "-",
            pet_name: record.animals?.pet_name || "-",
            species: record.animals?.species || "-",
            hn: record.owner_hn || "-",
            weight: record.animals?.weight || "-",
            receipt_no: record.receipt_no || record.id.slice(0,8),
            total_price: parseFloat(record.total_cost).toLocaleString(undefined, {minimumFractionDigits: 2}),
            discount_val: parseFloat(record.discount || 0).toLocaleString(undefined, {minimumFractionDigits: 2}),
            net_total: parseFloat(record.net_amount).toLocaleString(undefined, {minimumFractionDigits: 2}),
            received_amount: parseFloat(record.received_amount || 0).toLocaleString(undefined, {minimumFractionDigits: 2}),
            change_amount: parseFloat(record.change_amount || 0).toLocaleString(undefined, {minimumFractionDigits: 2}),
            date: new Date(record.paid_at || record.created_at).toLocaleDateString('th-TH'),
            time: new Date(record.paid_at || record.created_at).toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit'})
        };

        // สร้าง HTML Table สำหรับรายการสินค้า
        const itemsTableHtml = `
            <table style="width: 100%; border-collapse:collapse; font-family:'Sarabun'; font-size: 10pt; color:black; margin-top:2mm;">
                ${items.map(item => `
                    <tr>
                        <td style="padding:1mm 0;">${item.item_name} x ${item.quantity}</td>
                        <td style="text-align:right;">${parseFloat(item.total_price).toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                    </tr>
                `).join('')}
            </table>`;

        // 4. ประมวลผล Logic "Dynamic Push" (คัดลอกจาก Designer)
        const sortedLines = [...config.lines].sort((a,b) => a.y - b.y);
        let pushOffset = 0;

        const printElements = sortedLines.map(l => {
            // คำนวณความสูงเผื่อ (Line Height) ประมาณ 1.4 เท่าของขนาดฟอนต์
            const lineH_mm = parseFloat(l.size || 12) * 0.35 * 1.4;
            const currentY = parseFloat(l.y) + pushOffset;
            
            let style = `top:${currentY}mm; font-family:${l.font || 'Sarabun'}; font-size:${l.size || 12}pt; font-weight:${l.bold ? 'bold' : 'normal'}; font-style:${l.italic ? 'italic' : 'normal'}; position:absolute; color:black; line-height:1.4; white-space:pre-wrap;`;
            
            const boxWidthMm = (l.w ? l.w : (pw - (l.x * 2)));
            style += `width:${boxWidthMm}mm;`;

            // ถ้าเจอตัวแปร items_list ให้บวก pushOffset เพิ่มตามจำนวนรายการ
            if (l.text && l.text.includes("{{items_list}}")) {
                pushOffset += (items.length - 1) * 6; // สมมติแต่ละบรรทัดสินค้าสูงประมาณ 6mm
            }

            if (l.type === 'text') {
                if (l.align === 'center') style += `left:0; width:100%; text-align:center;`;
                else if (l.align === 'right') style += `left:0; width:100%; text-align:right; padding-right:${l.x}mm;`;
                else style += `left:${l.x}mm;`;

                // Replace variables
                let content = l.text.replace(/\{\{(.*?)\}\}/g, (match, key) => {
                    const k = key.trim();
                    if (k === 'items_list') return itemsTableHtml;
                    return printData[k] || match;
                });

                return `<div style="${style}">${content}</div>`;
            } else if (l.type === 'rect') {
                return `<div style="top:${currentY}mm; left:${l.x}mm; width:${l.w}mm; height:${l.h}mm; border:1px solid black; border-radius:${l.radius || 0}mm; position:absolute;"></div>`;
            } else if (l.type === 'image') {
                let iStyle = `top:${currentY}mm; left:${l.x}mm; width:${l.w}mm; height:${l.h}mm; object-fit:contain; position:absolute;`;
                if (l.align === 'center') iStyle = `top:${currentY}mm; left:50%; transform:translateX(-50%); width:${l.w}mm; height:${l.h}mm; object-fit:contain; position:absolute;`;
                return `<img src="${l.url}" style="${iStyle}">`;
            }
        }).join('');

        // 5. สั่งพิมพ์
        const win = window.open('', '_blank', 'width=800,height=600');
        win.document.write(`
            <html>
            <head>
                <style>
                    @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap');
                    body { margin: 0; padding: 0; background: white; }
                    .page { position: relative; width: ${pw}mm; height: auto; min-height: ${ph}mm; overflow: hidden; }
                    @media print { @page { size: ${pw}mm auto; margin: 0; } }
                </style>
            </head>
            <body>
                <div class="page">${printElements}</div>
                <script>
                    window.onload = function() {
                        setTimeout(() => { window.print(); window.close(); }, 500);
                    };
                <\/script>
            </body>
            </html>
        `);
        win.document.close();

    } catch (err) {
        console.error("Print Error:", err);
        alert("เกิดข้อผิดพลาดในการพิมพ์: " + err.message);
    }
}

        // --- MATH CALCULATIONS ---
        function calculateNet() {
            const sumText = document.getElementById('sum-total').innerText.replace(/,/g, '');
            const sum = parseFloat(sumText) || 0;
            const disc = parseFloat(document.getElementById('input-discount').value) || 0;
            const net = sum - disc;
            document.getElementById('net-total').innerText = net.toLocaleString(undefined, {minimumFractionDigits: 2});
            calculateChange();
        }

        function calculateChange() {
            const netText = document.getElementById('net-total').innerText.replace(/,/g, '');
            const net = parseFloat(netText) || 0;
            const received = parseFloat(document.getElementById('received-cash').value) || 0;
            const change = received - net;
            document.getElementById('change-amount').innerText = change > 0 ? change.toLocaleString(undefined, {minimumFractionDigits: 2}) : "0.00";
        }

        function addCash(amt) {
            const input = document.getElementById('received-cash');
            input.value = (parseFloat(input.value) || 0) + amt;
            calculateChange();
        }
    </script>
</body>
</html>
