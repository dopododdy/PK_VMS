<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PK-VMS Pro | Smart POS</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>

    <style>
        :root { 
            --navy-dark: #020617; 
            --navy-panel: #0f172a; 
            --teal-accent: #10b981; 
            --border: rgba(255, 255, 255, 0.08); 
        }
        * { font-family: "Sarabun", sans-serif !important; }
        body { background: var(--navy-dark); color: #e2e8f0; height: 100vh; overflow: hidden; }

        /* Typography */
        .txt-label { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
        .txt-body { font-size: 14px; color: #cbd5e1; }
        .txt-title { font-size: 18px; font-weight: 800; color: #ffffff; }
        .txt-price { font-size: 32px; font-weight: 900; color: #ffffff; letter-spacing: -1px; }

        /* Layout */
        .col-side { width: 23%; border-right: 1px solid var(--border); }
        .col-main { width: 52%; background: rgba(0,0,0,0.2); }
        .col-pay { width: 25%; background: var(--navy-panel); border-left: 1px solid var(--border); }

        .glass-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 12px; transition: 0.2s; cursor: pointer; }
        .glass-card:hover { border-color: var(--teal-accent); background: rgba(16, 185, 129, 0.05); }
        .glass-card.active { border-color: var(--teal-accent); background: rgba(16, 185, 129, 0.1); }

        .search-input { background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 10px; width: 100%; padding: 10px 12px 10px 40px; outline: none; font-size: 14px; color: white; }
        .search-input:focus { border-color: var(--teal-accent); }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .numpad button { background: rgba(255,255,255,0.05); height: 50px; border-radius: 10px; font-weight: 800; font-size: 18px; transition: 0.1s; }
        .numpad button:active { background: var(--teal-accent); color: var(--navy-dark); transform: scale(0.95); }
        
        .btn-print { background-color: #2563eb !important; color: white !important; box-shadow: 0 4px 14px rgba(37, 99, 235, 0.3) !important; }
        .btn-print:hover { background-color: #1d4ed8 !important; }

        .btn-home { background: rgba(255,255,255,0.1); border-radius: 8px; padding: 8px; transition: 0.2s; }
        .btn-home:hover { background: var(--teal-accent); color: var(--navy-dark); }
    </style>
</head>
<body class="flex">

    <div class="col-side flex flex-col p-5">
        <div class="mb-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="txt-title flex items-center gap-2">
                    <i data-lucide="activity" class="text-teal-500 w-5"></i> PK-VMS POS
                </h2>
                <button onclick="window.location.href='index.html'" class="btn-home text-gray-300"><i data-lucide="home" class="w-5 h-5"></i></button>
            </div>
            <div class="relative">
                <input type="text" id="main-search" class="search-input" placeholder="ค้นหา HN หรือ ชื่อสัตว์..." oninput="filterPatients()">
                <i data-lucide="search" class="absolute left-3 top-3 w-4 text-gray-500"></i>
            </div>
        </div>
        <div class="flex-1 overflow-hidden flex flex-col gap-4">
            <div class="flex flex-col h-1/2">
                <span class="txt-label mb-2">รายชื่อคนไข้ (<span id="count-hn">0</span>)</span>
                <div id="patient-list" class="flex-1 overflow-y-auto custom-scroll space-y-2 pr-1"></div>
            </div>
            <div class="flex flex-col h-1/2 border-t border-white/5 pt-4">
                <span class="txt-label mb-2">ประวัติการชำระเงิน</span>
                <div id="payment-history" class="flex-1 overflow-y-auto custom-scroll space-y-2 pr-1">
                    <p class="text-gray-600 text-center py-10 text-xs">เลือกคนไข้เพื่อดูประวัติ</p>
                </div>
            </div>
        </div>
    </div>

    <div class="col-main flex flex-col p-6">
        <div class="flex justify-between items-start mb-6">
            <div>
                <div id="view-mode-tag" class="hidden bg-blue-500/20 text-blue-400 text-[10px] px-2 py-0.5 rounded font-bold mb-1 uppercase">Paid / Reprint Mode</div>
                <h1 id="display-pet-name" class="txt-title text-2xl">รายการรอชำระเงิน</h1>
                <p id="display-owner-info" class="txt-body text-gray-500">กรุณาเลือกรายการจากคอลัมน์ซ้าย</p>
            </div>
            <button class="glass-card px-4 py-2 txt-body font-bold text-teal-500 border-teal-500/30">+ เพิ่มรายการ</button>
        </div>
        <div class="flex-1 glass-card overflow-hidden flex flex-col border-none bg-slate-900/40">
            <div class="grid grid-cols-12 p-4 border-b border-white/5 txt-label">
                <div class="col-span-6">รายการ</div>
                <div class="col-span-2 text-center">จำนวน</div>
                <div class="col-span-2 text-right">หน่วยละ</div>
                <div class="col-span-2 text-right">รวม</div>
            </div>
            <div id="cart-items" class="flex-1 overflow-y-auto custom-scroll divide-y divide-white/5"></div>
        </div>
    </div>

    <div class="col-pay flex flex-col p-6">
        <div class="flex-1">
            <div class="space-y-4 mb-8">
                <div class="flex justify-between txt-body"><span class="text-gray-400">รวมยอดเงิน</span><span id="sum-total" class="font-bold text-white text-lg">0.00</span></div>
                <div class="flex justify-between items-center"><span class="txt-label text-red-400">ส่วนลด (฿)</span><input type="number" id="input-discount" class="search-input w-24 text-right p-1 font-bold" value="0" oninput="calculateNet()"></div>
                <div class="pt-6 border-t border-white/10 flex flex-col items-end"><label class="txt-label text-teal-500 mb-1">ยอดสุทธิ</label><div class="txt-price" id="net-total">0.00</div></div>
            </div>
            <div class="space-y-4 mt-10">
                <label class="txt-label flex items-center gap-2"><i data-lucide="banknote" class="w-3"></i> รับเงินสด</label>
                <input type="number" id="received-cash" class="search-input txt-price h-16 text-center text-amber-400" placeholder="0.00" oninput="calculateChange()">
                <div class="numpad grid grid-cols-3 gap-2">
                    <button onclick="addCash(100)">100</button><button onclick="addCash(500)">500</button><button onclick="addCash(1000)">1000</button>
                </div>
                <div class="flex justify-between items-center pt-6 px-2"><span class="txt-label">เงินทอน</span><span id="change-amount" class="text-2xl font-black text-white">0.00</span></div>
            </div>
        </div>
        <button id="btn-pay" onclick="processPayment()" class="w-full h-16 bg-teal-500 rounded-xl text-navy-dark font-black text-lg hover:bg-teal-400 transition-all flex items-center justify-center gap-2">
            <i data-lucide="check-circle" class="w-5" id="btn-icon"></i><span id="btn-text">ยืนยันการชำระเงิน</span>
        </button>
    </div>

    <script>
        lucide.createIcons();
        let allPatients = [], activeRecordId = null, activePatient = null;

        window.onload = async () => { await fetchPatients(); };

        async function fetchPatients() {
            const { data } = await db.from('animals').select('pet_name, owner_hn, owners(owner_name)');
            allPatients = data || [];
            document.getElementById('count-hn').innerText = allPatients.length;
            renderPatientList(allPatients);
        }

        function filterPatients() {
            const q = document.getElementById('main-search').value.toLowerCase();
            const filtered = allPatients.filter(p => p.owner_hn.includes(q) || p.pet_name.toLowerCase().includes(q));
            renderPatientList(filtered);
        }

        function renderPatientList(list) {
            document.getElementById('patient-list').innerHTML = list.map(p => `
                <div class="glass-card p-3" onclick="loadPatientHistory('${p.owner_hn}', '${p.pet_name}', '${p.owners?.owner_name}')">
                    <div class="flex justify-between items-center"><span class="text-teal-500 font-bold text-xs">${p.owner_hn}</span><span class="text-white font-bold text-sm">🐾 ${p.pet_name}</span></div>
                    <div class="text-gray-500 text-[10px] truncate">เจ้าของ: ${p.owners?.owner_name || '-'}</div>
                </div>`).join('');
        }

        async function loadPatientHistory(hn, petName, ownerName) {
            activePatient = { hn, petName, ownerName };
            document.getElementById('display-pet-name').innerText = `คนไข้: ${petName}`;
            document.getElementById('display-owner-info').innerText = `HN: ${hn} | เจ้าของ: ${ownerName}`;
            const { data } = await db.from('medical_records').select('*').eq('owner_hn', hn).order('created_at', { ascending: false });
            const container = document.getElementById('payment-history');
            if (!data || data.length === 0) { container.innerHTML = `<p class="text-gray-600 text-center py-10">ไม่พบประวัติ</p>`; return; }
            container.innerHTML = data.map(r => `
                <div class="glass-card p-3 border-l-4 ${r.payment_status === 'paid' ? 'border-teal-500' : 'border-amber-500'} mb-2" onclick="viewRecordDetail('${r.id}', '${r.payment_status}')">
                    <div class="flex justify-between txt-label mb-1"><span>${new Date(r.created_at).toLocaleDateString('th-TH')}</span><span class="${r.payment_status === 'paid' ? 'text-teal-500' : 'text-amber-400'}">${r.payment_status.toUpperCase()}</span></div>
                    <div class="flex justify-between items-center"><span class="text-white font-bold">฿${parseFloat(r.net_amount || r.total_cost).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span><i data-lucide="chevron-right" class="w-4 text-gray-700"></i></div>
                </div>`).join('');
            lucide.createIcons();
        }

        async function viewRecordDetail(recordId, status) {
            activeRecordId = recordId;
            const isPaid = status === 'paid';
            const btn = document.getElementById('btn-pay');
            document.getElementById('view-mode-tag').classList.toggle('hidden', !isPaid);
            if (isPaid) {
                document.getElementById('btn-text').innerText = "พิมพ์ใบเสร็จ (Reprint)";
                document.getElementById('btn-icon').setAttribute('data-lucide', 'printer');
                btn.className = "w-full h-16 btn-print rounded-xl font-black text-lg transition-all flex items-center justify-center gap-2";
                btn.onclick = () => printReceipt(recordId);
            } else {
                document.getElementById('btn-text').innerText = "ยืนยันการชำระเงิน";
                document.getElementById('btn-icon').setAttribute('data-lucide', 'check-circle');
                btn.className = "w-full h-16 bg-teal-500 rounded-xl text-navy-dark font-black text-lg hover:bg-teal-400 transition-all flex items-center justify-center gap-2";
                btn.onclick = processPayment;
            }
            lucide.createIcons();
            const { data: rec } = await db.from('medical_records').select('*').eq('id', recordId).single();
            const { data: itms } = await db.from('medical_record_items').select('*').eq('record_id', recordId);
            
            // หน้าจอ POS (UI) ยังคงใช้ i.item_name (ภาษาอังกฤษ) ตาม medrec.html
            document.getElementById('cart-items').innerHTML = (itms || []).map(i => `
                <div class="grid grid-cols-12 p-4 items-center">
                    <div class="col-span-6"><div class="txt-body font-bold text-white">${i.item_name}</div></div>
                    <div class="col-span-2 text-center txt-body">${i.quantity}</div>
                    <div class="col-span-2 text-right txt-body text-gray-400">${parseFloat(i.unit_price).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                    <div class="col-span-2 text-right txt-body font-bold text-white">${parseFloat(i.total_price).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                </div>`).join('');

            document.getElementById('input-discount').disabled = isPaid;
            document.getElementById('received-cash').disabled = isPaid;
            document.getElementById('sum-total').innerText = parseFloat(rec.total_cost).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
            document.getElementById('input-discount').value = rec.discount || 0;
            document.getElementById('net-total').innerText = parseFloat(rec.net_amount || rec.total_cost).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
            document.getElementById('received-cash').value = isPaid ? rec.received_amount : "";
            calculateChange();
        }

        async function processPayment() {
            if (!activeRecordId) return alert("เลือกรายการก่อน");
            const net = parseFloat(document.getElementById('net-total').innerText.replace(/,/g, ''));
            const recvd = parseFloat(document.getElementById('received-cash').value) || 0;
            if (recvd < net) return alert("เงินรับมาไม่พอ");
            const receiptNo = `INV${new Date().toISOString().slice(0,10).replace(/-/g, '')}-${Math.floor(1000+Math.random()*9000)}`;
            const { error } = await db.from('medical_records').update({
                payment_status: 'paid', receipt_no: receiptNo, discount: parseFloat(document.getElementById('input-discount').value),
                net_amount: net, received_amount: recvd, change_amount: recvd - net, paid_at: new Date().toISOString()
            }).eq('id', activeRecordId);
            if (error) return alert(error.message);
            alert("ชำระเงินสำเร็จ!");
            printReceipt(activeRecordId);
            if (activePatient) loadPatientHistory(activePatient.hn, activePatient.petName, activePatient.ownerName);
        }

        // --- DYNAMIC PRINT ENGINE (ROBUST THAI NAMES MAPPING) ---
        async function printReceipt(recordId) {
            try {
                const { data: record } = await db.from('medical_records').select('*, animals(*), owners(*)').eq('id', recordId).single();
                const { data: items } = await db.from('medical_record_items').select('*').eq('record_id', recordId);
                const { data: template } = await db.from('print_templates').select('config').eq('template_type', 'thermal_receipt').single();

                // 1. ดึง Master ชื่อไทยจากทุกแหล่งที่อาจเก็บยาฉีดและยาอื่นๆ
                const { data: pharmaData } = await db.from('pharmacy').select('item_name, name_th');
                const { data: servicesData } = await db.from('services').select('service_name, name_th');
                
                // 2. สร้าง Master Map ที่รวมทั้ง 2 แหล่ง และใช้ .trim() เพื่อป้องกันช่องว่างทำให้หาไม่เจอ
                const masterThaiMap = {};
                if (pharmaData) pharmaData.forEach(p => { if (p.name_th) masterThaiMap[p.item_name.trim()] = p.name_th.trim(); });
                if (servicesData) servicesData.forEach(s => { if (s.name_th) masterThaiMap[s.service_name.trim()] = s.name_th.trim(); });

                if (!template) return alert("กรุณาตั้งค่า Template ในหน้า Designer");
                const config = template.config;
                const pw = config.width || 80, ph = config.height || 50;
                
                const printData = {
                    clinic_name: "PK-VMS Animal Clinic", owner_name: record.owners?.owner_name || "-",
                    pet_name: record.animals?.pet_name || "-", hn: record.owner_hn || "-",
                    receipt_no: record.receipt_no || record.id.slice(0,8),
                    time: new Date(record.paid_at || record.created_at).toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit'}),
                    total_price: parseFloat(record.total_cost || 0).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}),
                    discount_val: parseFloat(record.discount || 0).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}),
                    net_total: parseFloat(record.net_amount).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}),
                    received_amount: parseFloat(record.received_amount || 0).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}),
                    change_amount: parseFloat(record.change_amount || 0).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}),
                    date: new Date(record.paid_at || record.created_at).toLocaleDateString('th-TH'),
                    
                    // รายการสินค้า: ตรวจสอบทั้งยากิน (Rx) และยาฉีด (Inj/Tx)
                    items_list: `<table style="width:100%; border-collapse:collapse; font-size:10pt; font-family:'Sarabun';">
                        ${items.map(i => {
                            // ใช้ชื่อ EN เป็นกุญแจในการหาชื่อไทย
                            const searchKey = (i.item_name || "").trim();
                            const nameTH = masterThaiMap[searchKey] || i.item_name; 
                            return `<tr>
                                <td style="padding:1mm 0;">${nameTH} x ${i.quantity}</td>
                                <td style="text-align:right;">${parseFloat(i.total_price).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>
                            </tr>`;
                        }).join('')}
                    </table>`
                };

                let pushOffset = 0;
                const sortedLines = [...config.lines].sort((a,b) => parseFloat(a.y) - parseFloat(b.y));
                const elements = sortedLines.map(l => {
                    const currentY = parseFloat(l.y) + pushOffset;
                    const availableWidthMm = pw - parseFloat(l.x) - 5;
                    const finalWidth = l.w ? l.w : availableWidthMm;
                    let style = `top:${currentY}mm; left:${l.x}mm; width:${finalWidth}mm; font-family:${l.font || 'Sarabun'}; font-size:${l.size}pt; position:absolute; ${l.bold?'font-weight:bold;':''}`;
                    if (l.align === 'center') style = `top:${currentY}mm; left:0; width:${pw}mm; text-align:center; font-family:${l.font || 'Sarabun'}; font-size:${l.size}pt; position:absolute; ${l.bold?'font-weight:bold;':''}`;
                    else if (l.align === 'right') style = `top:${currentY}mm; left:0; width:${pw - parseFloat(l.x)}mm; text-align:right; font-family:${l.font || 'Sarabun'}; font-size:${l.size}pt; position:absolute; ${l.bold?'font-weight:bold;':''}`;
                    if (l.text && l.text.includes("{{items_list}}")) pushOffset += (items.length - 1) * 6;
                    let content = (l.text || "").replace(/\{\{(.*?)\}\}/g, (m, k) => printData[k.trim()] || m);
                    if (l.type==='text') return `<div style="${style}">${content}</div>`;
                    if (l.type==='rect') return `<div style="top:${currentY}mm; left:${l.x}mm; width:${l.w}mm; height:${l.h}mm; border:1px solid black; position:absolute; border-radius:${l.radius || 0}mm;"></div>`;
                    if (l.type==='image') return `<img src="${l.url}" style="top:${currentY}mm; left:${l.x}mm; width:${l.w}mm; height:${l.h}mm; position:absolute; object-fit:contain;">`;
                }).join('');
                const win = window.open('', '_blank', 'width=400');
                win.document.write(`<html><head><style>@import url('https://fonts.googleapis.com/css2?family=Sarabun&display=swap'); body{margin:0; padding:0;} .page{position:relative; width:${pw}mm; min-height:${ph}mm; font-family:Sarabun;} @media print { @page { size: ${pw}mm auto; margin: 0; } }</style></head><body><div class="page">${elements}</div><script>window.onload=()=>{setTimeout(()=>{window.print();window.close();},500);};<\/script></body></html>`);
                win.document.close();
            } catch (e) { alert("Error: " + e.message); }
        }

        function calculateNet() {
            const sum = parseFloat(document.getElementById('sum-total').innerText.replace(/,/g, '')) || 0;
            const net = sum - (parseFloat(document.getElementById('input-discount').value) || 0);
            document.getElementById('net-total').innerText = net.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
            calculateChange();
        }

        function calculateChange() {
            const net = parseFloat(document.getElementById('net-total').innerText.replace(/,/g, '')) || 0;
            const recv = parseFloat(document.getElementById('received-cash').value) || 0;
            document.getElementById('change-amount').innerText = (recv - net > 0 ? recv - net : 0).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
        }

        function addCash(amt) {
            const input = document.getElementById('received-cash');
            input.value = (parseFloat(input.value) || 0) + amt;
            calculateChange();
        }
    </script>
</body>
</html>
