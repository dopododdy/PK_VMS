<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PK-VMS Pro | Smart POS</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>

    <style>
        :root { 
            --navy-dark: #020617; 
            --navy-panel: #0f172a; 
            --teal-accent: #10b981; 
            --border: rgba(255, 255, 255, 0.08); 
        }
        * { font-family: "Sarabun", sans-serif !important; }
        body { background: var(--navy-dark); color: #e2e8f0; height: 100vh; overflow: hidden; }

        /* Typography */
        .txt-label { font-size: 13px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
        .txt-body { font-size: 16px; color: #cbd5e1; }
        .txt-title { font-size: 22px; font-weight: 800; color: #ffffff; }
        .txt-price { font-size: 36px; font-weight: 900; color: #ffffff; letter-spacing: -1px; }

        /* Layout */
        .col-side { width: 23%; border-right: 1px solid var(--border); }
        .col-main { width: 52%; background: rgba(0,0,0,0.2); }
        .col-pay { width: 25%; background: var(--navy-panel); border-left: 1px solid var(--border); }

        .glass-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 12px; transition: 0.2s; cursor: pointer; padding: 16px; }
        .glass-card:hover { border-color: var(--teal-accent); background: rgba(16, 185, 129, 0.05); }
        .glass-card.active { border-color: var(--teal-accent); background: rgba(16, 185, 129, 0.1); }

        .search-input { background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 10px; width: 100%; padding: 12px 14px 12px 42px; outline: none; font-size: 16px; color: white; }
        .search-input:focus { border-color: var(--teal-accent); }

        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .numpad button { background: rgba(255,255,255,0.05); height: 60px; border-radius: 10px; font-weight: 800; font-size: 22px; transition: 0.1s; }
        .numpad button:active { background: var(--teal-accent); color: var(--navy-dark); transform: scale(0.95); }
        
        .btn-print { background-color: #2563eb !important; color: white !important; box-shadow: 0 4px 14px rgba(37, 99, 235, 0.3) !important; }
        .btn-print:hover { background-color: #1d4ed8 !important; }

        .btn-home { background: rgba(255,255,255,0.1); border-radius: 8px; padding: 10px; transition: 0.2s; }
        .btn-home:hover { background: var(--teal-accent); color: var(--navy-dark); }
    </style>
</head>
<body class="flex">

    <div class="col-side flex flex-col p-6">
        <div class="mb-6">
            <div class="flex justify-between items-center mb-5">
                <h2 class="txt-title flex items-center gap-2">
                    <i data-lucide="activity" class="text-teal-500 w-6 h-6"></i> PK-VMS POS
                </h2>
                <button onclick="window.location.href='index.html'" class="btn-home text-gray-300"><i data-lucide="home" class="w-6 h-6"></i></button>
            </div>
            <div class="relative">
                <input type="text" id="main-search" class="search-input" placeholder="ค้นหา HN หรือ ชื่อสัตว์..." oninput="filterPatients()">
                <i data-lucide="search" class="absolute left-4 top-4 w-5 h-5 text-gray-500"></i>
            </div>
        </div>
        <div class="flex-1 overflow-hidden flex flex-col gap-5">
            <div class="flex flex-col h-1/2">
                <span class="txt-label mb-3">รายชื่อคนไข้ (<span id="count-hn">0</span>)</span>
                <div id="patient-list" class="flex-1 overflow-y-auto custom-scroll space-y-3 pr-2"></div>
            </div>
            <div class="flex flex-col h-1/2 border-t border-white/10 pt-5">
                <span class="txt-label mb-3">ประวัติการชำระเงิน</span>
                <div id="payment-history" class="flex-1 overflow-y-auto custom-scroll space-y-3 pr-2">
                    <p class="text-gray-500 text-center py-10 text-sm">เลือกคนไข้เพื่อดูประวัติ</p>
                </div>
            </div>
        </div>
    </div>

    <div class="col-main flex flex-col p-8">
        <div class="flex justify-between items-start mb-8">
            <div>
                <div id="view-mode-tag" class="hidden bg-blue-500/20 text-blue-400 text-[12px] px-3 py-1 rounded font-bold mb-2 uppercase">Paid / Reprint Mode</div>
                <h1 id="display-pet-name" class="txt-title text-3xl mb-1">รายการรอชำระเงิน</h1>
                <p id="display-owner-info" class="txt-body text-gray-400 text-lg">กรุณาเลือกรายการจากคอลัมน์ซ้าย</p>
            </div>
            <button class="glass-card px-6 py-3 txt-body font-bold text-teal-400 border-teal-500/30 hover:bg-teal-500/10">+ เพิ่มรายการ</button>
        </div>
        <div class="flex-1 glass-card p-0 overflow-hidden flex flex-col border-none bg-slate-900/40">
            <div class="grid grid-cols-12 p-5 border-b border-white/10 txt-label text-sm bg-black/20">
                <div class="col-span-6">รายการ</div>
                <div class="col-span-2 text-center">จำนวน</div>
                <div class="col-span-2 text-right">หน่วยละ</div>
                <div class="col-span-2 text-right">รวม</div>
            </div>
            <div id="cart-items" class="flex-1 overflow-y-auto custom-scroll divide-y divide-white/5"></div>
        </div>
    </div>

    <div class="col-pay flex flex-col p-8">
        <div class="flex-1">
            <div class="space-y-6 mb-10">
                <div class="flex justify-between txt-body text-lg">
                    <span class="text-gray-400">รวมยอดเงิน</span>
                    <span id="sum-total" class="font-bold text-white text-xl">0.00</span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="txt-label text-red-400 text-sm">ส่วนลด (฿)</span>
                    <input type="number" id="input-discount" class="search-input w-28 text-right p-2 font-bold text-lg" value="0" oninput="calculateNet()">
                </div>
                <div class="pt-8 border-t border-white/10 flex flex-col items-end">
                    <label class="txt-label text-teal-400 mb-2 text-sm">ยอดสุทธิ</label>
                    <div class="txt-price text-4xl" id="net-total">0.00</div>
                </div>
            </div>
            <div class="space-y-5 mt-12">
                <label class="txt-label flex items-center gap-2 text-sm"><i data-lucide="banknote" class="w-4 h-4"></i> รับเงินสด</label>
                <input type="number" id="received-cash" class="search-input txt-price h-20 text-center text-amber-400 text-3xl" placeholder="0.00" oninput="calculateChange()">
                <div class="numpad grid grid-cols-3 gap-3">
                    <button onclick="addCash(100)">100</button>
                    <button onclick="addCash(500)">500</button>
                    <button onclick="addCash(1000)">1000</button>
                </div>
                <div class="flex justify-between items-center pt-8 px-2">
                    <span class="txt-label text-sm">เงินทอน</span>
                    <span id="change-amount" class="text-3xl font-black text-white">0.00</span>
                </div>
            </div>
        </div>
        <button id="btn-pay" onclick="processPayment()" class="w-full h-20 bg-teal-500 rounded-xl text-navy-dark font-black text-xl hover:bg-teal-400 transition-all flex items-center justify-center gap-3 mt-4">
            <i data-lucide="check-circle" class="w-6 h-6" id="btn-icon"></i><span id="btn-text">ยืนยันการชำระเงิน</span>
        </button>
    </div>

    <script>
        lucide.createIcons();
        let allPatients = [], activeRecordId = null, activePatient = null;

        // ฟังก์ชันช่วยจัดรูปแบบวันที่ภาษาไทย
        function formatThaiDate(dateString, format = 'long') {
            if (!dateString) return "-";
            const date = new Date(dateString);
            const monthsShort = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];
            const monthsLong = ["มีนาคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
            
            const d = date.getDate();
            const m = format === 'short' ? monthsShort[date.getMonth()] : monthsLong[date.getMonth()];
            const y = date.getFullYear() + 543;
            
            return `${d} ${m} ${y}`;
        }

        window.onload = async () => { await fetchPatients(); };

        async function fetchPatients() {
            const { data } = await db.from('animals').select('pet_name, owner_hn, owners(owner_name)');
            allPatients = data || [];
            document.getElementById('count-hn').innerText = allPatients.length;
            renderPatientList(allPatients);
        }

        function filterPatients() {
            const q = document.getElementById('main-search').value.toLowerCase();
            const filtered = allPatients.filter(p => p.owner_hn.includes(q) || p.pet_name.toLowerCase().includes(q));
            renderPatientList(filtered);
        }

        function renderPatientList(list) {
            document.getElementById('patient-list').innerHTML = list.map(p => `
                <div class="glass-card" onclick="loadPatientHistory('${p.owner_hn}', '${p.pet_name}', '${p.owners?.owner_name}')">
                    <div class="flex justify-between items-center mb-1"><span class="text-teal-400 font-bold text-sm">${p.owner_hn}</span><span class="text-white font-bold text-base">🐾 ${p.pet_name}</span></div>
                    <div class="text-gray-400 text-xs truncate">เจ้าของ: ${p.owners?.owner_name || '-'}</div>
                </div>`).join('');
        }

        async function loadPatientHistory(hn, petName, ownerName) {
            activePatient = { hn, petName, ownerName };
            document.getElementById('display-pet-name').innerText = `คนไข้: ${petName}`;
            document.getElementById('display-owner-info').innerText = `HN: ${hn} | เจ้าของ: ${ownerName}`;
            const { data } = await db.from('medical_records').select('*').eq('owner_hn', hn).order('created_at', { ascending: false });
            const container = document.getElementById('payment-history');
            if (!data || data.length === 0) { container.innerHTML = `<p class="text-gray-500 text-center py-10 text-sm">ไม่พบประวัติ</p>`; return; }
            container.innerHTML = data.map(r => {
                // แสดงวันที่แบบย่อภาษาไทย ในช่องประวัติ
                const dateDisplay = formatThaiDate(r.created_at, 'short');
                return `
                <div class="glass-card border-l-4 ${r.payment_status === 'paid' ? 'border-l-teal-500' : 'border-l-amber-500'} mb-3" onclick="viewRecordDetail('${r.id}', '${r.payment_status}')">
                    <div class="flex justify-between txt-label mb-2"><span class="text-[12px]">${dateDisplay}</span><span class="${r.payment_status === 'paid' ? 'text-teal-400' : 'text-amber-400'}">${r.payment_status.toUpperCase()}</span></div>
                    <div class="flex justify-between items-center"><span class="text-white font-bold text-lg">฿${parseFloat(r.net_amount || r.total_cost).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span><i data-lucide="chevron-right" class="w-5 h-5 text-gray-600"></i></div>
                </div>`
            }).join('');
            lucide.createIcons();
        }

        async function viewRecordDetail(recordId, status) {
            activeRecordId = recordId;
            const isPaid = status === 'paid';
            const btn = document.getElementById('btn-pay');
            document.getElementById('view-mode-tag').classList.toggle('hidden', !isPaid);
            if (isPaid) {
                document.getElementById('btn-text').innerText = "พิมพ์ใบเสร็จ (Reprint)";
                document.getElementById('btn-icon').setAttribute('data-lucide', 'printer');
                btn.className = "w-full h-20 btn-print rounded-xl font-black text-xl transition-all flex items-center justify-center gap-3 mt-4";
                btn.onclick = () => printReceipt(recordId);
            } else {
                document.getElementById('btn-text').innerText = "ยืนยันการชำระเงิน";
                document.getElementById('btn-icon').setAttribute('data-lucide', 'check-circle');
                btn.className = "w-full h-20 bg-teal-500 rounded-xl text-navy-dark font-black text-xl hover:bg-teal-400 transition-all flex items-center justify-center gap-3 mt-4";
                btn.onclick = processPayment;
            }
            lucide.createIcons();
            const { data: rec } = await db.from('medical_records').select('*').eq('id', recordId).single();
            const { data: itms } = await db.from('medical_record_items').select('*').eq('record_id', recordId);
            
            // ขยายฟอนต์รายการในตะกร้า
            document.getElementById('cart-items').innerHTML = (itms || []).map(i => `
                <div class="grid grid-cols-12 p-5 items-center">
                    <div class="col-span-6"><div class="txt-body font-bold text-white text-base">${i.item_name}</div></div>
                    <div class="col-span-2 text-center txt-body text-base">${i.quantity}</div>
                    <div class="col-span-2 text-right txt-body text-gray-400 text-base">${parseFloat(i.unit_price).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                    <div class="col-span-2 text-right txt-body font-bold text-white text-lg">${parseFloat(i.total_price).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                </div>`).join('');
            
            document.getElementById('input-discount').disabled = isPaid;
            document.getElementById('received-cash').disabled = isPaid;
            document.getElementById('sum-total').innerText = parseFloat(rec.total_cost).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
            document.getElementById('input-discount').value = rec.discount || 0;
            document.getElementById('net-total').innerText = parseFloat(rec.net_amount || rec.total_cost).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
            document.getElementById('received-cash').value = isPaid ? rec.received_amount : "";
            calculateChange();
        }

        async function processPayment() {
            if (!activeRecordId) return alert("เลือกรายการก่อน");
            const net = parseFloat(document.getElementById('net-total').innerText.replace(/,/g, ''));
            const recvd = parseFloat(document.getElementById('received-cash').value) || 0;
            if (recvd < net) return alert("เงินรับมาไม่พอ");

            // --- ส่วนสร้าง Receipt No รูปแบบใหม่ ---
            const { data: rec } = await db.from('medical_records').select('owner_hn').eq('id', activeRecordId).single();
            const hn = rec?.owner_hn || "000000";

            const now = new Date();
            const yyyy = now.getFullYear() + 543; 
            const mm = String(now.getMonth() + 1).padStart(2, '0');
            const dd = String(now.getDate()).padStart(2, '0');
            
            // หาจำนวนบิลที่จ่ายแล้วของวันนี้
            const startOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0).toISOString();
            const endOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59).toISOString();
            
            const { count } = await db.from('medical_records')
                .select('*', { count: 'exact', head: true })
                .eq('payment_status', 'paid')
                .gte('paid_at', startOfDay)
                .lte('paid_at', endOfDay);

            const seq = String((count || 0) + 1).padStart(2, '0');
            // รูปแบบ: 2569 03 07 690001 01
            const receiptNo = `${yyyy}${mm}${dd}${hn}${seq}`;

            const { error } = await db.from('medical_records').update({
                payment_status: 'paid', receipt_no: receiptNo, discount: parseFloat(document.getElementById('input-discount').value),
                net_amount: net, received_amount: recvd, change_amount: recvd - net, paid_at: new Date().toISOString()
            }).eq('id', activeRecordId);
            
            if (error) return alert(error.message);
            alert("ชำระเงินสำเร็จ!");
            printReceipt(activeRecordId);
            if (activePatient) loadPatientHistory(activePatient.hn, activePatient.petName, activePatient.ownerName);
        }

        function superClean(str) {
            if (!str) return "";
            return str.replace(/[^a-zA-Z0-9ก-๙]/g, "").toLowerCase();
        }

        // --- DYNAMIC PRINT ENGINE ---
        async function printReceipt(recordId) {
            try {
                const { data: record } = await db.from('medical_records').select('*, animals(*), owners(*)').eq('id', recordId).single();
                const { data: items } = await db.from('medical_record_items').select('*').eq('record_id', recordId);
                const { data: template } = await db.from('print_templates').select('config').eq('template_type', 'thermal_receipt').single();

                const { data: pharma } = await db.from('pharmacy').select('item_name, name_th');
                const { data: servs } = await db.from('services').select('service_name, name_th');
                const masterThaiMap = {};
                if (pharma) pharma.forEach(p => { if (p.name_th) masterThaiMap[superClean(p.item_name)] = p.name_th; });
                if (servs) servs.forEach(s => { if (s.name_th) masterThaiMap[superClean(s.service_name)] = s.name_th; });

                if (!template) return alert("กรุณาตั้งค่า Template ในหน้า Designer");
                const config = template.config;
                const pw = config.width || 80, ph = config.height || 50;
                
                // ดึงขนาดฟอนต์มาใช้แบบ 100% ไม่ลดขนาดแล้ว
                const itemListConfig = config.lines.find(l => l.text && l.text.includes("{{items_list}}"));
                const tableFontSize = itemListConfig ? parseFloat(itemListConfig.size) : 12;

                const printData = {
                    clinic_name: "PK-VMS Animal Clinic", owner_name: record.owners?.owner_name || "-",
                    pet_name: record.animals?.pet_name || "-", hn: record.owner_hn || "-",
                    receipt_no: record.receipt_no || record.id.slice(0,8),
                    time: new Date(record.paid_at || record.created_at).toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit'}),
                    total_price: parseFloat(record.total_cost || 0).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}),
                    discount_val: parseFloat(record.discount || 0).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}),
                    net_total: parseFloat(record.net_amount).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}),
                    received_amount: parseFloat(record.received_amount || 0).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}),
                    change_amount: parseFloat(record.change_amount || 0).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}),
                    
                    // ใช้วันที่ภาษาไทยแบบเต็มสำหรับใบเสร็จ
                    date: formatThaiDate(record.paid_at || record.created_at, 'long'),
                    
                    items_list: `<table style="width:100%; border-collapse:collapse; font-family:'Sarabun'; font-size:${tableFontSize}pt; line-height:1.3; color:black;">
                        ${items.map(i => {
                            const itemClean = superClean(i.item_name);
                            let foundThai = masterThaiMap[itemClean];
                            if (!foundThai) {
                                const masterKeys = Object.keys(masterThaiMap).sort((a, b) => b.length - a.length);
                                for (let key of masterKeys) {
                                    if (itemClean.startsWith(key) && key.length >= 2) { foundThai = masterThaiMap[key]; break; }
                                }
                            }
                            const nameToShow = foundThai || i.item_name;
                            return `<tr>
                                <td style="padding:3px 0; text-align:left; vertical-align:top;">${nameToShow} x ${Math.floor(i.quantity)}</td>
                                <td style="padding:3px 0; text-align:right; vertical-align:top; white-space:nowrap;">${parseFloat(i.total_price).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>
                            </tr>`;
                        }).join('')}
                    </table>`
                };

                let pushOffset = 0;
                const sortedLines = [...config.lines].sort((a,b) => parseFloat(a.y) - parseFloat(b.y));
                const elements = sortedLines.map(l => {
                    const currentY = parseFloat(l.y) + pushOffset;
                    const availableWidthMm = pw - parseFloat(l.x);
                    const finalWidth = l.w ? l.w : availableWidthMm;
                    
                    let style = `top:${currentY}mm; left:${l.x}mm; width:${finalWidth}mm; font-family:${l.font || 'Sarabun'}; font-size:${l.size}pt; position:absolute; ${l.bold?'font-weight:bold;':''}`;
                    
                    if (l.align === 'center') style = `top:${currentY}mm; left:0; width:${pw}mm; text-align:center; font-family:${l.font || 'Sarabun'}; font-size:${l.size}pt; position:absolute; ${l.bold?'font-weight:bold;':''}`;
                    else if (l.align === 'right') style = `top:${currentY}mm; left:0; width:${pw - parseFloat(l.x)}mm; text-align:right; font-family:${l.font || 'Sarabun'}; font-size:${l.size}pt; position:absolute; ${l.bold?'font-weight:bold;':''}`;
                    
                    if (l.text && l.text.includes("{{items_list}}")) pushOffset += (items.length - 1) * 5.5; 
                    
                    let content = (l.text || "").replace(/\{\{(.*?)\}\}/g, (m, k) => printData[k.trim()] || m);
                    if (l.type==='text') return `<div style="${style}">${content}</div>`;
                    if (l.type==='rect') return `<div style="top:${currentY}mm; left:${l.x}mm; width:${l.w}mm; height:${l.h}mm; border:1px solid black; position:absolute; border-radius:${l.radius || 0}mm;"></div>`;
                    if (l.type==='image') return `<img src="${l.url}" style="top:${currentY}mm; left:${l.x}mm; width:${l.w}mm; height:${l.h}mm; position:absolute; object-fit:contain;">`;
                }).join('');

                const win = window.open('', '_blank', 'width=400');
                win.document.write(`<html><head><style>@import url('https://fonts.googleapis.com/css2?family=Sarabun&display=swap'); body{margin:0; padding:0;} .page{position:relative; width:${pw}mm; min-height:${ph}mm; font-family:Sarabun;} @media print { @page { size: ${pw}mm auto; margin: 0; } }</style></head><body><div class="page">${elements}</div><script>window.onload=()=>{setTimeout(()=>{window.print();window.close();},500);};<\/script></body></html>`);
                win.document.close();
            } catch (e) { alert("Error: " + e.message); }
        }

        function calculateNet() {
            const sum = parseFloat(document.getElementById('sum-total').innerText.replace(/,/g, '')) || 0;
            const net = sum - (parseFloat(document.getElementById('input-discount').value) || 0);
            document.getElementById('net-total').innerText = net.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
            calculateChange();
        }

        function calculateChange() {
            const net = parseFloat(document.getElementById('net-total').innerText.replace(/,/g, '')) || 0;
            const recv = parseFloat(document.getElementById('received-cash').value) || 0;
            document.getElementById('change-amount').innerText = (recv - net > 0 ? recv - net : 0).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
        }

        function addCash(amt) {
            const input = document.getElementById('received-cash');
            input.value = (parseFloat(input.value) || 0) + amt;
            calculateChange();
        }
    </script>
</body>
</html>
