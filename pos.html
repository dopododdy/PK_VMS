<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PK-VMS Pro | Smart POS System</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Prompt:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>

    <style>
        :root { 
            --navy-dark: #020617; 
            --navy-panel: #0f172a; 
            --teal-accent: #10b981; 
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }
        * { font-family: "Sarabun", sans-serif !important; box-sizing: border-box; }
        body { background: var(--navy-dark); color: #f1f5f9; height: 100vh; overflow: hidden; }

        /* Scrollbar Customization */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }

        /* Layout Zones */
        .zone-sidebar { width: 25%; background: var(--navy-dark); border-right: 1px solid var(--glass-border); }
        .zone-cart { width: 50%; background: rgba(0,0,0,0.2); }
        .zone-payment { width: 25%; background: var(--navy-panel); border-left: 1px solid var(--glass-border); }

        /* UI Components */
        .glass-panel { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 1.25rem; backdrop-filter: blur(10px); }
        
        .search-input { background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); color: white; transition: 0.3s; }
        .search-input:focus { border-color: var(--teal-accent); outline: none; box-shadow: 0 0 15px rgba(16, 185, 129, 0.2); }

        .bill-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 1rem; cursor: pointer; transition: 0.25s; position: relative; overflow: hidden; }
        .bill-card:hover { transform: translateY(-2px); border-color: var(--teal-accent); background: rgba(255,255,255,0.06); }
        .bill-card.active { border-color: var(--teal-accent); background: rgba(16, 185, 129, 0.1); }
        .bill-card.active::after { content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 4px; background: var(--teal-accent); }

        .log-item { font-size: 11px; padding: 8px; border-bottom: 1px solid var(--glass-border); color: #94a3b8; }
        .log-item b { color: #38bdf8; }

        .numpad button { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 1rem; font-weight: 700; transition: 0.1s; color: white; height: 60px; font-size: 1.25rem; }
        .numpad button:active { background: var(--teal-accent); transform: scale(0.95); }

        .btn-confirm { background: linear-gradient(135deg, #10b981 0%, #059669 100%); box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2); transition: 0.3s; }
        .btn-confirm:hover { transform: translateY(-2px); box-shadow: 0 15px 25px rgba(16, 185, 129, 0.3); }

        /* Modal Custom */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(12px); z-index: 100; display: none; align-items: center; justify-content: center; }

        @media print { #main-ui, .modal-overlay { display: none !important; } }
    </style>
</head>
<body class="flex flex-col">

    <div id="main-ui" class="flex flex-1 overflow-hidden">
        
        <div class="zone-sidebar flex flex-col p-5 overflow-hidden">
            <div class="flex items-center gap-3 mb-8">
                <div class="p-2 bg-teal-500 rounded-xl text-navy-dark"><i data-lucide="layout-dashboard"></i></div>
                <h2 class="text-xl font-black text-white leading-tight">PK-VMS<span class="text-teal-500 block text-xs">SMART POS PRO</span></h2>
            </div>

            <div class="flex-1 overflow-y-auto space-y-6 pr-1">
                <section>
                    <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-3 flex items-center gap-2">
                        <i data-lucide="search" class="w-3"></i> ค้นหาคนไข้ (HN)
                    </label>
                    <div class="relative">
                        <input type="text" id="search-hn" class="search-input w-full p-3 pl-10 rounded-xl text-sm" placeholder="ระบุ HN..." oninput="searchHN()">
                        <i data-lucide="fingerprint" class="w-4 absolute left-3 top-3.5 text-gray-500"></i>
                    </div>
                    <div id="history-list" class="mt-3 space-y-2 max-h-40 overflow-y-auto">
                        </div>
                </section>

                <hr class="border-white/5">

                <section>
                    <label class="text-[10px] font-bold text-amber-500 uppercase tracking-widest mb-3 flex items-center gap-2">
                        <i data-lucide="clock" class="w-3"></i> รอการชำระเงิน
                    </label>
                    <div id="pending-bills-list" class="space-y-3"></div>
                </section>

                <hr class="border-white/5">

                <section>
                    <label class="text-[10px] font-bold text-blue-400 uppercase tracking-widest mb-3 flex items-center gap-2">
                        <i data-lucide="activity" class="w-3"></i> บันทึกกิจกรรมวันนี้
                    </label>
                    <div id="daily-log" class="glass-panel bg-black/20 rounded-xl p-2 h-48 overflow-y-auto text-[10px]">
                        </div>
                </section>
            </div>
        </div>

        <div class="zone-cart flex flex-col p-8 overflow-hidden">
            <div class="flex justify-between items-end mb-6">
                <div>
                    <h1 class="text-3xl font-black text-white">รายการขาย</h1>
                    <p class="text-gray-500 text-sm" id="active-customer-info">กรุณาเลือกบิลจากรายการด้านซ้าย</p>
                </div>
                <button onclick="openCatalog()" class="bg-blue-600/20 border border-blue-600/30 text-blue-400 px-6 py-2.5 rounded-2xl font-bold hover:bg-blue-600 hover:text-white transition-all flex items-center gap-2">
                    <i data-lucide="plus-circle" class="w-4"></i> สินค้าเสริม
                </button>
            </div>

            <div class="flex-1 overflow-y-auto glass-panel relative shadow-2xl overflow-hidden border-none bg-slate-900/40">
                <table class="w-full text-left">
                    <thead class="sticky top-0 bg-slate-800 z-20">
                        <tr class="text-gray-400 text-[10px] font-bold uppercase tracking-widest">
                            <th class="p-5">รายการ</th>
                            <th class="p-5 text-center">จำนวน</th>
                            <th class="p-5 text-right">ราคา/หน่วย</th>
                            <th class="p-5 text-right">รวม</th>
                            <th class="p-5 text-center"></th>
                        </tr>
                    </thead>
                    <tbody id="cart-items-body" class="divide-y divide-white/5"></tbody>
                </table>
                <div id="cart-empty" class="absolute inset-0 flex flex-col items-center justify-center text-gray-700 pointer-events-none">
                    <i data-lucide="shopping-cart" class="w-20 h-20 opacity-10 mb-4"></i>
                    <p class="text-lg font-bold opacity-20">ยังไม่มีรายการที่เลือก</p>
                </div>
            </div>
        </div>

        <div class="zone-payment flex flex-col p-8 overflow-y-auto">
            <div class="flex-1">
                <div class="space-y-4 mb-8">
                    <div class="flex justify-between text-gray-400 font-medium">
                        <span>ยอดรวม (Subtotal)</span>
                        <span id="sum-price" class="text-xl text-white font-bold">0.00</span>
                    </div>
                    <div class="flex justify-between items-center text-red-400">
                        <span class="font-bold">ส่วนลด (Discount)</span>
                        <input type="number" id="discount-val" class="bg-white/5 border border-white/10 text-right w-24 p-2 rounded-lg text-lg font-bold outline-none focus:border-red-500" value="0" oninput="calculateTotal()">
                    </div>
                    <div class="pt-6 border-t border-white/10 flex flex-col items-end">
                        <span class="text-[10px] font-black text-teal-500 uppercase tracking-widest mb-1">ยอดสุทธิที่ต้องชำระ</span>
                        <span class="text-6xl font-black text-white tracking-tighter" id="net-total">0.00</span>
                    </div>
                </div>

                <div class="space-y-4">
                    <label class="text-[10px] font-black text-gray-500 uppercase tracking-widest flex items-center gap-2">
                        <i data-lucide="banknote" class="w-3"></i> รับเงินสด
                    </label>
                    <input type="number" id="received-amount" class="search-input w-full text-5xl font-black text-center py-5 rounded-2xl text-amber-400 shadow-inner" placeholder="0" oninput="calculateChange()">
                    
                    <div class="numpad grid grid-cols-3 gap-2">
                        <button onclick="quickCash(100)">100</button>
                        <button onclick="quickCash(500)">500</button>
                        <button onclick="quickCash(1000)">1000</button>
                    </div>

                    <div class="bg-teal-500/10 p-4 rounded-2xl border border-teal-500/20 flex justify-between items-center">
                        <span class="text-teal-500 font-bold text-sm">เงินทอน (Change)</span>
                        <span class="text-3xl font-black text-white" id="change-val">0.00</span>
                    </div>
                </div>
            </div>

            <div class="mt-8 grid grid-cols-5 gap-3 h-20">
                <button onclick="showPreview()" class="col-span-2 glass-panel hover:bg-white/10 text-white font-bold transition flex flex-col items-center justify-center gap-1">
                    <i data-lucide="eye" class="w-5"></i>
                    <span class="text-xs">Preview</span>
                </button>
                <button onclick="confirmPayment()" class="col-span-3 btn-confirm text-white rounded-3xl font-black text-xl active:scale-95 flex items-center justify-center gap-2">
                    <i data-lucide="check-circle" class="w-6"></i> บันทึก & พิมพ์
                </button>
            </div>
        </div>
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        let cart = [], allProducts = [], activeRecord = null, dailyLogs = [];

        window.onload = async () => { 
            await fetchTodayBills(); 
            await fetchProducts(); 
            addLog("System", "ระบบ POS พร้อมใช้งาน", 0);
        };

        // --- เพิ่มระบบ Log กิจกรรม ---
        function addLog(hn, action, amount) {
            const time = new Date().toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit'});
            const logHtml = `<div class="log-item">[${time}] <b>HN: ${hn}</b> ${action} <span class="text-teal-400 font-bold">${amount > 0 ? amount.toLocaleString() + '฿' : ''}</span></div>`;
            const container = document.getElementById('daily-log');
            container.insertAdjacentHTML('afterbegin', logHtml);
        }

        // --- ดึงข้อมูลบิลค้างชำระ ---
        async function fetchTodayBills() {
            const today = new Date().toISOString().split('T')[0];
            const { data: pending, error } = await db.from('medical_records')
                .select('id, owner_hn, created_at, total_cost, owners(owner_name), animals(pet_name)')
                .or('payment_status.is.null,payment_status.eq.pending')
                .gte('created_at', today)
                .order('created_at', { ascending: false });

            if (error) console.error(error);
            renderPendingSidebar(pending);
        }

        function renderPendingSidebar(data) {
            const container = document.getElementById('pending-bills-list');
            container.innerHTML = (data || []).map(rec => `
                <div class="bill-card p-4" onclick="selectBill('${rec.id}', this)">
                    <div class="flex justify-between items-start mb-2">
                        <span class="bg-teal-500/20 text-teal-500 px-2 py-0.5 rounded text-[9px] font-bold">HN: ${rec.owner_hn}</span>
                        <span class="text-[10px] text-gray-500">${new Date(rec.created_at).toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'})}</span>
                    </div>
                    <div class="text-sm font-bold text-white mb-1 truncate">${rec.owners.owner_name}</div>
                    <div class="flex justify-between items-center">
                        <span class="text-[11px] text-gray-400">🐾 ${rec.animals.pet_name}</span>
                        <span class="font-black text-sm text-white">฿${rec.total_cost.toLocaleString()}</span>
                    </div>
                </div>`).join('') || `<p class="text-gray-600 text-center py-4 text-xs italic">ไม่มีค้างชำระ</p>`;
        }

        // --- ระบบค้นหา HN และแสดงประวัติ ---
        async function searchHN() {
            const hn = document.getElementById('search-hn').value;
            if (hn.length < 2) {
                document.getElementById('history-list').innerHTML = "";
                return;
            }

            const { data } = await db.from('medical_records')
                .select('id, paid_at, net_amount, payment_status')
                .eq('owner_hn', hn)
                .eq('payment_status', 'paid')
                .limit(5)
                .order('paid_at', {ascending: false});

            const container = document.getElementById('history-list');
            container.innerHTML = (data || []).map(h => `
                <div class="text-[10px] bg-white/5 p-2 rounded flex justify-between hover:bg-white/10 cursor-pointer">
                    <span class="text-gray-400">📅 ${new Date(h.paid_at).toLocaleDateString('th-TH')}</span>
                    <span class="text-teal-500 font-bold">฿${h.net_amount.toLocaleString()}</span>
                </div>
            `).join('');
        }

        async function selectBill(id, element) {
            document.querySelectorAll('.bill-card').forEach(el => el.classList.remove('active'));
            element.classList.add('active');

            const { data: header } = await db.from('medical_records').select('*, owners(*), animals(*)').eq('id', id).single();
            const { data: items } = await db.from('medical_record_items').select('*').eq('record_id', id);
            
            activeRecord = header;
            document.getElementById('active-customer-info').innerHTML = `คุณ${header.owners.owner_name} • HN: ${header.owner_hn} • (🐾 ${header.animals.pet_name})`;
            
            cart = (items || []).map(i => ({
                id: i.id, name: i.item_name, price: parseFloat(i.unit_price), qty: parseFloat(i.quantity), type: i.item_type
            }));

            addLog(header.owner_hn, "เรียกดูบิล", header.total_cost);
            renderCart();
        }

        function renderCart() {
            const body = document.getElementById('cart-items-body');
            body.innerHTML = cart.map((item, idx) => `
                <tr class="hover:bg-white/[0.02] group">
                    <td class="p-5">
                        <div class="font-bold text-white">${item.name}</div>
                        <div class="text-[9px] text-gray-500 font-black uppercase">${item.type}</div>
                    </td>
                    <td class="p-5">
                        <div class="flex items-center justify-center gap-3">
                            <button onclick="updateQty(${idx},-1)" class="w-7 h-7 rounded-lg bg-white/5 border border-white/10 hover:bg-teal-500 hover:text-navy-dark transition">-</button>
                            <span class="font-black text-lg w-4 text-center">${item.qty}</span>
                            <button onclick="updateQty(${idx},1)" class="w-7 h-7 rounded-lg bg-white/5 border border-white/10 hover:bg-teal-500 hover:text-navy-dark transition">+</button>
                        </div>
                    </td>
                    <td class="p-5 text-right text-gray-400 font-medium">${item.price.toLocaleString()}</td>
                    <td class="p-5 text-right font-black text-white text-lg">฿${(item.price * item.qty).toLocaleString()}</td>
                    <td class="p-5 text-center">
                        <button onclick="removeItem(${idx})" class="text-red-500/20 group-hover:text-red-500 transition">✕</button>
                    </td>
                </tr>
            `).join('');
            
            document.getElementById('cart-empty').classList.toggle('hidden', cart.length > 0);
            calculateTotal();
        }

        function calculateTotal() {
            const sum = cart.reduce((acc, i) => acc + (i.price * i.qty), 0);
            const disc = parseFloat(document.getElementById('discount-val').value) || 0;
            const net = Math.max(0, sum - disc);
            
            document.getElementById('sum-price').innerText = sum.toLocaleString('th-TH', {minimumFractionDigits: 2});
            document.getElementById('net-total').innerText = net.toLocaleString('th-TH', {minimumFractionDigits: 2});
            calculateChange();
        }

        function quickCash(amt) {
            const el = document.getElementById('received-amount');
            el.value = (parseFloat(el.value) || 0) + amt;
            calculateChange();
        }

        function calculateChange() {
            const net = parseFloat(document.getElementById('net-total').innerText.replace(/,/g, ''));
            const received = parseFloat(document.getElementById('received-amount').value) || 0;
            const change = received - net;
            document.getElementById('change-val').innerText = change >= 0 ? change.toLocaleString('th-TH',{minimumFractionDigits:2}) : "0.00";
        }

        async function confirmPayment() {
            if (!activeRecord || cart.length === 0) return alert("กรุณาเลือกบิลก่อนชำระเงิน");
            const net = parseFloat(document.getElementById('net-total').innerText.replace(/,/g, ''));
            const received = parseFloat(document.getElementById('received-amount').value) || 0;
            
            if (received < net) return alert("ยอดเงินรับไม่เพียงพอ");

            // Mock saving logic
            addLog(activeRecord.owner_hn, "ชำระเงินสำเร็จ", net);
            
            // ... [Insert Supabase update logic here] ...
            
            alert("บันทึกการชำระเงินสำเร็จ!");
            location.reload();
        }

        // Logic for Catalog, UpdateQty, etc. remains consistent with previous versions.
    </script>
</body>
</html>
