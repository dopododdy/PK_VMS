<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <title>หน้าจอโฆษณา | PK-VMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100vw; height: 100vh;
            overflow: hidden;
            background: #020617;
            font-family: "Sarabun", sans-serif;
            color: #e2e8f0;
        }

        /* ===== LAYOUT ===== */
        #signage-root {
            display: flex;
            flex-direction: column;
            width: 100vw;
            height: 100vh;
        }

        /* --- Top row: video + slideshow --- */
        #row-top {
            display: flex;
            flex: 0 0 86%;
            min-height: 0;
        }

        /* Section 1 – Video (left top) */
        #sec-video {
            flex: 0 0 56%;
            display: flex;
            flex-direction: column;
            background: #000;
            overflow: hidden;
        }
        /* Video area: natural 16:9 ratio, pinned to top */
        #video-area {
            width: 100%;
            aspect-ratio: 16 / 9;
            position: relative;
            flex-shrink: 0;
            background: #000;
        }
        #video-area iframe,
        #video-area video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
            object-fit: cover;
        }
        #video-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: #334155;
        }
        #video-placeholder .icon { font-size: 3rem; }
        #video-placeholder .msg { font-size: 1rem; font-weight: 600; }
        /* Below-video slide panel */
        #sec-video-bottom {
            flex: 1;
            min-height: 0;
            position: relative;
            background: #020617;
            overflow: hidden;
        }
        /* Section 1B slide items */
        .vb-slide-item {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.8s ease;
            overflow: hidden;
        }
        .vb-slide-item.active { opacity: 1; z-index: 1; }
        .vb-slide-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .vb-slide-text {
            font-size: clamp(1rem, 3.5vw, 2.8rem);
            font-weight: 800;
            color: #14b8b1;
            text-align: center;
            padding: 16px 24px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }
        #video-bottom-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #1e293b;
        }
        #video-bottom-placeholder .icon { font-size: 2rem; }
        #video-bottom-placeholder .msg { font-size: 0.85rem; font-weight: 600; }

        /* Section 2 – Slideshow (right top) */
        #sec-slideshow {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #0f172a;
        }
        .slide-item {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.8s ease;
            overflow: hidden;
        }
        .slide-item.active { opacity: 1; z-index: 1; }
        .slide-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .slide-text-wrap {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px;
            text-align: center;
        }
        .slide-text-wrap .slide-title {
            font-size: clamp(1.2rem, 3vw, 2.4rem);
            font-weight: 800;
            color: #14b8b1;
            margin-bottom: 12px;
            line-height: 1.3;
        }
        .slide-text-wrap .slide-subtitle {
            font-size: clamp(0.9rem, 2vw, 1.5rem);
            color: #cbd5e1;
            line-height: 1.6;
        }
        #slide-dots {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 10;
        }
        .slide-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transition: background 0.3s;
        }
        .slide-dot.active { background: #14b8b1; }
        #slideshow-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: #334155;
        }
        #slideshow-placeholder .icon { font-size: 3rem; }
        #slideshow-placeholder .msg { font-size: 1rem; font-weight: 600; }

        /* --- Bottom row: scrolling ticker --- */
        #row-ticker {
            flex: 0 0 14%;
            min-height: 0;
            display: flex;
            align-items: center;
            background: linear-gradient(90deg, #0d9488 0%, #0f172a 30%, #0f172a 70%, #0d9488 100%);
            overflow: hidden;
            position: relative;
            border-top: 2px solid #14b8b1;
        }
        #ticker-track {
            display: flex;
            align-items: center;
            white-space: nowrap;
            animation: ticker-scroll linear infinite;
            font-size: clamp(1rem, 2.5vh, 1.6rem);
            font-weight: 700;
            color: #e2e8f0;
            padding-right: 80px;
        }
        #ticker-track .ticker-sep {
            display: inline-block;
            margin: 0 48px;
            color: #14b8b1;
            font-size: 1.5em;
        }
        @keyframes ticker-scroll {
            0%   { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        #ticker-placeholder {
            width: 100%;
            text-align: center;
            color: #334155;
            font-size: 1rem;
            font-weight: 600;
        }

        /* Divider lines */
        #row-top { border-bottom: 2px solid #020617; }
    </style>
</head>
<body>

<div id="signage-root">

    <!-- Row 1: Top -->
    <div id="row-top">

        <!-- Section 1: Video -->
        <div id="sec-video">
            <!-- 16:9 video pinned to top -->
            <div id="video-area">
                <div id="video-placeholder">
                    <div class="icon">🎬</div>
                    <div class="msg">ยังไม่ได้ตั้งค่า URL วิดีโอ</div>
                </div>
            </div>
            <!-- Remaining space below video -->
            <div id="sec-video-bottom">
                <div id="video-bottom-placeholder">
                    <div class="icon">🖼️</div>
                    <div class="msg">ยังไม่ได้ตั้งค่ารูปภาพ</div>
                </div>
            </div>
        </div>

        <!-- Section 2: Slideshow -->
        <div id="sec-slideshow">
            <div id="slideshow-placeholder">
                <div class="icon">🖼️</div>
                <div class="msg">ยังไม่ได้เพิ่มสไลด์</div>
            </div>
            <div id="slide-dots"></div>
        </div>

    </div>

    <!-- Row 2: Ticker (bottom) -->
    <div id="row-ticker">
        <div id="ticker-placeholder">ยังไม่ได้ตั้งค่าข้อความวิ่ง</div>
        <div id="ticker-track" style="display:none;"></div>
    </div>

</div>

<script>
// ==========================================
//  signage.html – reads config from localStorage + Supabase
//  Key: "signageCfg"
// ==========================================

function getConfig() {
    try {
        return JSON.parse(localStorage.getItem("signageCfg") || "{}");
    } catch(e) { return {}; }
}

async function getConfigFromSupabase() {
    try {
        const { data } = await db.from('app_settings').select('value').eq('key', 'signageCfg').maybeSingle();
        if (data?.value) {
            localStorage.setItem('signageCfg', JSON.stringify(data.value));
            return data.value;
        }
    } catch(e) { console.warn('Supabase load error:', e); }
    return null;
}

// ---- Section 1: Video ----
function initVideo(cfg) {
    const url = (cfg.videoUrl || "").trim();
    const container = document.getElementById("video-area");
    if (!url) return;

    document.getElementById("video-placeholder").style.display = "none";

    // Detect YouTube (supports watch, short URL, embed, and /v/ formats)
    const ytMatch = url.match(/(?:youtube\.com\/(?:watch\?(?:.*&)?v=|embed\/|v\/|shorts\/)|youtu\.be\/)([A-Za-z0-9_-]{11})/);
    if (ytMatch) {
        const iframe = document.createElement("iframe");
        iframe.src = `https://www.youtube.com/embed/${ytMatch[1]}?autoplay=1&mute=1&loop=1&playlist=${ytMatch[1]}&controls=0&modestbranding=1`;
        iframe.allow = "autoplay; fullscreen";
        iframe.allowFullscreen = true;
        container.appendChild(iframe);
        return;
    }

    // Direct video file
    const video = document.createElement("video");
    video.src = url;
    video.autoplay = true;
    video.muted = true;
    video.loop = true;
    video.playsInline = true;
    video.controls = false;
    container.appendChild(video);
}

// ---- Section 1b: Below-video slideshow ----
let vbSlideIndex = 0;
let vbSlideTimer = null;

function initVideoBottomSlide(cfg) {
    const slides = cfg.videoBottomSlides || [];
    const interval = (cfg.videoBottomInterval || 5) * 1000;
    const container = document.getElementById("sec-video-bottom");

    if (!slides.length) {
        // Backward compatibility: legacy single image
        const src = (cfg.videoBottomSrc || "").trim();
        if (src) {
            document.getElementById("video-bottom-placeholder").style.display = "none";
            const item = document.createElement("div");
            item.className = "vb-slide-item active";
            const img = document.createElement("img");
            img.src = src;
            img.alt = "รูปภาพแสดงผลใต้วิดีโอ";
            item.appendChild(img);
            container.appendChild(item);
        }
        return;
    }

    document.getElementById("video-bottom-placeholder").style.display = "none";

    slides.forEach((s, i) => {
        const el = document.createElement("div");
        el.className = "vb-slide-item" + (i === 0 ? " active" : "");

        if (s.type === "image" || s.type === "upload") {
            el.style.background = "#000";
            const img = document.createElement("img");
            img.src = s.src || s.url || "";
            img.alt = s.caption || "";
            el.appendChild(img);
        } else {
            // text – 1 line
            el.style.background = s.bg || "linear-gradient(135deg,#020617 0%,#0f172a 100%)";
            const textEl = document.createElement("div");
            textEl.className = "vb-slide-text";
            textEl.style.color = s.textColor || "#14b8b1";
            if (s.textSize) textEl.style.fontSize = s.textSize + "px";
            textEl.textContent = s.text || "";
            el.appendChild(textEl);
        }

        container.appendChild(el);
    });

    if (slides.length <= 1) return;

    function showVBSlide(idx) {
        const items = container.querySelectorAll(".vb-slide-item");
        items.forEach((el, i) => el.classList.toggle("active", i === idx));
        vbSlideIndex = idx;
    }

    function nextVBSlide() {
        const items = container.querySelectorAll(".vb-slide-item");
        showVBSlide((vbSlideIndex + 1) % items.length);
    }

    vbSlideTimer = setInterval(nextVBSlide, interval);

    document.addEventListener("visibilitychange", () => {
        if (document.hidden) {
            clearInterval(vbSlideTimer);
        } else {
            vbSlideTimer = setInterval(nextVBSlide, interval);
        }
    });
}

// ---- Section 2: Slideshow ----
let slideIndex = 0;
let slideTimer = null;

function initSlideshow(cfg) {
    const slides = cfg.slides || [];
    const interval = (cfg.slideInterval || 5) * 1000;
    const container = document.getElementById("sec-slideshow");
    const dotsContainer = document.getElementById("slide-dots");

    if (!slides.length) return;

    document.getElementById("slideshow-placeholder").remove();

    slides.forEach((s, i) => {
        const el = document.createElement("div");
        el.className = "slide-item" + (i === 0 ? " active" : "");

        if (s.type === "image" || s.type === "upload") {
            const img = document.createElement("img");
            img.src = s.src || s.url || "";
            img.alt = s.caption || "";
            el.appendChild(img);
        } else {
            // text slide
            const wrap = document.createElement("div");
            wrap.className = "slide-text-wrap";
            wrap.style.background = s.bg || "linear-gradient(135deg,#020617 0%,#0f172a 100%)";

            const title = document.createElement("div");
            title.className = "slide-title";
            title.style.color = s.titleColor || "#14b8b1";
            if (s.titleSize) title.style.fontSize = s.titleSize + "px";
            title.textContent = s.title || "";
            wrap.appendChild(title);

            if (s.subtitle) {
                const sub = document.createElement("div");
                sub.className = "slide-subtitle";
                sub.style.color = s.subtitleColor || "#cbd5e1";
                if (s.subtitleSize) sub.style.fontSize = s.subtitleSize + "px";
                // Split on literal "\n" and insert <br> elements safely (no innerHTML)
                const lines = (s.subtitle || "").split(/\\n/);
                lines.forEach((line, li) => {
                    if (li > 0) sub.appendChild(document.createElement("br"));
                    sub.appendChild(document.createTextNode(line));
                });
                wrap.appendChild(sub);
            }
            el.style.background = s.bg || "linear-gradient(135deg,#020617 0%,#0f172a 100%)";
            el.appendChild(wrap);
        }

        container.appendChild(el);

        // dot
        const dot = document.createElement("div");
        dot.className = "slide-dot" + (i === 0 ? " active" : "");
        dotsContainer.appendChild(dot);
    });

    function showSlide(idx) {
        const items = container.querySelectorAll(".slide-item");
        const dots  = dotsContainer.querySelectorAll(".slide-dot");
        items.forEach((el, i) => el.classList.toggle("active", i === idx));
        dots.forEach((d, i)  => d.classList.toggle("active", i === idx));
        slideIndex = idx;
    }

    function nextSlide() {
        const items = container.querySelectorAll(".slide-item");
        showSlide((slideIndex + 1) % items.length);
    }

    slideTimer = setInterval(nextSlide, interval);

    // Restart timer on visibility change
    document.addEventListener("visibilitychange", () => {
        if (document.hidden) {
            clearInterval(slideTimer);
        } else {
            slideTimer = setInterval(nextSlide, interval);
        }
    });
}

// ---- Section 3: Ticker ----
function initTicker(cfg) {
    const text = (cfg.tickerText || "").trim();
    const speed = cfg.tickerSpeed || 60; // pixels per second (approx)
    if (!text) return;

    document.getElementById("ticker-placeholder").style.display = "none";
    const track = document.getElementById("ticker-track");
    track.style.display = "flex";

    // Apply font properties
    const fontSize = parseInt(cfg.tickerFontSize) || 28;
    const fontStyleStr = cfg.tickerFontStyle || "normal";
    track.style.fontSize = fontSize + "px";
    track.style.color = cfg.tickerColor || "#e2e8f0";
    track.style.fontFamily = cfg.tickerFontFamily || "Sarabun, sans-serif";
    track.style.fontWeight = fontStyleStr.includes("bold") ? "bold" : "normal";
    track.style.fontStyle  = fontStyleStr.includes("italic") ? "italic" : "normal";

    // Build ticker content safely using DOM (no innerHTML with user data)
    function makeSep() {
        const s = document.createElement("span");
        s.className = "ticker-sep";
        s.textContent = "◆";
        return s;
    }
    function makeTextSpan(t) {
        const s = document.createElement("span");
        s.textContent = t;
        return s;
    }
    // Duplicate 4× so the CSS translateX(-50%) loop is seamless
    for (let i = 0; i < 4; i++) {
        track.appendChild(makeTextSpan(text));
        track.appendChild(makeSep());
    }

    // Calculate animation duration based on speed (px/s).
    // The animation scrolls 50% of the total track width (half = 2 copies).
    // Approximate total content width as innerWidth × 2; minimum 8 s to avoid
    // an imperceptibly fast animation on very wide screens.
    const duration = Math.max(8, Math.round((window.innerWidth * 2) / speed));
    track.style.animationDuration = duration + "s";
}

// ---- Boot ----
async function boot() {
    // Load from localStorage first for immediate display
    const cfgLocal = getConfig();
    initVideo(cfgLocal);
    initVideoBottomSlide(cfgLocal);
    initSlideshow(cfgLocal);
    initTicker(cfgLocal);
    // After reloading due to Supabase data, skip another Supabase check to prevent loops
    if (sessionStorage.getItem('_supabase_boot')) {
        sessionStorage.removeItem('_supabase_boot');
        return;
    }
    // Load from Supabase and reload page if config differs from localStorage
    const cfgSupabase = await getConfigFromSupabase();
    if (cfgSupabase && JSON.stringify(cfgSupabase) !== JSON.stringify(cfgLocal)) {
        sessionStorage.setItem('_supabase_boot', '1');
        window.location.reload();
    }
}

// Listen for storage updates (live reload when settings saved)
window.addEventListener("storage", (e) => {
    if (e.key === "signageCfg") {
        window.location.reload();
    }
});

window.addEventListener("DOMContentLoaded", boot);
</script>
</body>
</html>
