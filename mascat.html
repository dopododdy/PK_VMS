<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ฐานข้อมูลรายการกลาง | PK-VMS Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>

    <style>
        :root { --navy: #020617; --navy-light: #0f172a; --teal: #14b8b1; --border: rgba(255, 255, 255, 0.1); }
        * { font-family: "Sarabun", sans-serif !important; }
        body { background: var(--navy); color: #e2e8f0; }

        .input-box { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; padding: 12px; color: white; width: 100%; outline: none; transition: 0.2s; }
        .input-box:focus { border-color: var(--teal); background: rgba(0,0,0,0.5); }

        .section-card { background: rgba(30, 41, 59, 0.4); border-radius: 30px; padding: 30px; border: 1px solid var(--border); margin-bottom: 24px; }
        
        .tab-btn { @apply px-6 py-3 font-bold transition-all border-b-4 border-transparent cursor-pointer opacity-50; }
        .tab-btn.active { @apply border-teal-500 text-teal-400 opacity-100 bg-teal-500/5; }

        /* Button Style */
        .btn-base { padding: 12px 24px; border-radius: 15px; font-weight: 800; display: inline-flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; border: none; cursor: pointer; color: white !important; }
        .btn-teal { background-color: #0d9488 !important; }
        .btn-teal:hover { background-color: #0f766e !important; transform: translateY(-2px); }
        .btn-blue { background-color: #2563eb !important; }
        .btn-red { background-color: #dc2626 !important; }

        .item-row { border-bottom: 1px solid rgba(255,255,255,0.05); transition: 0.2s; }
        .item-row:hover { background: rgba(255,255,255,0.02); }
        
        .badge { padding: 2px 10px; border-radius: 8px; font-size: 0.8rem; font-weight: 800; }
        .badge-ยา { background: rgba(20, 184, 177, 0.2); color: var(--teal); }
        .badge-หัตถการ { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .badge-สินค้า { background: rgba(168, 85, 247, 0.2); color: #a855f7; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div class="flex items-center gap-6">
                <div class="w-14 h-14 rounded-2xl bg-teal-500/20 flex items-center justify-center text-3xl shadow-lg border border-teal-500/20">🗂️</div>
                <div>
                    <h1 class="text-4xl font-black text-white">ฐานข้อมูลรายการกลาง</h1>
                    <p class="text-slate-400 mt-2 font-medium">จัดการราคา ยา หัตถการ และสินค้าทั่วไป (Master Catalog)</p>
                </div>
            </div>
            <a href="index.html" class="w-14 h-14 rounded-2xl bg-white/5 flex items-center justify-center hover:bg-white/10 text-3xl shadow-xl border border-white/5">🏠</a>
        </header>

        <div class="flex border-b border-white/10 mb-8">
            <div id="tab-pharmacy" class="tab-btn active" onclick="switchTab('pharmacy')">💊 ยาและสินค้า</div>
            <div id="tab-services" class="tab-btn" onclick="switchTab('services')">🩺 ค่าบริการและหัตถการ</div>
        </div>

        <div class="grid grid-cols-12 gap-8">
            <div class="col-span-12 lg:col-span-4">
                <div class="section-card sticky top-10">
                    <h3 id="form-title" class="text-2xl font-black text-white mb-8">➕ เพิ่มรายการใหม่</h3>
                    <form id="master-form" class="space-y-6">
                        <input type="hidden" id="f_id">
                        
                        <div>
                            <label class="label-text">ชื่อรายการ</label>
                            <input type="text" id="f_name" class="input-box font-bold" placeholder="ระบุชื่อรายการ..." required>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="label-text">หมวดหมู่</label>
                                <select id="f_category" class="input-box font-bold">
                                    </select>
                            </div>
                            <div>
                                <label class="label-text">หน่วยเรียก</label>
                                <input type="text" id="f_unit" class="input-box" placeholder="เม็ด / ml / ครั้ง">
                            </div>
                        </div>

                        <div>
                            <label class="label-text text-yellow-400">ราคาต่อหน่วย (฿)</label>
                            <input type="number" id="f_price" class="input-box text-3xl font-black text-yellow-400" placeholder="0.00" step="0.01" required>
                        </div>

                        <div class="pt-4 space-y-3">
                            <button type="submit" class="btn-base btn-teal w-full text-xl shadow-lg">💾 บันทึกข้อมูล</button>
                            <button type="button" id="btn-cancel" class="btn-base btn-red w-full hidden" onclick="resetForm()">ยกเลิกการแก้ไข</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="col-span-12 lg:col-span-8">
                <div class="section-card">
                    <div class="flex justify-between items-center mb-8">
                        <h3 class="text-xl font-bold text-white">รายการทั้งหมดในระบบ</h3>
                        <div class="w-64">
                            <input type="text" id="search-box" class="input-box py-2 text-sm" placeholder="🔍 ค้นหาเร็ว..." oninput="renderTable()">
                        </div>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="text-slate-500 text-xs uppercase tracking-wider border-b border-white/10">
                                    <th class="pb-4 pl-2">รายการ</th>
                                    <th class="pb-4">หมวดหมู่</th>
                                    <th class="pb-4 text-right">ราคา</th>
                                    <th class="pb-4 text-center">จัดการ</th>
                                </tr>
                            </thead>
                            <tbody id="data-table-body">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentTab = 'pharmacy';
        let allData = [];
        let editingId = null;

        // ปรับหมวดหมู่ตามคำขอ
        const CATEGORIES = {
            pharmacy: ['ยา', 'สินค้า'],
            services: ['หัตถการ']
        };

        window.onload = () => {
            switchTab('pharmacy');
        };

        async function switchTab(tab) {
            currentTab = tab;
            editingId = null;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            
            const catSelect = document.getElementById('f_category');
            catSelect.innerHTML = CATEGORIES[tab].map(c => `<option value="${c}">${c}</option>`).join('');
            
            resetForm();
            await loadData();
        }

        async function loadData() {
            const table = (currentTab === 'pharmacy') ? 'pharmacy' : 'services';
            const { data, error } = await db.from(table).select('*').order('created_at', { ascending: false });
            
            if (error) return console.error(error);
            allData = data;
            renderTable();
        }

        function renderTable() {
            const term = document.getElementById('search-box').value.toLowerCase();
            const body = document.getElementById('data-table-body');
            const nameKey = (currentTab === 'pharmacy') ? 'item_name' : 'service_name';
            const priceKey = (currentTab === 'pharmacy') ? 'price_per_unit' : 'price';

            const filtered = allData.filter(item => {
                const name = item[nameKey] || '';
                return name.toLowerCase().includes(term);
            });

            if (filtered.length === 0) {
                body.innerHTML = `<tr><td colspan="4" class="py-20 text-center text-slate-600 font-bold">ไม่พบข้อมูลในหมวดนี้</td></tr>`;
                return;
            }

            body.innerHTML = filtered.map(item => `
                <tr class="item-row group">
                    <td class="py-5 pl-2">
                        <div class="font-bold text-white text-lg">${item[nameKey]}</div>
                        <div class="text-slate-500 text-xs font-medium">หน่วย: ${item.unit || 'ไม่ระบุ'}</div>
                    </td>
                    <td class="py-5">
                        <span class="badge badge-${item.category}">${item.category || 'ทั่วไป'}</span>
                    </td>
                    <td class="py-5 text-right font-black text-2xl text-yellow-400">
                        <span class="text-sm font-bold mr-1">฿</span>${parseFloat(item[priceKey] || 0).toLocaleString(undefined, {minimumFractionDigits: 2})}
                    </td>
                    <td class="py-5 text-center">
                        <div class="flex justify-center gap-2">
                            <button onclick="editItem('${item.id}')" class="btn-base btn-blue !py-2 !px-4 text-sm shadow-md">✏️</button>
                            <button onclick="deleteItem('${item.id}')" class="btn-base btn-red !py-2 !px-4 text-sm shadow-md">🗑️</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        document.getElementById('master-form').onsubmit = async (e) => {
            e.preventDefault();
            const table = (currentTab === 'pharmacy') ? 'pharmacy' : 'services';
            
            const payload = {
                category: document.getElementById('f_category').value,
                unit: document.getElementById('f_unit').value,
                updated_at: new Date()
            };

            if (currentTab === 'pharmacy') {
                payload.item_name = document.getElementById('f_name').value;
                payload.price_per_unit = parseFloat(document.getElementById('f_price').value);
            } else {
                payload.service_name = document.getElementById('f_name').value;
                payload.price = parseFloat(document.getElementById('f_price').value);
            }

            try {
                if (editingId) {
                    await db.from(table).update(payload).eq('id', editingId);
                } else {
                    await db.from(table).insert([payload]);
                }
                alert("✅ บันทึกข้อมูลสำเร็จ");
                switchTab(currentTab);
            } catch (err) { alert(err.message); }
        };

        function editItem(id) {
            const item = allData.find(i => i.id === id);
            if (!item) return;

            editingId = id;
            document.getElementById('form-title').innerText = "✏️ แก้ไขข้อมูล";
            document.getElementById('btn-cancel').classList.remove('hidden');
            
            document.getElementById('f_name').value = item.item_name || item.service_name;
            document.getElementById('f_category').value = item.category || '';
            document.getElementById('f_unit').value = item.unit || '';
            document.getElementById('f_price').value = item.price_per_unit || item.price;

            window.scrollTo({ top: 150, behavior: 'smooth' });
        }

        async function deleteItem(id) {
            if (!confirm("ยืนยันการลบรายการนี้ออกจากฐานข้อมูล?")) return;
            const table = (currentTab === 'pharmacy') ? 'pharmacy' : 'services';
            await db.from(table).delete().eq('id', id);
            loadData();
        }

        function resetForm() {
            editingId = null;
            document.getElementById('master-form').reset();
            document.getElementById('form-title').innerText = "➕ เพิ่มรายการใหม่";
            document.getElementById('btn-cancel').classList.add('hidden');
        }

        function goBack() { window.location.href = 'index.html'; }
    </script>
</body>
</html>
