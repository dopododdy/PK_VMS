<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ฐานข้อมูลรายการกลาง | PK-VMS Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>

    <style>
        :root { --navy: #020617; --navy-light: #0f172a; --teal: #14b8b1; --border: rgba(255, 255, 255, 0.1); }
        * { font-family: "Sarabun", sans-serif !important; }
        body { background: var(--navy); color: #e2e8f0; }

        .input-box { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; padding: 10px; color: white; width: 100%; outline: none; transition: 0.2s; }
        .input-box:focus { border-color: var(--teal); background: rgba(0,0,0,0.5); }

        .section-card { background: rgba(30, 41, 59, 0.4); border-radius: 30px; padding: 30px; border: 1px solid var(--border); margin-bottom: 24px; }
        
        .tab-btn { @apply px-6 py-3 font-bold transition-all border-b-4 border-transparent cursor-pointer opacity-50; }
        .tab-btn.active { @apply border-teal-500 text-teal-400 opacity-100 bg-teal-500/5; }

        /* Button Style */
        .btn-base { padding: 10px 20px; border-radius: 12px; font-weight: 800; display: inline-flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; border: none; cursor: pointer; color: white !important; }
        .btn-teal { background-color: #0d9488 !important; }
        .btn-teal:hover { background-color: #0f766e !important; transform: translateY(-2px); }
        .btn-blue { background-color: #2563eb !important; }
        .btn-red { background-color: #dc2626 !important; }

        .item-row { border-bottom: 1px solid rgba(255,255,255,0.05); transition: 0.2s; }
        .item-row:hover { background: rgba(255,255,255,0.02); }
        
        .badge { padding: 2px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; }
        .badge-rx { background: rgba(20, 184, 177, 0.2); color: var(--teal); }
        .badge-tx { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .badge-lab { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div class="flex items-center gap-6">
                <div class="w-12 h-12 rounded-full bg-teal-500/20 flex items-center justify-center text-2xl">🗂️</div>
                <div>
                    <h1 class="text-3xl font-black text-white">ฐานข้อมูลรายการกลาง</h1>
                    <p class="text-slate-400">จัดการราคา ยา บริการ และแล็บ (Master Catalog)</p>
                </div>
            </div>
            <a href="index.html" class="w-14 h-14 rounded-2xl bg-white/5 flex items-center justify-center hover:bg-white/10 text-3xl shadow-xl border border-white/5">🏠</a>
        </header>

        <div class="flex border-b border-white/10 mb-8">
            <div id="tab-pharmacy" class="tab-btn active" onclick="switchTab('pharmacy')">💊 ยาและเวชภัณฑ์</div>
            <div id="tab-services" class="tab-btn" onclick="switchTab('services')">🩺 ค่าบริการและหัตถการ</div>
        </div>

        <div class="grid grid-cols-12 gap-8">
            <div class="col-span-12 lg:col-span-4">
                <div class="section-card sticky top-10">
                    <h3 id="form-title" class="text-xl font-black text-white mb-6">➕ เพิ่มรายการใหม่</h3>
                    <form id="master-form" class="space-y-4">
                        <input type="hidden" id="f_id">
                        
                        <div>
                            <label class="text-xs font-bold text-slate-500 uppercase ml-1">ชื่อรายการ</label>
                            <input type="text" id="f_name" class="input-box" placeholder="เช่น Amoxy 500mg..." required>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-xs font-bold text-slate-500 uppercase ml-1">หมวดหมู่</label>
                                <select id="f_category" class="input-box">
                                    </select>
                            </div>
                            <div>
                                <label class="text-xs font-bold text-slate-500 uppercase ml-1">หน่วยเรียก</label>
                                <input type="text" id="f_unit" class="input-box" placeholder="เม็ด / ml / ครั้ง">
                            </div>
                        </div>

                        <div>
                            <label class="text-xs font-bold text-slate-500 uppercase ml-1">ราคาต่อหน่วย (฿)</label>
                            <input type="number" id="f_price" class="input-box text-xl font-black text-yellow-400" placeholder="0.00" step="0.01" required>
                        </div>

                        <div id="stock-group">
                            <label class="text-xs font-bold text-slate-500 uppercase ml-1">จำนวนสต็อกคงเหลือ</label>
                            <input type="number" id="f_stock" class="input-box" placeholder="0">
                        </div>

                        <div class="pt-4 space-y-3">
                            <button type="submit" class="btn-base btn-teal w-full py-4 text-lg">💾 บันทึกรายการ</button>
                            <button type="button" id="btn-cancel" class="btn-base btn-red w-full hidden" onclick="resetForm()">ยกเลิกการแก้ไข</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="col-span-12 lg:col-span-8">
                <div class="section-card">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-xl font-bold text-white">รายการทั้งหมดในระบบ</h3>
                        <div class="w-64">
                            <input type="text" id="search-box" class="input-box py-2 text-sm" placeholder="🔍 ค้นหาในหมวดนี้..." oninput="renderTable()">
                        </div>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="text-slate-500 text-xs uppercase tracking-wider border-b border-white/10">
                                    <th class="pb-4 pl-2">รายการ</th>
                                    <th class="pb-4">หมวด</th>
                                    <th class="pb-4 text-right">ราคา</th>
                                    <th class="pb-4 text-center" id="th-stock">สต็อก</th>
                                    <th class="pb-4 text-center">จัดการ</th>
                                </tr>
                            </thead>
                            <tbody id="data-table-body">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentTab = 'pharmacy';
        let allData = [];
        let editingId = null;

        const CATEGORIES = {
            pharmacy: ['Rx', 'Tx', 'Supplies', 'Retail'],
            services: ['General', 'Lab', 'Surgery', 'X-Ray']
        };

        window.onload = () => {
            switchTab('pharmacy');
        };

        async function switchTab(tab) {
            currentTab = tab;
            editingId = null;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            
            // ปรับฟอร์มตามหมวด
            const catSelect = document.getElementById('f_category');
            catSelect.innerHTML = CATEGORIES[tab].map(c => `<option value="${c}">${c}</option>`).join('');
            
            document.getElementById('stock-group').style.display = (tab === 'pharmacy') ? 'block' : 'none';
            document.getElementById('th-stock').style.display = (tab === 'pharmacy') ? 'table-cell' : 'none';
            
            resetForm();
            await loadData();
        }

        async function loadData() {
            const table = (currentTab === 'pharmacy') ? 'pharmacy' : 'services';
            const { data, error } = await db.from(table).select('*').order('item_name', { ascending: true });
            
            if (error) return console.error(error);
            allData = data;
            renderTable();
        }

        function renderTable() {
            const term = document.getElementById('search-box').value.toLowerCase();
            const body = document.getElementById('data-table-body');
            const nameKey = (currentTab === 'pharmacy') ? 'item_name' : 'service_name';
            const priceKey = (currentTab === 'pharmacy') ? 'price_per_unit' : 'price';

            const filtered = allData.filter(item => item[nameKey].toLowerCase().includes(term));

            if (filtered.length === 0) {
                body.innerHTML = `<tr><td colspan="5" class="py-10 text-center text-slate-600">ไม่พบข้อมูลรายการ</td></tr>`;
                return;
            }

            body.innerHTML = filtered.map(item => `
                <tr class="item-row group">
                    <td class="py-4 pl-2 font-bold text-white">${item[nameKey]} <span class="text-slate-500 font-normal text-xs ml-1">/ ${item.unit || '-'}</span></td>
                    <td class="py-4"><span class="badge badge-${item.category?.toLowerCase()}">${item.category || 'N/A'}</span></td>
                    <td class="py-4 text-right font-black text-yellow-400">฿${item[priceKey]?.toLocaleString()}</td>
                    ${currentTab === 'pharmacy' ? `<td class="py-4 text-center font-bold ${item.stock_qty < 10 ? 'text-red-400' : 'text-slate-400'}">${item.stock_qty}</td>` : ''}
                    <td class="py-4 text-center">
                        <div class="flex justify-center gap-2">
                            <button onclick="editItem('${item.id}')" class="btn-base btn-blue !py-1 !px-3 text-xs">✏️</button>
                            <button onclick="deleteItem('${item.id}')" class="btn-base btn-red !py-1 !px-3 text-xs">🗑️</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // --- CRUD Logic ---

        document.getElementById('master-form').onsubmit = async (e) => {
            e.preventDefault();
            const table = (currentTab === 'pharmacy') ? 'pharmacy' : 'services';
            
            const payload = {
                category: document.getElementById('f_category').value,
                unit: document.getElementById('f_unit').value,
                updated_at: new Date()
            };

            if (currentTab === 'pharmacy') {
                payload.item_name = document.getElementById('f_name').value;
                payload.price_per_unit = parseFloat(document.getElementById('f_price').value);
                payload.stock_qty = parseInt(document.getElementById('f_stock').value) || 0;
            } else {
                payload.service_name = document.getElementById('f_name').value;
                payload.price = parseFloat(document.getElementById('f_price').value);
            }

            try {
                if (editingId) {
                    await db.from(table).update(payload).eq('id', editingId);
                    alert("✅ อัปเดตข้อมูลสำเร็จ");
                } else {
                    await db.from(table).insert([payload]);
                    alert("✅ เพิ่มรายการสำเร็จ");
                }
                switchTab(currentTab);
            } catch (err) { alert(err.message); }
        };

        function editItem(id) {
            const item = allData.find(i => i.id === id);
            if (!item) return;

            editingId = id;
            document.getElementById('form-title').innerText = "✏️ แก้ไขรายการ";
            document.getElementById('btn-cancel').classList.remove('hidden');
            
            document.getElementById('f_name').value = item.item_name || item.service_name;
            document.getElementById('f_category').value = item.category || '';
            document.getElementById('f_unit').value = item.unit || '';
            document.getElementById('f_price').value = item.price_per_unit || item.price;
            if (currentTab === 'pharmacy') document.getElementById('f_stock').value = item.stock_qty;

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function deleteItem(id) {
            if (!confirm("ลบรายการนี้ใช่หรือไม่?")) return;
            const table = (currentTab === 'pharmacy') ? 'pharmacy' : 'services';
            await db.from(table).delete().eq('id', id);
            loadData();
        }

        function resetForm() {
            editingId = null;
            document.getElementById('master-form').reset();
            document.getElementById('form-title').innerText = "➕ เพิ่มรายการใหม่";
            document.getElementById('btn-cancel').classList.add('hidden');
        }

        function goBack() { window.location.href = 'index.html'; }
    </script>
</body>
</html>
