<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายการหมวดหมู่ราคา | PK-VMS Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>

    <style>
        :root { --navy: #020617; --navy-light: #0f172a; --teal: #14b8b1; --border: rgba(255, 255, 255, 0.1); }
        * { font-family: "Sarabun", sans-serif !important; }
        body { background: var(--navy); color: #e2e8f0; font-size: 1rem; }
        
        .section-card { background: rgba(30, 41, 59, 0.4); border-radius: 20px; padding: 25px; border: 1px solid var(--border); }
        .item-row { 
            border-bottom: 1px solid var(--border); 
            transition: 0.2s;
        }
        .item-row:hover { background: rgba(255,255,255,0.02); }
        .badge-med { background: rgba(20, 184, 177, 0.1); color: var(--teal); border: 1px solid rgba(20, 184, 177, 0.3); padding: 2px 10px; border-radius: 99px; font-weight: 700; font-size: 0.85rem; }
        .badge-service { background: rgba(59, 130, 246, 0.1); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.3); padding: 2px 10px; border-radius: 99px; font-weight: 700; font-size: 0.85rem; }
        .badge-lab { background: rgba(168, 85, 247, 0.1); color: #a855f7; border: 1px solid rgba(168, 85, 247, 0.3); padding: 2px 10px; border-radius: 99px; font-weight: 700; font-size: 0.85rem; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-4">
                <a href="dashboard.html" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center hover:bg-white/10 transition-all text-xl">⬅️</a>
                <h1 class="text-3xl font-black text-white">รายการหมวดหมู่ราคา</h1>
            </div>
            <div class="flex gap-3">
                <button onclick="location.href='rx.html'" class="bg-teal-500 hover:bg-teal-400 text-navy px-6 py-2 rounded-xl font-black shadow-lg transition-all">+ จัดการคลังยา</button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-12 gap-4 mb-6">
            <div class="md:col-span-8">
                <input type="text" id="search-input" class="w-full bg-black/20 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-teal-500 transition-all" placeholder="ค้นหาชื่อรายการ..." oninput="renderAll()">
            </div>
            <div class="md:col-span-4">
                <select id="filter-type" class="w-full bg-black/20 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-teal-500 transition-all" onchange="renderAll()">
                    <option value="all">ทั้งหมด</option>
                    <option value="ยา">เฉพาะรายการยา</option>
                    <option value="หัตถการ">เฉพาะหัตถการ</option>
                    <option value="Lab">เฉพาะรายการ Lab</option>
                </select>
            </div>
        </div>

        <div class="section-card overflow-hidden p-0">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-black/40 text-teal-400 text-sm uppercase">
                        <tr>
                            <th class="px-6 py-4">ชื่อรายการ / หน่วย</th>
                            <th class="px-6 py-4">หมวดหมู่</th>
                            <th class="px-6 py-4 text-right">ราคา (฿)</th>
                            <th class="px-6 py-4 text-center">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="master-table-body">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let allItems = [];

        window.onload = async () => {
            await fetchData();
        };

        async function fetchData() {
            // 1. ดึงข้อมูลจากตารางยา (Pharmacy)
            const { data: pharmacyData } = await db.from('pharmacy').select('*');
            
            // 2. ดึงข้อมูลจากตารางบริการ (Services)
            const { data: servicesData } = await db.from('services').select('*');

            // รวมข้อมูลเข้าด้วยกันและจัด Format
            allItems = [
                ...(pharmacyData || []).map(item => ({
                    id: item.id,
                    name: item.item_name,
                    name_th: item.name_th,
                    unit: item.unit || 'ชิ้น',
                    price: item.price_per_unit,
                    type: 'ยา',
                    source: 'pharmacy'
                })),
                ...(servicesData || []).map(item => ({
                    id: item.id,
                    name: item.service_name,
                    name_th: '',
                    unit: item.unit || 'ครั้ง',
                    price: item.price,
                    type: item.category, // หัตถการ หรือ Lab
                    source: 'services'
                }))
            ];

            renderAll();
        }

        function renderAll() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const filterType = document.getElementById('filter-type').value;
            const container = document.getElementById('master-table-body');
            
            let filtered = allItems.filter(item => {
                const matchSearch = item.name.toLowerCase().includes(searchTerm) || (item.name_th && item.name_th.includes(searchTerm));
                const matchType = filterType === 'all' || item.type === filterType;
                return matchSearch && matchType;
            });

            container.innerHTML = filtered.map(item => `
                <tr class="item-row">
                    <td class="px-6 py-4">
                        <div class="font-black text-white">${item.name}</div>
                        <div class="text-xs text-slate-400 mt-1">${item.name_th ? item.name_th + ' | ' : ''} หน่วย: ${item.unit}</div>
                    </td>
                    <td class="px-6 py-4">
                        <span class="${getBadgeClass(item.type)}">${item.type}</span>
                    </td>
                    <td class="px-6 py-4 text-right font-black text-yellow-400">
                        ${item.price.toLocaleString(undefined, {minimumFractionDigits: 2})}
                    </td>
                    <td class="px-6 py-4 text-center">
                        <div class="flex justify-center gap-4 text-xl">
                            <button onclick="editItem('${item.id}', '${item.source}')" class="hover:scale-125 transition-all">✏️</button>
                            <button onclick="deleteItem('${item.id}', '${item.source}')" class="hover:scale-125 transition-all">🗑️</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function getBadgeClass(type) {
            if (type === 'ยา') return 'badge-med';
            if (type === 'หัตถการ') return 'badge-service';
            if (type === 'Lab') return 'badge-lab';
            return 'badge-service';
        }

        function editItem(id, source) {
            if (source === 'pharmacy') {
                location.href = `rx.html?id_med=${id}`;
            } else {
                alert('ฟังก์ชันแก้ไขบริการกำลังพัฒนา...');
            }
        }

        async function deleteItem(id, source) {
            if (!confirm('ยืนยันการลบรายการนี้ออกจากฐานข้อมูล?')) return;
            
            const table = source === 'pharmacy' ? 'pharmacy' : 'services';
            const { error } = await db.from(table).delete().eq('id', id);
            
            if (error) alert(error.message);
            else fetchData();
        }
    </script>
</body>
</html>
