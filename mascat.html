<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Data Management | PK-VMS Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=Prompt:wght@300;400;600&family=Sarabun:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>

    <style>
        :root { --navy: #020617; --navy-light: #0f172a; --teal: #14b811; --border: rgba(255, 255, 255, 0.1); }
        * { font-family: "Sarabun", sans-serif !important; }
        body { background: var(--navy); color: #e2e8f0; font-size: 1rem; overflow: hidden; }
        
        .input-box { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: white; width: 100%; outline: none; transition: 0.2s; font-size: 1rem; }
        .input-box:focus { border-color: var(--teal); background: rgba(0,0,0,0.5); }
        
        .label-clinical { color: var(--teal); font-weight: 700; font-size: 1rem; margin-bottom: 6px; display: block; text-transform: uppercase; }
        .section-card { background: rgba(30, 41, 59, 0.4); border-radius: 20px; padding: 25px; border: 1px solid var(--border); }
        
        .sidebar-btn { width: 100%; padding: 15px; border-radius: 15px; text-align: left; transition: 0.3s; font-weight: 800; display: flex; align-items: center; gap: 12px; margin-bottom: 8px; border: 1px solid transparent; }
        .sidebar-btn.active { background: var(--teal); color: var(--navy); box-shadow: 0 4px 15px rgba(20, 184, 177, 0.3); }
        .sidebar-btn:not(.active):hover { background: rgba(255,255,255,0.05); border-color: var(--border); }

        .item-row-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 12px; padding: 12px; cursor: pointer; transition: 0.2s; }
        .item-row-card:hover { border-color: var(--teal); background: rgba(20, 184, 177, 0.05); }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex flex-col p-4 md:p-6">

    <header class="flex justify-between items-center mb-6">
        <div class="flex items-center gap-4">
            <button onclick="location.href='index.html'" class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center hover:bg-white/10 transition-all text-white">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                </svg>
            </button>
            <div>
                <h1 class="text-3xl font-black text-white">Master Category Management</h1>
                <p class="text-teal-400 font-bold" id="current-mode-label">หมวด: ยาจ่ายกลับบ้าน</p>
            </div>
        </div>
        <button onclick="addNewItem()" class="bg-teal-500 hover:bg-teal-400 text-navy px-8 py-3 rounded-xl font-black shadow-lg transition-all">+ เพิ่มรายการใหม่</button>
    </header>

    <div class="flex flex-1 gap-6 overflow-hidden">
        
        <aside class="w-64 flex flex-col">
            <div class="section-card flex-1">
                <label class="label-clinical mb-4">หมวดหมู่หลัก</label>
                <button onclick="setCategory('TakeHome')" id="btn-takehome" class="sidebar-btn active"><span>💊</span> ยาจ่ายกลับบ้าน</button>
                <button onclick="setCategory('ProcInj')" id="btn-procinj" class="sidebar-btn"><span>💉</span> หัตถการ/ยาฉีด</button>
                <button onclick="setCategory('Lab')" id="btn-lab" class="sidebar-btn"><span>🏥</span> Lab</button>
                <button onclick="setCategory('General')" id="btn-general" class="sidebar-btn"><span>📦</span> สินค้าทั่วไป</button>
            </div>
        </aside>

        <main class="w-80 flex flex-col">
            <div class="section-card flex-1 flex flex-col overflow-hidden">
                <label class="label-clinical">🔍 ค้นหารายการ</label>
                <input type="text" id="item-search" class="input-box mb-4" placeholder="ค้นหาชื่อ..." oninput="filterItems()">
                <div id="item-list" class="space-y-2 overflow-y-auto flex-1 pr-1"></div>
            </div>
        </main>

        <section class="flex-1 overflow-y-auto pr-2">
            <div class="section-card border-t-8 border-teal-500 min-h-full flex flex-col">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                    <div>
                        <label class="label-clinical">ชื่อรายการ (EN)</label>
                        <input type="text" id="f_name_en" class="input-box" placeholder="English Name">
                    </div>
                    <div>
                        <label class="label-clinical">ชื่อภาษาไทย</label>
                        <input type="text" id="f_name_th" class="input-box" placeholder="ชื่อเรียกภาษาไทย">
                    </div>
                    
                    <div>
                        <label class="label-clinical">หน่วย (Unit)</label>
                        <select id="f_unit" class="input-box cursor-pointer">
                            <option value="">-- เลือกหน่วย --</option>
                            <option value="ขวด">ขวด</option>
                            <option value="แคปซูล">แคปซูล</option>
                            <option value="ซีซี (cc)">ซีซี (cc)</option>
                            <option value="มิลลิลิตร (mL)">มิลลิลิตร (mL)</option>
                            <option value="เม็ด">เม็ด</option>
                            <option value="อัน">อัน</option>
                        </select>
                    </div>
                    
                    <div id="fixed-price-section">
                        <label class="label-clinical text-yellow-400">ราคาขายต่อหน่วย (฿)</label>
                        <input type="number" id="f_price" class="input-box text-yellow-400 font-bold" placeholder="0.00">
                    </div>
                </div>

                <div id="tiered-price-section" class="hidden mb-8">
                    <label class="label-clinical text-yellow-400 mb-4">💰 ราคาตามช่วงน้ำหนัก (Weight Tiers)</label>
                    <div class="bg-black/20 p-5 rounded-2xl border border-white/5">
                        <div class="grid grid-cols-12 gap-2 mb-2 text-xs font-bold text-slate-500 uppercase">
                            <div class="col-span-4 text-center">น้ำหนักตัว (กก.)</div>
                            <div class="col-span-8">ราคาที่ต้องจ่าย (บาท)</div>
                        </div>
                        <div id="tiers-container" class="space-y-3"></div>
                    </div>
                </div>

                <div id="med-config-section">
                    <div class="grid grid-cols-2 gap-6 mb-8">
                        <div>
                            <label class="label-clinical">ความเข้มข้น</label>
                            <input type="number" id="f_conc" class="input-box" placeholder="mg/unit">
                        </div>
                        
                        <div>
                            <label class="label-clinical">หมวดหมู่ย่อย</label>
                            <select id="f_sub_cat" class="input-box cursor-pointer">
                                <option value="">-- เลือกหมวดหมู่ --</option>
                                <option value="Antibiotics">Antibiotics</option>
                                <option value="NSAIDs">NSAIDs</option>
                                <option value="Vaccines">Vaccines</option>
                                <option value="General">General</option>
                            </select>
                        </div>
                    </div>
                    
                    <div id="dosage-section" class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                        <div class="bg-blue-500/5 p-5 rounded-2xl border border-blue-500/20">
                            <h3 class="text-blue-400 font-black text-xl mb-4">🐕 DOG DOSAGE GUIDE</h3>
                            <div class="space-y-3">
                                <div class="grid grid-cols-12 gap-2"><input type="number" id="f_dog_dose_1" class="col-span-4 input-box text-center" placeholder="Dose"><input type="text" id="f_dog_for_1" class="col-span-8 input-box" placeholder="For..."></div>
                                <div class="grid grid-cols-12 gap-2"><input type="number" id="f_dog_dose_2" class="col-span-4 input-box text-center" placeholder="Dose"><input type="text" id="f_dog_for_2" class="col-span-8 input-box" placeholder="For..."></div>
                                <div class="grid grid-cols-12 gap-2"><input type="number" id="f_dog_dose_3" class="col-span-4 input-box text-center" placeholder="Dose"><input type="text" id="f_dog_for_3" class="col-span-8 input-box" placeholder="For..."></div>
                                <div class="grid grid-cols-12 gap-2"><input type="number" id="f_dog_dose_4" class="col-span-4 input-box text-center" placeholder="Dose"><input type="text" id="f_dog_for_4" class="col-span-8 input-box" placeholder="For..."></div>
                                <div class="grid grid-cols-12 gap-2"><input type="number" id="f_dog_dose_5" class="col-span-4 input-box text-center" placeholder="Dose"><input type="text" id="f_dog_for_5" class="col-span-8 input-box" placeholder="For..."></div>
                            </div>
                        </div>
                        <div class="bg-pink-500/5 p-5 rounded-2xl border border-pink-500/20">
                            <h3 class="text-pink-400 font-black text-xl mb-4">🐈 CAT DOSAGE GUIDE</h3>
                            <div class="space-y-3">
                                <div class="grid grid-cols-12 gap-2"><input type="number" id="f_cat_dose_1" class="col-span-4 input-box text-center" placeholder="Dose"><input type="text" id="f_cat_for_1" class="col-span-8 input-box" placeholder="For..."></div>
                                <div class="grid grid-cols-12 gap-2"><input type="number" id="f_cat_dose_2" class="col-span-4 input-box text-center" placeholder="Dose"><input type="text" id="f_cat_for_2" class="col-span-8 input-box" placeholder="For..."></div>
                                <div class="grid grid-cols-12 gap-2"><input type="number" id="f_cat_dose_3" class="col-span-4 input-box text-center" placeholder="Dose"><input type="text" id="f_cat_for_3" class="col-span-8 input-box" placeholder="For..."></div>
                                <div class="grid grid-cols-12 gap-2"><input type="number" id="f_cat_dose_4" class="col-span-4 input-box text-center" placeholder="Dose"><input type="text" id="f_cat_for_4" class="col-span-8 input-box" placeholder="For..."></div>
                                <div class="grid grid-cols-12 gap-2"><input type="number" id="f_cat_dose_5" class="col-span-4 input-box text-center" placeholder="Dose"><input type="text" id="f_cat_for_5" class="col-span-8 input-box" placeholder="For..."></div>
                            </div>
                        </div>
                    </div>

                    <div id="warning-box" class="mb-8">
                        <label class="label-clinical text-red-400">🚨 คำเตือน / ข้อควรระวัง (Special Note)</label>
                        <textarea id="f_side_effects" class="input-box h-24" placeholder="แสดงบนสติ๊กเกอร์..."></textarea>
                    </div>
                </div>

                <div class="flex justify-between items-center pt-8 border-t border-white/10 mt-auto">
                    <button onclick="deleteItem()" id="btn-delete" class="hidden px-8 py-3 rounded-xl bg-red-500/10 border border-red-500/20 text-red-500 font-bold hover:bg-red-500/20 transition-all">🗑️ ลบรายการนี้</button>
                    <div class="flex gap-4 ml-auto">
                        <button onclick="addNewItem()" class="px-8 py-3 rounded-xl bg-white/5 border border-white/10 font-bold hover:bg-white/10 transition-all">ล้างฟอร์ม</button>
                        <button onclick="saveData()" class="px-12 py-3 rounded-xl bg-teal-500 text-navy font-black text-xl hover:bg-teal-400 shadow-xl transition-all">💾 บันทึกข้อมูล Master</button>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script>
        let currentCat = 'TakeHome';
        let items = [], selectedItem = null;

        window.onload = async () => { 
            renderTierInputs();
            await setCategory('TakeHome'); 
        };

        function renderTierInputs() {
            const container = document.getElementById('tiers-container');
            container.innerHTML = '';
            for(let i=1; i<=5; i++) {
                container.innerHTML += `
                    <div class="grid grid-cols-12 gap-3 items-center">
                        <div class="col-span-4 flex items-center gap-2">
                            <span class="text-xs text-slate-500">น้ำหนัก ≤</span>
                            <input type="number" step="0.1" id="tier_max_${i}" class="input-box text-center" placeholder="${i*5}">
                            <span class="text-xs text-slate-500">กก.</span>
                        </div>
                        <div class="col-span-8 flex items-center gap-3">
                            <span class="text-xs text-slate-500">ราคา</span>
                            <input type="number" id="tier_price_${i}" class="input-box text-yellow-400 font-bold" placeholder="0">
                            <span class="text-xs text-slate-500">บาท</span>
                        </div>
                    </div>`;
            }
        }

        async function setCategory(cat) {
            currentCat = cat;
            document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${cat.toLowerCase()}`).classList.add('active');
            
            const labels = { 'TakeHome': 'ยาจ่ายกลับบ้าน', 'ProcInj': 'หัตถการ/ยาฉีด', 'Lab': 'Lab', 'General': 'สินค้าทั่วไป' };
            document.getElementById('current-mode-label').innerText = `หมวด: ${labels[cat]}`;
            
            const isProcInj = (cat === 'ProcInj');
            document.getElementById('tiered-price-section').classList.toggle('hidden', !isProcInj);
            document.getElementById('fixed-price-section').classList.toggle('hidden', isProcInj);

            const isMed = (cat === 'TakeHome' || cat === 'ProcInj');
            document.getElementById('med-config-section').style.display = isMed ? 'block' : 'none';

            await fetchData();
            addNewItem();
        }

        async function fetchData() {
            let data = [];
            if (currentCat === 'TakeHome') {
                const res = await db.from('pharmacy').select('*').in('category', ['TakeHome', 'Oral', 'ยา']);
                data = (res.data || []).map(i => ({ ...i, source: 'pharmacy' }));
            } else if (currentCat === 'ProcInj') {
                const resInj = await db.from('pharmacy').select('*').eq('category', 'Injection');
                const resProc = await db.from('services').select('*').eq('category', 'หัตถการ');
                data = [
                    ...(resInj.data || []).map(i => ({ ...i, source: 'pharmacy' })),
                    ...(resProc.data || []).map(i => ({ ...i, source: 'services', item_name: i.service_name, price_per_unit: i.price }))
                ];
            } else if (currentCat === 'Lab') {
                const res = await db.from('services').select('*').eq('category', 'Lab');
                data = (res.data || []).map(i => ({ ...i, source: 'services', item_name: i.service_name, price_per_unit: i.price }));
            } else {
                const res = await db.from('pharmacy').select('*').eq('category', 'General');
                data = (res.data || []).map(i => ({ ...i, source: 'pharmacy' }));
            }
            items = data;
            renderItemList(items);
        }

        function renderItemList(data) {
            document.getElementById('item-list').innerHTML = data.map(i => `
                <div class="item-row-card" onclick="selectItem('${i.id}')">
                    <div class="font-black text-white text-base uppercase">${i.item_name}</div>
                    <div class="text-sm text-teal-500/70 font-bold">${i.name_th || ''}</div>
                </div>`).join('');
        }

        function selectItem(id) {
            selectedItem = items.find(i => i.id === id);
            if (!selectedItem) return;

            document.getElementById('f_name_en').value = selectedItem.item_name || selectedItem.service_name || '';
            document.getElementById('f_name_th').value = selectedItem.name_th || '';
            document.getElementById('f_unit').value = selectedItem.unit || '';
            document.getElementById('f_price').value = selectedItem.price_per_unit || selectedItem.price || 0;
            
            // โหลดราคาตามน้ำหนัก
            if (selectedItem.price_config && Array.isArray(selectedItem.price_config)) {
                selectedItem.price_config.forEach((tier, idx) => {
                    if (idx < 5) {
                        document.getElementById(`tier_max_${idx+1}`).value = tier.max;
                        document.getElementById(`tier_price_${idx+1}`).value = tier.price;
                    }
                });
            } else {
                for(let i=1; i<=5; i++) {
                    document.getElementById(`tier_max_${i}`).value = '';
                    document.getElementById(`tier_price_${i}`).value = '';
                }
            }

            // โหลด Dosage และ Config
            document.getElementById('f_conc').value = selectedItem.concentration_mg_unit || 1;
            document.getElementById('f_sub_cat').value = selectedItem.sub_category || '';
            document.getElementById('f_side_effects').value = selectedItem.side_effects || '';
            
            for(let i=1; i<=5; i++) {
                document.getElementById(`f_dog_dose_${i}`).value = selectedItem[`dog_dose_${i}`] || '';
                document.getElementById(`f_dog_for_${i}`).value = selectedItem[`dog_for_${i}`] || '';
                document.getElementById(`f_cat_dose_${i}`).value = selectedItem[`cat_dose_${i}`] || '';
                document.getElementById(`f_cat_for_${i}`).value = selectedItem[`cat_for_${i}`] || '';
            }

            document.getElementById('btn-delete').classList.remove('hidden');
        }

        async function saveData() {
            const nameEN = document.getElementById('f_name_en').value.trim();
            const nameTH = document.getElementById('f_name_th').value.trim();
            if (!nameEN) return alert('กรุณาระบุชื่อ');

            let tierData = [];
            for(let i=1; i<=5; i++) {
                const max = parseFloat(document.getElementById(`tier_max_${i}`).value);
                const price = parseFloat(document.getElementById(`tier_price_${i}`).value);
                if (!isNaN(max) && !isNaN(price)) tierData.push({ max, price });
            }

            let table = (currentCat === 'Lab') ? 'services' : 'pharmacy';
            if (currentCat === 'ProcInj') {
                table = (document.getElementById('f_dog_dose_1').value > 0) ? 'pharmacy' : 'services';
            }

            let payload = {};
            if (table === 'services') {
                payload = {
                    service_name: nameEN,
                    name_th: nameTH, // เพิ่มการบันทึกชื่อภาษาไทย
                    category: (currentCat === 'Lab' ? 'Lab' : 'หัตถการ'),
                    price: parseFloat(document.getElementById('f_price').value) || 0,
                    price_config: tierData.length > 0 ? tierData : null,
                    unit: document.getElementById('f_unit').value
                };
            } else {
                payload = {
                    item_name: nameEN,
                    name_th: nameTH, // เพิ่มการบันทึกชื่อภาษาไทย
                    category: (currentCat === 'TakeHome' ? 'TakeHome' : (currentCat === 'ProcInj' ? 'Injection' : 'General')),
                    sub_category: document.getElementById('f_sub_cat').value, // เพิ่มหมวดหมู่ย่อย
                    unit: document.getElementById('f_unit').value,
                    price_per_unit: parseFloat(document.getElementById('f_price').value) || 0,
                    price_config: tierData.length > 0 ? tierData : null,
                    concentration_mg_unit: parseFloat(document.getElementById('f_conc').value) || 1,
                    side_effects: document.getElementById('f_side_effects').value,
                    is_medication: true
                };
                // เพิ่มลูปบันทึก Dosage 1-5
                for(let i=1; i<=5; i++) {
                    payload[`dog_dose_${i}`] = parseFloat(document.getElementById(`f_dog_dose_${i}`).value) || 0;
                    payload[`dog_for_${i}`] = document.getElementById(`f_dog_for_${i}`).value;
                    payload[`cat_dose_${i}`] = parseFloat(document.getElementById(`f_cat_dose_${i}`).value) || 0;
                    payload[`cat_for_${i}`] = document.getElementById(`f_cat_for_${i}`).value;
                }
            }

            const { error } = selectedItem 
                ? await db.from(table).update(payload).eq('id', selectedItem.id)
                : await db.from(table).insert([payload]);

            if (error) alert('Error: ' + error.message);
            else { alert('บันทึก Master สำเร็จ!'); fetchData(); addNewItem(); }
        }

        function addNewItem() {
            selectedItem = null;
            document.querySelectorAll('input, textarea, select').forEach(i => i.value = '');
            document.getElementById('f_conc').value = 1;
            document.getElementById('btn-delete').classList.add('hidden');
        }

        async function deleteItem() {
            if (!selectedItem || !confirm('ยืนยันลบรายการนี้?')) return;
            await db.from(selectedItem.source).delete().eq('id', selectedItem.id);
            fetchData(); addNewItem();
        }

        function filterItems() {
            const term = document.getElementById('item-search').value.toLowerCase();
            renderItemList(items.filter(i => (i.item_name || i.service_name || '').toLowerCase().includes(term)));
        }
    </script>
</body>
</html>
