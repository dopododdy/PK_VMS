<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ฐานข้อมูลรายการกลาง | PK-VMS Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>

    <style>
        :root { --navy: #020617; --navy-light: #0f172a; --teal: #14b8b1; --border: rgba(255, 255, 255, 0.1); }
        * { font-family: "Sarabun", sans-serif !important; }
        body { background: var(--navy); color: #e2e8f0; }

        .input-box { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; padding: 12px; color: white; width: 100%; outline: none; transition: 0.2s; }
        .input-box:focus { border-color: var(--teal); background: rgba(0,0,0,0.5); }

        .section-card { background: rgba(30, 41, 59, 0.4); border-radius: 30px; padding: 30px; border: 1px solid var(--border); margin-bottom: 24px; }
        
        .btn-base { padding: 12px 24px; border-radius: 15px; font-weight: 800; display: inline-flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; border: none; cursor: pointer; color: white !important; }
        .btn-teal { background-color: #0d9488 !important; }
        .btn-teal:hover { background-color: #0f766e !important; transform: translateY(-2px); }
        .btn-blue { background-color: #2563eb !important; }
        .btn-red { background-color: #dc2626 !important; }

        .item-row { border-bottom: 1px solid rgba(255,255,255,0.05); transition: 0.2s; }
        .item-row:hover { background: rgba(255,255,255,0.02); }
        
        .badge { padding: 4px 12px; border-radius: 10px; font-size: 0.85rem; font-weight: 900; }
        .badge-ยา { background: rgba(20, 184, 177, 0.2); color: var(--teal); }
        .badge-สินค้า { background: rgba(168, 85, 247, 0.2); color: #a855f7; }
        .badge-หัตถการ { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .badge-Lab { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div class="flex items-center gap-6">
                <div class="w-16 h-16 rounded-3xl bg-teal-500/20 flex items-center justify-center text-4xl shadow-2xl border border-teal-500/20">🗂️</div>
                <div>
                    <h1 class="text-4xl font-black text-white">ฐานข้อมูลรายการกลาง</h1>
                    <p class="text-slate-400 mt-2 text-lg">จัดการราคา ยา, สินค้า, หัตถการ และผลแล็บ ทั้งหมดในหน้าเดียว</p>
                </div>
            </div>
            <a href="index.html" class="w-14 h-14 rounded-2xl bg-white/5 flex items-center justify-center hover:bg-white/10 text-3xl shadow-xl border border-white/5">🏠</a>
        </header>

        <div class="grid grid-cols-12 gap-8">
            <div class="col-span-12 lg:col-span-4">
                <div class="section-card sticky top-10">
                    <h3 id="form-title" class="text-2xl font-black text-white mb-8 flex items-center gap-2">
                        <span>➕ เพิ่มรายการใหม่</span>
                    </h3>
                    <form id="master-form" class="space-y-6">
                        <input type="hidden" id="f_id">
                        <input type="hidden" id="f_table">
                        
                        <div>
                            <label class="block text-slate-400 text-sm font-bold mb-2 ml-1">ชื่อรายการ</label>
                            <input type="text" id="f_name" class="input-box font-bold text-lg" placeholder="ระบุชื่อ ยา หรือ บริการ..." required>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-slate-400 text-sm font-bold mb-2 ml-1">หมวดหมู่</label>
                                <select id="f_category" class="input-box font-bold">
                                    <option value="ยา">💊 ยา (Rx)</option>
                                    <option value="สินค้า">🛍️ สินค้า</option>
                                    <option value="หัตถการ">💉 หัตถการ (Tx)</option>
                                    <option value="Lab">🔬 Lab Result</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-slate-400 text-sm font-bold mb-2 ml-1">หน่วยเรียก</label>
                                <input type="text" id="f_unit" class="input-box" placeholder="เม็ด/ครั้ง/ml">
                            </div>
                        </div>

                        <div>
                            <label class="block text-yellow-400 text-sm font-bold mb-2 ml-1">ราคาขายต่อหน่วย (฿)</label>
                            <input type="number" id="f_price" class="input-box text-3xl font-black text-yellow-400" placeholder="0.00" step="0.01" required>
                        </div>

                        <div class="pt-4 space-y-3">
                            <button type="submit" class="btn-base btn-teal w-full text-xl shadow-lg">💾 บันทึกรายการ</button>
                            <button type="button" id="btn-cancel" class="btn-base btn-red w-full hidden" onclick="resetForm()">ยกเลิกการแก้ไข</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="col-span-12 lg:col-span-8">
                <div class="section-card">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
                        <h3 class="text-2xl font-bold text-white">📦 รายการทั้งหมดในระบบ <span id="total-count" class="text-sm font-normal text-slate-500 ml-2"></span></h3>
                        <div class="w-full md:w-80">
                            <input type="text" id="search-box" class="input-box py-3 text-sm" placeholder="🔍 พิมพ์เพื่อค้นหา ยา/บริการ..." oninput="renderTable()">
                        </div>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="text-slate-500 text-xs uppercase tracking-widest border-b border-white/10">
                                    <th class="pb-5 pl-2">รายการ</th>
                                    <th class="pb-5">หมวดหมู่</th>
                                    <th class="pb-5 text-right">ราคา</th>
                                    <th class="pb-5 text-center">จัดการ</th>
                                </tr>
                            </thead>
                            <tbody id="data-table-body">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allCombinedData = [];
        let editingId = null;

        window.onload = async () => {
            await loadAllData();
        };

        // ฟังก์ชันหัวใจหลัก: ดึงข้อมูลจาก 2 ตารางมารวมกัน
        async function loadAllData() {
            try {
                // ดึงพร้อมกันเพื่อความเร็ว
                const [respPharmacy, respServices] = await Promise.all([
                    db.from('pharmacy').select('*'),
                    db.from('services').select('*')
                ]);

                // ใส่ Flag บอกว่าข้อมูลนี้มาจากตารางไหน
                const pharmacyItems = (respPharmacy.data || []).map(item => ({
                    ...item,
                    _tableName: 'pharmacy',
                    _displayName: item.item_name,
                    _displayPrice: item.price_per_unit
                }));

                const servicesItems = (respServices.data || []).map(item => ({
                    ...item,
                    _tableName: 'services',
                    _displayName: item.service_name,
                    _displayPrice: item.price
                }));

                // รวมร่างข้อมูล
                allCombinedData = [...pharmacyItems, ...servicesItems];
                
                // เรียงตามชื่อ
                allCombinedData.sort((a, b) => a._displayName.localeCompare(b._displayName));
                
                document.getElementById('total-count').innerText = `${allCombinedData.length} รายการ`;
                renderTable();
            } catch (err) {
                console.error("Load Error:", err);
            }
        }

        function renderTable() {
            const term = document.getElementById('search-box').value.toLowerCase();
            const body = document.getElementById('data-table-body');

            const filtered = allCombinedData.filter(item => 
                item._displayName.toLowerCase().includes(term) || 
                item.category.toLowerCase().includes(term)
            );

            if (filtered.length === 0) {
                body.innerHTML = `<tr><td colspan="4" class="py-20 text-center text-slate-600 font-bold">ไม่พบข้อมูลรายการที่ค้นหา</td></tr>`;
                return;
            }

            body.innerHTML = filtered.map(item => `
                <tr class="item-row group">
                    <td class="py-5 pl-2">
                        <div class="font-bold text-white text-lg">${item._displayName}</div>
                        <div class="text-slate-500 text-xs font-medium uppercase tracking-tighter">หน่วย: ${item.unit || 'ไม่ระบุ'}</div>
                    </td>
                    <td class="py-5">
                        <span class="badge badge-${item.category}">${item.category}</span>
                    </td>
                    <td class="py-5 text-right font-black text-2xl text-yellow-400">
                        <span class="text-sm font-bold mr-1">฿</span>${parseFloat(item._displayPrice || 0).toLocaleString(undefined, {minimumFractionDigits: 2})}
                    </td>
                    <td class="py-5 text-center">
                        <div class="flex justify-center gap-2">
                            <button onclick="editItem('${item.id}', '${item._tableName}')" class="btn-base btn-blue !py-2 !px-4 text-sm shadow-md">✏️ แก้ไข</button>
                            <button onclick="deleteItem('${item.id}', '${item._tableName}')" class="btn-base btn-red !py-2 !px-4 text-sm shadow-md">🗑️</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        document.getElementById('master-form').onsubmit = async (e) => {
            e.preventDefault();
            
            const category = document.getElementById('f_category').value;
            const name = document.getElementById('f_name').value;
            const price = parseFloat(document.getElementById('f_price').value);
            const unit = document.getElementById('f_unit').value;

            // ตัดสินใจว่าจะลงตารางไหนตามหมวดหมู่ที่เลือก
            const targetTable = (category === 'ยา' || category === 'สินค้า') ? 'pharmacy' : 'services';
            
            // เตรียมข้อมูลสำหรับส่งเข้าตาราง
            const payload = { category, unit, updated_at: new Date() };
            if (targetTable === 'pharmacy') {
                payload.item_name = name;
                payload.price_per_unit = price;
            } else {
                payload.service_name = name;
                payload.price = price;
            }

            try {
                if (editingId) {
                    // หากเป็นการแก้ไข ต้องลบจากตารางเดิมก่อน (ในกรณีที่มีการเปลี่ยนหมวดหมู่สลับตาราง)
                    const oldTable = document.getElementById('f_table').value;
                    if (oldTable !== targetTable) {
                        await db.from(oldTable).delete().eq('id', editingId);
                        await db.from(targetTable).insert([payload]);
                    } else {
                        await db.from(targetTable).update(payload).eq('id', editingId);
                    }
                } else {
                    await db.from(targetTable).insert([payload]);
                }
                
                alert("✅ บันทึกข้อมูลสำเร็จ");
                resetForm();
                await loadAllData();
            } catch (err) { alert(err.message); }
        };

        function editItem(id, tableName) {
            const item = allCombinedData.find(i => i.id === id && i._tableName === tableName);
            if (!item) return;

            editingId = id;
            document.getElementById('f_id').value = id;
            document.getElementById('f_table').value = tableName;
            document.getElementById('form-title').innerText = "✏️ แก้ไขข้อมูล";
            document.getElementById('btn-cancel').classList.remove('hidden');
            
            document.getElementById('f_name').value = item._displayName;
            document.getElementById('f_category').value = item.category;
            document.getElementById('f_unit').value = item.unit || '';
            document.getElementById('f_price').value = item._displayPrice;

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function deleteItem(id, tableName) {
            if (!confirm("ยืนยันการลบรายการนี้ออกจากฐานข้อมูล?")) return;
            try {
                await db.from(tableName).delete().eq('id', id);
                await loadAllData();
            } catch (err) { alert(err.message); }
        }

        function resetForm() {
            editingId = null;
            document.getElementById('master-form').reset();
            document.getElementById('form-title').innerText = "➕ เพิ่มรายการใหม่";
            document.getElementById('btn-cancel').classList.add('hidden');
            document.getElementById('f_table').value = "";
        }

        function goBack() { window.location.href = 'index.html'; }
    </script>
</body>
</html>
