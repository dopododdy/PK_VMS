<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ข้อมูลผู้ป่วย | PK-VMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Kanit:wght@300;400;500;600;700&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script src="ui-settings.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <style>
        :root { --navy: #020617; --navy-light: #0f172a; --teal: #14b8b1; --border: rgba(255, 255, 255, 0.1); }
        * { font-family: "Sarabun", sans-serif !important; }
        body { background: var(--navy); color: #e2e8f0; min-height: 100vh; }
        .section-card { background: rgba(30, 41, 59, 0.4); border-radius: 20px; padding: 24px; border: 1px solid var(--border); }
        .label-text { color: #94a3b8; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; display: block; }
        .value-text { color: #e2e8f0; font-size: 1.05rem; font-weight: 600; }
    </style>
</head>
<body class="p-4 md:p-6">
    <script>
        if (sessionStorage.getItem("isLoggedIn") !== "true") { window.location.href = "index.html"; }
    </script>

    <div class="max-w-3xl mx-auto">
        <header class="flex items-center gap-4 mb-8">
            <button onclick="location.href='patient.html'" class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center hover:bg-white/10 transition-all text-2xl flex-shrink-0">⬅️</button>
            <div>
                <h1 class="text-2xl md:text-3xl font-black text-white">ข้อมูลผู้ป่วย</h1>
                <p class="text-teal-400 text-sm font-bold">รายละเอียดสัตว์และเจ้าของ</p>
            </div>
            <button onclick="location.href='medrec.html'" class="ml-auto bg-teal-500 hover:bg-teal-400 text-navy px-5 py-2 rounded-full font-black shadow-lg transition-all text-sm">📋 บันทึกรักษา</button>
        </header>

        <div id="content" class="space-y-6">
            <div class="text-center text-gray-500 py-16">⏳ กำลังโหลด...</div>
        </div>
    </div>

    <script>
        function escapeHtml(str) {
            if (!str) return '-';
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function field(label, value) {
            return `<div>
                <span class="label-text">${label}</span>
                <div class="value-text">${escapeHtml(value) || '-'}</div>
            </div>`;
        }

        function getAnimalIcon(petType) {
            if (!petType) return '🐾';
            const t = petType.replace(/^[^\u0E00-\u0E7F]+/, '').trim();
            if (t.startsWith('สุนัข') || t.startsWith('หมา')) return '🐶';
            if (t.startsWith('แมว')) return '🐱';
            return '🐾';
        }

        async function loadDetail() {
            const id = new URLSearchParams(location.search).get('id');
            if (!id) { location.href = 'patient.html'; return; }

            try {
                const { data: animal, error } = await window.db
                    .from('animals')
                    .select('*, owners(hn, owner_name, phone, address, line_id, email)')
                    .eq('id', id)
                    .maybeSingle();

                if (error || !animal) { location.href = 'patient.html'; return; }

                const owner = animal.owners || {};
                const icon = getAnimalIcon(animal.pet_type);

                document.getElementById('content').innerHTML = `
                    <div class="section-card">
                        <div class="flex items-center gap-4 mb-6">
                            <div class="text-5xl">${icon}</div>
                            <div>
                                <h2 class="text-2xl font-black text-white">${escapeHtml(animal.pet_name)}</h2>
                                <p class="text-teal-400 font-bold">${escapeHtml(animal.pet_type || '')} ${animal.gender ? '· ' + escapeHtml(animal.gender) : ''}</p>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 md:grid-cols-3 gap-5">
                            ${field('พันธุ์', animal.breed)}
                            ${field('วันเกิด', animal.birth_date)}
                            ${field('น้ำหนัก', animal.weight ? animal.weight + ' kg' : null)}
                            ${field('ไมโครชิป', animal.microchip_number)}
                            ${field('โรคประจำตัว', animal.congenital_disease)}
                        </div>
                    </div>

                    <div class="section-card">
                        <h3 class="font-black text-white text-lg mb-5">👤 ข้อมูลเจ้าของ</h3>
                        <div class="grid grid-cols-2 md:grid-cols-3 gap-5">
                            ${field('ชื่อเจ้าของ', owner.owner_name)}
                            ${field('รหัส HN', owner.hn)}
                            ${field('โทรศัพท์', owner.phone)}
                            ${field('ที่อยู่', owner.address)}
                            ${field('LINE ID', owner.line_id)}
                            ${field('อีเมล', owner.email)}
                        </div>
                    </div>`;
            } catch (e) {
                console.error('โหลดข้อมูลล้มเหลว:', e);
                document.getElementById('content').innerHTML = '<div class="text-center text-red-400 py-16">เกิดข้อผิดพลาดในการโหลดข้อมูล</div>';
            }
        }

        loadDetail();
    </script>
</body>
</html>
